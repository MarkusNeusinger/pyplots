  image_description: 'The plot displays a Hertzsprung-Russell diagram on a dark navy
    (#0a0a2a) background. The x-axis shows "Surface Temperature (K)" reversed from
    ~50,000 K on the left to ~2,000 K on the right (log scale). The y-axis shows "Luminosity
    (L☉)" on a logarithmic scale from 10^-4 to 10^6. Stars are rendered as colored
    scatter points with white edge lines: blue/light-blue for O and B types in the
    upper-left, white/cream for A types, yellow-gold for F and G types along the middle,
    orange for K types, and red for M types in the lower-right. The main sequence
    runs as a clear diagonal band from upper-left to lower-right. Red Giants cluster
    in the upper-right region with orange and red colors. Supergiants are scattered
    across the top of the plot at high luminosities. White Dwarfs appear in the lower
    portion at low luminosities. The Sun is marked with a distinctive yellow star
    marker and labeled "☀ Sun". Four region labels ("Main Sequence", "Red Giants",
    "Supergiants", "White Dwarfs") are placed in italic near their respective clusters.
    Spectral class letters (O, B, A, F, G, K, M) appear along the top in their corresponding
    colors. A legend titled "Spectral Type" sits in the bottom-right corner but appears
    quite small relative to the canvas. The title reads "scatter-hr-diagram · bokeh
    · pyplots.ai" in the upper-left.'
