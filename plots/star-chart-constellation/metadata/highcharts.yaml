review:
  strengths:
  - Exceptional visual design with dark sky gradient, glowing radial-gradient stars,
    and per-constellation color coding
  - Real astronomical data with accurate star names, positions, and magnitudes across
    15 constellations
  - Excellent magnitude-to-size mapping creating natural visual hierarchy
  - Background stars adding realistic atmosphere
  - Interactive HTML version alongside static PNG leveraging Highcharts interactive
    capabilities
  - Perfect code quality with clean KISS structure
  weaknesses:
  - Uses flat rectangular RA/Dec projection instead of the spec-requested stereographic
    or azimuthal equidistant projection with circular sky boundary
  - Minor label crowding between Cygnus and Lyra constellation names
  - Some constellation colors may be challenging for colorblind viewers (multiple
    warm tones)
  - Could leverage more advanced Highcharts features (e.g., custom plot bands for
    Milky Way)
  image_description: The plot displays a star chart on a dark navy background with
    a subtle vertical gradient. Stars are rendered as white/pale circular markers
    with radial gradients giving them a realistic glow effect. Brighter stars (like
    Sirius, Vega, Arcturus) appear significantly larger than dimmer ones. 15 constellations
    are shown with colored stick-figure lines connecting their stars — each constellation
    has a unique color (e.g., Orion in light blue, Ursa Major in yellow, Scorpius
    in red, Cassiopeia in purple). Constellation names are labeled in matching colors
    near the centroid of each group. The x-axis shows Right Ascension in degrees (reversed
    from 360° to 0°), and the y-axis shows Declination from -50° to 70°. A subtle
    dotted coordinate grid is overlaid. Approximately 300 faint background stars add
    atmosphere. The title reads "star-chart-constellation · highcharts · pyplots.ai"
    with a descriptive subtitle "Northern & Southern Hemisphere — 15 Constellations,
    70+ Stars to mag 3.7".
