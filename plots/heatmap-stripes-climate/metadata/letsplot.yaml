  image_description: 'The plot displays classic Ed Hawkins-style warming stripes —
    a sequence of vertical colored bars spanning from 1850 to 2024. The left portion
    is dominated by blues (deep navy #08306b through lighter blues), representing
    negative temperature anomalies relative to the 1961-1990 baseline. Moving right,
    the stripes transition through near-white/neutral tones around the baseline period,
    then shift to progressively deeper reds (#67000d) in the most recent decades,
    representing positive anomalies. The title "heatmap-stripes-climate · letsplot
    · pyplots.ai" appears in subdued gray at the top left. There are no axes, gridlines,
    tick marks, or legend — the visualization communicates purely through color. The
    stripes fill most of the white canvas with no gaps between bars. The overall aspect
    ratio is 16:9 (1600x900 base, exported at 3x scale to 4800x2700).'
