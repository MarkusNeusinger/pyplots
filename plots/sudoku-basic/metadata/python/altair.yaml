review:
  strengths:
  - 'Perfect theme adaptation — both renders pass readability checks with correct
    #FAF8F1/#1A1A17 backgrounds and fully adaptive chrome'
  - Excellent use of Altair alt.layer() to compose mark_rule (lines) and mark_text
    (numbers) — idiomatic and clean
  - Font sizes explicitly set (fontSize=32 title, fontSize=56 numbers); produces crisp
    3600x3600 output via scale_factor=4.0
  - The World's Hardest Sudoku puzzle adds genuine real-world context
  - Code is compact and readable — the loop that builds both vertical and horizontal
    lines in one pass is elegant
  weaknesses:
  - 'Design sophistication (DE-01=4/8): The grid looks functional but visually generic
    — no typographic distinction or subtle design choice that elevates it beyond a
    utility grid'
  - 'No Altair-distinctive HTML interactivity (LM-02=3/5): The generated HTML file
    has no tooltips, selections, or interactions — missing an opportunity to use Altair''s
    interactive encoding capabilities'
  - 'Data storytelling (DE-03=2/6): The puzzle is displayed as-is with no visual emphasis
    — given/hint numbers could be styled differently from empty cells to create hierarchy'
