  strengths:
  - Excellent visual refinement with removed grid/ticks/outline creating a clean minimalist
    aesthetic
  - Colorblind-safe palette (Python Blue + burnt orange) with strong contrast
  - Idiomatic Bokeh code using ColumnDataSource, vbar/segment, and HoverTool
  - Dual output (PNG + HTML) leverages Bokeh interactive capabilities
  - Intentional data narrative with dip-and-recovery pattern showing varied candle
    types
  - All font sizes explicitly set well above minimums for the 4800x2700 canvas
  weaknesses:
  - Title format prepends ACME Corp Stock to the standard spec-id/library/pyplots.ai
    format
  - Wick line_width=5 is visible but relatively thin at 4800px scale
  - Data storytelling relies on natural price pattern without explicit visual emphasis
    or annotations
  image_description: The plot displays a candlestick chart titled "ACME Corp Stock
    · candlestick-basic · bokeh · pyplots.ai" on a light gray (#fafafa) background
    with a white border. The x-axis is labeled "Date" spanning from Jan 01 2024 to
    approximately Feb 08, with major tick labels at weekly intervals. The y-axis is
    labeled "Price ($)" with dollar-formatted values from $130 to $165 at $5 intervals.
    Bullish (up) candles are rendered in Python Blue (#306998) and bearish (down)
    candles in burnt orange (#E8590C). The wicks are colored to match their respective
    candle bodies and are thinner than the bodies. The data shows an initial stable
    period around $150, a rise to ~$160 by mid-January, followed by a steep decline
    to ~$129 around late January, and a partial recovery stabilizing around $135.
    Both bullish and bearish candles are clearly visible throughout. The x-grid is
    removed entirely, and the y-grid is very subtle (barely visible). Axis lines are
    softened, tick marks are removed, and the outline is absent — creating a clean,
    minimalist appearance. No legend is present. Candle bodies are well-proportioned
    with appropriate width for the 30-day trading period.
