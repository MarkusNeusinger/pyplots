  image_description: The plot displays a Mohr's Circle for stress analysis on a 3600x3600
    white canvas. A blue (#306998) circle is centered at approximately (25, 0) with
    a radius of ~68 MPa. Red diamond markers indicate the principal stresses σ₁ =
    93.0 MPa (right intersection with horizontal axis) and σ₂ = -43.0 MPa (left intersection).
    Orange-green triangle markers at the top and bottom of the circle mark τ_max =
    68.0 MPa. Blue circle markers denote stress points A(80, 40) and B(-30, -40),
    connected by a dashed gray diameter line through the center. A red arc near the
    center indicates the principal plane angle 2θp = 36.0°. Gray reference lines include
    a solid horizontal line at y=0 and a dashed vertical line through the center.
    Light grid lines (alpha ~0.2) are visible. All annotations are clearly labeled
    with values and units. The title reads "Mohr's Circle for Stress Analysis · mohr-circle
    · bokeh · pyplots.ai" at the top. Axes are labeled "Normal Stress σ (MPa)" and
    "Shear Stress τ (MPa)". The circle maintains equal aspect ratio and appears as
    a true circle.
