review:
  strengths:
  - Correct Fruchterman-Reingold physics simulation implemented from scratch with
    proper repulsion/attraction forces and temperature cooling
  - 'Full theme-adaptive chrome: background, text, legend, hub annotations all use
    correct tokens in both light and dark renders — no dark-on-dark failures'
  - None-separator edge trace pattern is the idiomatic plotly approach for network
    graphs; grouped traces per community correctly drives the legend
  - Degree-scaled node sizes elegantly encode network centrality as a visual variable
  - 'Perfect spec compliance: all required features implemented including community
    structure, degree sizing, and bridge connections'
  weaknesses:
  - Hub annotations (threshold degree >= 7) fire on too many nodes in each community,
    causing multiple 'Hub' labels to crowd the same cluster region and overlap each
    other — reduces legibility and storytelling clarity
  - 'Over-labeling dilutes visual emphasis: if every hub is labeled, nothing stands
    out as special; consider labeling only the top 2-3 highest-degree nodes overall,
    or removing text labels entirely and relying on node size alone to convey hub
    importance'
