review:
  strengths:
  - Clean minimal design with no visual clutter — grid and ticks removed appropriately
  - Elegant data expansion logic creating one row per icon position with alpha for
    partial icons
  - Realistic fruit production dataset with good value variety
  - Perfect code quality — clean structure, deterministic, all imports used
  - Idiomatic plotnine grammar of graphics usage
  weaknesses:
  - Single color for all categories makes chart visually monotone — different colors
    per fruit would add interest
  - No visual hierarchy or storytelling — viewer has no focal point or insight
  - Wasted space on right side of canvas due to fixed x-axis limit of 8.5
  - Caption relatively small and positioned far from data
  - Generic library usage — could leverage plotnine-specific features more creatively
  image_description: The plot displays a pictogram chart with 5 fruit categories (Apples,
    Oranges, Bananas, Grapes, Strawberries) listed on the y-axis. Each category has
    a row of dark blue (#306998) square markers representing full units (5 thousand
    tonnes each). Partial units are shown as faded/lighter blue squares with reduced
    alpha. Apples has 7 full squares, Grapes has 5 full + 1 partial, Oranges has 4
    full + 1 partial, Bananas has 3 full + 1 partial, and Strawberries has 2 full
    + 1 partial. The title reads "Fruit Production · pictogram-basic · plotnine ·
    pyplots.ai" in bold at the top. A caption at the bottom right reads "Each square
    = 5 thousand tonnes | Faded = partial unit". The background is white with no grid
    lines, no axis ticks, and no x-axis labels. The layout is 16:9 landscape format.
