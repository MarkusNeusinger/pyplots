  image_description: The plot displays a 10x10 heatmap grid with accident years 2015-2024
    on the Y-axis (top to bottom) and development periods 1-10 on the X-axis. Tiles
    use a custom 6-stop blue gradient from very light (#e8f4f8) for low cumulative
    amounts to dark navy (#0d1b2a) for high amounts. Each cell is annotated with the
    cumulative claim amount formatted with thousands separators in either white or
    dark text depending on tile darkness. Actual (observed) cells in the upper-left
    triangle are fully opaque, while projected cells in the lower-right triangle are
    semi-transparent (alpha ~0.35), creating a clear visual distinction. A "Region"
    legend on the right shows Actual vs Projected with corresponding opacity squares.
    A "Cumulative Amount" colorbar shows the gradient scale. Development factors (2.50
    down to 1.01) appear in bold blue text between column positions below the main
    grid, with a "Dev Factor" y-axis label. The title reads "heatmap-loss-triangle
    · plotnine · pyplots.ai" in bold centered text, with subtitle "Cumulative Paid
    Claims — Actual vs Projected · Development Factors shown below" in gray. White
    borders separate tiles, background is white, and grid lines are fully removed.
    The 2019 accident year clearly stands out as a catastrophe year with noticeably
    higher values (darker tiles) across all development periods.
