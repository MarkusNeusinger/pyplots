    dot at the center-left. A red wavy photon line (gamma) connects to a second black
    vertex dot at center-right. From the right vertex, two dark blue arrowed fermion
    lines diverge to the upper-right (mu-) and lower-right (mu+). Particle labels
    are in blue (fermions) and red (photon) using LaTeX notation. A legend at the
    bottom shows Fermion (solid + arrow), Photon (wavy), and Vertex entries. A gray
    "time" arrow runs along the bottom. The title reads "feynman-basic · matplotlib
    · pyplots.ai".
