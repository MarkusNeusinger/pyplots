review:
  strengths:
  - Full theme-adaptive chrome applied correctly in both renders — no dark-on-dark
    or light-on-light failures
  - Viridis magnitude encoding with styled colorbar adds a meaningful second data
    dimension
  - Circular rotation field creates a visually striking radial pattern that immediately
    communicates structure
  - All font sizes explicitly set at correct scale (24/20/16pt)
  - Near-zero magnitude arrows at center correctly filtered out
  weaknesses:
  - Arrow lengths are all normalized to the same value — the spec requires length
    proportional to magnitude; this feature is absent (only color shows magnitude)
  - Open V-shaped arrowheads are less elegant than filled triangular arrowheads; reduces
    visual polish
  - Abstract 'X Position / Y Position' framing misses an opportunity to ground the
    plot in a real-world scenario (ocean vortex, atmospheric swirl)
