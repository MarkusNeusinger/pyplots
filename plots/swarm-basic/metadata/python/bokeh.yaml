      Background: Warm off-white #FAF8F1 — correct per style guide.
      Chrome: Title "swarm-basic · bokeh · anyplot.ai" dark and centered at top; "Department" x-axis label bold at bottom; "Performance Score" y-axis label rotated left — all readable in dark ink against light background.
      Data: Four swarm columns — Engineering (#009E73 teal-green), Marketing (#D55E00 vermillion), Sales (#0072B2 blue), HR (#CC79A7 reddish-purple). Points size 18 with white/page-bg edges. Horizontal median lines span each column in dark ink. Y-axis grid lines very subtle.
      Legibility verdict: PASS — all text readable; no light-on-light failures.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct per style guide.
      Chrome: Title, axis labels, tick labels all render in light #F0EFE8 color against dark background — fully readable. Median lines flip to white/light. No dark-on-dark failures observed.
      Data: Identical Okabe-Ito colors to light render (#009E73, #D55E00, #0072B2, #CC79A7) — only chrome flips. Grid lines subtle.
      Legibility verdict: PASS — all text readable; no dark-on-dark failures.
