  image_description: 'The plot displays a multi-track genome browser view of a ~50kb
    region on chr7 (55,140,000-55,190,000). Four vertically stacked tracks share a
    common x-axis of genomic position: (1) Genes track showing EGFR (+ strand) and
    VOPP1 (- strand) with thick dark blue exon rectangles connected by thin blue intron
    lines and small triangle arrows indicating strand direction, gene names labeled
    in bold above. (2) Coverage track as a filled blue area chart with monotone interpolation
    showing read depth 0-100x, with peaks aligning to exon regions. (3) Variants track
    with orange circles (SNPs) and blue circles (Indels) plotted by position and quality
    score (0-100), with a Type legend. (4) Regulatory track with purple rectangles
    (Promoters) and gold/amber rectangles (Enhancers), with an Element legend. The
    main title "genome-track-multi · altair · pyplots.ai" is centered at the top.
    Track labels appear as left-anchored gray subtitles. The bottom x-axis shows formatted
    genomic coordinates with chromosome identifier.'
