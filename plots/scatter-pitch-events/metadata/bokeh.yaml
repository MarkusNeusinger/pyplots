  strengths:
  - Excellent pitch rendering with all FIFA standard markings including corner arcs,
    penalty arcs, and goal posts
  - Strong data storytelling through danger zone gradient, shot annotation, and visual
    hierarchy with shots as focal points
  - Mow-pattern stripes add professional texture without distraction
  - Dual PNG + HTML output leverages Bokeh interactive capabilities
  - Colorblind-safe palette with shape redundancy ensures accessibility
  - Realistic data proportions and spatial distributions for soccer events
  weaknesses:
  - Unsuccessful event markers (white fill, low alpha) can be slightly hard to distinguish
    on light green pitch
  - Legend with 8 items across 2 rows is somewhat dense
  image_description: 'The plot displays a soccer pitch event map on a light green
    background with subtle alternating mow-pattern stripes. Standard FIFA pitch markings
    are drawn in dark green: pitch outline, halfway line, center circle with center
    spot, both penalty areas, goal areas, penalty spots, penalty arcs, corner arcs,
    and gray goal posts at each end. A translucent red danger zone gradient highlights
    the attacking third (right side). Four event types are plotted with distinct markers
    and colors: blue circles for passes, red/pink stars for shots, gold triangles
    for tackles, and purple diamonds for interceptions. Successful events appear filled
    with high opacity; unsuccessful ones are hollow/white-filled with lower opacity.
    Directional arrows connect start-to-end positions for passes (blue) and shots
    (red), with shot arrows being thicker. A bold red annotation "16 shots · 3 on
    target" appears in the top-right corner. The horizontal legend at the bottom lists
    all 8 event type/outcome combinations. Title reads "scatter-pitch-events · bokeh
    · pyplots.ai". Axes are labeled "Pitch Length (m)" and "Pitch Width (m)" with
    clean gray text on a #FAFAFA background.'
