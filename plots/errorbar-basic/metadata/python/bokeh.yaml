review:
  strengths:
  - 'Full theme adaptation: warm off-white / near-black backgrounds with all chrome
    (text, grid, axes) flipping correctly — both renders pass readability checks'
  - Idiomatic Bokeh Whisker+TeeHead error bars with per-group ColumnDataSource enabling
    individual colors — a Bokeh-distinctive pattern
  - 'Asymmetric errors (Treatment C: -6.5/+2.8) showcase a meaningful feature of error
    bar plots'
  - '''highest variability'' annotation adds light data storytelling without crowding'
  - 'Perfect code quality: seed set, KISS structure, all imports used, strict zip'
  weaknesses:
  - Error bar line_width=5 and TeeHead size=40 render noticeably thin at full 4800x2700
    — increase to line_width=8-10 and TeeHead size=60+ for visual prominence
  - Bokeh's interactive HoverTool (showing exact mean and CI values on hover) is unused
    — adding a tooltip uses a feature unique to Bokeh that no static library can match,
    raising LM-02
  - DQ-02 unit label 'Response Value (units)' is generic — replace with a concrete
    domain unit (e.g., 'Cell Viability (%)' or 'Enzyme Activity (U/mL)') for realistic
    context
  - 'DE-01 lacks a final polish step: consider a horizontal reference line at Control
    mean as a dashed baseline to elevate beyond well-configured defaults'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface
      Chrome: Title "errorbar-basic · bokeh · anyplot.ai" in dark ink #1A1A17, top-left aligned. Axis labels "Experimental Group" (x) and "Response Value (units)" (y) in dark ink. Tick labels in INK_SOFT #4A4A44. All text clearly readable against the light background.
      Data: Six groups (Control, Treatment A-E) each with a scatter point and Whisker error bar. Colors follow Okabe-Ito canonical order — Control #009E73 (brand green), Treatment A #D55E00, Treatment B #0072B2, Treatment C #CC79A7, Treatment D #E69F00, Treatment E #56B4E9. Asymmetric errors visible (Treatment C extends ~6.5 units down, ~2.8 up). TeeHead caps present on both ends of each bar. "highest variability" italic annotation near Treatment C lower extent.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Near-black #1A1A17 — correct dark theme surface
      Chrome: Title and axis labels in light #F0EFE8, tick labels in #B8B7B0. All text clearly readable against the dark background. No dark-on-dark failures observed — text contrasts well with the near-black surface.
      Data: All six data colors are identical to the light render (#009E73, #D55E00, #0072B2, #CC79A7, #E69F00, #56B4E9). The Okabe-Ito palette is theme-consistent as required. Scatter markers have PAGE_BG edge color which flips to #1A1A17 in dark mode — subtle ring effect still distinguishable.
      Legibility verdict: PASS
