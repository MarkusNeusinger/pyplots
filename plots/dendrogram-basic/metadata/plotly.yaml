  image_description: 'The plot displays a vertical dendrogram of 15 iris flower samples
    (5 each from Setosa, Versicolor, and Virginica species) clustered using Ward linkage.
    Branches are color-coded by species cluster: purple for Setosa (left), blue for
    the main trunk and above-threshold merges, and orange for Virginica (center) and
    Versicolor (right). A dashed horizontal line at y=3.5 marks the color threshold
    with a "cut threshold = 3.5" label on the right. An annotation near the top reads
    "Setosa separates first → most genetically distinct" with an arrow pointing to
    the highest merge. Species group labels appear below the x-axis ("Setosa / most
    distinct species", "Virginica", "Versicolor"). The title "dendrogram-basic · plotly
    · pyplots.ai" is centered at the top. The y-axis is labeled "Distance (Ward linkage)"
    and the x-axis "Iris Flower Samples". Background is white with a very subtle grid
    on the y-axis. X-axis tick labels are rotated at -35 degrees.'
