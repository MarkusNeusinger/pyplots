  image_description: The plot displays a Pareto chart of manufacturing defect types.
    Ten descending blue bars represent defect counts, with the first five bars (Scratches=187,
    Dents=143, Misalignment=98, Discoloration=72, Cracks=54) rendered in darker blue
    (#306998) as the "vital few," and the remaining five (Burrs=38, Warping=27, Contamination=19,
    Chipping=12, Porosity=7) in lighter blue (#7BA4C7) as the "trivial many." An orange
    cumulative percentage line with circular markers overlays the bars, with percentage
    labels (28%, 50%, 65%, 76%, 84%, 90%, 94%, 97%, 99%, 100%) above each marker.
    A dashed orange 80% threshold line spans the full width with an "80% threshold"
    label at the right. The right y-axis shows cumulative percentage (0-100%) with
    "%" formatted ticks. The left y-axis shows "Defect Count" (0-200). X-axis labels
    are slightly rotated. Title reads "bar-pareto · bokeh · pyplots.ai" centered at
    top. A legend in the top-left corner shows "Defect Count" and "Cumulative %".
    Background is white with subtle horizontal gridlines.
