  image_description: 'The plot displays a basic arc diagram with 12 character nodes
    (Alice through Leo) arranged along a horizontal baseline. Curved arcs above the
    baseline connect pairs of characters, with arc height proportional to the distance
    between connected nodes. Arcs are color-coded using a reversed viridis palette
    across 5 interaction strength levels: Weak (yellow-green), Light (green), Moderate
    (teal), Strong (blue), and Intense (dark purple). Arc thickness also varies with
    weight — thicker arcs indicate stronger connections. Two italic annotations with
    arrows provide narrative context: "Weakest link, longest reach" points to the
    tall Alice–Leo arc spanning the full diagram, while "Strongest local bonds" points
    to the cluster of short, thick arcs near Dave–Eve. Nodes are rendered as dark
    blue (#306998) dots with white edges. The title "arc-basic · seaborn · pyplots.ai"
    appears at the top. A legend in the upper right shows all 5 strength categories.
    All spines and ticks are removed, and a subtle light-blue horizontal baseline
    anchors the nodes.'
