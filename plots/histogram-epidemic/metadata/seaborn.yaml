  image_description: 'The plot displays a stacked histogram (epidemic curve) spanning
    approximately 120 days from mid-January to mid-May 2024. Bars are stacked by case
    classification: Confirmed (steel blue #306998), Probable (gold #E8A838), and Suspect
    (muted purple #9467BD). A red cumulative cases line overlays on a secondary y-axis
