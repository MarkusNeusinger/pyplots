    and StreamVue) are drawn thicker and more saturated, while four supporting lines
    are thinner and more transparent. A subtle crossover emphasis (large semi-transparent
    circle) appears at Q4''24 where WavePlay overtakes StreamVue for the #1 position.
    End labels are placed to the right — bold for protagonists, italic for supporting
    cast. White-filled circle markers appear at each data point. The background is
    light gray (#fafafa) with a white panel, subtle horizontal grid lines only, and
    no vertical grid lines. The title reads "bump-basic · plotnine · pyplots.ai" in
    bold at the top.'
