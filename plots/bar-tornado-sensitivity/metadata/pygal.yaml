    (negative) bars are salmon/coral colored ("Low Input Effect") and the right (positive)
    bars are steel blue ("High Input Effect"). Each bar displays its deviation value
    (e.g., -1.1, +1.3) printed in the center. The x-axis is labeled "Change in NPV
    ($M)" with gridlines at 0.2 intervals. The title reads "NPV Sensitivity Analysis
    · bar-tornado-sensitivity · pygal · pyplots.ai" and a legend at the bottom identifies
    the two series. The background is white with a light gray (#fafafa) plot area,
    and bars have slightly rounded corners.
