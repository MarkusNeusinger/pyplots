review:
  strengths:
  - Correct use of mark_arc with innerRadius/outerRadius for idiomatic Altair donut
    construction
  - Clean three-layer composition (arc + text + center) using alt.layer() is idiomatic
    Altair
  - Center total metric adds meaningful context per spec requirement
  - Tooltip encoding with category, value, and percentage enhances HTML interactivity
  - Font sizes are explicitly set throughout (title 28px, legend 20/16px, labels 20px,
    center 36px)
  - Deterministic data with good proportional variation across 5 categories (7–35M
    range)
  weaknesses:
  - 'CRITICAL: No ANYPLOT_THEME environment variable handling — code must read os.getenv(''ANYPLOT_THEME'')
    and apply theme-adaptive tokens (PAGE_BG, ELEVATED_BG, INK, INK_SOFT) to configure_view,
    configure_title, configure_legend'
  - 'CRITICAL: Palette is Python-themed (#306998, #FFD43B, #4B8BBE, #646464, #8FBC8F)
    — must use Okabe-Ito starting with #009E73 (#009E73, #D55E00, #0072B2, #CC79A7,
    #E69F00)'
  - 'CRITICAL: Output saved as plot.png/plot.html — must be plot-{THEME}.png and plot-{THEME}.html
    using the THEME variable'
  - 'CRITICAL: Title contains ''pyplots.ai'' — must be exactly ''donut-basic · altair
    · anyplot.ai'''
  - Canvas is landscape 1600×900 — donut charts are symmetric and should use square
    canvas (e.g., width=1200, height=1200, scale_factor=3 for 3600×3600)
  - Center text color is hardcoded (#306998) — must use theme-adaptive INK token
