review:
  strengths:
  - Perfect theme adaptation in both light (#FAF8F1) and dark (#1A1A17) renders —
    error bar colors flip correctly to INK token, all text readable in both themes
  - Correct use of ErrorBarSeries from highcharts-more.js with ColumnSeries overlay
    — the idiomatic Highcharts pattern for error bars; downloads both required JS
    modules
  - Analytical reference line (plotLines) at Control mean with labeled annotation
    adds genuine analytical insight
  - Font sizes explicitly set throughout (title 64px, axis labels 42px, tick labels
    32px) and scaled appropriately for 4800x2700 canvas
  - Clean deterministic clinical trial data with meaningful neutral context; KISS
    flat-script structure with idiomatic from_array() usage
  weaknesses:
  - All bars are the same brand green with no visual emphasis on the standout group
    (Treatment C); a distinct color highlight or callout annotation on Treatment C
    would strengthen DE-03 storytelling
  - Legend error bar symbol renders as a filled circle rather than an I-bar due to
    Highcharts limitation for errorbar series in legend
  - 'Visual refinement could go further: reference line dashes are quite light in
    dark mode; DE-03 storytelling relies on subtitle text rather than visual hierarchy'
