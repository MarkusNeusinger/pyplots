  image_description: 'The plot displays an engineering stress-strain curve for mild
    steel on a light gray background. The x-axis shows "Engineering Strain" (0 to
    0.35) and the y-axis shows "Engineering Stress (MPa)" (0 to 450). The main curve
    is drawn as a thick blue line starting from the origin, rising steeply through
    the elastic region, showing a brief yield plateau around 250 MPa, then curving
    through strain hardening up to ~400 MPa (UTS), and finally declining through the
    necking region to fracture at ~280 MPa. Three colored background bands distinguish
    the regions: light blue for Elastic, light yellow for Strain Hardening, and light
    pink for Necking, each labeled in gray italic text. Key points are marked with
    filled circles: purple for Yield Point (250 MPa), red for UTS (400 MPa), and gray
    for Fracture. A dashed pink line shows the 0.2% offset construction, and "E =
    210 GPa" is annotated in blue italic. Dotted gray connector lines link points
    to their labels. The title reads "line-stress-strain · letsplot · pyplots.ai"
    in bold at the top. Only horizontal grid lines are shown, subtle and light.'
