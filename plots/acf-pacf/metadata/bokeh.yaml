  image_description: The plot displays two vertically stacked subplots for ACF (top)
    and PACF (bottom) of a simulated AR(2) retail sales time series. The title "acf-pacf
    · bokeh · pyplots.ai" appears at the top left. Both plots use vertical stem lines
    from a zero baseline to correlation values, with circular markers at each tip.
    Significant lags (outside the 95% confidence interval) are rendered in darker
    Python Blue (#306998), while non-significant lags appear in a muted blue (#8FAEC4).
    A semi-transparent pink/red shaded band marks the 95% confidence interval on both
    subplots, bounded by dashed red lines. Red "95% Confidence Interval" labels appear
    on each subplot. The ACF shows lag 0 = 1.0, lag 1 ≈ 0.42, with gradual exponential
    decay characteristic of an AR process. The PACF shows a sharp cutoff after lag
    2, with lags 1 (≈0.43) and 2 (≈-0.28) highlighted by gold-outlined markers and
    a gold "AR(2) identified" annotation. The background is light gray (#FAFAFA) with
    subtle dashed y-grid lines. X-axes share the same range (0-35) labeled "Lag";
    y-axes are labeled "ACF" and "PACF" respectively.
