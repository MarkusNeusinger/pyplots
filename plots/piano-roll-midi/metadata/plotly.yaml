  strengths:
  - Full spec compliance with all required features (black/white key shading, beat/measure
    lines, note names, velocity colorscale)
  - Excellent data quality - realistic I-V-vi-IV progression with proper voice leading
    and dynamics
  - Melody vs accompaniment visual hierarchy through size and opacity differentiation
  - Clever use of invisible scatter trace for hover tooltips and colorbar
  - Plasma colorscale is a strong colorblind-safe choice
  weaknesses:
  - Manual Plasma color interpolation function is unnecessary over-engineering
  - Y-axis shows every semitone which is very dense
  - Axis labels lack units/context
  image_description: The plot displays a MIDI piano roll visualization spanning 4
    measures of a C major I-V-vi-IV chord progression with melody. The y-axis shows
    pitch names from G#2 to G#5, with every semitone labeled. The x-axis shows beat
    positions labeled M1.1 through M5.1. Notes are rendered as horizontal colored
    rectangles using the Plasma colorscale (dark purple for low velocity ~70 to bright
    yellow for high velocity ~120). Melody notes appear taller and more opaque than
    accompaniment notes. Black key rows have subtle gray shading to distinguish them
    from white key rows. Vertical lines mark measure boundaries (thicker) and beat
    divisions (thinner). A colorbar on the right indicates velocity. The title reads
    "piano-roll-midi · plotly · pyplots.ai" centered at top. The overall background
    is clean white using plotly_white template.
