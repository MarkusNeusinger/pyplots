    style, no theme-adaptive chrome at all
  - 'Node label color hardcoded to #222222 — dark text on dark background in dark
    mode for labels outside node circles'
  - Output saved as plot.png instead of plot-{THEME}.png (e.g. plot-light.png / plot-dark.png)
  - Title contains pyplots.ai instead of anyplot.ai
  - Manual spring layout is over-engineered — networkx.spring_layout() would be idiomatic
    and 10x shorter
  - Node labels at fontsize=11 are below the recommended 16pt minimum for 4800x2700px
    canvas
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (approximately #FAF8F1), consistent with the anyplot light theme surface.
      Chrome: Title "Social Network · network-basic · seaborn · anyplot.ai" rendered in dark bold text at 24pt — clearly readable. Legend in upper-left shows "Community" header with Team A (teal), Team B (orange), Team C (blue), Team D (pink/gray) swatches — readable but relies on automatic seaborn theming rather than explicit INK tokens.
      Data: 20 nodes colored by community in 4 groups (non-Okabe-Ito palette — Team A is NOT #009E73). Node sizes vary with degree. Gray edges with alpha transparency connect nodes. Force-directed layout creates diagonal cluster spread from top-left to bottom-right. Node labels (person names) in dark text at fontsize=11, positioned over or near node circles.
      Legibility verdict: PASS — all text is readable, though node labels are below recommended 16pt minimum.

    Dark render (plot-dark.png):
      Background: Warm near-black (approximately #1A1A17) — correct dark theme surface. NOTE: the current code does not read ANYPLOT_THEME and saves with facecolor="white"; the dark render images appear to have been generated by previous-attempt code that had partial theme adaptation.
      Chrome: Title and legend text appear in light/white color on the dark background — readable. However, node labels (person names) also appear as light-colored text in the dark render — this is inconsistent with the current code which hardcodes color="#222222" for all node labels.
      Data: Identical data colors to light render (same community color scheme). Network structure identical.
      Legibility verdict: PASS for the images as shown (from prior attempt). However, the CURRENT code has color="#222222" for node labels — if run with ANYPLOT_THEME=dark, labels outside node circles (e.g. Frank, Grace, David, Kate) would be dark text on near-black background — a dark-on-dark FAILURE.
