  - Axis labels could be more descriptive
  - Unit circle is barely visible at the current scale
  image_description: The plot shows a Nyquist diagram on a square canvas with 1:1
    aspect ratio. A solid blue curve (#306998) traces the positive-frequency response
    from approximately (10, -0.2) sweeping down and left through a large arc, passing
    near the critical point and approaching the origin. A dashed, semi-transparent
    blue curve mirrors the positive-frequency contour for negative frequencies in
    the upper half-plane. A small dotted gray unit circle is centered at the origin.
    The critical point (-1, 0) is marked with a bold red "x" and annotated with a
    red arrow. Five frequency labels (ω=0.1, 0.5, 1.0, 3.0, 10.0) are placed along
    the curve with small arrow connectors. Three direction arrows on the solid curve
    indicate increasing frequency. Axes are labeled "Real" (x) and "Imaginary" (y).
    Title reads "nyquist-basic · seaborn · pyplots.ai". Top and right spines are removed.
    A subtle grid is visible. Axis reference lines at x=0 and y=0 are drawn in light
    gray.
