  image_description: The plot shows a phase-folded exoplanet transit light curve on
    a clean white background. Blue dots (#306998) represent 400 photometric observations
    scattered around a baseline relative flux of ~1.0, with light blue (#8FAFC8) vertical
    error bars at alpha=0.4. A bold red (#E8442A) model line traces the fitted transit
    shape, showing a characteristic U-shaped dip centered at orbital phase 0.5, reaching
    down to approximately 0.990 (a ~1% transit depth). The title reads "Exoplanet
    Transit · lightcurve-transit · letsplot · pyplots.ai" in bold at the top. X-axis
    is labeled "Orbital Phase" (0 to 1), Y-axis is labeled "Relative Flux" (0.984
    to 1.01). The theme is minimal with only subtle horizontal grid lines. 16:9 landscape
    layout, well-proportioned.
