    paths
  - sys.path manipulation import hack adds unnecessary complexity
  image_description: The plot displays climate warming stripes spanning 1850-2024.
    Vertical colored bars fill the canvas from left to right, each representing one
    year's temperature anomaly. The left portion is dominated by medium-to-dark blues
    (negative anomalies, ~1850-1920), transitioning to lighter blues and near-white
    in the middle (~1920-1980), then shifting dramatically to oranges and deep reds
    on the right (~1980-2024). The title "heatmap-stripes-climate · pygal · pyplots.ai"
    appears centered at the top in dark gray sans-serif text. Year labels "1850" and
    "2024" appear at the bottom-left and bottom-right respectively. There are no axes,
    gridlines, or tick marks — a minimalist design faithful to Ed Hawkins' warming
    stripes concept. The image dimensions are 4800x1600 (3:1 aspect ratio).
