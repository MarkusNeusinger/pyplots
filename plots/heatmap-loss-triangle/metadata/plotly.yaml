    to 1.010) are displayed below the x-axis. A colorbar on the right shows "Cumulative
    Claims ($)". The background is a soft off-white (#fafafa) using the plotly_white
    template. The title "heatmap-loss-triangle · plotly · pyplots.ai" is centered
    at the top.
