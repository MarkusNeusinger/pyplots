  strengths:
  - Excellent dark theme design with custom hot colormap appropriate for eye diagram
    visualization
  - Clean signal simulation with realistic NRZ parameters (noise, jitter, sigmoid
    transitions)
  - Full spec compliance with all required features implemented correctly
  - Perfect code quality with KISS structure and reproducible seed
  - Good use of lets-plot specific features (layer_tooltips, guide_colorbar, HTML
    export)
  weaknesses:
  - Raster cells appear slightly granular in transition regions — increasing bin resolution
    could help
  - No eye height/width annotations — would elevate design excellence and data storytelling
  - Hot colormap not perceptually uniform — viridis or inferno variants could improve
    accessibility
  - Limited data storytelling — no visual emphasis guiding viewer to specific insights
  image_description: The plot displays an eye diagram on a dark (#1a1a1a) background.
    It uses a 2D density heatmap (geom_raster) to show overlaid NRZ signal traces.
    The x-axis is labeled "Time (UI)" ranging from 0 to 2, and the y-axis is labeled
    "Voltage (V)" with ticks at 0.0, 0.5, and 1.0. The title reads "eye-diagram-basic
    · letsplot · pyplots.ai" in bold light gray text. A vertical color bar on the
    right labeled "Trace Density" maps density values from ~0.2 (dark red) to 1.0
    (white), using a custom hot colormap that transitions through dark red, bright
    red, orange, yellow, and white. Two characteristic eye openings are clearly visible
    — dense horizontal bands cluster at the 0V and 1V signal levels, with transition
    regions connecting them at approximately 0.5 and 1.5 UI. The eye openings are
    wide and clean, indicating good simulated signal quality. The overall aesthetic
    is professional with a dark-themed design appropriate for engineering visualization.
