review:
  strengths:
  - Significance-based color coding with Python Blue palette creates immediate visual
    hierarchy between important and noise lags
  - Manual ACF/PACF computation via Durbin-Levinson recursion avoids external dependencies
    while being mathematically correct
  - FacetGrid with custom stem_plot mapping function is a well-executed seaborn-native
    approach for multi-panel layouts
  - Interpretive annotations tell a clear ARIMA identification story guiding viewer
    attention
  - Confidence band with subtle fill and dashed lines provides refined statistical
    context
  weaknesses:
  - Annotation font sizes (13pt, 11pt) slightly undersized for the large canvas target
  - Stem plot simulation via narrow barplot (width=0.15) is creative but not a native
    seaborn stem plot capability
  image_description: 'The plot displays two vertically stacked panels on a clean white
    background. The top panel shows the Autocorrelation Function (ACF) from lag 0
    to 35 with narrow stem-like bars and circular markers. Dark blue (#306998) stems
    mark statistically significant lags, while light blue (#A8C4D8) marks values within
    the 95% confidence interval. The ACF shows clear exponential decay from 1.0 at
    lag 0, with the first ~8 lags significant. An annotation "lag 1: 0.79" with an
    arrow highlights the first significant lag. Italic interpretive text reads "Gradual
    decay → MA component." Orange dashed horizontal lines mark the confidence bounds
    at ±1.96/√200, with a subtle orange-shaded fill between them. The bottom panel
    shows the Partial Autocorrelation Function (PACF) starting from lag 1, with a
    sharp spike at lag 1 (~0.79, annotated) and a negative spike at lag 2, then values
    mostly within the CI bounds. Interpretive text reads "Sharp cutoff after lag 1
    → AR(1) signature." A subtitle reads "Monthly Airline Passenger Residuals · ARMA(1,1)
    with Seasonal Component · N = 200". Y-axes labeled "Autocorrelation (ACF)" and
    "Partial Autocorrelation (PACF)", x-axis "Lag (months)". Legend in upper right
    shows Significant, Within CI, and 95% CI entries. Title: "acf-pacf · seaborn ·
    pyplots.ai". Spines removed, subtle y-axis grid.'
