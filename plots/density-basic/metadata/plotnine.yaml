    peak around 88. Two dashed vertical reference lines in muted grey-blue mark each
    mode. Text annotations label the peaks: "Main Group (μ ≈ 72)" in dark navy near
    the primary peak and "High Achievers (μ ≈ 88)" in warm brown near the secondary
    peak. A rug plot along the bottom x-axis shows individual observations as small
    brown/tan vertical marks (alpha=0.4). The background uses theme_minimal with only
    very subtle horizontal y-axis gridlines (alpha=0.2). No x-axis gridlines or minor
    gridlines are present. The layout is well-proportioned on a 16:9 canvas with balanced
    whitespace.'
