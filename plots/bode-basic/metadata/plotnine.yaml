review:
  strengths:
  - Excellent spec compliance — all required features (dual panels, margin annotations,
    reference lines, log axis, grid) present and correct
  - Clean, well-organized code with deterministic data from a realistic transfer function
  - Good use of plotnine grammar of graphics with facet_wrap for dual-panel layout
  - Effective color-coded annotations (orange for gain margin, purple for phase margin)
    with distinct marker shapes
  - Thoughtful theme customization with custom text color hierarchy and subtle grid
  weaknesses:
  - Annotation text (geom_text size=14) slightly small relative to axis text (16)
    — should be at least as large
  - Magnitude panel has excessive vertical range extending to -70 dB when interesting
    region is above -20 dB
  - Could use wider frequency range to show full passband and asymptotic rolloff
  - Not leveraging scale_y_continuous for custom axis formatting
  image_description: The plot displays a Bode plot with two vertically stacked panels
    on a light gray (#FAFAFA) background. The top panel is labeled "Magnitude (dB)"
    with a light blue/purple strip header and shows a blue (#306998) curve starting
    at ~+10 dB at 0.1 Hz, crossing 0 dB around 0.4 Hz, and declining to ~-70 dB at
    10 Hz. A thick orange (#D35400) vertical segment marks the gain margin between
    the magnitude at phase crossover (~-8 dB) and the 0 dB reference line, with an
    orange "GM = 8.1 dB" label. A purple circle marks the gain crossover point, and
    an orange square marks the phase crossover point on this panel. The bottom panel
    labeled "Phase (degrees)" shows the phase curve starting at ~-55° and declining
    to ~-260°. A thick purple (#7D3C98) vertical segment marks the phase margin between
    the phase at gain crossover (~-148°) and the -180° reference line, with a purple
    "PM = 32°" label. Dashed horizontal reference lines appear at 0 dB and -180°.
    Dotted vertical guide lines mark both crossover frequencies across both panels.
    The x-axis is logarithmic labeled "Frequency (Hz)" with ticks at 0.1, 1, and 10.
    Title reads "bode-basic · plotnine · pyplots.ai" in dark navy bold text.
