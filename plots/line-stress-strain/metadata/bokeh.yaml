  image_description: 'The plot displays an engineering stress-strain curve for mild
    steel on a light gray (#FAFAFA) background. A blue (#306998) line traces the material
    response from zero through a steep elastic region, a gradual strain-hardening
    curve peaking at ~400 MPa around strain 0.22, and a declining necking region ending
    at a fracture point near strain 0.35. Three region labels in gray italic text
    ("Elastic", "Strain Hardening", "Necking") are positioned within their respective
    zones. Critical points are marked with distinct shapes: a gold circle for Yield
    Point (250 MPa), a purple triangle for UTS (400 MPa), and a sky-blue square for
    Fracture. A dashed gold 0.2% offset line is visible near the elastic region. "E
    = 210 GPa" is annotated in blue. Subtle dotted horizontal reference lines appear
    at yield and UTS stress levels. The title reads "line-stress-strain · bokeh ·
    pyplots.ai" in the upper left. A styled legend box in the lower-center area lists
    all five elements. Axes are labeled "Engineering Strain (mm/mm)" and "Engineering
    Stress (MPa)" with gray-toned tick labels. Grid lines are very subtle (alpha 0.15),
    and the plot outline is removed.'
