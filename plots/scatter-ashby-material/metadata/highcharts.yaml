  image_description: 'The plot displays a log-log scatter chart of Density (kg/m³)
    on the x-axis vs. Young''s Modulus (GPa) on the y-axis — the classic Ashby material
    selection chart. Seven material families are shown as colored scatter points surrounded
    by dashed convex hull envelopes with semi-transparent fills: Metals & Alloys (steel
    blue, upper right), Ceramics & Glasses (muted red, upper center-right), Polymers
    (green, center-right), Elastomers (gold/yellow, lower right), Composites (purple,
    upper center), Foams (orange, lower left spanning a wide area), and Natural Materials
    (olive/brown, center). Each family region has a text label placed near its cluster.
    The title reads "Density vs. Young''s Modulus · scatter-ashby-material · highcharts
    · pyplots.ai" with a subtitle below. A vertical legend on the right lists all
    7 families with colored circle markers. Faint dashed guide lines for E/ρ performance
    indices (0.01, 1, 100) are barely visible. Both axes use logarithmic scales spanning
    ~0.0001–1000 GPa and ~10–20,000 kg/m³. The background is light gray (#f8f9fb)
    with a white plot area bordered by a thin gray line. Grid lines are subtle dashed
    lines at very low opacity.'
