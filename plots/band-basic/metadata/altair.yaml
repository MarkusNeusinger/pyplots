review:
  strengths:
  - Perfect visual quality with all font sizes explicitly set and no overlap issues
  - Correct title format and descriptive axis labels with appropriate units
  - Realistic scientific data context with widening confidence intervals demonstrating
    band utility
  - Clean, idiomatic Altair code with proper KISS structure
  - Good use of Y2 encoding for the band area, which is a distinctive Altair feature
  weaknesses:
  - Design stays at configured-default level with single Python Blue color for both
    band and line
  - No visual hierarchy or data storytelling beyond what the data inherently shows
  - Central line uses same color (#306998) as the band — a darker shade would create
    stronger visual separation
  - Does not leverage Altair interactive capabilities (tooltips, zoom/pan) in the
    HTML export
  image_description: The plot displays a band chart on a white background with a light
    blue semi-transparent filled region (confidence band) between upper and lower
    boundaries, and a darker blue central trend line running through the middle. The
    x-axis is labeled "Time (s)" ranging from 0.0 to 10.0 with tick marks at 0.4 intervals.
    The y-axis is labeled "Signal Amplitude (mV)" ranging from approximately -3.0
    to 10.0. The title "band-basic · altair · pyplots.ai" appears at the top in a
    large font. The central line follows a sinusoidal pattern with upward linear growth,
    creating two peaks (around x=1.8 and x=8.0) and a trough (around x=4.5). The confidence
    band widens progressively from left to right, starting narrow (~1 mV wide) at
    x=0 and expanding to ~4 mV wide at x=10, realistically depicting growing uncertainty
    over time. The grid is very subtle (low opacity) and view borders are removed,
    giving a clean appearance.
