review:
  strengths:
  - Uses the real qrcode library for proper scannable QR code generation as spec requires
  - Clean heatmap approach with color_axis binary mapping (black/white stops) is an
    elegant solution
  - CDN fallback pattern with multiple base URLs ensures reliable rendering
  - Perfect spec compliance — all required features present
  weaknesses:
  - Title and subtitle are small relative to the 3600px canvas — increase to 64px+
    title, 36px+ subtitle
  - Thin border line artifact visible at the bottom edge of the canvas
  - Design lacks visual sophistication — could add a rounded border frame, shadow,
    or branded color accent
  - Library mastery is generic — no Highcharts-specific features leveraged beyond
    basic heatmap
  image_description: 'The plot displays a QR code rendered as a Highcharts heatmap
    on a 3600×3600 white canvas. The title "qrcode-basic · highcharts · pyplots.ai"
    appears in bold at the top center, with a smaller subtitle "Encoded: https://pyplots.ai"
    below it. The QR code itself is rendered in high-contrast black-and-white squares,
    featuring three finder patterns (large concentric squares) in the top-left, top-right,
    and bottom-left corners. The data modules form the characteristic QR pattern in
    the center. A quiet zone (white border) surrounds the code. There is a thin horizontal
    line artifact at the very bottom edge of the canvas. The QR code fills approximately
    60% of the canvas width, centered with generous whitespace around it.'
