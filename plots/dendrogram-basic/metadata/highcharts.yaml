  improvements: []
  image_description: 'The plot displays a dendrogram of iris species clustering with
    15 samples (5 each of Setosa, Versicolor, Virginica) using Ward''s linkage method.
    The vertical axis shows "Distance (Ward)" from 0 to 11, and the horizontal axis
    shows "Sample" with individual sample names rotated at 45°. Three distinct clusters
    are color-coded: Setosa branches in warm orange, Versicolor/inner branches in
    teal/Python Blue, and Virginica branches in soft purple. Light background shading
    differentiates the three species groups (peach for Setosa, light cyan for Versicolor,
    lavender for Virginica). A dashed horizontal line marks the cluster threshold
    at d≈7.1 with a label. The top merge at ~d=10 connects Setosa cluster to the Versicolor+Virginica
    cluster, with an annotation noting the split distance. Species group labels appear
    centered at the bottom of each cluster. A subtitle reads "Ward linkage of 15 iris
    samples — Setosa separates clearly at distance ~10". The title follows the required
    format. Overall the layout is clean, professional, and well-proportioned on a
    white background.'
