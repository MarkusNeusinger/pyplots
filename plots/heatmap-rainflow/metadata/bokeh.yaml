  image_description: 'The plot displays a 2D heatmap of a rainflow counting matrix
    using the Inferno color palette (dark purple/black to orange to bright yellow).
    The x-axis is labeled "Cycle Mean Stress (MPa)" ranging from -100 to 300, the
    y-axis is labeled "Cycle Amplitude (MPa)" ranging from approximately 15 to 210.
    A vertical colorbar on the right is labeled "Cycle Count" with a logarithmic scale
    from approximately 1 to 5000. The title "heatmap-rainflow · bokeh · pyplots.ai"
    appears at the top left. The heatmap forms a dome/mountain shape with the brightest
    yellow area (highest counts around 5000) concentrated at low amplitudes (30-50
    MPa) and moderate mean stress (60-120 MPa), tapering through orange, pink, purple
    to near-black at the sparse edges. Zero-count bins appear as the light gray (#f5f5f5)
    background. Two annotations with dark semi-transparent backgrounds and white bold
    text are present: "↑ Dominant loading cluster (~5000 cycles)" near the bottom-center
    bright area, and "Rare severe events →" in the upper-left pointing toward the
    high-amplitude region.'
