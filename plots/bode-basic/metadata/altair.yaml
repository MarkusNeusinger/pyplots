  image_description: The plot displays a Bode diagram with two vertically stacked
    panels on a light blue-gray background (#FAFBFC). The top panel shows magnitude
    (dB) vs frequency (rad/s) with a blue (#306998) curve starting flat at ~20 dB,
    rolling off through 0 dB around ω ≈ 7 rad/s, and continuing down to approximately
    -65 dB at 1000 rad/s. A dashed gray reference line at 0 dB is visible. A purple
    (#7B2D8E) dashed vertical line marks the gain margin (GM = 16.5 dB) between the
    phase crossover magnitude and 0 dB, with a monospace label. A blue circle marker
    sits at the gain crossover point, and a purple diamond at the phase crossover
    point on the magnitude curve. The bottom panel shows phase (degrees) vs frequency
    with an orange (#E8833A) curve descending from 0° to approximately -270°. A dashed
    gray reference at -180° is shown. A teal (#1B7FA3) dashed vertical line marks
    the phase margin (PM = 50.9°) with a monospace label. An orange circle marks the
    gain crossover phase, and a teal diamond marks the phase crossover at -180°. The
    shared x-axis uses logarithmic scale from 0.01 to 1,000. Title reads "bode-basic
    · altair · pyplots.ai" with subtitle. There is a noticeable gap between the two
    panels.
