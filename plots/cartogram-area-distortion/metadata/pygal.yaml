  - Not a true contiguous cartogram - treemap approximation loses geographic context
    and adjacency
  - Blue and green color adjacency could be slightly challenging for deuteranopia
  image_description: 'The plot displays a treemap visualization where rectangle areas
    are proportional to country population. Countries are grouped by continent using
    five distinct colors: deep ocean blue (Asia), rich golden amber (Africa), forest
    green (Europe), bold vermilion (Americas), and deep violet (Oceania). Each rectangle
    shows the country name, population in millions, and a distortion ratio (e.g.,
    "India 1,441M x5.4"). India and China dominate the left half as the largest blue
    rectangles. The title reads "World Population Cartogram - Area Proportional to
    Population (millions) - cartogram-area-distortion - pygal - pyplots.ai" spanning
    two lines at the top. A legend at the bottom shows all five continent color assignments
    in a single row. Smaller countries at the right edge (Australia, Colombia, France)
    have text that is partially truncated. The background is white with a very subtle
    off-white plot area, and rectangles have rounded corners with spacing between
    them.'
