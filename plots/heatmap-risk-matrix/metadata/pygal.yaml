  image_description: 'The plot displays a 5×5 risk assessment matrix with "LIKELIHOOD"
    on the y-axis (1. Rare through 5. Almost Certain) and "IMPACT" on the x-axis (1.
    Negligible through 5. Catastrophic). Each cell contains a large bold risk score
    (likelihood × impact) and a zone label (Low, Medium, High, Critical). Cells are
    color-coded with a green-yellow-orange-red gradient: green for Low (1–4), yellow
    for Medium (5–9), orange for High (10–16), and red for Critical (20–25). Cells
    have rounded corners with white borders. 14 risk items are plotted as small colored
    circle markers with bold text labels — blue circles for Technical risks (Server
    Outage, Data Breach, Tech Debt, Cyber Attack), purple for Financial (Budget Overrun,
    Currency Risk, Market Shift), orange for Operational (Vendor Delay, Staff Turnover,
    Scope Creep, Key Person), and teal for External (Reg. Change, Supply Chain, Pandemic).
    A legend on the right side shows Risk Zones with colored squares and Risk Categories
    with colored circles. The title reads "heatmap-risk-matrix · pygal · pyplots.ai"
    at the top center.'
