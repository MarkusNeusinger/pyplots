  image_description: 'The plot displays a water pressure-temperature phase diagram
    on a 4800x2700 canvas. The y-axis (Pressure in Pa) uses a logarithmic scale spanning
    ~50 Pa to 5e8 Pa, and the x-axis (Temperature in K) ranges from 180 to 800. Four
    phase regions are filled with distinct pastel colors: light blue for SOLID (left),
    light green for LIQUID (upper center), light peach/orange for GAS (bottom right),
    and light purple for SUPERCRITICAL FLUID (upper right beyond the critical point).
    Three dark blue boundary curves separate the regions: a sublimation curve (bottom
    left, labeled "Sublimation" at an angle), a vaporization curve (center, labeled
    "Vaporization" at an angle), and a nearly vertical melting curve (left, labeled
    "Melting" at a steep angle). The triple point is marked with a red circle with
    a glow ring at 273.16 K, with an arrow annotation below reading "Triple Point
    (273.16 K, 611.73 Pa)". The critical point is marked with a dark blue diamond
    with glow at 647.1 K, with an arrow annotation above reading "Critical Point (647.1
    K, 22.06 MPa)". Dotted reference lines extend from the critical point horizontally
    and vertically. A dashed line extends upward from the critical point. The title
    reads "phase-diagram-pt · bokeh · pyplots.ai". The background is a subtle off-white
    (#FAFBFC) with very faint dashed grid lines. Bold phase region labels (SOLID,
    LIQUID, GAS, SUPERCRITICAL FLUID) are placed within their respective regions.'
