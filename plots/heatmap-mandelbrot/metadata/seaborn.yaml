review:
  strengths:
  - Dramatic cohesive dark theme with custom facecolors and coordinated text colors
    creates a visually striking fractal visualization
  - Seaborn rocket palette produces dramatic dark-to-cream glow effect that naturally
    highlights the fractal boundary
  - robust=True intelligently focuses color mapping on the boundary region for maximum
    visual detail
  - Smooth coloring algorithm with high bailout (256) eliminates banding artifacts
  - 'Multiple seaborn-distinctive features used idiomatically: rocket palette, robust
    scaling, mask, theme/context management'
  - All specification requirements met with values exceeding minimums (1000x714 grid,
    200 iterations)
  - Clean deterministic vectorized code with explicit font sizing throughout
  weaknesses:
  - Library Mastery could be pushed further — core fractal computation is numpy-heavy
    and seaborn contribution is primarily rendering/styling
  - Colorbar vertical label orientation is standard but could be more readable with
    horizontal orientation
  - Y-axis tick labels use %.2f while x-axis uses %.1f — minor formatting inconsistency
  image_description: The plot displays a Mandelbrot set fractal visualization rendered
    as a seaborn heatmap on a fully dark background. The figure background is a deep
    navy-black (#060610) and the axes background is pure black (#000000). The fractal
    boundary glows dramatically using seaborn's "rocket" palette — transitioning from
    deep dark reds/maroons at low escape iterations, through vivid magenta/pink at
    mid iterations, to bright cream/white at the highest escape iteration values near
    the boundary. The main cardioid body (centered around -0.25+0i) and the prominent
    period-2 bulb (centered around -1+0i) are solid black, representing interior points
    that never escape. Smaller satellite bulbs are visible along the fractal boundary.
    The boundary exhibits fine self-similar filaments radiating outward. The colorbar
    on the right, labeled "Escape Iterations," shows a range of approximately 5 to
    27 (using robust percentile-based scaling). The x-axis labeled "Real Axis" spans
    -2.5 to 1.0, and the y-axis labeled "Imaginary Axis" spans 1.25 to -1.25. The
    title reads "heatmap-mandelbrot · seaborn · pyplots.ai" in light gray text. All
    text is clearly readable against the dark background with explicit font sizing.
    The overall effect is a dramatic, glowing fractal visualization with strong visual
    hierarchy.
