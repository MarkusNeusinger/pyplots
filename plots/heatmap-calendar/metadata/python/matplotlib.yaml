review:
  strengths:
  - 'Full spec compliance: weekday labels, top month labels, sequential colormap,
    and colorbar all present and correct'
  - Theme-adaptive implementation with proper PAGE_BG, INK, INK_SOFT tokens applied
    to all chrome elements in both renders
  - Vectorized data generation with realistic patterns (vacation gap in August, deadline
    spike in late March) that tell a clear story
  - All spines removed and tick marks hidden (length=0), producing a clean minimal-chrome
    design above library defaults
  - Correct output filename pattern plot-{THEME}.png, seed(42) for reproducibility,
    flat KISS code structure
  - LinearSegmentedColormap.from_list and np.ma.masked_invalid show competent matplotlib-specific
    usage
  weaknesses:
  - Colorbar tick labels set at 14pt, below the ≥16pt guideline for tick labels —
    use labelsize=16
  - Custom theme-adaptive colormap changes data colors between light and dark renders;
    style guide recommends using a single perceptually-uniform colormap (viridis,
    cividis, or Greens) so data colors stay identical across themes
  - 'Mid-range activity cells in the dark render blend somewhat with the near-black
    background because the dark custom colormap uses very dark greens (#1a4731, #2d7040)
    — a lighter minimum for dark theme or using a standard cmap would improve visibility'
  - 'Design Excellence could be raised: consider adding a subtle annotation marking
    the August vacation gap and the March deadline spike to create an explicit visual
    hierarchy and narrative focal point'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface, NOT pure white
      Chrome: Title "heatmap-calendar · matplotlib · anyplot.ai" in dark ink at 24pt, fully readable. Month labels (Jan–Dec) displayed at top of the grid in dark text at 16pt, all readable without overlap. Weekday labels (Mon–Sun) on the left y-axis at 16pt, readable. Colorbar below with "Daily Commits" label at 16pt and tick labels at 14pt (slightly small). All text is dark on light — no light-on-light issues.
      Data: Green gradient from pale blue-green (#E0EAE3 for zero) to dark green (#196127 for max). August shows a clear inactive gap (pale cells), late March/April shows a high-activity cluster (dark green). Color gradient visually distinguishes activity levels. First series is a custom green scale, not Okabe-Ito #009E73 (heatmap colormap context).
      Legibility verdict: PASS — all text readable, data colors distinguishable

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark theme surface, NOT pure black
      Chrome: Title in light off-white text, clearly readable against dark background. Month labels and weekday labels rendered in light color (INK_SOFT = #B8B7B0), all readable. Colorbar label and ticks in light text, readable. No dark-on-dark failures for text elements.
      Data: Colormap adapted for dark theme — zero/empty cells render as very dark green-black (#2A2A25) blending with background, mid-range cells as medium dark green (#1a4731, #2d7040), high-activity cells as bright green (#52c760). The high-activity cells (vacation gap clearly visible as absence, deadline spike visible as bright cells) are distinguishable. However, the mid-range activity cells (values 3–8) use very dark greens that are harder to distinguish from the background compared to the light render.
      Legibility verdict: PASS with minor concern — text is fully readable, but mid-range data cell contrast against dark background is lower than in the light render due to the theme-adaptive colormap design choice
