  strengths:
  - Scientifically accurate water phase diagram using Clausius-Clapeyron equations
    with real physical constants
  - Excellent use of plotnine layer composition for phase region fills with separate
    data sources and inherit_aes=False
  - Colorblind-safe palette with good visual hierarchy through color-coded regions
    and annotated special points
  - Custom pressure axis formatter providing readable units across many orders of
    magnitude
  - Water anomalous negative-slope solid-liquid boundary correctly depicted
  weaknesses:
  - Phase region fills very subtle at alpha=0.10 — slightly higher alpha could improve
    visibility
  - SUPERCRITICAL FLUID label cramped in small upper-right region
  - Design polish good but not quite Nature/Science publication level
  image_description: 'The plot displays a pressure-temperature phase diagram for water
    on a 16:9 canvas. The y-axis shows "Pressure" on a logarithmic scale with custom-formatted
    tick labels (kPa, MPa, GPa), ranging from ~10 Pa to ~1 GPa. The x-axis shows "Temperature
    (K)" from ~200 to ~750. Three phase boundary curves are drawn in distinct colors:
    Solid-Gas (blue), Liquid-Gas (orange), and Solid-Liquid (purple). The phase regions
    are filled with very subtle semi-transparent colors matching their boundaries
    — blue for Solid (upper-left), purple for Liquid (center-top), orange for Gas
    (lower area), and green for Supercritical Fluid (upper-right beyond critical point).
    The triple point (273.16 K, 612 Pa) and critical point (647.1 K, 22.1 MPa) are
    marked with prominent yellow-filled circular markers with dark strokes and annotated
    with text labels showing coordinates. A dashed vertical gray line marks the critical
    temperature. Bold semi-transparent phase region labels (SOLID, LIQUID, GAS, SUPERCRITICAL
    FLUID) are placed within their respective regions. The title reads "phase-diagram-pt
    · plotnine · pyplots.ai" in bold. A legend on the right shows "Phase Boundary"
    with three entries.'
