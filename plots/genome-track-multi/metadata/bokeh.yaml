  strengths:
  - Excellent spec compliance with all 4 required tracks and all specified features
    (exons, introns, UTRs, strand arrows, coverage area, lollipop variants, regulatory
    rectangles)
  - Realistic EGFR gene data with biologically meaningful coverage-exon correlation
  - Clean code structure with well-organized track sections
  - Good use of Bokeh shared x_range for coordinated tracks
  weaknesses:
  - Yellow enhancer rectangles have low contrast against the light background
  - Track labels positioned via screen units could shift if layout changes
  - Genes track label is slightly cramped near the title
  - Could leverage more Bokeh-specific features like HoverTool for HTML export
  image_description: 'The plot displays a multi-track genome browser view of the EGFR
    gene locus on chromosome 7 (positions ~55,086,000 to ~55,212,000). Four vertically
    stacked tracks share a common x-axis showing genomic position with comma-formatted
    coordinates. The top Gene track shows blue rectangular exons connected by a thin
    blue intron line with triangle arrows indicating the (+) strand direction, "EGFR
    (+)" labeled above, and lighter blue UTR regions at the ends. The Coverage track
    displays a blue filled area plot of read depth (0-80) with peaks correlating to
    exon positions. The Variant track shows lollipop markers with orange circles for
    SNPs and purple diamonds for Indels, height encoding quality score (0-100), with
    a legend in the top-right. The bottom Regulatory track displays colored rectangles:
    green for Promoters, yellow for Enhancers, and pink for CTCF Binding sites, with
    a horizontal legend. Track labels ("Genes", "Coverage", "Variants", "Regulatory")
    appear in bold gray on each panel''s upper-left. The background is a subtle off-white
    (#FAFBFC) with white borders between tracks.'
