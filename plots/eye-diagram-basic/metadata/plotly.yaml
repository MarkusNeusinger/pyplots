    -0.2 to 1.1. A cyan-bordered annotation "Eye Height: 0.99 V" sits near the center
    of the first eye opening with a dashed cyan vertical bracket line. A "Trace Density"
    colorbar on the right shows the scale from 0 to ~18. The eye openings are well-defined
    with visible transition regions forming the characteristic X-crossing pattern.'
