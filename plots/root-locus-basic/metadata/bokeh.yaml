  - Some wasted canvas space on the right side of the plot
  - Scatter point size (4) is small - slightly larger would improve visibility
  image_description: 'The plot displays a root locus diagram for the transfer function
    G(s) = 1/(s(s+1)(s+3)) on a light gray (#FAFAFA) background. The title "root-locus-basic
    · bokeh · pyplots.ai" is displayed prominently at the top left. The x-axis is
    labeled "Real Axis (σ)" and the y-axis "Imaginary Axis (jω)". Three open-loop
    poles are marked with dark × symbols at s = 0, −1, and −3 on the real axis. Two
    blue semi-transparent line segments mark the real-axis portions of the root locus:
    from −1 to 0 and from −5.5 to −3. Orange scatter points trace the complex conjugate
    branches curving away from the real axis into the upper and lower half-planes.
    Red diamond markers with white borders indicate the imaginary axis crossings (stability
    boundary) at approximately ±j1.73. A dashed red vertical line marks the imaginary
    axis as the stability boundary. Triangle direction arrows on each branch indicate
    increasing gain. Light gray radial lines from the origin show constant damping
    ratio contours (ζ = 0.2, 0.4, 0.6, 0.8) and semicircular arcs show natural frequency
    contours (ωn = 1, 2, 3, 4). A legend in the upper right identifies: Real-axis
    branch, Complex branches, Open-loop poles, and Stability crossing (K=12). The
    plot uses equal aspect ratio with axes centered around the origin.'
