  image_description: The plot displays a pediatric growth chart for boys' weight-for-age
    from 0 to 36 months. Seven percentile curves (P3, P10, P25, P50, P75, P90, P97)
    are rendered as graduated blue-toned bands — darker steel-blue at the extremes
    (P3-P10, P90-P97), medium blue for the middle bands (P10-P25, P75-P90), and light
    blue for the inner band (P25-P75). The 50th percentile is emphasized as a thicker
    dark blue line. A red patient trajectory with white-filled circular markers (red
    stroke) is overlaid, showing 12 data points from birth to 36 months. The patient
    starts near the 50th percentile, dips below it during months 9-24 (growth faltering),
    then recovers back to approximately the P50 line by 36 months. Percentile labels
    (P3 through P97) appear on the right margin in gray text. The title reads "Boys
    Weight-for-Age · line-growth-percentile · letsplot · pyplots.ai" in bold. X-axis
    shows "Age (months)" with ticks at 0, 6, 12, 18, 24, 30, 36. Y-axis shows "Weight
    (kg)" from 1.0 to 17.0. Subtle horizontal gridlines are present; vertical gridlines
    are removed. The layout is clean with generous margins.
