review:
  strengths:
  - Excellent spec compliance with all bullet chart features implemented correctly
    (actual bars, target markers, qualitative bands)
  - Strong data storytelling through color-coded above/below target status — viewer
    immediately sees performance gaps
  - Professional grayscale band design following Stephen Few's bullet chart conventions
  - Realistic KPI dashboard context with 4 varied metrics showing both above and below
    target scenarios
  - Good use of letsplot-specific layer_tooltips() for interactive hover information
    in HTML export
  - Clean, well-organized code with deterministic data
  weaknesses:
  - Annotation text (size=12) and band explanation text (size=10) are slightly small
    compared to other text elements
  - Some vertical whitespace between bullet groups could be utilized more efficiently
  - Library mastery limited by letsplot's lack of native bullet chart support — implementation
    relies on manual geom_rect construction
  image_description: The plot displays four horizontal bullet charts stacked vertically
    for a Q4 2024 KPI dashboard. Metrics shown are Revenue ($K), Profit Margin (%),
    Satisfaction, and New Customers. Each metric has three grayscale background bands
    (dark gray for Poor, medium gray for Satisfactory, light gray for Good) following
    Stephen Few's convention. Actual values are shown as narrower colored bars — teal-green
    (#2D6A4F) for "Above Target" (Profit Margin, New Customers) and warm copper (#C0785A)
    for "Below Target" (Revenue, Satisfaction). Black vertical lines mark target values.
    Value annotations ($275K, 88%, 3.8, 42) appear beside each bar in matching colors.
    The title reads "bullet-basic · letsplot · pyplots.ai" with subtitle "Q4 2024
    Dashboard — Actual vs. Target Performance". A band explanation note sits below
    the last metric. The x-axis shows "Performance (%)" from 0-105. A bottom legend
    identifies the green and copper color coding.
