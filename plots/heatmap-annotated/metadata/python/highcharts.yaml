    used
  - Correctly identifies need for the heatmap.js Highcharts module
  - Correct output file naming (plot-{THEME}.png, plot-{THEME}.html)
  - np.random.seed(42) ensures reproducibility
  weaknesses:
  - 'CRITICAL: Uses requests.get() to download Highcharts JS which gets blocked by
    Cloudflare — use urllib.request.urlopen() as shown in the library guide'
  - 'CRITICAL: colorAxis stops use PAGE_BG as the diverging midpoint — in dark mode
    zero-correlation cells become near-black and indistinguishable from background;
    use a fixed neutral midpoint like #F7F7F7'
  - Data label text color fixed to INK for all cells regardless of cell background
    luminance causing unreadable text on extreme-value cells — remove explicit color
    from dataLabels.style and let Highcharts handle contrast automatically
  - Does not use the highcharts_core Python package (Chart/Series objects); uses raw
    JSON dict instead
