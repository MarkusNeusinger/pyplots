review:
  strengths:
  - Dark theme (#0D1117) is thematically perfect for an astrophysics diagram — stars
    float in space-like darkness
  - Custom spectral color palette follows real astrophysical convention with improved
    O/B differentiation using purple (#6644CC) vs blue (#6699FF)
  - Sun reference point prominently marked with gold color and bold label — creates
    clear human-scale anchor
  - Spectral class labels (O, B, A, F, G, K, M) along the top act as a secondary x-axis,
    adding educational value
  - Region labels guide viewer through four stellar populations with well-chosen positions
  - Vectorized spectral type assignment using np.select is clean and Pythonic
  - layer_tooltips() leverages letsplot-distinctive interactive hover feature with
    formatted multi-line content
  weaknesses:
  - Spectral class letters A, F, G, K, M at the top are bunched together due to narrow
    temperature ranges on the reversed scale
  - Redundant color='spectral_type' in base ggplot aes is overridden by fixed color
    in geom_point and hidden via guides(color='none')
  image_description: 'The plot displays a Hertzsprung-Russell diagram on a dark background
    (#0D1117). The x-axis shows "Surface Temperature (K)" reversed from ~40,000K on
    the left to ~3,000K on the right with formatted tick labels. The y-axis shows
    "Luminosity (L☉)" on a logarithmic scale from ~0.0001 to 10^6. Points are rendered
    as filled circles with dark edge strokes (shape 21), colored by spectral type:
    purple/violet for O types in the upper-left, blue for B types along the hot main
    sequence, pale blue-white for A types, cream/pale yellow for F types, gold-yellow
    for G types near the Sun, orange for K types, and red for M types in the lower-right.
    The main sequence runs as a clear diagonal band from upper-left (hot, luminous)
    to lower-right (cool, dim). Red Giants cluster in the upper-right with orange/red
    colors, Supergiants scatter across the top at high luminosities, and White Dwarfs
    appear at the bottom-center (hot but dim). The Sun is marked with a prominent
    large gold dot at ~5,778K/1 L☉, with a bold gold "☉ Sun" label offset above. Four
    region labels in muted blue-gray bold-italic text identify "Supergiants", "Red
    Giants", "Main Sequence", and "White Dwarfs". Along the top of the plot, spectral
    class letters O, B, A, F, G, K, M are displayed in light blue-gray bold text at
    their corresponding temperature positions, simulating a secondary x-axis. A legend
    box on the right with dark background lists all seven spectral types with matching
    fill colors. The title "scatter-hr-diagram · letsplot · pyplots.ai" appears in
    bold light text at the top. Very subtle dark grid lines (#171D28) provide reference
    without distraction.'
