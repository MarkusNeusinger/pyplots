  image_description: The plot displays a 2D heatmap of rainflow counting results using
    the Plasma colormap. The x-axis shows "Mean Stress (MPa)" ranging from approximately
    -80 to 130, and the y-axis shows "Stress Amplitude (MPa)" from 0 to about 210.
    Color intensity follows a logarithmic scale from dark blue/indigo (low counts
    ~3-10) through magenta/pink to bright yellow (high counts ~1000+). The highest
    cycle counts (yellow hotspot) concentrate at low amplitudes (~10-30 MPa) near
    mean stress values of -10 to 20 MPa, with counts decaying exponentially as amplitude
    increases — a physically realistic fatigue loading pattern. A colorbar on the
    right labeled "Cycle Count" shows the log-scaled mapping. The title reads "heatmap-rainflow
    · letsplot · pyplots.ai" in bold dark text. Tiles have small gaps between them,
    and the white panel background shows through where bins have zero counts. The
    matrix is densely populated with most of the 20x20 grid containing non-zero values.
