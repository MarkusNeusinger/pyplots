review:
  strengths:
  - Custom colormap with smooth risk-level gradient creates intuitive visual encoding
  - FancyBboxPatch with rounded corners gives polished modern appearance
  - Marker size scaling by risk score adds meaningful visual hierarchy
  - Dual legends (Category + Risk Level) well-positioned and informative
  - Path effects on text ensure readability across all cell colors
  weaknesses:
  - Risk item labels at fontsize=12 slightly small for target resolution
  - Minor label crowding in Moderate/Major columns where multiple risks cluster
  - Layout slightly asymmetric due to right-side legends
  image_description: 'The plot displays a 5x5 risk assessment matrix with Likelihood
    (Rare to Almost Certain) on the Y-axis and Impact (Negligible to Catastrophic)
    on the X-axis. Cells use rounded rectangles with a smooth gradient from light
    yellow (low risk, score 1) through gold and amber to deep orange and dark crimson
    (critical risk, score 25). Each cell shows its risk score (likelihood x impact)
    in bold text with appropriate contrast (dark text on light cells, white text on
    dark cells). Twelve risk items are plotted as colored circular markers: dark teal
    for Technical (Data Breach, Server Outage, Cyber Attack, Power Failure), purple
    for Financial (Budget Overrun, Regulatory Change, Vendor Failure, Market Shift),
    and dark green for Operational (Supply Chain Disruption, Key Staff Turnover, Scope
    Creep, Deadline Slip). Marker sizes scale with risk score for visual hierarchy.
    Two legends on the right show Category colors and Risk Level zones (Low 1-4, Medium
    5-9, High 10-16, Critical 20-25). White borders separate cells cleanly, all spines
    are removed, and tick marks are hidden for a polished appearance.'
