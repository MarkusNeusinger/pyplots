review:
  strengths:
  - Excellent use of real genomic data (EGFR locus on chr7) with biologically plausible
    coordinates and values
  - 'Strong Altair idioms: vconcat, layer composition, independent scale resolution'
  - Coverage peaks correlating with exon positions tells a compelling biological story
  - Clean, well-organized code with clear track separation
  - Consistent blue-centered color palette with purposeful accent colors
  weaknesses:
  - Track title font size (18pt) slightly below the recommended 20pt label guideline
  - Regulatory bars appear thin in their 60px track, could benefit from more vertical
    space
  - Purple/green regulatory colors could be more colorblind-friendly
  - Strand direction indicators use text arrows rather than proper chevrons or directional
    shapes
  image_description: The plot displays a multi-track genome browser view of a ~50kb
    region on chromosome 7 (55,140,000–55,190,000). Four vertically stacked tracks
    share a common x-axis showing genomic position. The top "Genes" track shows two
    genes (EGFR and VOPP1) with dark blue rectangular exons connected by thin intron
    lines, with ">>>" and "<<<" text indicating strand direction. Gene names appear
    in bold above each gene. The "Coverage" track below shows a filled area plot in
    light blue with a darker blue outline, depicting read depth ranging from 0 to
    ~100, with notable peaks over exonic regions. The "Variants" track displays circles
    colored orange (SNP) and light blue (Indel), positioned by genomic location on
    x and quality score (0–100) on y. The bottom "Regulatory" track shows colored
    rectangles — purple for Promoters and green for Enhancers — placed along the genomic
    coordinate. All track titles appear in gray at the top-left of each panel. The
    main title "genome-track-multi · altair · pyplots.ai" is centered at the top.
    Legends for variant type and regulatory element type appear on the right side.
    The overall color scheme is cohesive, centered on blue tones with orange and purple/green
    accents.
