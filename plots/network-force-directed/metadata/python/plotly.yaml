review:
  strengths:
  - Fruchterman-Reingold force-directed algorithm implemented from scratch with numpy
    only — no networkx dependency
  - Degree-based node sizing creates meaningful visual hierarchy with hub nodes immediately
    distinguishable
  - Hub annotations (one per community) cleanly label key nodes without cluttering
    the graph
  - 'Full theme adaptation: all chrome tokens correctly threaded through edges, nodes,
    annotations, and legend'
  - None-separator edge trace is the idiomatic plotly pattern for network graphs,
    correctly applied
  - Interactive hover showing node ID and connection count adds genuine value in the
    HTML output
  weaknesses:
  - 'Canvas utilization: scaleanchor constraint causes empty corners; consider a square
    canvas format (3600x3600) which better suits undirected graphs'
  - Hub annotation font size (16px) is at the minimum for 4800x2700 resolution — increase
    to 18-20px
  - Design could be more visually striking at DE-01 level — functional and clean but
    not yet at publication-quality polish
