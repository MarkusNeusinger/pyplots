    defect types account for 75% of all quality issues — focus here first". The left
    y-axis is labeled "Defect Count", the x-axis "Defect Type", and the right y-axis
    "Cumulative %". A legend at the bottom shows "Defect Count" and "Cumulative %".
    The bars have subtle shadows and rounded corners. Grid lines are dotted and subtle.
