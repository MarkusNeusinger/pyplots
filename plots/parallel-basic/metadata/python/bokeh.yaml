review:
  strengths:
  - Font sizes explicitly set at all levels (title 28pt, labels 22pt, ticks 18pt,
    legend 18/20pt) ensuring legibility at 4800x2700 px
  - Excellent iris-like data with realistic botanical measurements and clear species
    separation across petal dimensions — ideal for demonstrating parallel coordinates
    utility
  - Custom x-tick labels include original scale ranges in cm, providing reader context
    without cluttering the y-axis
  - Clean KISS code structure with reproducibility seed; normalization loop is clean
    and correct
  weaknesses:
  - 'Wrong palette: uses #306998 (Python Blue, explicitly non-compliant per VQ-07),
    #FFD43B, #4CAF50 — must use Okabe-Ito (setosa #009E73, versicolor #D55E00, virginica
    #0072B2)'
  - 'No theme handling: code has no os.getenv(''ANYPLOT_THEME''), no adaptive background/chrome
    colors, saves as bare plot.png instead of plot-{THEME}.png'
  - 'Wrong title domain: pyplots.ai should be anyplot.ai'
  - 'Grid too prominent: alpha=0.3 with dashes adds visual noise; should be <=0.10
    with no dashes'
  - 'No HoverTool: Bokeh''s primary strength is interactivity — missing hover on HTML
    output loses the most distinctive Bokeh feature'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, approximately #FAF8F1 — not pure white, warm tint visible
      Chrome: Title "parallel-basic · bokeh · pyplots.ai" readable in dark text; y-axis label "Normalized Value" readable; x-tick labels with dimension names and cm ranges visible; legend top-right with "Species" title and species names readable
      Data: Three species in Python Blue (#306998) for Setosa, amber-yellow (#FFD43B) for Versicolor, medium green (#4CAF50) for Virginica — NOT Okabe-Ito palette; first series is NOT #009E73; 150 semi-transparent lines (alpha=0.5) clearly show species clustering especially in petal dimensions
      Legibility verdict: PASS (all text readable against light background, no light-on-light failures)

    Dark render (plot-dark.png):
      Background: Near-black dark background, approximately #1A1A17 — warm near-black (applied by pipeline externally; code has no ANYPLOT_THEME handling)
      Chrome: Title readable in light-colored text; axis labels visible; tick labels legible; legend text appears readable against dark background — no dark-on-dark failures detected
      Data: Colors identical to light render (same Python Blue, amber-yellow, medium green) — correct that only chrome flips; species separation patterns identical
      Legibility verdict: PASS (text readable in dark mode — readability supplied by external pipeline since code has no ANYPLOT_THEME handling or explicit chrome color tokens)
