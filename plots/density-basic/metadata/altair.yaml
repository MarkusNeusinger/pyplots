    large canvas
  image_description: 'The plot displays a kernel density estimation (KDE) curve of
    test scores rendered as a filled area in muted blue (#306998) with a darker blue
    outline (#1e4d6e, strokeWidth 2.5). The distribution is clearly bimodal with two
    peaks: a taller peak around score 38 (reaching density ~0.030) labeled "Foundational
    Course" in bold dark blue text above it, and a shorter peak around score 72 (reaching
    density ~0.019) labeled "Advanced Course." A rug plot of thin blue tick marks
    sits along the baseline (y=0) showing individual data point concentrations, visibly
    denser around the two peaks. The x-axis is labeled "Test Score (points)" spanning
    roughly 10–100, the y-axis "Probability Density" spanning 0.000–0.034 with 3-decimal
    formatting. The title reads "density-basic · altair · pyplots.ai" at 28pt with
    a gray subtitle "Kernel density estimation of test scores across two course levels."
    Grid lines are extremely subtle (dashed, 0.15 opacity), the view frame border
    is removed, and domain lines are soft gray.'
