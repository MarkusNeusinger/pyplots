review:
  strengths:
  - Excellent spec compliance — all 4 tracks implemented with every required feature
    (exons/introns/strand arrows, coverage area, lollipop variants, regulatory rectangles)
  - Biologically realistic data using the real HOXA gene cluster with plausible coverage
    patterns peaking over exons
  - Clean, well-organized code with clear data preparation for each track
  - Good color accessibility with distinct, non-confusing colors for each element
    type
  weaknesses:
  - Design sophistication could be elevated — track spacing feels slightly cramped
    and could benefit from more intentional whitespace between tracks
  - Variant lollipop markers are somewhat small and could benefit from larger heads
    or thicker stems
  - No use of lets-plot distinctive interactive features (tooltips, hover) that would
    differentiate from plotnine
  image_description: The plot displays a multi-track genome browser view of the HOXA
    gene cluster on chr7:27,200-27,280 kb. Four horizontal tracks are stacked vertically
    with a shared genomic x-axis in kilobases. The Genes track (top) shows five genes
    (HOXA1-HOXA5) as blue rectangles for exons connected by thin horizontal lines
    for introns, with italic gene name labels above and triangle arrows below indicating
    strand direction (right-pointing for +, left-pointing for -). The Coverage track
    shows a light blue filled area representing RNA-seq read depth, with clear peaks
    over exonic regions. The Variants track displays lollipop markers in orange tones
    (SNP and Indel distinguished by color) at various positions with height encoding
    quality scores. The Regulatory track (bottom) shows green rectangles for Promoters
    and purple rectangles for Enhancers. Each track has a bold label on the left side
    and subtle gray background shading separating tracks. Legends at the bottom identify
    Variant Type (SNP/Indel) and Regulatory element types. The title follows the correct
    format.
