review:
  strengths:
  - Perfect spec compliance - all required features implemented (two curves, color
    gradient, start/end markers, equal aspect ratio)
  - Clean, well-structured code with deterministic data and proper KISS pattern
  - Good use of coord_fixed() to prevent geometric distortion
  - Descriptive axis labels with parametric equations
  weaknesses:
  - 'Design lacks polish: blue-yellow gradient is functional but not aesthetically
    refined; green/red markers are not colorblind-safe'
  - No visual hierarchy or storytelling between the two panels
  - Library mastery could be improved by leveraging more letsplot-specific features
  - Axis title font size at 18pt is slightly below recommended 20pt
  image_description: The plot displays two side-by-side parametric curves with the
    overall title "line-parametric · letsplot · pyplots.ai" at the top-left. The left
    panel shows a "Lissajous Figure" with x(t)=sin(3t) and y(t)=sin(2t), rendered
    as a self-intersecting looped curve. The right panel shows an "Archimedean Spiral"
    with x(t)=t·cos(t) and y(t)=t·sin(t), expanding outward from the origin. Both
    curves use a blue-to-yellow color gradient mapped to the parameter t, with a green
    dot marking the start point and a red dot marking the end point. The background
    is minimal with light gray gridlines. Each panel has its own color legend for
    t. Equal aspect ratios are maintained via coord_fixed(). Axis labels describe
    the parametric equations.
