  image_description: 'The plot displays two sigmoidal dose-response curves on a clean
    white background. Compound A is rendered in deep blue (#306998) and Compound B
    in warm orange (#E8793A). The x-axis shows "Concentration (M)" on a logarithmic
    scale with SI prefix notation (from ~5e-10 to 100 micromolar). The y-axis shows
    "Response (%)" ranging from 0 to ~110. Both curves exhibit the classic 4PL sigmoid
    shape — flat at low concentrations, rising steeply through the mid-range, and
    plateauing at high concentrations. Large circular data points with white edge
    borders are overlaid on the fitted curves, each with visible SEM error bars. Dashed
    reference lines (vertical and horizontal) mark the EC50 for each compound, with
    annotated labels featuring arrows pointing to the intersection points: EC50 =
    9.85e-08 M for Compound A and EC50 = 5.43e-07 M for Compound B. Dotted gray horizontal
    lines indicate the top (~100%) and bottom (~5%) asymptotes, labeled accordingly.
    A subtle light blue 95% CI band surrounds the Compound A fitted curve. The legend
    in the top-left corner lists both compounds with their EC50 values. The title
    reads "curve-dose-response · plotly · pyplots.ai" centered at the top.'
