  - Strong data storytelling with realistic epidemic curve shape and meaningful intervention
    annotations
  - Good visual refinement with removed spines, subtle grid, and white bar edges
  weaknesses:
  - No seaborn usage at all - this is a pure matplotlib implementation incorrectly
    labeled as seaborn; must use sns.histplot or sns.barplot with stacking
  - Pale green (#A8D8A8) for Suspect cases has low contrast and poor accessibility
  - Three repetitive bar() calls could be more elegantly handled with seaborn native
    API
  image_description: 'The plot displays a stacked bar chart showing an epidemic curve
    over approximately 120 days (Jan 15 - May 14, 2024). The x-axis shows "Date of
    Symptom Onset" with biweekly tick labels rotated 45 degrees. The left y-axis shows
    "New Cases" (0-175), and the right y-axis shows "Cumulative Cases" in red (0-8000).
    Three case types are stacked: Confirmed (dark blue, #306998), Probable (orange/amber,
    #E8A838), and Suspect (pale green, #A8D8A8). The curve rises from ~10 cases/day
    in mid-January to a peak of ~175 total cases/day around March 10, then declines
    with a secondary bump around late March before tapering to ~20 cases/day by mid-May.
    A red cumulative cases line (secondary y-axis) shows an S-curve reaching ~7500
    total. Two dashed vertical intervention lines are annotated: "Travel Restrictions"
    (Feb 20) and "Vaccination Campaign" (Mar 25), each with a white rounded box label.
    Top and right spines are removed, subtle y-axis grid lines are visible, and a
    legend in the upper left shows all four series.'
