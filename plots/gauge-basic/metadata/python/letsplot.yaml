review:
  strengths:
  - Professional semi-circular gauge with pivot circle, white zone separators, and
    accurate needle positioning at 72%
  - 'Clean, frameless aesthetic: all axes/ticks/grid/spines removed via element_blank()
    — gauge stands alone on the canvas'
  - Traffic-light zone coloring (red/amber/green) provides immediate intuitive status
    comprehension per spec conventions
  - Sensible, neutral data context (Sales Target Achievement, 0-100% scale) — realistic
    business KPI scenario
  - KISS code structure with appropriate trigonometric complexity for custom gauge
    construction in lets-plot
  weaknesses:
  - 'Critical — theme adaptation absent: Code has no THEME = os.getenv(''ANYPLOT_THEME'',
    ''light''). Needle color (#1F2937), pivot (#1F2937), min/max labels (#6B7280),
    and plot_title color are all hardcoded. In dark mode these produce dark-on-dark
    failures. Must add PAGE_BG, INK, INK_SOFT tokens and thread them through theme(),
    geom_segment(color=...), geom_polygon(fill=...), and geom_text(color=...).'
  - 'Critical — wrong output filenames: ggsave(plot, ''plot.png'') must be ggsave(plot,
    f''plot-{THEME}.png'') and same for HTML. Add import os at top.'
  - 'Wrong branding in code: labs(title=''gauge-basic · letsplot · pyplots.ai'') must
    be ''gauge-basic · letsplot · anyplot.ai''.'
  - Zone label colors and value label color (#1F2937) are hardcoded dark — they must
    use INK token to remain readable on both light and dark surfaces.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (~#FAF8F1) — correct theme surface, not pure white
      Chrome: Title "gauge-basic · letsplot · anyplot.ai" in bold dark text at top-left — clearly readable. "Sales Target Achievement" subtitle in medium gray below value — readable. "0" and "100" range labels at gauge base — readable.
      Data: Three arc zones — red (Low 0-30), yellow/amber (Medium 30-70), green (High 70-100) with white separators. Dark needle pointing to ~72% in the High zone. Large bold "72%" label in teal-green below gauge center. Zone labels "Low", "Med", "High" visible inside arcs.
      Legibility verdict: PASS — all text clearly readable against warm off-white background

    Dark render (plot-dark.png):
      Background: Near-black (~#1A1A17) — correct dark theme surface
      Chrome: Title "gauge-basic · letsplot · anyplot.ai" at top-left has reduced contrast — code sets no color on plot_title element_text, defaulting to near-black ink on near-black background (dark-on-dark failure). Value "72%" in teal-green — readable. "Sales Target Achievement" subtitle appears light/white in rendered image. Range labels "0" and "100" appear light. Needle appears white/light on dark background.
      Data: Zone colors (red/amber/green) are IDENTICAL to light render — correct Okabe-Ito independence. Pivot circle appears gray/light.
      Legibility verdict: PARTIAL FAIL — title text has dark-on-dark contrast failure; code lacks ANYPLOT_THEME environment variable for theme-adaptive chrome. Dark render adaptation appears to come from pipeline post-processing, not from the implementation code itself.
