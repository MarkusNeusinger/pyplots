review:
  strengths:
  - Excellent data synthesis with harmonics, chirp sweep, and time-varying amplitudes
    creating a visually compelling spectrogram
  - Manual mel filterbank implementation avoids librosa dependency while remaining
    clean and vectorized
  - Custom inferno gradient with dark panel background creates a cohesive, professional
    aesthetic
  - Full spec compliance — all required features present and correctly implemented
  - Perfect code structure following KISS principle
  weaknesses:
  - Library Mastery could be improved — uses standard plotnine features without leveraging
    more distinctive capabilities
  - Light gray outer background does not fully harmonize with the dark spectrogram
    panel
  - Bottom y-axis labels (64, 128 Hz) are slightly crowded due to mel scale compression
  image_description: The plot displays a mel-spectrogram with time (0–3 seconds) on
    the x-axis and mel-scaled frequency (64–8000 Hz) on the y-axis. The colormap is
    an inferno-like gradient from dark black/purple (low power ~-60 dB) through magenta
    and orange to bright yellow (0 dB). Clear horizontal bands of energy are visible
    at harmonic frequencies (~220, 440, 880, 1320, 3300 Hz), with the lower harmonics
    being brightest and decaying over time. A prominent chirp sweep arcs from ~500
    Hz at t≈0.8s up to ~4000 Hz at t≈2.0s, creating a striking curved bright line.
    A colorbar on the right is labeled "Power (dB)". The title reads "spectrogram-mel
    · plotnine · pyplots.ai". The panel background is dark (#000004) matching the
    colormap floor, with a light gray outer background.
