review:
  strengths:
  - 'Perfect spec compliance: all required quiver features (direction, magnitude-proportional
    length, grid layout, magnitude color encoding) correctly implemented'
  - Viridis colormap elegantly encodes magnitude as a second information dimension,
    producing a visually informative and colorblind-safe result
  - Vectorized arrowhead geometry (np.arctan2 + trig offsets) built cleanly using
    pd.concat — sophisticated approach for Altair's primitive-based API
  - 'Flawless code quality: flat script, seed set, all imports used, correct output
    filenames with HTML export'
  - 'Full theme-adaptive chrome: backgrounds, text, grid, legend frame all correctly
    adapt between light and dark renders'
  weaknesses:
  - Landscape canvas (1600x900) with equal-range axes distorts the circular rotation
    field into an ellipse — use a square canvas (e.g. 900x900 or 1200x1200 with appropriate
    scale_factor) to preserve circular geometry
  - Near-origin arrows (low magnitude) are very short and produce only a faint mark
    — consider a minimum arrow length or a slightly larger arrowhead for the low-magnitude
    region
  - Design refinement is functional but limited — no spine control, no visual focal
    point beyond viridis coloring
