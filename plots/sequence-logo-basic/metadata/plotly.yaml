review:
  strengths:
  - Creative SVG path shapes render stretched letter glyphs matching spec requirement
    for scaled glyphs
  - Excellent data quality with biologically plausible PWM covering full conservation
    range
  - Strong design with Wong palette, annotations on conserved positions, and clean
    visual refinement
  - Interactive hover tooltips provide nucleotide frequency details as distinctive
    Plotly feature
  weaknesses:
  - SVG path transformation code is complex and verbose, reducing code readability
  - Small letters at low-IC positions (9-10) are crowded and hard to distinguish
  - Position 7 T glyph appears somewhat rectangular rather than clearly T-shaped at
    tall heights
  image_description: 'The plot shows a DNA sequence logo for a 10-position transcription
    factor binding site motif. Letters (A, C, G, T) are rendered as custom SVG-path
    glyphs stacked vertically at each position, with heights proportional to information
    content in bits. Position 3 has a tall blue C (~1.70 bits) and position 7 has
    a near-maximum-height orange/red T (~1.97 bits), both annotated with downward
    triangles and bit values. Position 4 is empty (zero information) with a "no signal"
    label below. The remaining positions show varying conservation levels with stacked
    letters of different sizes. Colors follow standard DNA conventions using Wong
    palette variants: A=green, C=blue, G=orange, T=red-orange. The title reads "sequence-logo-basic
    · plotly · pyplots.ai" centered at top with a horizontal legend (A, C, G, T squares)
    below it. X-axis labeled "Position" (1-10), Y-axis labeled "Information content
    (bits)" (0-2.0). Clean white background with subtle dotted y-grid lines.'
