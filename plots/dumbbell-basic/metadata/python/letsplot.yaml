review:
  strengths:
  - 'Perfect spec compliance: correct horizontal dumbbell with geom_segment + geom_point
    layers, horizontal orientation, distinct Okabe-Ito colors for before/after dots,
    sorted by difference to reveal patterns'
  - 'Excellent visual quality: all font sizes explicitly set (title 24pt, axis 20pt,
    ticks 16pt, legend 16pt), no overlap, elements clearly visible at export scale'
  - 'Complete theme-adaptive chrome: PAGE_BG, ELEVATED_BG, INK, INK_SOFT tokens correctly
    applied to all chrome elements in both light and dark renders'
  - 'Strong data quality: realistic employee satisfaction scenario with 10 departments,
    includes a regression case (Operations: before > after), neutral business context,
    plausible 55-90 score range'
  - 'Clean code: flat KISS structure, deterministic data, all imports used, saves
    plot-{THEME}.png and plot-{THEME}.html'
  weaknesses:
  - 'Grid color uses full-opacity ink (#1A1A17 in light, #F0EFE8 in dark) instead
    of the recommended low-opacity RULE token (rgba(26,26,23,0.10) / rgba(240,239,232,0.10))
    — x-axis grid lines appear prominently dark/bright instead of the intended 10-15%
    opacity subtle guide lines'
  - 'No visual storytelling: the direction of change (improvement vs. regression)
    is not encoded — Operations (negative diff) looks the same as Customer Support
    (largest gain). Consider color-coding segments by direction (green for positive,
    red-orange for negative) or adding difference labels to create a clear focal point'
  - 'Aesthetic sophistication stays at well-configured defaults: no focal point, no
    size variation, no typography hierarchy beyond standard sizes — design lacks the
    polish needed to exceed 90 points'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface, not pure white.
      Chrome: Title "Employee Satisfaction · dumbbell-basic · letsplot · anyplot.ai" in dark ink, clearly centered. Y-axis label "Department" and x-axis label "Satisfaction Score" in dark text. Department category tick labels on left, numeric score labels (50–95) on bottom — all clearly readable against the light background. Legend "Period" box in the bottom-right with ELEVATED_BG fill.
