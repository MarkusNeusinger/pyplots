  image_description: The plot displays a CREB1 transcription factor binding motif
    as a sequence logo across 10 positions. Each position shows vertically stacked
    colored rectangles (A=green, C=blue, G=orange, T=red) with white bold letter labels
    centered on them. The y-axis shows "Information content (bits)" ranging from 0
    to approximately 1.2 bits, tightly fitting the data. The x-axis shows "Position"
    numbered 1-10. Position 3 (G dominant) is the tallest stack at ~1.15 bits. Positions
    4, 5, 6, and 8 reach ~0.97 bits showing strong C, G, and A conservation. Positions
    2 and 7 show moderate conservation (~0.53-0.65 bits) with T dominant. Positions
    1 and 10 have very low information content with small cramped letter blocks near
    the baseline. The background is light gray (#FAFAFA) with no grid lines or outline.
    A legend on the right maps colored squares to each base (A, C, G, T). The title
    reads "CREB1 Binding Motif · sequence-logo-basic · bokeh · pyplots.ai". The column
    width is well-proportioned at 0.82 units with thin white separators between rectangles.
