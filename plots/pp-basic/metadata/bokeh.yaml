  image_description: The plot displays a P-P (Probability-Probability) plot on a square
    3600x3600 canvas with a white background. Blue circular markers (#306998 Python
    Blue) with subtle white edges are plotted showing empirical cumulative probability
    (y-axis) against theoretical cumulative probability (x-axis). A dashed gray diagonal
    reference line runs from (0,0) to (1,1). Both axes range from 0 to 1 with tick
    marks at 0.2 intervals. The title "pp-basic · bokeh · pyplots.ai" appears in the
    top-left. The x-axis is labeled "Theoretical Cumulative Probability" and the y-axis
    "Empirical Cumulative Probability". The data points follow the diagonal closely
    but exhibit a subtle S-shaped deviation — points sit above the diagonal in the
    lower-middle range and below it in the upper range — indicating the data has slightly
    different tail behavior than a pure normal distribution. Grid lines are very subtle
    (low alpha). The overall appearance is clean and professional.
