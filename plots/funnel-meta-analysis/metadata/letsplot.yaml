    whitespace
  image_description: The plot displays a meta-analysis funnel plot with "Log Odds
    Ratio" on the x-axis and "Standard Error (precision →)" on the y-axis (inverted,
    with 0 at top and 0.45 at bottom). A solid blue vertical line marks the pooled
    effect estimate (~0.32). A dashed gray vertical line marks the null effect at
    0. Two dashed blue diagonal lines form the funnel shape representing pseudo 95%
    confidence limits, with a very subtle light-blue shaded polygon filling the funnel
    region. Fifteen studies are plotted as circles sized by inverse-variance weight.
    Studies inside the funnel are colored in blue (#306998), and two studies outside
    the funnel (Klein 2020 on the left, Jensen 2020 on the lower right) are colored
    in orange (#D4762C) with bold labels. Three large inside-funnel studies (Ito 2019,
    Evans 2017, Garcia 2018) are labeled in gray. The title reads "funnel-meta-analysis
    · letsplot · pyplots.ai" in bold dark gray. White background with minimal theme,
    subtle gray grid lines, no axis lines.
