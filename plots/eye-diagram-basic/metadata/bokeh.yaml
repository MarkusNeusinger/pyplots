  image_description: 'The plot displays an NRZ eye diagram density heatmap on a black
    background using the Inferno256 colormap. Two bright horizontal bands of yellow/orange
    at ~0V and ~1V represent the high-density logic level steady states. Transition
    regions at ~0.5 UI and ~1.5 UI show purple/magenta traces fanning out from jitter
    and ISI effects. A clear eye-shaped opening is visible in the center. A green
    rectangular box annotation outlines the eye opening. Green vertical and horizontal
    measurement lines indicate eye height (0.74 V) and eye width (0.93 UI) with labeled
    values in green text on semi-transparent black backgrounds. Blue "Logic 1 (1.0
    V)" and "Logic 0 (0.0 V)" labels with black backgrounds appear at upper-left and
    lower-left. Blue dashed reference lines at 0V and 1V are present but subtle against
    the bright bands. The colorbar on the right shows "Log Density" from 0 to ~3.5.
    Title: "eye-diagram-basic · bokeh · pyplots.ai". X-axis: "Time (UI)" [0, 2]. Y-axis:
    "Voltage (V)" [-0.3, 1.3].'
