  image_description: 'The plot shows a horizontal tornado diagram for NPV sensitivity
    analysis of a capital investment project. Ten financial parameters are listed
    on the y-axis, sorted by total range with "Revenue Growth" (widest) at top and
    "Salvage Value" (narrowest) at bottom. Teal bars represent "Low Scenario" and
    warm coral bars represent "High Scenario", extending left and right from a vertical
    dark gray base case reference line at $12.5M. An annotation "Base Case: $12.5M"
    appears near the top of the reference line. Each bar end is labeled with its dollar
    value (e.g., "$8.2M", "$17.3M") using white-outlined text for readability. The
    top 3 parameters (Revenue Growth, Discount Rate, Terminal Value) have bold, slightly
    larger y-tick labels. Bars have an intensity gradient — wider bars are more saturated,
    narrower bars are more translucent. The x-axis shows "Net Present Value" with
    dollar formatting ($8M to $18M). Top, right, and left spines are removed; subtle
    vertical gridlines at alpha=0.2 are visible. A frameless legend in the lower right
    identifies the two colors.'
