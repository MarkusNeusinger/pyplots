  image_description: The plot shows a horizontal diverging stacked bar chart for Likert
    scale survey responses on employee engagement. Ten survey questions are displayed
    on the y-axis, sorted by net agreement from highest (Team collaboration at top)
    to lowest (Compensation & benefits at bottom). Bars diverge from a central zero
    line, with negative responses extending left in red tones (Strongly Disagree in
    dark red, Disagree in light pink) and positive responses extending right in blue
    tones (Agree in light blue, Strongly Agree in dark blue). Neutral responses appear
    in muted gray, centered and split evenly across the midpoint. Percentage labels
    in bold appear inside bar segments >= 10%, with contrast-aware colors (white on
    dark segments, dark text on light). A vertical center line at 0% is prominent.
    An italic directional annotation points left for Disagree and right for Agree
    above the bars. The title reads "bar-diverging-likert · plotnine · pyplots.ai"
    centered at top. A horizontal legend at the bottom displays all five response
    categories. The x-axis is labeled "Percentage of Responses" with absolute percentage
    tick labels. The layout uses a 16:9 aspect ratio with clean, minimal styling.
