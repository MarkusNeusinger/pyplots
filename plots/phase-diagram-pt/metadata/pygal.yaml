  image_description: 'The plot displays a water pressure-temperature phase diagram
    on a white/light gray background. The x-axis shows Temperature (K) from 200 K
    to 600 K, and the y-axis shows Pressure (Pa) on a logarithmic scale from ~0.2
    Pa to ~60 MPa. Three phase boundary curves are drawn: a deep blue sublimation
    curve (Solid-Gas) rising steeply from the lower left to the triple point, a burnt
    orange vaporization curve (Liquid-Gas) extending from the triple point rightward/upward
    to the critical point, and a deep teal melting curve (Solid-Liquid) running nearly
    vertically with a slight negative slope (correct for water). The triple point
    is marked with a deep rose dot at ~273 K / 612 Pa, and the critical point with
    a deep violet dot at ~647 K / 22 MPa. Semi-transparent phase region labels (SOLID
    in teal, LIQUID in orange, GAS in blue, SUPERCRITICAL FLUID in violet) are placed
    in their respective regions. The legend at the bottom lists all five series. The
    y-axis tick labels are very crowded due to the logarithmic scale showing many
    intermediate values.'
