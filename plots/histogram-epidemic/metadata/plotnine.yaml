  image_description: 'The plot shows a stacked bar chart (epi curve) spanning approximately
    90 days from Jan 15 to Apr 14, 2024. Bars are stacked by case classification:
    Confirmed (dark steel blue #306998) at the bottom, Probable (warm orange #F0A030)
    in the middle, and Suspect (light gray #B0B0B0) on top. Two distinct epidemic
    waves are visible — a sharp first peak around Jan 29–Feb 3 reaching ~70 total
    daily cases, and a broader second wave around Mar 7–15 reaching ~43 total daily
    cases. Two dashed vertical lines mark interventions: "Lockdown" near Feb 10 and
    "Vaccination campaign" near Mar 1. The x-axis is labeled "Date of Symptom Onset"
    with 2-week tick intervals rotated 45°. The y-axis is "Number of New Cases" ranging
    0–70. The legend is positioned at the top. Title reads "histogram-epidemic · plotnine
    · pyplots.ai" in bold. The background is minimal with no x-grid lines and subtle
    y-grid lines.'
