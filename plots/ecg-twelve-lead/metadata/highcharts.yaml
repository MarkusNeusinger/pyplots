  image_description: 'The plot displays a 12-lead ECG on a warm pink/salmon background
    (#FFF5F0) that authentically mimics clinical ECG paper. The title "ecg-twelve-lead
    · highcharts · pyplots.ai" appears at the top in dark navy, with subtitle "Normal
    Sinus Rhythm — 25 mm/s, 10 mm/mV". The layout follows the standard clinical 3x4
    grid: Row 1 (I, II, III), Row 2 (aVR, aVL, aVF), Row 3 (V1, V2, V3), Row 4 (V4,
    V5, V6), plus a full-length Lead II rhythm strip at the bottom. A 1 mV calibration
    pulse (square wave) is visible in the upper-left corner with a "1 mV" label. Grid
    lines are rendered in two weights — fine minor lines (light red, 0.5px) at small
    intervals and bolder major lines (darker red, 1.5px) at 5mm-equivalent intervals.
    Dark column and row separators delineate the lead sections. All waveforms are
    drawn in dark navy (#1a1a2e) with realistic P-QRS-T morphology: aVR is appropriately
    inverted, V1-V2 show rS patterns with deeper S-waves, and R-wave amplitude progresses
    from V1 through V6. Lead labels are bold and clearly positioned above each trace.'
