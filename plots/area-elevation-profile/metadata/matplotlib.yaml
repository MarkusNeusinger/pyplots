    generated data or terrain must be shaped to match desired label values.'
  - Vertical exaggeration note is nearly invisible against the gradient fill - needs
    a semi-transparent background box or repositioning above the fill
  - Edge labels (Bergdorf at x=0, Alpstadt at x=120) are tight against canvas edges
    and risk clipping
  image_description: The plot shows an alpine terrain elevation profile spanning 120
    km on the x-axis (Distance in km) and approximately 600-2500 m on the y-axis (Elevation
    in m). The area beneath the profile line is filled with a beautiful vertical gradient
    transitioning from deep green at the base through lighter greens to warm browns/terra
    cotta at higher elevations, creating a terrain silhouette effect. A dark green
    profile line (linewidth ~2.5) traces the terrain contour with multiple peaks and
    valleys. Eight landmarks are annotated with dashed vertical marker lines, dark
    green dots with white edges, and bold text labels showing name and elevation (Bergdorf
    800m, Sonnalm 1620m, Hoher Kamm 2080m, Talbach 1180m, Gipfelkreuz 2290m, Seefeld
    Hut 1750m, Felsgrat 1950m, Alpstadt 1080m). The title reads "Alpine Trail Profile
    · area-elevation-profile · matplotlib · pyplots.ai" at fontsize 24. Top and right
    spines are removed, with a subtle y-axis grid. A small italic note in the bottom-right
    reads "Vertical exaggeration ≈ 10×" but is barely visible against the green gradient
    fill.
