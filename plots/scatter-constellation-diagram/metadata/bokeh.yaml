  image_description: The plot displays a 16-QAM constellation diagram on a light gray
    (#F5F5F5) background. Sixteen clusters of received symbols are arranged in a 4×4
    grid at I/Q coordinates ±1 and ±3. Each cluster centers on a red cross marker
    representing the ideal constellation point. Received symbols are rendered as semi-transparent
    dots color-coded using a Viridis colormap based on error vector magnitude — dark
    purple/blue for symbols close to the ideal point, transitioning through teal/green
    to yellow for larger deviations. Dashed gray decision boundary lines appear at
    -2, 0, and 2 on both axes. The title reads "scatter-constellation-diagram · bokeh
    · pyplots.ai". The x-axis is labeled "In-Phase (I)" and y-axis "Quadrature (Q)".
    A legend in the top-left corner identifies "Received Symbols (color = error)"
    and "Ideal 16-QAM Points". An EVM annotation "EVM = 7.4%" is positioned in the
    lower-right area. The plot uses a square 3600×3600 canvas with equal aspect ratio.
