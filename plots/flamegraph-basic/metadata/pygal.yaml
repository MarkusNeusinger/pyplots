    mid-orange bars including execute_handler (250), parse_headers (120), route_dispatch
    (180), with some bars truncated at right edge. Depth 3 has salmon/red bars for
    db_query (140), serialize_json (70), template_render, decode_base64 (55), validate_utf8
    (45), lookup_handler (70), regex_match (90), and compress_gzip (truncated at edge).
    Depth 4 has the darkest red bars: connect_pool, execute_sql (80), fetch_rows,
    encode_utf8. Colors transition from pale yellow at root to dark red at deepest
    level following flame graph conventions. White stroke borders separate adjacent
    bars.'
