  - No visual emphasis on critical/high-priority risks - all markers same size
  - Risk item labels at 14pt could be slightly larger for better readability
  image_description: 'The plot displays a 5x5 risk assessment matrix with Impact (Negligible
    to Catastrophic) on the x-axis and Likelihood (Rare to Almost Certain) on the
    y-axis. Background cells are color-coded using a green-yellow-orange-red gradient
    based on risk score (likelihood x impact), with watermark numbers (1-25) visible
    in each cell. Fifteen risk items are plotted as colored circular markers with
    bold text labels beneath them. Marker colors represent categories: dark navy (Technical),
    purple (Financial), dark teal (Operational), and red-orange (Legal). A Risk Zones
    legend on the right shows Low (1-4) in green, Medium (5-9) in olive, High (10-16)
    in orange, and Critical (20-25) in dark red. Below that, a Categories legend shows
    colored dots with category names. The title reads "heatmap-risk-matrix · bokeh
    · pyplots.ai" centered at top. Axis lines, ticks, and grid lines are removed for
    a clean appearance.'
