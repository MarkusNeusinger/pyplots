review:
  strengths:
  - Excellent thematic design with dark sky background and star-appropriate color
    coding
  - Real astronomical data with accurate star positions and magnitudes
  - Creative SVG post-processing to add constellation name labels (working around
    pygal limitations)
  - Good magnitude-based visual hierarchy with 4 distinct size tiers
  - 'Complete feature set: constellation lines, ecliptic, coordinate grid, star labels'
  weaknesses:
  - Legend at bottom is cramped and hard to read with many series
  - Some constellation label overlap with nearby stars
  - SVG post-processing coordinate mapping is fragile (relies on matching circle radius)
  image_description: 'The plot displays a star chart on a dark navy-blue background
    (#04041a/#060820). Stars are rendered as circles with four distinct size tiers:
    large white circles for brightest stars (mag < 1, e.g., Sirius, Capella), medium
    gold/yellow circles for mag 1-2, smaller blue circles for mag 2-3, and tiny dark
    dots for mag 3-5 field stars. Eight constellations are shown (Orion, Ursa Major,
    Taurus, Gemini, Canis Major, Canis Minor, Leo, Auriga) with blue stick-figure
    lines connecting their stars. Italic pale-blue constellation name labels are placed
    near each constellation''s centroid with manual offsets. An orange ecliptic curve
    sweeps across the chart. The x-axis shows Right Ascension (3h-14h), y-axis shows
    Declination (-30 to 60 degrees). Title reads "star-chart-constellation · pygal
    · pyplots.ai" in light text. A 4-column legend at the bottom lists all series.
    Grid lines are extremely subtle against the dark background.'
