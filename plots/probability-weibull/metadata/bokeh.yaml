  image_description: The plot displays a Weibull probability plot for turbine blade
    fatigue life data. The x-axis shows "Time to Failure (hours)" on a logarithmic
    scale with tick marks at 1000, 2000, 3000, 5000, 7000, and 10000 hours. The y-axis
    shows "Cumulative Failure Probability" with Weibull-linearized tick marks at 1.0%,
    5.0%, 10.0%, 20.0%, 50.0%, 63.2%, 90.0%, and 99.0%. Twenty-five dark blue filled
    circles represent failure observations, and five hollow blue circles represent
    censored (suspended) observations. A dark blue fitted line runs through the data
    with a light blue/gray confidence band. An orange dashed horizontal reference
    line marks the 63.2% characteristic life level, labeled "63.2% (Characteristic
    Life)" on the right. Parameter annotations in the upper left show β = 2.21 (shape),
    η = 5428 h (scale), R² = 0.9590 in bold dark blue text. A B10 = 1957 h annotation
    with a diamond marker indicates the 10% failure probability life. The legend in
    the bottom right identifies "Weibull Fit", "Failures", and "Censored". The background
    is clean white with no x-grid and subtle y-gridlines. The title reads "Turbine
    Blade Fatigue Life · probability-weibull · bokeh · pyplots.ai".
