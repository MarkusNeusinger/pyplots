  image_description: The plot displays a MIDI piano roll visualization with horizontal
    rectangles representing musical notes across 4 measures of a C major chord progression
    (I-V-vi-IV). The y-axis shows pitch as MIDI note names (A2 through G5), and the
    x-axis shows beat position in Measure.Beat format (M1.1 through M5.1). Notes are
    colored using the Plasma colorscale — deep blue/purple for soft velocities (~68)
    through pink/orange to bright yellow for loud velocities (~120). Melody notes
    (highest pitch at each onset) appear taller and more opaque than accompaniment
    notes. Subtle gray bands mark black key rows. Solid vertical lines separate measures,
    with dotted lines at beat subdivisions. "Measure 1-4" labels appear at top, chord
    names (C maj, G maj, A min, F maj) below the plot. A vertical colorbar on the
    right shows the Velocity (MIDI 0-127) scale. The background is a clean near-white
    with the plotly_white template.
