    all five elements: Poor (0-50%), Satisfactory (50-75%), Good (75-100%), Actual,
    Target. Some metrics exceed targets (Revenue, Customers) while others fall short
    (Profit, New Orders, Satisfaction). There is generous vertical spacing between
    rows.'
