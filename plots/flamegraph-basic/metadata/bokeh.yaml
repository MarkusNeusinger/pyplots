  image_description: The flame graph displays a hierarchical CPU profiling visualization
    for a web server application. At the bottom, "main (100.0%)" spans the full width
    in deep purple (Inferno colormap). Above it, "handle_request (85.0%)" dominates
    in dark magenta, flanked by smaller "log_metrics" and "gc_collect" bars in pale
    yellow. The next level shows "process_query (40.0%)" in warm orange, "authenticate
    (20.0%)" in gold-yellow, alongside "parse_headers" and "send_response". Higher
    levels include "execute (24.0%)", "fetch_rows (15.0%)", "verify_token (14.0%)"
    with progressively lighter colors. The deepest level has "btree_search" and "decode_row"
    in pale yellow. Colors transition from deep purple (high sample count) through
    reds/oranges to pale yellow (low samples) using a perceptually uniform Inferno
    palette. White borders cleanly separate bars. Function names with percentages
    are displayed inside wider bars. Clean white background with no axes or grid.
    Title "flamegraph-basic · bokeh · pyplots.ai" centered at top in bold 36pt font.
