  image_description: 'The plot shows a stacked bar chart depicting an epidemic curve
    for a respiratory outbreak spanning approximately 90 days (Jan 15 – Apr 08). Three
    stacked series are displayed: Confirmed (dark teal blue, #1B5E8C), Probable (warm
    gold, #E8A838), and Suspect (dark maroon, #8B4049). Two distinct epidemic waves
    are visible — the first peaking around Feb 05 (~39 total cases) and a larger second
    wave peaking around Mar 11 (~55 total cases). The x-axis shows "Date of Symptom
    Onset" with biweekly major tick labels rotated 45°, plus intervention event dates
    marked with unicode down-pointing triangle symbols and event names (Cluster ID,
    Contact Tracing, Quarantine, Vaccination, Contained). The y-axis shows "New Cases"
    from 0 to ~55 with subtle horizontal grid lines only (no vertical x-guides). The
    background is a warm off-white (#FAFAF7). The legend sits at the bottom showing
    all three series. Title reads "Epidemic Curve (Respiratory Outbreak) · histogram-epidemic
    · pygal · pyplots.ai".'
