  strengths:
  - Excellent data storytelling through phase-colored waveform (Attack/Sustain/Release)
    with boundary markers
  - Min/max envelope downsampling properly handles dense waveform display
  - Warm panel background and custom color palette create polished professional appearance
  - Realistic audio data with harmonics vibrato and noise
  - Full spec compliance with all required features implemented
  weaknesses:
  - Phase annotation label size (11) is smaller than other text elements
  - Data downsampling uses list comprehensions instead of vectorized numpy reshape
    operations
  image_description: 'The plot displays an audio waveform as a filled ribbon symmetric
    around a zero baseline on a warm off-white panel background (#f5f5f0). The x-axis
    shows "Time (seconds)" from 0.00 to 1.50, and the y-axis shows "Amplitude" from
    -1.00 to 1.00. The waveform is colored by three distinct phases: orange for the
    short Attack phase (0-0.05s) showing rapid amplitude increase, steel blue for
    the Sustain phase (0.05-1.10s) showing steady oscillation at ~0.75 amplitude,
    and purple for the Release phase (1.10-1.50s) showing gradual decay to zero. Dashed
    vertical lines mark the phase boundaries. Italic phase labels appear near the
    top of each region. A subtle horizontal zero-line bisects the waveform. The title
    reads "waveform-audio · plotnine · pyplots.ai" in bold at the top. Y-axis has
    dotted grid lines; x-axis grid is removed. The waveform clearly shows the harmonic
    content with visible beat patterns in the sustain region.'
