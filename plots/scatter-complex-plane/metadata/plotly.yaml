review:
  strengths:
  - Excellent data organization with three meaningful categories of complex numbers
    (roots of unity, arbitrary, conjugate pair)
  - Vector arrows from origin using Plotly annotations with axref/ayref is a clever
    technique
  - Clean, well-structured code with good separation of data and visualization
  - Custom color palette with good colorblind accessibility
  - Equal aspect ratio correctly implemented via scaleanchor
  weaknesses:
  - Missing rectangular form (a+bi) annotations on each point — spec explicitly requires
    this; values are only in hover text (invisible in static PNG)
  - Labels z4 and w-bar overlap slightly near (1.2, -2.0) and (1.5, -2.0)
  - Axis labels use plain text instead of mathematical notation (Re(z)/Im(z))
  image_description: 'The plot displays a complex plane (Argand diagram) on a square
    white canvas. The title "scatter-complex-plane · plotly · pyplots.ai" is centered
    at the top. The x-axis is labeled "Real Axis" and the y-axis "Imaginary Axis",
    both with integer tick marks from roughly -3 to +4 and -3 to +3 respectively.
    A dashed gray unit circle is centered at the origin. Dark zero lines cross at
    the origin. Three categories of complex numbers are plotted with vector arrows
    emanating from the origin: blue markers for "5th Roots of Unity" (omega-0 through
    omega-4 on the unit circle), orange markers for "Arbitrary Points" (z1 through
    z5 scattered across the plane), and purple markers for a "Conjugate Pair" (w at
    approximately 1.5+2i and w-bar at approximately 1.5-2i, symmetric about the real
    axis). Arrows are semi-transparent with matching category colors. A legend in
    the upper left lists all four trace categories including the Unit Circle. The
    aspect ratio is equal, making the unit circle appear circular.'
