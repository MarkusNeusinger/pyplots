  image_description: 'The plot displays a two-panel layout. The top panel shows an
    astronomical light curve: blue scatter points (#306998) with vertical error bars
    plotted against orbital phase (0.0-1.0) on the x-axis and relative flux (~0.988-1.005)
    on the y-axis. An amber/orange (#C8702A) transit model curve overlays the data,
    showing a characteristic V-shaped dip centered at phase 0.5 with ~1% depth. An
    annotation arrow points to the transit minimum labeled "Transit depth 1.0%". The
    legend in the lower right reads "Transit model". The bottom panel shows residuals
    (flux minus model) as smaller blue scatter points around a dashed amber zero-line,
    with a subtle rug plot on the left y-axis edge. Title reads "lightcurve-transit
    · seaborn · pyplots.ai". Top and right spines are removed on both panels. Subtle
    y-axis gridlines are present. The overall appearance is clean and scientific.'
