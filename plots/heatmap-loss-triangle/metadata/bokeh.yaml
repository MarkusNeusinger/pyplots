  image_description: 'The plot displays a 10x10 heatmap grid representing an actuarial
    loss development triangle. Rows show accident years (2015-2024) on the left y-axis,
    columns show development periods (1-10) along the top x-axis. Each cell is annotated
    with a cumulative claims amount formatted with thousands separators. A sequential
    blue color palette encodes magnitude — lighter blues for lower amounts (~4,000-5,000)
    in the upper-left and darker blues for higher amounts (~30,000-40,000) in the
    lower-right. Actual (observed) cells have solid white borders at full opacity,
    while projected (IBNR) cells have dashed gray borders with reduced opacity (~0.55),
    creating a clear diagonal boundary from top-right to bottom-left. A colorbar on
    the right is labeled "Cumulative Claims ($K)". Below the grid, a horizontal legend
    distinguishes "Actual (Observed)" from "Projected (IBNR Estimate)". Below that,
    age-to-age development factors (F1-2: 2.500 through F9-10: 1.008) are displayed.
    The title reads "Actuarial Loss Development Triangle · heatmap-loss-triangle ·
    bokeh · pyplots.ai". Text colors adaptively switch between white and dark based
    on cell background intensity.'
