  image_description: The plot shows a scatter lag plot for an AR(1) time series, displaying
    y(t) on the x-axis (range ~-4.5 to 5.5) vs y(t+1) on the y-axis (range ~-4.5 to
    6). Points are colored using the viridis colormap (purple/dark blue for early
    time indices near 0, transitioning through teal/green to bright yellow for later
    indices near 425), creating a clear temporal gradient visible in the scatter cloud.
    A dashed diagonal reference line in salmon/reddish color runs from lower-left
    to upper-right, representing the y=x (zero autocorrelation) baseline. A colorbar
    on the right side is labeled "Time Index" with tick marks at 0, 100, 200, 300,
    400. In the upper-left corner, a rounded white annotation box with a light gray
    border shows "r = 0.83" in bold dark text. The title reads "AR(1) Autocorrelation
    · scatter-lag · seaborn · pyplots.ai" in medium-weight gray font. Both top and
    right spines are removed (despined). A very subtle grid is visible at low alpha.
    The scatter cloud clusters tightly along the diagonal reference line, clearly
    demonstrating strong positive autocorrelation (r=0.83) expected for an AR(1) process
    with phi=0.85. The figure dimensions appear to be 16x9 inches / 4800x2700px with
    a clean white background.
