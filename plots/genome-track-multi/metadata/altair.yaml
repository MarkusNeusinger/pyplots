  image_description: The plot displays a four-track genome browser view on chr7 (~55.14-55.19
    Mb). The top Genes track shows two genes — EGFR (+ strand, right-pointing triangle
    arrows) and VOPP1 (- strand, left-pointing arrows) — with dark blue (#306998)
    exon rectangles connected by thin intron lines, gene names in bold black text,
    all on a light gray background band. The Coverage track is a blue filled area
    chart with monotone interpolation showing read depth (0-100x) with clear peaks
    over exon regions. The Variants track displays orange SNP circles and blue Indel
    circles with quality scores (0-100) on the y-axis, on alternating gray background.
    The Regulatory track shows purple promoter and gold/amber enhancer rectangles
    at the bottom with the shared x-axis labeled "Genomic Position (chr7)" with formatted
    base-pair coordinates. Each track has a left-anchored gray title. The main title
    "genome-track-multi · altair · pyplots.ai" is centered at the top. Legends for
    variant type and regulatory element type appear on the right side.
