  image_description: The plot displays a triangular cohort retention heatmap with
    10 monthly cohorts (Jan 2024 – Oct 2024) on the y-axis and "Months Since Signup"
    (Month 0 – Month 9) on the x-axis. A teal-green sequential colormap transitions
    from light for low retention to dark green for high retention. Each cell contains
    a bold percentage label with adaptive text color (white on dark backgrounds, dark
    on light). All Month 0 cells show 100%. The triangular shape is correctly rendered
    — Jan 2024 has 10 columns, Oct 2024 has 1. Cohort sizes (e.g., n=1,200) appear
    in italic gray beneath each cohort label. A vertical colorbar on the right side
    shows "Retention %" with tick marks from 21% to 100%. Cells have rounded corners
    with subtle gaps between them, creating a clean modern appearance. The title "heatmap-cohort-retention
    · pygal · pyplots.ai" is centered at the top. The Apr 2024 cohort visibly shows
    worse retention compared to neighbors, while later cohorts trend greener, telling
    a product-improvement story.
