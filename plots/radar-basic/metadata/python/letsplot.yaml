    Dark render (plot-dark.png):
      Background: Near-black approximately #1A1A17 — correct for dark theme
      Chrome: Title appears in lighter text, readable. Category labels appear lighter on the dark surface (despite code hardcoding color="#333333" dark gray — this is a latent dark-on-dark risk but appears rendered readable, possibly via lets-plot HTML defaults). Value labels (color="#666666" medium gray) provide limited but barely acceptable contrast on the dark surface. Legend text appears lighter. Grid circles and spokes render as lighter lines on dark background.
      Data: Polygon fill and line colors appear identical to light render — teal-green and orange-brownish — as required (only chrome flips between themes, not data colors).
