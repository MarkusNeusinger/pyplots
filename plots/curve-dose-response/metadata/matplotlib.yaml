    horizontal asymptote lines mark the top and bottom plateaus for both compounds.
    Hill slopes are noted in italic gray text at the bottom-right (Erlotinib = 1.06,
    Lapatinib = 0.81). Top and right spines are removed, a subtle y-axis grid is present,
    and the legend is well-organized in the upper left with data/fit entries logically
    grouped. Title reads "curve-dose-response · matplotlib · pyplots.ai".'
