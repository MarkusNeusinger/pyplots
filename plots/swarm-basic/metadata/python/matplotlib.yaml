    legend=16pt — all readable in both themes'
  weaknesses:
  - 'Swarm spreading is incomplete for high-density value clusters: Marketing (tight
    ±10 std, 40 pts) and Support (55 pts) show column-stacking instead of true beeswarm
    spread — the collision detection uses a fixed offset range (0–0.35) that fails
    when many points cluster at similar y-values; fix by scaling offset range proportional
    to point count or reducing marker size for denser groups'
  - 'Design storytelling is absent: no visual emphasis or highlight distinguishes
    the key insight (which department leads/lags); mean diamonds help but no color
    contrast, annotation, or reference line guides the viewer to a focal point'
  - 'LM-02 is weak: only generic scatter() usage; no matplotlib-unique techniques
    (PathPatch, violinplot background layer, custom spine positioning, BrokenBarHCollection)
    are leveraged; adding a faint violinplot layer (alpha≈0.15) behind the swarm is
    a hallmark publication-quality beeswarm technique distinctive to matplotlib'
