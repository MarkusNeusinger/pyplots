review:
  strengths:
  - Excellent use of Cividis colormap to encode deviation magnitude — transforms a
    simple scatter into a diagnostic tool
  - KS confidence band adds statistical rigor beyond spec requirements
  - Annotations explain the S-shaped deviation pattern, guiding viewer interpretation
  - Strong Bokeh mastery with HoverTool, Band, and transform-based color mapping
  - Realistic manufacturing QC context with plausible bolt strength data
  weaknesses:
  - 'Minor: alpha=0.85 is slightly high for 200 points; could use 0.6-0.7 for better
    density handling in crowded regions'
  image_description: 'The plot displays a P-P (Probability-Probability) plot at 3600x3600px
    with a square aspect ratio. The title "pp-basic · bokeh · pyplots.ai" appears
    in dark charcoal at the top left. The x-axis is labeled "Theoretical Cumulative
    Probability (Normal Fit)" and the y-axis "Empirical Cumulative Probability", both
    ranging from 0 to 1. 200 data points trace a path near the 45-degree dashed gray
    reference diagonal. Points are colored using the Cividis colormap based on their
    deviation from the diagonal — darker navy-blue for negative deviations and golden-yellow
    for positive deviations, creating a visible S-shaped pattern. A subtle light blue
    95% KS confidence band flanks the diagonal. Two italic annotations explain the
    deviation pattern: "Heavy right tail → points fall below diagonal" in sienna-brown
    on the right, and "← Light left tail empirical > theoretical" in teal-blue on
    the lower left. A smaller label notes "95% KS confidence band (D = 0.096)." The
    background is off-white (#fafafa) with subtle dashed gridlines, no tick marks,
    and no plot outline.'
