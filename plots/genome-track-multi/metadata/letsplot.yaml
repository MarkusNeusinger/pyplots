review:
  strengths:
  - Excellent spec compliance with all 4 track types and required sub-features (exons,
    introns, strand arrows, lollipop markers, filled area coverage, regulatory rectangles)
  - Biologically realistic data using the real HOXA gene cluster with plausible genomic
    coordinates and coverage patterns
  - Strong design with custom color palette, thoughtful typography (italic gene names,
    bold track labels), and polished layout
  - Good data storytelling with highlight region, peak annotation, and subtitle calling
    out the focal point
  - Clean well-organized code with appropriate complexity for the visualization
  weaknesses:
  - Minor overlap between Genes track label and HOXA1 gene name at left edge
  - Low-quality variant lollipops have short stems making them slightly less distinct
  - Green/red color pairing (Promoter/Indel) could improve colorblind accessibility
  - Strand direction arrows (size=12) are somewhat small relative to other text
  image_description: 'The plot displays a multi-track genome browser view of the HOXA
    gene cluster on chr7 (27,200-27,280 kb). Four tracks are stacked vertically with
    a shared genomic x-axis. The Genes track (top) shows five genes (HOXA1-HOXA5)
    as dark blue exon rectangles connected by thin intron lines, with italic gene
    names above and strand-direction triangles below. The Coverage track renders a
    light blue filled area plot of RNA-seq read depth, with pronounced peaks over
    exonic regions and a bold "Peak: 120x" annotation. The Variants track uses lollipop
    markers — orange circles for SNPs and smaller red circles for Indels — with stem
    height proportional to quality score. The Regulatory track at the bottom shows
    green rectangles for Promoters and purple rectangles for Enhancers. Track labels
    are bold-faced on the upper left of each track. Subtle gray background shading
    and dashed divider lines separate the tracks. A faint yellow highlight region
    spans all tracks near HOXA3. The x-axis labels show positions in kb with a "Genomic
    Position (chr7)" axis title. Two legends at the bottom identify Variant Type (SNP/Indel)
    and Regulatory element colors (Promoter/Enhancer). The title reads "genome-track-multi
    · letsplot · pyplots.ai" with a subtitle describing the HOXA cluster and highlight
    region.'
