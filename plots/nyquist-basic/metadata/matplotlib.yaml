    is actually third-order with no delay
  image_description: The plot displays a Nyquist diagram on the complex plane. The
    main frequency response curve G(jω) is rendered as a solid steel-blue line (#306998)
    starting at approximately (5, -0.4) at low frequency and sweeping counterclockwise
    through the lower half-plane, reaching a minimum of roughly (0, -3) before curving
    back toward the origin at high frequencies. A dashed, lighter blue curve G(−jω)
    mirrors it in the upper half-plane with reduced opacity (alpha=0.35). A dotted
    gray unit circle is centered at the origin with "unit circle" label text. The
    critical point at (-1, 0) is marked with a prominent red "X" marker. A red "GM
    ≈ 11.8 dB" annotation with a downward arrow indicates the gain margin near the
    critical point. Five frequency annotations (ω=0.3, ω=0.8, ω=2, ω=5) are placed
    along the curve with blue dot markers and offset text labels. Directional arrows
    along the solid curve indicate increasing frequency. The title reads "nyquist-basic
    · matplotlib · pyplots.ai". Axes labeled "Real" and "Imaginary". Top and right
    spines removed, subtle grid at alpha=0.15. The legend is positioned in the upper
    right area identifying G(−jω), G(jω), and Critical point (−1, 0). The aspect ratio
    is 1:1 (square figure).
