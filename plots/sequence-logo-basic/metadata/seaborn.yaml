    position
  - Clean code with no unnecessary barplot clutter (fixed from attempt 2)
  weaknesses:
  - Library mastery inherently limited — seaborn has no native sequence logo support,
    so the core visualization must use matplotlib primitives
  - Minor color accessibility concern with standard DNA green/red, though mitigated
    by blue and orange
  - Design excellence could benefit from more typographic polish or additional visual
    hierarchy elements
  image_description: 'The plot displays a DNA sequence logo for a 10-position transcription
    factor binding site motif. At each position, nucleotide letters (A, C, G, T) are
    stacked vertically with heights proportional to their information content in bits.
    The colors follow the standard DNA scheme: A=green (#3AA655), C=blue (#4169E1),
    G=orange (#F5A623), T=red (#E74C3C). Position 8 has the tallest stack (~1.4 bits,
    dominated by a large green "A") and is highlighted with a subtle yellow vertical
    band and an italic annotation "Most conserved (1.4 bits)" with an arrow. Position
    5 is essentially empty (uniform base frequencies = 0 bits). The x-axis is labeled
    "Position" (1-10), the y-axis "Information content (bits)" (0-2.0). The title
    reads "sequence-logo-basic · seaborn · pyplots.ai" at 24pt. Top and right spines
    are removed. A subtle whitegrid is visible. The layout is clean with good canvas
    utilization on a 16x9 figure. No background bars or visual clutter — just clean
    letter glyphs.'
