  image_description: The plot displays a 10x10 grid representing an actuarial loss
    development triangle. Rows correspond to accident years 2015-2024 (y-axis), columns
    to development periods 1-10 (x-axis). The upper-left triangle is filled with blue
    (Blues colormap) cells for actual/observed values, while the lower-right triangle
    uses orange (Oranges colormap) cells for projected/estimated values. Each cell
    is annotated with the cumulative claim amount formatted with thousands separators.
    Projected values appear in italic text. Color intensity varies with magnitude
    - lighter for smaller values, darker for larger. All spines are removed, cells
    have white borders. Development factors (2.50 down to 1.01) are displayed in a
    row beneath the grid. A legend at the bottom-left distinguishes "Actual (Observed)"
    and "Projected (Estimated)". The title reads "heatmap-loss-triangle · matplotlib
    · pyplots.ai" at the top.
