review:
  strengths:
  - 'Full spec compliance: correct heatmap type, cell annotations, colorbar, BrBG
    diverging colormap for correlation data'
  - 'Strong data storytelling: subtitle names the criterion, strong-correlation cells
    (|r| > 0.6) visually highlighted with borders'
  - Auto-contrasting text color logic adapts to cell background luminance — elegant
    per-point approach using luminance calculation
  - Realistic financial correlation matrix with symmetric structure and diagonal =
    1.0; deterministic with np.random.seed(42)
  weaknesses:
  - 'Dark mode cell annotation contrast failure: cell_text_color returns INK (#F0EFE8
    in dark mode) for high-luminance cells, producing near-invisible light-on-light
    text on near-zero cells (background ~#F5F5F5); fix by returning hard dark color
    (#1A1A17) instead of INK when lum > 0.45'
  - '"textOutline": "none" removes Highcharts built-in text shadow that partially
    compensates for contrast issues — remove this override or use a subtle outline'
  - Three helper functions (interpolate_brbg, cell_text_color, fetch_js) add structural
    complexity; KISS principle prefers flat scripts
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct
      Chrome: Title "heatmap-annotated · highcharts · anyplot.ai" in dark ink, clearly readable. Subtitle in INK_SOFT. Axis labels "Variables" readable. Category tick labels (Revenue, Profit, Growth, ROI, Debt, Assets, Employees) visible and legible. Colorbar legend on the right labeled -1 to 1.
      Data: BrBG diverging colormap — deep teal-green (#003C30) for positive extremes, brown (#543005) for negative extremes, near-white (#F5F5F5) for near-zero. Bold 2-decimal annotations in each cell with auto-contrasting text (dark on bright cells, light on dark cells). Strong off-diagonal correlations (|r| > 0.6) ringed with dark borders.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17) — correct
      Chrome: Title visible in light (#F0EFE8) text. Subtitle in #B8B7B0. Axis category tick labels and labels visible. Colorbar present.
      Data: Cell colors identical to light render (BrBG palette unchanged — correct). Most cell annotations readable. FAILURE: near-zero cells (Growth/Profit=0.00, Growth/Assets=0.00, Employees/Growth=0.00) have ~#F5F5F5 (near-white) background; cell_text_color returns INK=#F0EFE8 (light) for these cells in dark mode, creating near-invisible light-on-light contrast. Compounded by "textOutline": "none" removing Highcharts' built-in shadow compensation.
      Legibility verdict: PARTIAL FAIL — near-zero cell annotations unreadable in dark mode
