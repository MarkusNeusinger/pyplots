review:
  strengths:
  - Perfect spec compliance — quiver plot correctly implemented using geom_segment
    with arrow(type='closed') producing clean arrowheads
  - Viridis colormap for magnitude is perceptually uniform and CVD-safe, clearly showing
    the radial gradient from center to periphery
  - All font sizes explicitly set at correct sizes (title 24pt, axis labels 20pt,
    tick labels 16pt, legend 16pt)
  - 'Both light and dark renders pass theme-readability checks: correct backgrounds
    (#FAF8F1 / #1A1A17), adaptive chrome tokens, no dark-on-dark failures'
  - Deterministic mathematical data (rotation field u=-y, v=x) with realistic 'East/North
    (km)' context — plausible ocean current or atmospheric vortex
  - coord_equal() preserves the true circular shape of the rotation field, critical
    for correct interpretation of a vector field
  weaknesses:
  - 16:9 canvas is suboptimal for a symmetric vector field — coord_equal forces a
    square plot area, leaving wasted horizontal whitespace; a square canvas (12x12)
    would better utilize space
  - Center arrows (near origin, magnitude ≈ 0) are very short/stubby, making direction
    hard to read at the center of the rotation field
  - Typography hierarchy is weak — the title uses the same weight as axis labels;
    making the title bold would improve visual prominence
  - Design storytelling is minimal — the viridis gradient naturally guides the eye
    but there is no deliberate emphasis or narrative element pointing to the rotation
    axis
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white
      Chrome: Title "quiver-basic · plotnine · anyplot.ai" clearly readable in dark ink. X-axis "East (km)" and Y-axis "North (km)" both readable. Tick labels (-4 to 4) legible in INK_SOFT (#4A4A44). Legend "Magnitude" with colorbar (0–4) readable and well-placed to the right.
      Data: 15x15 grid of arrows colored by viridis — dark purple at center (low magnitude) graduating to bright yellow-green at the outer corners (high magnitude). Counter-clockwise rotation pattern immediately apparent. Closed arrowheads clearly show direction. Grid lines barely visible (alpha=10%).
      Legibility verdict: PASS — all text readable against light background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black
      Chrome: Title, axis labels, and tick labels all render in light ink (#F0EFE8 / #B8B7B0), clearly readable against the dark background. Legend box has elevated dark fill (#242420) with light text. No dark-on-dark failures observed.
      Data: Data colors are identical to the light render — viridis gradient from purple (center) to yellow-green (corners) is unchanged, confirming only chrome flips between themes. Arrows clearly visible against dark surface.
      Legibility verdict: PASS — all text readable against dark background, no dark-on-dark issues.
