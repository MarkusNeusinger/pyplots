  image_description: 'The plot displays a connected scatter plot of US Phillips Curve
    Dynamics from 1990-2023. Points representing unemployment rate (x-axis) vs. inflation
    rate (y-axis) are connected by lines in temporal order. A blue sequential color
    gradient runs from very light blue (1990) to dark navy blue (2023), applied to
    both scatter points and connecting lines. A vertical color bar on the right maps
    colors to years. Key years are annotated: "1990" (with right arrow), 1999, 2009,
    2015, 2020, 2022, and "2023" (with left arrow). Points have white borders. The
    background is light gray with subtle gridlines. Axis lines and ticks are removed
    for a clean look. The early-year (1990s) points and lines are very faint light
    blue, nearly blending into the background. The middle region (unemployment 4-6%,
    inflation 1.5-3.5%) shows a tangle of crossing paths.'
