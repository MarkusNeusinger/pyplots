  image_description: 'The plot displays a hydrogen atom energy level diagram on a
    16:9 canvas. Six horizontal blue (#306998) lines represent energy levels n=1 through
    n=6, positioned on a sqrt-compressed y-axis with custom tick labels showing real
    energy values (0, -0.5, -1, -2, -4, -8, -14 eV). Each level is labeled on the
    right with "n = X" (fontsize 18) and on the left with its energy in eV (fontsize
    15). A dashed gray line at the top marks the ionization limit at 0 eV. Downward
    purple arrows on the left side represent the Lyman series (UV, 5 transitions from
    n=2-6 to n=1). On the right side, four colored arrows represent the Balmer series:
    H-alpha in red (656 nm), H-beta in cyan-blue (486 nm), H-gamma in blue-violet
    (434 nm), and H-delta in dark violet (410 nm). Italic series labels identify each
    group. A legend in the lower right lists all transition colors and wavelengths.
    Top, right, and bottom spines are removed; a subtle y-axis grid (alpha=0.15) is
    present. The title reads "Hydrogen Emission Spectrum · energy-level-atomic · matplotlib
    · pyplots.ai".'
