  image_description: 'The plot displays an Ashby material selection chart on log-log
    axes. The x-axis shows "Density (kg/m³)" ranging from ~30 to ~20,000, and the
    y-axis shows "Young''s Modulus (GPa)" from ~0.001 to ~300+. Seven material families
    are rendered as semi-transparent colored elliptical envelopes with individual
    scatter points inside: Metals (steel blue, upper right), Polymers (warm orange,
    center), Ceramics (teal, upper center), Composites (violet, upper center), Elastomers
    (rose, lower center), Foams (sky blue, lower left), and Natural Materials (amber/gold,
    center-left). Each family has a bold black text label, with dotted leader lines
    connecting displaced labels to their envelope centers. Three dashed diagonal guide
    lines labeled E/ρ = 10⁻³, 10⁻², 10⁻¹ show constant performance indices. A legend
    titled "Material Family" appears on the right. The background is light gray with
    a white panel, subtle grid lines, and no minor grid. Title: "scatter-ashby-material
    · letsplot · pyplots.ai" with subtitle "Young''s Modulus vs Density — Material
    Selection Landscape".'
