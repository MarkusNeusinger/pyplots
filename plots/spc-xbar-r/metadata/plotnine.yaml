  - Could leverage more distinctive plotnine features (e.g., annotate for zone shading,
    coord_cartesian for axis limits)
  image_description: |-
    The plot displays a two-panel SPC chart for CNC shaft diameter monitoring. The top panel is the X̄ Chart showing sample means (mm), the bottom is the R Chart showing sample ranges (mm), both sharing a Sample Number x-axis (1–30). The title reads "CNC Shaft Diameter Monitoring · spc-xbar-r · plotnine · pyplots.ai" in bold dark text at the top.

    In the X̄ chart, a semi-transparent steel blue line connects 30 data points (blue circles). Three out-of-control points appear as larger red diamonds: sample 8 (above UCL), sample 19 (below LCL), and sample 25 (above UCL). Horizontal reference lines include a solid steel blue center line (CL ≈ 25.000), dashed red UCL/LCL lines, and dotted amber UWL/LWL lines. Left-edge labels (UCL, UWL, CL, LWL, LCL) have white background fills for readability.

    In the R chart, similar styling shows one prominent OOC red diamond at sample 25 (range ≈ 0.21, well above UCL ≈ 0.11). Normal points cluster between 0.02–0.09. Labels (UCL, UWL, CL, LWL) are on the left edge. The background is light gray, strip headers have gray backgrounds, and only subtle horizontal gridlines appear. The overall design is clean and professional with a clear color-coding system for control limits.
