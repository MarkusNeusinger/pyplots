review:
  strengths:
  - 'Strong theme-adaptive chrome throughout: all font, grid, background, and annotation
    colors correctly flip between light and dark using the canonical token set'
  - 'Plotly-specific interactivity leveraged well: custom hovertemplate with month-name
    customdata, spike lines, hovermode=''x'', and HTML export'
  - Area fill (fill='tozeroy' with rgba BRAND_FILL) adds meaningful visual weight
    and seasonal storytelling without chartjunk
  - Peak annotation with themed bgcolor/bordercolor/font creates a clear focal point
    and story
  - All font sizes explicitly set well above minimum guidelines (title 36, axes 28,
    ticks 22)
  - 'Perfect spec compliance: single line, markers, grid, descriptive axis labels
    with units, correct title format'
  - Realistic and neutral dataset (monthly temperature with sinusoidal seasonal pattern,
    seed-fixed)
  weaknesses:
  - Both X and Y grid lines are enabled; the style guide recommends Y-axis grid only
    for line charts — removing the X-axis grid would reduce visual noise and better
    follow the minimalism principle
  - 'DE-01 ceiling: strong design but not quite at publication-ready level — typography
    could use weight variation (e.g. heavier title) and the annotation styling could
    be more polished (soft drop shadow or bolder arrow)'
  - 'LM-02: spike lines and hover tooltips are distinctively plotly, but the static
    PNG does not showcase them — consider adding a visible interactive element hint
    or making the area fill gradient more striking in the static render'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white.
      Chrome: Title "line-basic · plotly · anyplot.ai" is dark, centered, clearly readable. Y-axis label "Temperature (°C)" and X-axis label "Month" are dark and legible. Tick labels (Jan–Dec and 0–30) are rendered in INK_SOFT dark gray, clearly readable against the warm background. Axis border lines are subtle gray (INK_SOFT).
      Data: Single line in brand green #009E73, width=5, with circular markers of size=18 on each of the 12 monthly data points. Area fill below the line uses rgba(0,158,115,0.12) — a very light mint green that emphasizes the seasonal magnitude. Peak annotation box ("Peak: 29.4°C") appears with warm-white elevated background (#FFFDF6), dark text (#1A1A17), and gray border — correctly themed.
