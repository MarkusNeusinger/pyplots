  image_description: The plot displays two vertically stacked subplots sharing the
    x-axis labeled "Lag" (0-36). The top subplot shows the ACF (Autocorrelation Function)
    with vertical stem lines from 0 to each correlation value. Lag 0 has ACF=1.0,
    with a slow decay pattern showing periodic spikes around lags 12, 24, and 36,
    indicating seasonality. The bottom subplot shows the PACF (Partial Autocorrelation
    Function) starting from lag 1, with a dominant spike at lag 1 (~0.92), significant
    negative values at lags 2-4, and periodic significant values at early lags, with
    most values beyond lag 16 falling within the confidence bounds. Both subplots
    use dark blue (#306998) stems/markers for statistically significant values and
    light blue (#a8c4d8) for insignificant ones, with marker size differentiation.
    Red dashed horizontal lines mark the 95% confidence bounds, with a very subtle
    pink shaded band between them. The background is a light blue-gray (#fafbfd).
    Top and right spines are removed. Title reads "acf-pacf · matplotlib · pyplots.ai".
