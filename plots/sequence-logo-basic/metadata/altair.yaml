  image_description: 'The plot shows a sequence logo visualization for a 10-position
    DNA motif. Colored stacked bars represent nucleotide contributions at each position,
    with letter labels overlaid on each segment. Colors follow standard DNA conventions:
    A=green, C=blue, G=orange/yellow, T=red. The Y-axis shows "Information Content
    (bits)" from 0 to 2.0 with subtle dashed gridlines. The X-axis shows "Position"
    (1-10). Positions 3 and 4 show tall orange G-dominated bars (~1.6 bits), positions
    5 and 6 show tall green A-dominated bars. Positions 1, 8, and 10 have very low
    bars (low conservation). A core region annotation at the top labels "CCGGAAGT
    core (pos 2-9)" with subtle blue-gray background shading over the core positions.
    Non-core positions have reduced opacity (0.45 vs 0.95). The title reads "sequence-logo-basic
    · altair · pyplots.ai" with informative subtitles. A legend on the right identifies
    nucleotide colors.'
