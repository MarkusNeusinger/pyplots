review:
  strengths:
  - Excellent Stephen Few-inspired design with grayscale qualitative bands and thin
    target markers
  - Above/below target color coding (dark blue vs muted blue) provides immediate performance
    insight
  - HoverTool with custom tooltips and dual PNG+HTML export leverages Bokeh interactive
    strengths
  - Clean typography with explicit font sizes, bold metric labels, and color-matched
    value labels
  - Perfect spec compliance with all required bullet chart features present
  - Realistic plausible sales performance data with varied metric types
  weaknesses:
  - Variable-height qualitative bands are unconventional compared to Stephen Few equal-height
    standard
  - Vertical spacing between bullet rows is generous reducing canvas utilization to
    ~65-70%
  image_description: 'The plot displays 5 horizontal bullet charts stacked vertically
    for sales performance metrics: Revenue ($K), Profit ($K), Orders, Customers, and
    Satisfaction (/5). Each bullet has three grayscale background bands representing
    Poor (dark gray #737373), Satisfactory (medium gray #a8a8a8), and Good (light
    gray #d4d4d4) qualitative ranges with varying heights (narrower for Poor, wider
    for Good). The actual value is shown as a narrow horizontal bar — dark blue (#306998)
    when above target (Revenue, Customers) or muted blue (#7a9bb5) when below target
    (Profit, Orders, Satisfaction). A thin black vertical marker indicates the target
    for each metric. Value labels in matching bar color appear to the right of each
    bar (275, 85, 320, 1450, 4.2). The title "bullet-basic · bokeh · pyplots.ai" is
    centered at top in dark gray. The x-axis shows "% of Maximum Range" with ticks
    at 0, 20, 40, 60, 80, 100. A custom legend at the bottom shows colored rectangles
    for Poor, Satisfactory, Good, and Target entries. The overall design follows Stephen
    Few''s bullet chart convention with a clean, professional appearance.'
