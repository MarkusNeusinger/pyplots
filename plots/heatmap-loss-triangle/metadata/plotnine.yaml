  image_description: The plot displays a 10x10 heatmap grid with accident years 2015-2024
    on the y-axis and development periods 1-10 on the x-axis. Each cell contains a
    formatted cumulative amount value with thousands separators. The color scheme
    uses a sequential blue gradient from light blue/white (low values around 3,000)
    to dark navy (high values around 30,000). Actual values in the upper-left triangle
    appear with full opacity while projected values in the lower-right triangle appear
    faded/translucent. White borders separate each cell. The title reads "heatmap-loss-triangle
    · plotnine · pyplots.ai" in bold, with subtitle "Cumulative Paid Claims — Actual
    (solid) vs Projected (faded)". A colorbar legend on the right shows "Cumulative
    Amount" with the gradient scale. The layout is clean with no grid lines and a
    white background.
