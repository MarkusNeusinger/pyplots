  strengths:
  - Excellent astronomical data quality with real star names, coordinates, and magnitudes
    across 25+ constellations
  - Strong thematic dark-sky design with cohesive color palette (warm star tones,
    blue constellation lines, gold ecliptic)
  - Good use of magnitude-to-size mapping creating natural visual hierarchy
  - Clean, well-structured code with appropriate complexity
  - Leverages Plotly Scattergl for performance and hover tooltips for interactivity
  weaknesses:
  - Label overlap in crowded regions (Orion area, Bootes/Arcturus, Canis Minor/Procyon)
  - Uses flat Cartesian projection instead of the stereographic/azimuthal projection
    specified in the spec
  - Missing Milky Way band (noted as optional in spec but would enhance the chart)
  image_description: The plot displays a star chart on a dark navy background (#0A0E1A)
    with paper background (#060A14). Stars are rendered as cream/white circular markers
    with sizes proportional to brightness (brighter stars like Sirius, Vega, and Rigel
    appear as large dots; dimmer stars appear smaller). Approximately 90+ named stars
    are plotted across 25+ constellations, with ~200 small background stars scattered
    throughout. Constellation stick-figure lines are drawn in semi-transparent cornflower
    blue connecting star pairs. Constellation names (e.g., "Orion", "Ursa Major",
    "Cassiopeia", "Scorpius") appear in light blue text near each constellation's
    centroid. The brightest stars (mag < 0.5) have individual name labels in faint
    blue-white text. A dashed orange/gold ecliptic line curves across the chart. The
    x-axis shows Right Ascension (reversed, 24h to 0h) and the y-axis shows Declination
    (-75° to +75°). Grid lines are subtle dark blue. The title reads "star-chart-constellation
    · plotly · pyplots.ai" in light blue at the top center.
