  image_description: 'The plot displays a dual-panel Bode plot for an open-loop transfer
    function G(s) = 10/[(s+1)(s/5+1)(s/20+1)]. The top panel shows magnitude in dB
    (blue line, #306998) against logarithmic frequency (Hz), starting at ~20 dB and
    rolling off to below -130 dB. A dashed 0 dB reference line is labeled on the right.
    The bottom panel shows phase in degrees (orange line, #e67e22), starting near
    0° and rolling off past -270°. A dashed -180° reference line is labeled on the
    right. Diamond markers indicate the gain crossover point on both panels, with
    a teal (#16a085) diamond on the phase plot and a blue diamond on the magnitude
    plot. Circle markers (#d35400) indicate the phase crossover. Dashed connector
    lines show gain margin (GM = 9.9 dB, in dark orange) and phase margin (PM = 32.4°,
    in teal) with annotation labels. The background is light gray (#fafbfc) with white
    plot areas. A dashed separator line divides the two panels. The legend in the
    top-right lists Magnitude, Phase, PM = 32.4°, and GM = 9.9 dB. Title reads "bode-basic
    · highcharts · pyplots.ai" with a subtitle showing the transfer function.'
