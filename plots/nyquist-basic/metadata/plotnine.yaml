  image_description: 'The plot displays a Nyquist diagram on the complex plane with
    "Real Axis [dimensionless]" on the x-axis and "Imaginary Axis [dimensionless]"
    on the y-axis. The title reads "nyquist-basic · plotnine · pyplots.ai" in bold
    at the top. Two curves are shown: a solid dark blue line for positive frequencies
    (ω > 0) that spirals from the upper-right (~5, -0.8 at low ω) counterclockwise
    through the lower half-plane and converges toward the origin, and a dashed lighter
    blue line for negative frequencies (ω < 0) that mirrors it above the real axis.
    A dashed gray unit circle is centered at the origin with a subtle shaded stability
    region fill inside. The critical point (-1, 0) is marked with a bold red "X" and
    labeled in red. A purple circle marks the gain crossover point with annotation
    "ω = 2.5 rad/s · PM = 33°" in the lower-left. An orange square marks the phase
    crossover point with annotation "ω = 4.1 rad/s · GM = 7.8 dB" in the upper-left.
    Five blue dots along the positive-frequency curve are labeled with frequency values
    (ω = 0.1, 0.3, 0.7, 1.5, 3). Dark arrows indicate the direction of increasing
    frequency on both curves. A legend at the bottom distinguishes positive and negative
    frequency curves. The aspect ratio is 1:1.'
