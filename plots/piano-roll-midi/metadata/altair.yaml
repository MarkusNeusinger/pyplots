  image_description: 'The plot displays a piano roll visualization of MIDI notes across
    8 measures (M1-M9) on the x-axis and pitch names (G#2 to G#5) on the y-axis. Horizontal
    bars represent individual notes, with bar length encoding duration. The background
    alternates between white and light gray rows to distinguish white and black piano
    keys. Note bars are colored using the viridis colormap based on velocity - dark
    purple/blue for soft notes (~40) through teal/green to yellow for loud notes (~120).
    A vertical color legend labeled "Velocity" appears on the right. Dashed gray vertical
    lines mark individual beats, with stronger solid lines at measure boundaries.
    The title reads "piano-roll-midi · altair · pyplots.ai" centered at the top. Three
    distinct musical layers are visible: bass notes in the lower octaves (C3 area),
    chord voicings in the middle range (C4-A4), and a melody line in the upper range
    (B4-G5). Corner-radius styling gives note bars a polished rounded appearance.'
