  - Risk name data labels (26px) could be slightly larger for better visibility at
    this canvas size
  - Not using the highcharts-core Python API as recommended
  image_description: 'The plot shows a 5x5 heatmap grid representing a risk assessment
    matrix. The x-axis is labeled "Impact" with categories Negligible, Minor, Moderate,
    Major, and Catastrophic. The y-axis is labeled "Likelihood" with categories Rare,
    Unlikely, Possible, Likely, and Almost Certain. Each cell displays its risk score
    (likelihood x impact) as a number. The background gradient transitions from steel
    blue (low scores) through light blue, pale yellow, and orange to deep red (high
    scores like 25). Fourteen risk items are plotted as colored circle markers with
    white borders and text labels: Technical risks in dark blue, Financial in purple,
    and Operational in teal. Zone labels (LOW, MEDIUM, HIGH, CRITICAL) appear as bordered
    annotation boxes. The title reads "heatmap-risk-matrix · highcharts · pyplots.ai"
    with a subtitle explaining the scoring formula and zones. A legend on the right
    shows the three categories. The overall background is off-white.'
