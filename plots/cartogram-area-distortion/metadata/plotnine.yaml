  strengths:
  - Excellent layered grammar of graphics approach with multi-layer cartogram (reference
    outlines + scaled polygons + labels + annotations)
  - Custom colorblind-safe gradient palette that is visually appealing
  - Thoughtful data storytelling with top-3 highlighting, explanatory subtitle, and
    guiding annotations
  - Clean fully deterministic code with no unnecessary complexity
  - Reference outlines (dashed) provide geographic context alongside distorted polygons
  weaknesses:
