review:
  strengths:
  - Perfect spec compliance with all required features (black-key shading, beat/measure
    grid, note names, velocity colorbar)
  - Musically authentic data representing a real I-V-vi-IV chord progression with
    melody
  - Clean, deterministic code with good structure and no unnecessary complexity
  - Good use of Plotly features for interactivity (hover tooltips, HTML export)
  weaknesses:
  - Large empty pitch gap between bass (~C3-G3) and treble (~C5-G5) regions wastes
    ~1/3 of vertical space
  - Color scale is not perceptually uniform — should use viridis, plasma, or similar
    colorblind-safe colormap
  - Y-axis tick font at 14pt is below the 16pt minimum; dense pitch labels are hard
    to scan
  - No visual storytelling — melody and accompaniment are given equal visual weight
    with no emphasis or hierarchy
  - Manual RGB interpolation for note colors does not exactly match the colorbar colorscale
    definition
  image_description: The plot displays a MIDI piano roll visualization with the title
    "piano-roll-midi · plotly · pyplots.ai" centered at the top. The y-axis is labeled
    "Pitch" and shows note names from E2 at the bottom to G#5 at the top, with alternating
    white and light gray row backgrounds to distinguish white keys from black keys
    on a piano. The x-axis is labeled "Beat Position" with measure.beat notation (M1.1
    through M5.1). Vertical lines mark measure boundaries (thicker, darker) and individual
    beat divisions (thinner, lighter). Notes are drawn as horizontal colored rectangles
    — blue/purple for softer velocities and orange/red for louder velocities. A colorbar
    on the right shows the "Velocity" scale from ~68 to 120. The data shows a chord
    progression with bass notes (C3-G3 area) and melody notes (C5-G5 area), with a
    large empty gap of ~13 semitones in the middle of the pitch range where no notes
    exist. The overall layout is clean with a white background.
