    points (Period-2 at r≈3.0, Period-4 at r≈3.449, Period-8 at r≈3.544) with text
    annotations. The title reads "bifurcation-basic · seaborn · pyplots.ai". Top and
    right spines are removed. A legend in the upper-left identifies the three regimes.'
