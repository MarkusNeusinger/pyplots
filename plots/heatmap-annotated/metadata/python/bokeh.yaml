      Legibility verdict: PASS — all text elements clearly readable against the warm off-white surface.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface. Page border fill is also dark.
      Chrome: Title and axis labels adapt correctly to dark theme (light text visible). Variable name tick labels on y-axis and rotated x-axis labels are light-colored and readable. HOWEVER: ColorBar major_label_text_color and title_text_color are NOT set in code — they default to Bokeh's default (black). With the border_fill_color = #1A1A17, the colorbar panel background is dark, causing the numeric scale labels (−0.8, −0.6, ..., 0.8, 1) and "Pearson Correlation" title text to appear as dark text on near-black background. This is a dark-on-dark failure for the colorbar text elements.
      Data: Cell fill colors are identical to light render — BrBG palette browns and teals unchanged (Okabe-Ito positions 1–7 are theme-invariant; continuous data colors are also theme-invariant). Cell annotation text (white/black based on |val|>0.5) renders correctly.
      Legibility verdict: PARTIAL FAIL — main plot labels and title are readable, but colorbar scale labels and title are unreadable (dark-on-dark) in the dark render.
