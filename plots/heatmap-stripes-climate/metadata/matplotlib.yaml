  image_description: The plot displays climate warming stripes — a sequence of 175
    vertical colored bars (1850-2024) rendered as a single-row heatmap. The left side
    shows predominantly deep and medium blues representing negative temperature anomalies
    (cooler years). The center transitions through lighter blues and whites (near-zero
    anomalies around mid-20th century). The right side progresses through salmon,
    orange-red, and deep crimson indicating increasingly positive anomalies (recent
    warming). The title "heatmap-stripes-climate · matplotlib · pyplots.ai" appears
    at the top in dark gray (#333333) with a subtle white stroke path effect. The
    background is light gray (#f7f7f7) matching the colormap center. No axes, labels,
    ticks, or gridlines are present — a faithful minimalist warming stripes visualization.
    The stripes occupy roughly the upper 56% of the canvas at a ~3:1 aspect ratio.
