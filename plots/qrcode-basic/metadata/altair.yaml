review:
  strengths:
  - Uses the qrcode library to generate a real, scannable QR code (not manually constructed)
  - Proper quiet zone implementation with 4-module padding
  - Interactive tooltips classifying QR regions (Finder Pattern, Timing Pattern, Data)
    add educational value
  - Clean, deterministic code with no unnecessary complexity
  - Perfect spec compliance — all required features present
  weaknesses:
  - Region classification (Finder Pattern, Timing Pattern, Data, Quiet Zone) is computed
    but only visible via tooltips — visual color-coding of regions would improve design
    excellence and data storytelling
  - Title font size could be larger and more prominent for the 3600x3600 canvas
  - Generic Altair usage — could leverage more distinctive features like conditional
    color encoding or layered composition
  image_description: The plot shows a square QR code rendered using Altair's mark_rect
    on a white background. The title "qrcode-basic · altair · pyplots.ai" appears
    at the top in black text. The QR code has three finder patterns (concentric square
    markers) in the top-left, top-right, and bottom-left corners. A proper quiet zone
    (white border) surrounds the QR code. The modules are rendered as crisp black
    and white squares with no visible gaps or artifacts. The overall layout is clean
    and square-formatted (~3600x3600 px). No axes or grid lines are visible.
