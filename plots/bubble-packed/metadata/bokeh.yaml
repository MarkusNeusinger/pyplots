    Support, Design, HR, QA), and purple (#6C3483) for <$10M (Legal, Security). Each
    circle contains white text showing the department name (bold) and dollar value
    below it, with font sizes adapted to circle radius. A styled legend in the top-right
    corner shows the four budget tiers. No axes are displayed, which is appropriate
    for this chart type.'
