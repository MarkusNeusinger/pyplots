  strengths:
  - 'Excellent data choice: realistic web server CPU profiling scenario with meaningful
    function names and hierarchical call structure'
  - 'Smart label truncation: estimates bar pixel width and shows full label, name
    only, truncated, or none based on available space'
  - Professional flame graph aesthetic with warm color palette, monospace font, and
    text outline for readability
  - Good visual hierarchy — the hot path (query_database → execute_sql → fetch_rows)
