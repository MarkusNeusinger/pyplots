  image_description: 'The plot displays a water pressure-temperature phase diagram.
    The x-axis shows Temperature (K) from 200 to ~650+, and the y-axis shows Pressure
    (Pa) on a logarithmic scale from ~0.4 to 100,000,000. Three phase boundary curves
    are drawn: a blue sublimation curve (Solid-Gas) rising steeply from lower-left
    to the triple point, an orange vaporization curve (Liquid-Gas) extending from
    the triple point rightward/upward to the critical point, and a teal melting curve
    (Solid-Liquid) running nearly vertically with a slight negative slope (correct
    for water). A rose/red dot marks the triple point (~273 K, ~612 Pa) and a purple
    dot marks the critical point (~647 K, high pressure) at the far right. Semi-transparent
    phase region labels are present: SOLID in the upper-left area, LIQUID in the upper-center,
    GAS in the lower-right, and SUPERCRITICAL FLUID in the upper-right beyond the
    critical point. Labels use letter-spacing and reduced opacity for a subtle appearance.
    The background is white with a light #fafbfc plot background and dashed grid lines.
    The legend at the bottom lists all five series with descriptive labels including
    coordinate values for the special points.'
