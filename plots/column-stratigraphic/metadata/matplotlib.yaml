  image_description: 'The plot displays a vertical stratigraphic column spanning 0-200m
    depth (increasing downward). Ten geological layers are shown as stacked rectangular
    blocks, each filled with a distinct hatch pattern and color: sandstone (wheat
    with dot stipple), shale (gray with horizontal dashes), limestone (light blue
    with cross/plus pattern), siltstone (tan with diagonal lines), and conglomerate
    (burlywood with circle pattern). Formation names (Ogallala Fm, Arikaree Fm, White
    River Fm, Chadron Fm, Niobrara Fm, Carlile Shale, Greenhorn Fm, Dakota Fm, Morrison
    Fm, Entrada Fm) are labeled in bold to the right of each layer. Age labels (Miocene,
    Oligocene, Eocene, Cretaceous, Jurassic) appear in italics on the left with bracket
    lines spanning their respective depth ranges. A red wavy line marks an unconformity
    between the Eocene and Cretaceous at 72m depth with an italic red "unconformity"
    label. The y-axis is labeled "Depth (m)" and the title reads "column-stratigraphic
    · matplotlib · pyplots.ai". A horizontal legend at the bottom shows all 5 lithology
    types with their patterns. Top, right, and bottom spines are removed; a subtle
    dashed grid is visible on the y-axis.'
