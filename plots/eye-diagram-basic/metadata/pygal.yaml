review:
  strengths:
  - Oscilloscope-themed dark background with viridis palette is domain-appropriate
    and visually striking
  - Complete spec compliance including optional eye height/width measurement annotations
  - Realistic NRZ signal simulation with proper engineering parameters (400 traces,
    5% noise, 3% jitter)
  - Interactive HTML export with per-point density percentage tooltips leverages pygal
    native SVG capabilities
  - 10-band density gradient with 4-pass smoothing filter produces reasonable color
    gradation
  weaknesses:
  - Dot-matrix rendering inherent to pygal XY scatter creates visible discrete grid
    rather than smooth continuous density
  - Eye measurement annotation dots/lines are barely visible against the density field
  - Legend with 12 items in 2 rows is somewhat crowded
  - Most computation is numpy-based with pygal used primarily as a final renderer
  image_description: The plot renders an eye diagram on a dark navy/indigo (#0a0a2e)
    background with oscilloscope-style aesthetics. The title "eye-diagram-basic ·
    pygal · pyplots.ai" is displayed at the top in light text using monospace (Courier
    New) font. The X-axis labeled "Time (UI)" spans 0 to 2 with ticks at 0.25 increments.
    The Y-axis labeled "Voltage (V)" ranges from -0.2 to 1.2. The eye pattern is rendered
    as a fine grid of colored dots (240x140 resolution, dots_size=5) using a 10-stop
    viridis-inspired palette from dark purple (#440154, minimal density) through blue,
    teal, green to bright yellow (#fde725, peak density). Two clear eye openings are
    visible centered at ~0.5 UI and ~1.5 UI. High-density yellow/green bands concentrate
    at the 0V and 1V NRZ signal levels, with lower-density purple/blue at transition
    edges. Small eye measurement annotation dots are visible for eye height and eye
    width, rendered with dashed stroke lines. A 2-row legend at the bottom shows 10
    density band names (Minimal through Peak) plus Eye Height and Eye Width labels
    across 6 columns. The overall aesthetic is professional and domain-appropriate,
    resembling an oscilloscope display.
