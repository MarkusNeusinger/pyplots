review:
  strengths:
  - Perfect spec compliance with all bullet chart elements correctly implemented (qualitative
    ranges, actual bars, target markers, stacked layout, actual value labels)
  - Performance-coded colors (teal/amber) create strong visual hierarchy and data
    storytelling — viewer immediately sees above/below target performance
  - Excellent data quality with 7 realistic sales KPIs spanning multiple domains (currency,
    count, rating, percentage)
  - Programmatic SVG coordinate extraction from serie-0 bars is robust and maintainable
  - Clean proportional font and removed leader lines improve polish over earlier attempts
  weaknesses:
  - Library mastery constrained by pygal lack of native bullet chart support — ~40%
    of code is SVG manipulation
  - Some inter-row vertical spacing could be tighter for a more compact bullet chart
    appearance
  - Target markers, while functional, could be slightly more prominent
  - Overall design is solid but falls short of publication-quality polish
  image_description: 'The plot displays a horizontal bullet chart with 7 sales KPI
    metrics stacked vertically (bottom to top): Revenue ($275K), Profit ($85K), New
    Orders (320), Customers (1450), Satisfaction (4.2/5), Avg Deal Size ($42K), and
    Retention (92%). Each metric row has three grayscale background bands representing
    qualitative ranges: lightest gray for Poor (0-50%), medium gray for Satisfactory
    (50-75%), and darker gray for Good (75-100%). Actual value bars are overlaid using
    performance-coded colors — teal (#2A9D8F) for above-target metrics (Revenue, Customers,
    Retention) and amber (#D4770B) for below-target metrics (Profit, New Orders, Satisfaction,
    Avg Deal Size). The actual bars are narrower than the background bands (~42% of
    band height) following the classic bullet chart layered design. Thick black vertical
    rectangle markers indicate target positions for each metric. The x-axis runs from
    0 to 100 labeled "Performance (% of Maximum)" with dotted vertical guide lines
    at intervals of 10. Y-axis labels include metric names with actual values in parentheses
    (e.g., "Revenue ($275K)"). Dashed leader lines have been removed for a cleaner
    appearance. The title "bullet-basic · pygal · pyplots.ai" appears centered at
    top in a proportional font (DejaVu Sans). A legend at bottom identifies six element
    types: Poor (0-50%), Satisfactory (50-75%), Good (75-100%), Above Target, Below
    Target, and Target.'
