  image_description: The plot displays a candlestick chart showing 30 trading days
    of stock price data from January 2 to approximately February 10, 2024. Blue candles
    represent bullish (up) days and orange candles represent bearish (down) days.
    The price starts around $145, rallies to a peak near $152 by mid-January (Jan
    16), then reverses into a selloff reaching approximately $134 by the end. Candle
    bodies are well-proportioned with clearly visible thinner wicks extending above
    and below. The background is light gray (#f8f9fa) with subtle horizontal grid
    lines. Top and right spines are removed. The title reads "candlestick-basic ·
    seaborn · pyplots.ai" in a medium-weight font at the top. X-axis shows "Date"
    with labels every 5 trading days (Jan 02, Jan 09, Jan 16, Jan 23, Jan 30, Feb
    06). Y-axis shows "Price ($)" ranging from 130 to 155. A legend in the upper left
    identifies "Bullish" (blue) and "Bearish" (orange) with color patches.
