    label at the bottom. A light orange shaded band marks the yield plateau. "Strain
    Hardening" and "Necking" italic labels appear at the bottom of their respective
    regions. An orange dot marks the Yield Point (0.2% Offset) with an arrow annotation.
    A red dot marks UTS (~400 MPa at strain ~0.22) with an arrow annotation. A brown
    X marker marks the Fracture point (~300 MPa at strain 0.35) with annotation. A
    gray dashed 0.2% offset line is drawn parallel to the elastic slope. An annotation
    "E = 210,000 MPa" with arrow points to the elastic region slope. The legend shows
    "0.2% Offset Line". Top and right spines are removed, with a subtle y-axis grid.
