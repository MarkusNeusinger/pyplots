  image_description: The plot displays a Mohr's Circle for a 2D stress state (σx=80
    MPa, σy=−30 MPa, τxy=40 MPa) rendered in Highcharts on a white background using
    a square 3600×3600 canvas. A smooth blue circle (#306998) is centered at (25,
    0) with a radius of ~68 MPa, appearing as a true circle due to equal aspect ratio
    handling. Two red circular markers label stress points A (80, 40) in the upper-right
    quadrant and B (−30, −40) in the lower-left, connected by a gray dashed diameter
    line. Teal diamond markers on the horizontal axis mark principal stresses σ₁ =
    93.0 MPa (right) and σ₂ = −43.0 MPa (left). Purple triangle markers (up/down)
    indicate τmax = 68.0 MPa at the top and τmin = −68.0 MPa at the bottom. A small
    dark circle marks center C (25.0, 0) with its label offset below. An orange arc
    near the center shows the angle 2θp = 36.0° with label positioned clearly in open
    space. Very subtle grid lines (6% opacity) and dashed reference lines pass through
    the center both horizontally and vertically. Axis spines are removed. The x-axis
    is labeled "Normal Stress σ (MPa)" ranging from about −70 to 120, and the y-axis
    "Shear Stress τ (MPa)" from −95 to 95. The title "mohr-circle · highcharts · pyplots.ai"
    appears in bold dark text at top with a gray subtitle showing the input stress
    state. All annotations have white text outlines for readability. The square canvas
    eliminates the horizontal whitespace from the previous landscape version, and
    the circle fills the plot area well with balanced margins.
