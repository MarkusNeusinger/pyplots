review:
  strengths:
  - Excellent use of Highcharts plotLines for LSL/USL/Target/Mean reference lines
    with styled labels
  - All font sizes explicitly set for high-resolution rendering at 4800x2700
  - Capability indices (Cp, Cpk) prominently displayed in subtitle with full statistical
    context
  - Clean well-structured code with proper Selenium export pattern
  - Realistic manufacturing scenario with appropriate data values
  weaknesses:
  - Legend is not visible in the rendered plot despite being configured in code
  - Red-green color combination for LSL/USL vs Target lines is not colorblind-optimal
  - Target and Mean labels positioned very close together risking overlap
  - Design could be more polished with more refined grid and background
  - No out-of-spec data points shown to better demonstrate analytical purpose
  image_description: The plot displays a histogram of 200 shaft diameter measurements
    in dark blue (#306998) column bars on a light gray (#fafbfc) background. An orange
    (#e67e22) spline curve represents the fitted normal distribution overlaid on the
    histogram. Red dashed vertical lines mark LSL = 9.95 (left edge) and USL = 10.05
    (right edge). A green dotted vertical line marks Target = 10.0 near the center,
    and a blue dashed line marks Mean = 10.0015. The title reads "Shaft Diameter Process
    Capability · histogram-capability · highcharts · pyplots.ai" with a subtitle showing
    n = 200, Cp = 1.49, Cpk = 1.45, Mean = 10.0015 mm, σ = 0.0112 mm. The x-axis is
    labeled "Shaft Diameter (mm)" and the y-axis "Frequency". The distribution is
    roughly bell-shaped centered near 10.00 mm, with most data between 9.97 and 10.03
    mm, well within spec limits. The legend is not visibly rendered in the screenshot.
