  image_description: 'The plot displays a multi-track genome browser view of the HOXA
    gene cluster on chromosome 7 (chr7:27.20-27.28 Mb). Four horizontal tracks are
    stacked vertically sharing a common genomic x-axis formatted in megabases. Track
    1 (Genes): Four genes (HOXA1-HOXA4) shown with dark blue rounded rectangles for
    exons connected by thin blue intron lines, with chevron arrows indicating strand
    direction (right-pointing for + strand, left-pointing for - strand on HOXA3).
    Gene names labeled above with white stroke outlines. Light blue-gray background.
    Track 2 (Coverage): A filled area plot in soft blue showing RNA-seq read depth
    (0-~120), with distinct peaks at exon positions and low baseline in intergenic
    regions. Subtle y-grid lines. White background. Track 3 (Variants): Lollipop plot
    with 15 variants - orange circles for SNPs and brown diamonds for indels - stem
    height encoding quality scores (0-100). Legend in upper right. Light blue-gray
    background. Track 4 (Regulatory): Colored rounded rectangles - green Promoters,
    orange Enhancers, purple Insulators - with single-letter labels inside larger
    elements. Three-column legend. White background. Title: "genome-track-multi ·
    matplotlib · pyplots.ai". X-axis: "Genomic Position — chr7 (Mb)".'
