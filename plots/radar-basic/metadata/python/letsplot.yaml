    instead of required [#009E73, #D55E00] (Okabe-Ito positions 1-2) — VQ-07 = 0'
  - 'No ANYPLOT_THEME environment variable detection; hardcoded text colors (#333333
    for labels, #666666 for values) will fail in dark theme since these dark grays
    are near-invisible on #1A1A17 background'
  - Output saves to plot.png/plot.html instead of f"plot-{THEME}.png"/f"plot-{THEME}.html"
