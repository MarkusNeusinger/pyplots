  - H-gamma and H-delta arrow colors (blue-violet and purple) are somewhat similar,
    potentially challenging for some viewers
  image_description: 'The plot displays a hydrogen atom energy level diagram with
    six horizontal blue lines representing energy levels n=1 through n=6, positioned
    vertically using a sqrt-compressed energy scale. Each level is labeled on the
    right with its quantum number (n = 1 through n = 6) and on the left with its energy
    value in eV (-13.60 to -0.38 eV). A dashed gray line at 0 eV marks the ionization
    limit. Lyman series transitions are shown as downward gold/orange arrows on the
    left side connecting upper levels to n=1, while Balmer series transitions appear
    on the right side as color-coded downward arrows to n=2: red (H-alpha 656 nm),
    cyan-blue (H-beta 486 nm), blue-violet (H-gamma 434 nm), and purple (H-delta 410
    nm). Italic series labels identify each group. A legend in the lower right lists
    all transition colors with wavelengths. The y-axis is labeled "Energy (eV)" with
    custom tick values. Top, right, and bottom spines are removed; a subtle y-axis
    grid is present. The title reads "energy-level-atomic · matplotlib · pyplots.ai".'
