review:
  strengths:
  - Effective critical path storytelling through visual hierarchy (bold vs subdued
    bars and arrows)
  - Custom colorblind-safe palette with four distinct hues starting with Python Blue
  - Milestone diamond markers at key phase transitions add professional context
  - All dependencies correctly scheduled (finish-to-start, no violations)
  - Excellent data coverage with parallel tasks, multi-dependency convergence, and
    group aggregation
  - Strong typographic choices with explicitly set font sizes at all levels
  weaknesses:
  - Non-critical dependency arrows are somewhat too subtle (gray, alpha=0.5, size=0.8)
    — risk of being invisible in smaller views
  - No legend or annotation explaining the critical path visual distinction (bold
    dark arrows vs light gray)
  - Some wasted canvas space to the right of the last data point
  image_description: 'The plot displays a Gantt chart for a software development project
    with 12 tasks organized into 4 color-coded phases: Requirements (deep blue), Design
    (teal), Development (amber), and Testing (purple). Group aggregate bars (thicker)
    span each phase''s total duration at the top of each section, followed by individual
    task bars below. Critical path tasks are rendered with thicker, fully opaque bars
    while non-critical tasks (UI/UX Mockups, Frontend Components, Unit Testing) are
    thinner and semi-transparent. L-shaped dependency arrows connect predecessor end
    dates to successor start dates — critical path arrows are dark and bold, non-critical
    arrows are light gray. Red diamond milestone markers appear at key handoff points
    (Review & Approve, Database Design, Backend API, User Acceptance). The x-axis
    runs from Jan 01 to ~Mar 25, 2024 with weekly tick marks rotated 45°, labeled
    "Date (2024)". Y-axis lists tasks hierarchically with triangle-prefixed group
    headers. A "Project Phase" legend on the right identifies the four phase colors.
    The background is light gray (#FAFAFA) with subtle vertical grid lines only.'
