review:
  strengths:
  - Layer composition (mark_rule + mark_circle) is the correct Altair idiom for dumbbell
    charts — using alt.X / alt.X2 for the spanning rule is exactly right
  - Sorting by improvement with EncodingSortField applied consistently across both
    layers is technically sound
  - Employee satisfaction before/after is a realistic, neutral, engaging dataset
  - Font sizes explicitly set throughout (labelFontSize=18, titleFontSize=22, legendFontSize=16)
  - 10 categories sorted by difference creates genuine data storytelling
  weaknesses:
  - 'Critical: No ANYPLOT_THEME support — code must read os.getenv(''ANYPLOT_THEME'',
    ''light'') and render both light and dark versions with theme-adaptive tokens
    (PAGE_BG, ELEVATED_BG, INK, INK_SOFT) applied via configure_view/configure_axis/configure_title/configure_legend'
  - 'Critical: Wrong output file names — must save as plot-{THEME}.png and plot-{THEME}.html,
    not bare plot.png/plot.html'
  - 'Wrong palette — colors must use Okabe-Ito: #009E73 (before) and #D55E00 (after),
    not Python blue (#306998) / yellow (#FFD43B)'
  - Wrong branding — title must end with anyplot.ai not pyplots.ai
  - Dashed grid (gridDash=[4, 4]) should be replaced with solid low-opacity grid (gridOpacity=0.10)
    or removed entirely
  - 'Connecting line hardcoded color #999999 should use INK_SOFT token for theme adaptation'
  - Legend title 'Period' should be more contextual (e.g., 'Policy Change')
