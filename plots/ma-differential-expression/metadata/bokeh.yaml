review:
  strengths:
  - Excellent use of Inferno color gradient to encode significance strength, adding
    an extra data dimension beyond binary significant/not-significant
  - All spec features fully implemented including LOESS trend, fold-change thresholds,
    gene annotations, and summary statistics
  - 'Strong Bokeh-specific features: HoverTool for interactive exploration, HTML export,
    transform-based color mapping'
  - Realistic RNA-seq data with appropriate gene names, expression ranges, and differential
    expression proportions
  - Clean visual design with removed x-grid, subtle y-grid, and refined axis styling
  weaknesses:
  - Minor gene label crowding in dense regions could benefit from smarter label placement
    or collision avoidance
  - Legend text slightly compact relative to the overall plot scale
  image_description: 'The plot displays an MA plot for differential gene expression
    analysis at 4800x2700 resolution. The title "ma-differential-expression · bokeh
    · pyplots.ai" appears in dark teal at the top left. The x-axis is labeled "Mean
    Expression (log2)" ranging from 0 to ~16, and the y-axis "Log2 Fold Change (M)"
    ranging from approximately -5 to +4. Approximately 15,000 data points are shown:
    non-significant genes appear as very faint gray dots (alpha ~0.15), while ~1,746
    significant genes are rendered with an Inferno-inspired color gradient (yellow
    through orange, red, purple, to near-black) mapped to -log10(p-value) significance
    strength. A solid blue-gray horizontal reference line marks M=0, with dashed lines
    at M=+1 and M=-1 labeled "FC = 2" and "FC = -2" in italic blue text. A green LOESS
    trend line runs near y=0 across the full expression range. Eight top differentially
    expressed genes are labeled in bold (WNT2317, SOX5510, RB8441, SHH1368, COL5938,
    KRAS5524, COL6088, COL1169). A summary annotation at bottom-left reports upregulated
    and downregulated gene counts. The legend in the top-left shows "Not Significant",
    "Significant (n=1,746)", and "LOESS Trend". A vertical color bar on the right
    displays the -log10(p-value) scale. The background is a subtle off-white (#FAFAFA)
    with only y-axis grid lines (dashed, low alpha). Overall layout is clean and professional.'
