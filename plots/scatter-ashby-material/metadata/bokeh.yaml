review:
  strengths:
  - Excellent realistic material property data spanning appropriate orders of magnitude
  - Convex hull envelopes effectively communicate material family groupings — faithful
    to the Ashby chart concept
  - 'Good use of Bokeh-specific features: HoverTool tooltips, HTML export, ColumnDataSource'
  - Clean visual style with subtle grid, removed ticks, and cohesive muted color palette
  - Correct log-log scaling with appropriate axis ranges
  weaknesses:
  - Ceramics and Metals envelope overlap makes the upper-right region cluttered
  - Family labels placed at centroids can overlap with data points or neighboring
    envelopes
  - Manual convex hull function violates KISS — should use scipy or inline the logic
  - All material families are treated equally with no visual hierarchy or storytelling
    emphasis
  - Legend disabled without alternative quick-reference
  image_description: The plot shows a log-log scatter chart with 7 material families
    displayed as colored convex hull envelopes on a white background. Metals (steel
    blue, upper-right) and Ceramics (muted red, upper-right) occupy high-modulus/high-density
    regions with overlapping envelopes. Composites (green) sit in the upper-middle
    area. Natural Materials (teal) span the mid-range. Polymers (orange) cluster at
    moderate density with low-to-moderate modulus. Foams (gold/yellow) form a narrow
    diagonal band in the lower-left. Elastomers (purple) appear at moderate density
    with very low modulus. Each family has a text label at its centroid. The title
    "scatter-ashby-material · bokeh · pyplots.ai" is at the top-left. X-axis reads
    "Density (kg/m³)" and Y-axis reads "Young's Modulus (GPa)". Grid lines are subtle.
    Tick marks are removed. The overall layout is clean with good use of the canvas.
