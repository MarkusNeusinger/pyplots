  - Landmark annotations use loops instead of idiomatic plotnine geom_text/geom_point
  image_description: 'The plot displays a terrain elevation profile along a 120 km
    Alpine hiking trail from Grindelwald to Adelboden. A dark navy blue line (#1a3d5c)
    traces the elevation changes across the distance, with a very light blue filled
    area (#306998, alpha=0.3) beneath it. Eight landmarks are marked with yellow-filled
    dots connected by gray dotted vertical lines to bold text labels showing the location
    name and elevation in meters. The x-axis shows "Distance (km)" from 0 to 120 in
    10 km increments, the y-axis shows "Elevation (m)" from ~300 to ~2100. The title
    reads "area-elevation-profile · plotnine · pyplots.ai" in bold, with an italic
    subtitle "Alpine Trail: Grindelwald to Adelboden (120 km) · Vertical exaggeration
    ~10×". The background is white with a light gray panel (#f8f9fa) and subtle horizontal
    gridlines. The terrain shows clear peaks at Jungfraujoch (~1688m) and Schilthorn
    (~1725m), valleys at the start (Grindelwald ~580m) and end (Adelboden ~620m).'
