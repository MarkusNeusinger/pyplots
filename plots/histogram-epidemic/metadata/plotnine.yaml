    improve readability for the tail period
  image_description: 'The plot displays an epidemic curve (epi curve) with stacked
    bars showing daily new case counts over a 90-day period from mid-January to mid-April
    2024. Three case classifications are stacked: Confirmed (blue, #306998) at the
    bottom, Probable (orange, #E8963E) in the middle, and Suspect (grey, #C0C0C0)
    on top. Two epidemic waves are visible — Wave 1 peaks around Feb 2 at ~70 cases/day,
    Wave 2 peaks around Mar 11 at ~43 cases/day. Both peaks are annotated with blue
    bold text. Two dashed vertical lines mark intervention events: "Lockdown" (Feb
    10) and "Vaccination campaign" (Mar 1), labeled in italic grey text. A dark red
    cumulative cases line rises from left to right across the chart. The title reads
    "histogram-epidemic · plotnine · pyplots.ai" in bold at top. The legend is positioned
    at top center. The background is a subtle off-white (#FAFAFA), with only horizontal
    y-axis gridlines visible. X-axis shows dates at 2-week intervals rotated 45°,
    Y-axis shows "Number of New Cases (per day)".'
