  image_description: 'The plot shows a 16-QAM constellation diagram on a square canvas
    (3600x3600 px) with equal aspect ratio. Sixteen ideal constellation points are
    displayed as large black "X" markers with white edges arranged in a 4x4 grid at
    ±1, ±3 positions. Approximately 1200 received symbols appear as small semi-transparent
    dots clustered around each ideal point, colored by quadrant: blue (Q1, +I/+Q),
    orange (Q2, -I/+Q), teal/green (Q3, -I/-Q), and salmon/coral (Q4, +I/-Q) using
    the seaborn colorblind palette. KDE density contour lines in matching colors surround
    each cluster, showing signal density distribution. Dashed gray decision boundary
    lines are drawn at -4, -2, 0, 2, 4 on both axes. The title reads "scatter-constellation-diagram
    · seaborn · pyplots.ai". Axes are labeled "In-Phase (I)" and "Quadrature (Q)".
    A styled EVM annotation box in the bottom-right reads "EVM = 9.9%". A legend in
    the upper left shows the four quadrant labels. Top and right spines are removed.
    Subtle dotted grid lines appear in the background.'
