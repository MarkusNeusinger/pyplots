review:
  strengths:
  - Full spec compliance with all required features (two curves, color gradient, equal
    aspect ratio, start/end markers)
  - Custom 6-stop colorscale with professional blue-to-coral progression
  - Excellent use of Plotly-specific features (hovertemplate, updatemenus, HTML export,
    HTML-formatted text)
  - Well-resolved start/end label overlap on Lissajous via directional arrow offsets
  - Descriptive subtitles with equation and curve characterization create good storytelling
  weaknesses:
  - Helper function interpolate_color() violates KISS structure guideline
  - Inter-subplot colorbar (x=0.44) creates slight visual crowding in the center
  - Segmented line approach with 200 segments per curve is verbose (400+ traces total)
  image_description: The plot displays two side-by-side subplots on a light background
    with the plotly_white template. The main title "line-parametric · plotly · pyplots.ai"
    is centered at the top in dark gray. The left subplot shows a Lissajous figure
    (x = sin(3t), y = sin(2t)) — a closed, self-intersecting curve with three horizontal
    lobes. The right subplot shows an Archimedean spiral (x = t·cos(t), y = t·sin(t))
    expanding outward from the origin over about two full turns. Both curves use a
    continuous color gradient from deep Python Blue (t=0) through teal and olive-green
    to coral/red (t=max), rendered as overlapping line segments. Each subplot has
    a vertical colorbar with π-notation tick labels and the title "Parameter t (rad)".
    Start points are marked with blue circles and annotated "Start (t = 0)" with arrow
    connectors; end points are marked with coral squares and annotated "End (t = 2π/4π)".
    Both subplots have bold titles with italic equation subtitles. Axes are labeled
    "Horizontal Position x(t)" and "Vertical Position y(t)" with subtle gridlines
    and zero lines. A "Reset View" button sits at the bottom center.
