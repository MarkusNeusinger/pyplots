  strengths:
  - Excellent data storytelling with dynamic arc labels and melody/accompaniment visual
    hierarchy
  - Complete spec compliance with all required features implemented
  - Thoughtful musical data with realistic chord progression and melodic contour
  - Clean visual separation of melody (opaque, bordered, taller) vs accompaniment
    (translucent, thinner)
  - Custom beat/measure gridlines replacing default panel grid
  weaknesses:
  - Non-standard color gradient (blue-purple-orange) not perceptually uniform for
    velocity mapping
  - Some short-duration melody notes appear quite small in the upper register
  - Y-axis labels for adjacent white keys are tightly spaced
  - Black key row shading could be slightly more subtle to reduce visual weight
  image_description: The plot displays a MIDI piano roll visualization with horizontal
    rectangles representing musical notes. The x-axis shows "Time (beats)" from 0
    to 32, and the y-axis shows "Pitch" with note names (A2 through G5) for white
    keys. Black key rows are shaded in light gray against a near-white panel background,
    creating the piano keyboard distinction. Beat gridlines appear as thin light gray
    vertical lines, with stronger dark gray lines at measure boundaries (every 4 beats).
    Notes are colored on a blue-purple-orange gradient representing velocity (30-127),
    with blue for soft and orange for loud. Melody notes (upper register, C5-G5 range)
    are taller, fully opaque with dark borders, while accompaniment notes (lower register,
    A2-C4) are slightly thinner and semi-transparent. Section labels in italic gray
    at the top read "pp — Building", "f — Response", "pp — Restart", "fff — Climax",
    showing the dynamic arc. Bold role labels "Melody" and "Accomp." appear on the
    right side. The velocity color legend is positioned on the right.
