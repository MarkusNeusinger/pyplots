    italic bold: "C major", "G major", "A minor", "F major", separated by dashed vertical
    lines. A subtitle below reads "Chord progression: I – V – vi – IV (C major key)".
    The chord tones are clearly visible as bright yellow/orange bands in their respective
    time regions (C/E/G bright in C major section, G/B/D in G major, A/C/E in A minor,
    F/A/C in F major), with smooth transitions between chord boundaries. Non-chord
    tones remain dark purple/black. The title reads "heatmap-chromagram · pygal ·
    pyplots.ai".'
