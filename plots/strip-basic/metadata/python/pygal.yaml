review:
  strengths:
  - Correct Okabe-Ito palette in canonical order, properly applied to both light and
    dark themes with no chrome failures
  - Mean reference markers at integer x-positions add a useful visual layer — they
    create hierarchy without cluttering the plot
  - Per-point tooltip dict format and HTML export make excellent use of pygal's interactive
    capabilities
  - Data scenario (employee satisfaction by department) is realistic, neutral, and
    shows meaningfully different distributions
  - Clean KISS code structure with full reproducibility (seed set) and appropriate
    opacity (0.60) for data density
  weaknesses:
  - Design sophistication is capped by pygal's defaults — no spine removal, limited
    grid customization; the chart looks like a configured library default rather than
    a polished publication
  - Mean markers use the same dot shape as data points, making them visually ambiguous
    without reading the legend; a larger marker or distinct shape would make them
    immediately identifiable
  - Bottom legend occupies canvas space with five small-text items that could be formatted
    larger or simplified
