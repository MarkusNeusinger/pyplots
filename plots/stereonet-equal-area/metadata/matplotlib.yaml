  strengths:
  - Mathematically correct equal-area (Schmidt) projection with proper formula
  - Sophisticated spherical Gaussian kernel density estimation for contours
  - 'Strong visual hierarchy: bedding emphasized through larger markers and thicker
    great circles'
  - Excellent colorblind-safe palette with redundant shape encoding
  - Professional-quality stereonet suitable for geology publication
  weaknesses:
  - Defines a helper function (draw_great_circle) instead of inline code, minor KISS
    violation
  image_description: 'The plot displays a Schmidt equal-area (lower-hemisphere) stereonet
    projection on a polar axis with a light off-white background. Three structural
    feature types are plotted: Bedding poles (blue circles, ~30 points clustered in
    the SE quadrant around 120-140° azimuth), Joint poles (orange squares, ~25 points
    clustered in the NE quadrant around 20-40°), and Fault poles (dark maroon triangles,
    ~20 points clustered in the W-NW quadrant around 270-290°). Great circles are
    drawn for each feature type in matching colors — bedding great circles (blue)
    are thicker and more opaque, creating visual hierarchy. Density contours in a
    YlOrBr colormap with low opacity highlight the three pole clusters. The primitive
    circle is emphasized with a dark border. Cardinal directions (N, E, S, W) are
    bold at 20pt, degree tick marks appear every 10° around the perimeter, and intermediate
    labels at 30° intervals show degree values. A legend in the lower-left shows all
    three feature types. Title reads "stereonet-equal-area · matplotlib · pyplots.ai"
    at 24pt.'
