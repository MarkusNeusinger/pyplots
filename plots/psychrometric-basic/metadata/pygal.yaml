  image_description: The plot shows a psychrometric chart with dry-bulb temperature
    (°C) on the x-axis from -10 to 50 and humidity ratio (g/kg) on the y-axis from
    0 to 30. Blue curved lines represent relative humidity from 10% to 100%, with
    the saturation curve (100% RH) drawn as the thickest line. Orange dashed diagonal
    lines show wet-bulb temperature isolines (Tw 0°C through Tw 30°C). Purple dotted
    lines indicate specific volume values (0.80 to 0.92 m³/kg). Teal dash-dot diagonal
    lines represent enthalpy values (h=10 through h=90 kJ/kg). A large green filled
    polygon marks the comfort zone (20–26°C, 30–60% RH) with a "Comfort Zone" label
    at its center. A red line with two red dots connects State A (35°C, 60% RH) to
    State B (24°C, 50% RH), illustrating an HVAC cooling and dehumidification process.
    All curve families are labeled directly on the chart with color-matched text.
    The title reads "psychrometric-basic · pygal · pyplots.ai". The background is
    white with a light gray (#fafbfc) plot area and subtle grid lines. Labels are
    no longer truncated at the right edge (fixed from attempt 2). The comfort zone
    polygon is quite opaque and obscures some underlying curves.
