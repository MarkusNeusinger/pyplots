    with white bold text and red borders, while other bars use warm yellows, oranges,
    and wheat tones with dark text. A "Hot path (most samples)" legend annotation
    appears in the top right. The background is light gray (#FAFAFA) with no grid
    lines. Function names are displayed inside bars when wide enough, with ellipsis
    truncation for narrow bars.
