  image_description: 'The plot displays a soccer pitch viewed from above on a beige
    (#F5F5F0) background. The green pitch (#2E7D32) features white standard markings:
    penalty areas, goal areas, center circle, halfway line, corner arcs, and goal
    posts (light gray). 100 match events are scattered across the pitch using distinct
    markers — blue circles for passes, red diamonds for shots, orange triangles for
    tackles, and purple squares for interceptions. Directional arrows extend from
    passes and shots indicating trajectory. Filled markers represent successful outcomes
    while hollow/transparent markers represent unsuccessful ones. Shots are rendered
    larger for focal emphasis. Subtle zone highlights mark the "Attacking Third" (right)
    and "Defensive Third" (left) with italic white labels. A custom legend below the
    pitch shows all four event types with their marker shapes, plus an outcome key
    (filled = successful, hollow = unsuccessful). The title "scatter-pitch-events
    · letsplot · pyplots.ai" is centered at the top in bold with a descriptive subtitle.'
