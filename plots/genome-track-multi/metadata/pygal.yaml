review:
  strengths:
  - Excellent composite SVG architecture that embeds multiple pygal sub-charts into
    a cohesive multi-track view
  - Realistic EGFR gene data with biologically plausible coverage depths, variant
    quality scores, and regulatory elements
  - Thoughtful design with Tol bright colorblind-safe palette, gradient accent line,
    alternating track backgrounds, and colored accent strips
  - Coverage annotation creates a storytelling focal point connecting read depth to
    gene structure
  - HTML export preserves pygal native interactive tooltips for all embedded charts
  - Full spec compliance with all required track types and features
  weaknesses:
  - Variant markers (dots_size=10) are slightly small for only 12 data points — larger
    markers would improve visibility
  - The 18px annotation text is on the small side for a 4800x2700 canvas
  - Gene track is entirely manual SVG rather than using a pygal chart type, reducing
    library mastery score
  - No y-axis labels or scale indicators for the variant track (quality score range
    not shown)
  image_description: 'The plot displays a multi-track genome browser view of the EGFR
    gene region on chromosome 7 (55.086–55.280 Mb). Four horizontally stacked tracks
    share a common genomic x-axis with position labels in Mb. Track 1 (Genes): Blue
    exon rectangles connected by a thin horizontal intron line on a light gray background,
    with chevron arrows indicating (+) strand direction and the gene name "EGFR" in
    italic blue above the exons. Track 2 (Coverage): A filled area chart in light
    cyan with a darker blue stroke showing read depth (0x–87x), with prominent peaks
    at exon locations and a dashed annotation line pointing to "coverage peak at exon"
    near the 3'' end. Track 3 (Variants): Pink/red circles for SNPs and purple circles
    for indels scattered at genomic positions with y-axis encoding quality scores;
    a compact legend distinguishes SNP vs Indel in the top-right. Track 4 (Regulatory):
    Colored histogram bars — yellow for Promoter, green for Enhancer, salmon/orange
    for CTCF — with type labels above each bar and a legend in the bottom-right. The
    title reads "EGFR Gene Region (chr7) · genome-track-multi · pygal · pyplots.ai"
    with a subtitle "Epidermal Growth Factor Receptor — 28 exons, ~194 kb" and a gradient
    accent line beneath. Alternating gray/white track backgrounds with colored accent
    strips on the left edge of each track. Dashed vertical coordinate guide lines
    span all tracks.'
