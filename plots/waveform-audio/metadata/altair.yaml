  image_description: The plot displays an audio waveform as a filled area chart with
    time (0–1.6 seconds) on the x-axis and normalized amplitude (-1.0 to +1.0) on
    the y-axis. The main waveform body uses a steel-blue vertical gradient that is
    more opaque near the zero baseline and fades toward the amplitude extremes, creating
    a polished DAW-like appearance. A clipped region around 0.15–0.25 seconds is highlighted
    with a semi-transparent red overlay where amplitude hits ±1.0. The envelope clearly
    shows an attack phase (0–0.05s), a loud section with clipping, a sustained region,
    a dip around 0.4–0.7s (half amplitude), then gradual release to silence. A dashed
    blue zero-line and faint dashed red clip-threshold lines at ±1.0 are visible.
    The title reads "waveform-audio · altair · pyplots.ai" with a descriptive subtitle.
    Axis labels are large and readable. Grid lines are extremely subtle. The view
    frame is removed for a clean look.
