    axis — good user experience
  - All font sizes explicitly set and meet minimums (title 28pt, dim labels 20pt,
    tick labels 16pt)
  - Classic, neutral Iris dataset with clear inter-species patterns; code is clean
    and deterministic
  weaknesses:
