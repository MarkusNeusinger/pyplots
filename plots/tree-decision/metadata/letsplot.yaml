    (0.5)" to decision node D2 ("EMV $440K"), and "Weak (0.2)" to terminal "-$200K".
    D2 branches to "Scale Up" (active, leading to chance node C2 with "EMV $440K")
    and "Maintain" (pruned with red X, dashed to terminal "$350K"). C2 branches to
    "Success (0.6)" leading to "$600K" and "Setback (0.4)" leading to "$200K". A manual
    legend in the bottom-right shows Decision Node (blue square), Chance Node (orange
    circle), and Terminal Node (green triangle). Subtle gray shading bands mark Stage
    1 and Stage 2 depth levels. Elbow-style connectors link all nodes.'
