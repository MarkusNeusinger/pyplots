      Data: Colors identical to light render (same Python Blue, amber, medium green) — correct that only chrome flips; species separation patterns identical
      Legibility verdict: PASS (text readable in dark mode — note: readability supplied by external pipeline since code has no ANYPLOT_THEME handling or explicit chrome color tokens)
