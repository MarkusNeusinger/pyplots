review:
  strengths:
  - Excellent neutral split implementation using linked_to for unified legend entry
    — idiomatic Highcharts approach
  - Smart conditional data labels (>=8% threshold) preventing crowding in narrow segments
  - Strong diverging color palette with good colorblind accessibility
  - Sorting by net agreement creates immediate visual narrative
  - Clean, well-structured code with robust CDN fallback
  weaknesses:
  - Y-axis max (80) does not fully accommodate the longest bar (Meaningful work right
    side totals 81), causing potential 1% clipping
  - Design refinement is good but not yet publication-perfect (standard legend style,
    basic grid lines)
  image_description: 'The plot displays a horizontal diverging stacked bar chart titled
    "bar-diverging-likert · highcharts · pyplots.ai" with subtitle "Employee Engagement
    Survey Results." Eight survey questions are arranged vertically, sorted by net
    agreement from lowest (top: "Adequate resources") to highest (bottom: "Meaningful
    work"). Bars diverge from a central vertical black line at 0%. The left side shows
    disagreement: dark red (#C0392B) for Strongly Disagree and lighter red/pink (#E57373)
    for Disagree. The right side shows agreement: light blue (#64B5F6) for Agree and
    dark blue (#306998) for Strongly Agree. Gray segments (#B0BEC5) for Neutral are
    split evenly across the center. Percentage labels appear inside bar segments where
    space permits (threshold of 8%), with white text on dark backgrounds and dark
    text on light backgrounds. The y-axis shows absolute percentages from 0-80% in
    both directions with a label "← Disagree | Agree →". A horizontal legend at the
    bottom shows all five categories in order. The overall color palette is a clean
    red-to-blue diverging scheme with muted gray neutral.'
