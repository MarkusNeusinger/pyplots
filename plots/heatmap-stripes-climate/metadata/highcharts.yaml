  image_description: The plot displays classic Ed Hawkins-style climate warming stripes
    as a full-canvas sequence of vertical colored bars spanning 1850-2024. The left
    portion shows medium-to-dark blues representing negative temperature anomalies
    in the 19th century. These transition through lighter blues and near-white bars
    around the mid-20th century. The right portion shows a dramatic progression through
    pinks to intense crimson and deep red, representing accelerating positive warming
    anomalies in recent decades. All chart chrome is removed — no axes, tick marks,
    labels, or gridlines — leaving only the pure color-encoded stripes. The title
    "heatmap-stripes-climate · highcharts · pyplots.ai" appears at the bottom center
    in subtle gray text (36px). The stripes fill the full 4800x2700 canvas with no
    visible white gaps at top or sides. A very thin dark strip is visible at the absolute
    bottom edge below the title area.
