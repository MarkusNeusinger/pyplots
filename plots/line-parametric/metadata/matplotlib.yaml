  - No annotations or focal points to enhance data storytelling
  image_description: The plot shows two side-by-side subplots on a white background
    with the suptitle "line-parametric · matplotlib · pyplots.ai" at the top. The
    left panel displays a Lissajous figure (x=sin(3t), y=sin(2t)) with a color gradient
    from dark purple/blue (t≈0) through pink/magenta to yellow (t≈2π) using the plasma
    colormap. The right panel shows an Archimedean spiral (x=t·cos(t), y=t·sin(t))
    with a viridis colormap gradient from dark purple (t≈0) through teal to yellow
    (t≈4π). Both panels have blue circle markers for start points and orange-red square
    markers for end points. Colorbars labeled "Parameter t" appear to the right of
    each panel. Top and right spines are removed, subtle gridlines are visible, and
    axes are labeled x(t) and y(t). Both panels use equal aspect ratios with line
    width of 3. Legends in lower-right corners identify start/end markers.
