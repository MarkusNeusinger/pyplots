  strengths:
  - 'Excellent data choice: Lorenz attractor is the canonical example for recurrence
    plots'
  - Marginal time series subplot provides valuable context and enables correlation
    between signal dynamics and recurrence structure
  - Custom blue palette and Palatino typography create a cohesive professional look
  - Time-delay embedding properly implemented following Takens theorem
  - Interactive hover tooltips and HTML export leverage Plotly strengths
  weaknesses:
  - Output dimensions 3600x4200 do not match either standard format 4800x2700 or 3600x3600
  - Title format prepends Lorenz Attractor before the required spec-id format
  image_description: The plot displays a recurrence matrix for the Lorenz attractor
    x-component using a two-panel layout. The top panel shows the source time series
    as a blue line with light blue fill-to-zero, labeled "x(t)" on the y-axis. The
    bottom panel is the main recurrence plot — a square heatmap where both axes represent
    "Time Index (i)" and "Time Index (j)" ranging from 0 to ~490. Recurrent state
    pairs appear as dark navy blue points (#1B4F72) on a near-white background (#F7F9FC),
    with a mid-blue transition (#C8D8E8). The main diagonal is clearly filled. Characteristic
    diagonal line segments indicate deterministic dynamics, and block/cross structures
    reveal regime transitions in the chaotic Lorenz system. The title reads "Lorenz
    Attractor · recurrence-basic · plotly · pyplots.ai" with a subtitle explaining
    that diagonal lines reveal deterministic chaotic dynamics. The y-axis of the recurrence
    matrix is reversed (0 at top), which is standard for matrix displays. Overall
    the layout is clean with Palatino typography and a light paper background.
