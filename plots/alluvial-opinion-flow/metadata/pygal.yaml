  - Annotation text in upper right is small and hard to read
  image_description: 'The plot shows an alluvial/Sankey-style opinion flow diagram
    titled "alluvial-opinion-flow · pygal · pyplots.ai" tracking 1,000 respondents
    across 4 quarterly waves of a "Renewable Energy Policy Survey." Five opinion categories
    are displayed as narrow stacked bar nodes at each wave: Strongly Favor (dark navy
    blue), Favor (medium blue), Neutral (yellow), Oppose (brown), and Strongly Oppose
    (dark red). Respondent counts are printed on each bar segment (e.g., Strongly
    Favor: 180, 210, 250, 270). Curved bezier flows connect categories between Waves
    1-2 and 2-3, with stable flows at higher opacity and changed flows at lower opacity.
    CRITICAL ISSUE: Wave 4 (Q4) appears completely disconnected with NO visible alluvial
    flows between Wave 3 and Wave 4. A large empty gap separates the third wave from
    the fourth. A small italic annotation in the upper right reads "Solid = stable
    opinion · Faded = changed · Polarization: Neutral 280→150". The legend at the
    bottom shows all 5 categories. The x-axis title reads "Renewable Energy Policy
    Survey · 1,000 Respondents Tracked Quarterly."'
