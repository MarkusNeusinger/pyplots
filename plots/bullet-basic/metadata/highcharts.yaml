review:
  strengths:
  - Native Highcharts bullet chart type used correctly with proper targetOptions and
    inverted orientation
  - 'Strong data storytelling: conditional green/orange coloring plus algorithmically-identified
    worst-performer annotation'
  - 'Perfect spec compliance with all required features: actual bars, targets, qualitative
    ranges, data labels'
  - Realistic Q4 business dashboard context with well-chosen metrics showing varied
    performance
  - Clean code with proper Highcharts module loading (bullet.js, annotations.js, highcharts-more.js)
  weaknesses:
  - Does not use the highcharts-core Python library; builds JSON config manually instead
    of using the recommended Python API
  - Green/orange color pair, while having luminance contrast, is not optimal for all
    colorblind types
  - Subtitle legend text at 24px is at the smaller end of comfortable readability
  image_description: 'The plot displays a horizontal bullet chart titled "Q4 Performance
    Dashboard · bullet-basic · highcharts · pyplots.ai". Four business KPIs are stacked
    vertically: Revenue, Profit, New Customers, and Satisfaction. Each row has three
    grayscale background bands representing qualitative ranges (light gray 0-50%,
    medium gray 50-75%, dark gray 75-100%). Colored bars show actual performance:
    Revenue ($275K, green, ~92%) and New Customers (1,650, green, ~82%) exceed their
    targets, while Profit (22%, deep orange, ~63%) and Satisfaction (4.5/5, deep orange,
    ~90%) fall below. Thick black vertical lines mark targets. The worst performer
    (Profit) has an annotation callout "▼ 18.5% below target" with an orange border.
    A subtitle reads "Actual performance vs targets across key business metrics" followed
    by an inline HTML legend showing green = Exceeds target, orange = Below target,
    | = Target marker. The x-axis runs 0-100% labeled "% of Maximum" with 10% intervals.
    Category labels are bold on the left. Layout fills the canvas well with balanced
    margins.'
