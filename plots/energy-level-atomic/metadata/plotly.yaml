  strengths:
  - Scientifically accurate hydrogen atom data with correct E_n = -13.6/n² formula
    and real spectral wavelengths
  - Excellent spatial organization with three series in distinct horizontal zones,
    each with descriptive group headers
  - Meaningful custom color palette reflecting spectral nature (UV purples, visible
    varied, IR oranges)
  - Clever use of Plotly-specific hover targets and HTML export for interactivity
  - Very subtle grid styling (6% opacity) and clean plotly_white template
  - Perfect spec compliance with all required features present
  weaknesses:
  - Transition annotation labels at 14pt are slightly small; bumping to 16pt would
    improve legibility
  - Upper energy levels (n=4, n=5, n=6) and their right-side labels are tightly packed
    despite yshift adjustments
  - Three purple-range colors across Lyman and Balmer series are too similar to each
    other
  image_description: 'The plot displays a hydrogen atom energy level diagram on a
    white background with the title "Hydrogen Atom · energy-level-atomic · plotly
    · pyplots.ai" at the top in dark, large font. Six horizontal blue lines (#306998)
    represent energy levels from n=1 (−13.60 eV, bottom) to n=6 (near 0 eV, top),
    spanning about 76% of the plot width. A gray dashed line at 0 eV marks the ionization
    limit. Energy values are annotated on the left (−13.60, −3.40, −1.51 eV and ionization
    at 0 eV) in gray, and quantum number labels (n=1 through n=6) appear on the right
    in blue. Three spectral series are shown as colored downward arrows: Lyman Series
    (left, purples/magenta/indigo, UV) with 3 transitions to n=1; Balmer Series (center,
    red/cyan/purple, visible) with 4 transitions to n=2; Paschen Series (right, deep
    orange/brown, IR) with 2 transitions to n=3. Each arrow is labeled with its designation
    and wavelength. Series group headers at the top read "Lyman Series / Ultraviolet",
    "Balmer Series / Visible", and "Paschen Series / Infrared" in their respective
    accent colors. The y-axis is labeled "Energy (eV)" and the x-axis is hidden. A
    subtle grid (≈6% opacity) provides vertical reference. The upper levels (n=4,5,6)
    are closely spaced near ionization, reflecting the physical convergence of energy
    levels.'
