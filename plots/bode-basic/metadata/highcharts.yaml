review:
  strengths:
  - Excellent data quality with realistic control systems transfer function and correct
    engineering computations
  - Well-structured dual-panel layout with explicit margin and panel height calculations
  - Good use of Highcharts plotLines for reference lines at 0 dB and -180°
  - Informative legend entries with computed crossover frequencies and margin values
  - Clean, deterministic code with good variable naming
  weaknesses:
  - X-axis tick labels overlap badly in the low-frequency range on both panels
  - Red and green marker colors create colorblind accessibility issues
  - Margin annotations exist only in the legend — spec requests annotations directly
    on the chart
  - LineSeries imported from wrong module (area instead of line)
  image_description: The plot displays a dual-panel Bode plot for the transfer function
    G(s) = 10 / [(s+1)(s/5+1)(s/20+1)]. The top panel shows Magnitude (dB) vs Frequency
    (Hz) with a blue line starting at ~20 dB and rolling off at higher frequencies.
    A red dashed reference line at 0 dB is labeled "0 dB" on the right. A blue diamond
    marker indicates the gain crossover point (~0.96 Hz), and a red circle marker
    shows the gain margin point (~1.77 Hz). The bottom panel shows Phase (degrees)
    vs Frequency (Hz) with an orange line starting near 0° and decreasing to about
    -270°. A red dashed reference line at -180° is labeled "-180°". A green diamond
    marker shows the phase margin point, and a red circle marks the phase crossover.
    Both panels share a logarithmic frequency axis with "Frequency (Hz)" labeled at
    the bottom. The title reads "bode-basic · highcharts · pyplots.ai" with a subtitle
    showing the transfer function. A legend on the upper right lists all series with
    computed values. White background with subtle gray grid lines.
