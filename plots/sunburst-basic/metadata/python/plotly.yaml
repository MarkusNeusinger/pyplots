review:
  strengths:
  - Excellent color family approach — Okabe-Ito tints/shades per branch encode hierarchy
    relationships visually
  - 'Strong data storytelling: explicit annotation calls out Engineering''s 37.5%
    dominance'
  - Theme adaptation is thorough — PAGE_BG, ELEVATED_BG, INK, and INK_MUTED all adapt;
    center root circle is especially elegant
  - 'Idiomatic Plotly sunburst usage: branchvalues=''total'', insidetextorientation=''radial'',
    custom hovertemplate with percentParent'
  - Internally consistent data values (all parent totals equal sum of children)
  - HTML output included for interactive experience
  - Square 3600×3600 format is appropriate for a symmetric radial chart
  weaknesses:
  - Segment text color is not explicitly set — relies on Plotly's auto-contrast for
    text inside colored segments; 'Enterprise' label renders in dark brown on the
    lighter orange variant in both renders (readable but uncontrolled)
  - 'Custom hex variants for child segments (#00B589, #007A58, #F07030, etc.) technically
    deviate from pure Okabe-Ito; the family approach is appropriate but worth noting'
  - DE-01 ceiling limited by the derivative nature of the color choices (tints of
    Okabe-Ito rather than a fully custom palette)
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white
      Chrome: Title "sunburst-basic · plotly · anyplot.ai" in dark ink, clearly readable at top center; bottom annotation text in INK_MUTED gray, readable
      Data: Three-level sunburst — center 'Company' circle in dark charcoal (ELEVATED_BG applied via Plotly's root rendering); second ring: Engineering (teal-green #009E73), Sales (orange-vermillion #D55E00), Marketing (blue #0072B2), Operations (pink #CC79A7); outer ring shows child segments in color-family tints/shades of their parents; all segment labels in radial orientation with white or dark auto-contrast text
      Legibility verdict: PASS — all labels readable; segment text at 22px is adequate; title at 36px is prominent; annotation at 20px is visible

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black
      Chrome: Title rendered in light ink (#F0EFE8), clearly readable against dark background; annotation text in light-muted gray, readable
      Data: Data segment colors are identical to light render — same Engineering green, Sales orange, Marketing blue, Operations pink, and their respective tints/shades for child segments; center root circle renders as light silver-gray (ELEVATED_BG #242420 interpreted by Plotly); separator lines use dark PAGE_BG creating clean segment boundaries
      Legibility verdict: PASS — no dark-on-dark failures; white text on saturated segments is clear; auto-contrast dark text on lighter orange Enterprise segment is still readable; brand green #009E73 is clearly visible
