  image_description: The plot shows a band chart on a white background with the title
    "band-basic · pygal · pyplots.ai" at the top in dark text. The x-axis is labeled
    "Time (hours)" ranging from 0 to 48 with major ticks at 0, 12, 24, 36, 48 and
    minor ticks at 6, 18, 30, 42. The y-axis is labeled "Soil Moisture (%)" ranging
    from approximately 20 to 44. A light blue semi-transparent filled polygon forms
    the 95% confidence band, starting wide around 38-42% at hour 0, dipping to ~26-32%
    around hours 12-18, recovering around hours 24-30, then dropping again toward
    ~20-26% at hour 48. The band width increases over time, communicating growing
    uncertainty. A gold/amber central trend line runs through the band showing the
    sensor mean, with visible diurnal cycling. Subtle horizontal gray grid lines are
    visible through the transparent band. The legend at the bottom shows "95% Confidence
    Band" (blue square) and "Sensor Mean" (gold square). Overall layout is clean with
    white background and balanced margins.
