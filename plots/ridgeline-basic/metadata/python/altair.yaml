review:
  strengths:
  - Excellent idiomatic Altair usage — transform_density + row faceting with negative
    spacing is the canonical Altair ridgeline pattern
  - 'Both theme renders are fully readable: correct #FAF8F1 (light) and #1A1A17 (dark)
    backgrounds, no dark-on-dark or light-on-light text issues'
  - 'Meaningful data: monthly temperature distributions with realistic means and standard
    deviations, 200 samples per month for smooth KDE'
  - Sequential blues palette is appropriate for 12-group ridgeline (style guide endorses
    sequential for 6+ categories)
  - 'Correct title format: ''Monthly Temperature Distribution · ridgeline-basic ·
    altair · anyplot.ai'''
  - 'Clean code: seed set, all imports used, no functions/classes, outputs both .png
    and .html for both themes'
  - fillOpacity=0.8 with interpolate='monotone' gives smooth, semi-transparent ridges
    that overlap elegantly
  weaknesses:
  - X-axis ticks at every 2°C (-14 to 40) produce 28 tick marks — dense and slightly
    crowded; stepping to every 4 or 5°C would improve readability at this scale
  - 'Stroke color #306998 is an arbitrary hardcoded hex outside the theme token system
    — should use a theme-adaptive token (e.g. INK_SOFT or derived from palette) so
    it adapts cleanly to both themes'
  - 'Design Excellence is standard: no intentional focal-point emphasis (e.g. highlighting
    peak summer month or annotating seasonal range), leaving the storytelling to the
    viewer entirely'
  - 'DE-02: The explicit stroke on each area ridge creates visible horizontal separator
    lines across the full canvas width; removing or thinning the stroke would reduce
    visual clutter'
  - 'LM-02: The fill scheme could leverage Altair''s condition() or gradient encoding
    for more distinctively Altair-flavored styling beyond blues'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: Title "Monthly Temperature Distribution · ridgeline-basic · altair · anyplot.ai" in bold dark ink, clearly readable. Month labels (Jan–Dec) on the left as row headers in INK_SOFT color, readable. X-axis "Temperature (°C)" label in dark ink, readable. Tick labels every 2°C from -14 to 40 in dark/soft ink — readable but dense (28 marks).
      Data: 12 density ridges using a reversed blues sequential scheme — Jan/Feb are darkest navy blue at the top, fading to pale blue for summer months (Jun/Jul/Aug), then back to darker for Dec. Each ridge has a visible blue stroke border (#306998). Distributions shift rightward from winter (peaking ~2–4°C) through summer (peaking ~22–25°C). The overlap via negative facet spacing (-25) creates the characteristic ridgeline stacking effect.
      Legibility verdict: PASS — all text elements are clearly readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black.
      Chrome: Title text is light/white, clearly readable against dark background. Month labels are light-colored, readable. X-axis label and tick labels are light-colored, readable. No dark-on-dark text failures observed.
      Data: Blues color scheme is preserved identically to the light render — same dark navy for Jan through pale blue for summer months. Data colors are unchanged between themes (as required). The blue stroke borders on ridges remain visible on dark background.
      Legibility verdict: PASS — all text elements readable against the dark background; no dark-on-dark failures detected.
