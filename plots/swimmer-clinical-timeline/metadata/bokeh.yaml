  image_description: 'The plot displays a swimmer plot for a simulated Phase II oncology
    clinical trial with 25 patients. Horizontal bars represent individual patient
    timelines, sorted by treatment duration with shortest at top (PT-018, ~5 weeks)
    and longest at bottom (PT-010, ~52 weeks). Bars are color-coded by treatment arm:
    deep steel blue (#306998) for "Arm A (Combo)" and warm terracotta (#C46B4A) for
    "Arm B (Mono)". Event markers are overlaid on bars: green triangles for Partial
    Response, pink/magenta stars for Complete Response, orange diamonds for Progressive
    Disease, and yellow squares for Adverse Events. Small dark gray right-pointing
    triangles mark ongoing patients (PT-001, PT-011, PT-019, PT-009, PT-010) at bar
    ends. A dotted vertical reference line marks the median duration at 16.3 weeks
    with an italic label. The x-axis reads "Time on Study (Weeks)" and the y-axis
    reads "Patient". The title "swimmer-clinical-timeline · bokeh · pyplots.ai" appears
    at the top left. The legend is positioned at center-right listing all treatment
    arms and event types. Background is light gray (#f7f7f7) with subtle dashed horizontal
    gridlines.'
