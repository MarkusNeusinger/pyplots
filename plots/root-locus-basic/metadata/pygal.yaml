  - Gain direction arrows are just dots - no actual directional indication visible
    in PNG output
  - Some clustering of markers near the real axis makes individual elements harder
    to distinguish
  image_description: The plot shows a root locus diagram on a square canvas with title
    "root-locus-basic · pygal · pyplots.ai". The x-axis is labeled "Real Axis (σ)"
    ranging from -6.0 to 4.0, and the y-axis "Imaginary Axis (jω)" from -5.0 to 5.0.
    Light gray dashed guide lines radiate from the origin representing constant damping
    ratio (ζ) values, and gray dashed semicircles in the left half-plane represent
    constant natural frequency (ωn) values. A vivid blue root locus curve traces pole
    migration — two symmetric branches depart from the real axis and curve through
    the right half-plane. A dark red/orange horizontal line marks real-axis locus
    segments. Red circular dots mark open-loop poles at s = 0, -1, -2, -4. A violet/purple
    dot marks the open-loop zero at s = -3. A large green dot highlights the breakaway
    point between s = -1 and s = -2. Two amber/orange dots mark jω-axis crossings
    (stability boundary) at approximately ±1.5j. Small blue dots along the locus indicate
    gain direction markers. The legend at the bottom shows 9 series in 4 columns.
    The background is a subtle off-white (#fafafa).
