review:
  strengths:
  - Excellent visual hierarchy through graduated line widths, marker sizes, and opacities
    — newer cohorts are visually emphasized
  - 'Strong use of Highcharts-distinctive features: zones (dotted lines below threshold),
    plotLines, plotBands, shared tooltips'
  - Professional polish with gradient background, line shadows, white-bordered markers,
    and subtle dashed grid
  - Complete spec compliance with all required features including reference line,
    legend with cohort sizes, and decreasing emphasis for older cohorts
  - Clean, well-structured code with appropriate complexity
  weaknesses:
  - LineSeries imported from .area submodule rather than .line (works but not idiomatic)
  - Y-axis starts at 10% instead of spec-required 0% (trade-off for better canvas
    utilization)
  - Some line clustering in weeks 4-6 makes individual cohorts slightly harder to
    distinguish
  image_description: The plot displays a line chart on a white-to-light-gray gradient
    background with the title "line-retention-cohort · highcharts · pyplots.ai" in
    bold dark text (48px) and subtitle "User Retention by Monthly Signup Cohort —
    Newer cohorts show improving retention trends" in gray (30px). Five cohort retention
    curves span from Week 0 to Week 12 on the x-axis ("Weeks Since Signup") and 10%
    to 100% on the y-axis ("Retained Users (%)"). All curves start at 100% and decay
    at different rates. Jan 2025 (blue, thinnest at 3px, most transparent at 0.55
    opacity) decays fastest, reaching near 20% by week 12. Feb 2025 (orange), Mar
    2025 (brown), Apr 2025 (purple), and May 2025 (gold/yellow, thickest at 8px, fully
    opaque) decay progressively slower. A red dashed horizontal line at 20% is labeled
    "⚠ 20% Retention Target" with a subtle pink plot band below it labeled "Below
    Target." Lines crossing below 20% become dotted via Highcharts zones. The vertical
    legend on the right displays "Signup Cohort" as a title with each cohort name
    and sample size (e.g., "Jan 2025 (n=1,245)"). Subtle dashed gridlines at 10% intervals
    on the y-axis aid reading. Markers are circles with white borders, varying in
    size from 5px to 12px by cohort.
