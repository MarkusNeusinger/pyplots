  image_description: The plot displays a Weibull probability plot for turbine blade
    fatigue-life data. The x-axis shows "Time to Failure (hours)" on a logarithmic
    scale ranging from ~1,000 to ~20,000. The left y-axis shows the linearized Weibull
    scale "ln(-ln(1-F))" ranging from about -5 to +2, while a secondary right y-axis
    displays cumulative probability percentages (1% to 99%). Filled dark blue circles
    represent failure data points (~24), and hollow blue circles represent censored
    observations (~6). A solid blue fitted line runs diagonally from lower-left to
    upper-right. A red dashed horizontal reference line marks the 63.2% characteristic
    life level. An annotation box in the lower-right displays β = 2.39 (shape) and
    η = 7404 h (scale). The legend in the upper-left lists "Weibull fit", "Failures",
    "Censored", and "63.2% (characteristic life)". Top and right spines are removed
    on the main axis, with a subtle y-axis grid.
