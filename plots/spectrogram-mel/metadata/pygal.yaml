review:
  strengths:
  - Perfect spec compliance — all mel-spectrogram requirements met including colorbar,
    mel-scaled Hz labels, and correct STFT parameters
  - Creative solution extending pygal Graph class for an unsupported chart type (mel-spectrogram)
  - Excellent data choice with musical arpeggio showing harmonics, decay envelopes,
    and frequency variation
  - Inferno colormap with smooth interpolation provides excellent visual quality and
    accessibility
  - Custom mel filterbank implementation avoids librosa dependency
  weaknesses:
  - sys.path manipulation for import collision is hacky and fragile
  - Class and function definitions violate KISS flat structure
  - Design could benefit from more visual storytelling emphasis
  - Slight pixelation from aggressive downsampling (96x150 cells)
  - Margin/whitespace could be tightened for better canvas utilization
  image_description: The plot displays a mel-spectrogram with an inferno colormap
    (dark purple to bright yellow). The title "spectrogram-mel · pygal · pyplots.ai"
    is centered at the top. The x-axis is labeled "Time (s)" ranging from 0.0 to 3.0,
    and the y-axis is labeled "Frequency (Hz)" with mel-scaled tick marks at 100,
    200, 500, 1.0k, 2.0k, 4.0k, and 8.0k Hz. A vertical colorbar on the right is labeled
    "dB" with tick values from 0 to -80. The spectrogram clearly shows six distinct
    notes of a C-major arpeggio pattern (ascending C4, E4, G4, C5, then descending
    G4, E4) as bright horizontal bands at their fundamental frequencies and harmonics
    (2nd and 3rd harmonics visible). Each note shows an exponential decay envelope.
    A subtle broadband noise floor is visible throughout. The plot area fills the
    canvas well with a dark border around the spectrogram region.
