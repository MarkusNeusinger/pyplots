  image_description: 'The plot displays a 5x5 risk assessment matrix with "Impact"
    on the x-axis (Negligible, Minor, Moderate, Major, Catastrophic) and "Likelihood"
    on the y-axis (Rare at top, Almost Certain at bottom). Background cells are colored
    with a continuous green-yellow-orange-red gradient based on risk score (product
    of likelihood x impact), with semi-transparent score numbers (1-25) watermarked
    in each cell. 15 risk items appear as colored circular markers: blue (Technical),
    gold/orange (Financial), and purple (Operational), each labeled above the marker.
    White borders with rounded corners separate cells. A "Risk Category" legend sits
    in the bottom-right corner. The title reads "heatmap-risk-matrix · altair · pyplots.ai"
    with subtitles describing the 15 risks and risk zone definitions (Low 1-4, Medium
    5-9, High 10-16, Critical 20-25).'
