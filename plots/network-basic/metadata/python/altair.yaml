review:
  strengths:
  - Force-directed spring layout implemented from scratch in pure numpy — deterministic
    and reproducible
  - Altair detail='edge_id:N' pattern for drawing network edges is idiomatic and elegant
  - Degree-based node sizing using alt.Size with explicit range adds meaningful visual
    encoding
  - Social network data with 4 named communities and cross-group bridges is realistic
    and demonstrative
  - Clean frameless layout (axis=None) is appropriate for network graphs
  weaknesses:
  - No ANYPLOT_THEME reading — code does not import os or check os.getenv('ANYPLOT_THEME').
    Both renders must adapt to the theme environment variable.
  - Wrong output filenames — saves plot.png/plot.html instead of plot-light.png/plot-dark.png/plot-light.html/plot-dark.html.
    Pipeline cannot collect output.
  - 'Wrong palette — group_colors uses Python-branded colors (#306998, #FFD43B, #4CAF50,
    #FF7043), not Okabe-Ito. Must use [''#009E73'', ''#D55E00'', ''#0072B2'', ''#CC79A7'']
    for 4 groups.'
  - Hardcoded dark label color — mark_text(color='#222222') is near-black and renders
    dark-on-dark in dark theme. Must use INK_SOFT token.
  - No theme-adaptive chrome — needs PAGE_BG, INK, INK_SOFT tokens applied via .properties(background=PAGE_BG),
    configure_title(color=INK), configure_legend(), and adaptive node stroke/edge
    color.
  - Wrong title domain — 'pyplots.ai' should be 'anyplot.ai'; also has extra 'Social
    Network ·' prefix.
  - Label font size 12px — too small for 4800x2700 canvas; node labels should be at
    least 16px.
  image_description: |-
