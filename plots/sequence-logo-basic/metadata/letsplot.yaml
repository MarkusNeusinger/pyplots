  image_description: 'The plot displays a sequence logo approximation for a 10-position
    DNA transcription factor binding site motif. At each position, colored letters
    (A=green, C=blue, G=orange, T=red) are stacked vertically with heights proportional
    to their contribution to information content. Subtle, semi-transparent colored
    rectangles (alpha=0.15) sit behind the letters, providing visual structure without
    dominating. The title "sequence-logo-basic · letsplot · pyplots.ai" appears bold
    at the top left. X-axis is labeled "Position" (1-10), Y-axis is "Information content
    (bits)" (0-2.1). A "Nucleotide" legend on the right shows A, C, G, T with lowercase
    "a" symbols in respective colors. The TATA-box motif is clearly visible: positions
    2 (T, red), 3 (A, green), 4 (T, red), 5 (A, green) are dominant with tall stacks
    (~1.0-1.4 bits). Position 7 shows moderate G conservation, position 8 shows C
    conservation. Positions 1, 9, and 10 have near-zero information content. Small-frequency
    letters at the bottom of stacks are very small but colored against a white background.'
