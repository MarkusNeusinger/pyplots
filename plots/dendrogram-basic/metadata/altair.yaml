  image_description: 'The plot displays a dendrogram of 15 Iris flower samples (5
    each of Setosa, Versicolor, Virginica) clustered using Ward''s linkage method.
    The Y-axis shows "Distance (Ward''s method)" ranging from 0 to approximately 12.
    Branches are colored by cluster membership: blue (#306998) for Setosa, gold (#D4A017)
    for Versicolor, purple (#7B68AE) for Virginica, and gray (#888888) for inter-cluster
    merges. A dashed red threshold line at d=5.0 is labeled "cluster threshold (d
    = 5.0)". Leaf labels are rotated 315 degrees at the base with colored circular
    dots by species. A legend titled "Species" sits in the upper right corner with
    a subtle border. The title reads "dendrogram-basic · altair · pyplots.ai" with
    a subtitle "Ward''s linkage on Iris measurements — Setosa separates clearly from
    Versicolor / Virginica". An annotation at the top merge point reads "Setosa diverges
    from Versicolor + Virginica" with a small triangle arrow. Background is light
    gray (#FAFBFC) with subtle dashed gridlines.'
