  image_description: 'The plot displays an MA plot (M-versus-A) for differential gene
    expression analysis. The x-axis shows "Mean Expression (A)" ranging from 0 to
    ~24, and the y-axis shows "Log₂ Fold Change (M)" ranging from approximately -4.5
    to +5. Three groups of scatter points are visible: light steel blue (barely visible,
    non-significant genes forming a dense cloud near M=0), red dots (upregulated genes,
    p<0.05, spread above the zero line up to M≈5), and blue dots (downregulated genes,
    p<0.05, spread below zero down to M≈-4.5). Large black dots mark the top 10 DE
    genes (BRCA1, TP53, etc.). A solid charcoal horizontal line at M=0 serves as the
    no-change reference. Very faint gray dashed lines at M=+1 and M=-1 mark 2-fold
    change thresholds. An orange LOESS trend line with dots runs near M=0 across the
    expression range. The legend at the bottom displays 8 entries in a single row.
    The background is white with a very light blue-gray plot area (#FAFBFC). Title
    reads "ma-differential-expression · pygal · pyplots.ai".'
