  strengths:
  - Excellent min/max envelope downsampling technique for dense waveform data (chunk_size=64)
  - Perfect code quality with clean KISS structure, proper seed, and all imports used
  - Strong spec compliance with all required features including semi-transparent fill
    and zero-line
  - Realistic audio data with harmonics, vibrato, and attack-sustain-release envelope
  weaknesses:
  - Design Excellence needs improvement — plot lacks publication-level polish
  - No data storytelling — attack/sustain/release dynamics not visually highlighted
  - Vertical canvas underutilized — significant empty space above/below waveform
  - Generic plotnine usage without distinctive library features
  image_description: 'The plot displays an audio waveform as a filled ribbon symmetric
    around a zero baseline. The fill is a semi-transparent Python Blue (#306998) color
    against a light off-white panel background (#fafafa) on a white plot background.
    The x-axis is labeled "Time (seconds)" with ticks at 0.25s intervals from 0.00
    to 1.50. The y-axis is labeled "Amplitude" with ticks from -1.0 to 1.0 at 0.5
    intervals. The title reads "waveform-audio · plotnine · pyplots.ai" in bold dark
    text. The waveform shows a clear attack-sustain-release envelope: a rapid ramp-up
    in the first ~0.05s, sustained oscillation from ~0.05-1.1s with amplitude reaching
    roughly ±0.75, and a gradual decay to zero from ~1.1-1.5s. Subtle horizontal y-axis
    grid lines are visible; x-axis grid is removed. A thin gray zero-line runs horizontally
    through the center. The min/max envelope rendering creates the classic DAW waveform
    appearance.'
