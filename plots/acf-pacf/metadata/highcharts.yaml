    interval with a "95% CI" label. The bottom panel shows PACF from lag 1 to 35 with
    the same color scheme — significant orange bars at lags 1 (0.42), 2 (-0.33), and
    5 (0.16), with matching confidence bounds. Y-axes are labeled "ACF" and "PACF",
    x-axis is labeled "Lag". A legend in the top right distinguishes "Significant
    (|r| > 95% CI)" (orange) from "Non-significant" (blue). The layout is clean with
    subtle grey gridlines.
