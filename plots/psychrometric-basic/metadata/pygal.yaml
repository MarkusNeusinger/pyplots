  strengths:
  - Perfect spec compliance with all psychrometric properties correctly computed using
    ASHRAE formulas
  - Excellent data storytelling with HVAC process path and comfort zone creating engineering
    context
  - Thoughtful color coding with distinct color families per property type (blue/orange/purple/teal)
  - Direct curve labeling with color-matched rotated text aligned to curve slopes
    replaces crowded legend
  - Right-edge label truncation fixed from attempt 2
  - Deterministic physically accurate calculations
  weaknesses:
  - Label crowding in upper-right quadrant where multiple curve families converge
  - Comfort zone polygon fill partially obscures underlying RH curves
  - Helper functions and SVG injection add structural complexity beyond KISS ideal
  - Specific volume lines could be slightly more prominent
  image_description: The plot displays a psychrometric chart with dry-bulb temperature
    (°C) on the x-axis from -10 to 50 and humidity ratio (g/kg) on the y-axis from
    0 to 30. Blue curved lines represent relative humidity from 10% to 100%, with
    the saturation curve (100% RH) drawn as the thickest dark navy line. Each RH curve
    is labeled directly with its percentage in dark blue bold text. Orange dashed
    diagonal lines show wet-bulb temperature isolines (Tw 0°C through Tw 30°C) with
    rotated orange labels aligned to their slope. Purple dotted lines indicate specific
    volume values (0.80 to 0.96 m³/kg) with rotated purple labels. Teal dash-dot diagonal
    lines represent enthalpy values (h=10 through h=90 kJ/kg) with rotated teal labels
    placed at 2/3 along each line. A green filled polygon marks the comfort zone (20–26°C,
    30–60% RH) with a centered "Comfort Zone" label in green. A bold red line with
    two large red dots connects State A (35°C, 60% RH) to State B (24°C, 50% RH),
    illustrating an HVAC cooling and dehumidification process with labeled endpoints.
    The title reads "psychrometric-basic · pygal · pyplots.ai". The background is
    white with a light gray plot area and subtle grid lines. Legend is hidden since
    all curves are labeled directly. Some label crowding persists in the upper-right
    area where multiple curve families converge.
