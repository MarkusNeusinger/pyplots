review:
  strengths:
  - Correct information content calculation with proper entropy formula
  - 'Excellent data choice: real ETS-family binding motif with clear biological signal'
  - Dynamic letter sizing via dataLabels formatter adapts to bar height
  - Clean linear code structure with deterministic data
  - Proper axis labels with units
  weaknesses:
  - Letters rendered as plain white text on colored bars rather than stretched glyphs
    as spec requires
  - Unused Chart import — the highcharts-core Python API is completely bypassed
  - Low-IC positions have cramped, hard-to-read stacked labels
  - No use of the highcharts-core Python library Chart/Series API
  image_description: The plot displays a stacked column chart representing a DNA sequence
    logo for a 10-position ETS-family transcription factor binding site. Each position
    (1-10) on the x-axis has stacked colored bars where A=green (#2ca02c), C=blue
    (#1f77b4), G=orange (#ff7f0e), T=red (#d62728). The total bar height at each position
    corresponds to information content in bits (y-axis, 0 to 2.0). White letter labels
    (A, C, G, T) are overlaid on each colored segment. Positions 2-3 are dominated
    by G (tall orange bars ~0.95-1.15 bits), positions 4-5 by A (tall green bars ~1.15-1.35
    bits), positions 6-7 by T (tall red bars ~1.42-1.57 bits), while positions 1,
    8, 9, 10 have low information content (short or no bars). Position 9 has zero
    information content (uniform distribution). The title reads "sequence-logo-basic
    · highcharts · pyplots.ai". Subtle grid lines on y-axis, clean white background.
