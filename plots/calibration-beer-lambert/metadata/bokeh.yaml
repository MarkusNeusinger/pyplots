  image_description: 'The plot displays a Beer-Lambert calibration curve on a light
    blue-gray background (#F7F9FC). Seven blue circular markers represent calibration
    standards at concentrations 0, 2, 4, 6, 8, 10, and 12 mg/L, with absorbance values
    ranging from ~0 to ~0.55. A dark teal linear regression line passes through the
    data points. A light blue shaded band shows the 95% prediction interval, widening
