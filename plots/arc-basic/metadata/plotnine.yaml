    connected nodes. The arcs use a monochromatic navy blue color scheme — darker,
    thicker arcs represent stronger interactions (weight 3, e.g., Alice-Bob, Carol-David)
    while lighter, thinner arcs represent weaker ones (weight 1, e.g., Carol-Eve).
    Nodes appear as white circles with dark navy blue borders. A color gradient legend
    on the right shows "Interaction Strength" from Weak (light blue) to Strong (dark
    navy). The title "Character Interactions · arc-basic · plotnine · pyplots.ai"
    is centered at the top in bold navy, with a subtitle "Narrative connections in
    Chapter 1 — arc thickness and color encode interaction strength." An italicized
    gray annotation reads "Stronger connections shown with darker, thicker arcs."
    The longest arc spans from Alice to Jack across the entire width.
