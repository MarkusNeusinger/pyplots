  strengths:
  - Perfect spec compliance and data quality — realistic soil moisture scenario with
    diurnal cycles, rain recovery, and growing uncertainty
  - Creative polygon technique for band rendering in pygal, which lacks native fill_between
  - Clean, well-commented code with excellent structure, reproducibility, and KISS
    adherence
  - Thoughtful custom Style with intentional color hierarchy and subtle guide styling
  - Good visual clarity with no overlapping elements and legible text at all sizes
  weaknesses:
  - Design Excellence ceiling limited by pygal rendering constraints (no spine removal,
    limited typography control)
  - Center trend line could appear more visually dominant — stroke_style width=32
    does not render as expected
  - Library mastery limited by pygal relatively narrow feature set for band-type visualizations
  image_description: The plot displays a band chart on a white background with the
    title "band-basic · pygal · pyplots.ai" centered at the top in dark text. The
    x-axis is labeled "Time (hours)" ranging from 0h to 48h with major ticks at 0,
    12, 24, 36, 48 and minor ticks at 6, 18, 30, 42. The y-axis is labeled "Soil Moisture
    (%)" ranging from approximately 20% to 44%. A light blue semi-transparent filled
    polygon forms the 95% confidence band, starting wide around 38-42% at hour 0,
    declining with diurnal oscillations to ~26-32% around hours 12-18, partially recovering
    around hours 28-30, then dropping more steeply toward ~20-26% at hour 48. The
    band width increases over time, communicating growing measurement uncertainty.
    A gold/dark goldenrod central trend line ("Sensor Mean") runs through the band,
    clearly distinguishable from the blue fill. Subtle horizontal gray dashed grid
    lines appear at 2% intervals through the semi-transparent fill. The legend at
    the bottom displays "95% Confidence Band" (blue square) and "Sensor Mean" (gold
    square). Overall layout is clean with white background, balanced margins, and
    good canvas utilization.
