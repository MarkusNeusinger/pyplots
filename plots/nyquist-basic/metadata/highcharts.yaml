  image_description: The plot displays a Nyquist diagram on a square white canvas
    with 1:1 aspect ratio. The title "nyquist-basic · highcharts · pyplots.ai" appears
    at the top in bold 56px text, with subtitle "G(s) = 2 / [s(s+1)(0.5s+1)] — Open-Loop
    Frequency Response" below. The main Nyquist curve is a solid blue (#306998) line
    sweeping from the lower-left quadrant upward and curving toward the origin, representing
    G(jω) for ω > 0. A dashed blue mirror curve shows negative frequencies (ω < 0),
    reflected across the real axis. A gray dotted unit circle is centered at the origin.
    The critical point (-1, 0) is marked with a large red diamond (#c0392b) with white
    border and labeled with a bordered red annotation box. Green and purple diamond
    markers indicate gain margin (3.5 dB) and phase margin (11.6°) respectively, with
    a "PM = 11.6°" annotation near the gain crossover point. Frequency annotations
    (ω=0.5, ω=0.7, ω=2.0) are placed along the curve in bordered blue label boxes.
    Small blue triangle markers indicate the direction of increasing frequency. The
    x-axis is labeled "Real Axis" and y-axis "Imaginary Axis" with tick labels from
    -4 to 3 (x) and -4 to 4 (y). The legend in the upper-right corner lists all six
    series. Subtle grid lines (very low opacity) and faint zero-reference plot lines
    are visible.
