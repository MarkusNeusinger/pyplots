  image_description: |-
    The plot displays a dual-panel Bode plot for a Type-1 open-loop transfer function. The top panel shows magnitude in dB vs. frequency (Hz) on a logarithmic x-axis, with the response curve in dark blue starting around +30 dB at 0.1 Hz and rolling off to approximately -110 dB at 1000 Hz. A dashed gray reference line at 0 dB is visible. Two blue dots mark the phase crossover frequency (~5 Hz) on the magnitude curve and at 0 dB, connected by a vertical blue line. An annotation box with blue border reads "GM = 18.7 dB" with an arrow pointing to the midpoint.

    The bottom panel shows phase in degrees vs. frequency, with the curve starting at -90° and rolling off to approximately -270°. A dashed gray reference line at -180° is present. Two orange dots mark the gain crossover frequency on the phase curve and at -180°, connected by a vertical orange line. An annotation box with orange border reads "PM = 41.8°" with an arrow. Dotted vertical lines at both crossover frequencies span both panels. The title reads "bode-basic · seaborn · pyplots.ai". Spines are removed on top and right, with subtle grid lines on both axes. The overall design is clean and professional.
