  image_description: 'The plot displays a log-log scatter chart of Density (kg/m³)
    vs Young''s Modulus (GPa) — a classic Ashby material selection chart. Seven material
    families are shown with distinct colors: Metals & Alloys (steel blue), Ceramics
    & Glasses (coral red), Polymers (teal), Elastomers (gold/amber), Composites (purple),
    Foams (orange), and Natural Materials (brown/taupe). Each family cluster is enclosed
    by a dashed convex-hull envelope with a light semi-transparent fill. Family name
    labels are placed near their respective clusters with matching border colors on
    white backgrounds. Three diagonal performance index guide lines (E/ρ = 0.01, 1,
    100) are drawn as dashed gray lines with italic labels. The title reads "Density
    vs. Young''s Modulus · scatter-ashby-material · highcharts · pyplots.ai" with
    a subtitle below. The background is light gray with a white plot area. A vertical
    legend on the right lists all 7 families with colored circle symbols inside a
    bordered, rounded box with subtle shadow. Axes use logarithmic scales spanning
    ~10–20,000 kg/m³ (x) and ~0.0001–1,000 GPa (y) with subtle dashed grid lines.'
