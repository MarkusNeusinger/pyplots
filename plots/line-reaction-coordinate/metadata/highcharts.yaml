  image_description: 'The plot displays a reaction coordinate energy diagram on a
    light gray (#fafbfc) background. A smooth dark blue spline curve traces the energy
    profile from left to right: it starts flat at the reactant plateau (~50 kJ/mol),
    rises smoothly through a transition state peak at ~120 kJ/mol, then descends to
    the product plateau at ~20 kJ/mol. The title "line-reaction-coordinate · highcharts
    · pyplots.ai" appears at the top in dark text. The y-axis is labeled "Potential
    Energy (kJ/mol)" with tick values from 5 to 140. The x-axis is labeled "Reaction
    Coordinate" with no tick marks. Two horizontal dashed gray lines mark the reactant
    (50) and product (20) energy levels. An orange vertical double-headed arrow on
    the left side spans from the reactant level to the transition state, with an orange-bordered
    label "Eₐ = 70 kJ/mol". A blue vertical double-headed arrow on the right spans
    from product to reactant level, with a blue-bordered label "ΔH = -30 kJ/mol".
    "Reactants" is labeled in blue on the left plateau, "Products" in blue on the
    right plateau, and "Transition State (‡)" appears in a red-bordered box near the
    peak. The overall style is clean, minimal, and scientifically appropriate.'
