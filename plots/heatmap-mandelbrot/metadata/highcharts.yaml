  strengths:
  - Excellent smooth coloring algorithm using log2-based normalized iteration count
    plus log-scale transformation for superior boundary detail
  - Beautiful dark theme with carefully coordinated Plasma-inspired color palette
    and typography hierarchy
  - Full spec compliance with all required features including correct aspect ratio,
    labeled axes with mathematical notation, and black interior
  - Interactive HTML export with informative tooltips showing complex number notation
    and iteration counts
  - Efficient vectorized NumPy computation handling 480K data points
  weaknesses:
  - Right margin slightly large relative to plot area, creating some spatial imbalance
  - Color axis tick labels could be slightly larger for better readability
  image_description: The plot displays the Mandelbrot set fractal on a dark navy (#0a0a1a)
    background. The characteristic cardioid main body and period-2 bulb are rendered
    in solid black at the center of the complex plane. Surrounding the set boundary
    is a vivid Plasma-inspired color gradient progressing from deep blue/indigo (low
    escape iterations) through purple, magenta, orange to bright yellow (high escape
    iterations). The x-axis is labeled "Real Axis (Re)" ranging from -2.5 to 1.0 with
    tick marks every 0.5. The y-axis is labeled "Imaginary Axis (Im)" ranging from
    -1.0i to 1.0i with the "i" suffix on tick labels. A vertical color bar legend
    titled "Escape Iterations" sits on the right side showing values 0, 5, 10, 20,
    50, 100. The title reads "heatmap-mandelbrot · highcharts · pyplots.ai" at the
    top. The fractal boundary shows beautiful smooth coloring with fine detail visible
    at smaller bulbs, antenna filaments, and self-similar structures along the boundary.
    The aspect ratio correctly preserves the mathematical proportions of the complex
    plane.
