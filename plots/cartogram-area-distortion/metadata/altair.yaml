  image_description: 'The plot displays a Dorling cartogram of the contiguous United
    States (plus Alaska and Hawaii repositioned in the bottom-left). Each state is
    represented by a circle positioned at its geographic centroid, with circle area
    proportional to state population. A very faint reference map of US state outlines
    in light gray provides geographic context beneath the circles. Circles are colored
    by US Census region: dark blue for Northeast, gold for Midwest, burnt orange for
    South, and forest green for West. The five most populous states (California, Texas,
    Florida, New York, Pennsylvania) are visually emphasized with darker outlines
    and higher opacity. White bold state abbreviation labels appear on circles for
    states with population >= 4M, and italic population values appear below labels
    for the top 5 states. A Region legend with colored symbols sits in the bottom-left,
    and a Population size legend is in the bottom-right. An annotation in the lower
    portion reads "Top 5 states hold 37% of the US population." The title reads "US
    States by Population · cartogram-area-distortion · altair · pyplots.ai" with a
    subtitle explaining the circle sizing and top-5 emphasis. The background is a
    warm off-white.'
