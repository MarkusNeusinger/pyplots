  image_description: The plot displays a histogram of 200 shaft diameter measurements
    (mm) using semi-transparent blue bars (#306998) with white edges, overlaid with
    a fitted normal distribution curve rendered as a blue outlined area with light
    fill. Two orange (#E67E22) dashed vertical lines mark the Lower Specification
    Limit (LSL = 9.950) and Upper Specification Limit (USL = 10.050), with bold orange
    labels positioned outside the histogram range. A teal (#1A7A6D) dashed vertical
    line marks the Target value (10.000) with a label. Prominent bold dark text displays
    "Cp = 1.49 | Cpk = 1.45" in the upper-left quadrant, with smaller gray text below
    showing "Mean = 10.0015 mm | Std = 0.0112 mm". The title reads "histogram-capability
    · letsplot · pyplots.ai" in bold with a descriptive gray subtitle. X-axis is "Shaft
    Diameter (mm)" with 3-decimal formatting, Y-axis is "Frequency" with integer formatting.
    Only horizontal y-grid lines are visible on a white background. The distribution
    is well-centered within specification limits, clearly showing a capable process.
