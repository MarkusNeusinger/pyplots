  image_description: 'The plot displays a multi-track genome browser view of the EGFR
    gene locus on chr7 (~55,086,000-55,212,000 bp) with four vertically stacked tracks
    sharing a common x-axis. Gene track (top): Blue rectangular exons connected by
    a thin light-blue intron line, with small blue triangle arrows indicating + strand
    direction. "EGFR (+)" label in italic above the gene body. Thinner UTR rectangles
    at 5'' and 3'' ends. Coverage track: A filled area plot in semi-transparent blue
    with a darker blue outline showing read depth (0-60x), with clear peaks at exon
    positions. Dashed gray grid lines on y-axis. Light gray background distinguishes
    it from adjacent tracks. Variant track: Lollipop markers with gray stems - orange
    circles for SNPs and purple diamonds for Indels - positioned at quality scores
    (0-100). Legend in top-right corner. Regulatory track (bottom): Colored rectangles
    - green (Promoter), gold (Enhancer), pink/red (CTCF Binding) - with horizontal
    legend. X-axis shows genomic positions with comma-formatted labels and "Genomic
    Position (chr7)" label. Title reads "genome-track-multi · bokeh · pyplots.ai"
    at top-left. Alternating white/light-gray backgrounds separate tracks.'
