      Legibility verdict: PASS — all text clearly readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black.
      Chrome: Title, axis labels, and tick labels all render in light colors (INK = #F0EFE8 for primary, INK_SOFT = #B8B7B0 for ticks) — all clearly readable against the dark background. No dark-on-dark failures detected. Peak annotation box has dark elevated background (#242420) with near-white text (#F0EFE8) and gray border (#B8B7B0) — correctly inverted for dark mode.
