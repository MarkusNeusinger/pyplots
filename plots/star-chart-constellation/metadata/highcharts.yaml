review:
  strengths:
  - Exceptional visual design with planetarium-quality dark theme, radial gradient
    background, and star glow effects
  - Complete spec compliance with all required features including projection, constellation
    lines, coordinate grid, ecliptic, and magnitude-based sizing
  - Real astronomical data with accurate star coordinates and magnitudes
  - Thoughtful 15-color palette with hue diversity for constellation differentiation
  - Interactive HTML version alongside static PNG leverages Highcharts interactive
    strengths
  - Subtle, refined grid styling with dotted lines at low opacity
  weaknesses:
  - project() function definition could be inlined to follow strict KISS pattern
  - Some constellation color pairs (gold/lemon, coral/amber) may be hard to distinguish
    for colorblind viewers
  - Declination labels and ecliptic label are slightly small relative to overall chart
    scale
  image_description: The plot displays a circular star chart on a deep navy background
    (#0a0e1a) with a radial gradient. It uses an azimuthal equidistant projection
    centered on the North Celestial Pole. 15 constellations are rendered with colored
    stick-figure lines connecting named stars — each constellation has a distinct
    color (e.g., sky blue for Orion, gold for Ursa Major, orchid purple for Cassiopeia,
    coral for Leo, green for Cygnus). Stars appear as white/pale-yellow glowing circles
    with radial gradients, sized proportionally to brightness (Sirius being the largest).
    The RA coordinate grid radiates from the center with dotted lines every 3 hours,
    labeled at the boundary (0h, 3h, 6h, etc.). Concentric dotted declination circles
    mark +60°, +30°, 0°, and -30°. A dashed amber ecliptic line curves across the
    chart, labeled "Ecliptic." Constellation names are displayed in their respective
    colors near the centroid of each group. ~400 faint background stars add atmospheric
    depth. The title reads "star-chart-constellation · highcharts · pyplots.ai" with
    a subtitle describing the projection and coverage.
