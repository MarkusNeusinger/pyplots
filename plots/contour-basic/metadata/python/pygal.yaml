    tick labels; raising to 38px would improve consistency
  - Minor label crowding near the 1200 m / primary peak area — the halo keeps labels
    readable but the placement could fan labels slightly further from peak markers
  - DE-01 could approach 8 with more typographic polish (e.g., a slightly refined
    font weight hierarchy between the title and axis labels)
