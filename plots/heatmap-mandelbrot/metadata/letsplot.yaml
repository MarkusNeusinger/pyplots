  strengths:
  - Excellent smooth coloring technique eliminates discrete banding at fractal boundary
  - Inferno colormap on dark panel background creates a striking, professional visualization
  - Complete spec compliance with all required features implemented correctly
  - Interactive tooltips showing complex coordinates (c = real + imag*i) are a creative
    use of lets-plot
  - Clean, elegant numpy vectorization for the Mandelbrot computation
  - Thoughtful text color hierarchy and typography choices
  weaknesses:
  - Caption text at size 12 is slightly small relative to the 4800x2700 output resolution
  - coord_fixed creates some unused horizontal space in the layout
  - Could leverage more lets-plot distinctive features
  image_description: The plot displays a Mandelbrot set fractal visualization rendered
    as a heatmap using lets-plot's geom_raster. The background is near-black (#0d0d0d),
    which seamlessly blends with the black interior of the Mandelbrot set. The fractal
    boundary glows with the inferno colormap — transitioning from deep purple/magenta
    near the set boundary through orange to bright yellow for rapidly escaping points.
    The characteristic cardioid (main body) and period-2 bulb (large circle to its
    left) are clearly visible, along with smaller satellite bulbs and the intricate
    filament structure along the real axis. The title "heatmap-mandelbrot · letsplot
    · pyplots.ai" appears in bold dark text at the top, with an italic subtitle "Escape-time
    fractal with smooth iteration coloring on the complex plane." The x-axis is labeled
    "Real Axis" (-2.5 to 1.0), the y-axis "Imaginary Axis" (-1.0 to 1.0), and a vertical
    "Iterations" colorbar on the right shows the scale from ~5 to ~95. A caption at
    the bottom reads "z(n+1) = z(n)² + c · max iterations = 100 · interior points
    in black." The smooth coloring technique eliminates discrete banding, creating
    a visually striking gradient at the fractal boundary.
