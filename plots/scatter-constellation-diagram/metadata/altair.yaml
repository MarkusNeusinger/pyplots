  image_description: The plot displays a 16-QAM constellation diagram on a square
    canvas. Sixteen ideal constellation points are shown as orange/red cross markers
    arranged in a 4x4 grid at I/Q coordinates ±1 and ±3. Approximately 1000 received
    symbols appear as semi-transparent teal/mint-green dots clustered around each
    ideal point with Gaussian noise spread. Dashed grey decision boundary lines are
    drawn at I/Q values -4, -2, 0, 2, and 4 on both axes, separating the 16 symbol
    decision regions. The title "scatter-constellation-diagram · altair · pyplots.ai"
    appears at the top in moderate font. Axes are labeled "In-Phase (I)" (x) and "Quadrature
    (Q)" (y) with range approximately -5 to 5. A bold "EVM = 14.0%" annotation is
    positioned in the upper-right quadrant. The background is white with no default
    grid lines; the view border stroke is removed. The overall layout is clean and
    square, preserving constellation geometry.
