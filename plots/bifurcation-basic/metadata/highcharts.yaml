  strengths:
  - Excellent data quality with canonical logistic map showing full period-doubling
    cascade and perfect parameter range
  - Good data storytelling with plotLines marking key bifurcation transitions and
    informative subtitle
  - Appropriate density visualization with small markers and alpha blending for 60K
    points
  - Clean deterministic code with CDN fallback resilience
  - Subtle grid styling and custom background elevate visual refinement
  weaknesses:
  - Does not use highcharts-core Python API; constructs raw JS instead of Chart(),
    ScatterSeries(), etc.
  - Plotline labels at r≈3.449 and r≈3.57 overlap due to identical y-offset positioning
  - Title format prepends Logistic Map to the required spec-id · library · pyplots.ai
    format
  - Only 40 steady-state samples per r value instead of spec-suggested 100
  image_description: 'The plot displays a bifurcation diagram of the logistic map
    rendered as a scatter plot on a light gray (#fafbfc) background. The title reads
    "Logistic Map · bifurcation-basic · highcharts · pyplots.ai" with a subtitle showing
    the equation x(n+1) = r · x(n) · (1 − x(n)) — route from stability to chaos via
    the logistic map. The x-axis labeled "Growth Rate Parameter (r)" spans 2.5 to
    4.0 with tick marks every 0.25, and the y-axis labeled "Steady-State x" spans
    0 to 1 with tick marks every 0.2. Blue semi-transparent scatter points (rgba blue
    at 0.3 alpha, radius 1.2) trace the classic period-doubling cascade: a stable
    fixed point from r=2.5 to approximately r=3.0, then a period-2 bifurcation splitting
    into two branches, period-4 splitting, and eventually chaos filling a triangular
    region from approximately r=3.57 to 4.0 with visible windows of periodicity. Three
    vertical dashed plotlines mark key bifurcation points: r ≈ 3.0 labeled "period-2"
    in red, r ≈ 3.449 labeled "period-4" in red, and r ≈ 3.57 labeled "onset of chaos"
    in purple. The grid uses subtle dotted lines with very low opacity. The labels
    for the period-4 and onset-of-chaos plotlines are positioned close together and
    partially overlap.'
