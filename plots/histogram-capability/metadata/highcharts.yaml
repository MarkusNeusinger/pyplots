  image_description: The plot displays a process capability histogram for shaft diameter
    measurements (mm). The chart has a light off-white background with a bold title
    "Shaft Diameter Process Capability · histogram-capability · highcharts · pyplots.ai".
    Below the title is a subtitle showing key statistics (n=200, Cp, Cpk, Mean, σ).
    Deep blue (#306998) histogram bars show the measurement distribution centered
    around 10.00 mm, overlaid with an orange (#d35400) fitted normal distribution
    curve and a subtle orange area fill beneath it. Red dashed vertical lines mark
    LSL=9.95 and USL=10.05 with bold red labels. A purple dotted line marks the target
    value (10.0) and a blue dashed line marks the mean (~10.008). A light green shaded
    band spans the in-spec zone between LSL and USL. A Process Capability annotation
    box in the upper left displays Cp=1.63 and Cpk=1.38 with a note about off-center
    process. The legend in the upper right shows Measurement Distribution and Fitted
    Normal Curve entries with a subtle shadow and rounded border. Y-axis shows Frequency
    with dotted gridlines; X-axis shows Shaft Diameter (mm) with tick intervals of
    0.01.
