    and "White Dwarfs" (lower center). The Sun is marked as a prominent black dot
    at approximately (5,778 K, 0.0) with the label "The Sun (5,778 K, 1 L sun)". The
    legend at the bottom displays all six series. Title reads "scatter-hr-diagram
    . pygal . pyplots.ai". Subtle gray grid lines are visible. The main sequence forms
    a clear diagonal band from upper-left (hot/bright) to lower-right (cool/dim).'
