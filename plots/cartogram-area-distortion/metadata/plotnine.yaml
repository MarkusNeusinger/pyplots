  strengths:
  - Excellent data quality with realistic European population and GDP figures
  - Perfect code structure - clean, readable, well-organized
  - Good use of dual encoding (area + color) for two variables
  - Appropriate removal of axes/grid for cartographic display
  - Clean polygon outlines and country abbreviation labels
  weaknesses:
  - Polygon overlap in central region (FR/DE/CH) due to scaling formula allowing large
    countries to grow beyond original bounds
  - Missing reference map inset or original outlines for comparison (spec requirement)
  - No legend or subtitle explaining that area represents population
  - Title font size slightly below recommended 24pt threshold
  - Small countries (DK, BE, CH) have labels that are hard to read
  image_description: The plot shows a non-contiguous cartogram of 16 European countries
    rendered as polygons on a light gray (#f4f7fa) panel background with a white plot
    background. Each country's polygon area is scaled proportional to its population.
    Countries are filled using a YlOrRd (Yellow-Orange-Red) sequential colormap encoding
    GDP per capita, ranging from pale yellow (Romania ~16k USD) through orange (mid-range)
    to dark red (Switzerland ~93k, Norway ~83k). Each polygon has a dark gray (#333333)
    outline and a bold 2-letter country abbreviation label centered on it. Germany
    (DE) is the largest polygon in the center, followed by France (FR) and UK to the
    left. Small countries like Norway (NO), Denmark (DK), Switzerland (CH), and Belgium
    (BE) appear as tiny polygons. A vertical color legend on the right reads "GDP
    per Capita (k USD)" with scale markings at 20, 40, 60, 80. The title "cartogram-area-distortion
    · plotnine · pyplots.ai" is centered at the top in bold. Axes, ticks, and grid
    lines are all hidden.
