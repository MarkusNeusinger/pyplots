review:
  strengths:
  - 'Theme adaptation is correctly implemented: PAGE_BG, INK, INK_MUTED tokens flow
    through the Style object, producing correct warm off-white light background (#FAF8F1)
    and warm near-black dark background (#1A1A17) with readable light text in dark
    mode'
  - 'Okabe-Ito palette applied correctly: Community A = #009E73 (brand green first),
    then #D55E00, #0072B2, #CC79A7 in canonical order'
  - Custom force-directed spring layout implemented from scratch with proper repulsive
    and attractive forces, cooling schedule, and community-based initialization
  - Gray edge series using None-break technique cleanly separates edge rendering from
    node rendering — idiomatic pygal XY pattern
  - Interactive HTML output with per-node tooltips showing connection counts leverages
    pygal's native interactivity
  - 'Clean, reproducible code: np.random.seed(42), KISS structure, no functions or
    classes'
  - Legend at bottom with 4 columns cleanly arranged — correct use of legend_at_bottom_columns
  weaknesses:
  - Node labels not visible in static PNG — labels only appear in interactive HTML
    tooltips. Spec requires 'Labels should be legible without overlapping other elements'.
    Static render shows unlabeled dots only.
  - Degree computation is done (degrees dict) but never used for node sizing — all
    nodes rendered at uniform dots_size=30. Degree-based sizing would add visual storytelling.
  - 'No visual hierarchy or data storytelling: all nodes same size, no hub emphasis,
    no bridge-edge highlighting. Viewer cannot identify the most connected nodes at
    a glance.'
  - 'Canvas utilization: with xrange/yrange both 0-12 and nodes in 3-9 range, the
    graph uses roughly 50% of each axis — about 25% of total canvas area. Tighter
    coordinate bounds (e.g., normalize to 1-11) or better spread would improve usage.'
  - DE-03 storytelling is minimal — the 4-community structure and bridge connections
    are shown but no visual focal point or emphasis guides the viewer's eye
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: Title "network-basic · pygal · anyplot.ai" rendered in dark ink at top center, clearly readable. No axis labels or tick labels (correctly omitted for network graph). Legend at bottom shows four entries "Community A" (green square), "Community B" (orange square), "Community C" (blue square), "Community D" (pink square) — all readable against the off-white background.
      Data: 20 nodes distributed across the canvas in a force-directed layout. Community A nodes colored #009E73 (teal-green, upper-left cluster). Community B nodes colored #D55E00 (orange, upper-right cluster). Community C nodes colored #0072B2 (blue, lower-center cluster). Community D nodes colored #CC79A7 (pink/reddish-purple, lower-right cluster). Edges are thin gray lines connecting nodes, clearly visible against the warm background. Cross-community bridge edges are visible spanning the clusters.
      Legibility verdict: PASS — all chrome text is readable; data colors clearly distinguishable.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black.
      Chrome: Title "network-basic · pygal · anyplot.ai" rendered in light off-white text, clearly readable against dark background. Legend at bottom shows same four community entries in light text on dark background — all readable. No dark-on-dark failures observed.
      Data: Colors are identical to the light render — same teal-green #009E73 for Community A, #D55E00 orange for Community B, #0072B2 blue for Community C, #CC79A7 pink for Community D. Edges are gray, slightly lighter tone visible against dark background. Node layout is identical (same spring-layout positions).
      Legibility verdict: PASS — all text is light-colored and readable on dark background; no dark-on-dark failures detected.
