review:
  strengths:
  - Excellent musical data with realistic chord progression and dynamic arc across
    8 measures
  - Strong visual hierarchy between melody and accompaniment through opacity, height,
    and border contrast
  - Custom beat/measure grid lines accurately mirror DAW piano roll appearance
  - Black key row shading matches real piano keyboard layout
  - Proper use of lets-plot layer composition for building up the visualization
  weaknesses:
  - Low-velocity accompaniment notes are faint due to alpha=0.6 combined with dark
    blue on gray backgrounds
  - Color gradient mid-range purple does not contrast strongly enough with dark blue
    low end
  - No legend or annotation explaining melody vs accompaniment visual distinction
  - Gap in middle pitch range (D4-F4) creates visual dead space
  image_description: 'The plot displays a piano roll visualization spanning 32 beats
    (8 measures) with pitch on the Y-axis (B2 to G5, labeled with note names for white
    keys) and time in beats on the X-axis. Alternating light gray horizontal bands
    mark black key positions against a near-white (#FAFAFA) background. Vertical grid
    lines mark individual beats (light gray) with stronger gray lines at measure boundaries
    (every 4 beats). Notes are rendered as horizontal rectangles: melody notes in
    the upper register (G4-G5) appear taller and fully opaque with dark borders, while
    accompaniment notes in the lower register (B2-C4) are thinner and semi-transparent.
    Color encodes velocity via a blue-purple-orange gradient: dark navy for soft notes
    (~30-50), purple for medium (~60-80), and bright orange for the loudest notes
    (~100-127). The velocity legend appears on the right side. The title "piano-roll-midi
    · letsplot · pyplots.ai" is bold at the top left.'
