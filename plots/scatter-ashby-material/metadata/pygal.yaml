  strengths:
  - Comprehensive and accurate real-world materials data across 7 families with realistic
    property values
  - Creative SVG post-processing to add family centroid labels and E/rho guide lines
    that pygal does not natively support
  - 'Full spec compliance: log-log scales, bubble regions, family labels, guide lines,
    proper title format'
  - Thoughtful styling with custom palette, Trebuchet MS typography, light plot background,
    and white-stroke labels
  - Dual output (HTML interactive + PNG static) leverages pygal SVG nature
  weaknesses:
  - Composites label is positioned misleadingly high, away from most composite data
    points due to skewed centroid
  - SVG regex post-processing is fragile and depends on pygal internal SVG structure
  - 'Guide line labels (font-size 16, color #999999) are barely visible'
  - Red and green families present together reduces colorblind safety
  image_description: 'The plot shows a log-log scatter chart of Density (kg/m³) vs
    Young''s Modulus (GPa) — a classic Ashby material selection chart. Seven material
    families are displayed with large, semi-transparent dots (opacity ~0.35) creating
    a bubble-region effect: Metals (steel blue, upper right, high density/modulus),
    Ceramics (red, upper area), Polymers (emerald green, mid-range), Composites (amber/orange,
    scattered mid-upper), Elastomers (purple, lower right, very low modulus), Foams
    (silver gray, lower left corner, low density and modulus), and Natural Materials
    (brown, middle area). Each family has a bold text label positioned near its centroid
    with a white stroke for contrast against the light gray (#f8f9fa) plot background.
    Two faint dashed E/ρ performance index guide lines are drawn diagonally across
    the plot. The legend is placed at the bottom in a single row with all 7 families.
    Axis labels include units. The title follows the required format.'
