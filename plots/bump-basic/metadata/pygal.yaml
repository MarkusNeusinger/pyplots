  image_description: 'The plot displays a bump chart of Formula 1 constructor standings
    across 6 Grand Prix races (Bahrain, Jeddah, Melbourne, Imola, Monaco, Barcelona).
    The y-axis is correctly inverted with P1 at top and P5 at bottom. Five teams are
    plotted with connecting lines and dot markers: Red Bull Racing (dark navy, thick
    line, large dots) starts at P1 and drops to P3 by Barcelona; McLaren (bold orange,
    thickest line, largest dots) rises dramatically from P4 to P1 by Melbourne and
    holds; Ferrari (red, medium line/dots) stays relatively stable between P2-P3;
    Mercedes (teal, thinner line, smaller dots) drops from P3 to P4; Aston Martin
    (darker gray #6B6B6B, thinnest line, smallest dots) remains flat at P5. The title
    "bump-basic · pygal · pyplots.ai" is centered at top in large text. X-axis labeled
    "Grand Prix" with race names, y-axis labeled "Constructor Standing" with P1-P5.
    Y-axis guides are subtle, x-guides disabled. Background is white with #FAFAFA
    plot area. Legend at bottom in a single row of 5 items. The connecting lines are
    now clearly visible with differentiated stroke widths creating visual hierarchy
    — a significant improvement over attempt 2 where lines were very faint.'
