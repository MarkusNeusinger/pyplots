  strengths:
  - Perfect spec compliance - all required features implemented correctly including
    stem lines, confidence bounds, lag 0 in ACF, PACF from lag 1, shared x-axis
  - Clean well-structured code with good reproducibility (seed 42) and linear KISS
    flow
  - Appropriate AR(2) data choice that creates meaningful ACF/PACF patterns showing
    exponential decay and sharp cutoff
  - 'Good visual refinement: subtle dashed y-grid, removed x-grid, removed outlines,
    hidden toolbar'
  weaknesses:
  - Does not leverage Bokeh interactive capabilities like HoverTool for correlation
    values
  - Generic simulated data context instead of real-world scenario
  - No visual emphasis on significant lags to guide viewer attention
  - Canvas slightly undersized at 2600px vs 2700px target height
  image_description: The plot displays two vertically stacked subplots showing ACF
    (top) and PACF (bottom) for a simulated AR(2) process. Both panels use blue (#306998)
    vertical stem lines with circular dot markers extending from a gray zero baseline
    to each correlation value. Red dashed horizontal lines mark the 95% confidence
    bounds at approximately ±0.139. The ACF panel shows lag 0 at 1.0, a strong positive
    correlation at lag 1 (~0.42), a negative dip at lag 3 (~-0.25), and exponential
    decay pattern typical of AR processes. The PACF panel starts from lag 1, showing
    a significant positive spike at lag 1 (~0.43) and a sharp negative spike at lag
    2 (~-0.27), with all subsequent lags falling within the confidence bounds — the
    classic AR(2) signature. X-axes are labeled "Lag" (shared range 0-35), y-axes
    labeled "ACF" and "PACF". The title reads "acf-pacf · bokeh · pyplots.ai". The
    background is clean with subtle dashed y-grid lines and no x-grid. Overall layout
    is professional but the two panels occupy 4800x2600 pixels (slightly short of
    the 4800x2700 target).
