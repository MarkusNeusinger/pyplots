    levels. A red double-headed arrow on the left spans from 50 to 120 kJ/mol with
    a bordered label "Eₐ = 70 kJ/mol". A green double-headed arrow on the right spans
    from 20 to 50 kJ/mol with a bordered label "ΔH = -30 kJ/mol". The y-axis reads
    "Potential Energy (kJ/mol)" (0–145), the x-axis reads "Reaction Coordinate" with
    no tick labels. Title: "line-reaction-coordinate · highcharts · pyplots.ai". No
    grid lines, no legend. The curve has a noticeable unphysical dip below the reactant
    energy level (~42 kJ/mol) between the reactant plateau and the transition state
    peak.'
