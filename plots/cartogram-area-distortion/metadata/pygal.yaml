  strengths:
  - Excellent data storytelling through distortion ratios showing population density
    vs geographic area
  - Clean well-commented code explaining the cartogram-to-treemap approximation rationale
  - Custom continent color palette with strong visual identity
  - Per-node formatter is a sophisticated use of pygal distinctive features
