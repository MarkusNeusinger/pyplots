  image_description: 'The plot displays a basic arc diagram with 8 character nodes
    (Alice, Bob, Carol, David, Eve, Frank, Grace, Henry) arranged horizontally along
    a baseline. Curved bezier arcs connect nodes above the baseline, with arc height
    proportional to the distance between connected nodes. Three shades of blue encode
    connection frequency: dark navy (#1A3F5C) for "Frequent" interactions, medium
    blue (#306998) for "Moderate", and light blue (#93B5CF) for "Brief". Node sizes
    vary by weighted degree — Alice is the largest and darkest node, clearly identifiable
    as the hub character. A long-range arc from Alice to Henry is the tallest and
    most prominent. A subtle off-white background (#F7F9FB) with no visible axes or
    grid lines creates a clean look. The title "arc-basic · bokeh · pyplots.ai" appears
    in dark blue at the upper left with an italic subtitle "Character Interaction
    Frequency in Chapter 1" below. A three-item legend (Frequent, Moderate, Brief)
    sits in the upper right corner.'
