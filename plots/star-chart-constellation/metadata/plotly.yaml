review:
  strengths:
  - Excellent real-world astronomical data with accurate star positions and magnitudes
  - Attractive dark theme with thematic color palette (warm stars, cool constellation
    lines)
  - Good magnitude-to-size mapping creating clear visual hierarchy
  - Interactive hover tooltips showing star details (plotly-specific feature)
  - Proper RA axis reversal following astronomical convention
  weaknesses:
  - Constellation name labels are nearly invisible (too faint opacity/size on dark
    background)
  - Each constellation edge is a separate trace (~50 line traces) instead of consolidated
    traces
  - No sky projection (stereographic/azimuthal) as spec suggests — uses flat RA/Dec
  - Constellation lines at 0.35 opacity are too subtle, reducing readability
  image_description: The plot shows a star chart on a dark navy background (#0A0E1A)
    with stars rendered as pale yellow/white circles of varying sizes based on magnitude.
    Brighter stars like Sirius, Vega, and Arcturus appear as large circles while dimmer
    stars are small dots. Approximately 200 tiny background stars are scattered across
    the field. Thin semi-transparent cornflower blue lines connect stars within constellations
    (Orion, Ursa Major, Cygnus, Scorpius, etc.). The x-axis shows Right Ascension
    in hours (24h to 0h, reversed) and the y-axis shows Declination in degrees (-75
    to 75). The title reads "star-chart-constellation · plotly · pyplots.ai" in a
    muted blue color. A subtle grid is visible. Constellation name labels are present
    but extremely faint — only "Piscis Au..." is partially legible; most labels are
    nearly invisible against the dark background. The overall layout is a 16:9 landscape
    format.
