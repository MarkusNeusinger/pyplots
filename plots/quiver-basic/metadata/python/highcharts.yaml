review:
  strengths:
  - Manual arrow shaft + arrowhead geometry construction is technically correct and
    idiomatic for Highcharts (line series with null separators)
  - Color-encodes magnitude across 4 sequential bins, adding an informational layer
    beyond direction/length
  - 'Both themes fully adapted: all chrome elements (title, labels, ticks, grid, legend)
    correctly use INK/INK_SOFT/GRID tokens'
  - Clear circular rotation flow pattern — the vortex structure is instantly readable
  - Complete axis labels with units, generous margins, appropriate 4800x2700 canvas
    size
  weaknesses:
  - 'Color palette is neither Okabe-Ito nor viridis/cividis: #17BECF, #2AA02A, #FFD43B,
    #FF7F0E are custom hex values — use Okabe-Ito positions 1-4 (#009E73, #E69F00,
    #56B4E9, #CC79A7) for magnitude bins or a viridis color axis'
  - No top/right spine removal — chart retains full box frame; set lineWidth/tickLength
    to 0 on axes and plotBorderWidth to 0 on chart
  - Center Low-magnitude arrows are quite small and may be hard to distinguish at
    web display sizes
  image_description: |-
