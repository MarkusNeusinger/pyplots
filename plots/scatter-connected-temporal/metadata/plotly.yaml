    2009, 2020, 2022, and 2023. Decade labels (1990s, 2000s, 2010s, 2020s) appear
    in light italic text to contextualize clusters. Two directional arrows indicate
    temporal flow direction at key path segments. The background is a very light gray
    (near white), with subtle dotted grid lines on both axes. The title reads "scatter-connected-temporal
    · plotly · pyplots.ai" centered at the top.'
