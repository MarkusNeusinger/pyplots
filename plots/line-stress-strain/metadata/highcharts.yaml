review:
  strengths:
  - Excellent data storytelling with plot bands labeling elastic/hardening/necking
    regions and distinct marker shapes for critical points
  - Professional color palette with good colorblind accessibility and visual hierarchy
  - 'Complete spec coverage: all required annotations, markers, and reference lines
    are present'
  - Perfect data quality with realistic mild steel tensile test properties
  - Clean, well-structured code following KISS principles
  weaknesses:
  - The 0.2% offset line is functionally invisible — spans only ~0.0015 strain on
    a 0-0.4 scale, failing to illustrate the offset yield method
  - Minor crowding in the elastic region where annotations and markers overlap in
    a very narrow strain range
  - Horizontal plotLine labels for sigma_y and UTS are positioned at the far right
    edge, detached from the actual curve positions
  image_description: 'The plot displays an engineering stress-strain curve for mild
    steel on a white background. The main curve is drawn in dark blue (#306998), rising
    steeply in the elastic region (strain 0–0.015), transitioning through a yield
    plateau around 250 MPa, curving upward through strain hardening to a peak (UTS)
    near 400 MPa at ~0.22 strain, then declining through the necking region to fracture
    at ~0.35 strain and ~305 MPa. Three colored plot bands label the regions at the
    bottom: "Elastic" (teal-tinted), "Strain Hardening" (blue-tinted), and "Necking"
    (purple-tinted). Critical points are marked with distinct shaped markers: a teal
    circle for the yield point, a blue diamond for UTS, and a purple triangle for
    the fracture point. An orange dashed line represents the 0.2% offset line near
    the origin, though it is extremely short due to the high Young''s modulus scale.
    Two horizontal dotted reference lines mark σ_y = 250 MPa and UTS = 400 MPa with
    labels on the right. Annotations include "E = 210 GPa" in a bordered box near
    the elastic region and "← 0.2% Offset Yield Method" in an orange-bordered box.
    The title reads "Mild Steel Tensile Test · line-stress-strain · highcharts · pyplots.ai"
    with a subtitle showing material properties. A vertical legend in the upper right
    lists all five series with their markers.'
