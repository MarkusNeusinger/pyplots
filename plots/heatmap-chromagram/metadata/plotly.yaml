    Four distinct chord segments are visible: C major (0-1.5s, high energy on C, E,
    G rows), G major (1.5-3s, high energy on D, G, B), A minor (3-4.5s, high energy
    on C, E, A), and F major (4.5-6s, high energy on C, F, A). Smooth transitions
    between chord boundaries are visible. Low-energy cells appear dark purple/black,
    high-energy cells appear bright yellow/orange.'
