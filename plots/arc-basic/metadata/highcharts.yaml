  image_description: The plot shows a basic arc diagram with 10 character nodes (Alice,
    Bob, Carol, David, Eve, Frank, Grace, Henry, Iris, Jack) arranged along a horizontal
    line at the bottom of the canvas. Each node is represented by a colored circle
    with a white border — colors include dark blue (Alice), gold (Bob), cyan (Carol),
    purple (David), green (Eve), orange-brown (Frank), brown (Grace), blue (Henry),
    pink (Iris), and muted green (Jack). The circle sizes vary by connection degree,
    with Alice being the largest. Curved arcs above the line connect pairs of nodes,
    with arc height proportional to the distance between connected nodes. Long-range
    arcs (e.g., Alice–Jack, Alice–Henry) reach near the top of the canvas, while short-range
    arcs (e.g., Eve–Grace, Iris–Jack) are small half-circles. Arcs are semi-transparent
    and colored by the source node. The title reads "arc-basic · highcharts · pyplots.ai"
    with a subtitle "Character interactions — Dialogue exchanges between characters
    in a story chapter." Alice's node extends slightly past the left canvas edge due
    to the post-render scaling. The background is white and the overall layout is
    clean.
