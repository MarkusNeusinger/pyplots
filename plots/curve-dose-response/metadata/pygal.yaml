    left (more potent, EC50 ~ 1.0e-07 M) while Compound B shifts right (EC50 ~ 9.7e-07
    M). Data points with vertical error bars (SEM) with caps are overlaid on the curves.
    Dashed light-blue lines show the 95% CI bounds around Compound A's fit. Dashed
    reference lines mark EC50 positions (vertical from x-axis to half-max, horizontal
    from y-axis to the curve) for both compounds. Thin dashed horizontal lines mark
    top and bottom asymptotes for both compounds. The title reads "curve-dose-response
    · pygal · pyplots.ai". The legend at the bottom lists all series with descriptive
    labels including EC50 values.
