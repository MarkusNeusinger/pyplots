  image_description: 'The plot displays a water pressure-temperature (P-T) phase diagram
    with a logarithmic pressure axis (Pa) and linear temperature axis (K), ranging
    from 180-800 K and 10-5e8 Pa. Four phase regions are filled with soft pastel colors:
    SOLID (lavender/purple, upper-left), LIQUID (light green, center-upper), GAS (light
    blue, lower area), and SUPERCRITICAL FLUID (pale yellow, upper-right). Three dark
    blue phase boundary curves (sublimation, vaporization, melting) converge at the
    triple point. The triple point (273.16 K, 611.73 Pa) and critical point (647.1
    K, 22.06 MPa) are marked with red dots with white edges and annotated with arrow-connected
    labels showing coordinates. Dashed gray reference lines extend from the critical
    point horizontally and vertically. Phase region labels are bold, colored text
    with white outlines for readability. Top/right spines are removed, subtle y-axis
    grid is present, and the title reads "phase-diagram-pt · matplotlib · pyplots.ai".'
