  image_description: The plot displays a candlestick chart of 30 trading days from
    January 2 to approximately February 10, 2024. The title "candlestick-basic · plotnine
    · pyplots.ai" appears in bold at the top. A legend at the top shows "Direction"
    with blue squares for "Bullish" and orange squares for "Bearish." The y-axis is
    labeled "Price ($)" with dollar-formatted values from ~$130 to ~$155. The x-axis
    shows date labels (Jan 02, Jan 09, Jan 16, Jan 23, Jan 30, Feb 06). Each candlestick
    has a colored rectangular body (blue for bullish, orange/amber for bearish) with
    thinner wicks extending above and below. Wick colors use darker shades matching
    their direction. A dashed horizontal reference line sits at $150 (the opening
    price) with a gray "Open $150" annotation near the right edge. At the bottom-right,
    an orange "Close $136 (-9.5%)" annotation shows the net change. The overall trend
    is clearly downward. The background is clean with subtle horizontal grid lines
    only, no vertical grid lines.
