review:
  strengths:
  - 'Excellent data choice: US Phillips Curve is a classic real-world application
    perfectly suited for connected temporal scatter'
  - Strong temporal encoding with blue gradient from light (1990) to dark (2023)
  - Key year annotations at meaningful economic milestones (2009 recession, 2020 COVID)
  - Clean code structure with deterministic hardcoded data
  - Interactive HTML version adds genuine value via Highcharts tooltips
  weaknesses:
  - Connecting line opacity (0.30) is too faint — the temporal path is hard to trace
  - No directional arrow to indicate time flow along the path
  - Y-axis range extends too high leaving wasted vertical space
  - Hybrid dict/API approach for series is not fully idiomatic Highcharts-core usage
  image_description: The plot displays a connected scatter plot tracing US unemployment
    rate (x-axis, 3-11%) vs inflation rate (y-axis, -2-10%) from 1990 to 2023. Points
    are connected by thin, semi-transparent blue lines in chronological order. A color
    gradient runs from light steel blue (1990) to dark navy (2023), encoding temporal
    progression. Five key years (1990, 2000, 2009, 2020, 2023) are annotated with
    bold text labels and larger markers with white borders. The background is light
    gray with subtle dotted grid lines. The title reads "scatter-connected-temporal
    · highcharts · pyplots.ai" with a descriptive subtitle about the Phillips Curve.
    Axis labels include units (%).
