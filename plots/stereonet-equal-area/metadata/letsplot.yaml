  image_description: 'The plot displays a Schmidt equal-area (lower-hemisphere) stereonet
    projection on a white/light gray circular canvas. Four geological feature types
    are plotted as colored poles (dots): Bedding (blue, clustered in the lower-center),
    Joint (pink, clustered on the right near E), Fault (amber/orange, in the lower-left),
    and Foliation (teal/green, near the top-center). Great circles are drawn as thin,
    semi-transparent colored arcs for each measurement. Gray density contours (geom_density2d)
    overlay the pole data showing clustering patterns. Each cluster has a semi-transparent
    confidence ellipse fill and a dark diamond-shaped mean pole marker with italic
    annotation showing mean strike/dip (Bedding 43/33, Joint 356/78, Fault 151/55,
    Foliation 268/28). The primitive circle boundary is drawn in dark gray with tick
    marks every 10 degrees (longer every 30 degrees). Cardinal directions N, E, S,
    W are labeled in bold. Dashed reference cross lines mark N-S and E-W axes. A legend
    in the lower-right corner shows Feature Type with all four categories. Title reads
    stereonet-equal-area letsplot pyplots.ai in bold at the top.'
