    by line segments in chronological order, with a continuous color gradient from
    light blue (1990) to dark navy blue (2023). Six key years (1990, 2000, 2007, 2009,
    2020, 2023) are annotated with bold monospace labels, each manually nudged to
    avoid overlap. The start (1990) and end (2023) points are emphasized with larger
    markers and darker borders. A directional arrow is drawn at the terminal segment
    pointing toward the 2023 endpoint. The background is off-white (#FAFBFC) with
    subtle light gray major grid lines and no minor grid. Axes are labeled "Unemployment
    Rate (%)" and "Inflation Rate (%)" with a subtitle explaining the context. A vertical
    color bar legend on the right maps the gradient to years 1990, 2006, 2023.
