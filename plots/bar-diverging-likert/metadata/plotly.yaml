    and bold at top. X-axis shows "← Disagree | Agree →" with percentage ticks. A
    dark zeroline (width 2) anchors the diverging point. A horizontal legend at the
    bottom displays all five categories. Background is clean white with very subtle
    gridlines (opacity 0.07).'
