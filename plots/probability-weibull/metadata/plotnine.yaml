  image_description: The plot displays a Weibull probability plot for turbine blade
    fatigue-life analysis. The x-axis shows "Time to Failure (hours)" with log-spaced
    ticks from 1,000 to 10,000, and the y-axis shows "Cumulative Failure Probability"
    with Weibull-linearized scale from 1% to 99%. Blue filled circles represent 25
    failure observations following a linear trend on the Weibull paper. Orange triangles
    along the bottom (near 1%) represent 7 censored observations. A blue fitted regression
    line passes through the failure data with a light blue confidence band. A red
    diamond marker highlights the characteristic life intersection at the 63.2% reference
    line, with dashed gray reference lines (horizontal at 63.2%, vertical at eta).
    A red italic annotation "eta = 4,663 hrs (63.2%)" with a connector line points
    to the diamond. A blue bold annotation in the upper-left shows "beta = 2.74 ·
    eta = 4,663 hrs · R² = 0.978". The title reads "probability-weibull · plotnine
    · pyplots.ai" in bold, with a gray italic subtitle "Turbine blade fatigue-life
    analysis — 25 failures, 7 censored observations". A legend on the right distinguishes
    Failure (blue circle) and Censored (orange triangle). The overall design is clean
    with a minimal theme, subtle grid, and light panel background.
