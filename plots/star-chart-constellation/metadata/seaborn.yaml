review:
  strengths:
  - Excellent real astronomical data with 15 constellations and accurate coordinates/magnitudes
  - Strong dark-theme aesthetic with coordinated warm palette and text effects
  - Clean code structure with logical data organization and proper seaborn idioms
  - Good visual hierarchy through magnitude-based sizing and selective labeling
  weaknesses:
  - Minor label overlaps in dense areas (Orion, Canis Major, Perseus/Taurus) reduce
    readability
  - Constellation and star label font sizes (11pt, 9pt) are slightly small relative
    to other text
  - Missing optional spec features (ecliptic line, Milky Way band) that would enrich
    the chart
  - Library mastery limited by chart type requiring heavy matplotlib for constellation
    lines/annotations
  image_description: The plot displays a circular star chart on a deep navy (#0a0e2a)
    background simulating a night sky with an azimuthal equidistant projection. Right
    Ascension labels (0h-22h) are positioned around the circular perimeter, while
    Declination markers appear as concentric circles inside (-45 to +75 degrees).
    Approximately 280 stars are plotted - named constellation stars use a warm yellow-to-brown
    palette (brightest yellow, faintest dark brown) with size inversely proportional
    to magnitude, while approximately 200 fainter background stars appear as small
    grey-blue dots. Fifteen constellations are connected with semi-transparent blue
    stick-figure lines (Orion, Ursa Major, Cassiopeia, Leo, Cygnus, Gemini, Taurus,
    Lyra, Aquila, Scorpius, Bootes, Perseus, Auriga, Canis Major, Andromeda). Constellation
    names are labeled in slate-blue near each group's centroid with text stroke effects
    for readability. Brightest stars (mag < 1.0) are individually labeled (Sirius,
    Vega, Capella, Arcturus, Altair, Aldebaran, Rigel, Betelgeuse). A legend in the
    lower-left shows four magnitude classes. The title reads "star-chart-constellation
    - seaborn - pyplots.ai". A subtitle notes "Azimuthal Equidistant Projection -
    North Celestial Pole at Center". Top and right spines are removed.
