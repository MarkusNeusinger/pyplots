review:
  strengths:
  - Custom diverging palette via sns.diverging_palette with intentional hue, saturation,
    and lightness parameters creates an effective blue-to-red transition
  - Faithful minimalist design with all axes, spines, ticks, and gridlines removed
    - true to the warming stripes concept
  - Realistic synthetic temperature anomaly data with piecewise-linear trend plus
    noise closely matches real-world global temperature records
  - Clean, concise code with perfect KISS structure and full reproducibility
  weaknesses:
  - Figure aspect ratio is 16:9 rather than the spec-suggested ~3:1 (wide and short),
    reducing the horizontal emphasis of the time progression
  - Near-zero anomaly values produce near-white bars that blend with the white background,
    reducing contrast for the transitional period
  image_description: The plot displays climate warming stripes spanning approximately
    175 vertical bars from left to right. The left portion (representing earlier years
    ~1850-1950) is dominated by cool blue tones ranging from medium-dark blue to light
    blue, with occasional slightly darker bars indicating colder anomaly years. Moving
    rightward through the mid-20th century, the colors transition through very pale
    blues and whites (near-zero anomalies). The rightmost portion (recent decades
    ~1990-2024) shows increasingly intense reds, with the final bars being deep saturated
    red indicating strong positive temperature anomalies. The title "heatmap-stripes-climate
    · seaborn · pyplots.ai" appears centered above the stripes in a dark gray font.
    There are no axes, tick marks, gridlines, or labels — a pure minimalist color-encoded
    visualization. The background is white, and the stripes span nearly the full width
    of the canvas with moderate whitespace below.
