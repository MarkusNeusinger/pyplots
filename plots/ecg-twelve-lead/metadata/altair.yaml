review:
  strengths:
  - Exceptional ECG paper aesthetic with custom pink grid background and two-weight
    grid lines — authentically mimics clinical ECG printouts
  - 'Complete spec compliance: all 12 leads, clinical 3x4 layout, rhythm strip, calibration
    pulse, P/R/T annotations'
  - Realistic synthetic data with lead-specific morphologies, R-wave progression,
    and physiologically accurate amplitudes
  - Clean, well-organized code with reusable grid_layers and clear section structure
  weaknesses:
  - Library mastery could be stronger — manual loop-based grid construction instead
    of Altair native faceting
  - Minor spacing/layout refinements possible to make panels feel more like a unified
    clinical strip
  image_description: 'The plot displays a 12-lead ECG arranged in the standard clinical
    3x4 grid layout on pink/red ECG paper-style background. Row 1: I, aVR, V1, V4;
    Row 2: II, aVL, V2, V5; Row 3: III, aVF, V3, V6. Each panel shows dark (near-black)
    P-QRS-T waveform complexes against fine pink grid lines (thin at ~1mm intervals)
    and bolder red grid lines (at ~5mm intervals). The background color is a warm
    light pink (#FFF0EC). Lead labels appear in bold black text in the upper-left
    of each panel. A full-width Lead II rhythm strip spans the bottom with a 1mV calibration
    pulse (square wave) at the left margin, labeled "1 mV". P, R, and T wave annotations
    appear in red italic text above the first beat of the rhythm strip. The title
    reads "ecg-twelve-lead · altair · pyplots.ai" in large bold text, with subtitles
    "Normal Sinus Rhythm · 72 BPM · 12-Lead ECG" and "25 mm/s · 10 mm/mV" in gray.
    Lead morphology varies realistically: aVR is inverted, precordial leads show R-wave
    progression from V1 to V4, and limb leads show appropriate relative amplitudes.'
