  image_description: The plot shows a band chart of solar irradiance forecast over
    the course of a day (6 AM to 8 PM). A light steel-blue semi-transparent band represents
    the 95% confidence interval, with an amber/orange center line showing the forecast
    mean. The band follows a bell-curve shape peaking around hour 13 (1 PM) at approximately
    880 W/m². The confidence band is notably asymmetric — tight around midday where
    conditions are predictable, and widening significantly in the late afternoon (after
    3 PM) where convective cloud development increases uncertainty. The lower bound
    clips at 0 near sunrise and sunset since irradiance cannot be negative. The background
    is a subtle off-white (#FAFBFD), grid lines are very faint dashed lines, tick
    marks are removed, and axis lines are a light gray. The legend in the top-right
    shows "95% Confidence Interval" (blue swatch) and "Forecast Mean" (orange line).
    Title reads "band-basic · bokeh · pyplots.ai". Y-axis is labeled "Solar Irradiance
    (W/m²)" and X-axis is "Hour of Day."
