    to trace visually
  - Code is lengthy (~750 lines) due to inline star catalog data, though this is inherent
    to the visualization
  image_description: 'The plot displays a celestial star chart on a dark navy background
    (#0a0e1a) with a radial gradient creating depth. Stars are rendered as white/pale
    circular markers with radial gradient fills (bright center fading outward), where
    brighter stars (lower magnitude) appear as larger markers — Sirius being the largest.
    15 constellations are connected by thin, semi-transparent colored stick-figure
    lines: Orion (sky blue), Ursa Major (gold), Cassiopeia (orchid purple), Leo (coral),
    Cygnus (green), Lyra (teal), Gemini (lime), Taurus (taupe), Scorpius (red), Boötes
    (mint), Aquila (blue), Canis Major (ice blue), Auriga (silver), Perseus (lavender),
    and Andromeda (pink). Constellation names are labeled near their centroids in
    matching colors with letter-spacing. A coordinate grid shows declination circles
    at -30°, 0°, +30°, +60° as dotted circles and RA radial lines every 3 hours as
    dotted lines. RA hour labels (0h–21h) appear around the circular boundary. A dashed
    amber ecliptic line curves through the chart. The Summer Triangle asterism (Vega–Deneb–Altair)
    is subtly indicated with dashed pale-yellow lines. Hundreds of faint background
    stars add atmospheric depth. The title reads "star-chart-constellation · highcharts
    · pyplots.ai" with a subtitle describing the projection and data scope.'
