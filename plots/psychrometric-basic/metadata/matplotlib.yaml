  image_description: 'The plot displays a psychrometric chart with dry-bulb temperature
    (°C) on the x-axis ranging from -10 to 50, and humidity ratio (g/kg dry air) on
    the y-axis from 0 to 30. The saturation curve (100% RH) is drawn as a thick dark
    blue line forming the upper boundary. Relative humidity curves from 10% to 90%
    appear as thinner blue lines with percentage labels positioned along the right
    side of each curve. Wet-bulb temperature lines (0°C to 30°C in 5°C steps) are
    drawn as brown dashed diagonals with degree labels rotated at -45°. Enthalpy lines
    (10 to 110 kJ/kg) appear as orange-red dash-dot diagonals with numeric labels
    near the upper-left. Specific volume lines (0.78 to 0.94 m³/kg) are shown as light
    purple dotted diagonals with decimal labels at the right edge. A shaded light-blue
    comfort zone rectangle spans approximately 20-26°C with humidity ratios corresponding
    to 30-60% RH, labeled "Comfort Zone" in bold blue text. A red HVAC process path
    with arrows connects three numbered state points: 1 (35°C, ~17.5 g/kg) → 2 (13°C,
    ~9 g/kg) → 3 (24°C, ~9.5 g/kg), with italic red text "Cool + Dehumidify → Reheat"
    above. The legend in the upper-left identifies all five line types. Top and right
    spines are removed, with subtle gridlines on both axes.'
