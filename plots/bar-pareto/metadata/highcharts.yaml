    percentage line with circle markers rises from ~29.4% to 100%, plotted against
    a secondary y-axis on the right (0-100%). A red dashed horizontal line marks the
    80% threshold with an italic "80% threshold" label. A callout annotation at the
    Discoloration point reads "Vital Few ← 5 types = 83.9%". The title reads "Manufacturing
