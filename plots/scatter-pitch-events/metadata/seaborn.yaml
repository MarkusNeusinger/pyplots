  image_description: 'The plot displays a soccer pitch rendered with a dark green
    background (#2d8a4e) and darker green border (#1a472a), featuring accurate white
    pitch markings including penalty areas, goal areas, center circle, halfway line,
    corner arcs, and goal posts. Four event types are plotted: light blue circles
    for passes (spread across the entire pitch), orange-red stars for shots (clustered
    in the right penalty area/attacking third), yellow triangles for tackles (distributed
    across defensive and midfield zones), and pink/purple diamonds for interceptions
    (spread across midfield). Successful events appear larger and more opaque, while
    unsuccessful events are smaller and more transparent. Directional arrows in matching
    colors show pass and shot trajectories. Subtle KDE density contours outline the
    spatial clustering for each event type. The title "scatter-pitch-events · seaborn
    · pyplots.ai" appears at the top in white text. A two-row legend at the bottom
    identifies all 8 categories (4 event types × 2 outcomes) with matching markers.'
