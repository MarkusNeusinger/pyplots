  image_description: 'The plot displays an alluvial/Sankey-style diagram titled "alluvial-opinion-flow
    · seaborn · pyplots.ai" in bold 24pt text at the top. Four vertical stacked-bar
    columns represent survey waves (Q1 2025 through Q4 2025) with bold 20pt headers,
    connected by curved Bezier flow bands. Five opinion categories are stacked bottom-to-top:
    Strongly Agree (dark teal), Agree (light teal/blue), Neutral (light beige/gray),
    Disagree (salmon/light brown), Strongly Disagree (dark rust/brown) — generated
    via sns.diverging_palette(220, 25). Left-side labels in bold 16pt show category
    names with initial counts (e.g., "Strongly Agree (n=120)"). Right-side labels
    show final counts (e.g., "(n=210)"). Middle wave bars display white "n=XXX" text
    inside bars at 16pt semibold. Stable flows (same category) render at higher opacity
