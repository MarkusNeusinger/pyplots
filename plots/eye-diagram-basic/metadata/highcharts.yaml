    A vertical color bar on the right labeled "Trace Density" shows the density scale
    from 0 to 1, transitioning from dark blue through teal/green to yellow/orange/white.
    The title reads "eye-diagram-basic · highcharts · pyplots.ai" with a subtitle
    "NRZ Signal — 300 Overlaid Traces with Noise (σ=5%) and Jitter (σ=3%)".
