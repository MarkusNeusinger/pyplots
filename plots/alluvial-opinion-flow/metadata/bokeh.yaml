  image_description: 'The plot shows an alluvial/Sankey-style diagram titled "alluvial-opinion-flow
    · bokeh · pyplots.ai" with a subtitle "Remote Work Policy Survey — 1,000 Employees
    Across 4 Quarters". Four columns represent quarterly waves (Q1 2024 through Q4
    2024) arranged left to right. Each column contains 5 stacked rectangular nodes
    for opinion categories: Strongly Agree (dark blue), Agree (light blue), Neutral
    (gray), Disagree (orange), and Strongly Disagree (crimson). Smooth bezier-curve
    flow ribbons connect nodes between consecutive waves, with higher opacity (solid)
    for stable respondents and lower opacity (faded) for changers. Left-side labels
    show category names with counts (e.g., "Strongly Agree (120)"), right-side labels
    show final counts (e.g., "Strongly Agree (183)"), and middle columns show just
    counts. Wave headers appear below the diagram. A legend is in the top-right corner.
    A bottom note reads "Solid flows = stable opinion | Faded flows = opinion changed".
    The data clearly shows a polarization trend: extreme opinions grow while moderate
    ones shrink over time.'
