  image_description: 'The plot shows a log-log scatter chart at 4800x2700 pixels with
    7 material families displayed as colored convex hull envelopes on a light gray
    (#FAFAFA) background. Metals (steel blue #306998) occupy the upper-right region
    with the largest markers (~28px) and thickest hull outlines. Ceramics (muted red
    #B5494E) overlap with Metals in the upper-right, also with large markers (~26px).
    Composites (green #5BA05B) sit in the upper-middle area. Natural Materials (brown
    #8B6C42) span mid-range density and modulus values. Polymers (orange #E8833A)
    cluster at moderate density with low-to-moderate modulus. Foams (gold #C4A632)
    form a narrow diagonal band in the lower-left with the smallest markers (~14px).
    Elastomers (purple #9B6FB8) appear at moderate density with very low modulus.
    Each family has a bold 18pt text label positioned near the top of its hull with
    manually tuned offsets. Two dashed guide lines for E/rho performance indices are
    visible with 18pt italic labels in #666666 at alpha 0.9. A legend listing all
    7 families with 35px glyphs and 16pt text appears on the right side. Title "scatter-ashby-material
    · bokeh · pyplots.ai" at 28pt top-left. X-axis: "Density (kg/m³)" at 22pt, Y-axis:
    "Young''s Modulus (GPa)" at 22pt. Grid lines subtle (alpha 0.15), tick marks removed,
    axis lines lightened to #CCCCCC, outline removed.'
