  - Invisible scatter trace workaround is un-idiomatic for Plotly
  - HTML version does not leverage Plotly interactive hover capabilities
  image_description: 'The plot displays a hydrogen atom energy level diagram on a
    white background with subtle gray gridlines. Six horizontal blue (#306998) lines
    represent energy levels from n=1 (−13.60 eV at the bottom) through n=6 (near 0
    eV at the top). A dashed gray line at 0 eV marks the ionization limit. The left
    side shows energy values in eV for n=1, n=2, and n=3. The right side labels all
    quantum numbers (n=1 through n=6) in blue bold text. Two spectral series are depicted:
    the Lyman Series (UV) on the left with three downward purple arrows (Ly-α 121.6
    nm, Ly-β 102.6 nm, Ly-γ 97.2 nm) from upper levels to n=1, and the Balmer Series
    (Visible) on the right with four downward arrows in red (Hα 656.3 nm), blue (Hβ
    486.1 nm), and violet shades (Hγ 434.0 nm, Hδ 410.2 nm) from upper levels to n=2.
    Series headers in bold purple and red appear near the top. The title reads "Hydrogen
    Atom · energy-level-atomic · plotly · pyplots.ai". The y-axis is labeled "Energy
    (eV)"; the x-axis is hidden.'
