  image_description: 'The plot displays a Beer-Lambert calibration curve on a clean
    white-to-light-grey gradient background. Eight blue circular markers (Standards)
    are plotted showing absorbance vs. concentration from 0 to 14 mg/L, following
    a clear linear trend from ~0.005 to ~0.62 absorbance. A solid blue regression
    line (Linear Fit) passes through the data points, surrounded by a light blue/grey
    95% Prediction Interval band that widens appropriately away from the mean. A red
    diamond marker (Unknown Sample) sits at the intersection of two red dashed lines
    — a horizontal dashed line at absorbance ~0.38 and a vertical dashed line at concentration
    ~8.3 mg/L — demonstrating how to read an unknown concentration from the calibration
    curve. A blue-bordered annotation box in the upper left displays "y = 0.0452x
    + 0.0028" and "R² = 0.99933". A red-bordered label near the unknown point reads
    "Unknown: 8.3 mg/L". The title reads "calibration-beer-lambert · highcharts ·
    pyplots.ai" with subtitle "UV-Vis Spectrophotometric Calibration Standards". X-axis:
    "Concentration (mg/L)", Y-axis: "Absorbance". A floating legend in the upper right
    with white background and subtle shadow lists all four series.'
