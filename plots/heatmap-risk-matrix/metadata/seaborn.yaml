  image_description: 'The plot displays a 5x5 risk assessment matrix heatmap with
    "Likelihood" on the Y-axis (Rare to Almost Certain, bottom to top) and "Impact"
    on the X-axis (Negligible to Catastrophic, left to right). Cells are colored using
    a green-yellow-orange-red gradient corresponding to risk scores (likelihood x
    impact), which appear as semi-transparent bold white numbers in each cell. 15
    risk items are plotted as labeled markers with distinct shapes per category: circles
    (Technical), squares (Financial), diamonds (Operational), triangles (Project)
    — all in dark colors with white edges. A combined legend in the lower-right shows
    both category markers and color-coded zone patches (Low 1-4, Medium 5-9, High
    10-16, Critical 20-25). A vertical colorbar on the right maps the continuous risk
    score scale. The title reads "heatmap-risk-matrix · seaborn · pyplots.ai".'
