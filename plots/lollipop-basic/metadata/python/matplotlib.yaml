  strengths:
  - Clean, minimal code structure with no functions or classes — easy to read and
    maintain
  - 'Correct chart type: vertical lollipop with ax.vlines for stems and ax.scatter
    for circular dots'
  - Sorted data descending creates clear ranking visualization and good data storytelling
  - Proper font sizes for 4800x2700 canvas (title 24pt, axis labels 20pt, tick labels
    16pt)
  - 'Idiomatic matplotlib API usage: Axes methods instead of pyplot, vlines is the
    natural primitive for lollipop stems'
  weaknesses:
  - 'CRITICAL: No ANYPLOT_THEME handling — code uses hardcoded matplotlib defaults
    with no os.getenv(''ANYPLOT_THEME'') logic; background, text colors, and spines
    do not adapt between light and dark themes'
  - 'CRITICAL: Wrong output filename — saves to ''plot.png'' instead of f''plot-{THEME}.png'';
    pipeline expects plot-light.png and plot-dark.png'
  - 'CRITICAL: Wrong palette — stems use #306998 (non-Okabe-Ito blue) and dots use
    #FFD43B (non-Okabe-Ito yellow); single-series should use #009E73 (brand green)
    for both stems and markers'
  - 'CRITICAL: Wrong branding in title — uses ''pyplots.ai'' instead of ''anyplot.ai'''
  - Top/right spines not removed — code does not call ax.spines['top'].set_visible(False)
    or ax.spines['right'].set_visible(False)
  - Grid uses dashed linestyle ('--') and alpha=0.3 — style guide specifies solid
    thin lines at opacity 10-15%
