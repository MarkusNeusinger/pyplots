review:
  strengths:
  - Professional dual-panel Bode plot with well-designed gain and phase margin annotations
    using color-coded shaded regions and cross-panel markers
  - Excellent colorblind-safe color choices (orange vs purple) with explicit justification
    in code comments
  - Strong data storytelling through visual hierarchy — margins are immediately visible
    with annotation boxes, arrow pointers, and distinct marker symbols
  - Realistic third-order transfer function with underdamped complex pair showing
    resonance peak and meaningful stability margins
  - Clean KISS code structure with deterministic data and all font sizes explicitly
    set
  weaknesses:
  - Magnitude y-axis range extends to -225 dB which compresses the interesting gain
    margin region visually — tighter axis limits would improve readability
  - Minor crowding around annotation markers in both panels where gain/phase margin
    indicators cluster near crossover frequencies
  image_description: The plot shows a dual-panel Bode diagram with magnitude (dB)
    on top and phase (degrees) on the bottom, sharing a logarithmic frequency axis
    from 0.1 Hz to 10 kHz. The main frequency response curves are drawn in dark blue
    (#306998) with a line width of 3. The magnitude panel shows a flat region around
    +25 dB at low frequencies, a slight resonance bump near 100 Hz, then steep rolloff
    to about -200 dB at 10 kHz. A dashed gray reference line marks 0 dB. The phase
    panel shows phase starting near 0 degrees, rolling off through -90, -180, and
    eventually reaching about -360 degrees at high frequencies. A dashed gray reference
    line marks -180 degrees. The gain margin (GM = 10.8 dB) is annotated in orange
    with diamond markers and a shaded orange rectangle between the magnitude curve
    and 0 dB at the phase crossover frequency (~40 Hz). An orange diamond marker also
    appears on the phase plot at the -180 degree crossing. The phase margin (PM =
    24.1 degrees) is annotated in purple with square markers and a shaded purple rectangle
    between the phase curve and -180 degrees at the gain crossover frequency (~20
    Hz). A purple square marker also appears on the magnitude plot at the 0 dB crossing.
    Both annotations have bordered text boxes with white backgrounds. The title reads
    "bode-basic · plotly · pyplots.ai" centered at the top. Axis labels include "Magnitude
    (dB)", "Phase (degrees)", and "Frequency (Hz)" with appropriate units. The background
    uses plotly_white template with very subtle grid lines.
