  image_description: The plot displays a triangular cohort retention heatmap with
    10 monthly cohorts (Jan–Oct 2024) on the y-axis, each labeled with cohort size
    (e.g., "Jan 2024 (n=1,926)"). The x-axis shows "Month 0" through "Month 9" labeled
    "Months Since Signup." Cells use a reversed viridis colormap — dark purple for
    100% retention fading through teal/green to yellow-green for low values (~14–18%).
    Each cell contains a bold percentage label with adaptive text color (white on
    dark cells, dark on light cells). Orange borders highlight the Month 1 column
    across all cohorts, drawing attention to the critical first-month churn drop.
    A subtitle explains this storytelling element. A vertical color bar legend on
    the right shows "Retention %" from 0% to 100%. The triangular shape is correct
    — Jan 2024 has all 10 periods while Oct 2024 has only Month 0. The white background
    is clean with no grid lines.
