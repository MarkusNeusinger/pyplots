    are removed, remaining spines are thin and light gray. A subtle y-axis grid (very
    low alpha) aids distance reading. Branch lines are thick (3.0) with round caps.
    Above-threshold merges connecting the three main clusters are rendered in gray.
    Background is a very light gray (#FAFAFA). The Setosa cluster merges at the highest
    distance (~10.2), indicating it is the most distinct species.'
