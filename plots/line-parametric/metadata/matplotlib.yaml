    A colorbar on the right shows "Parameter t (rad)". The right panel shows an Archimedean
    Spiral (x = t·cos(t), y = t·sin(t)) colored with the viridis colormap from dark
    purple through teal to yellow (t=0 to 4π). Same start/end marker convention. An
    annotation notes "Radius grows linearly with t". Both panels have all spines removed,
    subtle grids, equal aspect ratios, and legends. The suptitle reads "line-parametric
    · matplotlib · pyplots.ai".
