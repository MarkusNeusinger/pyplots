  - Subplot layout is unbalanced due to equal aspect ratio creating different-sized
    panels
  - No seaborn plotting functions used
  image_description: The plot displays two side-by-side subplots on a white background
    with the suptitle "line-parametric · seaborn · pyplots.ai" at the top. The left
    subplot shows a Lissajous figure (x=sin(3t), y=sin(2t)) rendered as a continuous
    curve with a viridis color gradient from dark purple (t=0) through teal/green
    to yellow (t=2π). A blue circle marks the start point at origin and a red square
    marks the end point, also near the origin. The right subplot shows an Archimedean
    spiral (x=t·cos(t), y=t·sin(t)) with a plasma color gradient from dark purple
    (t=0) through pink/orange to yellow (t=4π), expanding outward. A blue circle marks
    the start at origin and red square marks the end at the outer edge. Both subplots
    have equal aspect ratios, colorbars indicating the parameter t, axis labels "x(t)"
    and "y(t)", subtle grid lines, and top/right spines removed. Legends identify
    start and end markers.
