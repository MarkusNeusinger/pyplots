  image_description: The plot displays two sigmoidal dose-response curves on a logarithmic
    x-axis. Compound A is rendered in dark blue (#306998) and Compound B in burnt
    orange (#E0652B). Both curves follow the classic S-shape from low baseline responses
    (~5% and ~10%) to upper plateaus (~95% and ~85%). Data points are shown as open
    circles with white fill and colored borders, accompanied by vertical error bars
    (SEM). Smooth fitted curves are overlaid as solid lines with semi-transparent
    confidence bands (ribbons). Dashed vertical and horizontal reference lines mark
    the EC50 values for each compound — approximately 9.7×10⁻⁸ M for Compound A and
    6.2×10⁻⁷ M for Compound B. Bold EC50 annotations appear near the intersection
    points. Dotted horizontal lines indicate the top and bottom asymptotes for each
    compound. The x-axis shows "Concentration (M)" with superscript log-scale labels
    (10⁻⁹ to 10⁻⁵), and the y-axis shows "Response (%)" from 0 to 100. A boxed legend
    labeled "Compound" sits in the lower-right area. The title reads "curve-dose-response
    · plotnine · pyplots.ai". The background is a subtle off-white (#fafafa) with
    light horizontal gridlines only.
