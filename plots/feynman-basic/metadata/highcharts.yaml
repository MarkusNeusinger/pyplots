  image_description: 'The plot displays a Feynman diagram for electron-positron annihilation
    (e⁻e⁺ → γ → μ⁻μ⁺) on a white background. Four blue straight lines represent fermions:
    e⁻ and e⁺ entering from the upper-left and lower-left respectively, converging
    at a dark vertex dot near the left-center. A pink/magenta wavy line (photon γ)
    connects this vertex to a second dark vertex dot near the right-center. From the
    right vertex, two more blue fermion lines diverge: μ⁻ exiting upper-right and
    μ⁺ exiting lower-right. Blue arrowheads at the midpoints of fermion lines indicate
    particle flow direction (forward for particles, backward for antiparticles). Particle
    labels (e⁻, e⁺, γ, μ⁻, μ⁺) are displayed in bold italic text near their respective
    lines. The title reads "Electron-Positron Annihilation · feynman-basic · highcharts
    · pyplots.ai" with a subtitle "e⁻e⁺ → γ → μ⁻μ⁺ — Quantum Electrodynamics (QED)
    Process". A "Time →" label appears at the bottom-right. A legend at the bottom
    shows three entries: "Fermion (e⁻, μ⁻, ...)" with blue line, "Photon (γ)" with
    pink line, and "Interaction Vertex" with dark dot.'
