  strengths:
  - 'Excellent hierarchical color gradient scheme: Okabe-Ito base colors at level
    1 graduated to lighter shades at levels 2-3 communicates hierarchy depth naturally'
  - 'Perfect Okabe-Ito compliance for level 1 branches with first series correctly
    at #009E73'
  - Clean axes-free sunburst with ring separators using PAGE_BG - elegant visual separation
    technique
  - Square 3600x3600 canvas correctly chosen for radially symmetric plot
  - Both PNG and HTML output with correct theme-adaptive backgrounds
  weaknesses:
  - Level 2/3 text labels use hardcoded color="#1A1A17" instead of INK theme token
    - works in practice since pastel segments remain light, but should use color=INK
    for strict theme-adaptive correctness
  - create_wedge() helper function defined at module level - unavoidable for this
    chart type but technically deviates from KISS no-functions guideline
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 - correct, not pure white
      Chrome: Title "sunburst-basic · letsplot · anyplot.ai" in dark ink, centered at top - clearly readable. No axis labels/ticks (appropriate for sunburst). Level 1 labels bold white on saturated segments.
      Data: Three concentric rings. Level 1 (innermost): Eng=#009E73 (brand green), Sales=#D55E00 (vermillion), Mktg=#0072B2 (blue) - Okabe-Ito positions 1-3 correct. Level 2: medium pastel gradients per branch. Level 3: very light pastel gradients. Ring separators use #FAF8F1 for clean visual boundaries.
      Legibility verdict: PASS - All labels readable; level 2/3 dark labels on light pastels have good contrast.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 - correct, not pure black
      Chrome: Title in light #F0EFE8 ink (INK token) - readable against dark background. Level 1 labels use bold white (unchanged). Level 2/3 labels hardcoded #1A1A17 (dark) on light pastel segments - segments retain light colors in dark mode so labels remain readable.
      Data: All three rings retain identical Okabe-Ito colors as in light render - only chrome flips. Ring separators merge with dark background (#1A1A17 on #1A1A17) slightly reducing ring-boundary visibility, but rings are still distinguishable by segment color.
      Legibility verdict: PASS - No dark-on-dark text failures; title and all segment labels readable.
