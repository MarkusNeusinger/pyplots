  image_description: The plot displays a bimodal density (KDE) curve of test scores
    on a clean white background. The main distribution ("Test score distribution")
    is rendered as a large blue (#306998) filled area peaking around 75 points with
    density ~0.033. A secondary orange/brown (#c47a3a) filled area ("Lower-scoring
    group") overlaps, peaking around 50-52 points with density ~0.015. A rug plot
    ("Individual scores") in dark blue (#1a3d5c) runs along the bottom, showing vertical
    tick marks for each of the 270 observations. The marks are dense in the 65-85
    range, forming a near-solid band. X-axis is labeled "Test Score (points)" ranging
    ~25-105, Y-axis is labeled "Density" with values from 0 to ~0.034. The title "density-basic
    · pygal · pyplots.ai" appears at top center in bold. Legend is at the bottom with
    three entries. Axis spines are removed, with only subtle horizontal grid lines
    visible. The overall aesthetic is clean and professional.
