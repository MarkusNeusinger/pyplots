    is overlaid in dark red with large circular markers (white edge) connected by
    a red line — the patient starts near the 50th percentile at birth and gradually
    drifts below the 25th percentile by 36 months. The x-axis shows "Age (months)"
    from 0-36 in 3-month increments, the y-axis shows "Weight (kg)" starting at 0.
    Title reads "line-growth-percentile · seaborn · pyplots.ai". Top and right spines
    are removed. Grid is very subtle (horizontal only).
