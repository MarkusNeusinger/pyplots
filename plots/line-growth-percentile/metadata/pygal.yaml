  image_description: The plot displays a WHO Weight-for-Age growth chart for boys
    aged 0–36 months. Six graduated blue percentile bands (P3–P10, P10–P25, P25–P50,
    P50–P75, P75–P90, P90–P97) fan outward from a narrow origin near birth weight
    ~2–4 kg to a wider spread at 36 months (~11–17.5 kg). The bands use lighter blue
    (#D6EAF8) at the extremes and darker blue (#85C1E9) near the median, with semi-transparency
    (opacity 0.55). A dashed dark navy (#154360) P50 median line with stroke width
    7 runs through the center. Red (#C0392B) connected dots (dots_size=12, stroke
    5.5) clearly show an individual patient's weight trajectory tracking between the
    25th and 50th percentiles. Right-margin percentile labels (P3, P10, P25, P50,
    P75, P90, P97) are rendered via PIL in gray/navy text. The x-axis shows "Age (months)"
    from 0 to 36, and the y-axis shows "Weight (kg)" from 0 to 20. The title reads
    "WHO Weight-for-Age (Boys) · line-growth-percentile · pygal · pyplots.ai". A bottom
    legend in two rows of four items identifies all 8 series. The background is white
    with a subtle off-white (#FAFCFF) plot area and dashed horizontal grid lines.
