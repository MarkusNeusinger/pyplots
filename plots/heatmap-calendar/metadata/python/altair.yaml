  strengths:
  - GitHub-style calendar heatmap with semantically appropriate 'greens' sequential
    colormap — light-to-dark green matches the contributions domain perfectly
  - Altair layer composition (alt.layer) used idiomatically to overlay month labels
    as a text mark on top of the rect heatmap — distinctive Vega-Lite pattern
  - All font sizes explicitly set and match pixel-based guidelines (title=28, tick
    labels=18, legend=16)
  - Rounded corners on rect marks (cornerRadius=3) add visual polish without clutter
  - Grid explicitly removed and strokeWidth=0 — clean, minimal aesthetic
  - Full year of realistic synthetic contribution data (365 days) with plausible weekday/weekend
    activity distribution
  - Hover tooltips with date, value, and day-of-week labels leverage Altair's interactive
    capabilities
  - Reproducible with np.random.seed(42)
  weaknesses:
  - 'Missing ANYPLOT_THEME support: code does not read os.getenv(''ANYPLOT_THEME'')
    and has no theme-adaptive chrome tokens (PAGE_BG, INK, INK_SOFT, ELEVATED_BG).
    The library guide requires explicit theme adaptation in the implementation.'
  - 'Wrong output filenames: code saves to ''plot.png'' and ''plot.html'' instead
    of ''plot-{THEME}.png'' and ''plot-{THEME}.html'' as required by the altair.md
    library guide.'
  - 'Title contains incorrect branding in code: ''pyplots.ai'' instead of ''anyplot.ai''.
    The rendered images show correct branding (likely pipeline-corrected), but the
    source code is wrong.'
  - Design storytelling is minimal — no emphasis or focal point highlights notable
    periods of high/low activity. Weekend vs weekday patterns are visible but not
    guided.
  - Legend placed at bottom-left with large empty space to its right — could use orient='right'
    or 'bottom' with better horizontal distribution for the wide canvas.
