  image_description: 'The plot displays a 5×5 risk assessment matrix heatmap with
    "Impact" on the x-axis (Negligible, Minor, Moderate, Major, Catastrophic) and
    "Likelihood" on the y-axis (Rare, Unlikely, Possible, Likely, Almost Certain).
    Background cells use a green-yellow-orange-red gradient colored by risk score
    (likelihood × impact, 1–25), with semi-transparent bold score numbers (alpha=0.55)
    in each cell. 15 risk items are plotted as labeled markers using distinct shapes
    and colors per category: Technical (blue circles), Financial (orange squares),
    Operational (purple diamonds), Project (green triangles). Each marker has a white
    edge for contrast. Critical risks (Supply Delay, Data Breach) have dark red outer
    rings for emphasis. Text labels below markers use white background boxes, with
    critical risk labels having dark red borders. A comprehensive legend on the right
    displays category markers, zone color patches (Low 1–4, Medium 5–9, High 10–16,
    Critical 20–25), critical risk indicator, and marker size meaning. A colorbar
    labeled "Risk Score" sits between the plot and legend. Title reads "heatmap-risk-matrix
    · seaborn · pyplots.ai" in bold. Spines are removed via sns.despine.'
