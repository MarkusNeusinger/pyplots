  image_description: The plot displays a 12-lead ECG in the standard clinical 3x4
    grid layout on a light salmon/pink ECG paper background (#FFF5F0). The top row
    shows leads I, aVR, V1, V4; the middle row shows II, aVL, V2, V5; the bottom row
    shows III, aVF, V3, V6. Each panel contains dark navy (#1A1A2E) signal traces
    showing realistic P-QRS-T wave complexes with appropriate morphological variation
    across leads (e.g., inverted deflections in aVR, deep S-waves in V1, progressive
    R-wave growth across precordial leads). Major grid lines are bold pink/salmon,
    minor grid lines are lighter pink — faithfully mimicking real ECG paper. A 1mV
    calibration pulse is drawn in the Lead I panel. A full-length Lead II rhythm strip
    spans the entire bottom of the figure. The title "ecg-twelve-lead · seaborn ·
    pyplots.ai" appears at top, and "25 mm/s | 10 mm/mV" scale notation at bottom
    right. Each lead is clearly labeled in bold text with a semi-transparent background
    box.
