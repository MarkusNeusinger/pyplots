  strengths:
  - Excellent data storytelling with the inversion zone highlight showing the 2Y-10Y
    spread in basis points
  - All three yield curve shapes (normal, flat, inverted) provide comprehensive feature
    coverage
  - Realistic U.S. Treasury data matching actual historical periods
  - Clean professional styling appropriate for financial publication
  - Dual output (PNG + interactive HTML) leverages pygal SVG capabilities
  weaknesses:
  - Inversion zone series uses the same red color (#C0392B) as the inverted curve,
    reducing visual distinction in legend
  - Y-axis gridlines could be more subtle for a more polished look
  - xrange extends to 32 creating slight excess whitespace past the 30Y data point
  image_description: 'The plot displays three U.S. Treasury yield curves on a pygal
    XY chart with a white background. The x-axis shows "Maturity (Years)" with labels
    at 1M, 1Y, 2Y, 5Y, 10Y, 20Y, and 30Y (properly spaced by numeric maturity). The
    y-axis shows "Yield (%)" ranging from 0 to 5.5. Three curves are plotted: (1)
    a blue line for Jan 2021 (Normal) starting near 0% and rising to ~1.87% at 30Y,
    (2) a gold/yellow line for Dec 2018 (Flat) staying relatively flat around 2.4-3.0%,
    and (3) a red line for Mar 2023 (Inverted) starting high at ~5.1% and declining
    to ~3.7%. A fourth dashed red series connects the 2Y (4.60%) and 10Y (3.58%) points
    on the inverted curve, labeled "2Y-10Y Inversion (-102 bps)" with enlarged dots.
    The legend is placed at the bottom in a single row with four entries. The title
    reads "U.S. Treasury Yield Curves · line-yield-curve · pygal · pyplots.ai".'
