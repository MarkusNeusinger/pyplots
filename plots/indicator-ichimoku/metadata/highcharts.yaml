review:
  strengths:
  - All five Ichimoku components correctly computed and displaced (Senkou spans forward
    26 periods, Chikou span back 26 periods)
  - Cloud fill with bullish/bearish color transitions works well using arearange series
  - Professional visual design with custom background, subtle dotted grid, and intentional
    typography
  - Data generates a compelling price trend showing both bullish and bearish cloud
    regions
  weaknesses:
  - Red/green color scheme for candlesticks and cloud is not colorblind-accessible
  - Title includes extra prefix before required spec-id format
  - Cloud fill opacity at 0.15 is quite subtle and could be more visible
  - No visual emphasis on key Ichimoku signals (e.g., Tenkan/Kijun crossovers)
  image_description: 'The plot displays an Ichimoku Cloud chart overlaid on a candlestick
    price chart spanning January 2024 to November 2024. The background is a light
    gray (#FAFBFC). Candlesticks use green (bullish) and red (bearish) coloring. Five
    Ichimoku lines are shown: a blue Tenkan-sen (9), an orange Kijun-sen (26), a green
    dashed Senkou Span A, a red/pink dashed Senkou Span B, and a purple dashed Chikou
    Span. The Kumo (cloud) is filled between Senkou Span A and B — green-tinted when
    bullish and pink-tinted when bearish. The cloud extends into the future past the
    last candlestick, and the Chikou Span is shifted into the past, both correct per
    Ichimoku convention. The y-axis shows "Price (USD)" ranging from ~$173 to $205,
    and the x-axis shows "Date" with monthly labels. A legend in the top-right lists
    all six series. The title reads "Ichimoku Cloud · indicator-ichimoku · highcharts
    · pyplots.ai" with a descriptive subtitle below.'
