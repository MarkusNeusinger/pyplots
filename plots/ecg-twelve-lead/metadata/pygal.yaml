  image_description: 'The plot displays a 12-lead ECG on an authentic pink/salmon
    ECG paper background with major (thicker, muted pink) and minor (thinner, lighter
    pink) grid lines. The layout follows the standard clinical 3x4 grid: Row 1 shows
    leads I, aVR, V1, V4; Row 2 shows II, aVL, V2, V5; Row 3 shows III, aVF, V3, V6.
    A full-width Lead II rhythm strip spans the bottom. Limb leads (I, II, III, aVR,
    aVL, aVF) are rendered in black, while precordial leads (V1-V6) are in deep blue,
    creating a clear visual distinction. Each row has a 1mV calibration pulse at the
    left margin. Lead labels are bold monospace text positioned above each waveform.
    The title "ecg-twelve-lead · pygal · pyplots.ai" appears at the top center. Scale
    annotations "25 mm/s | 10 mm/mV" and "25 mm/s · 10 mm/mV · 1 mV cal" appear at
    the bottom. The waveforms show realistic P-QRS-T morphology with appropriate lead-specific
    variations (inverted aVR, R-wave progression in V1-V6).'
