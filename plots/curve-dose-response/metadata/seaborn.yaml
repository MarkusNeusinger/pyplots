  image_description: The plot displays two sigmoidal dose-response curves on a logarithmic
    x-axis (Concentration in M, ranging from ~10^-9 to ~10^-4) against Response (%)
    on the y-axis (range -5 to 110). Compound A is rendered in steel blue (#306998)
    and Compound B in warm orange (#D4763A). Both compounds show classic sigmoidal
    behavior with data points (circles with white edge highlights) and error bars
    overlaid on smooth fitted curves (linewidth 3). Dashed horizontal and vertical
    reference lines mark the EC50 for each compound — Compound A around 3e-7 M, Compound
    B around 1e-5 M. A light blue 95% confidence interval band surrounds Compound
    A's fit curve. Faint horizontal asymptote lines appear at the top and bottom plateaus
    for both compounds. Top and right spines are removed, a subtle y-axis grid is
    present (alpha 0.2). Title reads "curve-dose-response · seaborn · pyplots.ai"
    in 24pt. Legend in upper left lists fit curves, data series, and CI band with
    no frame.
