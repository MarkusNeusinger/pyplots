<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 60">
  <style>
    text { font-family: 'MonoLisa', ui-monospace, 'SF Mono', Menlo, Consolas, monospace; letter-spacing: -0.02em; }
    .ink { fill: #1A1A17; font-weight: 700; }
    .dot { fill: #009E73; font-weight: 700; }
    .parens { fill: #1A1A17; fill-opacity: 0.45; font-weight: 400; }
    @media (prefers-color-scheme: dark) {
      .ink, .parens { fill: #F0EFE8; }
    }
  </style>
  <text x="0" y="45" font-size="44"><tspan class="ink">any</tspan><tspan class="dot" font-size="64">.</tspan><tspan class="ink">plot</tspan><tspan class="parens">()</tspan></text>
</svg>
