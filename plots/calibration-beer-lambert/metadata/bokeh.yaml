    the unknown point. A "95% Prediction Interval" label in italic blue text appears
    near the upper portion of the band. The legend in the top-left shows "Linear Fit",
    "Standards", and "Unknown". The title reads "calibration-beer-lambert · bokeh
    · pyplots.ai" centered at the top. Axes are labeled "Concentration (mg/L)" and
    "Absorbance". Grid lines are subtle dashed lines with low opacity.'
