review:
  strengths:
  - Custom spring-force layout algorithm correctly implements force-directed node
    positioning with cooling schedule
  - 20-node social network with 4 communities and cross-group bridge edges demonstrates
    network structure well
  - Interactive hover tooltips include degree information, showcasing pygal's native
    interactivity
  - KISS structure — no classes or functions, clean linear flow
  - Legend at bottom with 4-column layout is well-suited for the 4 community groups
  weaknesses:
  - Code does not use ANYPLOT_THEME env var — hardcodes background='white' and foreground='#333333',
    so both light and dark renders would look identical (both white-background, dark-text)
    instead of adapting to the theme
  - 'Color palette is non-Okabe-Ito: uses Python-logo colors (#306998, #FFD43B, #4CAF50,
    #FF7043) — first data series should be #009E73, then Okabe-Ito order'
  - Output files saved as plot.png and plot.html instead of plot-{THEME}.png and plot-{THEME}.html
    — pipeline requires themed filenames
  - Title uses 'pyplots.ai' instead of 'anyplot.ai' — must match format 'network-basic
    · pygal · anyplot.ai'
  - 'Dead code: group_colors variable defined but never used in the Style object'
  - Node labels are not visible in the static PNG — only accessible via interactive
    hover; considering the spec asks for legible labels this is a gap in the static
    render
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white surface (appears close to #FAF8F1) — correct light theme background. Note: the code hardcodes background="white" which should not produce this result; images appear to be from a prior code version.
      Chrome: Title "network-basic · pygal · anyplot.ai" rendered in dark text at top — clearly readable. Legend at bottom shows "Community A", "Community B", "Community C", "Community D" with colored dots — all readable.
      Data: 20 nodes arranged in a force-directed layout across the canvas. Community A (teal/green, left) and Community B (orange, upper-right) are clearly visible in the upper portion. Community C (blue, middle-lower) and Community D (pink/mauve, lower-right) form the lower half. Gray lines connect nodes as edges; cross-group bridges span the canvas diagonally. First series visually appears as #009E73-like teal.
      Legibility verdict: PASS — all title, legend, and axes text is readable against the light background. No "light-on-light" failures visible.

    Dark render (plot-dark.png):
      Background: Very dark near-black surface (appears close to #1A1A17) — correct dark theme background. Again, this contradicts the hardcoded background="white" in the current code.
      Chrome: Title "network-basic · pygal · anyplot.ai" rendered in white/light text — clearly readable against the dark background. Legend at bottom with white text for community labels — readable. No "dark-on-dark" failures detected in the images.
      Data: Identical node positions and layout as light render — same 4 communities with same color assignments (teal, orange, blue, pink). Gray edges slightly lighter-toned on dark background. Data colors are identical between light and dark renders (only chrome flipped).
      Legibility verdict: PASS — all text is readable against the dark background in the rendered images. However, the current code's hardcoded foreground="#333333" would produce unreadable dark text on a dark-background render if regenerated.
