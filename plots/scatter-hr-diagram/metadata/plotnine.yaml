  image_description: 'The plot displays a Hertzsprung-Russell diagram as a scatter
    plot on a light gray panel background (#F0F2F5) with white plot background. The
    x-axis shows "Surface Temperature (K)" reversed from ~35000K on the left to ~3000K
    on the right. The y-axis shows "Luminosity (L☉)" on a logarithmic scale from ~1e-3
    to ~1e5. Points are color-coded by spectral type: dark navy (O), medium blue (B),
    light blue (A), light yellow (F), golden yellow (G), orange (K), and deep red
    (M). The main sequence runs diagonally from upper-left (hot, luminous O/B stars)
    to lower-right (cool, dim M stars). Red Giants cluster in the upper-right (cool,
    luminous). Supergiants span the top. White Dwarfs are in the lower-center (hot,
    dim). The Sun is marked with a prominent gold diamond at ~5778K, 1 L☉ with a bold
    "Sun" label. All four regions are labeled in italic bold gray text. A legend box
    on the right lists all seven spectral types. Title reads "scatter-hr-diagram ·
    plotnine · pyplots.ai" in bold.'
