review:
  strengths:
  - Creative SVG pattern injection for lithology fills — transforms pygal flat bars
    into geologically meaningful patterned layers
  - Age bracket annotations on the left provide excellent geological context
  - Comprehensive data with 10 layers across 7 lithologies and 6 geological periods
  - Consistent monospace typography gives scientific/technical appearance
  - Dual output (HTML with interactive tooltips + PNG) leverages pygal SVG nature
  weaknesses:
  - Formation names only appear in the legend, not labeled directly adjacent to each
    layer as spec requests
  - Shale and mudstone colors (gray vs dark gray) may be difficult to distinguish
  - Age labels occasionally crowd depth tick labels on the left side
  - SVG regex manipulation is fragile and verbose, though necessary given pygal API
    limitations
  image_description: 'The plot displays a vertical stratigraphic column rendered as
    a pygal StackedBar chart at 3600x3600 px. The title "column-stratigraphic · pygal
    · pyplots.ai" appears at the top in monospace font. The y-axis is labeled "Depth
    (m)" with depth increasing downward from 0 to 140m with tick marks every 10m.
    Ten geological layers are stacked vertically, each filled with a distinct color
    and SVG lithology pattern: sandstone (gold with stipple dots), shale (gray with
    horizontal lines), limestone (sky blue with brick pattern), siltstone (green with
    short dashes), conglomerate (brown with circle outlines), mudstone (dark gray
    with fine horizontal lines), and dolomite (purple/pink with diamond crosshatch).
    Thickness values (12m, 13m, etc.) are printed within each layer. On the left side,
    age brackets with connecting lines group layers by geological period: Eocene,
    Paleocene, L. Cretaceous, E. Cretaceous, Jurassic, and Triassic. A bold "Age"
    header sits above the brackets. A red arrow annotation on the right marks "Thickest
    unit - Canyon Wall Fm (18m)". The legend at the bottom displays all 10 formation
    names with their geological ages in 3 columns.'
