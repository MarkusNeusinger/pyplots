    box reading "GM = 7.9 dB" annotate the gain margin. A blue diamond marks the gain
    crossover point on the 0 dB line. The bottom panel shows phase (degrees) vs. frequency
    (Hz), also on a log x-axis. The dark navy line starts near 0 degrees and rolls
    off to about -270 degrees. A dashed gray reference line at -180 degrees is drawn.
