  strengths:
  - Perfect spec compliance with all required features including dependency arrows,
    group aggregate bars, and hierarchical organization
  - Excellent data quality with realistic software project and diverse dependency
    patterns (linear, fan-out, fan-in, cross-group, parallel)
  - Good visual hierarchy with bold group headers, indented tasks, and alpha-differentiated
    group vs task bars
  - Clean well-organized code with deterministic data and appropriate complexity
  - Creative use of sns.lineplot with units parameter to draw Gantt bars
  weaknesses:
  - 'Two similar blue shades (#306998 and #4B8BBE) for Requirements and Development
    reduce color distinguishability'
  - Tick label font sizes (13-14pt) below the recommended 16pt minimum
  - Heavy reliance on matplotlib for core visualization reduces seaborn library mastery
  - Generic axis labels without additional context
  image_description: 'The plot displays a Gantt chart for a software development project
    with 15 tasks organized into 4 phases (Requirements, Design, Development, Testing).
    Task bars are drawn as thick horizontal lines color-coded by group: dark blue
    (#306998) for Requirements, yellow (#FFD43B) for Design, light blue (#4B8BBE)
    for Development, and olive green (#6B8E23) for Testing. Group headers (bold with
    a square prefix) have semi-transparent aggregate bars spanning each phase''s full
    duration. Gray curved dependency arrows connect the end of predecessor tasks to
    the start of successor tasks. The title reads "gantt-dependencies · seaborn ·
    pyplots.ai" in bold at the top. X-axis shows dates from Jan 01 to Jun 17 (rotated
    45 degrees), y-axis shows "Tasks" with hierarchical indentation. A legend in the
    upper right shows "Project Phases" with all group colors and a "Dependency" arrow
    indicator. Left spine is removed, grid is vertical-only with subtle dashed lines.
    The temporal flow reads naturally from top-left to bottom-right.'
