  image_description: The plot displays climate warming stripes spanning 1850-2024
    as a single row of vertical colored bars. The left portion (earlier years) is
    dominated by shades of blue (dark navy through medium blue to light blue), while
    the right portion (recent decades) transitions through oranges and reds to dark
    crimson. A white center marks the zero-anomaly point. The title "heatmap-stripes-climate
    · plotly · pyplots.ai" is centered at top in dark gray at 28pt. Subtle year labels
    "1850" and "2024" appear at the bottom-left and bottom-right in muted gray with
    0.7 opacity. Three thin semi-transparent white vertical lines mark the decades
    1900, 1950, and 2000. The stripes fill the canvas edge-to-edge with minimal margins,
    maintaining the specified ~3:1 wide aspect ratio (4800x1599px). No axes, gridlines,
    or tick marks are present — faithful to Ed Hawkins' original warming stripes design.
