  image_description: 'The plot displays a hierarchical dendrogram of 15 iris flower
    samples (5 each from Setosa, Versicolor, Virginica) clustered using Ward''s method.
    The Y-axis shows "Distance (Ward''s method)" ranging from 0 to approximately 11.
    Branch lines are drawn in a muted steel blue (#4A7FA5) using rule marks. At the
    base, colored dots indicate species membership: blue for Setosa, gold for Versicolor,
    and purple for Virginica. Leaf labels are rotated approximately 45 degrees and
    colored by species. A legend in the upper-right corner identifies the three species.
    The title reads "dendrogram-basic · altair · pyplots.ai". The dendrogram clearly
    shows Setosa clustering separately at a high distance (~10.3) from Versicolor/Virginica,
    which merge at approximately 5.0. The grid is subtle (dashed, low opacity) and
    the view frame is removed.'
