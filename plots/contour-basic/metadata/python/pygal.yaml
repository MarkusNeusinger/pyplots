  strengths:
  - Correct viridis colormap for continuous elevation data; both light and dark themes
    fully theme-correct with no chrome failures
  - Smart contour label placement algorithm (maximize-distance from placed anchors)
    prevents label-marker collisions
  - Inline marching squares + vectorized viridis interpolation is a technically accomplished,
    elegant solution to a hard problem (contour plots in pygal)
  - All five required spec features present; axis labels and colorbar title include
    units
  - 'Perfect data quality: realistic topographic scenario with appropriate scale and
    good feature coverage'
  weaknesses:
