  strengths:
  - 'Correct Okabe-Ito palette: #009E73 first, followed by #D55E00, #0072B2, #CC79A7
    in canonical order'
  - 'Full theme-adaptive chrome: PAGE_BG, INK, INK_SOFT, ELEVATED_BG tokens applied
    throughout'
  - Node size encodes degree (26 + degree*7) giving an immediate visual cue to connectivity
  - Rich Plotly hover tooltips with customdata showing team name, connection count,
    and neighbour list
  - Realistic workplace social network scenario with 4 named departments and cross-team
    bridges
  - Custom Fruchterman-Reingold spring layout implemented without networkx dependency
    — deterministic output
  - One trace per group ensures a clean legend with team labels; HTML export included
    alongside PNG
  - 'Spec requirements fully met: spring layout, degree-encoded node sizes, sparse
    enough network, 20 nodes in range'
  weaknesses:
  - Design sophistication (DE-01) is above defaults but not publication-ready — node
    sizes and group colors are the only intentional hierarchy; adding a subtle highlight
    or size boost to the highest-degree bridge nodes (e.g., Frank, Jack, Leo) would
    create a clear focal point
  - 'Data storytelling (DE-03): the spring layout naturally reveals clusters but the
    viewer must search for meaning — annotating or visually distinguishing the 2-3
    key cross-team connector nodes (e.g. a pulsed ring, slightly larger size, or a
    callout annotation) would communicate the insight instantly'
  - 'Visual refinement (DE-02): margins are very tight (l=20, r=20, b=20) leaving
    the network touching the canvas edge; increasing margins to at least 60px on all
    sides would give the graph more breathing room'
  - 'VQ-05: The bottom-left cluster (Tom, Ryan, Paul, Sara) is pushed into a corner;
    a wider canvas margin and/or a slight rescaling of the normalised position range
    would distribute nodes more evenly'
  - 'VQ-01: Node labels at textfont size=16 are small for the very low-degree nodes
    (minimum size ~26px diameter); bumping textfont size to 18 would improve legibility
    at full 4800×2700 resolution'
