  image_description: 'The plot displays a spirometry flow-volume loop on a clean white
    background with subtle gridlines. The x-axis shows "Volume (L)" (0–5.2) and the
    y-axis shows "Flow (L/s)" (−5.5 to 10.5). A solid blue (#306998) line traces the
    measured flow-volume loop: the expiratory limb rises sharply from the origin to
    a Peak Expiratory Flow of ~9.5 L/s, then declines roughly linearly to FVC at ~4.8
    L. The inspiratory limb curves below the zero-flow line in a symmetric U-shape,
    reaching about −5.5 L/s. A gray dashed line shows the predicted normal loop (larger,
    extending to ~5.2 L volume and ~10.8 L/s PEF). A light red shaded region between
    the measured and predicted expiratory limbs highlights the "Flow deficit." A red
    dot with arrow annotation marks "PEF = 9.5 L/s," and a blue diamond with arrow
    marks "FEV₁ = 3.5 L." A styled text box in the bottom-right displays clinical
    values: FVC = 4.8 L, FEV₁ = 3.5 L, FEV₁/FVC = 73%, PEF = 9.5 L/s. The legend in
    the upper right shows Measured (solid blue), Predicted Normal (dashed gray), and
    Flow deficit (shaded red). Top and right spines are removed. Title reads "spirometry-flow-volume
    · seaborn · pyplots.ai."'
