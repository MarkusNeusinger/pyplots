  image_description: 'The plot displays a chromagram heatmap on a dark navy background
    (#0f0f23). The Y-axis lists all 12 pitch classes from C at the top to B at the
    bottom, each clearly labeled in light gray text. The X-axis shows time from 0
    to 8 seconds with integer tick labels. The magma colormap renders energy intensity
    from near-black (0.0) through purple and orange to bright yellow/white (1.0).
    A vertical colorbar on the right indicates the Energy scale from 0.0 to 1.0. The
    title reads "heatmap-chromagram · seaborn · pyplots.ai" in bold white text. The
    chord progression is clearly visible: C major (C, E, G lit up at 0-2s), G major
    (G, B, D bright at 2-4s), A minor (A, C, E at 4-6s), C major return (6-7s), and
    F major (F, A, C at 7-8s). Passing tones appear as brief purple/orange flickers
    at transition points. Smooth blending via convolution creates realistic gradual
    chord transitions.'
