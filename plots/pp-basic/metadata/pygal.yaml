    trace along the diagonal with a visible S-shaped departure in the middle and upper
    portions, indicating the mixed normal+exponential data departs from pure normality.
    The background is very light gray (#fafbfc) with subtle grid lines. Legend is
    at the bottom with all four series clearly labeled.'
