    teal/green (#0E7C6B) dots on the horizontal axis mark principal stresses σ₁=93.0
    and σ₂=-43.0 MPa. Two dark purple (#4A3D8F) dots at the top and bottom of the
    circle mark τ_max = ±68.0 MPa. A small reddish (#B5342B) arc near the center shows
    the 2θp = 36.0° angle with a bold stroke. The legend at the bottom displays 6
    series in 3 columns with descriptive labels including computed stress values.
    The circle appears as a true circle thanks to the square canvas and matched axis
    ranges. Overall layout is clean and professional with good canvas utilization.
