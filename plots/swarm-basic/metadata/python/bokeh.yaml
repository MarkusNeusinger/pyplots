review:
  strengths:
  - 'Complete theme adaptation: all chrome tokens (PAGE_BG, INK, INK_SOFT) applied
    to every element — title, labels, ticks, axes, grid, border — producing clean
    light and dark renders.'
  - Median lines per group add analytical value requested by spec ('consider adding
    a subtle mean or median marker').
  - White/page-background edge on scatter points (line_color=PAGE_BG) is textbook
    style-guide practice for overlapping point definition.
  - Bimodal Sales distribution is intentionally modeled, making the dataset interesting
    and educational.
  - Flat-script structure, seed set, correct output filenames, idiomatic Selenium
    screenshot.
  weaknesses:
  - Custom swarm jitter algorithm (bin_size=3, step 0.08) does not effectively de-overlap
    points in dense value ranges — Engineering and Sales columns show vertical stacking.
    A stronger spread (larger jitter_width, smaller bin_size) would match spec's 'points
    spread horizontally to avoid overlap'.
  - No HoverTool — a key Bokeh interactive feature that would let viewers read exact
    performance scores per employee. This is the single biggest missed Library Mastery
    opportunity.
  - Y-axis lower bound (25) wastes canvas space; data starts at ~45. Could be tightened
    to 40-45 with a bit of padding.
  - No legend entry or explicit category label tied to point color — relies entirely
    on x-axis position for color-to-group decoding.
  image_description: |-
