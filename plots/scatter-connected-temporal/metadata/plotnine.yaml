review:
  strengths:
  - 'Excellent data choice: Phillips curve with recession event creates compelling
    narrative'
  - Correct use of geom_path (not geom_line) for temporal ordering shows library understanding
  - Per-label custom offsets prevent text collisions elegantly
  - Cohesive blue gradient with contrasting red recession accent
  - Clean well-structured code with all font sizes explicitly set
  weaknesses:
  - Color gradient in intermediate years (2000-2010) is subtle making temporal progression
    hard to distinguish in the middle range
  - Minor label crowding in the central area between 1995 and 2005 annotations
  - 2009 recession ring annotation text could benefit from slightly more offset
  image_description: The plot displays a connected scatter plot showing the Phillips
    Curve relationship between Unemployment Rate (%) on the x-axis and Inflation Rate
    (%) on the y-axis for 1990-2020. Data points are connected by line segments in
    chronological order using geom_path. A blue color gradient (light blue for 1990
    to dark navy for 2020) encodes temporal progression along both the path and the
    filled point markers. White-stroked circular markers are visible at each of the
    31 data positions. Six key years (1990, 1995, 2000, 2005, 2015, 2020) are annotated
    with bold gray text labels, each with custom positioning offsets to avoid crowding.
    The 2009 recession peak is highlighted with a larger red circle outline and bold
    red "2009 Recession" annotation. A continuous color bar legend on the right maps
    the gradient to years. The title follows the required format. The background uses
    theme_minimal with very subtle gridlines (alpha=0.2) and no minor grid.
