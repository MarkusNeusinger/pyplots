  strengths:
  - 'Perfect spec compliance: donut chart with center metric ($1,025K total), percentage
    labels, and correct 5-segment Okabe-Ito ordering'
  - Both themes render cleanly — light (#FAF8F1) and dark (#1A1A17) backgrounds with
    fully theme-adaptive chrome (INK/INK_SOFT tokens applied to title, data labels,
    and center subtitle)
  - 'Clean idiomatic Highcharts code: correct PieSeries with innerSize, container=''container'',
    inline JS download, proper Selenium screenshot pipeline'
  weaknesses:
  - Title font size (56px) is double the 28px style-guide recommendation for pixel-based
    Highcharts; data labels at 44px are similarly oversized relative to the 18px tick-label
    guideline — while readable, this creates inconsistency with other implementations
  - 'Design excellence is functional but not polished: no weight contrast between
    label name and percentage (both plain text), no visual callout for the dominant
    Engineering segment, center metric styling is standard Highcharts subtitle without
    extra typographic refinement'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white
      Chrome: Title "Budget by Department · donut-basic · highcharts · anyplot.ai" in dark #1A1A17 text, clearly readable. No axis labels (appropriate for donut). Center subtitle shows "Total budget" in INK_SOFT (#4A4A44) and "$1,025K" in bold INK (#1A1A17), both readable against the off-white donut hole.
      Data: Five Okabe-Ito segments in order — Engineering (brand green #009E73, ~47%), Operations (vermillion #D55E00, ~21%), Marketing (blue #0072B2, ~15%), Sales (reddish purple #CC79A7, ~12%), Support (orange/yellow #E69F00, ~5%). Outside data labels with connectors show name + percentage in dark INK text, all clearly readable. Thin PAGE_BG gap between segments for definition.
