    transitions to n=3. Each transition is a downward arrow with a rotated wavelength
    label in nm. Subtle background tints distinguish each series column. A vertical
    "Energy" arrow on the far left indicates the energy direction. The title reads
    "energy-level-atomic · seaborn · pyplots.ai" at the top. The background is a light
