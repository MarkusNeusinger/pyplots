  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface, not pure white.
      Chrome: Title "GitHub Contributions 2024 · heatmap-calendar · bokeh · anyplot.ai" in dark ink (32pt), clearly readable. X-axis label "Month" and y-axis label "Day of Week" in dark ink (22pt). Tick labels (month names Jan–Dec on x-axis, weekday names Mon–Sun on y-axis) at 20pt in INK_SOFT (#4A4A44), clearly readable. Color bar on right with "Contributions" title (20pt) and numeric tick labels (18pt), all readable.
      Data: Calendar grid of 52 weeks × 7 weekday rows. Cells colored using reversed Greens9 (lightest green = low contributions, darkest green = high contributions, range 0–14). The green palette is semantically appropriate for GitHub-style contributions. Good variation in cell colors across the year.
      Legibility verdict: PASS — all text is clearly readable against the light background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface.
      Chrome: Title, axis labels, and tick labels all rendered in light-colored text (INK = #F0EFE8 for primary, INK_SOFT = #B8B7B0 for secondary). No dark-on-dark failure. Color bar background adapts to ELEVATED_BG (#242420) with light-colored labels. All chrome elements correctly theme-adapted.
      Data: Same Greens9 reversed palette as light render (data colors identical — correct). ISSUE: The lowest-value cells use the lightest Greens9 shade (~#F7FCF5, near-white), producing stark white rectangles on the #1A1A17 dark background. This is visually jarring and makes zero-contribution days look like missing data or artifacts rather than intentional empty cells. A Viridis256 colormap would avoid this problem (its dark end is deep purple, not white).
      Legibility verdict: PASS for chrome text. PARTIAL FAIL for data color readability — near-white cells on dark background are jarring and visually problematic.
