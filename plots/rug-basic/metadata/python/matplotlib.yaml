review:
  strengths:
  - EventCollection is the canonical matplotlib approach for rug plots — idiomatic
    and correct
  - 'Theme-adaptive chrome thoroughly applied: PAGE_BG, INK, INK_SOFT, INK_MUTED all
    used on every relevant element'
  - Trimodal data with deliberate cluster sizes and outliers gives excellent feature
    coverage
  - Cluster labels with sample counts (n=50/35/15) add real storytelling value
  - Single bottom spine with hidden y-axis is the right minimal treatment for a rug
    plot
  weaknesses:
  - Tall linelength=0.7 (filling 70% of the 0-1 y-range) makes the marks look more
    like bars than small tick marks — spec says tick height should be small relative
    to the plot; consider linelength=0.3-0.4 with matching lineoffset
  - Empty vertical dead zone between annotation text (y~0.88) and rug marks tops (y~0.70)
    — using ax.annotate() with arrowprops would visually bridge this gap cleanly
  - ax.text() labels float without visual connection to data groups; ax.annotate()
    with arrowprops would make the callouts more intentional
