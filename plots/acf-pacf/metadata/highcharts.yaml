  image_description: The plot displays two vertically stacked panels on a white background.
    The top panel shows ACF (autocorrelation) values from lag 0 to 35, and the bottom
    panel shows PACF (partial autocorrelation) values from lag 1 to 35. The title
    reads "acf-pacf · highcharts · pyplots.ai" in bold dark text, with a subtitle
    "AR(2) Process — Exponential ACF Decay with PACF Cutoff at Lag 2" in gray. Bars
    are colored in dark blue (#306998) for non-significant lags and orange (#e67e22)
    for significant lags exceeding the 95% confidence interval. Orange dashed horizontal
    lines mark the ±95% CI bounds, with a "95% CI" label on the right side of the
    top panel. Data labels appear on significant bars showing their correlation values.
    The ACF panel shows lag 0 at 1.0 with "r=1.0" label, lag 1 strongly positive (~0.42),
    lag 2 negative (~-0.24), with exponential decay thereafter. The PACF panel shows
    a sharp cutoff after lag 2, consistent with an AR(2) process. A legend in the
    top-right distinguishes "Significant (|r| > 95% CI)" (orange) and "Non-significant"
    (blue). The x-axis is labeled "Lag" and y-axes are labeled "ACF" and "PACF" respectively.
