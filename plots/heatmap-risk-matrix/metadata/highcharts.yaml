  strengths:
  - Excellent spec compliance with all required features implemented correctly
  - Professional design with custom color gradient, Inter font, rounded cell borders,
    and styled zone annotations
  - Marker size scaling by risk score creates effective visual hierarchy
  - Adaptive text color on heatmap cells ensures readability across the gradient
  - Per-point label offsets demonstrate attention to detail for overlap prevention
  - Realistic, well-chosen risk data with appropriate likelihood/impact ratings
  weaknesses:
  - Minor label proximity in cells with multiple risks (Major/Unlikely area)
  - Bottom margin slightly excessive, reducing canvas utilization
  - Raw JavaScript used for formatter functions rather than pure Python API
  image_description: 'The plot displays a 5×5 risk assessment matrix heatmap with
    the title "heatmap-risk-matrix · highcharts · pyplots.ai" and a subtitle explaining
    the risk score formula and zone ranges. The X-axis is labeled "IMPACT ▶" with
    categories Negligible, Minor, Moderate, Major, Catastrophic. The Y-axis is labeled
    "▲ LIKELIHOOD" with categories Rare, Unlikely, Possible, Likely, Almost Certain.
    Background cells use a green-yellow-orange-red color gradient based on risk scores
    (1–25), with scores displayed as numbers in each cell (white text on dark cells,
    dark text on light cells). 14 risk items are plotted as colored circular markers
    with white borders and bold text labels. Three risk categories are shown in a
    vertical legend on the right: Technical (blue), Financial (orange), Operational
    (teal). Zone annotation labels (LOW, MEDIUM, HIGH, CRITICAL) appear as styled
    badges with rounded corners and shadows at diagonal positions on the matrix. The
    overall layout has a light gray (#f7f9fc) background with clean spacing and no
    visible gridlines, giving a polished professional appearance.'
