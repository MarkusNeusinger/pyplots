  image_description: 'The plot displays a phase-folded exoplanet transit light curve
    on a clean white background. Blue scatter points (#306998) with light blue error
    bars (alpha=0.35) show 400 observational data points distributed across orbital
    phase 0.0-1.0 on the x-axis, with relative flux (~0.986-1.004) on the y-axis.
    A prominent orange (#c46210) transit model curve shows the characteristic U-shaped
    dip centered at phase 0.5, descending from ~1.000 to ~0.988. A subtle orange uncertainty
    ribbon surrounds the model near the transit region. A dotted gray baseline at
    flux=1.0 is labeled "Baseline" in italic gray text. A dashed vertical segment
    at phase 0.54 marks the transit depth, with an italic brown annotation reading
    "Depth: 1.20%". The legend in the upper-right shows "Observations" (blue) and
    "Transit Model" (orange). The title reads "lightcurve-transit · plotnine · pyplots.ai"
    in bold. Y-axis tick labels use 3-decimal formatting. X-axis ticks at 0.1 intervals.
    Only subtle horizontal y-gridlines visible. Layout is 16:9 landscape.'
