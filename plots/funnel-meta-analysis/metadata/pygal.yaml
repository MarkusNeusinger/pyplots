  image_description: The plot displays a funnel plot for meta-analysis of publication
    bias. The title reads "funnel-meta-analysis · pygal · pyplots.ai" at the top in
    black text. The X-axis is labeled "Log Odds Ratio (Effect Size)" ranging from
    -1.00 to 0.10, and the Y-axis is labeled "Standard Error (precision ↑)" ranging
    from 0 (top) to 0.30 (bottom), correctly inverted. Two dashed light-blue diagonal
    lines form the funnel shape (95% Pseudo CI) emanating from the pooled effect at
    SE=0. A solid dark vertical line marks the pooled effect at LOR=-0.47. A lighter
    grey dashed vertical line marks the null effect at LOR=0. Blue dots (high-precision
    studies, larger) cluster tightly near the pooled effect line at low SE values
    (top). Orange dots (low-precision studies, smaller) scatter asymmetrically, with
    several appearing to the right of the funnel, demonstrating the rightward gap
    characteristic of publication bias. The background is white with a slightly off-white
    (#FAFAFA) plot area. The legend at the bottom shows five entries in three columns.
    No grid lines are visible.
