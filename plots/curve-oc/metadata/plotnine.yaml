    15% and the y-axis shows "Probability of Acceptance P(a)" from 0.0 to 1.0. Two
    vertical dashed gray lines mark AQL (1%) and LTPD (8%). A light blue shaded "Accept
    Zone" appears on the left, a light pink/red shaded "Reject Zone" on the right.
    A blue ribbon fills the discrimination envelope between the steepest and most
    gradual curves. Two open orange circle markers indicate producer''s risk (alpha=0.08)
    and consumer''s risk (beta=0.01) for the n=100,c=2 plan, with bold orange labels.
    The legend is positioned in the upper right with a semi-transparent white background,
    showing all three sampling plans with color and linetype encoding. Horizontal-only
    subtle gray gridlines are present.'
