  image_description: 'The plot displays a Gantt chart for a software development project
    with four phases color-coded: Requirements (deep blue #306998), Design (teal #2A9D8F),
    Development (amber #E9A820), and Testing (purple #7B2D8E). The y-axis lists 16
    rows: four group header bars (▸ Requirements, ▸ Design, ▸ Development, ▸ Testing)
    each followed by their child tasks (Gather Requirements, Document Specs, Review
    & Approve, System Architecture, Database Design, UI/UX Mockups, Backend API, Frontend
    Components, Integration, Unit Testing, Integration Testing, User Acceptance).
    The x-axis shows dates from Dec 25, 2023 to Mar 25, 2024 with weekly intervals.
    Critical path tasks have bold/thicker bars (alpha=1.0, size=11) with dark (#1A1A1A)
    L-shaped dependency arrows, while non-critical tasks have subdued bars (alpha=0.5,
    size=9) with gray (#666666) arrows. Group aggregate bars span the full duration
    of child tasks. Red diamond milestone markers appear at key handoff points (Design
    Start, Dev Start, Testing Start, Launch). V-shaped arrowheads point from predecessor
    end dates to successor start dates. A legend on the right shows "Project Phase"
    with the four phase colors. The title reads "gantt-dependencies · plotnine · pyplots.ai"
    with an explanatory subtitle.'
