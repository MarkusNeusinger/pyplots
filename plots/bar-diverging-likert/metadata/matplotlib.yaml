  image_description: 'The plot displays a horizontal diverging stacked bar chart showing
    employee engagement survey results for 10 questions. Bars diverge from a central
    zero line, with negative responses (Strongly Disagree in dark red #c0392b, Disagree
    in salmon #e77a6d) extending left and positive responses (Agree in light blue
    #6dacde, Strongly Agree in dark blue #2471a3) extending right. Neutral responses
    are shown in muted gray (#b0b0b0), split evenly across the center. Questions are
    sorted from highest net agreement ("Resources are adequate" at +72) to lowest
    ("Leadership inspires confidence" at -4). Percentage labels appear inside segments
    ≥7%, with white text on dark segments and dark text on lighter ones. A "Net" column
    on the right shows net agreement scores color-coded blue (positive) or red (negative).
    The x-axis uses ± percentage labels at 20% intervals. The legend at the bottom
    shows all 5 categories. Top, right, and left spines are removed. A subtle x-axis
    grid (alpha=0.15) aids readability.'
