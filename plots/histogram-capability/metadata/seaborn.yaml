  image_description: The plot displays a histogram of 200 shaft diameter measurements
    (mm) using blue bars (#306998) with white edge coloring, overlaid with a dark
    blue KDE curve. Two orange dashed vertical lines mark the Lower Specification
    Limit (LSL = 9.95) and Upper Specification Limit (USL = 10.05). A teal dash-dot
    vertical line marks the target value (10.0). Light orange shaded regions highlight
    areas outside specification limits on both sides. A white annotation box with
    orange border in the upper right displays Cp = 1.19, Cpk = 1.18, μ = 9.9994, σ
    = 0.0140. Below the box, the word "Adequate" appears in orange, indicating the
    process capability status. The legend in the upper left lists KDE Fit, LSL, USL,
    and Target. The title reads "histogram-capability · seaborn · pyplots.ai". X-axis
    is labeled "Shaft Diameter (mm)", Y-axis is labeled "Density". Top and right spines
    are removed. The grid is subtle with low alpha. The layout is well-proportioned
    at 16:9.
