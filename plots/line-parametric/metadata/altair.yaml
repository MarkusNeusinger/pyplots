review:
  strengths:
  - Excellent spec compliance with both required curve types and all key features
    (color gradient, start/end markers, equal aspect ratio)
  - 'Strong visual refinement: subtle grid, removed spines/ticks, clean view configuration'
  - Effective data storytelling through color gradient and start/end marker differentiation
  - Good use of Altair declarative grammar and layer composition
  - Deterministic, clean code structure
  weaknesses:
  - mark_circle creates scattered/dotted appearance instead of smooth continuous curves
    — mark_trail or mark_line would render smoother
  - Lissajous start/end labels crowded at origin since both points coincide at (0,0)
  - Code repetition between panels for marker and label creation
  - Right-edge colorbar slightly tight against canvas boundary
  image_description: The plot displays two side-by-side panels on a wide canvas. The
    left panel shows a Lissajous figure (x=sin(3t), y=sin(2t)) rendered as small circles
    colored by the viridis colormap mapping parameter t from 0 to ~6.28. The figure-eight-like
    curve self-intersects multiple times, with dark purple at the start transitioning
    through teal/green to yellow at the end. A blue circle marker labels "t = 0" and
    a red diamond labels "t = 2π", both near the origin. The right panel shows an
    Archimedean spiral (x=t·cos(t), y=t·sin(t)) normalized to [-1, 1], spiraling outward
    from center with viridis coloring from t=0 (dark purple, center) to t=6π (yellow,
    outer edge). Start and end markers are similarly styled. Both panels have axes
    labeled x(t) and y(t), subtle dashed grids, and independent color legends. The
    main title reads "line-parametric · altair · pyplots.ai" with a descriptive subtitle.
