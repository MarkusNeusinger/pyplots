  - No visual legend for the significant/insignificant color distinction
  image_description: The plot displays two vertically stacked subplots sharing an
    x-axis labeled "Lag" (0–36). The top subplot shows ACF values and the bottom shows
    PACF values. Vertical stem lines extend from a zero baseline to each correlation
    value, with dark blue (#306998) stems for statistically significant lags and light
    blue (#a8c4d8) for insignificant ones. Circular dot markers cap each stem, with
    larger markers (white-edged) on significant lags. Dashed brown/tan horizontal
    lines mark the 95% confidence bounds (~±0.14), with a very subtle shaded band
    between them. The ACF plot features an annotation with a curved arrow pointing
    to lag 12 reading "12-month seasonal cycle." The ACF values show slow decay from
    1.0 at lag 0 with periodic peaks at lags 12, 24, 36 — characteristic of trended
    seasonal data. The PACF shows a sharp spike at lag 1 (~0.91) with significant
    negative values at lags 2–3 and periodic spikes at seasonal lags. Top and right
    spines are removed, a subtle y-axis grid is present, and the background is off-white
    (#fafbfd). Title reads "acf-pacf · matplotlib · pyplots.ai" in dark gray at the
    top.
