review:
  strengths:
  - Excellent spec compliance — all required features implemented correctly (15/15)
  - Creative use of pygal Graph base class to build a custom heatmap chart type not
    natively available
  - Shadow text technique ensures marker labels are readable on any background color
  - SVG tooltip support via native title elements is idiomatic pygal
  - Realistic risk management data with 14 diverse risk items across 4 categories
  - Dual legend (zones + categories) is well-organized and informative
  weaknesses:
  - Some marker labels (Budget Overrun, Key Person) are clipped at cell edges
  - sys.path manipulation for import workaround is a code smell
  - HTML output generation adds unnecessary code beyond spec requirements
  - Orange category markers on orange High cells have reduced contrast
  image_description: 'The plot displays a 5x5 risk assessment matrix with LIKELIHOOD
    on the Y-axis (1. Rare through 5. Almost Certain) and IMPACT on the X-axis (1.
    Negligible through 5. Catastrophic). Each cell shows a bold risk score (product
    of likelihood x impact) and a zone label (Low/Medium/High/Critical). Cells are
    color-coded using a sequential palette: light blue for Low (1-4), yellow for Medium
    (5-9), orange for High (10-16), and red for Critical (20-25). Fourteen risk items
    are plotted as colored circular markers with bold text labels - blue for Technical
    (Server Outage, Data Breach, Tech Debt, Cyber Attack), purple for Financial (Budget
    Overrun, Currency Risk, Market Shift), orange for Operational (Vendor Delay, Staff
    Turnover, Scope Creep, Key Person), and teal for External (Reg. Change, Supply
    Chain, Pandemic). A right-side legend shows both Risk Zones and Risk Categories.
    The title reads heatmap-risk-matrix · pygal · pyplots.ai. X-axis labels are rotated
    at ~35 degrees for readability. Cells have rounded corners with white borders
    creating clear delineation.'
