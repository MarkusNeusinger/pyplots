    Points (purple circles) spread across all four quadrants. A dashed gray unit circle
    is centered at the origin. Vectors (arrows) extend from the origin to each point
    with category-appropriate colors. Each point is annotated with its label and rectangular
    form (e.g., "ω₁ / -0.5+0.9i") in white-background rounded boxes. Axis labels read
    "Re(z)" and "Im(z)". The title reads "scatter-complex-plane · seaborn · pyplots.ai".
    Subtle grid lines and removed spines give a clean appearance. The marginal KDE
    plots show the density distribution of real and imaginary parts per category.'
