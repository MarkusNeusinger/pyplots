  image_description: 'The plot displays a multi-track genome browser view of the HOXA
    gene cluster on chromosome 7 (27,200–27,280 kb). Four horizontal tracks are stacked
    vertically with a shared x-axis showing genomic position in kilobases. The top
    "Genes" track shows five genes (HOXA1–HOXA5) as dark blue exon rectangles connected
    by thinner blue intron lines, with italic gene names above and strand direction
    arrows (triangles) below. The "Coverage" track shows a light blue filled area
    plot representing RNA-seq read depth, with peaks aligning over exonic regions.
    The "Variants" track displays lollipop markers — orange circles for SNPs and dark
    red circles for indels — with stem heights encoding quality scores. The "Regulatory"
    track shows colored rectangles: green for promoters and purple for enhancers.
    A faint yellow highlight region spans vertically across the HOXA3 area. Track
    labels appear in bold on the left. The title reads "genome-track-multi · letsplot
    · pyplots.ai" with a subtitle describing the locus. Legends for variant type and
    regulatory elements appear at the bottom. The background is white with subtle
    gray track backgrounds and dashed divider lines.'
