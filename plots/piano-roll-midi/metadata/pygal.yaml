  image_description: 'The plot displays a MIDI piano roll visualization spanning 32
    beats (8 measures) of a I-V-vi-IV chord progression. The y-axis shows pitch names
    from C3 to G5 with labels at every semitone, and the x-axis shows "Time (beats)"
    from 0 to 32. Notes appear as thick horizontal colored line segments on a pygal
    XY chart: dark purple for pp (65-74), steel blue for p (75-84), teal for mp (85-94),
    yellow-green for f (95-104), and bright yellow for ff (105-115) — a viridis-like
    sequential palette. Three musical layers are clearly visible: long bass notes
    at the bottom (C3, G3, A3, F3), block chord voicings in the middle register (C4-A4),
    and shorter melodic notes at the top (B4-G5). The background is light off-white
    (#f8f8f6). Grid lines are present both vertically and horizontally but are uniform
    — no differentiation between beat and measure boundaries. There is no alternating
    black/white key row shading. A legend at the bottom shows velocity bands with
    musical dynamic labels (pp, p, mp, f, ff), though legend text is partially obscured
    by the color box squares. The title "piano-roll-midi · pygal · pyplots.ai" appears
    at top in monospace font. Many y-axis rows for pitches with no notes (D3, D#3,
    E3, C#4, D#4, etc.) consume vertical space without contributing data.'
