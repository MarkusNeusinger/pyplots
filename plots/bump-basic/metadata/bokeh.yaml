review:
  strengths:
  - Effective visual hierarchy through highlight system differentiating dramatic movers
    (Ferrari, McLaren, Red Bull) from stable entities
  - Clean aesthetic with removed spines, subtle dashed grid, and custom light background
  - CustomJSTickFormatter for ordinal rank labels (1st, 2nd, etc.) is a smart Bokeh-specific
    touch
  - End-of-line labels with color-matched text and bold/normal differentiation eliminate
    need for separate legend
  - Realistic F1 data context with interesting rank change narratives
  weaknesses:
  - Non-highlighted entities (Mercedes, Aston Martin) at alpha 0.55 are slightly hard
    to follow through crossover sections
  - Red/green color pair (#D44D5C/#5BA67D) could be improved for deuteranopia safety
  image_description: |-
    The plot displays a bump chart tracking Formula 1 constructor standings over 6 races. The y-axis is inverted with rank 1 ("1st") at the top and rank 5 ("5th") at the bottom, using ordinal suffix labels via custom JavaScript formatting. The x-axis shows "Race 1" through "Race 6" with the label "Constructor Standings by Race". The title "bump-basic · bokeh · pyplots.ai" appears in bold dark blue at the top left.

    Five teams are plotted with distinct colors: Red Bull Racing (blue #306998), McLaren (orange #E6894A), Ferrari (red/rose #D44D5C), Mercedes (green #5BA67D), and Aston Martin (purple #8B6DB0). Three teams (Red Bull, McLaren, Ferrari) are highlighted with thicker lines (10px), larger markers (38px), and higher alpha (0.95), while Mercedes and Aston Martin are subdued (5px lines, 22px markers, alpha 0.55). End-of-line labels to the right of each team's final position serve as the legend, with highlighted teams in bold.

    The background is light gray (#f8f9fa) with subtle dashed horizontal grid lines (alpha 0.25). All axis lines, spines, and tick marks are removed. The layout is clean and balanced with generous right margin accommodating the team name labels.
