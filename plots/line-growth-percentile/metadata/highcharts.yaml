review:
  strengths:
  - Excellent clinical realism with WHO-style percentile data and plausible patient
    trajectory
  - Strong visual hierarchy with orange patient line against blue percentile bands
  - Professional typography with custom font family and explicit sizing throughout
  - Graduated band transparency creates natural visual depth
  - Effective use of Highcharts arearange for percentile bands and data label filters
    for right-margin annotations
  - Birth annotation adds narrative context to the patient growth story
  weaknesses:
  - Normal Range plotBand label is very faint and oddly positioned at a fixed y-range
    at the top of the chart
  - Right-margin percentile labels slightly crowded where curves converge
  - 36 mo patient data label may be partially clipped at the chart right boundary
  image_description: The plot displays a pediatric growth chart for boys' weight-for-age
    from birth to 36 months. Five graduated blue percentile bands span from P3 to
    P97, with darker blue at the extremes (P3-P10, P90-P97) and lighter blue near
    the median (P25-P75). Individual percentile lines are drawn with distinct dash
    styles - the P50 median is a thick solid dark blue line, while others use dashed/dotted
    styles with lower opacity. Percentile labels (P3, P10, P25, P50, P75, P90, P97)
    appear at the right margin with staggered offsets. An orange/red patient trajectory
    is overlaid as a smooth spline with filled circular markers (white border), tracking
    near the P25-P40 range. A "Birth / 3.3 kg" annotation appears at the first data
    point. The title reads "Boys Weight-for-Age - line-growth-percentile - highcharts
    - pyplots.ai" with a subtitle "WHO Growth Standards, Birth to 36 Months". X-axis
    shows "Age (months)" 0-36, Y-axis shows "Weight (kg)" 0-24. A floating legend
    in the top-right shows "50th Percentile (Median)" and "Patient (Boy, Age 0-36m)".
    Background is a soft off-white with subtle dotted grid lines.
