  - Bimodal data with deliberate gap_region at 38-42 ms demonstrates clustering and
    gap-detection — the key pedagogical value of rug plots
  - fill='tozeroy' and symbol='line-ns' are idiomatic Plotly features used appropriately
  - Font sizes all explicitly set at correct pixel values for 4800x2700 px output
  weaknesses:
