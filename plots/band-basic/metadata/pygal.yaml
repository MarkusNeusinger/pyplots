    title reads "band-basic · pygal · pyplots.ai". A legend at the bottom shows three
    entries: "95% Confidence Band", "Sensor Mean", and "Wilting Point (25%)". The
    moisture starts high (~38-42%), drops with a diurnal pattern, reaches a low around
    18h, recovers with a secondary rain event around hour 40, then drops again. The
    confidence band widens over time. A visible vertical fill artifact appears at
    x=0 on the left edge where the polygon fill extends to the chart baseline.'
