  image_description: The plot displays a 10x10 heatmap representing an actuarial loss
    development triangle. Accident years 2015-2024 run along the y-axis (top to bottom),
    and development periods 1-10 along the x-axis. Cells are colored using a Blues
    sequential colorscale encoding cumulative claim magnitude, with a colorbar on
    the right labeled "Cumulative Claims ($)" ranging from ~4,000 to ~49,000. Projected
    (estimated IBNR) cells in the lower-right triangle are overlaid with a subtle
    amber/orange tint. A dashed diagonal line separates actual from projected regions.
    Each cell is annotated with its cumulative amount formatted with thousands separators.
    Cells along the actual/projected boundary have white background highlights for
    contrast. A legend at the top left distinguishes "Actual (observed)" in blue from
    "Projected (estimated IBNR)" in amber. Development factors (2.500 down to 1.010)
    are displayed below the x-axis. The title reads "heatmap-loss-triangle · plotly
    · pyplots.ai". The background is a light off-white (#fafafa).
