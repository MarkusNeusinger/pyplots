  - Correct stem plot implementation using mark_rule with y2 encoding and mark_circle
    markers — idiomatic Altair layer composition
  - 'Full theme-adaptive chrome correctly applied: warm off-white (#FAF8F1) light
    background, near-black (#1A1A17) dark background, all text readable in both themes'
