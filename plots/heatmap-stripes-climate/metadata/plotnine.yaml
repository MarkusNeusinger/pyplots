  image_description: 'The plot displays climate warming stripes — a sequence of vertical
    colored bars spanning from left to right across a wide, short canvas (~3.2:1 aspect
    ratio). The leftmost bars (representing earlier years around 1850) are predominantly
    deep blue (#08306b) and medium blue (#2171b5), indicating negative temperature
    anomalies. Moving rightward, the colors transition through lighter blues (#6baed6,
    #deebf7) to near-white tones around the mid-20th century, then shift to light
    pinks (#fee0d2) and salmon (#fc9272), ending with vivid deep reds (#de2d26, #67000d)
    on the far right (most recent years ~2020s). There are no axes, tick marks, gridlines,
    labels, or visible title. The background is white. The stripes fill the canvas
    width well, with moderate white margins at top and bottom.'
