  strengths:
  - Excellent Bézier curve flow implementation using matplotlib Path system with proper
    CURVE4 control points
  - Thoughtful opacity differentiation (0.55 vs 0.2) between stable and changing flows
  - Strong data storytelling showing opinion polarization trend with Neutral shrinking
    and extremes growing
  - Complete spec compliance with all required features including proportional flows,
    node labels, and chronological arrangement
  - Clean, well-structured code with no unnecessary abstractions
  weaknesses:
  - Node label font sizes (9-11pt) are too small for the output resolution — should
    be 13-14pt minimum
  - Political opinion survey framing violates content policy — should use a neutral
    topic like employee engagement or product satisfaction
  - Legend opacity swatches do not clearly communicate the stable/changed distinction
    at a glance
  - Two blue shades for Strongly Agree and Agree are close in hue, reducing colorblind
    accessibility
  - Legend font size (13pt) is below the recommended 16pt for this output resolution
  image_description: 'The plot displays an alluvial/Sankey-style diagram with 4 quarterly
    waves (Q1 2025–Q4 2025) arranged left to right. Each wave column contains 5 vertically
    stacked rectangular nodes colored by opinion category: Strongly Agree (dark blue
    #306998, bottom), Agree (light blue #5B9BD5), Neutral (gray #95A5A6), Disagree
    (orange #E67E22), and Strongly Disagree (red #C0392B, top). Node heights are proportional
    to respondent counts, with labels showing abbreviated category names and counts
    (e.g., "Str. Agree n=180"). Curved Bézier flows connect categories between consecutive
    waves, with stable flows (same category) at higher opacity (~0.55) and changing
    flows at lower opacity (~0.2). The visualization clearly shows a polarization
    trend: Neutral shrinks from 220 to 140, Strongly Agree grows 180 to 240, and Strongly
    Disagree grows 150 to 200. Nodes have white edges for separation. A legend at
    the bottom distinguishes stable vs changed opinion flows and maps colors to categories.
    Title reads "alluvial-opinion-flow · matplotlib · pyplots.ai" at the top.'
