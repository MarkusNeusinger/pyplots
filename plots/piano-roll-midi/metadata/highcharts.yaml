  image_description: The plot displays a piano roll visualization using Highcharts
    xrange chart. Horizontal bars represent MIDI notes positioned by pitch (y-axis,
    B2 at bottom to C5 at top) and time in beats (x-axis, 0-32). Bar length indicates
    note duration, and color indicates velocity/dynamics using a teal-golden yellow-crimson
    gradient. The title reads "piano-roll-midi · highcharts · pyplots.ai" with a subtitle
    "C – Am – F – G chord progression · 8 measures · velocity-colored dynamics". Alternating
    light gray bands mark black-key pitches (C#, D#, F#, G#, A#). Vertical grid lines
    distinguish beats from measure boundaries (thicker lines every 4 beats). A vertical
    velocity colorbar on the right side shows the gradient from "60 (piano)" (teal)
    through "93 (mezzo)" (gold) to "127 (forte)" (crimson). Bass notes appear as long
    sustained bars in the lower register, with shorter melody notes in the upper register.
    The background is a subtle off-white (#fafafa). Axis spines are removed. The overall
    appearance is clean and professional.
