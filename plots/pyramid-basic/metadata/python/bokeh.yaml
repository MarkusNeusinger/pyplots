review:
  strengths:
  - 'Perfect spec compliance: correct pyramid shape with opposing hbar charts, symmetric
    axis (Range1d -100 to 100), center Span line, absolute-value CustomJSTickFormatter
    on x-axis'
  - 'Correct Okabe-Ito palette: Male = #009E73 (position 1), Female = #D55E00 (position
    2), identical across both renders'
  - 'Fully theme-adaptive chrome: backgrounds, text, grid, legend all flip correctly
    between #FAF8F1 and #1A1A17'
  - All font sizes explicitly set above minimums (title 32pt, labels 24pt, ticks 18pt,
    legend 18pt)
  - 'Excellent Bokeh idioms: ColumnDataSource per series, separate HoverTool per renderer
    with computed ''@value'' field, CustomJSTickFormatter for absolute tick display,
    Span for center line'
  - Realistic, neutral demographic data with plausible population distribution (peak
    30-39, female longevity advantage in 80+)
  - Both HTML and PNG outputs saved correctly per bokeh requirements
  weaknesses:
  - Full box outline retained (p.outline_line_color = INK_SOFT creates a visible border
    on all 4 sides); removing it (p.outline_line_alpha = 0) with only axis lines would
    look more refined
  - Grid lines use dashes ([6,4]) against the style guide recommendation for solid
    lines; also at 10% opacity vs recommended 15-25%
  - Both xgrid and ygrid are active; for a horizontal bar chart, xgrid (vertical value
    lines) is the primary grid — ygrid (horizontal row separators) adds clutter
  - 'No visual hierarchy or data storytelling: the peak age cohorts (30-39) and the
    female longevity advantage (80+ gap) could be visually emphasized through opacity
    contrast, value annotations, or focal coloring'
  - Legend is a small box in the bottom-right corner; increasing legend glyph size
    (legend.glyph_width, legend.glyph_height) would improve readability at full resolution
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 — correct theme surface, not pure white.
      Chrome: Title "pyramid-basic · bokeh · anyplot.ai" in dark ink at top-left, clearly readable. Y-axis label "Age Group" (rotated) and x-axis label "Population (thousands)" both dark, appropriately sized. Tick labels (age groups: 0-9 through 80+, and population values: 100, 50, 0, 50, 100) readable in INK_SOFT. Small legend box in bottom-right corner with "Male" and "Female" labels — readable but quite small relative to canvas.
      Data: Male bars (left side) in #009E73 (Okabe-Ito position 1, green). Female bars (right side) in #D55E00 (Okabe-Ito position 2, orange). Alpha 0.85. Center vertical line (Span) visible as a thin vertical rule at x=0. Pyramid shape clearly formed — widest at 30-39, narrowing toward 80+. Subtle dashed grid lines visible at low opacity.
      Legibility verdict: PASS — all text is readable against the warm off-white background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 — correct dark surface, not pure black.
      Chrome: Title, axis labels, and tick labels all rendered in light-colored text (INK = #F0EFE8, INK_SOFT = #B8B7B0), clearly readable against the dark background. Legend in bottom-right with light labels. No dark-on-dark failure detected.
      Data: Male bars remain #009E73, Female bars remain #D55E00 — identical to light render as required. Pyramid shape and proportions unchanged. Grid lines use INK at 10% alpha, appearing as faint light-colored lines on dark background — barely visible but present.
      Legibility verdict: PASS — all text is readable; no black-on-black or dark-on-dark failure. Both themes render correctly.
