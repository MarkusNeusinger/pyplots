    Light render (plot-light.png):
      Background: Warm off-white (appears to match #FAF8F1)
      Chrome: Title text is dark and readable; axis labels "Country" are dark; tick labels showing country names are readable
      Data: 7×7 heatmap with RdBu_r colorscale (brown=negative, white=neutral, teal=positive). Colorbar present and readable.
