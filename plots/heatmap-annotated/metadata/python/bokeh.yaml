  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface, not pure white.
      Chrome: Title "heatmap-annotated · bokeh · anyplot.ai" rendered in dark ink at top, clearly readable. "Financial Metric" x-axis label (placed above via x_axis_location="above") visible below title. Y-axis label "Financial Metric" on left, readable. Variable name tick labels (Revenue, Profit, Assets, Debt, Growth, ROI, Market Cap, Volume) on both axes — x-axis rotated ~40°, all readable without overlap. Colorbar on right side with "Pearson Correlation" title and numeric tick labels (−1 to 1) — all clearly legible in dark text on light background.
