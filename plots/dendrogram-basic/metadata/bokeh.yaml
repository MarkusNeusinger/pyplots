review:
  strengths:
  - Excellent use of Bokeh HoverTool with merge distance, cluster members, and cluster
    size metadata
  - Clean manual dendrogram construction necessary for Bokeh which lacks built-in
    dendrogram
  - Colorblind-safe teal/gray palette with good contrast
  - Sqrt scaling improves visibility of lower-distance merges
  - Realistic iris dataset with clear species clustering
  - All font sizes explicitly set for 4800x2700 canvas
  weaknesses:
  - Title format prepends descriptive text before the standard spec-id format
  - Between-cluster color (#444444) is subtle against background — needs stronger
    contrast
  - Legend is small and positioned far from data in top-right corner
  - Negative y-range creates unnecessary whitespace below leaf labels
  image_description: The plot displays a hierarchical dendrogram of 15 iris flower
    samples clustered using Ward's method. The x-axis shows sample labels (Setosa-1
    through -5, Versicolor-1 through -5, Virginica-1 through -5) rotated at approximately
    45 degrees. The y-axis shows "Distance (Ward's Method, √ scale)" with sqrt-transformed
    values ranging from -0.5 to ~3.3. U-shaped connectors form the tree structure
    with teal-colored branches for within-cluster merges and dark gray for the top-level
    between-cluster merge. A legend in the top-right corner labels "Within-cluster"
    and "Between-cluster". The title reads "Iris Species Clustering · dendrogram-basic
    · bokeh · pyplots.ai". The Setosa samples cluster together on the left, Versicolor
    in the middle, and Virginica on the right, with Versicolor and Virginica merging
    before joining Setosa at the highest distance level. Grid lines are subtle (y-axis
    only), the outline is removed, and the overall appearance is clean and professional.
