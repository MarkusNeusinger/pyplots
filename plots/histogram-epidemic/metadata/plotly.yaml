    cases line rises on the secondary y-axis (right side), reaching approximately
    4,500 total cases. Two dashed vertical lines mark intervention events: "Lockdown
    imposed" around Feb 4 and "Vaccination campaign" around Mar 30. The data shows
    three distinct waves — a smaller initial peak around Feb 8, a large main peak
    around Mar 18-20 reaching ~83 daily cases, and a smaller resurgence around Apr
    24. The background is a subtle off-white, x-axis labels are angled at -30° with
    biweekly intervals, and the horizontal legend sits at the top-center of the plot
    with a bordered semi-transparent background.'
