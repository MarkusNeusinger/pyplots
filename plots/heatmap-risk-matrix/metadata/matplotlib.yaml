review:
  strengths:
  - Excellent visual hierarchy through marker size scaling by risk score
  - FancyBboxPatch rounded rectangles give a modern polished appearance
  - Path effects on labels ensure readability over any background color
  - Zone boundary dashed lines effectively communicate risk severity thresholds
  - Comprehensive data with 14 well-chosen risk items spanning all zones and categories
  - Dual legend (Category + Risk Level) provides complete visual decoding
  weaknesses:
  - Color gradient starts at light cream/yellow rather than green for lowest-risk
    cells as specified in the spec
  - Minor label crowding where risk labels overlap with semi-transparent score numbers
  image_description: 'The plot displays a 5x5 risk assessment matrix with Likelihood
    (Rare to Almost Certain) on the y-axis and Impact (Negligible to Catastrophic)
    on the x-axis. Each cell is rendered as a rounded rectangle colored from light
    cream/pale yellow (low scores like 1-2) through amber and orange to dark crimson
    (scores 20-25). Risk score numbers appear semi-transparently in each cell background.
    White dashed diagonal lines demarcate zone boundaries (Low, Medium, High, Critical).
    Fourteen risk items are plotted as colored circle markers — dark teal for Technical
    (Data Breach, Server Outage, Cyber Attack, Power Failure), purple for Financial
    (Budget Overrun, Regulatory Change, Vendor Failure, Market Shift, Minor Delay),
    and green for Operational (Supply Chain Disruption, Key Staff Turnover, Scope
    Creep, Deadline Slip, Equipment Wear). Marker sizes scale with risk score, creating
    visual hierarchy. Labels have white stroke outlines for readability over any background
    color. Two legends sit to the right: Category (marker colors) and Risk Level (zone
    color swatches with score ranges). Title reads heatmap-risk-matrix · matplotlib
    · pyplots.ai. All spines are removed and tick marks hidden for a clean modern
    appearance.'
