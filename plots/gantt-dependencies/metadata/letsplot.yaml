  image_description: 'The plot displays a Gantt chart for a software development project
    with four phases: Requirements (blue), Design (gold/yellow), Development (green),
    and Testing (purple). Each phase has a dark navy aggregate bar spanning the full
    duration of its child tasks, with individual task bars colored by phase. Tasks
    are listed vertically with names to the left of bars, and group names to the right
    of group bars. Alternating light blue/white background bands separate phases visually.
    Three types of dependency arrows connect tasks: red for Finish-to-Start, blue
    for Start-to-Start, and green for Finish-to-Finish, each with arrowhead tips.
    The x-axis shows dates from Jan 07 to Mar 17 at 2-week intervals, angled at 45
    degrees. A manually constructed legend in the bottom-right explains the three
    dependency arrow types. The title reads "gantt-dependencies · letsplot · pyplots.ai"
    at the top-left.'
