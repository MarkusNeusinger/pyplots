  image_description: 'The plot displays an Ashby material selection chart as a log-log
    scatter plot of Density (kg/m³) on the x-axis vs Young''s Modulus (GPa) on the
    y-axis. Seven material families are shown with distinct colors and marker styles:
    Metals (dark blue circles, upper-right), Ceramics (red squares, upper-center),
    Composites (teal plus signs, center-upper), Natural Materials (light blue triangles,
    center), Polymers (orange X marks, center-right), Elastomers (purple diamonds,
    lower-right), and Foams (golden diamonds, lower-left). Each family is enclosed
    by a semi-transparent KDE envelope. Bold colored labels with white-background
    rounded boxes identify each family. Three diagonal dashed guide lines show constant
    E/ρ ratios (0.001, 0.1, 10) in light gray. A "Lightweight & Stiff ↗" annotation
    in the upper-left region guides interpretation. Title reads "scatter-ashby-material
    · seaborn · pyplots.ai". Top and right spines are removed. A subtle y-axis-only
    grid is present. The layout is clean and professional with good use of the 16:9
    canvas.'
