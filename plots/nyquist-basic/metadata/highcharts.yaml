review:
  strengths:
  - 'Excellent data choice: classic second-order control system with meaningful frequency
    response'
  - Good use of Highcharts annotations module for frequency labels and critical point
  - Direction arrows via triangle scatter markers are a creative solution
  - Mirror curve with dashed styling provides clear distinction from positive frequencies
  - Subtitle showing transfer function equation provides valuable context
  weaknesses:
  - Unit circle appears elliptical due to 16:9 canvas - spec requires 1:1 aspect ratio
  - Frequency annotation labels crowd near the origin causing visual clutter
  - LineSeries imported from wrong module path (area instead of line)
  image_description: The plot displays a Nyquist diagram on the complex plane with
    axes labeled "Real" (x-axis) and "Imaginary" (y-axis). The title reads "nyquist-basic
    · highcharts · pyplots.ai" with a subtitle showing the transfer function G(s)
    = 2 / [s(s+1)(0.5s+1)]. A solid blue curve traces the positive-frequency response
    (G(jω) — ω > 0), sweeping from the lower-left quadrant up through the origin area.
    A dashed blue curve mirrors it for negative frequencies (ω < 0). A light gray
    dotted unit circle is centered at the origin but appears visibly elliptical (wider
    than tall) due to the 16:9 canvas aspect ratio. A red diamond marks the Critical
    Point (-1, 0) with a red-bordered annotation label. Several blue-bordered frequency
    annotations (ω=0.5, ω=1.1, ω=1.4, ω=5.0) appear along the curve near the center,
    somewhat crowded. Blue triangle markers indicate the direction of increasing frequency.
    A legend in the upper-right lists all five series. The background is white with
    subtle gray gridlines and axis reference lines at x=0 and y=0.
