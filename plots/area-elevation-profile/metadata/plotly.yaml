  image_description: 'The plot displays a terrain elevation profile of the "Bernese
    Oberland Traverse" hiking trail spanning 120 km. The x-axis shows Distance (km)
    from 0 to ~125, and the y-axis shows Elevation (m) from 0 to ~3200. The profile
    line is color-coded by slope steepness: green segments for gentle slopes, amber/yellow
    for moderate, and red for steep. The area beneath the profile is filled with a
    vertical blue gradient that transitions from nearly transparent at the bottom
    to a soft blue at higher elevations, creating a terrain silhouette effect. Seven
    landmarks are annotated with bold text labels and elevation values: Grindelwald
    (1,034 m) at the start, Bachalpsee (2,265 m), Faulhorn (2,681 m) at the highest
    peak, Schynige Platte (2,076 m), Männlichen (1,100 m) at a valley, Kleine Scheidegg
    (2,061 m), and Wengen (1,274 m) at the endpoint. Dotted vertical lines extend
    from each landmark to the x-axis. A slope legend at the bottom-left shows green/amber/red
    squares with labels. A vertical exaggeration note (~20x) appears at the bottom-right.
    The background is clean white with subtle horizontal gridlines on the y-axis only.'
