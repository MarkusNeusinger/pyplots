  image_description: 'The plot displays two sigmoidal dose-response curves on a logarithmic
    x-axis (Concentration in M) vs Response (%). Erlotinib is shown in steel blue
    (#306998) with circle markers, and Lapatinib in coral red (#C75233) with square
    markers. Both compounds have fitted 4PL curves with data points overlaid with
    SEM error bars. A light blue 95% confidence interval band surrounds the Erlotinib
    fit. Dashed horizontal and vertical reference lines in matching colors mark the
    EC50 positions for each compound: Erlotinib EC50 = 299 nM (annotated with an arrow
