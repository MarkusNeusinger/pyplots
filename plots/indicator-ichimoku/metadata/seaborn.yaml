review:
  strengths:
  - Prominent cloud visibility at alpha=0.55 makes the Kumo the clear focal element
  - Spec-compliant green/red coloring with filled vs hollow shape differentiation
    for colorblind accessibility
  - TK crossover annotations and markers create effective data storytelling with clear
    focal points
  - Extensive use of seaborn palette tools (light_palette, dark_palette, blend_palette)
    for cohesive derived color scheme
  - 'Clean visual refinement: despined, subtle y-only grid, custom background, removed
    tick marks'
  - Well-structured linear code with efficient PatchCollection usage and seaborn long-format
    DataFrames
  weaknesses:
  - Legend in lower-left still slightly overlaps some price data
  - Green/red as primary color distinction is not ideal for colorblind users (mitigated
    by filled/hollow shapes)
  - Some candlestick bodies in dense trading areas appear thin
  image_description: The plot displays an Ichimoku Cloud Technical Indicator Chart
    overlaid on candlestick price data spanning from late April through mid-September
    2024. The x-axis shows "Date" with rotated labels (Apr 23 through Sep 17), and
    the y-axis shows "Price ($)" ranging from approximately $150 to $192. Bullish
    candlesticks are filled green rectangles and bearish candlesticks are hollow with
    red edges only, providing both color and shape differentiation for colorblind
    safety. A dark blue Tenkan-sen (9-period) line and an orange Kijun-sen (26-period)
    line overlay the price action. A pink/purple Chikou Span line is plotted shifted
    behind the price. The Kumo (cloud) is prominently filled between Senkou Span A
    and B at alpha=0.55 with green tint for bullish regions and red/pink tint for
    bearish regions. The cloud transitions clearly from bullish to bearish as price
    trends down. Green circle markers indicate bullish TK crossovers and red X markers
    indicate bearish crossovers, with a "Bullish TK Cross" annotation with arrow pointing
    to a key signal. A subtle rug plot on the y-axis shows price density distribution.
    The legend is positioned in the lower-left corner with 7 entries in 2 columns.
    Background is light gray with subtle y-axis-only grid lines. Top and right spines
    are removed.
