  image_description: The plot shows a Mandelbrot set fractal visualization rendered
    with Altair's mark_rect. The characteristic cardioid (main body) and period-2
    bulb are clearly visible as solid black regions in the center of the complex plane.
    The exterior (escaped) points are colored using the plasma colormap, ranging from
    deep dark blue/purple (low iteration counts, far from the boundary) through pink/magenta
    to bright yellow (high iteration counts, near the set boundary). The title "heatmap-mandelbrot
    · altair · pyplots.ai" appears top-left in a large font. The x-axis is labeled
    "Real" ranging from -2.5 to ~0.9, and the y-axis is labeled "Imaginary" ranging
    from ~-1.2 to ~1.2. A vertical gradient legend on the right displays "Escape Iterations"
    from ~5 to 100. Individual rectangular cells are visible at the fractal boundary
    due to the 300x214 grid resolution, creating noticeable pixelation. Smaller satellite
    bulbs along the real axis (near -1.75) and off the main cardioid are discernible.
    The aspect ratio correctly preserves the mathematical proportions of the complex
    plane.
