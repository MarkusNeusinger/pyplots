  image_description: 'The plot displays an MA plot for differential gene expression
    analysis with ~15,000 genes. The x-axis shows "Mean Expression (A)" (range 0-27)
    and the y-axis shows "Log2 Fold Change (M)" (range approximately -5.5 to 5.5).
    The title reads "ma-differential-expression · seaborn · pyplots.ai" in medium-weight
    font. Four gene categories are color-coded: "Not significant" in light gray, "Significant"
    in desaturated light blue, "Up-regulated" in teal/blue, and "Down-regulated" in
    orange — all from the colorblind palette. A solid dark line at y=0 marks no change,
    with dashed pink/purple lines at y=±1 labeled "2-fold up" and "2-fold down" in
    italic. A green LOESS trend curve runs near y=0 showing minimal expression-dependent
    bias. Six gene labels (TP53, MYC, VEGFA, BRCA1, EGFR, IL6) are spread across the
    expression range with arrow connectors and white-background boxes. Top/right spines
    are removed, with a subtle y-axis grid. The legend ("Gene Status") sits in the
    upper right.'
