  weaknesses:
  - Manual construction of reference line dataframes instead of using geom_vline/geom_hline
  - Zone labels could use slightly more refined positioning or sizing
  image_description: 'The plot displays four Operating Characteristic (OC) curves
    comparing acceptance sampling plans. The x-axis shows "Fraction Defective (p)"
    ranging from 0 to 0.20, and the y-axis shows "Probability of Acceptance P(a)"
    from 0 to 1. Three colored background zones divide the chart: a green "Acceptable
    Quality" zone (0 to AQL=0.02), a pale yellow "Indifference Zone" (AQL to LTPD),
    and a pink "Rejectable Quality" zone (LTPD=0.10 to 0.20). Four curves are plotted
    in colorblind-safe colors: dark blue (n=50, c=1), vermillion/orange (n=100, c=2),
    light blue (n=80, c=1), and teal (n=150, c=3). Two red circle markers with white
    stroke highlight risk points on the n=50 c=1 curve: producer''s risk α=0.264 at
    AQL and consumer''s risk β=0.034 at LTPD, with bold red labels. Dotted vertical
    reference lines mark AQL and LTPD, with dashed horizontal lines connecting to
    the y-axis. Bold "AQL" and "LTPD" labels are positioned near the bottom of the
    chart. The title reads "curve-oc · letsplot · pyplots.ai" with an italic subtitle.
    A legend box in the upper right lists all four sampling plans.'
