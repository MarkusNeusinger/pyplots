      Data: viridis colormap from deep purple (low activity) through teal to bright yellow (high activity). Zero/NA days render as off-white background cells, cleanly blending with the panel. Weekend rows (Sat, Sun) visibly darker (lower activity). Spring (Mar–Apr) and fall (Sep–Oct) months show brighter teal/yellow cells indicating higher activity; July–August noticeably darker.
      Legibility verdict: PASS — all text readable, no light-on-light issues.

