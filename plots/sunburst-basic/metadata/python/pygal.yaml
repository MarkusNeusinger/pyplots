      Data: Data colors are identical to the light render — same green, orange, pink, blue segments. Only the background surface flips, Okabe-Ito data colors remain constant.
      Legibility verdict: PASS

    CRITICAL ISSUE (both renders): The chart type is a Treemap (rectangular partition), NOT a sunburst (concentric rings). The spec requires concentric ring visualization where each ring = one hierarchy level. This is a SC-01 failure that caps the score at 40.
