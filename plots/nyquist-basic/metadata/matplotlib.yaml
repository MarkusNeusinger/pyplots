  image_description: The plot displays a Nyquist diagram on the complex plane with
    a solid steel-blue curve (G(jω)) tracing the open-loop frequency response of a
    third-order system from low frequency (starting near Real≈2, Imaginary≈0) sweeping
    down through the lower half-plane and curving back toward the origin. A dashed,
    lighter blue curve (G(−jω)) with reduced alpha (0.35) mirrors it in the upper
    half-plane. A dotted gray unit circle is centered at the origin with an italic
    "unit circle" label. A prominent red "X" marks the critical point at (-1, 0).
    A red "GM ≈ 16.0 dB" annotation indicates the gain margin. Five frequency annotations
    (ω=0.3, ω=1, ω=2, ω=5, ω=10) are placed along the curve with small dot markers
    and offset text. Directional arrows along the solid curve indicate increasing
    frequency. The title reads "nyquist-basic · matplotlib · pyplots.ai". Axes are
    labeled "Real" and "Imaginary". Top and right spines are removed with a subtle
    grid at alpha=0.15. The aspect ratio is equal (1:1), making the unit circle appear
    circular. The legend in the lower left identifies G(jω), G(−jω), and Critical
    point (−1, 0).
