    is drawn as a dark blue line with a clean, flat baseline and subtle noise. Four
    groups of peaks are visible: a tall triplet (three sharp peaks) near 1.18 ppm
    reaching ~0.9 intensity, a quartet (four peaks) near 3.69 ppm reaching ~0.65 intensity,
    a singlet near 2.61 ppm at ~0.35 intensity, and a TMS reference singlet at 0.00
    ppm at ~0.30 intensity. Each peak group has a colored dot marker (teal, blue,
    purple, orange respectively) with text labels showing the functional group and
    ppm value. A legend at the bottom lists all series. Horizontal y-axis guide lines
    are subtle and dashed. The overall appearance is clean and professional.'
