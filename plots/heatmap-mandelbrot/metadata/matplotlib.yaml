review:
  strengths:
  - Excellent smooth coloring implementation avoids discrete banding artifacts
  - PowerNorm (gamma=0.4) is a sophisticated choice that emphasizes the mathematically
    interesting boundary region
  - Subtle contour overlay adds depth and visual hierarchy without cluttering the
    fractal
  - Dark theme with inferno colormap creates a dramatic, visually striking presentation
  - All font sizes explicitly set with good readability at target resolution
  - Fully deterministic, efficient vectorized computation with boolean masking
  weaknesses:
  - 'Minor: axis labels are slightly redundant (Real Part + Re(c) says the same thing
    twice)'
  - DE-01 could be elevated further with a custom colormap or more refined typography
    choices
  image_description: The plot displays the Mandelbrot set fractal on a black background
    using the inferno colormap. The characteristic cardioid (main body) and period-2
    bulb are rendered in solid black, representing points that never escape. Surrounding
    regions show escape iteration counts via a smooth color gradient transitioning
    from deep purple (low iterations, quick escape) through red/orange to bright yellow
    (high iterations, slow escape near the boundary). Axes are labeled "Real Part
    Re(c)" (x-axis, -2.5 to 1.0) and "Imaginary Part Im(c)" (y-axis, -1.25 to 1.25)
    in white text with mathematical notation. The title reads "heatmap-mandelbrot
    · matplotlib · pyplots.ai" in white. A colorbar on the right shows "Escape Iterations"
    ranging from approximately 25 to 175. Very subtle white contour lines trace escape
    boundaries at selected iteration levels. All spines are removed. The fractal boundary
    detail is excellent with smooth coloring (no banding), and smaller satellite bulbs
    and filaments are clearly visible.
