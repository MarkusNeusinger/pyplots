  - Missing optional secondary x-axis showing spectral class letters
  image_description: 'The plot displays a Hertzsprung-Russell diagram on a dark background
    (#0D1117). Stars are shown as small circular markers with dark outlines (shape
    21), colored by spectral type: blue/violet for O and B types in the upper-left
    (hot, luminous), light blue-white for A types along the mid-main-sequence, pale
    yellow for F and G types in the center, orange for K types, and red for M types
    in the lower-right (cool, dim). The main sequence runs as a clear diagonal band
    from upper-left to lower-right. Red Giants cluster in the upper-right (cool but
    bright), Supergiants are scattered across the top, and White Dwarfs appear at
    the bottom-center (hot but dim). The Sun is marked as a prominent gold dot near
    the center of the main sequence at ~5778K, 1 L☉, with a bold gold "Sun" label.
    Region labels ("Main Sequence", "Red Giants", "Supergiants", "White Dwarfs") appear
    in muted blue-gray italic-bold text. The x-axis is reversed (40,000K on left to
    3,000K on right) labeled "Surface Temperature (K)", and the y-axis uses a log
    scale labeled "Luminosity (L☉)". A legend box on the right shows spectral types
    O through M. Title reads "scatter-hr-diagram · letsplot · pyplots.ai".'
