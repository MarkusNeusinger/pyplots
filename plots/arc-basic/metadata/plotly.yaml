  image_description: 'The plot displays a basic arc diagram with 10 character nodes
    (Alice, Bob, Carol, David, Eve, Frank, Grace, Henry, Iris, Jack) arranged along
    a subtle gray horizontal baseline near the bottom of the canvas. Parabolic arcs
    connect pairs of nodes above the line, with arc height proportional to the distance
    between connected nodes. Three weight levels are distinguished through a graduated
    blue color scheme: dark navy blue with high opacity (0.90) and thick width (5.0)
    for Strong (3) connections, medium blue with moderate opacity (0.65) and width
    (3.5) for Medium (2), and light pale blue with lower opacity (0.50) and width
    (3.0) for Weak (1). Yellow circular node markers (size 26) with dark blue outlines
    sit on the baseline. An annotation arrow points to the tallest arc (Alice–Iris)
    labeled "longest range" in 20pt font. A legend titled "Connection Strength" in
    the upper right classifies the three weight levels. Interactive filter buttons
    (All, Strong, Medium, Weak) appear in the upper left via Plotly updatemenus. The
    title "arc-basic · plotly · pyplots.ai" is centered at the top with a subtitle
    "Character interactions in a story narrative." Clean white background with no
    grid lines or axis elements.'
