review:
  strengths:
  - 'Excellent spec compliance: all requirements met perfectly including lag 0 in
    ACF, PACF starting at lag 1, confidence bounds, and stem lines'
  - Very clean, idiomatic plotnine code leveraging facet_wrap for the dual-panel layout
  - Realistic seasonal temperature data creates visually compelling periodic ACF patterns
  - All font sizes explicitly set to appropriate values for 4800x2700 output
  weaknesses:
  - No visual distinction between significant and non-significant lags
  - PACF panel appears vertically compressed compared to ACF due to different data
    ranges
  - Design could be elevated with more intentional typography and spacing refinements
  image_description: The plot displays two vertically stacked panels on a white background
    with the title "acf-pacf · plotnine · pyplots.ai" at the top. The top panel is
    labeled "ACF" in bold and shows 37 vertical stem lines (lags 0-36) in Python Blue
    (#306998) extending from a gray zero baseline, with circular markers at the tips.
    A clear periodic/seasonal pattern is visible with spikes at lags 0, 1, 6, 12,
    18, 24, 30, and 36, and troughs between them. Two red dashed horizontal lines
    mark the 95% confidence bounds near ±0.13. The bottom panel labeled "PACF" in
    bold shows stems from lag 1-36, with a large positive spike at lag 1 (~0.6), a
    strong negative spike at lag 2 (~-0.7), and significant spikes around lags 5-7,
    with most remaining lags falling within the confidence bounds. The x-axis is labeled
    "Lag" with ticks at 0, 6, 12, 18, 24, 30, 36. The shared y-axis is labeled "Correlation".
    Subtle horizontal gridlines appear on the y-axis only. The overall layout is clean
    and minimalist.
