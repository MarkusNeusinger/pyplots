review:
  strengths:
  - 'Fully theme-adaptive chrome: INK/INK_SOFT tokens applied to all text elements,
    backgrounds use PAGE_BG/ELEVATED_BG — both renders are fully readable'
  - viridis colormap is the correct choice for continuous calendar data; na_value=PAGE_BG
    elegantly blends zero-activity days with the background
  - All font sizes explicitly set above the required minimums (title 26pt, axis text
    18pt, legend 16pt)
  - Data shows realistic GitHub-style contribution patterns with visible weekend/weekday
    and seasonal variation
  - Grid fully removed (panel_grid_major/minor = element_blank()), keeping focus on
    the data cells
  - pd.Categorical with reversed order correctly controls Mon–Sun top-to-bottom display
    in plotnine
  - Reproducible with np.random.seed(42); clean KISS structure throughout
  weaknesses:
  - 'Title format does not follow the required spec: expected ''heatmap-calendar ·
    plotnine · anyplot.ai'' but got ''Daily Activity 2024 · heatmap-calendar · plotnine
    · anyplot.ai'' — extra descriptive prefix breaks the convention'
  - Month labels are shown at the bottom (x-axis) rather than at the top of the grid
    as specified in the spec ('along the top or as section headers')
  - 'Design Excellence is mid-range (12/20): styling is clean but generic — removing
    the legend box border, adding a thin hairline separator between weekdays/weekends,
    or using a Reds/Blues heatmap instead of generic viridis would lift the aesthetic'
  - Calendar cells have a tall/narrow aspect ratio (7 rows × 53 columns in 16:9) —
    a 12:5 or square canvas would give cells a more balanced shape typical of GitHub
    contribution graphs
  - 'VQ-03: tile height-to-width ratio makes cells look stretched vertically; a wider
    figure_size or adjusted aspect would improve cell shape'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) — PASS, not pure white
