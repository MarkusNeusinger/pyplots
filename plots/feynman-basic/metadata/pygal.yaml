  image_description: The plot displays a Feynman diagram for electron-positron annihilation
    (e⁻e⁺ → γ → μ⁻μ⁺) on a white 3600×3600 square canvas. Two dark blue lines representing
    the electron (e⁻) and positron (e⁺) converge from the upper-left and lower-left
    corners toward a black vertex dot positioned in the center-left of the canvas.
    A red sinusoidal wavy line (virtual photon propagator) connects the left vertex
    to the right vertex horizontally across the middle. Two green lines representing
    the muon (μ⁻) and antimuon (μ⁺) diverge from the right vertex toward the upper-right
    and lower-right corners. Two prominent black dots mark the interaction vertices.
    The title reads "e⁻e⁺ → γ → μ⁻μ⁺ Annihilation · feynman-basic · pygal · pyplots.ai"
    at the top. A legend at the bottom identifies all six series in three columns.
    No axes or gridlines are shown, which is appropriate for a diagram. The overall
    layout is clean and symmetric.
