  - RH curve labels at higher percentages cluster in the upper-right area
  - Grid could be more subtle for a cleaner engineering diagram aesthetic
  image_description: The plot displays a psychrometric chart on a light gray-blue
    background. The x-axis shows "Dry-Bulb Temperature (°C)" ranging from -10 to 50,
    and the y-axis shows "Humidity Ratio (g/kg)" from 0 to 30. Blue curves represent
    relative humidity lines from 10% to 100%, with the 100% saturation curve drawn
    thicker and darker. Orange dashed diagonal lines show wet-bulb temperatures (0°C
    to 35°C wb). Magenta/rose dotted diagonal lines show enthalpy values (10 to 80+
    kJ/kg). Green dash-dot lines show specific volume (0.78 to 0.92 m³/kg). A light
    blue shaded band marks the "Comfort Zone" (~20-26°C, 30-60% RH). A bold red process
    path with arrowhead connects "Outdoor Air (35°C, 60% RH)" to "Supply Air (15°C,
    90% RH)" representing cooling and dehumidification, with a Δh energy annotation.
    Title reads "psychrometric-basic · bokeh · pyplots.ai" with subtitle "Standard
    Atmosphere (101.325 kPa) · ASHRAE Psychrometric Properties".
