  image_description: 'The plot displays three U.S. Treasury yield curves on a clean
    off-white background. The x-axis shows "Maturity" from 1M to 30Y on a log scale
    with proper tick labels. The y-axis shows "Yield (%)" from 0% to ~6.5% with percentage
    suffixes and subtle dotted gridlines. Three curves are plotted: Jan 2022 (Normal)
    in dark steel blue with circle markers showing a classic upward slope from ~0.08%
    to ~2.27%; Jun 2023 (Flat) in teal/cyan with diamond markers ranging ~3.84-5.47%;
    Oct 2023 (Inverted) in olive-green with square markers ranging ~4.62-5.56%. All
    lines use spline interpolation and have white-bordered markers. A subtle yellow-green
    shaded horizontal band highlights the inversion zone, with an annotated callout
    "Inversion Zone - Short-term yields exceed long-term yields" with an arrow. A
    "+264 bps at 10Y" annotation sits between the inverted and normal curves near
    the 10Y mark. The legend is positioned top-left with a semi-transparent white
    background. The title "U.S. Treasury Yield Curves" appears at top center with
    subtitle "line-yield-curve · plotly · pyplots.ai" in gray.'
