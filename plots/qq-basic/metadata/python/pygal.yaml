  - Interactive HTML output alongside PNG
  weaknesses:
  - Axis label font size (label_font_size=18px) is below the recommended 22px for
    pixel-based libraries at 4800x2700
  - Tick label font size (major_label_font_size=16px) is below the recommended 18px
  - Design is a well-configured default with no aesthetic sophistication — no annotation
    of the deviation pattern, no visual hierarchy
  - Grid (both X and Y guides) is quite prominent; pygal has limited grid opacity
    control but legend_at_bottom improves layout slightly
  - Data is labeled generically as Sample Data with no real-world context — a domain
    name (e.g., manufacturing measurements, biological test results) would lift DQ-02
  - 'No visual storytelling: the right-skew deviation is visible but not emphasized
    or annotated'
