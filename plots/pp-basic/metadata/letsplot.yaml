    to (1,1). A blue semi-transparent ribbon represents the 95% Kolmogorov confidence
    band around the diagonal. 200 data points are scattered along the diagonal, colored
    by a diverging blue-to-red gradient representing deviation from perfect fit —
    blue for positive deviations (empirical > theoretical), salmon/red for negative
