  image_description: 'The plot displays a chromagram heatmap using the inferno colormap
    on a light gray background. The y-axis shows all 12 pitch classes (C through B)
    with bold labels, and the x-axis shows time in seconds from 0 to 9. A vertical
    colorbar on the right indicates the Energy scale from 0 to 1. Four distinct chord
    segments are clearly visible: C major (C, E, G lit up approximately 0-2.5s), G
    major (G, B, D lit up approximately 2.5-5s), A minor (A, C, E lit up approximately
    5-7.5s), and F major (F, A, C lit up approximately 7.5-10s). Smooth transitions
    between chords are visible at segment boundaries. The title reads "heatmap-chromagram
    · letsplot · pyplots.ai" in bold dark text at the top.'
