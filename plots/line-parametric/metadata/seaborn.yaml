review:
  strengths:
  - Full spec compliance with all required features (equal aspect, color gradients,
    two curves, start/end markers)
  - Excellent text legibility with all font sizes explicitly set
  - Good use of two distinct colormaps (viridis/plasma) to differentiate curves
  - Clean visual presentation with subtle grid and removed spines
  - Deterministic, mathematically correct data
  weaknesses:
  - Library mastery is low — core visualization relies on matplotlib LineCollection
    rather than seaborn plotting functions
  - Helper function make_segments breaks KISS principle
  - Marker creation loop is verbose (iterrows over DataFrame for 2 points per panel)
  image_description: The plot displays two side-by-side panels on a white background
    with the suptitle "line-parametric · seaborn · pyplots.ai" at the top. The left
    panel shows a Lissajous figure (x = sin(3t), y = sin(2t)) with a viridis color
    gradient mapping parameter t from 0 to ~6.3 radians, forming a self-intersecting
    figure-eight-like closed curve. The right panel shows an Archimedean spiral (x
    = t·cos(t), y = t·sin(t)) with a plasma color gradient mapping t from 0 to ~12.6
    radians, expanding outward from the center. Both panels have equal aspect ratios,
    blue circle start markers and red square end markers, colorbars labeled "Parameter
    t (radians)", descriptive axis labels, and legends in the lower right. Top and
    right spines are removed, and grid lines are subtle (alpha=0.15).
