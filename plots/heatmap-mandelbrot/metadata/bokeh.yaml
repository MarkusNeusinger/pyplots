review:
  strengths:
  - Custom 29-color palette creates a visually striking deep blue to cyan to yellow/orange
    gradient that enhances fractal boundary detail
  - Smooth coloring via log2 normalization eliminates discrete banding, revealing
    continuous fractal structure
  - Full Mandelbrot set clearly rendered with cardioid, period-2 bulb, satellite bulbs,
    and fine boundary detail
  - Perfect data quality with deterministic mathematical computation, appropriate
    ranges, and resolution above spec minimums
  - Clean well-structured code with efficient vectorized numpy computation and dual
    output (PNG + HTML)
  weaknesses:
  - Custom palette is not a validated perceptually uniform colormap as spec requests
    — should use Bokeh built-in Viridis, Inferno, or Plasma palette
  - Axis labels Real Axis / Imaginary Axis are generic — more precise mathematical
    notation (Re(c), Im(c)) would improve clarity
  - Color bar title Escape Iterations is slightly cramped on the right edge
  - Visual storytelling relies mostly on the data inherent structure rather than deliberate
    design emphasis
  image_description: The plot shows the Mandelbrot set fractal rendered as a heatmap
    on the complex plane. The x-axis ("Real Axis") spans from -2.5 to 1.0, and the
    y-axis ("Imaginary Axis") spans from approximately -1.0 to 1.0. The characteristic
    main cardioid dominates the center-right, with the period-2 bulb clearly attached
    to its left. Smaller bulbs and intricate fractal boundary structures are visible
    throughout. Points inside the set are rendered in solid black. The exterior uses
    a custom gradient palette transitioning from deep navy blue (low escape iterations)
    through bright cyan and green to yellow and orange (high escape iterations), creating
    a striking visual effect. A vertical color bar on the right side shows "Escape
    Iterations" scaling from approximately 20 to 180+. The title "heatmap-mandelbrot
    · bokeh · pyplots.ai" appears in the top-left corner. The plot background is black,
    and the surrounding border is white. Grid lines are absent, creating a clean presentation.
    The overall aspect ratio preserves the mathematical proportions of the complex
    plane.
