review:
  strengths:
  - 'Correct Okabe-Ito palette (#009E73 first, #D55E00 second) with full theme-adaptive
    chrome across both renders'
  - Interactive click-to-highlight selection using alt.selection_point — a distinctly
    Altair feature that enriches the radar comparison
  - 'Complete and well-labeled specification compliance: all six axes, closed polygons,
    ring labels, outer category labels, legend'
  - Both HTML and PNG output saved correctly per altair library rules
  - Realistic, neutral employee performance data with clearly contrasting strength
    profiles
  weaknesses:
  - 'Fill/outline coordinate mismatch: mark_geoshape with project(type=''identity'',
    reflectY=True) auto-fits the polygon bounding box to the viewport, while mark_line
    uses a quantitative scale with domain=[-1.45, 1.45]. This causes the GeoJSON fills
    to render significantly larger than the actual data outlines. Fix: replace mark_geoshape
    fills with mark_line using filled=True on the same df_series_line data and same
    quantitative scale.'
  - 'Font sizes below minimum: category axis labels at fontSize=20 (spec min 22px)
    and ring labels at fontSize=15 (spec min 18px). Increase to >=22px and >=18px
    respectively.'
  - Fill opacity at 18% (fillOpacity=0.18) below spec recommendation of ~25%. Raise
    to 0.25.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white
      Chrome: Title "radar-basic · altair · anyplot.ai" in bold dark text — readable. Category axis labels (Communication, Technical Skills, Teamwork, Problem Solving, Leadership, Creativity) in dark text at fontSize=20 — readable. Ring labels (20, 40, 60, 80, 100) at fontSize=15 — small but visible. Legend with "Employee" title in dark text, Alice/Bob labels in secondary ink — readable.
      Data: Alice polygon in #009E73 (Okabe-Ito 1), Bob polygon in #D55E00 (Okabe-Ito 2). Semi-transparent fills present but coordinate-mismatched (GeoJSON identity projection vs. quantitative scale) — fills appear ~30-40% oversized relative to outline polygons. Six hexagonal grid rings at correct intervals. Vertex points visible at size=350.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black
      Chrome: Title and category labels rendered in light text (#F0EFE8 / INK token) — clearly readable against dark surface. Ring labels use INK_MUTED (#A8A79F) — visible. Legend box uses ELEVATED_BG (#242420) with light text — readable. No dark-on-dark failures detected.
      Data: Colors identical to light render — Alice #009E73, Bob #D55E00. #009E73 green remains clearly visible on dark background. Same fill misalignment present. Grid rings at INK_SOFT (#B8B7B0) 30% opacity — subtle but visible.
      Legibility verdict: PASS
