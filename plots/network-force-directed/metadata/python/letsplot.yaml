review:
  strengths:
  - Custom Fruchterman-Reingold force-directed algorithm implemented from scratch
    — no networkx dependency, pure numpy
  - 'Dual weight encoding: edge weight mapped to both thickness AND alpha simultaneously,
    creating sophisticated visual depth'
  - 'Full theme-adaptive chrome: all tokens (PAGE_BG, ELEVATED_BG, INK, INK_SOFT)
    threaded through correctly — both renders pass legibility checks'
  - Node degree encoded as size with continuous scaling (9 + degree × 1.8), making
    hub nodes immediately identifiable
  - Interactive layer_tooltips showing Team and Connections count — leverages lets-plot's
    distinct interactive strength over static libraries
  - 'Perfect spec compliance: 50 nodes, 3 communities, intra- and inter-community
    bridge edges, degree-scaled nodes, weight-encoded edges'
  - 'Correct Okabe-Ito order: Engineering=#009E73, Marketing=#D55E00, Sales=#0072B2'
  - HTML output generated alongside PNG — appropriate for an interactive library
  weaknesses:
  - 'Canvas utilization: 16:9 landscape canvas with coord_fixed(1) and normalized
    [0,1] coordinates leaves substantial empty space on the left/upper-left — a square
    ggsize(1600,1600) or ggsize(900,900) would fill the canvas more naturally for
    a network graph'
  - 'No visual storytelling emphasis: hub nodes (highest degree) and bridge nodes
    connecting communities deserve extra visual prominence — e.g. a stroke/outline
    highlight or a separate size tier for the top-5 hubs'
  - 'DE-03 storytelling gap: the three community clusters are visible but the narrative
    could be sharpened with a caption or subtitle, or by annotating the two largest
    hub nodes with their names/degree'
  - Title font size at 24pt is the minimum recommended; bumping to 28-30pt would improve
    presence on the large canvas
  image_description: |-
