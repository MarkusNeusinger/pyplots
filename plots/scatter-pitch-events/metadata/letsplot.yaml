  strengths:
  - Excellent pitch rendering with all required FIFA markings including corner arcs
    and penalty arcs
  - Strong data storytelling through zone highlights, enlarged shot markers, and directional
    arrows
  - Custom legend and outcome key are clean and informative
  - Colorblind-safe palette with good contrast against green pitch
  - Perfect spec compliance with all required features implemented
  weaknesses:
  - Alpha difference between successful (0.92) and unsuccessful (0.85) events is negligible
    — fill color carries the distinction but alpha provides no additional signal
  - Zone highlight overlays are extremely subtle (alpha 0.06-0.08), barely perceptible
  - Some marker congestion in the attacking penalty area where shots cluster
  image_description: 'The plot displays a soccer pitch rendered on a green background
    with white standard FIFA markings including penalty areas, goal areas, center
    circle, halfway line, corner arcs, and goal posts. 100 match events are plotted
    using distinct markers: yellow/gold circles for passes, red diamonds for shots,
    orange triangles for tackles, and purple squares for interceptions. Directional
    arrows in matching colors show pass and shot trajectories — passes distributed
    across the pitch with a forward bias, shots originating from the attacking half
    aimed at goal. Outcome encoding uses colored fill for successful events and white
    fill for unsuccessful ones. Subtle zone highlights mark the Attacking Third and
    Defensive Third with faint italic labels. A custom legend below the pitch shows
    all four event types with their marker shapes, plus an outcome key. The title
    reads "scatter-pitch-events · letsplot · pyplots.ai" with a descriptive subtitle,
    all on a warm cream background.'
