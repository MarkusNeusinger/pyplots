review:
  strengths:
  - Color gradient along curves effectively shows direction of parameter t
  - Two well-chosen parametric curves (Lissajous + Archimedean spiral) demonstrating
    different behaviors
  - Thoughtful start/end markers with data labels
  - Custom gradient palettes with smooth color transitions
  - Good subtitle explaining the mathematical equations
  weaknesses:
  - Data labels overlap near the origin (Lissajous t=0,2π and Spiral start)
  - Helper functions violate KISS structure
  - Uses ScatterSeries instead of LineSeries (less idiomatic)
  - 60+ series objects for gradient is heavy
  - Line width too thin for 3600px canvas
  image_description: 'The plot displays two parametric curves on a square canvas (~3600x3600px)
    with a light gray (#fafafa) background. The Lissajous figure (sin(3t), sin(2t))
    traces a three-lobed, self-intersecting closed curve with a color gradient transitioning
    from blue through cyan, green, to yellow-olive. The Archimedean spiral (t·cos(t),
    t·sin(t)) spirals outward from the origin with a color gradient from purple through
    magenta, pink, to orange-red. The title reads "line-parametric · highcharts ·
    pyplots.ai" in bold at the top with a subtitle describing both equations. Axes
    are labeled "x(t) — horizontal position" and "y(t) — vertical position" with subtle
    dotted grid lines. Near the origin, two markers labeled "Lissajous t=0,2π" and
    "Spiral start" overlap each other. A "Spiral end" diamond marker appears at the
    outer edge of the spiral. The bottom legend lists four entries: Lissajous, Spiral,
    Lissajous t=0,2π, and Spiral end.'
