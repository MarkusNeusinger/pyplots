review:
  strengths:
  - Excellent spec compliance with all required features present and correct
  - Strong design polish with custom gradient, themed typography hierarchy, and clean
    theme_void base
  - Idiomatic plotnine code using grammar-of-graphics layering effectively
  - Perfect code quality with clean, deterministic, well-structured implementation
  - Start/end markers with distinct shapes and colors effectively convey traversal
    direction
  weaknesses:
  - Shared color scale across facets causes Lissajous to use only the cool half of
    the gradient — normalizing t to [0,1] per curve would give both panels the full
    color spectrum
  - Tick label font size (15pt) slightly below the 16pt guideline
  - Some wasted canvas space around panel edges and between facets
  image_description: The plot displays two faceted panels side by side on a white
    background. The left panel shows a Lissajous figure (x = sin(3t), y = sin(2t))
    — a self-intersecting figure-eight-like curve with lobes extending to ±1 on both
    axes. The right panel shows a spiral (x = t·cos(t), y = t·sin(t)) that expands
    outward from the center. Both curves are colored with a gradient mapped to the
    parameter t, transitioning from dark navy blue (t=0) through cyan, light yellow,
    to pink/red (t≈12.6). Start points are marked with blue circles and end points
    with pink diamonds. The title reads "line-parametric · plotnine · pyplots.ai"
    in bold dark text. Axis labels read "Horizontal Position x(t)" and "Vertical Position
    y(t)". A "Direction" legend shows Start (circle) and End (diamond), and a "Parameter
    t" colorbar runs from 0 to 12.5. The background is clean white with subtle dashed
    grid lines. Equal aspect ratio is maintained via coord_equal.
