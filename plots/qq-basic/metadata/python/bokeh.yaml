review:
  strengths:
  - 'Perfect visual quality: all text sizes explicitly set above minimum, both themes
    render cleanly with no legibility failures'
  - 'Intentional data design: deliberate heavy-tail outliers illustrate the key teaching
    point of Q-Q plots (tail deviation from reference line)'
  - 'Full Bokeh interactivity: HoverTool exposes raw height values alongside theoretical
    and sample quantiles; HTML output retains interactivity'
  - ColumnDataSource usage enables efficient multi-column hover binding
  weaknesses:
  - 'No spine or outline-box removal: the four-sided plot frame looks heavier than
    needed for a clean scatter; removing top/right axis lines (or setting outline_line_color=None)
    would add polish'
  - 'No visual storytelling for outliers: the data tells an interesting heavy-tail
    story but the viewer must find it unaided — a shaded band around the reference
    line or a subtle annotation marking the outlier clusters would lift DE-03'
  - 'Design sophistication is above default but not exceptional: the scatter relies
    on default Bokeh circle markers; an intentional secondary visual element (e.g.,
    confidence band or subtle fill around the reference line) would raise DE-01'
