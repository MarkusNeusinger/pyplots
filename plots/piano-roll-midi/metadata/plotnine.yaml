review:
  strengths:
  - Excellent musical data choice with a real chord progression (I-IV-V-I) that tells
    a harmonic story
  - Cohesive purple-toned design with alternating key shading creates an authentic
    DAW-like appearance
  - Strong spec compliance with all required features including black/white key distinction,
    beat/measure grid, note names, and velocity color mapping
  - Good use of chord progression labels at the top to provide musical context
  - Clean well-structured code with appropriate use of plotnine grammar of graphics
  weaknesses:
  - Y-axis label crowding for adjacent semitones (B3/C4, E4/F4)
  - Large vertical gaps in pitch range between G2 and C3 waste vertical space
  - Color gradient mid-range purple tones may be hard to distinguish for colorblind
    viewers
  - Axis labels lack units
  image_description: 'The plot displays a MIDI piano roll visualization on a 16:9
    canvas with a light purple-white color scheme. The title "piano-roll-midi · plotnine
    · pyplots.ai" appears in bold dark purple at the top. The y-axis shows pitch names
    (G2 through C5) with alternating light purple (black key) and very light lavender
    (white key) background rows. The x-axis shows beats from 0 to 16. Four measures
    are labeled at the top in italic: "I (C)", "IV (F)", "V (G)", "I (C)". Horizontal
    rectangles represent notes, colored on a blue-to-red gradient based on velocity
    (60-120 range shown in the right-side colorbar). The loudest notes (C5 climax
    around beat 6, long C4 resolution in measure 4) appear in bright red/orange. Softer
    notes appear in blue/purple. Beat divisions are shown as subtle dotted vertical
    lines, with solid lines at measure boundaries. Dashed horizontal lines mark octave
    boundaries at C notes.'
