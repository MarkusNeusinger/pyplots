    0 in pale peach. At depth 1, "request_handler" (420 samples) and smaller "gc_collect",
    "logger" bars appear in light peach-orange. Deeper levels show progressively warmer
    orange-to-red colors: "process_request", "parse_headers", "route_dispatch", "mark_sweep"
