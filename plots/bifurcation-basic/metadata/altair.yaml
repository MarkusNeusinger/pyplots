  image_description: 'The plot displays a bifurcation diagram of the logistic map
    with "Growth Rate (r)" on the x-axis (2.5–4.0) and "Steady-State Population (x)"
    on the y-axis (0.0–1.0). Three color-coded regimes are clearly visible: blue ("Stable")
    showing a single fixed-point line for r < 3.0, gold/amber ("Period-doubling")
    displaying the period-2 and period-4/8 branches for 3.0 < r < ~3.57, and red ("Chaotic")
