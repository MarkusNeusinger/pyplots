    Node rectangles have lighter-colored edge separators (linewidth 2.5). A supplementary
    sidebar on the right shows "Net Shift Q1 → Q4" as horizontal bars via sns.barplot():
    +90 (Strongly Agree), -50 (Agree), -140 (Neutral), +20 (Disagree), +80 (Strongly
