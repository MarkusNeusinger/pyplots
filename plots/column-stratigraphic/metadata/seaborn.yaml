  image_description: 'The plot shows a vertical stratigraphic column spanning 0–180m
    depth (increasing downward). A two-panel layout is used: the left panel displays
    geological age labels (Late Cretaceous, Late Jurassic, Middle Jurassic, Late Triassic,
    Early Permian) in bold italic text with vertical bracket lines and subtle pastel
    background bands at ~10% opacity. The right panel contains the stratigraphic column
    built from 10 stacked rectangular blocks with distinct hatching patterns and desaturated
    colorblind-palette colors: blue dots for sandstone, orange dashes for shale, teal
    plus signs for limestone, pink-orange diagonal lines for siltstone, purple circles
    for conglomerate, and brown x-patterns for dolomite. Formation names (Dakota Fm,
    Graneros Sh, Greenhorn Ls, Carlile Sh, Niobrara Fm, Fort Hays Ls, Morrison Fm,
    Entrada Ss, Chinle Fm, Kaibab Fm) are labeled to the right of each layer in 16pt
    text. Three red wavy unconformity lines mark major geological boundaries at ~100m
    (Cretaceous–Jurassic), ~140m (Jurassic–Triassic), and ~162m (Triassic–Permian)
    with italic red labels. A lithology legend with pattern swatches sits in the upper
    right. Title reads "column-stratigraphic · seaborn · pyplots.ai" at 24pt.'
