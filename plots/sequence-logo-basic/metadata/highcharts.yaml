review:
  strengths:
  - Creative approach to sequence logo using Highcharts stacked columns with CSS-scaled
    letter glyphs
  - Excellent biologically realistic data — real ETS-family TF binding site with proper
    GGAATT consensus
  - Clean well-structured code with proper information content calculation
  - Good use of Highcharts-specific features (HTML data labels, CallbackFunction,
    per-point styling)
  - Effective visual hierarchy showing conservation pattern clearly
  - Thoughtful design with subtle grid, styled subtitle, and appropriate typography
  weaknesses:
  - T letters at positions 6-7 appear visually distorted due to CSS scaleY stretching
  - Minor nucleotides render as thin colored strips rather than readable letter glyphs
  - Green/red color combination for A/T not ideal for colorblind accessibility
  image_description: The plot displays a stacked column chart representing a DNA sequence
    logo for an ETS-family transcription factor binding site across 10 positions.
    The x-axis shows "Position" (1-10) and the y-axis shows "Information content (bits)"
    (0-2). Positions 2-7 display tall stacks representing the conserved GGAATT core
    motif — G (orange) dominates positions 2-3, A (green) dominates positions 4-5,
    and T (red) dominates positions 6-7. Positions 1, 8, and 10 have low information
    content with small bars, while position 9 is essentially empty (uniform distribution).
    Letters are rendered as CSS-scaled glyphs inside colored bars with white text
    and shadow. The background is light grey (#fafafa) with dashed subtle gridlines.
    Title reads "sequence-logo-basic · highcharts · pyplots.ai" with a subtitle identifying
    the ETS-family motif. Minor nucleotides appear as thin colored strips at the tops
    of stacks.
