    visual distance
  - Output image dimensions do not precisely match recommended 4800x2700 format
  image_description: 'The plot displays four horizontal bullet charts stacked vertically
    for Revenue, Customer Satisfaction, Efficiency, and Quality Score. Each metric
    shows three grayscale qualitative range bands (Poor in lightest gray, Satisfactory
    in medium gray, Good in darkest gray) spanning the full width. Overlaid are narrower
    colored bars representing actual values: blue (#306998) for On Track metrics (Customer
