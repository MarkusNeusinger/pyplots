      Legibility verdict: FAIL - annotation text is unreadable in pale cells

    Dark render (plot-dark.png):
      Background: Dark (appears to be dark gray/near-black)
      Chrome: Title text appears light-colored; tick labels appear light-colored
      Data: Same RdBu_r colorscale (data colors correctly identical to light render)
      Annotations: **THEME ADAPTATION FAILURE** - Light-colored text on pale blue cells is barely distinguishable. More critically, the plot does NOT use theme-adaptive colors — it appears to be stuck in light theme rendering (plotly_white template). Background, gridlines, and overall chrome are not theme-responsive.
      Legibility verdict: FAIL - annotation text is unreadable in pale cells; entire plot fails to adapt to dark theme
