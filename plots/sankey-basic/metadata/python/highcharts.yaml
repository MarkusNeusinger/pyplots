review:
  strengths:
  - 'Correct Okabe-Ito palette applied at node level with Coal as #009E73 brand green
    first'
  - linkColorMode:"from" creates a visually coherent source-tracing effect unique
    to Highcharts Sankey
  - Both renders pass theme checks — backgrounds, title/subtitle colors all correctly
    adaptive
  - Realistic U.S. energy flow data with multi-level transformation (sources -> electricity
    -> end use)
  - Node padding and link opacity thoughtfully tuned for readability of crossing flows
  - All chrome stripped (credits, legend) appropriate for Sankey
  weaknesses:
  - 'Node label color hardcoded to #FFFFFF rather than adapting to INK token (textOutline
    compensates, but not fully theme-adaptive)'
  - No storytelling emphasis on the dominant flow (Petroleum -> Transportation at
    280 TWh) — a size annotation or highlighted node would elevate DE-03
  - 'LM-01 slightly below full idiom: series defined as raw dict rather than typed
    Highcharts series objects'
