  image_description: 'The plot displays a root locus diagram for the transfer function
    G(s) = (s+2)/[s(s+1)(s+3)(s+5)]. Four locus branches are drawn in distinct colors:
    dark blue (heading left along the real axis), salmon/red (short segment near -3
    to -2), cyan (curving downward into the lower half-plane), and purple (curving
    upward into the upper half-plane). Open-loop poles are marked with large dark
    X markers at s = 0, -1, -3, -5 on the real axis. An open-loop zero is marked with
    a hollow O at s = -2. The left half-plane has a very subtle green "Stable" shading
    and the right half-plane has subtle red "Unstable" shading with corresponding
    text labels. Constant damping ratio lines (zeta = 0.2, 0.4, 0.6, 0.8) are shown
    as dashed gray lines radiating from the origin. Constant natural frequency semicircles
    are visible as dashed arcs. Imaginary axis crossings are prominently marked with
    gold diamond markers at jw approx +2.9 and jw approx -2.9 with bold labels. Directional
    arrows on each branch indicate increasing gain. Real axis segments of the root
    locus are drawn as semi-transparent blue bands. Title reads "root-locus-basic
    · matplotlib · pyplots.ai". Axes are labeled "Real Axis (sigma)" and "Imaginary
    Axis (jw)" with equal scaling. Top and right spines are removed.'
