  image_description: 'The plot displays three Operating Characteristic (OC) curves
    for single-sample acceptance sampling plans. The title reads "curve-oc · plotly
    · pyplots.ai" with a subtitle "Single-Sample Acceptance Sampling — How Sample
    Size Affects Lot Discrimination". Three smooth S-shaped curves are shown: n=50,
    c=1 (dark blue), n=100, c=2 (orange), and n=150, c=3 (green), all descending from
    probability ~1.0 at fraction defective 0 toward 0 as defective fraction increases.
    Two vertical dashed gray lines mark AQL=0.02 and LTPD=0.08. A light blue shaded
    region between the first OC curve and y=1 near AQL illustrates producer''s risk
    (alpha=0.264), while a light pink shaded region between the OC curve and y=0 beyond
    LTPD illustrates consumer''s risk (beta=0.083). Blue and purple diamond markers
    with white borders annotate the alpha and beta risk values respectively. The legend
    titled "Sampling Plans" is positioned in the upper right with a subtle border.
    The x-axis is labeled "Fraction Defective (p)" (0.00-0.20) and the y-axis "Probability
    of Acceptance" (0-1.0). The background is clean white with subtle y-axis gridlines
    only.'
