  image_description: 'The plot shows a decision tree for a "New Product Launch" scenario
    rendered left-to-right on a white background. The title "tree-decision · pygal
    · pyplots.ai" is centered at the top in large dark text. On the far left, a blue
    rounded-corner square decision node displays "EMV $260K" in white text with "Strategy
    Choice" labeled below. Three elbow-connector branches extend rightward: "Launch
    Product" (solid bold blue line — optimal path), "Sell License" (dashed gray, pruned
    with vermilion X marks), and "Do Nothing" (dashed gray, pruned with X marks).
    A subtle light-blue shaded region highlights the optimal path. "Launch Product"
    leads to an orange gradient-filled circle chance node labeled "Market Outcome"
    (EMV $260K), which splits into "High Demand" (p = 0.6) leading to a blue triangle
    terminal at $500K and "Low Demand" (p = 0.4) leading to an orange triangle terminal
    at -$100K. "Sell License" leads to an orange circle "License Result" (EMV $190K)
    splitting into "Accepted" (p = 0.7, $250K blue triangle) and "Rejected" (p = 0.3,
    $50K blue triangle). "Do Nothing" leads directly to a gray triangle at $0K. All
    nodes have gradient fills and drop shadows. A pygal-native legend at the bottom
    identifies five series: Decision Node, Chance Node, Terminal (Gain), Terminal
    (Loss), Terminal (Neutral).'
