  strengths:
  - Excellent data storytelling through color-coded significant vs non-significant
    bars — immediately communicates statistical meaning
  - Perfect data quality with realistic seasonal airline-style data showing clear
    ACF/PACF patterns
  - Full spec compliance with all required features (confidence bounds, correct lag
    ranges, stacked layout)
  - Good use of pygal-specific features (per-bar color dicts, major label intervals,
    HTML interactive export)
  weaknesses:
  - X-axis tick labels at certain lags partially obscured by bar elements
  - SVG injection for confidence lines adds code complexity and fragility
  - Visual seam between the two PIL-composited chart halves
  - Bars are wider than ideal for a stem-style visualization
  image_description: The plot displays two vertically stacked pygal bar charts on
    a white canvas. The top chart shows the ACF (Autocorrelation Function) with bars
    from lag 0 to 36, and the bottom shows the PACF (Partial Autocorrelation Function)
    from lag 1 to 36. The title "acf-pacf · pygal · pyplots.ai" appears at the top
    in dark text. Bars are colored in darker Python Blue (#306998) when exceeding
    95% confidence bounds and lighter muted blue (#A8C4D8) when within bounds. Red
    dashed horizontal lines mark the ±1.96/√N confidence intervals on both charts.
    The ACF shows a clear seasonal pattern with strong positive correlations recurring
    at lags 12, 24, and 36, and negative correlations between peaks. The PACF shows
    significant spikes at early lags (1-2) and around lags 6-12, then mostly within
    confidence bounds. Y-axes are labeled "ACF" and "PACF", the bottom x-axis is labeled
    "Lag", and major tick labels appear every 5 lags. The plot background is a subtle
    light gray (#FAFAFA).
