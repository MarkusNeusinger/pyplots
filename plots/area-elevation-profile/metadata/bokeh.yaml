  image_description: 'The plot displays an Alpine Trail Profile spanning 0-120 km
    on the x-axis (Distance in km) and ~350-2100 m on the y-axis (Elevation in m).
    The terrain silhouette is created by two layered varea fills — a lighter blue
    (#306998 at 18% alpha) from the floor to the profile, and a darker blue (#1d3557
    at 15% alpha) from the floor to the midpoint elevation, producing a subtle depth/gradient
    effect. The profile line is rendered as multi_line segments colored by slope steepness
    using the Cividis colormap: dark blue/teal for flat sections transitioning to
    bright yellow for steep sections. Seven landmarks are annotated with dashed purple-gray
    (#6d597a) vertical lines, solid dots with white borders, and bold dark text labels
    showing name and elevation: Grindelwald (1358 m), Kleine Scheidegg (1822 m), Männlichen
    (1043 m), Lauterbrunnen (1730 m), Mürren (907 m), Schilthorn Pass (863 m), and
    Kandersteg (1077 m). The title reads "Alpine Trail Profile · area-elevation-profile
    · bokeh · pyplots.ai" at 42pt. Two italic annotation notes appear in the upper
    left: "Note: Vertical exaggeration ~10x" and "Profile color: dark (flat) → bright
    (steep) [Cividis — colorblind-safe]". The background is off-white (#fafafa), x-grid
    is hidden, y-grid is subtle dashed lines at low alpha. The toolbar is removed.'
