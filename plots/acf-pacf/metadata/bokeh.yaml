    use vertical stem lines from a zero baseline to correlation values, topped with
    circular markers (size 18). Significant lags (outside 95% CI) are rendered in
    darker blue (#306998), while non-significant lags appear in muted blue (#8FAEC4),
    creating immediate visual differentiation. Red dashed horizontal lines mark the
    95% confidence interval bounds (~±0.139). A small "95% CI" label in red sits at
    the right edge of the ACF plot. The x-axis is labeled "Lag" (0–35, shared between
    subplots), y-axes are labeled "ACF" and "PACF". The ACF shows lag 0 at 1.0, strong
    positive correlation at lag 1 (~0.42), negative at lag 3 (~-0.25), with exponential
    decay consistent with the AR(2) generative process. The PACF shows sharp cutoff
    after lag 2 (positive lag 1 ~0.43, negative lag 2 ~-0.3), correctly identifying
    the AR(2) order. Grid lines are subtle dashed on y-axis only. No toolbar is visible.
