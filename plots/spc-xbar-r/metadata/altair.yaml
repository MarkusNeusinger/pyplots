  image_description: The plot displays two vertically stacked control charts for CNC
    Shaft Diameter Monitoring. The top chart is the X-bar chart showing sample means
    (mm) with a center line at ~25.00 mm, red dashed UCL/LCL lines, and amber dashed
    warning limits (+2σ/−2σ). Normal points are blue filled circles connected by a
    blue line; three out-of-control points (samples 8, 17, 24) are shown as larger
    red diamonds. Sample 8 shows an upward shift above UCL, sample 17 a downward shift
    below LCL, and sample 24 a strong upward shift. The bottom chart is the Range
    (R) chart with similar control/warning limit structure showing natural range variation
    with no OOC points. Labels (UCL, LCL, CL, ±2σ) are positioned near their respective
    lines in both charts. The title reads "CNC Shaft Diameter Monitoring · spc-xbar-r
    · altair · pyplots.ai" at the top. Both charts share the x-axis labeled "Sample
    Number" (0-31). The background is clean white with subtle dotted grid lines on
    y-axes only. View strokes are removed for a clean look.
