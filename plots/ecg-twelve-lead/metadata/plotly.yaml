  image_description: The plot displays a 12-lead ECG in a 3x4 grid layout plus a full-width
    Lead II rhythm strip at the bottom. The background uses an authentic ECG paper
    style with a light pink/salmon color (#FFF5F0) featuring light reddish grid lines
    at fine intervals and bolder grid lines at larger intervals. All 12 leads (I,
    aVR, V1, V4 / II, aVL, V2, V5 / III, aVF, V3, V6) are labeled in blue text above
    each subplot. The ECG signals are rendered in dark navy (#1A1A2E) with clearly
    visible P-QRS-T complexes. Lead aVR shows inverted morphology. Precordial leads
    show R-wave progression from V1 to V4. Small rectangular calibration pulses (1
    mV) appear at the start of each lead. The y-axis shows "mV" on the left subplots,
    the x-axis shows "Time (s)" on the rhythm strip. The title "ecg-twelve-lead ·
    plotly · pyplots.ai" is centered at top.
