  strengths:
  - Complete spec compliance — all required psychrometric property lines, comfort
    zone, and HVAC process path are present
  - Physically accurate calculations using ASHRAE formulas at standard atmospheric
    pressure
  - Good visual hierarchy with prominent saturation curve and process path against
    subtle background lines
  - Clear data storytelling through the cooling/dehumidification process path
  - Proper direct labeling on the chart as specified
  weaknesses:
  - Red-green color combination for wet-bulb and enthalpy lines is not colorblind-safe
  - Some label crowding near the upper-left (enthalpy) and upper-right (RH percentages)
    regions
  - ASHRAE saturation pressure formula is duplicated many times, making the code unnecessarily
    verbose
  - Specific volume lines are too faint and could benefit from slightly higher opacity
  image_description: The plot displays a psychrometric chart with dry-bulb temperature
    (°C) on the x-axis ranging from -10 to 50, and humidity ratio (g/kg) on the y-axis
    from 0 to 30. The saturation curve (100% RH) is drawn as a prominent dark blue
    line forming the upper boundary of the chart. Other relative humidity curves (10%–90%)
    appear as lighter blue lines with percentage labels positioned along the right
    side. Wet-bulb temperature lines are shown as red dashed diagonal lines labeled
    0°C through 30°C near the saturation curve. Green dashed diagonal enthalpy lines
    are labeled with values (70–110 kJ/kg) along the upper-left edge. Purple dotted
    near-vertical specific volume lines are visible. A translucent green shaded rectangle
    marks the comfort zone (~20–26°C). A red HVAC process path with two labeled endpoints
    connects "Outdoor Air (35°C, 50% RH)" to "Supply Air (13°C, 100% RH)". Title reads
    "psychrometric-basic · altair · pyplots.ai" with subtitle "Standard Atmosphere
    (101.325 kPa) · HVAC Air Properties".
