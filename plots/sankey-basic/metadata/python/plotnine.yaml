  strengths:
  - Creative implementation of Sankey diagram using plotnine grammar of graphics primitives
    (geom_polygon + geom_rect + geom_text) — no external Sankey library needed
  - Smooth cubic Hermite interpolation (3t²-2t³) for curved flow bands looks polished
    and professional
  - Realistic energy flow domain (Coal/Gas/Nuclear/Renewables → Industrial/Commercial/Residential)
    with plausible proportions
  - 'Good data storytelling: source nodes colored distinctly, flow thickness encodes
    value, numerical labels on larger flows reduce ambiguity'
  - KISS code structure — linear data → plot → save with no unnecessary functions
    or classes
  weaknesses:
