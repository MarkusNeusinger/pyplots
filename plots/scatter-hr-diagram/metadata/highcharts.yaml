  image_description: The plot displays a Hertzsprung-Russell diagram on a dark background
    (#0d1117). The title "scatter-hr-diagram · highcharts · pyplots.ai" is displayed
    prominently at the top in white text, with a subtitle "Hertzsprung-Russell Diagram
    — Stellar Luminosity vs Surface Temperature" in muted gray. The x-axis shows "Surface
    Temperature (K)" reversed from 50k to 2k (left to right), and the y-axis shows
    "Luminosity (L☉)" on a logarithmic scale from 0.0001 to 2M. Seven spectral class
    letters (O, B, A, F, G, K, M) are displayed across the top of the plot area in
    their respective colors (blue to red). The main sequence runs diagonally from
    upper-left (hot, luminous O/B stars in blue) to lower-right (cool, dim M stars
    in red-orange). Red giants appear as larger coral-colored dots in the upper-right
    (cool but luminous). Supergiants are large golden dots scattered across the top.
    White dwarfs are small steel-blue dots in the lower-left (hot but dim). The Sun
    is marked with a distinctive large yellow marker with white border and "Sun ☉"
    label near the middle of the main sequence. Region labels ("SUPERGIANTS", "MAIN
    SEQUENCE", "RED GIANTS", "WHITE DWARFS") appear in muted colors matching their
    populations. A vertical legend on the right lists all series.
