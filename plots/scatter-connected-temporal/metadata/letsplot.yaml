  image_description: The plot displays a connected scatter plot showing the Phillips
    Curve dynamics — US-style unemployment rate (x-axis, 3-10%) vs. inflation rate
    (y-axis, -1% to 7%) from 1990 to 2023. Points are connected by lines in temporal
    order using geom_path. A single-hue color gradient transitions from light blue
    (1990) to dark navy (2023), encoding temporal progression through both the path
    lines and filled circle markers. White-stroked circular markers (shape 21) are
    visible at each of the 34 data points. Key years (1990, 1995, 2000, 2003, 2007,
    2009, 2015, 2020) are annotated in monospace font with a slight upward nudge.
    The title reads "scatter-connected-temporal · letsplot · pyplots.ai" with subtitle
    "Phillips Curve Dynamics — US-style unemployment vs inflation, 1990-2023". A vertical
    color bar legend on the right maps the Year from 1990 (light) to 2023 (dark) with
    a midpoint at 2006. The "2023" label at the top-left corner is clipped by the
    plot boundary. The background uses theme_minimal with subtle light gray major
    grid lines and no minor grid. The overall path traces recognizable economic regime
    shifts visible as directional movements through the 2D space.
