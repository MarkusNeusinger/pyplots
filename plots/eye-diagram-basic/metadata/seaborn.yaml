  strengths:
  - Excellent domain-appropriate dark theme design matching industry-standard eye
    diagram aesthetics
  - PowerNorm with gamma=0.35 provides excellent dynamic range in density visualization
  - Realistic NRZ signal simulation with proper noise (5%), jitter (3%), and bandwidth-limiting
    parameters
  - Clean eye openings with well-defined crossing points from good data generation
  - Subtle reference lines at 0V and 1V signal levels aid interpretation
  weaknesses:
