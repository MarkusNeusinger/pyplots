      Data: Same green (#009E73) data polygon outline and scatter dots as light render — data colors are identical between themes (only chrome flips). The translucent fill appears as a darker teal-green on the near-black background; slightly less contrast than light render but still visible. Orange trough annotation and green peak annotation are both readable. Data colors are confirmed identical to light render.
      Legibility verdict: PASS — all text is clearly readable against the dark background. No dark-on-dark issues detected.
