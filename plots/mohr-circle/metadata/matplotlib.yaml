    The plot displays a Mohr's Circle for stress analysis on a square canvas (3600x3600 px). A large blue (#306998) circle is drawn centered at approximately (20, 0) with a light blue semi-transparent fill (alpha=0.04). The horizontal axis is labeled "Normal Stress σ (MPa)" and the vertical axis "Shear Stress τ (MPa)". The title reads "mohr-circle · matplotlib · pyplots.ai" in medium weight.

    Two red-orange (#C1440E) circular markers represent the input stress points A (80, 30) and B (-40, -30), connected by a dashed red-orange line showing the diameter. Four amber (#D4A017) diamond markers indicate the derived quantities: principal stresses σ1 = 87.1 MPa and σ2 = -47.1 MPa on the horizontal axis, and maximum shear stress τ_max = 67.1 MPa and -τ_max = -67.1 MPa at top and bottom. A blue "+" marker at C (20, 0) marks the center with a white-stroke path effect for readability.

    A blue arc with arrowhead shows the principal angle 2θp = 26.6°. All annotations use bold 16pt text with arrow pointers. A subtle grid (alpha=0.15) covers the plot, top and right spines are removed, and reference lines (horizontal solid, vertical dashed through center) aid readability. The layout is clean with good use of whitespace.
