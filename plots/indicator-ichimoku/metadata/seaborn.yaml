  image_description: The plot displays an Ichimoku Cloud Technical Indicator Chart
    overlaid on candlestick price data spanning from late April through mid-September
    2024. The x-axis shows dates (Apr 23 through Sep 17) with rotated labels, and
    the y-axis shows Price ($) ranging from ~140 to ~190. Dark blue filled candlesticks
    represent bullish days and amber/orange hollow candlesticks represent bearish
    days — a colorblind-safe differentiation. A blue Tenkan-sen (9-period) line and
    an amber Kijun-sen (26-period) line overlay the price action. A purple Chikou
    Span line is plotted shifted behind the price. The Kumo (cloud) is filled between
    Senkou Span A and B — light blue tint for bullish regions (Span A > Span B) and
    salmon/orange tint for bearish regions (Span B > Span A). A circled "Bullish TK
    Cross" annotation with arrow highlights a crossover signal around early June.
    The background is light gray (#f8f9fa), top and right spines are removed, and
    a subtle y-axis grid is visible. A 7-item legend in the upper-left corner identifies
    all components in 2 columns.
