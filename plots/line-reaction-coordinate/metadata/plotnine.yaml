    and x-axis "Reaction Coordinate". A red double-headed arrow at x≈0.18 indicates
    the activation energy (Ea = 70 kJ/mol), and a green double-headed arrow at x≈1.06
    (beyond the curve) indicates the enthalpy change (ΔH = −30 kJ/mol). Horizontal
    dashed gray lines extend from the reactant and product energy levels to the ΔH
    arrow. Bold black labels identify "Reactants (50 kJ/mol)", "Transition State (120
    kJ/mol)", and "Products (20 kJ/mol)". The background is white with subtle horizontal
    gridlines. The overall layout is clean and educational.
