review:
  strengths:
  - Impressive custom heatmap chart type built by extending pygal Graph base class
    with full _plot/_compute override
  - Effective data storytelling through glow halo on peak cell, pill-annotated top
    3 values, and contextual subtitle
  - 16-stop viridis gradient with 120-segment smooth colorbar significantly above
    default quality
  - Realistic two-mode wind turbine fatigue data with appropriate engineering scales
  - Multi-format export (SVG, PNG, HTML) leveraging pygal distinctive capabilities
  - Smart label skip-patterns preventing overlap
  weaknesses:
  - sys.path manipulation hack for imports due to filename shadowing pygal package
  - Some canvas whitespace above the heatmap grid could be better utilized
  - Subtitle text (34px) is noticeably smaller than other text elements
  image_description: 'The plot displays a 2D heatmap representing a rainflow counting
    matrix for wind turbine blade root fatigue analysis. The title "heatmap-rainflow
    · pygal · pyplots.ai" appears at the top, followed by a subtitle "Wind Turbine
    Blade Root — Variable Amplitude Fatigue Spectrum" in lighter gray text. The x-axis
    shows "Mean Stress (MPa)" ranging from -42 to 242, and the y-axis shows "Stress
    Amplitude (MPa)" from 5 to 195. The heatmap uses a viridis colormap (dark purple
    for low counts through teal/green to bright yellow for high counts) with rounded-corner
    cells and subtle gaps between them. A light gray background panel sits behind
    the grid. The data forms a clear triangular/pyramid shape — most cycles occur
    at low amplitudes and moderate mean stresses. The bottom-left row shows the highest
    counts with three annotated peak cells: 9,629 (at ~48 MPa mean), 9,817 (at ~63
    MPa mean, highlighted with a yellow glow halo), and 8,790 (at ~78 MPa mean). Zero-count
    bins are rendered white with thin gray borders. A smooth gradient colorbar on
    the right indicates "Cycle Count" with logarithmic tick marks at 0, 1, 10, 100,
    and 1,000.'
