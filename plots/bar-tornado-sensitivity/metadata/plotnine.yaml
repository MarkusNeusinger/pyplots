  image_description: The plot displays a horizontal tornado (butterfly) bar chart
    showing NPV sensitivity analysis for 10 financial parameters. Bars extend left
    and right from a dashed vertical reference line at the base case value of $120M.
    The top 3 parameters (Discount Rate, Revenue Growth, Material Cost) are rendered
    at full opacity while the remaining 7 are muted with reduced alpha, creating clear
    visual hierarchy. Orange (#D95F02) represents the Low Scenario and blue (#306998)
    represents the High Scenario. Each bar has dollar-value labels at its endpoints
    (e.g., "$95M", "$148M"). Parameters are sorted by total range descending, creating
    the characteristic tornado shape. The title reads "bar-tornado-sensitivity · plotnine
    · pyplots.ai" with the legend positioned at top. The x-axis is labeled "Net Present
    Value ($M)" with tick marks at $100M, $120M, $140M. Y-axis parameter names are
    bold. The background is clean minimal with subtle x-axis gridlines only.
