  image_description: The plot displays a candlestick chart with 30 trading days of
    simulated stock price data spanning Jan 02 to Feb 06, 2024. Blue rectangles represent
    bullish (up) candles and orange rectangles represent bearish (down) candles. Thin
    vertical lines (wicks) extend above and below each candle body showing the high-low
    range. The price starts around $100, rises to approximately $108-109 in the first
    trading week, then gradually trends downward to around $99 by early February.
    The y-axis is labeled "Price ($)" ranging from approximately $93 to $112, and
    the x-axis is labeled "Trading Day (Jan–Feb 2024)" with date labels every 5 trading
    days (Jan 02, Jan 09, Jan 16, Jan 23, Jan 30, Feb 06). The background is white
    with subtle horizontal grid lines and very faint vertical grid lines at tick positions.
    The title "candlestick-basic · letsplot · pyplots.ai" appears at the top left
    in dark text.
