    band
  - Color palette for key points (orange, dark red, green) could be improved for colorblind
    accessibility
  - Repetitive code pattern for individual point labels — three separate chart objects
    instead of a single text mark with color encoding
  - The 0.2% offset dashed line is barely visible due to the compressed elastic region
    scale
  image_description: 'The plot displays a mild steel tensile test stress-strain curve
    rendered as a blue line (#306998) on a clean white background. The x-axis shows
    "Engineering Strain" (ranging from -0.01 to ~0.39) and the y-axis shows "Engineering
    Stress (MPa)" (0 to ~440). The title reads "Mild Steel Tensile Test · line-stress-strain
    · altair · pyplots.ai" in dark text at the top. Three colored marker dots highlight
    critical points: an orange/brown dot at the Yield Point (~0.003, 250 MPa), a dark
    red dot at UTS (~0.22, 400 MPa), and a green dot at Fracture (~0.35, 280 MPa).
    Each point has a bold colored label. Gray italic region labels ("Elastic", "Strain
    Hardening", "Necking") appear across the top. A dashed gray line shows the 0.2%
    offset method with a "0.2% offset" label near the bottom. A blue bold annotation
    reads "E = 210,000 MPa" in the elastic region. The curve shows the classic pattern:
    steep elastic rise, yield plateau, gradual strain hardening to UTS peak, then
    necking decline to fracture. No grid lines are present; axes have subtle gray
    domain lines and ticks.'
