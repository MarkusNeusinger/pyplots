  strengths:
  - Excellent code quality with sophisticated nearest-neighbor pole-tracking algorithm
  - Comprehensive feature set covering all spec requirements including damping ratio
    guides, natural frequency semicircles, stability boundary markers, and real-axis
    locus segments
  - Good use of pygal allow_interruptions for multi-branch rendering
  - Proper engineering notation on axes with units
  - Custom colorblind-safe color palette with purple zeros and red poles
  - Variable-density gain sweep for finer resolution near critical points
  - Square canvas preserves geometric relationships
  - Real-axis locus and gain direction markers clearly visible after repair
  weaknesses:
  - Open-loop zero marker partially obscured by dense blue locus points near s=-3
  - Design could be more polished - guide lines and overall aesthetic are functional
    but not publication-ready
  - No visual emphasis on breakaway/break-in points
  - Legend with 8 entries is dense
  image_description: The plot displays a root locus diagram on a white background
    with the title "root-locus-basic · pygal · pyplots.ai" at the top. The x-axis
    is labeled "Real Axis (σ)" ranging from -6.00 to 4.00, and the y-axis is labeled
    "Imaginary Axis (jω)" ranging from -5.00 to 5.00, on a square 3600×3600 canvas
    preserving equal axis scaling. A blue continuous curve traces the root locus branches
    — two branches depart from the real axis near the breakaway point between -1 and
    -2, curving upward and downward into the right half-plane and exiting the plot
    at the edges. Two other branches move along the real axis. Four red circular dots
    mark open-loop poles at s = 0, -1, -2, -4. A purple dot marks the open-loop zero
    at s = -3, though it is partially obscured by the dense cluster of blue locus
    points in that region. An orange line with width=14 clearly shows real-axis locus
    segments on the intervals [0, -1], [-2, -3], and [-4, -6]. Two orange dots mark
    the stability boundary (jω axis crossings) at approximately ±1.6j. Dark blue dots
    of size 26 mark gain direction along the locus branches at K = 5, 15, 40, 100,
    250. Light gray dashed lines radiate from the origin showing constant damping
    ratio (ζ = 0.2, 0.4, 0.6, 0.8) guide lines, and gray dashed semicircles show constant
    natural frequency (ωn = 1, 2, 3, 4, 5) arcs. A legend at the bottom displays 8
    series across 3 columns.
