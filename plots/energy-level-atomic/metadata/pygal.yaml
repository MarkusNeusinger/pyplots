  strengths:
  - Excellent use of real hydrogen atom physics with accurate energy values and spectral
    wavelengths
  - Thoughtful color scheme mapping Lyman series to purple (UV) and Balmer transitions
    to approximate visible-spectrum colors
  - Effective visual hierarchy through varying line widths and node sizes with Hα
    as clear focal point
  - Clean well-structured code with good use of pygal API features
  - Nonlinear y-scale makes converging upper levels distinguishable
  - Perfect code quality with deterministic data and clean structure
  weaknesses:
  - Transitions lack directional arrows to distinguish emission from absorption as
    spec requests
  - Three Lyman series transitions use similar purple shades that are hard to differentiate
  - Some thinner transition lines (width=7) with small upper dots are subtle and harder
    to see
  image_description: 'The plot displays an atomic energy level diagram for the hydrogen
    atom on a light lavender background with a white outer canvas. Six horizontal
    gray lines represent quantized energy levels (n=1 through n=6), labeled on the
    y-axis with both quantum number and energy value (e.g., "n=1: −13.60 eV"). A red
    dashed line at the top marks the ionization limit at 0.00 eV. The y-axis is titled
    "Energy (eV)". Vertical colored lines represent transitions: three purple/violet
    lines for the Lyman series (UV, transitions to n=1) at Ly-α 122 nm, Ly-β 103 nm,
    and Ly-γ 97 nm, and four colored lines for the Balmer series (visible, transitions
    to n=2) at Hα 656 nm (red), Hβ 486 nm (cyan), Hγ 434 nm (blue), and Hδ 410 nm
    (purple). Endpoint dots vary in size, with Hα having the largest dot, creating
    a clear focal point. The legend at the bottom lists all 8 named series in a 4-column
    layout. Title reads "Hydrogen Atom · energy-level-atomic · pygal · pyplots.ai".'
