  image_description: 'The plot displays a band/ribbon chart titled "Sensor Calibration
    Forecast · band-basic · plotnine · pyplots.ai" with a subtitle explaining the
    95% confidence interval behavior. The x-axis shows "Time (days)" from 0 to 30,
    and the y-axis shows "Temperature (°C)" with custom-formatted tick labels (15°C,
