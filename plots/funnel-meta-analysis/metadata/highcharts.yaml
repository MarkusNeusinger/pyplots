    form the inverted funnel shape representing pseudo 95% confidence intervals. Fifteen
    blue circular markers of varying sizes (larger circles for more precise/higher-weight
    studies) are scattered within and around the funnel. The distribution shows slight
    rightward asymmetry at higher SE values, suggesting possible publication bias.
    A faint "High precision" label appears in the upper-right area within a subtle
    blue-tinted plotBand. The overall design is clean and professional with a monochromatic
    blue palette.
