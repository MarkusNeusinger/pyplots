  image_description: The plot displays a Bode plot with two vertically stacked panels
    on a light gray (#FAFAFA) background. The top panel shows magnitude (dB) vs frequency
    (Hz) on a logarithmic x-axis, with a blue (#306998) curve starting at ~45 dB at
    0.1 Hz and declining steadily. A dashed gray 0 dB reference line is labeled "0
    dB" in small italic text. The gain margin is annotated in vermillion (#D55E00)
    with "GM = 10.7 dB" text, two orange dots, and a dotted vertical segment between
    the magnitude at phase crossover and 0 dB. A purple (#7570B3) dot marks the gain
    crossover on the 0 dB line. A subtle light blue shading fills the region above
    0 dB. The bottom panel shows phase (°) vs frequency (Hz) with the same shared
    log x-axis. The blue curve starts near -90° and rolls off past -270°. A dashed
    gray -180° reference line is labeled "-180°". The phase margin is annotated in
    purple with "PM = 29.5°" text, two purple dots, and a dotted vertical segment.
    An orange dot marks the phase crossover at -180°. A subtle light orange shading
    fills the region below -180°. The title "bode-basic · bokeh · pyplots.ai" appears
    at the top left. Grid lines are subtle with dashed styling. All axis labels include
    units.
