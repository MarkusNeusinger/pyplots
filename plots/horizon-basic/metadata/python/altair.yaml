  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) ✓
      Chrome: Title, axis labels ("Time"), series names (API Gateway, Cache, Database, Web Server 1, Web Server 2, Worker), tick labels all clearly visible in dark INK color ✓
      Data: 3 bands per series showing positive (light/medium/dark blue: #d4e9f0, #5ba3c0, #1d6a8e) and negative (light/medium/dark brown: #f0d4a8, #d4944f, #8b5a2b) intensity. All bands are clearly distinguishable. Legend shows "Intensity" with 6 entries (Positive/Negative × Low/Medium/High) ✓
      Legibility verdict: PASS - all text and data elements fully readable

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) ✓
      Chrome: Title, axis labels, series names, tick labels all visible in light INK color (#F0EFE8) and INK_SOFT (#B8B7B0) ✓
      Data: CRITICAL FAILURE - the positive bands (blue colors) remain visible, but the negative bands (brown colors #f0d4a8, #d4944f, #8b5a2b) render as pure black/invisible against the dark background. The negative values are completely lost on the dark surface. The legend shows 6 entries but the corresponding dark negative bands are not discernible in the chart ✗
      Legibility verdict: FAIL - dark-on-dark failure; negative bands invisible on dark background. Data integrity is compromised.

    CORE ISSUE: The implementation hardcodes data colors without theme-adaptation. The light-colored positive bands appear acceptably in both themes, but the dark brown negative bands (which should be visible regardless of theme) are invisible on the dark background. This violates the mandate that "the Okabe-Ito data colors (positions 1–7) must be identical between light and dark — only chrome (background, text, grid, legend frames) flips." The negative divergence colors must be readable in both themes.
