  strengths:
  - Excellent pitch diagram with all FIFA-standard markings including goal posts,
    corner arcs, and penalty arcs
  - Zone shading (attacking/defensive thirds) adds tactical context beyond spec requirements
  - Clean visual refinement with all axis chrome removed — appropriate for a pitch
    diagram
  - Filled vs hollow markers with alpha variation effectively encode outcomes
  - Directional arrows for passes and shots using Bokeh Arrow model
  - Perfect spec compliance and data quality
  weaknesses:
  - Gold/yellow interception diamonds have low contrast against the green pitch background
  - Legend with 8 entries is slightly cramped — needs more spacing
  - Hollow unsuccessful markers (especially small interception diamonds) are hard
    to distinguish
  image_description: 'The plot displays a soccer pitch event map on a light green
    pitch background with standard FIFA markings including penalty areas, goal areas,
    center circle, halfway line, corner arcs, and goal posts drawn in dark green.
    Four event types are plotted: blue circles for passes, red stars for shots, teal
    triangles for tackles, and gold diamonds for interceptions. Successful events
    are filled with their respective colors while unsuccessful ones appear as hollow
    (white-filled) markers with colored outlines. Blue directional arrows indicate
    pass trajectories across the pitch, and red arrows show shot directions toward
    the right goal. Subtle zone shading highlights the attacking third (faint red)
    and defensive third (faint blue). The title "scatter-pitch-events · bokeh · pyplots.ai"
    appears at the top. Axes are labeled "Pitch Length (m)" and "Pitch Width (m)".
    A horizontal legend with 8 entries (4 event types × 2 outcomes) sits below the
    pitch in two rows of four.'
