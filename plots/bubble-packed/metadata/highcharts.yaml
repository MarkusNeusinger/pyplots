  strengths:
  - Correct use of Highcharts-native packedbubble chart type with physics-based layout
    algorithm
  - Thoughtful colorblind-safe muted palette with per-bubble opacity hierarchy creating
    visual depth
  - Smart selective data labeling (filter value > 480) prevents clutter while highlighting
    market leaders
  - Realistic, neutral market data with good size variation across 5 well-defined
    sector groups
  - Gradient background and white bubble borders add visual polish above library defaults
  weaknesses:
  - Significant empty space (~30%) between bubble cluster and bottom legend — poor
    canvas utilization
  - Faint axis artifacts visible at the top edge of the chart (axes should be explicitly
    hidden)
  - The post-render fit_script (setTimeout + SVG transform manipulation) is fragile
    and timing-dependent
  image_description: The plot displays a packed bubble chart titled "bubble-packed
    · highcharts · pyplots.ai" with subtitle "Market value by sector ($B)". Five sector
    groups are shown — Technology (steel blue), Finance (gold/amber), Healthcare (purple),
    Energy (teal/cyan), and Consumer (salmon/pink) — each containing 3-5 sub-sector
    bubbles of varying size. The largest bubbles (Software, Banking, Cloud, Oil &
    Gas, Pharma, Automotive) have white data labels with text outlines. The bubble
    cluster occupies the upper ~65% of the square canvas, with a significant empty
    gap before the horizontal legend at the very bottom. The background uses a subtle
    vertical linear gradient from near-white to light gray. Bubbles have white borders
    and per-value opacity variation. Faint axis artifacts are barely visible at the
    top edge of the chart area.
