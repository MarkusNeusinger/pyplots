  image_description: 'The plot displays a European population cartogram using hexagonal
    bubbles positioned at approximate geographic coordinates of 20 European countries.
    Bubble sizes are proportional to population — Germany is the largest, while small
    nations like Ireland and Denmark are the smallest. Colors use the viridis colormap
    to encode GDP per capita: yellow/green for wealthy nations (Ireland ~$100K, Switzerland
    ~$92K) and dark purple for lower GDP (Romania ~$15K). A faint gray European coastline
    outline provides geographic reference behind the bubbles. Country abbreviations
    are displayed on each bubble with a three-tier size hierarchy: large bold text
    for populous nations (DE, FR, UK, IT, ES, PL), medium text for mid-size nations
    (RO, NL, CZ), and small text for the rest. An italic annotation in the upper-left
    reads "Small nations, highest GDP/capita" listing IE, CH, NO, SE, DK, AT, NL,
    BE, FI. Highlighted small-but-wealthy nations have bold black borders and star
    markers. The GDP per Capita color legend is on the right side. The population
    size legend is not visible in the rendered output. The title reads "European Population
    Cartogram · cartogram-area-distortion · letsplot · pyplots.ai" with a descriptive
    subtitle explaining the visual encodings.'
