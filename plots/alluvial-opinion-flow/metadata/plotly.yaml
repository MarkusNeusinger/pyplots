  image_description: 'The plot displays a Sankey/alluvial diagram titled "Opinion
    Polarization on Public Transit · alluvial-opinion-flow · plotly · pyplots.ai".
    Four wave columns (Q1 2025 through Q4 2025) are arranged left-to-right, each containing
    five vertically stacked nodes for opinion categories: Strongly Agree (dark blue
    #306998), Agree (light blue #72B7D4), Neutral (gray #888888), Disagree (orange
    #E8853D), and Strongly Disagree (red #C44E52). Each node is labeled with the category
    name and respondent count (e.g., "Neutral 300" in Q1). Flows connect nodes across
    waves, with stable flows (same category) at higher opacity (0.55) and category-changing
    flows at lower opacity (0.30), colored by source category. The right margin shows
    net change annotations in matching colors: +35, -65, -105, +25, +110, clearly
    illustrating the polarization trend. A horizontal legend at the bottom shows all
    five categories with colored squares. Wave headers are bold above each column.
    The diagram clearly shows Neutral shrinking from 300 to 195 while Strongly Disagree
    grows from 100 to 210.'
