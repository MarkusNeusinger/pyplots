  weaknesses:
  - Foams hull region extends excessively far right beyond actual data points due
    to 1.12x expansion from centroid
  - Some family region overlaps in the upper-right (Ceramics/Metals/Composites) create
    visual clutter
  - E/rho guide line labels are small and positioned at chart edges, reducing readability
  - X-axis title Density (kg/m3) appears cut off in the rendered PNG output
  - Red-green color choice (Ceramics vs Polymers) is not ideal for colorblind accessibility
  image_description: 'The plot displays a log-log scatter chart of Density (kg/m³)
    vs. Young''s Modulus (GPa) — a classic Ashby material selection chart. Seven material
    families are shown as colored scatter points enclosed within semi-transparent
    convex hull envelopes with dashed borders: Metals & Alloys (steel blue), Ceramics
    & Glasses (brick red), Polymers (forest green), Elastomers (golden yellow), Composites
    (purple), Foams (orange), and Natural Materials (brown). Each family region has
    a bold text label positioned near its cluster. The chart background is light gray
    (#f8f9fb) with a white plot area. Both axes are logarithmic — x-axis spans 10
    to ~20,000 kg/m³, y-axis spans 0.0001 to 1,000 GPa. Diagonal dashed guide lines
    for E/ρ performance indices (E/ρ = 0.01, 1, 100) are drawn across the plot with
    italic labels at their endpoints. A vertical legend on the right lists all 7 families
    with colored circle markers. The title reads "Density vs. Young''s Modulus · scatter-ashby-material
    · highcharts · pyplots.ai" with a subtitle below. Grid lines are subtle dashed
    lines at ~5% opacity. Markers are large circles (radius 14) with darker border
    strokes.'
