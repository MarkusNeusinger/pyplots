review:
  strengths:
  - 'Perfect spec compliance: both vertical (Q4 peak season) and horizontal (target
    range) span types demonstrated with correct alpha levels and Okabe-Ito span colors'
  - 'Idiomatic Bokeh usage: BoxAnnotation (the canonical Bokeh span model), HoverTool,
    Label annotations, and HTML output alongside PNG — shows genuine library mastery'
  - Realistic business scenario (monthly revenue over 2 years) with plausible values,
    seed-set reproducibility, and flat KISS code structure
  - 'Theme-adaptive chrome thoroughly applied: all six token variables used correctly,
    backgrounds correct (#FAF8F1 / #1A1A17), y-only grid at alpha 0.10, outline removed'
  weaknesses:
  - 'Span label contrast in dark mode: ''Q4 Peak Season'' uses solid #0072B2 text
    against the dark-blue tinted span background (near-black + 25% #0072B2 blend),
    resulting in reduced contrast; ''Target Range'' uses #E69F00 orange text on the
    golden-brown horizontal span background — both readable but below ideal'
  - Scatter markers (size=20) are slightly small for a 4800x2700 canvas; bumping to
    28-32 would improve visibility at full resolution
  - Horizontal span (y=120–140) covers ~65% of the vertical data range, creating a
    large muddy golden area in dark mode that competes with the line chart; reducing
    span alpha to 0.15 or narrowing the range would improve clarity
