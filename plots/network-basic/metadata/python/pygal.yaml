review:
  strengths:
  - Network graph correctly implemented using pygal XY chart with manual edge/node
    drawing — the best approximation possible for a library without a native network
    type
  - Force-directed spring layout implemented from scratch with group-seeded initial
    positions, producing clear community separation
  - 'Four communities correctly color-coded using Okabe-Ito palette in canonical order;
    Community A (first data series) correctly uses #009E73'
  - Both light (#FAF8F1) and dark (#1A1A17) renders are clean and fully readable with
    correct background and chrome tokens
  - Interactive HTML output with per-node tooltips showing connection count (e.g.,
    'Alice (4 connections)') leverages pygal's distinctive interactive feature
  - Correct title format 'network-basic · pygal · anyplot.ai' and community legend
    at bottom
  - Reproducible with np.random.seed(42); clean KISS structure with no functions or
    classes
  weaknesses:
  - Node degree is calculated but not used to vary dot size — dots_size=30 is fixed
    for all nodes, missing the spec requirement to encode degree through node size
  - Node person-name labels are not rendered in static PNG (print_labels=False); they
    appear only on hover in the interactive HTML, so the spec's legibility requirement
    is unmet in the PNG export
  - The edge series passed as chart.add(None, ...) appears in the legend as 'Bridges'
    with an unexpected golden/yellow color rather than the intended gray (#888888),
    indicating a pygal color-cycling or None-title rendering artifact
  - Three nodes in each render display a thick ring artifact (active/selected state
    styling from pygal) which creates an inconsistent and distracting visual
  - Network layout is diagonally oriented, leaving upper-right and lower-left corners
    mostly empty; canvas utilization is uneven
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white
      Chrome: Title "network-basic · pygal · anyplot.ai" clearly readable in dark ink at top center; no axis labels or tick labels (appropriate for network graph); legend at bottom shows "Bridges", "Community A", "Community B", "Community C", "Community D" in readable dark text
      Data: 20 nodes spread across canvas via force-directed layout. Community A (teal #009E73), Community B (orange #D55E00), Community C (blue #0072B2), Community D (pink #CC79A7). Gray edges connect intra-community nodes; a warm golden/yellow set of edges connects cross-community pairs (labeled "Bridges" in legend with unexpected color). Three nodes display a thick black ring artifact (active/hover state). No node name labels visible in static PNG.
      Legibility verdict: PASS — title and legend readable; no node labels shown in PNG (only in HTML tooltips); no light-on-light failures

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black
      Chrome: Title clearly readable in light text; legend at bottom readable in light text; no dark-on-dark failures observed
      Data: Data colors are identical to light render — Community A still #009E73, B orange, C blue, D pink. Edges still gray/golden. Three nodes now display thick white rings (same active-state artifact, theme-adapted). Canvas layout identical to light render.
      Legibility verdict: PASS — all chrome text readable against dark background; brand green #009E73 remains visible; no dark-on-dark failures
