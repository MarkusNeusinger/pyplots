  image_description: The plot displays a Feynman diagram for gluon fusion Higgs production
    with diphoton decay (gg → H → γγ) on a clean white background. Two green curly
    gluon lines enter from the left, connecting to the top and bottom vertices of
    a blue triangular top-quark loop (fermions shown as solid blue lines with prominent
    flow arrows). From the right vertex of the triangle, a purple dashed Higgs boson
    line connects to a fourth vertex, from which two red wavy photon lines emerge
    going upper-right and lower-right. Each propagator is labeled with its particle
    symbol (g, t, t̄, H, γ) in bold colored serif text. Four black vertex dots with
    white borders mark interaction points. A custom line-style legend in the bottom-right
    demonstrates all four particle types with miniature line samples. A gray time
    arrow with italic "time" label runs along the bottom. The title reads "gg → H
    → γγ (Gluon Fusion) · feynman-basic · plotly · pyplots.ai" in serif font at the
    top.
