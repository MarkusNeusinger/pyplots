  image_description: The plot displays an eye diagram on a black background using
    the Inferno colormap for density representation. High-density trace regions appear
    in bright orange/yellow, while low-density areas show dark purple/black. Two horizontal
    dashed cyan lines mark the Logic 1 (1.0 V) and Logic 0 (0.0 V) reference levels,
    with corresponding labels in the upper-left and lower-left corners. A green rectangular
    box annotation highlights the eye opening region in the center. Green crosshair
    lines with end caps indicate eye height (0.78 V, vertical) and eye width (0.94
    UI, horizontal) measurements. The X-axis reads "Time (UI)" spanning 0.0 to 2.0,
    the Y-axis reads "Voltage (V)" from roughly -0.2 to 1.2. A colorbar on the right
    shows "Log10 Density" ranging from 0 to about 3.5. The title reads "eye-diagram-basic
    · bokeh · pyplots.ai". The characteristic eye shape is wide open, clearly showing
    good signal integrity with concentrated traces at the 0V and 1V levels and clean
    transition regions.
