review:
  strengths:
  - All five Ichimoku components correctly computed with standard 9/26/52 parameters
    and properly shifted
  - Clean well-structured code with clear separation of data preparation and plotting
  - Thoughtful Material Design color palette with good visual differentiation between
    components
  - Excellent text sizing with all font sizes explicitly set for 4800x2700 output
  - Good visual refinement with removed x-grid subtle y-grid and clean white background
  weaknesses:
  - No legend to identify the 5 indicator lines - chart is unreadable without prior
    Ichimoku knowledge
  - Candlestick bodies are narrow and hard to distinguish in congested price areas
  - Red-green color scheme for candles and cloud is not colorblind-friendly
  - Data storytelling could be stronger with a legend and possibly annotations at
    key signal points
  image_description: The plot displays an Ichimoku Cloud Technical Indicator chart
    overlaid on candlestick price data spanning from August 2023 to February 2024.
    Candlesticks use conventional green (bullish) and red (bearish) coloring. The
    Tenkan-sen (conversion line) is drawn in blue, the Kijun-sen (base line) in orange/red,
    and the Chikou Span (lagging span) in purple. The Kumo (cloud) is filled between
    Senkou Span A and Span B — green-tinted when bullish (Span A > Span B) and red-tinted
    when bearish (Span B > Span A). The cloud extends beyond the price data to the
    right as expected. The price starts around $138-140, rises to ~$150 in October
    2023, then declines significantly to ~$112-115 by February 2024. The cloud transitions
    from bullish to bearish around mid-January 2024. The y-axis shows "Price ($)"
    with dollar-formatted tick labels, and the x-axis shows month/year labels. Title
    reads "indicator-ichimoku · plotnine · pyplots.ai" in bold. White background with
    subtle horizontal grid lines only.
