  image_description: 'The plot displays an alluvial/Sankey-style diagram tracking
    employee engagement sentiment across 4 quarterly waves (Q1-Q4 2025). Five sentiment
    categories are shown vertically: Strongly Disagree (red) at top, Disagree (orange),
    Neutral (gray), Agree (light blue), and Strongly Agree (dark blue) at bottom.
    Rectangular nodes at each wave column display respondent counts in bold white
    text. Curved flow ribbons connect categories between adjacent waves - stable flows
    (same category) are more opaque and change flows are lighter. Left-side labels
    show category names with initial counts. Right-side labels show final counts with
    net change indicators (e.g., Strongly Disagree +123, Neutral -45). Wave headers
    appear above the diagram. A trend annotation at bottom reads "Polarization trend:
    extreme sentiments grow while moderate opinions decline." The title "alluvial-opinion-flow
    · altair · pyplots.ai" is centered at the top. A horizontal color legend for Sentiment
    appears at the bottom.'
