    strain hardening with a concave-down shape reaching a peak at ~0.22 strain / 400
    MPa (UTS), then decreases through a necking region to fracture at ~0.35 strain
    / ~325 MPa. Three key points are marked: a gold circle for Yield Point near the
    y-axis, a red triangle for UTS at the peak, and a green square for Fracture at
    the end. Gray italic labels mark "Elastic", "Strain Hardening", and "Necking"
    regions. A short dashed gold line near the origin represents the 0.2% offset line.
    Annotations in bold colored text show "Yield Point (250 MPa)", "UTS (400 MPa)",
    "Fracture", and "E = 210 GPa". A legend with all five elements sits at the right
    edge of the plot.'
