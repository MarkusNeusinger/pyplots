  image_description: The plot displays an Ichimoku Cloud Technical Indicator Chart
    overlaid on candlestick price data spanning from late April to mid-September 2024.
    The x-axis shows dates (Apr 23 through Sep 17) and the y-axis shows Price ($)
    ranging from ~140 to ~190. Green candlesticks represent bullish days and red candlesticks
    represent bearish days. A dark blue Tenkan-sen (9-period) line and an orange Kijun-sen
    (26-period) line are overlaid on the price action. A purple Chikou Span line is
    plotted shifted behind. The Kumo (cloud) is visible as a green-tinted region (bullish,
    when Span A > Span B) and a pink/red-tinted region (bearish, when Span B > Span
    A). The background is light gray with subtle y-axis gridlines. Top and right spines
    are removed. The legend in the upper-left corner shows 7 items in 2 columns. The
    title reads "indicator-ichimoku · seaborn · pyplots.ai".
