  image_description: The plot displays two sigmoidal dose-response curves on a logarithmic
    x-axis (Concentration in M, ranging from 10⁻⁹ to 10⁻⁴) against Response (%) on
    the y-axis (0–100%). Compound A is rendered in blue (#306998) and Compound B in
    orange (#E8833A). Compound A shows a steeper transition around 10⁻⁷ M with a light
    blue 95% confidence band surrounding its fitted curve. Compound B transitions
    more gradually around 10⁻⁶ M. Both compounds have circular data points with white
    edges and vertical error bars (SEM). Dashed vertical and horizontal reference
    lines mark the EC50 for each compound, color-coded to match. Bold annotations
    read "EC₅₀ = 1.1e-07 M" (blue) and "EC₅₀ = 9.4e-07 M" (orange). Horizontal dotted
    gray lines indicate the top (~93%) and bottom (~5%) asymptotes with italic labels
    at the far right. The title "curve-dose-response · bokeh · pyplots.ai" appears
    top-left. A legend in the top-left distinguishes the two compounds. The background
    is light gray (#FAFAFA) with subtle dashed gridlines.
