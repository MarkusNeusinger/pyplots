  image_description: The plot displays a funnel plot with 15 blue circular markers
    (#306998) representing individual studies, plotted with Log Odds Ratio on the
    x-axis and Standard Error on the inverted y-axis (0.0 at top, 0.6 at bottom).
    A solid blue vertical line marks the summary effect at approximately -0.45, and
    a dotted gray line marks the null effect at 0. Two dashed diagonal blue lines
    form the pseudo 95% confidence funnel, with a very subtle light blue fill between
    them. The funnel narrows toward the top where more precise studies cluster. Visible
    asymmetry shows smaller studies (higher SE) shifted to the left, suggesting publication
    bias. Top and right spines are removed. Legend in the upper right shows "Summary
    effect" and "Null effect" with frameon=False. Title reads "funnel-meta-analysis
    · matplotlib · pyplots.ai".
