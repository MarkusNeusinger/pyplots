  image_description: The plot displays a WHO weight-for-age growth chart for boys
    (0-36 months). Graduated blue percentile bands span from P3 (outermost, lightest
    blue) through P10, P25, P50, P75, P90 to P97, with the bands getting darker toward
    the median (deeper blue near P25-P50 and P50-P75). A dashed dark navy line marks
    the P50 median. Red connected dots represent an individual patient's weight trajectory
    tracking between the 25th and 50th percentiles. Right-margin labels (P3 through
    P97) are rendered in gray/navy text. The x-axis shows "Age (months)" from 0 to
    36, and the y-axis shows "Weight (kg)" from 0 to 20. A bottom legend lists all
    8 series. The title reads "WHO Weight-for-Age (Boys) · line-growth-percentile
    · pygal · pyplots.ai". The overall palette is cohesive blue tones with a subtle
    off-white plot background.
