    data, clearly showing the characteristic transit dip centered at orbital phase
    0.5, dropping from normalized flux ~1.000 down to ~0.990 (~1% depth). The title
    "Exoplanet Transit · lightcurve-transit · altair · pyplots.ai" is left-aligned
    at top with subtitle "Phase-folded Kepler photometry with limb-darkened transit
    model" in gray. X-axis labeled "Orbital Phase" (0.0–1.0), Y-axis labeled "Relative
    Flux" (0.986–1.006, formatted to 3 decimal places). A legend in the top-right
    corner identifies "Observed Data" (teal circle) and "Transit Model" (amber circle).
    Gridlines are very subtle dashed lines. The layout is clean and well-proportioned.
