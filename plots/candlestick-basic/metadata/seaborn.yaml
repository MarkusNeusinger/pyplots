  image_description: 'The plot displays a candlestick chart of 30 trading days (Jan
    02 to ~Feb 10, 2024) on a light gray background (#f8f9fa). Blue candlestick bodies
    represent bullish (up) days and red bodies represent bearish (down) days. Thin
    wicks extend above and below each body showing high-low range. The price starts
    around $145, rallies to a peak of ~$152 around Jan 16, then sells off to ~$134
