  image_description: 'The plot displays a spirometry flow-volume loop rendered in
    Highcharts. The title reads "spirometry-flow-volume · highcharts · pyplots.ai"
    in bold at the top, with a subtitle showing "Measured vs Predicted Normal · FVC:
    4.80 L · FEV1: 3.60 L · PEF: 9.50 L/s" in gray. The X-axis is labeled "Volume
    (L)" ranging from 0 to 5.5, and the Y-axis is labeled "Flow (L/s)" ranging from
    -8 to 10. The measured loop is drawn as a solid blue line (#306998) with zone
    coloring that darkens at higher flow values — the expiratory limb rises sharply
    to a peak near 9.5 L/s then declines roughly linearly, while the inspiratory limb
    forms a smooth U-shaped curve reaching about -6 L/s below the zero flow line.
    A dashed gray predicted normal loop overlays the measured loop, showing slightly
    larger values (predicted PEF ~10.8). Three annotated markers highlight key clinical
    values: an orange circle at PEF (9.5 L/s), a blue diamond at FEV1 (3.6 L), and
    a teal square at FVC (4.80 L). A "Zero Flow" label sits on a dashed horizontal
    reference line. The legend in the upper right distinguishes "Measured" (solid
    blue) and "Predicted Normal" (dashed gray). The background has a subtle white-to-light-gray
    gradient. Dot-style grid lines are faint. Overall the layout is clean, professional,
    and well-proportioned.'
