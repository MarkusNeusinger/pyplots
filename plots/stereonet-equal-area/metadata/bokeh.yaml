  image_description: 'The plot shows a lower-hemisphere equal-area (Schmidt net) stereonet
    rendered as a circle on a white 3600x3600 square canvas. The title "stereonet-equal-area
    · bokeh · pyplots.ai" is centered at top in large bold text. Cardinal directions
    N (largest, bold), S, E, W (bold) mark the perimeter at 0, 180, 90, 270 degrees
    respectively. Degree labels appear every 30 degrees (30, 60, 120, 150, 210, 240,
    300, 330) in gray text with degree symbols. Tick marks are drawn every 10 degrees
    with heavier marks at cardinal and 30-degree intervals. Inside the primitive circle,
    subtle light gray grid lines form small circles at 10-degree dip intervals and
    great circle arcs at 30-degree azimuth intervals. Three geological feature types
    are plotted: Bedding (blue #306998, approximately 40 poles clustered in the NW
    quadrant), Joints (orange #E8833A, poles near the S-SE region), and Faults (purple
    #8B5CF6, poles in the SW quadrant). Great circles are rendered as very faint lines
    (alpha approximately 0.18) for each feature type. Poles appear as solid dots (size=22)
    with white edge highlighting. A warm orange-red KDE density heatmap overlays the
    plot with three distinct hotspots around each pole cluster, transitioning from
    pale cream to deep brown-red. A density colorbar on the right side quantifies
    the KDE levels with a gradient from white through orange to dark red, labeled
    "Density" with numeric scale. A styled legend in the upper-right corner with white
    background and gray border lists all three feature types with colored markers.
    An italic subtitle at the bottom reads "Lower-hemisphere equal-area (Schmidt)
    projection · Click legend to toggle."'
