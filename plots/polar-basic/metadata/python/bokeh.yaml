review:
  strengths:
  - Clean polar-to-Cartesian coordinate conversion with midnight-at-top orientation
    matching time-data conventions
  - 'Correct Okabe-Ito palette usage: #009E73 as primary data color, orange (#D55E00)
    for trough annotation highlight'
  - Both themes handled correctly with theme-adaptive tokens (PAGE_BG, INK, INK_SOFT);
    backgrounds are warm off-white/near-black
  - Explicit font sizes set (32pt title, 22pt hour labels) ensuring readability at
    3600x3600 resolution
  - Realistic and engaging dataset (24-hour temperature cycle with daily pattern clearly
    visible)
  - 'Strong data storytelling: peak and trough annotations create clear focal points
    and narrative'
  - Concentric + spoke gridlines at appropriate opacity (10%) — subtle but informative
  - ColumnDataSource usage and HTML export leverage Bokeh's architecture correctly
  weaknesses:
  - 'Code/image discrepancy: the committed code lacks the filled polygon patch, radial
    temperature scale labels (5°C–30°C), and peak/trough annotations visible in the
    images — these appear in the generated images but not in the current bokeh.py,
    suggesting images were generated from a different code version'
  - 'HoverTool is absent: Bokeh''s most distinctive feature for a polar chart would
    be hover tooltips showing hour and temperature per point; ColumnDataSource is
    set up for it but no HoverTool is wired'
  - 'Canvas utilization: significant whitespace at the top (title to 00:00 label)
    leaves the polar chart shifted toward the lower-center of the 3600×3600 canvas'
  - 'Dark render fill contrast: the translucent green fill on near-black background
    has lower contrast than the light render; fill alpha or fill color could be adjusted
    for dark theme to improve visibility'
  - 'LM-02: No Bokeh-distinctive interactive features (HoverTool, select tools, or
    callbacks) despite HTML export being available'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface, not pure white
      Chrome: Title "polar-basic · bokeh · anyplot.ai" in dark ink at top center, readable. Hour labels (00:00, 03:00, 06:00, 09:00, 12:00, 15:00, 18:00, 21:00) in muted dark gray around perimeter, readable. Radial temperature scale labels (5°C, 10°C, 15°C, 20°C, 25°C, 30°C) in muted gray on right side, readable. Concentric circle gridlines and spoke gridlines at very low opacity (10%), subtle but visible.
      Data: Closed polar polygon in brand green (#009E73) with translucent green fill. Small green scatter dots at each of 24 hourly data points with white outline. Orange dot and "Trough 5.1°C" annotation near center-top for the daily low (~04:00). Green "Peak 23.4°C" annotation near bottom for the daily high (~14:00). Small gray center marker. Data colors are correct Okabe-Ito: green (#009E73) primary, orange (#D55E00) for trough highlight.
