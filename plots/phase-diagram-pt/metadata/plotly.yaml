  - Triple point annotation arrow is still somewhat long, adding visual weight
  image_description: 'The plot shows a Water P-T Phase Diagram on a clean white background
    (plotly_white template). The x-axis displays Temperature (K) from 200 to 800,
    and the y-axis shows Pressure (Pa) on a logarithmic scale from 1 to 10B. Three
    distinctly colored phase boundary curves are drawn: a dark blue sublimation curve
    from ~200 K rising to the triple point, a purple vaporization curve sweeping from
    the triple point to the critical point, and a teal green melting curve rising
    nearly vertically from the triple point with water''s characteristic negative
    slope. The triple point is marked with a red diamond at (273.16 K, 611.73 Pa)
    with an arrow annotation. The critical point is marked with an orange star at
    (647.1 K, 2.206e7 Pa) with a shorter arrow annotation. Large semi-transparent
    gray labels (SOLID, LIQUID, GAS) mark their respective phase regions, with a smaller
    Supercritical Fluid label in the upper right. Subtle colored rectangular fills
    shade each phase region. Dashed orange lines extend from the critical point upward
    and rightward to delineate the supercritical boundary. A legend in the upper left
    lists all five trace entries. Log Scale / Linear Scale toggle buttons appear at
    the bottom right.'
