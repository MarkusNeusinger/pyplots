  image_description: 'The plot displays a spirometry flow-volume loop on a light gray
    (#fafafa) background. A solid blue (#306998) measured curve forms the characteristic
    loop: the expiratory limb rises sharply to PEF (~9.5 L/s) near 0.5L volume then
    declines roughly linearly to FVC at ~4.2L, while the inspiratory limb curves symmetrically
    below zero reaching ~-6.5 L/s. A dashed gray (#777777) predicted normal loop overlays
    the measured, extending to ~4.8L volume and ~10.8 L/s PEF. A subtle light blue
    shaded patch fills the gap between measured and predicted expiratory limbs, highlighting
    the diagnostic difference. PEF is marked with a red (#e63946) dot and bold red
    label "PEF = 9.5 L/s". FEV1 is marked with a teal (#457b9d) dot labeled "FEV1
    = 3.3 L". A clinical values text box reads "FVC = 4.2 L | FEV1 = 3.3 L | FEV1/FVC
    = 79% | PEF = 9.5 L/s" in the lower portion. A dotted gray zero-flow reference
    line runs horizontally. Title "spirometry-flow-volume · bokeh · pyplots.ai" is
    at top-left. Legend in top-right shows "Measured" (solid) and "Predicted Normal"
    (dashed). X-axis: "Volume (L)", Y-axis: "Flow (L/s)". Only subtle dashed y-grid
    lines are shown; x-grid is removed.'
