  image_description: 'The plot displays a 10x10 heatmap-style loss development triangle
    on a dark (Darcula) background. Rows represent accident/origin years 2015-2024,
    columns represent development periods 1-10. Each cell is annotated with the cumulative
    claim amount formatted with thousands separators. Actual (observed) cells in the
    upper-left triangle have white borders, while projected (estimated) cells in the
    lower-right triangle have gold/orange borders with 70% opacity. The color gradient
    runs from light blue (low values ~8,000) to dark navy (high values ~82,000). Text
    color adapts - white on dark cells, dark on light cells - for readability. A bottom
    Factor row on a light gray background displays age-to-age development factors
    (2.500 down to 1.008) in bold blue text. The right side shows two legends: a continuous
    Cumulative Claims ($) color bar and a Cell Region legend with square markers for
    Actual (white border) and Projected (gold border). The subtitle reads Chain-Ladder
    Loss Triangle with actual vs projected distinction noted, and a caption notes
    Bottom row: Age-to-Age Development Factors.'
