review:
  strengths:
  - 'Excellent data storytelling: polarization narrative (Neutral shrinks 300→160,
    extremes grow) is immediately visible and compelling'
  - Custom diverging color palette (blue→gray→orange/red) communicates opinion polarity
    semantically
  - Smart opacity encoding (0.60 stable vs 0.22 changers) with correct z-ordering
    creates clear visual hierarchy
  - 'Perfect data quality: neutral topic, realistic survey scale, correct flow arithmetic'
  - Clean well-organized code with elegant flow sorting for proper layering
  weaknesses:
  - Seaborn barely used — only for styling (set_style, set_context), no seaborn plot
    functions; essentially a matplotlib implementation
  - Category labels at 11pt and count labels at 9pt are undersized for target resolution
  - Some very small changer flows barely perceptible at alpha=0.22
  - No explicit net flow highlighting as requested by the spec
  image_description: 'The plot displays an alluvial/Sankey-style diagram titled "alluvial-opinion-flow
    · seaborn · pyplots.ai" in bold black text at top. Four vertical stacked-bar columns
    represent survey waves (Q1 2025 through Q4 2025), connected by curved flow bands.
    Categories from bottom to top are: Strongly Agree (dark blue #306998), Agree (medium
    blue #5B9BD5), Neutral (gray #8C8C8C), Disagree (orange #E88C30), and Strongly
    Disagree (red-brown #C75533). Left-side labels show category names with initial
    counts (e.g., "Strongly Agree (n=120)"), right-side labels show final counts (e.g.,
    "Strongly Agree (n=210)"). Middle columns show count labels in white text inside
    bars (e.g., "n=250"). Flow bands connect corresponding categories between waves
    — stable flows (same category) rendered at higher opacity (0.60), changers at
    lower opacity (0.22). The polarization trend is visible: Neutral shrinks from
    300 to 160 while Strongly Agree grows from 120 to 210 and Strongly Disagree from
    100 to 180. An italic gray subtitle reads "Renewable Energy Survey · 1,000 respondents
    across 4 waves · Stable flows shown at higher opacity." White background, all
    spines and axes removed.'
