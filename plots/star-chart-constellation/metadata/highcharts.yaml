  strengths:
  - Exceptional design with radial gradient star markers creating realistic glow effect
  - Real astronomical data with correct RA/Dec/magnitude values for 70+ named stars
  - 'Comprehensive feature set: 15 constellations, ecliptic, Summer Triangle, background
    stars, coordinate grid'
  - Colorblind-safe palette with thoughtful color adjustments noted in comments
  - Interactive HTML version exported alongside static PNG
  - Strong data storytelling through magnitude-to-size/opacity mapping and Summer
    Triangle highlight
  weaknesses:
