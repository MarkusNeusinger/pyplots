# Cloud Build configuration for anyplot Backend API
substitutions:
  _SERVICE_NAME: anyplot-api
  _REGION: europe-west4
  _MEMORY: 1Gi
  _CPU: "1"
  _MIN_INSTANCES: "1"
  _MAX_INSTANCES: "3"
  # Cloudflare Access (Zero Trust) for /debug/* — the team domain is stable;
  # the AUD must be filled in once the Self-hosted Application is created in
  # the Cloudflare Zero Trust dashboard. With AUD unset (or with no email
  # in _ADMIN_ALLOWED_EMAILS), the JWT path in require_admin denies all and
  # only the X-Admin-Token fallback is active.
  _CF_ACCESS_TEAM_DOMAIN: "anyplot.cloudflareaccess.com"
  _CF_ACCESS_AUD: ""
  # Comma-separated. Browser users with a valid Cloudflare Access JWT but an
  # email not in this list get 403. Required for the JWT path to authorize
  # anyone.
  _ADMIN_ALLOWED_EMAILS: ""

steps:
  # Build the container image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "europe-west4-docker.pkg.dev/$PROJECT_ID/anyplot/${_SERVICE_NAME}:$BUILD_ID"
      - "-t"
      - "europe-west4-docker.pkg.dev/$PROJECT_ID/anyplot/${_SERVICE_NAME}:latest"
      - "-f"
      - "api/Dockerfile"
      - "."
    id: "build-image"

  # Push the container image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "europe-west4-docker.pkg.dev/$PROJECT_ID/anyplot/${_SERVICE_NAME}:$BUILD_ID"
    id: "push-image"
    waitFor: ["build-image"]

  # Push latest tag
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "europe-west4-docker.pkg.dev/$PROJECT_ID/anyplot/${_SERVICE_NAME}:latest"
    id: "push-latest"
    waitFor: ["build-image"]

  # Deploy to Cloud Run
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image=europe-west4-docker.pkg.dev/$PROJECT_ID/anyplot/${_SERVICE_NAME}:$BUILD_ID"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--memory=${_MEMORY}"
      - "--cpu=${_CPU}"
      - "--min-instances=${_MIN_INSTANCES}"
      - "--max-instances=${_MAX_INSTANCES}"
      - "--port=8000"
      - "--allow-unauthenticated"
      - "--add-cloudsql-instances=anyplot:europe-west4:anyplot-db"
      - "--set-secrets=DATABASE_URL=DATABASE_URL:latest,CACHE_INVALIDATE_TOKEN=CACHE_INVALIDATE_TOKEN:latest,ADMIN_TOKEN=ADMIN_TOKEN:latest"
      - "--execution-environment=gen2"
      - "--set-env-vars=^|^ENVIRONMENT=production|GOOGLE_CLOUD_PROJECT=$PROJECT_ID|GCS_BUCKET=anyplot-images|CF_ACCESS_TEAM_DOMAIN=${_CF_ACCESS_TEAM_DOMAIN}|CF_ACCESS_AUD=${_CF_ACCESS_AUD}|ADMIN_ALLOWED_EMAILS=${_ADMIN_ALLOWED_EMAILS}"
      - "--cpu-throttling"
      - "--concurrency=15"
      - "--timeout=600"
    id: "deploy"
    waitFor: ["push-image"]

  # Report deployed URL
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "services"
      - "describe"
      - "${_SERVICE_NAME}"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--format=value(status.url)"
    id: "get-url"
    waitFor: ["deploy"]

# Store image in Artifact Registry
images:
  - "europe-west4-docker.pkg.dev/$PROJECT_ID/anyplot/${_SERVICE_NAME}:$BUILD_ID"
  - "europe-west4-docker.pkg.dev/$PROJECT_ID/anyplot/${_SERVICE_NAME}:latest"

options:
  logging: CLOUD_LOGGING_ONLY

timeout: "1200s" # 20 minutes
