  strengths:
  - Perfect spec compliance with all required Pareto chart features including secondary
    axis, 80% threshold, and cumulative markers
  - Excellent realistic manufacturing defect data that naturally demonstrates the
    Pareto principle
  - Creative SVG injection technique to overcome pygal lack of native dual-axis support
  - Good visual storytelling through cumulative line and 80% threshold interaction
  - Clean custom legend with all three visual elements explained
  weaknesses:
  - Minor text congestion between cumulative percentage labels and bar value labels,
    especially on the first bar
  - SVG regex parsing is fragile and adds code complexity
  - Design is good but not yet publication-quality polish
  image_description: 'The plot displays a Pareto chart with 8 steel-blue bars sorted
    in descending order representing manufacturing defect counts: Scratches (142),
    Dents (98), Misalignment (84), Cracks (56), Discoloration (42), Warping (31),
    Contamination (18), and Burrs (9). A red cumulative percentage line with circular
    markers overlays the bars, rising from approximately 30% at Scratches to 100%
    at Burrs. A gray dashed horizontal line marks the 80% threshold, crossing around
    the Misalignment/Cracks boundary. The right side features a red secondary y-axis
    labeled "Cumulative %" with tick marks at 0%, 20%, 40%, 60%, 80%, and 100%. The
    primary y-axis shows "Frequency (Count)" from 0 to approximately 142. X-axis labels
    are slightly rotated showing defect type names. A custom legend at the bottom
    shows three items: blue square for "Defect Count", red line with dot for "Cumulative
    %", and dashed gray line for "80% Threshold". Title reads "bar-pareto · pygal
    · pyplots.ai" in the top center. White background with subtle horizontal grid
    lines.'
