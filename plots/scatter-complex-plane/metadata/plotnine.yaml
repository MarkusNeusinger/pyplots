  image_description: 'The plot displays a complex plane (Argand diagram) with the
    title "scatter-complex-plane · plotnine · pyplots.ai" at the top. The background
    is a very light gray (#FAFBFC) with subtle major gridlines. A dashed gray unit
    circle is centered at the origin with an italic "|z| = 1" label rotated at 45
    degrees. Gray reference axes pass through the origin. Ten complex numbers are
    plotted: five 5th roots of unity (omega0-omega4) in deep navy blue lying on the
    unit circle, and five arbitrary points (z1-z5) in warm orange at various positions
    across all four quadrants. Vectors with closed arrowheads extend from the origin
    to each point, colored by category. The roots of unity have a subtle halo ring
    effect for emphasis. Each point is annotated with a white-background label showing
    its name and rectangular form (e.g., "omega1 = 0.31+0.95i", "z1 = 1.50+0.70i").
    Axes are labeled "Re(z)" (x) and "Im(z)" (y) with tick marks at integers from
    -2 to 2. A bottom legend distinguishes "5th Root of Unity (|z| = 1)" from "Arbitrary
    Point". The aspect ratio is equal so the unit circle appears circular.'
