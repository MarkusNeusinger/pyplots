  image_description: The plot displays a psychrometric chart with dry-bulb temperature
    (°C) on the x-axis ranging from -10 to 50, and humidity ratio (g/kg) on the y-axis
    from 0 to 30. The saturation curve (100% RH) is drawn as a thick dark blue line
    forming the upper boundary. Nine additional RH curves (10%-90%) appear as lighter
    blue lines with percentage labels staggered at various temperatures along the
    right side. Dashed orange diagonal lines represent constant wet-bulb temperatures
    (0°C-30°C in 5°C increments), labeled near the saturation curve. Dashed teal/cyan
    diagonal lines show constant enthalpy values, with labels along the left edge.
    Dashed purple diagonal lines represent constant specific volume (0.75-0.95 m³/kg),
    labeled near the bottom-right. A translucent green shaded rectangle marks the
    comfort zone (~20-26°C, ~6-13 g/kg). A bold red process path with circular markers
    connects "Outdoor Air (35°C, 50% RH)" to "Supply Air (13°C, 100% RH)", illustrating
    a cooling and dehumidification process. The title reads "psychrometric-basic ·
    altair · pyplots.ai" with subtitle "Standard Atmosphere (101.325 kPa) · HVAC Air
    Properties". Background is a light gray (#fafbfc) with very subtle gridlines.
