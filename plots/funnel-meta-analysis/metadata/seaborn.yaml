  image_description: The plot displays a meta-analysis funnel plot with an inverted
    y-axis labeled "Standard Error" (0.0 at top, ~0.55 at bottom) and x-axis labeled
    "Log Odds Ratio (Drug vs Placebo)". The title reads "funnel-meta-analysis · seaborn
    · pyplots.ai" in medium-weight sans-serif. A solid blue vertical line marks the
    summary effect at -0.39, with a dotted gray line at 0 for the null effect. Dashed
    blue diagonal lines form the inverted funnel shape (pseudo 95% CI) with a very
    light blue shaded fill between them. Fifteen study points are plotted as circles
    with white edges, colored in three shades of blue by precision tier (dark blue
    = high precision near top, medium blue = moderate, light blue = low precision
    near bottom). Point sizes vary by inverse-variance weight. Two outlier studies
    ("Lee 2019" and "Martinez 2020") are annotated in italic gray text in the lower
    right, outside the funnel boundary, clearly indicating publication bias asymmetry.
    A subtle rug plot runs along the x-axis showing effect size distribution. The
    legend in the lower left lists summary effect, null effect, and three precision
    tiers. Top and right spines are removed. Grid is extremely subtle (alpha=0.12).
