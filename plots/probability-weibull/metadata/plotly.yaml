  image_description: 'The plot displays a Weibull probability plot for turbine blade
    fatigue-life data on a light gray-white background. The x-axis is logarithmic,
    labeled "Time to Failure (hours)" ranging from ~600 to 10,000 with subtle minor
    gridlines. The y-axis uses a linearized Weibull scale labeled "Cumulative Failure
    Probability (Weibull Scale)" with custom probability tick labels at 1%, 2%, 5%,
    10%, 20%, 50%, 63.2%, 90%, 95%, and 99%. Twenty-five large filled blue circle
    markers (#306998) with white edge highlights represent failure data points, arranged
    approximately along a straight line (correct for Weibull probability paper). Five
    orange-red hollow diamond markers (#E85D3A) represent censored/suspended observations.
    A solid blue fitted line (width 3.5) runs through the data. A light blue 90% confidence
    band (filled area) surrounds the fitted line. A dotted gray horizontal reference
    line at 63.2% is annotated "63.2% — characteristic life (η ≈ 4625h)". A dotted
    vertical line drops from the characteristic life intersection to the x-axis. A
    B10 life annotation with arrow points to the 10% probability level showing "B10
    = 2501h". A parameter annotation box in the lower-right displays "Weibull Parameters:
    β (shape) = 2.44, η (scale) = 4625h, R² = 0.9785" with a subtle border. The legend
    in the upper-left identifies four series: 90% Confidence, Weibull Fit, Failures,
    and Censored (suspended). Title reads "probability-weibull · plotly · pyplots.ai"
    centered at top.'
