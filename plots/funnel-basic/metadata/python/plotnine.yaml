review:
  strengths:
  - 'Perfect spec compliance: all spec features (trapezoidal segments, proportional
    widths, dual value+% labels, distinct Okabe-Ito colors) implemented correctly'
  - Creative use of geom_polygon within plotnine grammar of graphics to build a non-native
    chart type without falling back to matplotlib
  - 'Smart per-segment text contrast: dark INK on light amber fill in light mode shows
    accessibility awareness'
  - Both themes render correctly with right backgrounds and chrome tokens
  weaknesses:
  - 'Dark mode Purchase label (#F0EFE8 on #E69F00) has ~2.2:1 contrast — below WCAG
    AA; should always use dark ink (#1A1A17) for the amber segment regardless of theme'
  - No visual emphasis or focal point — the most dramatic drop-offs are not highlighted;
    add typographic hierarchy or annotation to guide the viewer
  - Data labels at size=14pt are below the 16pt recommendation for secondary text
    at 4800x2700px; bump to at least 16pt
  image_description: |-
