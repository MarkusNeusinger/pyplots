    (steel blue #306998 — Engineering, R&D, Data Science, QA), Revenue (salmon #E07A5F
    — Sales, Marketing, Support), Corporate (sage green #7B9E89 — Finance, HR, Legal),
    Operations (purple #8B6DA8 — Operations, IT, Security), and Product (yellow #FFD43B
    — Product, Design). Larger circles display department names and budget amounts
    in bold white text (or dark text for Product/yellow). Smaller circles (HR, Security,
    Legal with radius ≤50) are unlabeled but visible. A legend titled "Division" is
    positioned on the right. White strokes separate the circles, and the background
    is clean with no axes or gridlines. The packing is somewhat loose with noticeable
    gaps between circles, and one small Corporate circle appears near the far right
    edge.'
