  - Correct horizontal dumbbell chart using geom_segment + geom_point - idiomatic
    plotnine grammar
  - Data sorted by difference (ascending) which creates a clear narrative revealing
    which departments improved most vs. least
  - Full theme adaptation with all text elements (title, axis labels, tick labels,
    legend) using adaptive INK/INK_SOFT tokens for both light and dark renders
  - All font sizes explicitly set to spec (title=24, axis=20, ticks=16, legend=16)
