  strengths:
  - Excellent colorblind-friendly blue-to-red palette replacing typical green-red
    risk matrix convention
  - Smart label positioning with vertical offsets for same-cell risks prevents overlap
    elegantly
  - Professional design with dark label boxes, semi-transparent score numbers, and
    off-white background
  - Clean, well-structured code following KISS principles with idiomatic plotnine
    grammar
  weaknesses:
  - Risk label font size (7.5) could be slightly larger for optimal readability
  - Some extra vertical whitespace above/below the grid area
  - Color gradient deviates from spec green-yellow-orange-red (though blue-red alternative
    is arguably better)
  image_description: 'The plot displays a 5x5 risk assessment matrix with "Impact
    →" (Negligible, Minor, Moderate, Major, Catastrophic) on the x-axis and "Likelihood
    →" (Rare, Unlikely, Possible, Likely, Almost Certain) on the y-axis. Cells are
    colored using a blue-to-dark-red continuous gradient based on risk score (likelihood
    × impact), with low scores (1-4) in steel blue and critical scores (20-25) in
    deep red/maroon. Each cell shows its numeric risk score in the top-left corner
    in semi-transparent black bold text. 12 risk items are plotted as dark navy labeled
    boxes with white text (e.g., "Scope Creep", "Budget Overrun", "Data Breach").
    Cells sharing multiple risks (e.g., "Market Shift" and "Compliance Gap" in the
    Possible/Major cell) use vertical offsets to avoid overlap. A zone annotation
    above the grid reads "Zones: Low (1-4) · Medium (5-9) · High (10-16) · Critical
    (20-25)" in italic gray. The color legend on the right shows "Risk Score" with
    breaks at 1, 5, 10, 15, 20, 25. Dark cell borders delineate the grid. Background
    is off-white (#fafafa). Title is "heatmap-risk-matrix · plotnine · pyplots.ai"
    in bold centered text.'
