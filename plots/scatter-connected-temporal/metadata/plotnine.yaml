  image_description: The plot displays a connected scatter plot of the Phillips Curve
    relationship between Unemployment Rate (%) on the x-axis and Inflation Rate (%)
    on the y-axis for 1990-2020. Data points are connected by line segments in temporal
    order using geom_path. A light-to-dark blue color gradient encodes temporal progression
    from 1990 (light blue) to 2020 (dark navy). Each data point has a circular marker
    with a white stroke border. Key years (1990, 1995, 2000, 2005, 2015, 2020) are
    annotated with bold gray text labels positioned with custom offsets. The 2009
    recession point (highest unemployment ~9.6%, lowest inflation ~-0.4%) is highlighted
    with a larger red circle outline and a bold red "2009 Recession" annotation. A
    "Year" color gradient legend appears on the right. The title reads "Phillips Curve
    (1990-2020) · scatter-connected-temporal · plotnine · pyplots.ai" in bold. The
    background uses theme_minimal with very subtle grid lines.
