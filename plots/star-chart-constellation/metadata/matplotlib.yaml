  image_description: The plot displays a celestial star chart on a dark navy (#0A0A2A)
    background. Stars are rendered as white/pale-blue dots with sizes proportional
    to brightness (inverted magnitude mapping). 21 constellations are connected by
    thin, semi-transparent muted blue stick-figure lines. Constellation names appear
    in italic muted text below each group's centroid. The brightest stars (Sirius,
    Vega, Betelgeuse, Rigel, Arcturus, Capella, Altair, Aldebaran, Spica) are individually
    labeled. The x-axis shows Right Ascension from 24h to 0h (reversed, as is standard),
    and the y-axis shows Declination from -40° to +60°. A dashed coordinate grid overlays
    the chart. The title reads "star-chart-constellation · matplotlib · pyplots.ai".
    Approximately 300 faint background stars add depth. The overall aesthetic is atmospheric
    and evocative of a real night sky.
