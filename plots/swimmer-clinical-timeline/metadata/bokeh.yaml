  image_description: 'The plot displays a swimmer plot for a simulated Phase II oncology
    clinical trial with 25 patients. Horizontal bars represent individual patient
    timelines, sorted by treatment duration (shortest at top, longest at bottom).
    Bars are color-coded by treatment arm: steel blue (#306998) for Arm A (Combo)
    and bright yellow (#FFD43B) for Arm B (Mono). The x-axis shows "Time on Study
    (Weeks)" from 0 to ~55, and the y-axis lists patient IDs (PT-001 through PT-025).
    Clinical event markers are overlaid on bars: green triangles for partial response,
    pink/magenta stars for complete response, red diamonds for progressive disease,
    and orange squares for adverse events. Ongoing patients (PT-001, PT-011, PT-019,
    PT-009, PT-010) have right-pointing black triangles beyond their bar ends. The
    background is light gray (#fafafa), y-grid is subtle dashed lines, and x-grid
    is removed. A vertical legend in the bottom-right lists all arms and event types.'
