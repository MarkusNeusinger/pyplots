  image_description: The plot features a dark-themed two-panel layout. The top panel
    displays a waveform (golden/yellow line with subtle fill) showing audio amplitude
    over 4 seconds, with note labels (C4, E4, G4, C5, A4, F4, D4, C4) in golden text
    at the top and subtle dashed white boundary lines between notes. The bottom panel
    is a mel-spectrogram heatmap using the seaborn "mako" colormap (dark blue through
    teal to bright yellow-green). The x-axis shows time from 0.0 to 4.0 seconds with
    0.5s intervals. The y-axis shows mel-scaled frequency with Hz labels at 100, 200,
    500, 1k, 2k, 4k, and 8k Hz. A colorbar on the right shows Power (dB) from -80
    to 0. Harmonic annotations (f0, 2f0, 3f0) with yellow triangle markers appear
    on the final C4 note segment. The spectrogram clearly shows fundamental frequencies
    and harmonics for each note as bright horizontal bands, with onset transients
    visible as vertical bright lines. The title reads "spectrogram-mel · seaborn ·
    pyplots.ai" in white bold text.
