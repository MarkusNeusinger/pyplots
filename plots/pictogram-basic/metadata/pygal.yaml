review:
  strengths:
  - Creative use of pygal.Dot chart as pictogram approximation — best available chart
    type for this spec in pygal
  - Cohesive colorblind-safe palette with intentional warm-cool contrast and bold
    navy focal point for the leader
  - Clean, well-structured code with thoughtful partial-dot visibility threshold (min
    0.6)
  - Good data choice with mix of exact multiples and remainders demonstrating the
    pictogram concept
  - 'Refined visual appearance: no grid, transparent subtle foreground, generous margins,
    bottom legend'
  weaknesses:
  - Partial dots still rely on size reduction rather than partial-fill approach (library
    constraint)
  - Data storytelling limited to descending sort and color hierarchy — no stronger
    insight emphasis
  - Some wasted canvas space on right side for shorter categories
  image_description: 'The plot displays a dot matrix chart on a white background using
    pygal''s Dot chart type to approximate a pictogram. The title reads "Fruit Production
    by Type (each dot ≈ 5 000 tonnes)" with the subtitle "pictogram-basic · pygal
    · pyplots.ai". Five fruit categories are listed on the Y-axis in descending order:
    Apples (deep navy, 7 full-size dots spanning the full x-axis), Oranges (rich amber,
    4 full dots + 1 smaller partial), Bananas (teal, 3 full dots + 1 smaller partial),
    Grapes (deep violet, 3 full dots), and Mangoes (warm coral-red, 1 full dot + 1
    smaller partial). The X-axis shows cumulative scale labels: 5, 10, 15, 20, 25,
    30, 35. Full dots are large and uniform in size; partial dots are reduced in radius
    to indicate fractional remainders. A bottom legend displays all five categories
    with colored square indicators in a single row. The background is white with no
    grid lines, creating a clean, uncluttered appearance.'
