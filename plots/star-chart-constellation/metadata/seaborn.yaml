  image_description: The plot displays a star chart on a deep navy (#0a0e2a) background.
    Stars are plotted by Right Ascension (x-axis, reversed from 24h to 0h) and Declination
    (y-axis, -45° to +75°). Named constellation stars are colored using a YlOrBr_r
    colormap — brighter stars (lower magnitude) appear as lighter yellow/white and
    are larger, while dimmer stars are darker orange/brown and smaller. Approximately
    200 faint gray background stars are scattered across the chart. Blue-gray constellation
    stick-figure lines connect stars within 15 constellations (Orion, Ursa Major,
    Cassiopeia, Leo, Cygnus, Gemini, Taurus, Lyra, Aquila, Scorpius, Boötes, Perseus,
    Auriga, Canis Major, Andromeda). Constellation names appear in blue text near
    each group's centroid. The brightest stars (mag < 1.0) — Sirius, Rigel, Betelgeuse,
    Vega, Capella, Arcturus, Altair, Aldebaran — are individually labeled. Subtle
    dark blue grid lines mark RA/Dec intervals. Top and right spines are removed.
    The title reads "star-chart-constellation · seaborn · pyplots.ai".
