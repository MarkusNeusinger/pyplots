review:
  strengths:
  - Chemically accurate stoichiometric calculations produce a realistic titration
    curve
  - Excellent use of Bokeh model system (BoxAnnotation, Span, Label, HoverTool, extra_y_ranges)
  - Colorblind-safe Wong palette with intentional color assignments
  - Clean visual hierarchy with shaded regions, equivalence point annotation, and
    derivative overlay
  - Dual output (PNG + interactive HTML) leverages Bokeh strengths
  weaknesses:
  - Derivative spike is extremely narrow due to data nature, slightly hard to appreciate
    visually
  - Design could reach publication-level with more typographic refinement
  image_description: The plot displays an acid-base titration curve (HCl + NaOH) with
    a characteristic S-shaped sigmoidal curve in blue (#306998) plotting pH (y-axis,
    0-14) against volume of NaOH added in mL (x-axis, 0-50). A secondary y-axis on
    the right shows the derivative dpH/dV (mL⁻¹) in orange (#D55E00) as a dot-dash
    line, with a sharp spike at the equivalence point. The equivalence point at 25
    mL, pH 7.0 is marked with a green diamond marker and a vertical dashed green line,
    accompanied by a bold annotation label. Two semi-transparent shaded regions indicate
    the "Excess HCl Region" (0-15 mL, yellow tint) and "Excess NaOH Region" (35-50
    mL, blue tint) with italic labels. A subtle dotted gray line marks pH 7. The legend
    in the top-left corner shows entries for dpH/dV and pH with a white background
    and thin gray border. The background is light gray (#F7F7F7) with subtle dashed
    gridlines. Title reads "titration-curve · bokeh · pyplots.ai" in dark gray.
