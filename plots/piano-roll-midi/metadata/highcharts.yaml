review:
  strengths:
  - Excellent use of Highcharts xrange chart type — a natural fit for piano roll visualization
  - Musically authentic data with a real chord progression (C-Am-F-G) and realistic
    velocity dynamics
  - Black key row shading via plotBands adds genuine musical context
  - Beat/measure grid lines with differentiated weight effectively convey rhythmic
    structure
  - Custom velocity color interpolation (blue to purple to red) is domain-appropriate
  weaknesses:
  - No velocity color legend/colorbar to explain what colors mean to the viewer
  - Blue and purple tones are somewhat hard to distinguish for mid-range velocities
  - Helper function vel_to_color() breaks KISS pattern
  - Some empty pitch rows waste vertical space
  image_description: The plot displays a piano roll visualization of MIDI notes across
    32 beats (8 measures of 4/4 time). Horizontal bars represent individual notes,
    positioned vertically by pitch (B2 at bottom to C5 at top) and horizontally by
    time in beats. Bar length indicates note duration. Colors range from blue (soft/low
    velocity) through purple (medium) to red (loud/high velocity). The y-axis shows
    pitch names (C3, D3, E3, etc.) with alternating light gray bands marking black-key
    pitches (C#, D#, F#, G#, A#). Vertical grid lines mark beats, with thicker lines
    at measure boundaries (every 4 beats). The title reads "piano-roll-midi · highcharts
    · pyplots.ai". Bass notes (C3, E3, A3, F3, G3) appear as long sustained bars in
    the lower register, while shorter melody notes occupy the upper register. The
    chord progression (C-Am-F-G) is visually identifiable with velocity building toward
    the final measures. No color legend/colorbar is present to explain the velocity-to-color
    mapping.
