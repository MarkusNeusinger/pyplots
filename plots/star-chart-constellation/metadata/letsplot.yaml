review:
  strengths:
  - Excellent use of real astronomical data with accurate star positions and magnitudes
  - Thoughtful dark-sky aesthetic with glow halos creating visual hierarchy for brightest
    stars
  - Custom coordinate grid and magnitude legend are well-executed
  - Interactive tooltips leverage lets-plot distinctive capabilities
  - Comprehensive constellation coverage (13 constellations, 56 named stars)
  - Manual label offset tuning prevents most label-star collisions
  weaknesses:
  - Minor label proximity issues between Orion/Gemini constellation names
  - X-axis extends beyond data range to accommodate legend creating some dead space
  - No stereographic/azimuthal projection (acceptable limitation of lets-plot)
  image_description: 'The plot displays a star chart on a dark navy (#0a0e1a) background.
    Stars are plotted by Right Ascension (x-axis, 0h-22h) and Declination (y-axis,
    -30 to 60 degrees). Thirteen constellations are shown—Cassiopeia, Perseus, Taurus,
    Orion, Gemini, Canis Major, Leo, Bootes, Ursa Major, Lyra, Cygnus, Aquila, and
    Scorpius—each connected by thin semi-transparent light blue lines. Star sizes
    vary inversely with magnitude: the brightest stars (Sirius, Vega, Arcturus) appear
    as large pale-yellow dots with subtle glow halos, while fainter background stars
    are small gray dots. Constellation names are rendered in italic light blue text
    near each group''s centroid. A subtle dark blue RA/Dec coordinate grid overlays
    the chart. A custom magnitude legend in the right margin shows dot sizes for mag
    0-5. The title reads "star-chart-constellation · lets-plot · pyplots.ai" in light
    blue-gray bold text. A caption at the bottom right states "Star size ∝ brightness
    (lower magnitude = brighter)."'
