    are plotted: a solid blue line (Jan 2024 — Normal), a solid orange line (Jun 2024
    — Flat), and a dashed red line (Jul 2023 — Inverted). Each curve has circular
    markers with white borders. A light red shaded area highlights the inversion zone
    where short-term yields exceed the 30Y yield on the inverted curve. A red italic
    annotation reads "Inversion zone: short-term yields exceed long-term." The legend
    is positioned in the bottom-right corner with semi-transparent background. Only
    subtle dashed y-axis gridlines are shown. The title reads "U.S. Treasury Yield
