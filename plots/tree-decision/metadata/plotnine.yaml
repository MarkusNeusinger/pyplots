    into "Recovery (p=0.50)" → $200K and "No Recovery (p=0.50)" → -$100K, while "Cut
    Losses" is pruned leading to -$50K. A subtle blue glow highlights the optimal
    path segments. A star Optimal Path annotation in blue sits at the top-left with
    a small arrow. The legend at the bottom center shows all three node types horizontally.'
