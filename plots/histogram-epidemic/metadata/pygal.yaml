  image_description: 'The plot displays a stacked bar chart representing an epidemic
    curve for a respiratory outbreak over 90 days (Jan 15 to mid-April 2024). The
    x-axis shows "Date of Symptom Onset" with rotated labels at 45 degrees. Major
    labels include date anchors (Jan 15, Apr 13) and five intervention events marked
    with down-pointing triangle symbols: Cluster Identified, Contact Tracing, Quarantine
    Order, Vaccination Drive, and Outbreak Contained. The y-axis shows "New Cases
    (Daily)" from 0 to approximately 60. Three stacked series are displayed: Confirmed
    (steel blue), Probable (amber/golden), and Suspect (dark maroon). Two distinct
    epidemic waves are visible - a smaller first wave peaking around 38 cases at day
    20 and a larger second wave peaking around 55 cases at day 55 - showing a clear
    propagated transmission pattern. The background is warm off-white. Horizontal
    y-axis grid lines are subtle and dotted. Bars have slight rounding. Legend at
    bottom shows all three categories in a single row.'
