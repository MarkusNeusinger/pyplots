  - Clean professional financial aesthetic with custom color palette and refined grid
    styling
  - 'Good use of pygal-specific features: cubic interpolation, stroke_dasharray, per-series
    dot sizing, HTML export'
  - Perfect code quality with flat KISS structure, deterministic data, and clean imports
  weaknesses:
  - Red and dark red colors for inverted curve and inversion highlight are somewhat
    close in hue, reducing distinguishability
  - Could benefit from more visual differentiation between the main inverted curve
    and the inversion highlight series
  image_description: |-
    The plot displays three U.S. Treasury yield curves on a white background with a light gray (#FAFAFA) plot area. The title reads "U.S. Treasury Yield Curves · line-yield-curve · pygal · pyplots.ai" centered at the top. The x-axis is labeled "Maturity (Years)" with major tick labels at 1M, 1Y, 2Y, 5Y, 10Y, 20Y, and 30Y. The y-axis is labeled "Yield (%)" ranging from 0 to 5.5 with subtle dotted horizontal grid lines.

    Three smoothly interpolated (cubic) curves are shown: (1) A blue line for Jan 2021 (Normal) starting near 0% and rising gradually to ~1.87% at 30Y. (2) A dark amber/gold line for Dec 2018 (Flat) relatively flat between ~2.4% and ~3.0%. (3) A red line for Mar 2023 (Inverted) starting high at ~4.7%, peaking near 5.1% at short maturities, then declining to ~3.6% at 10Y.

    A fourth series highlights the 2Y-10Y inversion with a dashed dark red line connecting two larger dots at the 2Y (4.60%) and 10Y (3.58%) points, labeled "2Y-10Y Inversion (-102 bps)". The legend is positioned at the bottom with all four entries in a horizontal row. All data point dots are visible on the curves.
