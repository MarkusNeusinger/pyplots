  image_description: The plot displays a bump chart tracking Premier League standings
    for 6 football teams (Arsenal, Chelsea, Liverpool, Man City, Man United, Tottenham)
    over 6 match weeks. The Y-axis is "League Position" (inverted, rank 1 at top,
    6 at bottom) and the X-axis is "Match Week" (Week 1–6). Arsenal is drawn in dark
    blue (#306998) with a thicker line and larger dot markers, creating a clear visual
    focal point — it starts 3rd, rises to 1st by Week 3, and finishes 1st. Liverpool
    (red/salmon) starts 1st but drops mid-season. Man United (purple/mauve) declines
    from 2nd to 5th. Tottenham (teal) remains anchored at 6th throughout. Chelsea
    (gold) hovers mid-table, and Man City (green) is volatile. End-of-line text labels
    replace a traditional legend, positioned to the right of Week 6. The grid is subtle
    (dashed, low opacity), the view frame is removed, and the title "bump-basic ·
    altair · pyplots.ai" is centered at the top. Overall, a clean and well-composed
    bump chart with intentional visual hierarchy.
