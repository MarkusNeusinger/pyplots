  image_description: The plot displays a 16-QAM constellation diagram on a light gray
    (#F8F9FA) background with subtle alternating checkerboard shading for decision
    regions. Sixteen ideal constellation points are rendered as large red "X" markers
    (with white stroke path effects) at the standard ±1, ±3 grid positions on both
    I and Q axes. 1200 received symbols are scattered around these ideal points, colored
    by error magnitude using the inferno colormap with PowerNorm (dark purple = low
    error, through orange/red, to yellow = high error). A vertical colorbar on the
    right is labeled "Error Magnitude" with scale from ~0 to 1.0. Dashed gray decision
    boundaries at -2, 0, and 2 divide the I/Q plane into 16 regions. Subtle concentric
    circles (radius 0.5) surround each ideal point. The title reads "scatter-constellation-diagram
    · matplotlib · pyplots.ai". Axes are labeled "In-Phase (I)" and "Quadrature (Q)".
    A boxed annotation at bottom right shows "EVM = 14.0%", with italic gray text
    above it reading "SNR = 20 dB | 1200 symbols". A legend in the upper left identifies
    "Ideal symbols".
