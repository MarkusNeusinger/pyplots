  image_description: 'The plot displays a mild steel tensile test stress-strain curve
    rendered in Highcharts. The main curve is drawn in Python blue (#306998) showing
    the classic stress-strain shape: a steep elastic rise to ~250 MPa, a brief yield
    plateau, strain hardening up to ~400 MPa at ~0.22 strain, and necking down to
    ~300 MPa at fracture (0.35 strain). Three critical points are marked with distinct
    colored markers: a green circle for Yield Point (0.2% offset) at ~250 MPa, a blue
    diamond for Ultimate Tensile Strength at ~400 MPa, and a purple triangle for Fracture
    Point at ~300 MPa. An orange dashed 0.2% offset line is visible near the y-axis
    origin but is very short due to the narrow elastic strain range. Colored plot
    bands at the bottom label three regions: Elastic (teal), Strain Hardening (blue),
    and Necking (purple). Horizontal dotted reference lines mark σ_y = 250 MPa and
    UTS = 400 MPa on the right side. An annotation box "E = 210 GPa" with a blue border
    sits near the elastic region. The title reads "Mild Steel Tensile Test · line-stress-strain
    · highcharts · pyplots.ai" with a subtitle showing material properties. The legend
    is positioned in the top-right corner. Background is white with very subtle gridlines.'
