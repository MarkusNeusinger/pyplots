review:
  strengths:
  - Complete and correct Ichimoku implementation with all five components properly
    computed and plotted
  - Excellent synthetic data with multiple trending phases demonstrating bullish/bearish
    cloud transitions and crossover signals
  - Strong Bokeh idioms with ColumnDataSource, HoverTool, and proper Legend construction
  - Professional text sizing and visual refinement (subtle grid, removed ticks, clean
    axes)
  - Both PNG and HTML output leveraging Bokeh interactive capabilities
  weaknesses:
  - Red/green candlestick colors are not colorblind-accessible — consider teal/coral
    or blue/orange
  - Cloud boundary lines are faint (alpha 0.6) and could be more prominent
  - Design lacks stronger focal point or visual emphasis to guide viewer to key Ichimoku
    signals
  image_description: The plot displays an Ichimoku Cloud chart overlaid on candlestick
    price data spanning approximately April 2024 to November 2024, with prices ranging
    from ~$140 to ~$200. Green (bullish) and red (bearish) candlesticks are clearly
    visible throughout. The Tenkan-sen appears as a blue line and the Kijun-sen as
    a dark red line, both tracking the price action. The Chikou Span is rendered as
    a dashed purple line shifted into the past. The Kumo (cloud) is filled between
    Senkou Span A and B — teal/green for bullish zones and pink/red for bearish zones.
    The cloud extends approximately 26 periods beyond the last candlestick into the
    future, showing the projected support/resistance. A legend on the right side identifies
    all five components. The title reads "indicator-ichimoku · bokeh · pyplots.ai",
    the y-axis shows "Price ($)" with dollar formatting, and the x-axis shows "Date".
    The background is a subtle off-white with a light y-axis grid.
