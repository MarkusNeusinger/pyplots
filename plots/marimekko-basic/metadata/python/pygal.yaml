review:
  strengths:
  - Correctly implements a Marimekko chart using pygal's Graph extension pattern —
    the only viable approach since pygal has no native Marimekko type
  - 'Perfect Okabe-Ito palette compliance with #009E73 as first series and correct
    theme-adaptive chrome in both light and dark renders'
  - 'Strong spec compliance: variable bar widths proportional to column totals, proportional
    stacking, percentage annotations, and x-axis labels with width percentages all
    present'
  - Excellent data quality with a realistic, varied, neutral market share scenario
    (5 regions x 4 product categories) that demonstrates all Marimekko chart features
  weaknesses:
  - Missing x-axis title — only individual region names appear centered under bars,
    but no axis-level label like 'Region' or 'Market' is present
  - 'Bottom area is visually crowded: x-axis category labels and bottom legend items
    occupy the same horizontal zone, creating confusion about which elements are legend
    vs. axis labels'
  - No focal point or visual emphasis for data storytelling — all segments and regions
    are treated equally with no hierarchy to draw the viewer's eye to the key insight
    (e.g., Asia Pacific as the largest market at 32%)
