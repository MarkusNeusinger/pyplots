  image_description: The plot displays a phase-folded exoplanet transit light curve
    on a light gray (#F8F9FA) background. Blue (#306998) scatter points represent
    photometric measurements (600 points) spanning orbital phase 0.0 to 1.0 on the
    x-axis, with relative flux on the y-axis ranging from approximately 0.988 to 1.005.
