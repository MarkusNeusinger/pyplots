review:
  strengths:
  - Perfect spec compliance with all required P-P plot features plus a confidence
    envelope
  - Excellent real-world pharmaceutical QC data scenario with realistic right-skew
    pattern
  - Effective data storytelling through deviation color mapping, size encoding, and
    max deviation annotation
  - Clean code that avoids scipy dependency by using math.erf for normal CDF computation
  - Uses distinctive lets-plot features (flavor themes, layer tooltips)
  weaknesses:
  - Near-fit points (beige) blend with the solarized light background, reducing visibility
    of well-fitting data points
  - Size mapping makes small-deviation points very small, especially clustered at
    lower-left
  - Annotation text size (12) is slightly small relative to other text elements
  image_description: 'The plot displays a P-P (Probability-Probability) plot on a
    square canvas with a warm solarized light background. Data points are scattered
    along a 45-degree dashed gray reference line running from (0,0) to (1,1). Points
    are colored using a diverging red-to-beige-to-blue palette representing deviation
    from the diagonal: blue points (positive deviation, empirical > theoretical) cluster
    in the upper-center region around 0.6-0.7 on the x-axis, while red/salmon points
    (negative deviation) appear in the lower-center region around 0.2-0.5. A light
    blue confidence ribbon (95% Kolmogorov band) envelopes the diagonal. An italic
    annotation reads "Max deviation: +0.052" near the peak deviation area. The title
    "pp-basic · letsplot · pyplots.ai" is bold at top-left, with subtitle "QC Check:
    Tablet Weight Distribution vs. Normal Reference (n=200)". Axes are labeled "Theoretical
    CDF (Normal)" (x) and "Empirical CDF" (y), both ranging 0 to 1. A color legend
    for "Deviation (Empirical - Theoretical)" appears on the right side.'
