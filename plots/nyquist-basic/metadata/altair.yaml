    toward the origin, and the negative frequency branch (ω ≤ 0) in orange (#e07b39)
    mirrored above the real axis. A dashed gray unit circle is centered at the origin
    for reference. The critical point (-1, 0) is prominently marked with a bold red
    cross marker and labeled "(−1, 0)" in red text. Frequency annotations appear as
    filled blue circles with text labels: ω = 0.5 and ω = 1.0 on the lower portion
    of the positive branch, ω = 5.0 near the origin, and ω ≈ 2.7 (|G|=1) marking the
    gain crossover. Triangle-shaped direction arrows on both branches indicate increasing
    frequency. The title reads "nyquist-basic · altair · pyplots.ai" with a subtitle
    showing the transfer function. Axes are labeled "Real" and "Imaginary". The legend
    in the top-right corner distinguishes the two branches.'
