review:
  strengths:
  - Conditional coloring (blue for above-target, brown for below-target) creates immediate
    visual storytelling and clear data narrative
  - All font sizes explicitly set throughout, ensuring readability at full resolution
  - 'Excellent use of Altair declarative grammar: alt.condition(), x/x2 range encoding,
    and layered composition'
  - Normalization to percentage-of-goal enables fair comparison across metrics with
    different scales
  - Realistic neutral business KPI data with good feature coverage (mix of above and
    below target)
  - Clean code structure with no unnecessary complexity
  weaknesses:
  - Vertical spacing between bullet rows is slightly excessive (paddingInner=0.35);
    tighter packing would improve canvas utilization
  - Chart height (700px) does not target the 900px standard for 16:9 output at scale_factor=3.0
  image_description: 'The plot displays four horizontal bullet charts stacked vertically
    for business KPI metrics: Revenue ($K), Profit ($K), New Customers, and Satisfaction.
    Each bullet has three grayscale background bands (light gray for Poor, medium
    gray for Satisfactory, darker gray for Good) extending across a shared x-axis
    labeled "Performance (% of Goal)" ranging from 0 to 120. The actual performance
    bars are colored Python Blue (#306998) for metrics exceeding their targets (Revenue
    at 275, New Customers at 320) and warm brown (#8B4513) for metrics below target
    (Profit at 85, Satisfaction at 4.2). Thick dark vertical tick marks indicate targets.
    Bold value labels appear at the end of each bar in color-matched text. The title
    "bullet-basic · altair · pyplots.ai" is centered at the top in large font. A horizontal
    legend at the bottom shows the three performance bands (Poor, Satisfactory, Good).
    The metric labels on the y-axis are bold and clearly readable. The overall design
    is clean with no grid lines or view strokes, and the conditional coloring immediately
    communicates which metrics are above vs below target.'
