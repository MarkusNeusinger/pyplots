review:
  strengths:
  - Clean synthetic audio data with harmonics and realistic amplitude envelope creating
    a believable waveform
  - Appropriate downsampling strategy (800 points) to handle pygal SVG rendering limitations
  - Perfect code quality with clean linear structure and all explicitly set style
    parameters
  - Dashed zero reference line adds useful visual context
  weaknesses:
  - Font sizes render too small on the 4800x2700 canvas — title_font_size=28 and label_font_size=18
    need to be significantly larger
  - No visual hierarchy or storytelling emphasis — the decaying waveform tells a natural
    story but nothing in the design emphasizes it
  - Default-level aesthetic — could benefit from removing chart chrome, using a more
    refined color, or adding subtle design touches
  - X-axis uses milliseconds instead of seconds as suggested by the spec
  image_description: The plot displays an audio waveform as a filled XY area chart
    using pygal's Python Blue (#306998) color. The title "waveform-audio · pygal ·
    pyplots.ai" appears at the top. The x-axis is labeled "Time (ms)" with tick marks
    from 0 to approximately 150ms, and the y-axis is labeled "Amplitude" ranging from
    -1 to 1. The waveform shows a synthesized decaying sinusoidal signal with harmonics
    — high amplitude peaks (around 0.9) at the start that gradually decay over 150ms.
    The filled area extends symmetrically above and below a dashed zero reference
    line. Horizontal grid lines are visible on a white background. The overall layout
    is clean with balanced proportions.
