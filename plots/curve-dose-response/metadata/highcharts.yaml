    asymptote (~6%) for Compound A, and dotted horizontal lines mark half-maximal
    response levels for both compounds. The title reads "curve-dose-response · highcharts
    · pyplots.ai" with a subtitle showing EC₅₀ values. A floating legend with shadow
    sits in the top-right corner listing all series.
