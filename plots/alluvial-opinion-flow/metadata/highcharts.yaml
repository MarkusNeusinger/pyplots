  - Right-side margin leaves Q4 column labels somewhat close to the canvas edge
  image_description: 'The plot displays a Sankey/alluvial diagram tracking employee
    training satisfaction across 4 quarterly waves (Q1–Q4 2024). Five opinion categories
    are stacked vertically at each wave column: Strongly Agree (dark blue, #2166AC),
    Agree (light blue, #67A9CF), Neutral (gray, #878787), Disagree (salmon/orange,
    #EF8A62), and Strongly Disagree (dark red, #B2182B). Each node is labeled with
    the category name and respondent count in parentheses (e.g., "Strongly Agree (180)").
    Flows between columns represent opinion transitions — bold/opaque flows indicate
    stable opinions (same category across waves) while faint/transparent flows show
    opinion changes. The title reads "Employee Training Satisfaction · alluvial-opinion-flow
    · highcharts · pyplots.ai" in bold serif font, with a subtitle describing the
    survey question and sample size. Wave labels (Q1–Q4 2024) appear at the bottom
    of each column. A custom HTML legend at the bottom shows the five category color
    swatches and explains "Bold flow = stable opinion | Faint flow = opinion changed."
    The background is a light gray (#FAFAFA). Overall, the data shows growing agreement
    over time: Strongly Agree rises from 180 to 210 while Neutral decreases from 185
    to 140, with Strongly Disagree slightly increasing from 120 to 145, suggesting
    mild polarization.'
