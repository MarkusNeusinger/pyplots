      Background: Warm near-black surface (#1A1A17), not pure black
      Chrome: Title visible in light-colored text against dark background. Legend on right with light text, readable. No dark-on-dark text failures detected.
      Data: Square colors identical to light render (green, blue, orange, pink). Data colors preserved correctly across theme change—only chrome flips.
      Legibility verdict: PASS - all text and data readable against dark background, theme adaptation correct
