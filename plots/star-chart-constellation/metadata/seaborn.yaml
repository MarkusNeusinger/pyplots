review:
  strengths:
  - Exceptional design excellence with cohesive dark celestial theme that genuinely
    evokes a night sky
  - Comprehensive real astronomical data covering 15 constellations with accurate
    coordinates and magnitudes
  - Effective visual hierarchy through magnitude-based sizing and color warmth progression
  - 'Thoughtful details: Milky Way band, ecliptic line, glow effects on constellation
    lines, text path effects'
  - Clean, well-organized code with proper reproducibility
  weaknesses:
  - Axis label Right Ascension (degrees) conflicts with tick labels showing hours
    (0h-24h)
  - Subtitle claims Azimuthal Equidistant Projection but uses flat Cartesian projection
  - Minor label crowding in dense constellation regions (Orion, Lyra/Vega area)
  - Heavy reliance on matplotlib for most visual elements; seaborn used mainly for
    scatter plots
  image_description: The plot displays a dark navy celestial map plotting stars by
    Right Ascension (x-axis, reversed 24h to 0h) and Declination (y-axis, -45 to +75
    degrees). Stars are rendered as circles with sizes inversely proportional to apparent
    magnitude — brightest stars like Sirius and Vega appear as large pale-white/yellow
    circles, while fainter stars are small orange-brown dots. Fifteen constellations
    are connected by thin blue-gray stick-figure lines with a subtle glow effect.
    Constellation names appear in italic blue text near each group's centroid. The
    brightest stars (mag < 1.0) are individually labeled. A faint shaded Milky Way
    band sweeps across the chart, and a dashed ecliptic line is visible. A subtle
    RA/Dec coordinate grid underlies the plot. The legend in the lower left shows
    four magnitude classes with matching colors. The title follows the required format.
    A subtitle mentions Azimuthal Equidistant Projection though the actual projection
    is rectilinear/Cartesian.
