  - Colorbar lacks a descriptive label
  - Grid lines visible on dark background add visual noise
  - Colorbar top tick labels slightly cramped
  image_description: The plot displays an eye diagram as a 2D density heatmap on a
    black background using the Inferno colormap (black to purple to orange to yellow).
    Two horizontal high-density bands (yellow/orange) sit at the 0V and 1V signal
    levels, connected by sigmoid transitions at approximately 0.5 UI and 1.5 UI. A
    clear eye opening is visible in the center of the plot between the two transition
    regions. The x-axis is labeled "Time (UI)" ranging from 0 to 2, the y-axis is
    labeled "Voltage (V)" ranging from approximately -0.3 to 1.3. The title reads
    "eye-diagram-basic · bokeh · pyplots.ai" in the top-left. A colorbar on the right
    shows log-density values from 0 to ~3.5, though the topmost tick labels appear
    slightly cut off. Grid lines are faintly visible in dark gray against the black
    background.
