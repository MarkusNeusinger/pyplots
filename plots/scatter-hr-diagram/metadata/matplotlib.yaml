  image_description: 'The plot displays a Hertzsprung-Russell diagram on an off-white
    (#f5f5f0) background with a 16:9 aspect ratio. Stars are scattered across the
    plot as small colored dots (s=40, alpha=0.5) with white edge highlights. The x-axis
    shows "Surface Temperature (K)" reversed from ~45,000K (left) to ~2,000K (right)
    on a log scale, with a secondary top axis showing spectral classes O, B, A, F,
    G, K, M in serif font. The y-axis shows "Luminosity (L/L_sun)" on a log scale
    from 10^-5 to 10^6. Colors follow astrophysical convention: deep blue (O), medium
    blue (B), pale blue-gray (A), yellow-green (F), golden yellow (G), orange (K),
    and red (M). Four region labels in italic serif with semi-transparent background
    boxes mark "Supergiants" (top center), "Main Sequence" (diagonal, rotated ~-42
    degrees), "Red Giants" (right center), and "White Dwarfs" (bottom center). The
    Sun is marked with a large golden star marker with a shadow glow effect and bold
    "Sun" label. A legend in the lower-left shows all seven spectral types with matching
    colored dots. Title reads "scatter-hr-diagram · matplotlib · pyplots.ai" in serif
    font. Top and right spines are removed; remaining spines are thin gray. Subtle
    horizontal grid lines (alpha=0.12) aid reading.'
