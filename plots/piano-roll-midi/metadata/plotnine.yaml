    yellow (loud, ~120). Alternating row shading distinguishes black keys (slightly
    darker lavender) from white keys (lighter). Vertical dotted lines mark beats,
    solid gray lines mark measure boundaries at beats 0, 4, 8, 12, 16. Chord labels
    (I (C), IV (F), V (G), I (C)) appear at the top, and dynamic markings (mf, ff,
    dim., p) at the bottom. A red italic "← climax" annotation marks the C5 note.
    The title reads "piano-roll-midi · plotnine · pyplots.ai" in bold dark text. A
    velocity colorbar legend is on the right side.
