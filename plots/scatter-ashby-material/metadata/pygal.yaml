  - Title adds descriptive prefix before the required spec-id format
  - No true convex-hull envelopes or bubble regions — relies on large dots to suggest
    clusters
  image_description: 'The plot displays an Ashby material selection chart on a log-log
    scale with Density (kg/m³) on the x-axis and Young''s Modulus (GPa) on the y-axis.
    Seven material families are plotted as large colored dots: Metals (steel blue,
    upper right, densely clustered around 7000-19300 kg/m³ and 45-411 GPa), Ceramics
    (brick red, upper area around 2400-15600 kg/m³ and 65-680 GPa), Polymers (teal/cyan,
    middle band around 900-2200 kg/m³ and 0.5-3.6 GPa), Composites (golden amber,
    middle-upper around 1100-2900 kg/m³ and 8-210 GPa), Elastomers (purple, lower
    region around 860-1850 kg/m³ and 0.001-0.025 GPa), Foams (neutral gray, lower-left
    around 25-500 kg/m³ and 0.012-3.5 GPa), and Natural Materials (earth brown, mid-range
    around 160-1900 kg/m³ and 0.3-20 GPa). Each family has a bold colored label with
    white stroke placed near its cluster centroid. Two dashed gray diagonal guide
    lines show E/ρ = 0.01 and E/ρ = 10⁻⁴ performance indices. The title reads "Density
    vs Young''s Modulus · scatter-ashby-material · pygal · pyplots.ai". A horizontal
    legend at the bottom lists all 7 families with colored boxes. The plot background
    is light gray (#f5f6f8) against a white canvas.'
