    10-Day MA in purple. An annotation with an arrow reads "Peak $152" pointing to
    the highest close. The title "candlestick-basic · seaborn · pyplots.ai" appears
    at the top. The y-axis reads "Price ($)" and x-axis reads "Date" with labels every
    5 trading days (Jan 02, Jan 09, Jan 16, Jan 23, Jan 30, Feb 06). A legend in the
    upper left contains Bullish, Bearish, 5-Day MA, and 10-Day MA entries. Top and
    right spines are removed. Subtle horizontal gridlines appear with very low opacity.
    The chart fills the canvas well with balanced margins.'
