  - 'Wrong output filenames: plot.png/plot.html must become plot-{THEME}.png/plot-{THEME}.html
    matching the ANYPLOT_THEME env var'
  - 'Wrong branding in code (line 229): pyplots.ai must be anyplot.ai'
  - 'Canvas underutilization: large empty areas above/below the chart; consider increasing
