  image_description: The plot shows a seaborn clustermap combining hierarchical clustering
    dendrograms with a heatmap of iris flower measurements. The row dendrogram (left
    side) shows how 30 iris samples cluster hierarchically using Ward's method, with
    Setosa samples clearly separating from Versicolor/Virginica. A column dendrogram
    (top) clusters the four features. The heatmap uses the viridis colormap (yellow-green-teal-purple)
    to encode feature values. A "Species" color strip on the left marks samples by
    species using blue (#306998, Setosa), orange (#E8843C, Versicolor), and green
    (#4EA86B, Virginica). Y-axis labels are color-coded by species and show sample
    identifiers like "Setosa-1". X-axis labels show "Sepal Length", "Petal Width",
    "Sepal Width", "Petal Length" (reordered by clustering). A species legend sits
    to the right of the heatmap. Title reads "dendrogram-basic · seaborn · pyplots.ai"
    at the top. A colorbar labeled "Feature Value" is in the upper left.
