  image_description: 'The plot displays a water pressure-temperature phase diagram
    with a logarithmic y-axis (Pressure in Pa, from ~1 to 10^9) and linear x-axis
    (Temperature in K, from 200 to 700). Three phase boundary curves are drawn: a
    blue Solid-Gas (Sublimation) curve from lower-left to the triple point, an orange/amber
    Liquid-Gas (Vaporization) curve from the triple point up to the critical point
    at upper-right, and a purple Solid-Liquid (Melting) curve going nearly vertically
    upward from the triple point with a negative slope (correct for water). The three
    phase regions are labeled in large gray bold text: SOLID (upper-left), LIQUID
    (upper-right), GAS (lower-right). Subtle background fills distinguish regions:
    pale indigo for solid, pale teal for liquid, pale yellow for gas. The triple point
    (273.16 K, 611.73 Pa) and critical point (647.1 K, 22.06 MPa) are marked with
    dark diamond markers and annotated with text labels. The legend at the bottom
    identifies the three boundary curves. The title reads "phase-diagram-pt · letsplot
    · pyplots.ai".'
