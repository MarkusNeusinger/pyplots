  - Some vertical space between legend area and x-axis labels is underutilized
  - Dependency arrows at size=1.5 are slightly thin relative to task bar weight
  image_description: 'The plot displays a Gantt chart for a software development lifecycle
    with 4 phases (Requirements, Design, Development, Testing) containing 12 tasks
    total. Group header bars are rendered in dark navy (#1a365d) spanning each phase''s
    full timeline. Individual task bars are color-coded by phase: steel blue for Requirements,
    amber/orange for Design, teal/cyan for Development, and purple/lavender for Testing.
    Dependency arrows connect tasks using three distinct colors: orange for Finish-to-Start,
    light blue for Start-to-Start, and purple for Finish-to-Finish. Task names appear
    left-aligned to the left of their bars; group names appear right-aligned to the
    right of group bars. Alternating subtle background bands (#F0F4F8/#FAFBFC) distinguish
    phase regions. The x-axis shows weekly date labels from Jan 01 to Mar 25 at 45-degree
    rotation with label "Project Timeline (2024)". A dependency type legend with colored
    arrow samples sits in the lower-right area. Title reads "gantt-dependencies ·
    letsplot · pyplots.ai" with subtitle "Software development lifecycle — task dependencies
    and critical path across phases".'
