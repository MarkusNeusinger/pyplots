  image_description: |-
    The plot displays an Ichimoku Cloud technical indicator chart overlaid on candlestick price data spanning approximately May 2024 to October 2024. The y-axis shows "Price (USD)" with dollar-formatted values from ~$125 to ~$165, and the x-axis shows "Date" with monthly labels rotated ~30 degrees.

    Candlesticks use blue (#1565c0) for bullish days and orange (#e65100) for bearish days, with clear wicks and bodies. The Tenkan-sen (conversion line, period 9) is drawn as a solid blue line, and the Kijun-sen (base line, period 26) as a solid orange line — both prominent over the price action. The Chikou Span appears as a purple dashed line shifted backward 26 periods.

    The Kumo (cloud) is filled between Senkou Span A and B with light blue fill for bullish regions and light salmon/orange fill for bearish regions. Cloud transitions are clearly visible showing trend changes. Boundary lines for both spans are drawn with reduced alpha.

    Two TK crossover annotations are visible: a red "TK↓" near the top-left marking a bearish crossover, and a blue "TK↑" around August 2024 marking a bullish crossover. A comprehensive legend at the bottom center (4 columns, 2 rows) identifies all 7 elements. The title reads "indicator-ichimoku · matplotlib · pyplots.ai". Top and right spines are removed, with a subtle y-axis grid on a light gray (#fafafa) background.
