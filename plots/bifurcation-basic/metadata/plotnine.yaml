review:
  strengths:
  - Excellent use of geom_bin2d for density-based bifurcation rendering — a creative
    and idiomatic plotnine approach
  - Strong dark-theme design with cohesive blue-gold color palette and red annotation
    accents
  - Clear data storytelling with annotations guiding the viewer through the period-doubling
    cascade
  - Full spec compliance with all required features implemented
  - Clean, deterministic code with appropriate complexity
  weaknesses:
  - Chaotic region (r > 3.57) is somewhat faint — windows of periodicity within chaos
    are hard to discern due to bin2d density spread
  image_description: The plot displays a bifurcation diagram of the logistic map on
    a dark (#0d1117) panel background. The x-axis shows "Growth Rate (r)" ranging
    from 2.50 to 4.00, and the y-axis shows "Steady-State Population (x)" from 0.0
    to 1.0. The title reads "bifurcation-basic · plotnine · pyplots.ai" in bold dark
    text. The bifurcation structure is rendered using a 2D histogram (geom_bin2d)
    with a custom gradient from dark blue through medium blue to gold/yellow, creating
    a density-based visualization. A stable fixed-point line is visible as a bright
    gold curve from r=2.5 to r≈3.0, where it splits into two branches (period-2).
    Further period-doubling is visible at r≈3.449 (period-4) and r≈3.544 (period-8),
    leading into a chaotic regime rendered in lighter blue/gray tones. Three red dashed
    vertical lines mark the bifurcation points, with red bold text annotations ("Period-2
    r ≈ 3.0", "Period-4 r ≈ 3.449", "Period-8 r ≈ 3.544"). Two white-background label
    annotations read "Stable Fixed Point" (left, blue text) and "Chaos" (right, gold
    text). The outer plot background is light gray (#fafafa), and grid lines on the
    dark panel are very subtle dark blue.
