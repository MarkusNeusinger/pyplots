  image_description: The plot displays a spirometry flow-volume loop on a 16:9 landscape
    canvas. The measured loop is drawn as a solid blue (#306998) line at 3.5pt width,
    showing a sharp rise to Peak Expiratory Flow (8.5 L/s) followed by a gradual decline
    in the expiratory limb, and a symmetric U-shaped inspiratory limb below zero.
    A dashed gray (#999) predicted normal loop overlays the measured data, with a
    light red/pink shaded area between the two highlighting the "Obstruction gap."
    The PEF point is marked with a blue dot (s=250) and annotated with an arrow. Directional
    labels ("EXPIRATION →" / "← INSPIRATION") in semi-transparent blue orient the
    viewer. A monospace clinical text box in the upper right displays FVC=4.2L (pred
    4.8), FEV₁=3.1L (pred 4.0), FEV₁/FVC=74%, PEF=8.5 L/s (pred 10.2). Three directional
    arrows appear on the measured loop. Legend in lower left shows Obstruction gap,
    Predicted Normal, and Measured. Top/right spines removed, subtle y-axis grid at
    alpha=0.15. Title reads "spirometry-flow-volume · matplotlib · pyplots.ai".
