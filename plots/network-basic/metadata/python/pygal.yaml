review:
  strengths:
  - Custom spring/force-directed layout algorithm implemented from scratch with numpy
    — robust and deterministic with seed
  - Good use of pygal XY chart to represent network nodes and edges as separate series
  - Realistic social network data (named people, community structure, cross-group
    bridges) scores well on data quality
  - Hiding edges series from legend by passing None as title is idiomatic pygal usage
  - Interactive tooltips encode node degree information effectively
  - Clean, linear code structure with no unnecessary abstractions
  weaknesses:
  - 'CRITICAL: No ANYPLOT_THEME handling — code ignores os.getenv(ANYPLOT_THEME);
    both renders would produce identical white-background output'
  - 'CRITICAL: background=white and plot_background=white — must be #FAF8F1 (light)
    or #1A1A17 (dark) based on theme'
  - 'CRITICAL: Colors are not Okabe-Ito — uses #306998 (Python Blue), #FFD43B, #4CAF50,
    #FF7043 instead of canonical Okabe-Ito palette'
  - 'CRITICAL: Saves as plot.png/plot.html instead of plot-{THEME}.png/plot-{THEME}.html'
  - 'CRITICAL: Title says pyplots.ai instead of anyplot.ai'
  - Manual HTML generation with hardcoded object tag — should use chart.render() for
    proper interactive pygal output
  - Significant empty vertical space (upper/lower thirds of 16:9 canvas unused)
  - 'foreground_subtle uses #666666 in both themes instead of being theme-adaptive'
