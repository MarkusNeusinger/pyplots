  image_description: The plot displays a treemap visualization representing world
    population by country, grouped into five continents. Each rectangle's area is
    proportional to the country's population in millions. Asia (deep steel blue) dominates
    with India (1,441M) and China (1,425M) as the two largest rectangles. Africa (rich
    amber) includes Nigeria (224M), Ethiopia (126M), and others. Americas (warm coral/red)
    features the United States (340M) and Brazil (216M). Europe (forest green) shows
    Russia (144M), Germany (84M), UK (68M), France (68M), Italy (59M), and Spain (48M).
    Oceania (plum purple) has only Australia (27M) as a tiny sliver. Each rectangle
    shows the country name label and formatted population value (e.g., "1,441M").
    The title reads "World Population Cartogram — Area Proportional to Population
    (millions) · cartogram-area-distortion · pygal · pyplots.ai". A horizontal legend
    at the bottom identifies the five continent color categories. Background is clean
    white with subtle spacing between rectangles.
