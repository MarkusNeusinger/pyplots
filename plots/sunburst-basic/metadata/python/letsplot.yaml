review:
  strengths:
  - Correctly builds a full 3-level sunburst using polygon primitives — the right
    approach for lets-plot where no native sunburst geom exists
  - Elegant graduated-shade color families (Okabe-Ito base to lighter pastels) create
    beautiful visual coherence and immediate branch recognition
  - Clean theme with all axes/grid/legend removed; ring gap separators in light mode
    are visually refined
  - Title, background, and main chrome correctly use theme-adaptive tokens
  - Realistic, neutral organizational budget data with good value spread
  weaknesses:
  - Level-2 and level-3 geom_text labels hardcode color="#1A1A17" instead of using
    INK_SOFT theme token — not theme-adaptive
  - Level-3 outer-ring labels use size=9 which is below the 16pt guideline; should
    be increased to at least 11pt
  - 'In dark mode, color=PAGE_BG for polygon borders becomes #1A1A17, creating heavy
    black inter-level separator rings that look less refined than the light mode elegant
    white gaps'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, non-pure-white surface
      Chrome: Title "sunburst-basic · letsplot · anyplot.ai" centered at top in dark INK (#1A1A17) — readable. No axis labels or ticks (void theme). Ring separators are warm off-white (PAGE_BG) — elegant.
      Data: Level-1 center disc uses Okabe-Ito positions 1-3: Eng=#009E73, Sales=#D55E00, Mktg=#0072B2. Level-2 ring uses graduated lighter shades of parent colors. Level-3 outer ring uses even lighter pastels. All data colors correctly follow Okabe-Ito with branch-graduated shading.
      Legibility verdict: PASS — all text readable; white bold labels on solid center, dark labels on pastel rings

    Dark render (plot-dark.png):
      Background: Near-black #1A1A17 — correct warm dark surface
      Chrome: Title appears as light text (INK=#F0EFE8 in dark mode) — readable. ISSUE: Level-2 and level-3 geom_text uses hardcoded color="#1A1A17" — these are dark labels on pastel segments; readable due to contrast with light segment colors, but not theme-adaptive. Inter-level separator rings become heavy black bands (color=PAGE_BG=#1A1A17 in dark mode).
      Data: Data colors are identical to light render — Okabe-Ito positions 1-3 in center, graduated pastels in outer rings. Colors do not change between themes as required.
      Legibility verdict: PASS — all labels readable (dark text on pastel segments provides adequate contrast); title readable; no dark-on-dark failure for data labels, but chrome token compliance partial
