  image_description: The plot displays a Weibull probability plot for turbine blade
    fatigue life. The x-axis shows "Time to Failure (hours)" on a logarithmic scale
    from 1,000 to 18,000, and the y-axis shows "Cumulative Failure Probability" on
    a linearized Weibull scale from 1.0% to 99.0%. Blue filled circles represent failure
    data points (~25), and orange hollow diamond markers represent censored (suspended)
    observations (~7). A red dashed line shows the Weibull fit passing through the
    data. A horizontal gray dotted reference line marks the 63.2% characteristic life
    level. A B10 life annotation with an arrow points to a red square marker at approximately
    3,223 hours (10% failure probability). A parameter box in the lower right displays
    β = 2.16 (shape), η = 9133 h (scale), and R² = 0.9548 in monospace font with a
    rounded border. A subtle blue rug plot along the x-axis shows failure time density.
    The legend in the upper left lists Failure, Censored (suspended), and Weibull
    fit. Top and right spines are removed, and a subtle y-axis grid is visible. The
    title reads "Turbine Blade Fatigue Life · probability-weibull · seaborn · pyplots.ai".
