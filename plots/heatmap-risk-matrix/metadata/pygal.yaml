  image_description: 'The plot displays a 5x5 risk assessment matrix with "LIKELIHOOD"
    on the y-axis (1. Rare through 5. Almost Certain) and "IMPACT" on the x-axis (1.
    Negligible through 5. Catastrophic). Cells are color-coded using a four-tone palette:
    light blue for Low (scores 1-4), yellow for Medium (5-9), orange for High (10-16),
    and deep red for Critical (20-25). Each cell shows its risk score in large bold
    text and a zone label beneath it. Fourteen risk items are plotted as colored circle
    markers with text labels: blue circles for Technical risks (Server Outage, Data
    Breach, Tech Debt, Cyber Attack), purple for Financial (Budget Overrun, Currency
    Risk, Market Shift), orange for Operational (Vendor Delay, Staff Turnover, Scope
    Creep, Key Person), and teal for External (Reg. Change, Supply Chain, Pandemic).
    Cells have rounded corners with white borders. A legend on the right side shows
    both Risk Zones and Risk Categories. The title reads "heatmap-risk-matrix · pygal
    · pyplots.ai". X-axis labels are rotated at -35 degrees.'
