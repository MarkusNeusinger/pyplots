  strengths:
  - Excellent use of FancyBboxPatch for rounded corners on both bars and bands, adding
    professional polish
  - Semantic color coding (blue = above target, red = below target) creates immediate
    visual narrative
  - Well-chosen realistic KPI data with varying scales and a good mix of above/below
    target results
  - 'Clean, minimal visual design: 3 spines removed, subtle grid, hidden y-ticks,
    generous spacing'
  - Perfect spec compliance with all required bullet chart features present and correct
  weaknesses:
  - Legend fontsize at 14pt is below the library-recommended 16pt (minor, justified
    by 6-item layout)
  - Color accessibility could be improved with a pattern or more colorblind-safe alternative
    to blue/red
  image_description: The plot displays five horizontal bullet charts stacked vertically,
    representing a Quarterly KPI Dashboard. The metrics are Revenue (92%), Profit
    Margin (38%), Customer Growth (71%), Satisfaction (84%), and On-Time Delivery
    (96%). Each bullet has three grayscale background bands ranging from light gray
    (Poor) through medium gray (Satisfactory) to dark gray (Good), with varying range
    thresholds per metric. The actual value bars use Python Blue (#306998) for above-target
    metrics (Revenue, On-Time Delivery) and muted red (#c0392b) for below-target metrics
    (Profit Margin, Customer Growth, Satisfaction). Thin black vertical target markers
    are clearly visible. Percentage values are displayed to the right of each bar
    in matching colors. The bars and bands have rounded corners (FancyBboxPatch).
    Top, right, and left spines are removed. A subtle dashed x-axis grid at alpha=0.2
    provides reference. The title reads "bullet-basic · matplotlib · pyplots.ai" at
    the top. A 6-item legend at the bottom identifies Above Target, Below Target,
    Target, Good, Satisfactory, and Poor.
