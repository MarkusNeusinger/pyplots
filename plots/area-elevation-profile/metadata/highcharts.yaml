  strengths:
  - Excellent data storytelling with real Swiss Alpine locations and elevation zone
    bands (Valley/Alpine/High Alpine)
  - Professional gradient fill and custom blue palette create a polished terrain silhouette
  - 'Full spec compliance: all required features including landmark annotations, vertical
    exaggeration note, and proper axis labeling'
  - Distinctive use of Highcharts plotBands and plotLines for contextual elevation
    zones and landmark markers
  - Clean, well-structured code with appropriate terrain generation using Gaussian
    peaks
  weaknesses:
  - Dense y-axis tick marks (every 50 m) create visual clutter — a wider tick interval
    would be cleaner
  - Landmark labels at bottom are slightly crowded between adjacent annotations
  image_description: 'The plot displays a terrain elevation profile for a 120 km Alpine
    hiking trail from Grindelwald to Lauterbrunnen in the Bernese Oberland. The x-axis
    shows "Distance (km)" from 0 to 120 km, and the y-axis shows "Elevation (m)" from
    1000 m to 3200 m. The area below the elevation line is filled with a blue-to-transparent
    gradient (#306998), creating a terrain silhouette. The title reads "area-elevation-profile
    · highcharts · pyplots.ai" in bold, with a descriptive subtitle noting the route
    and "Vertical Exaggeration ~10×". Seven landmarks are annotated with dotted vertical
    lines and labels at the bottom: Grindelwald (Start) at 1432 m, Faulhorn Summit
    at 2543 m, Schynige Platte at 1942 m, Jungfraujoch Pass at 2897 m, Kleine Scheidegg
    at 1735 m, Männlichen Peak at 2447 m, and Lauterbrunnen (End) at 1311 m. Three
    subtle horizontal plot bands indicate elevation zones: "Valley" (green tint, below
    1500 m), "Alpine" (yellow tint, 1500-2500 m), and "High Alpine" (blue tint, above
    2500 m). The terrain profile shows realistic multiple peaks and valleys with the
    dominant Jungfraujoch peak near the center.'
