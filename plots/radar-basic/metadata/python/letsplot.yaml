  - Correct radar chart structure with manual polar-to-Cartesian conversion in letsplot
  - 'All spec features implemented: filled polygons with alpha=0.25, concentric circle
    gridlines, spoke lines, outer category labels, scale value labels, legend, polygon
    closure'
