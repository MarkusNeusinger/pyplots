    Vertical dashed gray lines mark key bifurcation points with rotated text labels
    at staggered y positions. The title reads "bifurcation-basic · altair · pyplots.ai"
    with a subtitle "Logistic map period-doubling cascade from stability to chaos".
    A legend in the top-right corner shows the three regime colors. The background
    is clean with subtle dashed grid lines at low opacity. The layout fills the canvas
    well.'
