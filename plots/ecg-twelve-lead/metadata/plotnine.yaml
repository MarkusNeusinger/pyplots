review:
  strengths:
  - Excellent domain-specific ECG paper styling with authentic color palette (peach
    background, coral/salmon grid lines)
  - Clinically accurate lead morphologies with appropriate per-lead parameter variations
  - Clean 3x4 clinical grid layout using facet_wrap with proper lead ordering
  - 1mV calibration pulse adds professional medical authenticity
  - Comprehensive theme customization replacing default strip text with custom bold
    lead labels
  weaknesses:
  - Helper functions add minor complexity to code structure (though justified for
    ECG signal generation)
  - Low-amplitude leads (aVL) could be slightly more visible with thicker line weight
  - Panel spacing could be marginally increased between rows for better visual breathing
    room
  image_description: 'The plot displays a 12-lead ECG in the standard clinical 3x4
    grid layout. Row 1: I, aVR, V1, V4; Row 2: II, aVL, V2, V5; Row 3: III, aVF, V3,
    V6. Each facet has a warm peach/salmon ECG paper background (#FFF5EE) with darker
    coral major grid lines and lighter salmon minor grid lines. Signal traces are
    rendered in dark navy (#1a1a2e) with clear P-QRS-T wave complexes. Lead labels
    appear in bold at the top-left of each panel. A 1mV calibration pulse (vertical
    bar with horizontal return) is visible in the Lead I panel with a "1 mV" annotation
    below. The title reads "ecg-twelve-lead · plotnine · pyplots.ai" in bold at the
    top. X-axis shows "Time (s)" from 0.0 to 2.5, Y-axis shows "Voltage (mV)" from
    -1.5 to 1.5. Lead morphologies are clinically distinct: aVR is inverted, Lead
    II has the tallest QRS, V1 shows dominant S-wave, and V4-V6 show progressive R-wave
    dominance.'
