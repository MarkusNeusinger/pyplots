  image_description: The plot displays a Dorling-style cartogram of US states positioned
    by approximate geographic coordinates (longitude/latitude). Circle sizes are proportional
    to state population, ranging from tiny circles (Wyoming ~0.6M) to large circles
    (California ~39M, Texas ~30.5M). Colors follow the Viridis perceptually-uniform
    palette, mapping dark purple (low population) through teal to yellow (high population).
    The title reads "US States by Population · cartogram-area-distortion · bokeh ·
    pyplots.ai" in dark text at top-left. Axis labels show "Longitude (°W)" and "Latitude
    (°N)". A vertical color bar on the right is labeled "Population (millions)". A
    custom size legend in the upper-left corner shows three reference circles (5M,
    15M, 30M) in Python Blue. Dashed gray reference outlines of uniform size appear
    behind each state circle for comparison. Major states (CA, TX, FL, NY, PA, OH,
    IL, MI, GA, NC, VA, NJ, TN, WA) are labeled with abbreviations. AK and HI are
    positioned in inset locations at the lower-left. The background is a light cream
    color with very subtle gridlines.
