  image_description: 'The plot displays a 20x20 rainflow counting matrix heatmap for
    a steel shaft under variable-amplitude loading. The x-axis shows "Mean Stress
    (MPa)" ranging from -42 to ~243, and the y-axis shows "Stress Amplitude (MPa)"
    ranging from 10 to ~195, with amplitudes increasing upward (inverted y-axis per
    engineering convention). The inferno colormap is used with a logarithmic color
    scale: bright yellow indicates the highest cycle counts (~4,000+), transitioning
    through orange to dark red/purple for lower counts (~1-10). A colorbar on the
    right is labeled "Cycle Count (log scale)" with logarithmic tick marks. Zero-count
    bins appear as light gray background, primarily in the upper rows (high amplitude),
    where sparse isolated orange/red cells indicate rare high-stress cycles. The lower
    region (low amplitude) is densely filled with bright yellow, showing the expected
    exponential decay pattern. A white annotation box with "Peak: 4,073 cycles" and
    a curved arrow points to the peak cell location at low amplitude. Subtle gray
    cell borders separate individual bins. All spines are removed for a clean appearance.'
