  strengths:
  - Excellent data quality with realistic engineering material properties across 7
    families spanning the full Ashby chart range
  - Colorblind-safe palette with teal replacing green, all families distinguishable
  - Creative SVG post-processing to add family labels and E/rho performance index
    guide lines
  - Family labels with white stroke for readability against data points
  - Proper logarithmic scaling on both axes spanning 5+ orders of magnitude
  weaknesses:
  - Color palette defined twice (lines 120-139) — first definition immediately overridden
