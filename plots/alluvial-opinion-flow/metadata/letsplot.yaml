  image_description: 'The plot displays an alluvial/Sankey-style diagram tracking
    opinion shifts across 4 quarterly waves (Q1-Q4 2025) for 1000 survey respondents.
    Five opinion categories are arranged vertically: Strongly Disagree (red, #C0392B),
    Disagree (orange, #E8915A), Neutral (gray, #9CA3AF), Agree (light blue, #5B9BD5),
    and Strongly Agree (dark blue, #306998). Colored node rectangles at each wave
    show category sizes, with white count labels inside the middle-wave nodes (e.g.,
    154, 230, 215, 256, 145 at Q2). Smooth bezier-like flow ribbons connect categories
    across waves, with stable flows rendered at higher opacity (0.6) and changed flows
    at lower opacity (0.35). Left-side labels show initial counts (e.g., Neutral 280),
    right-side labels show final counts with net change (e.g., Neutral 122, -158).
    The title "alluvial-opinion-flow · letsplot · pyplots.ai" and subtitle "Polarization
    trend: Neutral shrinks 280→122 as extreme positions grow" appear at top-left.
    The layout is clean with no axes, grid, or spines — just the alluvial diagram
    filling the 4800x2700 canvas.'
