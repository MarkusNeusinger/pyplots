review:
  strengths:
  - 'Correct Okabe-Ito palette with #009E73 as first series; both renders use proper
    theme backgrounds (#FAF8F1 light / #1A1A17 dark)'
  - Elegant closed-polygon approach creates span regions within pygal's XY chart (no
    native axvspan equivalent)
  - Per-point dict labels with 'label' key enable interactive HTML hover tooltips
    — leverages pygal's distinctive interactivity
  - Font sizes all explicitly set to correct pixel values (title 32px, axes 22px,
    ticks 18px); fully readable in both light and dark
  - Clean flat code structure with reproducible seed, adaptive SPAN_OPACITY between
    themes, and no over-engineering
  weaknesses:
  - Legend truncates 'Recession Period' to 'Recession Peri...' due to pygal legend
    width constraints — shorten label or adjust sizing
  - Recession span opacity in dark render (0.45) exceeds spec's 0.2–0.3 recommendation;
    stock line barely visible beneath it
  - Risk Zone (60–80) is positioned below the entire stock price range (135–215),
    making the horizontal span feel disconnected from actual data — adjust bounds
    for a more meaningful threshold
  - Lower third of canvas is mostly empty dead space due to the mismatch between the
    Risk Zone span range and the data range
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface, not pure white
      Chrome: Title "span-basic · pygal · anyplot.ai" in dark text, clearly readable. Y-axis label "Price ($)" and X-axis label "Year" readable. Tick labels for years (2006–2016) and prices (40–220) in dark text, legible. Legend in top-left, "Recession Period" slightly truncated to "Recession Peri..."
      Data: First series (Recession Period) = #009E73 green vertical span 2008–2009 at 0.25 opacity. Second series (Risk Zone) = #D55E00 orange horizontal span 60–80 at 0.25 opacity. Third series (Stock Price) = #0072B2 blue line, no dots. All three distinguishable.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark theme surface, not pure black
      Chrome: Title, axis labels, and tick labels all render in light-colored text, clearly readable against dark background. Legend text adapts to light color. No dark-on-dark failures detected.
      Data: Colors identical to light render — green #009E73 recession span (higher opacity 0.45 on dark), orange #D55E00 risk zone span, blue #0072B2 stock line. Brand green #009E73 clearly visible.
      Legibility verdict: PASS (note: recession span at 0.45 opacity is heavier than recommended but stock line still faintly visible beneath)
