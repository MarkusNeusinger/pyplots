  strengths:
  - Excellent data quality with realistic chemistry data computed from first principles
    (stoichiometric calculation)
  - Two-panel composition effectively communicates both the titration curve and its
    derivative
  - Cohesive custom color palette with accessible blue/orange/red scheme
  - Interactive HTML output leverages pygal SVG-native strengths
  - Clear data storytelling through annotation box, transition zone shading, and derivative
    panel
  weaknesses:
  - Derivative curve as separate panel rather than secondary y-axis overlay (spec
    preference)
  - PIL-based pixel coordinate overlay for transition zone shading is fragile and
    hardcoded
  - Transition Zone label partially obscured by equivalence point dashed line
  - Helper function data_to_px breaks flat script convention
  image_description: 'The plot displays a two-panel composition for an acid-base titration
    curve. The upper panel shows the characteristic S-shaped pH curve (blue, #306998)
    plotting pH (0–14, left y-axis) against Volume of NaOH added (0–50 mL, x-axis).
    A vertical dashed red line marks the equivalence point at 25.0 mL. A horizontal
    gray dashed line marks pH 7 as a reference. A light blue semi-transparent rectangle
    shades the "Transition Zone" between ~20–30 mL. A white rounded annotation box
    in the upper right reads "Equivalence: 25.0 mL, pH 7.0" with the subtitle "25
    mL of 0.1 M HCl titrated with 0.1 M NaOH." The lower panel shows the derivative
    curve (dpH/dV) in orange (#D35400) with a sharp peak at the equivalence point,
    with its own red dashed vertical line. The background is light blue-white (#FAFCFF)
    with a slightly tinted plot area (#F0F4F8). The title reads "titration-curve ·
    pygal · pyplots.ai". A combined legend at the bottom lists all five series across
    both panels.'
