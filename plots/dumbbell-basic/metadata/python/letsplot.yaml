      Data: Identical layout — same 10 horizontal dumbbells sorted the same way. Green (#009E73) and orange (#D55E00) dots visible and bright against the dark background. Connecting segments appear as light-gray (INK_SOFT=#B8B7B0 in dark mode). Vertical grid lines are near-white (#F0EFE8) at full opacity — more prominent than ideal.
