  image_description: The plot displays a candlestick chart titled "candlestick-basic
    · matplotlib · pyplots.ai" showing 30 trading days of stock price data from early
    January to mid-February 2024. Blue (#1976d2) candlesticks represent bullish days
    (Close ≥ Open) and orange (#e65100) candlesticks represent bearish days (Close
    < Open). The y-axis shows "Price (USD)" with dollar formatting ($130–$170) and
    the x-axis shows "Date" with weekly Monday labels rotated 45°. A dark gray 5-day
    SMA line overlays the candlesticks, tracing the trend from ~$150 up to ~$162 then
    declining to ~$135. An orange annotation below a mid-chart candle reads "Largest
    drop $-2.54" with a thin connecting line. The legend in the upper right identifies
    Bullish, Bearish, and 5-day SMA. Top and right spines are removed; left and bottom
    spines are thin and gray. A subtle y-axis grid (alpha=0.15) aids price reading.
    The background is a warm off-white (#fafafa). Candle bodies vary in height with
    thin wicks extending above and below. Overall layout is clean with good canvas
    utilization.
