    point. Four frequency annotations (ω=0.01, ω=0.04, ω=0.40, ω=6.39) appear in light
    gray labels along the curve. Dark blue arrows indicate increasing frequency direction.
    A subtle pink stability zone circle surrounds the critical point. The title reads
    "nyquist-basic · letsplot · pyplots.ai" with a subtitle showing the transfer function
    and stability conclusion. Axes are labeled Re{G(jω)} and Im{G(jω)}. Background
    is near-white with very subtle major gridlines.
