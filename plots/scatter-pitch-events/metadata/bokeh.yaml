  image_description: 'The plot displays a soccer pitch event map on a light green
    rectangular pitch with standard FIFA markings drawn in darker green: penalty areas,
    goal areas, center circle, halfway line, corner arcs, and goal posts (in dark
    gray). Four event types are scattered across the pitch using distinct marker shapes
    and colors: blue filled/hollow circles for successful/unsuccessful passes, red
    filled/hollow stars for shots, teal filled/hollow triangles for tackles, and gold
    filled/hollow diamonds for interceptions. Directional arrows connect start and
    end positions for passes and shots, with successful events shown at higher opacity
