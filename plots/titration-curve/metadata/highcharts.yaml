review:
  strengths:
  - Excellent data storytelling with clear focal point at equivalence point (diamond
    marker + dashed line + bold label + derivative peak)
  - Chemically accurate pH calculations for strong acid/strong base titration
  - Effective use of Highcharts plotLines and plotBands for annotations and regions
  - Professional typography hierarchy with explicitly set font sizes throughout
  - Dual y-axis implementation cleanly shows both pH curve and derivative
  weaknesses:
  - Buffer region shading adapted to acid/base excess regions since strong acid/base
    has no pKa — could note this distinction in the plot
  - Bottom area slightly crowded with region labels competing with axis labels
  image_description: The plot displays an acid-base titration curve on a light gray
    background with a white plot area. A blue S-shaped pH curve rises from ~1 at 0
    mL to ~13 at 50 mL, showing the characteristic sigmoidal shape of a strong acid/strong
    base titration. An orange filled area series shows the dpH/dV derivative on a
    secondary right y-axis, with a sharp peak at the equivalence point (25 mL). A
    red dashed vertical line marks the equivalence point at 25 mL with a red diamond
    marker and a bold red label reading "Equivalence Point (25 mL, pH 7)". Two light
    green shaded bands mark "Acid Excess Region" (0-20 mL) and "Base Excess Region"
    (30-50 mL). The title reads "titration-curve · highcharts · pyplots.ai" with an
    italic subtitle "25 mL of 0.1 M HCl Titrated with 0.1 M NaOH". A legend in the
    top-left lists pH (blue), dpH/dV (orange), and Equivalence (25.0 mL) (red diamond).
    The left y-axis shows pH (0-14), the right y-axis shows dpH/dV (0-5) in orange,
    and the x-axis shows "Volume of NaOH Added (mL)" from 0-50. A dotted horizontal
    line at pH 7 provides a neutral reference. Grid lines are subtle with low opacity.
