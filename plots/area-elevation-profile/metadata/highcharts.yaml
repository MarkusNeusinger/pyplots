  image_description: 'The plot displays a filled area chart showing an alpine hiking
    trail elevation profile along 120 km from Grindelwald to Lauterbrunnen in the
    Bernese Oberland, Switzerland. The x-axis shows "Distance (km)" from 0 to 120
    km with 10 km intervals, and the y-axis shows "Elevation (m)" from 800 m to 3200
    m. The terrain profile line is drawn in medium blue (#306998) with a lineWidth
    of 5, and the area beneath is filled with a vertical gradient from semi-transparent
    blue at the top fading to nearly transparent at the bottom, creating an effective
    terrain silhouette. Seven landmarks are annotated with dotted vertical lines and
    rotated text labels at the top: Grindelwald (Start), Faulhorn Summit, Schynige
    Platte, Jungfraujoch Pass, Kleine Scheidegg, Männlichen Peak, and Lauterbrunnen
    (End), each showing the elevation value. The title reads "Alpine Trail Bernese
    Oberland · area-elevation-profile · highcharts · pyplots.ai" and a subtitle states
    "120 km Hiking Route — Grindelwald to Lauterbrunnen · Vertical Exaggeration ~10×".
    The terrain shows realistic alpine topography with three major peaks (~2550m,
    ~2880m, ~2500m) separated by valleys. Several landmark labels overlap with the
    subtitle text, and the Lauterbrunnen (End) label is partially cut off at the right
    edge.'
