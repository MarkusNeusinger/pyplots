  strengths:
  - Accurate flame graph with proper bottom-to-top call stack hierarchy and proportional
    bar widths
  - Excellent realistic data context with believable web server CPU profiling function
    names and sample counts
  - Custom warm flame color palette following established Brendan Gregg convention
  - 'Smart label handling: full name with percentage when space allows, name-only
    fallback, then truncation with ellipsis'
  weaknesses:
  - Significant empty vertical space above flame graph wastes canvas area
  - Bypasses highcharts-core Python library entirely, constructs raw JavaScript instead
    of idiomatic Python API
  - Helper functions break KISS flat-script pattern
  - Does not leverage any Highcharts charting series types or modules
  image_description: The plot displays a flame graph titled "flamegraph-basic · highcharts
    · pyplots.ai" with subtitle "CPU Profile — Web Server Request Handling (668 samples)".
    The visualization shows a hierarchical call stack growing bottom-to-top with 7
    depth levels. At the base is "main (100%)" spanning the full width in a deep orange-red
    color, above it "process_request (85%)" and smaller "log_metrics (9%)" and "gc_collect"
    blocks. The hierarchy continues upward through parse_headers, authenticate, handle_route,
    and into deeper calls like query_database, execute_sql, fetch_rows, render_template,
    compile_template, etc. A warm color palette of yellows, oranges, and reds is used
    throughout following the conventional flame graph aesthetic. Function names with
    percentage labels are displayed in white monospace text inside bars when wide
    enough; narrower bars show truncated names with ellipsis. A "Stack Depth" label
    appears rotated on the left y-axis. White borders separate adjacent bars. There
    is significant empty whitespace between the title/subtitle area and the topmost
    bars of the flame graph, with the visualization occupying roughly the lower 60%
    of the canvas.
