  - Some annotation text could be slightly larger for optimal readability at full
    canvas resolution
  image_description: The plot displays a Mohr's Circle for stress analysis on a 3600x3600
    square canvas with a light gray (#FAFAFA) background. A blue (#306998) circle
    is centered at approximately (25, 0) with radius ~68 MPa, drawn with a solid blue
    outline (line_width=4) and a very subtle blue fill. The horizontal axis is labeled
    "Normal Stress σ (MPa)" and the vertical axis "Shear Stress τ (MPa)". The title
    reads "Mohr's Circle for Stress Analysis · mohr-circle · bokeh · pyplots.ai" in
    dark text at the top. Red diamond markers at σ₁ = 93.0 MPa and σ₂ = -43.0 MPa
    mark the principal stresses on the horizontal axis, with red text labels. Teal
    (#1B9E77) triangle markers at the top and bottom of the circle indicate τ_max
    = 68.0 MPa with teal labels. Blue circle markers at A (80, 40) and B (-30, -40)
    show the original stress state, connected by a gray dashed diameter line. A red
    arc near the center shows the 2θp = 36.0° angle. Gray text at the bottom center
    reads "Center = (25.0, 0) | R = 68.0 MPa". Light gray reference lines cross at
    τ = 0 (solid) and through the center (dashed vertical). The grid is very subtle
    (dashed, low alpha). The circle appears as a true circle due to equal aspect ratio.
