review:
  strengths:
  - Authentic astronomical data with accurate star positions and magnitudes for 23
    constellations
  - Beautiful dark sky aesthetic with thoughtful color choices (pale yellow bright
    stars, blue-white dimmer stars)
  - Correct stereographic projection with RA flipped per astronomical convention
  - Interactive hover tooltips showing star name and magnitude (Bokeh-specific feature)
  - Well-designed magnitude scale legend
  - Custom label offsets to reduce overlap in crowded areas
  weaknesses:
  - Canvas size 4800x4800 is non-standard (should be 3600x3600 for square format)
  - Some label overlap persists in crowded regions (Lyra/Cygnus area)
  - Grid and legend labels are slightly small for the canvas resolution
  - Star colors computed via manual loop instead of Bokeh's ColorMapper
  image_description: The plot displays a star chart on a dark navy background (#0a0e2a)
    using a north-pole-centered stereographic projection. Stars are rendered as circles
    with sizes inversely proportional to magnitude — bright stars like Sirius, Vega,
    and Capella appear as large pale-yellow circles, while dimmer stars are smaller
    blue-white dots. Constellation stick-figure lines connect stars in semi-transparent
    blue (#4a6fa5) lines across 23 constellations including Orion, Ursa Major, Cassiopeia,
    Cygnus, Scorpius, and Crux. Constellation names appear in italic blue-gray text
    near each group's centroid. Bright star names (mag < 1.0) are labeled in lighter
    text. A dotted coordinate grid shows RA lines (0h–21h) and declination circles
    (-60° to 60°). A magnitude scale legend in the bottom-left shows circles for magnitudes
    0–5 with decreasing sizes. The title "star-chart-constellation · bokeh · pyplots.ai"
    is centered at the top in light blue-gray. Approximately 200 random background
    stars fill the field for realism.
