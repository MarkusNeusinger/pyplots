review:
  strengths:
  - Excellent astronomical accuracy with real star catalog data for 23 constellations
  - Beautiful dark sky aesthetic with thoughtful color progression for star magnitudes
  - Stereographic projection correctly implemented with RA convention flip
  - Interactive tooltips showing star name and magnitude (Bokeh strength)
  - Custom magnitude scale legend adds professional polish
  - Well-organized label offset system to reduce overlaps
  weaknesses:
  - Minor label overlaps in crowded areas (Auriga/Capella, Lyra/Vega, Aquila/Altair)
  - Canvas size 4800x4800 deviates from standard 4800x2700 or 3600x3600
  - Some grid labels (Dec at 13pt) could be slightly larger for consistency
  image_description: The plot displays a star chart on a deep navy (#0a0e2a) background
    using a stereographic projection centered on the north celestial pole. Stars are
    rendered as circular markers with sizes inversely proportional to magnitude —
    bright stars like Sirius, Vega, and Arcturus appear as large yellow-white circles,
    while dimmer stars are small blue-gray dots. Constellation stick-figure lines
    connect stars in semi-transparent blue (#4a6fa5). Twenty-three constellation names
    (Orion, Ursa Major, Cassiopeia, Leo, Cygnus, Scorpius, Gemini, Lyra, Aquila, Taurus,
    Canis Major, Perseus, Auriga, Boötes, Corona Bor., Andromeda, Pegasus, Draco,
    Centaurus, Crux, Puppis, Vela, Carina) are labeled in italic blue-gray text near
    their centroids. Bright star names (mag < 1.0) are labeled in lighter text. A
    dotted RA/Dec coordinate grid is visible with RA labels (0h, 3h, 6h, 9h, 12h,
    15h, 18h, 21h) and Dec labels (-60, -30, 0, 30, 60 degrees). A magnitude scale
    legend in the bottom-left shows circle sizes for magnitudes 0-5. The title "star-chart-constellation
    · bokeh · pyplots.ai" appears at the top center. Approximately 200 random background
    stars add realism to the chart.
