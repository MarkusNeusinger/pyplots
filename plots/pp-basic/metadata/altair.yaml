review:
  strengths:
  - Excellent spec compliance with all P-P plot features plus statistical confidence
    band (KS bound)
  - Strong visual storytelling through deviation-based color and size encoding
  - Clean monochromatic blue design theme with polished typography and subtle grid
  - Perfect code quality with clean KISS structure and reproducible seed
  weaknesses:
  - Point alpha of 0.8 is slightly high for 200 data points causing mild crowding
    in the center cluster
  - Domain context (blood pressure measurements) exists only in code comment not visible
    in the plot
  - Could leverage more distinctive Altair features like selection parameters or conditional
    encoding
  image_description: The plot displays a P-P (Probability-Probability) plot with a
    square aspect ratio (3600x3600 px). The title "pp-basic · altair · pyplots.ai"
    is rendered in bold at the top, with a subtitle "Normality check — points colored
    by deviation from perfect fit" in gray below it. Both axes range from 0 to 1 with
    tick marks at 0.05 intervals. The x-axis is labeled "Theoretical CDF (Normal)"
    and the y-axis "Empirical CDF". A dashed gray 45-degree reference line runs diagonally
    from (0,0) to (1,1). A light blue confidence band (KS bound) surrounds the diagonal.
    Data points are rendered as circles with dark blue outlines, colored by a sequential
    blues gradient encoding deviation from the diagonal — lighter circles have near-zero
    deviation, darker/larger circles deviate more. The data shows a characteristic
    S-shaped departure from the diagonal in the lower-left quadrant consistent with
    a heavier-tailed distribution. A "Deviation" color legend is positioned in the
    bottom-right corner with values from 0.00 to ~0.04. Grid lines are very subtle.
    The overall look is clean and professional with a monochromatic blue theme.
