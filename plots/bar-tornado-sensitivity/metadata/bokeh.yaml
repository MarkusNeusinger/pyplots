  image_description: 'The plot displays a horizontal tornado diagram for NPV Sensitivity
    Analysis of a renewable energy project. Ten parameters are listed on the y-axis,
    sorted by influence magnitude with "Electricity Price ($/MWh)" at the top (widest
    bar spanning ~$6.2M to ~$18.8M) and "Salvage Value ($M)" at the bottom (narrowest
    bar, ~$12.0M to ~$13.0M). A dark vertical reference line marks the base case NPV
    at $12.5M with a bold label "Base Case: $12.5M" positioned above the bars. Bars
    extend left (dark navy blue, "Low Scenario") and right (amber/gold, "High Scenario")
    from the base line. Each bar has bold value annotations at its ends (e.g., "$6.2M",
    "$18.8M"). The bars use an alpha gradient — more opaque for wider/more influential
    parameters, creating clear visual hierarchy. Background is light gray (#fafafa)
    with white border fill, x-grid is subtle dashed lines, y-grid is removed, y-axis
    line and ticks are hidden. The legend sits in the bottom-right corner with "Low
    Scenario" (blue) and "High Scenario" (amber). X-axis reads "Net Present Value
    ($M)" with ticks at 5, 10, 15, 20. Bokeh toolbar is visible at top-right.'
