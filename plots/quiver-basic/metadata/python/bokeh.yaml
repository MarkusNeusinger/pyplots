review:
  strengths:
  - Viridis colormap correctly applied for continuous magnitude data — colour encodes
    wind speed exactly as spec suggests
  - 'All font sizes explicitly set to recommended values: title 28pt, axis labels
    22pt, tick labels 18pt, subtitle 18pt'
  - Custom arrow geometry (segment shafts + patch arrowheads) is the correct idiomatic
    Bokeh approach — no native quiver API exists
  - Vortex centre marker and Label annotation create a clear focal point and narrative
  - Subtitle explicitly states what colour encodes, aiding immediate comprehension
  - 'Theme tokens fully wired through all chrome: title, axis labels, tick labels,
    grid, axis lines — both renders readable'
  - Minimum display length enforcement keeps near-zero centre arrows visible rather
    than collapsing to invisible points
  - ColumnDataSource used for both segment and patches renderers — correct idiomatic
    Bokeh data pattern
  - ColorBar with LinearColorMapper properly attached and sized; background and border
    use theme tokens
  - HTML and PNG outputs both saved correctly; deterministic data needs no random
    seed
  weaknesses:
  - 'ColorBar title_text_color not set — in dark mode ''Wind Speed'' title defaults
    to black on the dark elevated background (#242420), making it invisible or very
    hard to read; fix: add title_text_color=INK_SOFT to the ColorBar constructor'
  - Near-centre arrows are very small (minimum display length is only 12% of grid
    spacing) — they register as tiny stubs at the canvas scale; raising MIN_DISP to
    ~18% and/or adding a slight opacity to near-zero arrows would improve visibility
    without misrepresenting the zero-magnitude vortex core
  - Design excellence ceiling limited by remaining spines (Bokeh shows left/bottom
    axis lines by default); removing or thinning these would lift DE-02
  - 'Storytelling could be stronger: a brief annotation noting the maximum wind speed
    value or region (e.g. at the corners) would complete the narrative arc begun by
    the vortex-centre label'
