  image_description: 'The plot displays a three-panel stratigraphic column visualization.
    The left panel shows geological age labels (Late Cretaceous, Late Jurassic, Middle
    Jurassic, Late Triassic, Early Permian) with bracket notation and a depth scale
    from 0–180 m. Subtle pastel background bands color-code each age period across
    both the age and column panels. The center panel contains the stratigraphic column
    with 10 stacked layers, each filled with distinct hatching patterns and desaturated
    colorblind-safe colors: blue dotted for sandstone, orange dashed for shale, green
    cross-hatched for limestone, orange diagonal for siltstone, purple circles for
    conglomerate, and brown x-pattern for dolomite. Formation names (Dakota Fm, Graneros
    Sh, Greenhorn Ls, etc.) are labeled to the right. Three red wavy lines mark unconformities
    (Cretaceous–Jurassic, Jurassic–Triassic, Triassic–Permian) with italic red labels.
    The right panel shows a seaborn strip plot of layer thickness by lithology using
    diamond markers, with a lithology legend in the lower right corner. The title
    reads "column-stratigraphic · seaborn · pyplots.ai" at the top.'
