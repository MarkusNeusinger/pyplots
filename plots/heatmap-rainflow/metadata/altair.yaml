  strengths:
  - 'Excellent spec compliance: all requirements met including log-scale color, colorbar,
    units, and zero-count bin distinction'
  - Sophisticated use of Vega expressions (labelExpr) for log-scale legend labels
    showing actual cycle counts
  - Well-crafted synthetic data with realistic engineering context, exponential decay,
    and secondary cluster
  - 'High visual refinement: grid/spines/ticks/domain all removed for a clean modern
    look'
  - Dual output (PNG + HTML) leverages Altair interactive capabilities
  weaknesses:
  - Tick label font sizes at 14pt slightly below the ideal 16pt threshold
  - Y-axis bin center values show decimals (464.4, 416.9) which look less clean than
    rounded integers in a scientific context
  - Canvas dimensions slightly undersized versus the 3600x3600 target
  image_description: The plot displays a 2D rainflow counting matrix as a heatmap
    using the inferno colormap (dark purple/black to magenta to orange to yellow/white).
    The x-axis shows "Mean Stress (MPa)" ranging from approximately -190 to 190, with
    labels angled at -45 degrees showing every other bin center. The y-axis shows
    "Stress Amplitude (MPa)" ranging from 36.9 at the bottom to approximately 487
    at the top, sorted high-to-low with every other bin labeled. The title reads "heatmap-rainflow
    · altair · pyplots.ai" in large bold text, with a subtitle "Rainflow cycle counting
    matrix — variable-amplitude fatigue loading on steel component" in grey. A vertical
    colorbar on the right is labeled "Cycle Count" with log-scaled tick values (16,
    25, 40, 63, 100, 158, 251, 398, 631, 1000, 1585, 2512). The brightest region (yellow/white,
    highest cycle counts ~2500+) is concentrated at low amplitudes and near-zero mean
    stress, decaying through orange and magenta to dark purple at high amplitudes
    and extreme mean values. White gaps appear in the high-amplitude region where
    zero-count bins exist. A subtle secondary concentration is visible around amplitude
    ~175 MPa and mean ~50 MPa.
