  image_description: 'The plot displays an MA plot for differential gene expression
    analysis. The x-axis shows "Mean Expression (A)" ranging from 0 to ~27, and the
    y-axis shows "Log₂ Fold Change (M)" ranging from about -5 to +5. Non-significant
    genes are rendered as small, faint gray dots (alpha ~0.15), providing a dense
    background cloud of ~14,000+ points. Upregulated significant genes appear as orange/amber
    dots, and downregulated significant genes appear as cornflower blue dots — both
    larger and more opaque than the non-significant background. A solid dark horizontal
    line marks M=0 (no change), with dashed gray lines at M=±1 labeled "2-fold change"
    on the right margin. A blue LOESS trend line runs nearly flat near y=0 across
    the expression range. Gene labels in bold italic identify 8 top differentially
    expressed genes: EGFR, TP53, MYC, and BRCA1 (upregulated, top area), and KRAS,
    PTEN, RB1, APC (downregulated, bottom-left area). Title reads "ma-differential-expression
    · matplotlib · pyplots.ai". Top and right spines are removed, with a subtle y-axis
    grid. Legend is in the lower right with entries for Not significant, Upregulated,
    Downregulated, and LOESS trend.'
