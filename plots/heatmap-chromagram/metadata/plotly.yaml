  image_description: The plot displays a heatmap chromagram with all 12 pitch classes
    (C through B) on the y-axis and time in seconds (0 to ~5.95) on the x-axis. A
    custom sequential colorscale runs from dark navy (#0d0628) through deep purple
    and hot magenta to warm orange and bright gold (#fcffa4), representing energy
    intensity from 0 to 1.2. Four chord sections are labeled above the heatmap — "C
    maj", "G maj", "A min", "F maj" — separated by white dotted vertical lines, with
    a thin horizontal bracket line connecting them. The C major section clearly lights
    up C, E, and G pitch classes; G major highlights G, B, and D; A minor shows A,
    E, and C; F major activates F, A, and C. Transitions between chords show smooth
    blending. The colorbar on the right is labeled "Energy" with tick values at 0,
    0.3, 0.6, 0.9, 1.2. The dark plot background matches the low end of the colorscale,
    while the paper background is light gray. Small gaps between heatmap cells add
    visual clarity.
