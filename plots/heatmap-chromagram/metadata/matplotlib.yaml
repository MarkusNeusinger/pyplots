  image_description: 'The plot displays a chromagram heatmap on a dark background
    (#0a0a12). The Y-axis shows all 12 pitch classes (C through B) in monospace font.
    The X-axis shows time from 0 to 8 seconds with major ticks at each second and
    minor ticks at 0.25s intervals. The title reads "heatmap-chromagram · matplotlib
    · pyplots.ai" in light gray. A colorbar on the right labeled "Energy" shows a
    scale from 0.0 to 1.0. The custom colormap transitions from deep charcoal (low
    energy) through teal to warm gold/yellow (high energy). Four chord regions are
    labeled in italic at the top: "C maj" (0-2s), "G maj" (2-4s), "A min" (4-6s),
    and "F maj" (6-8s), separated by subtle dashed vertical dividers. The chord patterns
    are clearly visible — C major shows high energy in C, E, G rows; G major in G,
    B, D; A minor in A, C, E; F major in F, A, C. Harmonic bleeding transitions are
    visible at chord boundaries. All spines are removed and the colorbar outline is
    hidden.'
