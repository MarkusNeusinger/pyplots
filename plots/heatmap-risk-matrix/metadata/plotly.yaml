review:
  strengths:
  - Excellent visual hierarchy through marker sizing by zone severity — critical risks
    are immediately prominent
  - Clean cell design with white borders and subtle score annotations that don't compete
    with data
  - Dual encoding through both shape and color for risk categories enhances readability
  - Rich hover tooltips with full risk details (a distinctive Plotly feature)
  - Well-designed jitter system prevents marker overlap in shared cells
  weaknesses:
  - Minor label proximity in cells with multiple risks (e.g., Regulatory/Compliance
    Gap)
  - Could benefit from even more visual polish (e.g., rounded corners, gradient fills
    within cells)
  image_description: 'The plot displays a 5×5 risk assessment matrix with Likelihood
    (Rare to Almost Certain) on the Y-axis and Impact Severity (Negligible to Catastrophic)
    on the X-axis. Cells are color-coded with soft blue (Low, scores 1–4), yellow
    (Medium, 5–9), light orange (High, 10–16), and light pink/red (Critical, 20–25)
    backgrounds. Risk score numbers appear subtly in each cell''s bottom-right corner
    in muted gray. Twelve risk items are plotted as labeled markers with distinct
    shapes per category: blue circles for Technical (Data Breach, System Outage, Cyber
    Attack, Tech Debt), purple diamonds for Financial (Budget Overrun, Regulatory,
    Vendor Failure, Market Shift), and orange squares for Operational (Supply Chain,
    Staff Turnover, Scope Creep, Compliance Gap). Marker sizes scale with zone severity
    — critical-zone markers are visibly larger. The title reads "heatmap-risk-matrix
    · plotly · pyplots.ai" with a subtitle "Enterprise Risk Assessment — Likelihood
    vs Impact Matrix". A well-organized legend on the right shows both category markers
    and risk zone colors with score ranges. White borders separate cells cleanly.'
