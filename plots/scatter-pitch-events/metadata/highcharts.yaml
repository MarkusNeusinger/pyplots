  image_description: 'The plot displays a soccer pitch event map on a dark navy background
    (#1a1a2e) with a green gradient pitch surface. White pitch markings are accurately
    rendered including the outline, halfway line, center circle with center spot,
    both penalty areas, goal areas, penalty arcs, corner arcs, and goal outlines.
    Four event types are shown with distinct markers: Pass (blue circles), Shot (coral/red
    triangles, enlarged), Tackle (olive/yellow downward triangles), and Interception
    (magenta diamonds). Filled markers indicate successful events while white/hollow
    markers indicate unsuccessful ones. Directional arrows connect pass and shot origins
    to endpoints — successful arrows are thicker and more opaque, unsuccessful ones
    are thinner and faint. Zone labels ("DEFENSIVE THIRD", "MIDDLE THIRD", "ATTACKING
    THIRD") appear at the bottom of the pitch. A floating legend with dark backdrop
    sits in the top-left corner. The title reads "scatter-pitch-events · highcharts
    · pyplots.ai" and a subtitle explains the visual encoding.'
