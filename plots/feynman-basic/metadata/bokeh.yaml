  image_description: 'The plot displays a Feynman diagram for the Higgs-strahlung
    process (e⁻e⁺ → Z* → ZH → μ⁻μ⁺ + bb̄ + g) on a warm off-white background (#f5f5f0).
    Incoming electron (e⁻) and positron (e⁺) are shown as blue solid lines with directional
    arrows converging at a vertex (black dot with white border) on the left. A gold
    wavy line (Z*/γ) connects to a second vertex, which splits into an upward gold
    wavy Z boson line and a downward purple dashed Higgs (H) line. The Z vertex produces
    two blue fermion lines (μ⁻, μ⁺) going right, and the H vertex produces blue fermion
    lines (b, b̄) and a green curly gluon (g) line. A custom legend in the top-left
    shows all four line styles with matching colors: blue solid (fermion), gold wavy
    (photon/Z), green curly (gluon), purple dashed (scalar H). A time arrow runs along
    the bottom. The process equation is annotated at the top center. Title reads "feynman-basic
    · bokeh · pyplots.ai".'
