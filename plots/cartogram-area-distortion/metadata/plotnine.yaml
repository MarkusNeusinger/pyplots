review:
  strengths:
  - Excellent layered grammar-of-graphics composition with 4 distinct visual layers
    (background, reference outlines, cartogram polygons, labels)
  - Custom indigo-to-gold color gradient creates a visually distinctive and professional
    appearance
  - Dual-variable encoding (size=population, color=GDP) effectively communicates two
    dimensions
  - Clean reference outlines with dashed style provide geographic context without
    visual clutter
  - Good use of geom_label with white backgrounds for readable country abbreviations
  weaknesses:
  - Non-contiguous cartogram variant does not preserve adjacency as spec prefers
  - 'Dead code: GDP tier classification computed but never used in visualization'
  - Some label crowding in central Europe (CH, AT, BE area)
  - Seed set unnecessarily since all data is hardcoded
  image_description: 'The plot displays a non-contiguous cartogram of 16 European
    countries where polygon area is proportional to population. Germany (DE), France
    (FR), UK, Italy (IT), and Spain (ES) appear as the largest polygons, while Norway
    (NO), Finland (FI), and Denmark (DK) are among the smallest. Colors encode GDP
    per capita using a custom gradient from deep indigo/purple (low GDP: Romania ~$16k,
    Poland ~$18k) through teal/green (mid GDP: France, Germany, Spain) to bright yellow/gold
    (high GDP: Norway ~$83k, Switzerland ~$93k). Dashed grey outlines show the original
    (undistorted) borders for comparison. Each country is labeled with a 2-letter
    abbreviation in white-background rounded labels. A vertical colorbar legend on
    the right shows "GDP per Capita (thousand USD)" ranging from ~20 to ~80+. The
    title reads "cartogram-area-distortion · plotnine · pyplots.ai" with a subtitle
    "Area ∝ Population — 469M total across 16 countries | Dashed outlines = original
    borders". Two bottom annotations explain the size encoding and highlight the top-3
    countries by population.'
