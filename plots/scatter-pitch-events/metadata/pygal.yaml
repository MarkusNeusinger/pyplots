review:
  strengths:
  - Excellent pitch rendering with complete FIFA-standard markings including corner
    arcs and penalty arcs
  - Thoughtful color palette with clear differentiation between all 8 event categories
  - Good visual hierarchy with shots emphasized as focal points via thicker lines
    and larger dots
  - Effective use of pygal None-break technique for rendering disconnected directional
    line segments
  - Dual output (PNG + HTML) leveraging pygal native SVG capabilities
  weaknesses:
  - All markers are circles due to pygal XY limitation - no shape differentiation
    between event types as spec requests
  - Pass lines create visual noise with many crossing segments especially in midfield
  - No dimensional labels or scale reference on the pitch
  image_description: 'The plot displays a soccer pitch rendered on a rich dark green
    background with semi-transparent white pitch markings including the outline, penalty
    areas, goal areas, center circle, halfway line, penalty arcs, and corner arcs.
    Match events are plotted as colored markers and lines: successful passes appear
    as steel blue thin lines connecting start and end points, unsuccessful passes
    as golden yellow dashed lines, successful shots (goals) as vivid red thick lines
    with large dots directed toward the right goal, missed shots as light coral dashed
    lines, successful tackles as vivid amber/orange large dots, unsuccessful tackles
    as smaller peach dots, successful interceptions as rich purple dots, and unsuccessful
    interceptions as lighter purple smaller dots. The title "scatter-pitch-events
    · pygal · pyplots.ai" is centered at the top in white. A legend at the bottom
    shows all 8 event categories in 4 columns across 2 rows. The pitch fills the canvas
    well with balanced margins.'
