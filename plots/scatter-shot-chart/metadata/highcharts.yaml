  strengths:
  - Professional dark theme evoking broadcast basketball analytics graphics
  - Colorblind-safe blue/orange palette with multi-dimensional differentiation (fill
    opacity, marker shape, size, border width)
  - Accurate NBA half-court geometry with tasteful line opacity hierarchy creating
    visual depth
  - Comprehensive data generation covering all court zones with realistic zone-specific
    make percentages
  - Creative use of Highcharts renderer API for custom court drawing
  - Zone percentage labels enhance analytical context and data storytelling
  - Clean well-structured code with DRY patterns and CDN fallback
  weaknesses:
  - Spec explicitly calls for green/red coloring but implementation uses blue/orange
    (accessibility improvement but literal spec deviation)
  - BASELINE text at 0.3 opacity is barely visible
  - Some wasted canvas space in upper corners above three-point arc
  - Data storytelling could be stronger with a highlighted insight or focal point
  image_description: |-
    The plot displays a basketball half-court shot chart on a dark navy background (#1a1a2e) with a slightly lighter plot area (#2a2a3e). The court is rendered with white lines at varying opacities creating a clear visual hierarchy: the outer court outline is bold (0.8 opacity, 5px), the three-point arc and corner straight lines are prominent (0.75 opacity, 4px), while the paint/key rectangle, free-throw circle (top solid, bottom dashed), and restricted area arc are more subtle (0.55 opacity, 2.5px). The basket is an orange circle at the origin with a white backboard line above. BASELINE appears in faint italic text below the court.

    Shot markers use blue (#4A90D9) for made shots and orange (#E8833A) for missed shots. Made shots are solid-filled with thin white borders; missed shots are semi-transparent with thicker white borders. Marker shapes differentiate shot types: circles for 2-pointers, diamonds for 3-pointers, squares for free throws. Zone percentage labels appear on the court: Arc 35%, FT 80%, Mid 40%, Paint 55%, Corner 38%. Shots cluster realistically in the paint, mid-range, three-point arc, corners, and at the free-throw line. Title reads "scatter-shot-chart · highcharts · pyplots.ai" with subtitle "Season Shot Chart — 370 Attempts". Vertical legend in top-right lists all six series. Square 1:1 aspect ratio (3600x3600).
