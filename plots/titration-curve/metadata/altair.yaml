review:
  strengths:
  - Excellent chemistry data model with proper stoichiometric calculations and dense
    sampling near the equivalence point
  - Strong visual storytelling with equivalence point diamond marker, annotation,
    and derivative overlay reinforcing the key insight
  - Professional color coordination between primary (blue) and secondary (orange)
    axes with purple for the equivalence point
  - 'Thoughtful visual refinement: subtle grid, removed view borders, custom axis
    styling, informative subtitle'
  - Clean, well-structured code with appropriate complexity for the visualization
  weaknesses:
  - Buffer region label is chemically approximate for a strong acid/strong base system
    (no true buffer region exists without a weak acid/base)
  - Derivative curve is visually flat across most of the plot due to the extreme spike
    at the equivalence point, reducing its informational value in non-spike regions
  image_description: The plot displays a titration curve as a blue S-shaped line plotting
    pH (left y-axis, 0-14) against Volume of NaOH added in mL (x-axis, 0-50). A secondary
    right y-axis in orange shows dpH/dV (derivative) values (0-240). A vertical purple
    dashed line at 25 mL marks the equivalence point, with a purple diamond marker
    at pH 7.0. An orange dashed derivative curve runs flat near zero across most of
    the plot and spikes sharply at the equivalence point. A light blue shaded area
    in the lower-left represents the "Buffer Region" (labeled in italic blue text).
    A subtle gray dashed horizontal reference line is drawn at pH 7. The legend in
    the top-right corner distinguishes "pH (titration curve)" in blue and "dpH/dV
    (derivative)" in orange. Title reads "titration-curve · altair · pyplots.ai" with
    subtitle "HCl (0.1 M, 25 mL) titrated with NaOH (0.1 M) · Strong Acid / Strong
    Base". Background is white with a very light gray plot area.
