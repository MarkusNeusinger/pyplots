  image_description: The plot displays a pediatric growth chart for boys' weight-for-age
    (0–36 months) in WHO reference style. Blue-toned percentile bands span from P3
    to P97 with graduated opacity — darker/more saturated near the center (P25–P75
    band) and lighter at the extremes (P3–P10, P90–P97). A thick dark navy P50 (median)
    line is prominently emphasized through the center of the bands. Thinner semi-transparent
    blue lines mark each individual percentile curve. Percentile labels (P3, P10,
    P25, P50, P75, P90, P97) appear on the right margin with vertical nudging to reduce
    crowding. A red/coral patient trajectory ("Patient A") with connected circular
    markers overlays the bands, tracking from birth (~3.5 kg) to 36 months (~15.6
    kg), sitting consistently between P50 and P75. The background is a subtle light
    blue-gray (#f7f9fb), Y-axis has dashed grid lines, X-axis has no grid. Title reads
    "line-growth-percentile · altair · pyplots.ai" with two subtitle lines. Axes are
    labeled "Age (months)" and "Weight (kg)".
