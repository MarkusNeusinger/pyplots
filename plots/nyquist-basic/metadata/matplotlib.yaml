  image_description: The plot displays a Nyquist diagram on the complex plane with
    axes labeled "Real" (x-axis) and "Imaginary" (y-axis). The main frequency response
    curve G(jω) is drawn as a solid dark blue line starting near (2, 0) at low frequencies
    and sweeping counterclockwise through the lower half-plane, reaching approximately
    (-2, -3) before curving back toward the origin. Its mirror image G(-jω) is shown
    as a dashed lighter blue line in the upper half-plane with reduced opacity (alpha=0.35).
    Four directional arrows on each curve indicate the direction of increasing frequency.
    A dotted gray unit circle is centered at the origin. The critical point (-1, 0)
    is marked with a prominent red "X" marker. Five frequency annotations (ω=0.3,
    ω=1.0, ω=2.0, ω=5.0, ω=10.0) are placed along the curve with blue dot markers.
    The title reads "nyquist-basic · matplotlib · pyplots.ai" at the top. Top and
    right spines are removed, and a subtle grid (alpha=0.15) is present. A legend
    in the lower-left corner identifies the three elements. The aspect ratio is 1:1
    (square).
