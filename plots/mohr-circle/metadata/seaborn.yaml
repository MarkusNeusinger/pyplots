  image_description: The plot displays a Mohr's Circle for stress analysis on a square
    canvas (12x12) with equal aspect ratio. A large dark blue (#306998) circle with
    very light blue fill (alpha=0.05) is centered at (20, 0) on Normal Stress σ (MPa)
    vs Shear Stress τ (MPa) axes. Two red (#C0392B) circular markers indicate stress
    points A (80, 30) and B (-40, -30), connected by a red dashed diameter line. Green
    (#27AE60) diamond markers show principal stresses σ₁ = 87.1 MPa and σ₂ = -47.1
    MPa on the horizontal axis. Orange (#E67E22) square markers denote maximum shear
    stress τmax = 67.1 MPa at the top and bottom of the circle. A small blue dot marks
    the center C (20, 0). A purple (#8E44AD) arc shows the principal angle 2θp = 26.6°.
    All key values are annotated with arrows and bold text. A 5-entry custom legend
    sits in the lower left with semi-transparent background. Top and right spines
    are removed, grid is subtle (alpha=0.2). Title reads "mohr-circle · seaborn ·
    pyplots.ai" at 24pt.
