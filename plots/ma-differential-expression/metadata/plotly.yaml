  image_description: The plot displays an MA plot with Mean Expression (A) on the
    x-axis (range 0-16) and Log2 Fold Change (M) on the y-axis (range approximately
    -6 to 6). Non-significant genes appear as light gray-blue semi-transparent dots
    (alpha ~0.25), while significant genes (padj < 0.05) are rendered as larger teal
    dots with higher opacity. A dark blue LOESS trend line runs near y=0 across the
    full expression range. A dotted gray reference line sits at y=0, and dashed gray
    lines at y=+/-1 mark the 2-fold change thresholds, with "2-fold up" and "2-fold
    down" annotations at the right edge. Ten top differentially expressed genes are
    labeled in bold (BRCA1, TP53, STAT3, TNF, VEGFA, IL6, CDK2, EGFR, KRAS). The title
    reads "ma-differential-expression · plotly · pyplots.ai". A legend in the upper
    right shows "Not significant", "Significant (padj < 0.05)", and "LOESS trend".
    The background is white with very subtle horizontal grid lines on the y-axis.
