  strengths:
  - Excellent night-sky aesthetic with cohesive dark theme and two-tone star coloring
  - Real astronomical data with accurate star positions, magnitudes, and constellation
    patterns
  - Clean, well-organized code with proper layer composition
  - Good use of magnitude-based sizing to create visual hierarchy
  - Comprehensive coverage with 14 constellations and 260+ stars
  weaknesses:
  - Flat Cartesian projection instead of stereographic/azimuthal as spec requests
  - X-axis extends beyond 360 degrees creating dead space on the left edge
  - Several constellation labels overlap with star markers in dense regions
  - No magnitude scale legend to help viewers interpret star sizes
  - Constellation lines are quite faint (opacity=0.35) making some patterns hard to
    trace
  image_description: 'The plot displays a star chart on a dark navy background (#0A1628).
    Stars are rendered as circles in two colors: pale yellow (#FFFDE7) for bright
    stars (magnitude < 2.0) and light blue-gray (#B0BEC5) for dimmer stars. Star sizes
    vary proportionally with brightness — Sirius is the largest point, while filler
    stars are tiny dots. Thin, semi-transparent light blue (#5C9DC8) lines connect
    stars to form 14 constellation stick figures (Orion, Ursa Major, Cassiopeia, Leo,
    Cygnus, Lyra, Gemini, Taurus, Boötes, Aquila, Scorpius, Canis Major, Perseus,
    Auriga). Constellation names appear in teal (#80CBC4) bold text offset above each
    group''s centroid. The x-axis shows "Right Ascension (°)" from ~400 to 0 (reversed),
    the y-axis shows "Declination (°)" from -50 to 70. Faint dashed grid lines are
    visible at 30° RA intervals and 15° Dec intervals. The title "star-chart-constellation
    · altair · pyplots.ai" is centered at the top in light gray.'
