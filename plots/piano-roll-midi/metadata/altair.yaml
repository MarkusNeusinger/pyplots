    and a subtle dark stroke. Dashed gray vertical lines mark individual beats with
    stronger solid brown lines at measure boundaries every 4 beats. The title reads
    "piano-roll-midi · altair · pyplots.ai" centered at top in dark navy. Three musical
    layers are visible: bass notes in the lower register (C3-E3), chord voicings in
    the mid range (C4-A4 in deep purple), and a melody line in the upper range (C5-G5
    in warmer colors). Italic bold layer labels ("Bass", "Chords", "Melody") appear
    on the right edge. A velocity gradient legend is positioned on the right side
    showing the full color range from 40-120.'
