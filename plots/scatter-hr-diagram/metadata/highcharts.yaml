  image_description: 'The plot displays a Hertzsprung-Russell diagram on a dark (#0d1117)
    cosmic background. The x-axis shows "Surface Temperature (K)" reversed from ~50k
    on the left to ~2k on the right with logarithmic scaling. The y-axis shows "Luminosity
    (L☉)" on a logarithmic scale from 0.0001 to 2M. Spectral class letters (O, B,
    A, F, G, K, M) appear along the top of the plot at their corresponding temperature
    positions. Scatter points are color-coded by spectral type: blue for O stars,
    lighter blue for B, very pale blue-white for A, off-white for F, yellow for G,
    orange for K, and red-salmon for M. The main sequence runs as a clear diagonal
    band from upper-left to lower-right. Supergiants appear as large gold circles
    at top center with high luminosity (~10k-300k L☉). Red giants cluster at the right
    side with moderate-to-high luminosity in orange-pink. White dwarfs sit at the
    bottom as small pale dots. The Sun is marked with a prominent yellow circle labeled
    "Sun ☉" near the middle of the main sequence at approximately 5778 K, 1 L☉. Four
    region labels (SUPERGIANTS, MAIN SEQUENCE, RED GIANTS, WHITE DWARFS) are rendered
    in semi-transparent text. A vertical legend on the upper right lists all 11 series
    with their colors. Title reads "scatter-hr-diagram · highcharts · pyplots.ai"
    with subtitle "Hertzsprung–Russell Diagram — Stellar Luminosity vs Surface Temperature."'
