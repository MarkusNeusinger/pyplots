  image_description: 'The plot displays a win probability line chart for an NFL game
    between the Eagles and Cowboys. The x-axis shows "Play Number" (0-120) and the
    y-axis shows "Win Probability (%)" (0%-100%). A dark line traces the probability
    trajectory with a subtle confidence band around it. The area above the 50% dashed
    reference line is filled with muted teal (#004C54, Eagles) and the area below
    with gray (#869397, Cowboys). Quarter markers (Q1-Q4) appear at the top with dotted
    vertical lines at plays 30, 60, and 90, with alternating subtle background bands.
    Five key scoring events are annotated with teal dots and bold labels on white
    backgrounds: TD Eagles 10-7, TD Eagles 17-10, TD Cowboys 17-17, TD Cowboys 20-24,
    and TD Eagles 27-24. Semi-transparent "EAGLES" and "COWBOYS" team labels appear
    near the 50% line on the left. A legend in the top-left identifies the team fills.
    A prominent "Final: Eagles 27 - Cowboys 24" label sits in the lower-center area.
    The background is light gray (#fafafa) with white border fill, subtle grid lines,
    and clean axis styling with no tick marks.'
