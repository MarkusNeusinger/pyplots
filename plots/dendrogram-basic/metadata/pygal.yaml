review:
  strengths:
  - Excellent manual dendrogram construction using pygal XY chart — creative workaround
    for a chart type pygal does not natively support
  - Color-coded branches by species with colorblind-safe palette that immediately
    communicates cluster membership
  - Stroke width scaling by merge distance creates effective visual hierarchy
  - Perfect spec compliance with correct title format, legend, and data mapping
  - Realistic iris flower data with appropriate measurement distributions
  weaknesses:
  - Library mastery limited by pygal lack of native dendrogram — implementation is
    mostly manual tree construction
  - X-axis labels slightly crowded despite rotation
  - Some empty canvas space in upper region of the plot
  image_description: 'The plot displays a dendrogram (tree diagram) of hierarchical
    clustering for 15 iris flower samples across three species. The x-axis shows sample
    names (Setosa-1 through -5, Virginica-1 through -5, Versicolor-1 through -5) rotated
    at 45 degrees. The y-axis shows "Distance (Ward''s Method)" ranging from 0 to
    10. The title reads "Iris Species Clustering · dendrogram-basic · pygal · pyplots.ai".
    Three species clusters are color-coded: Setosa in blue (#306998) on the left,
    Virginica in purple (#8B5BA5) in the center, and Versicolor in orange (#E07A2F)
    on the right. Gray lines represent inter-cluster merges at higher distances (~4
    and ~10). Branch stroke width increases with merge distance, creating visual hierarchy.
    The background is white with subtle y-axis grid lines. A legend at the bottom
    identifies the four color categories. The dendrogram correctly shows Setosa as
    the most distinct cluster (merging last at distance ~10), while Virginica and
    Versicolor merge at ~4 before joining Setosa.'
