    3; "execute_sql", "render_html" at depth 4; "fetch_rows" and "parse_query" in
    deep red/maroon at depth 5. The hot path (main → request_handler → process_request
    → db_query → execute_sql) is rendered at full opacity while non-hot-path bars
    are faded to ~0.6 opacity. Function names are labeled in bold inside bars when
    wide enough. White thin strokes separate adjacent bars with subtle corner radius.
    Title reads "flamegraph-basic · altair · pyplots.ai" with a two-line subtitle.
    X-axis labeled "Samples (count)", Y-axis labeled "Stack Depth (level)". Grid disabled,
    clean minimal layout.'
