review:
  strengths:
  - Uses Bokeh native p.contour() API with Viridis256 for idiomatic filled contour
    rendering
  - Perfect theme adaptation — all chrome tokens (background, title, axis labels,
    ticks, colorbar) flip correctly between light and dark
  - Realistic mountain terrain dataset with two distinct peaks creating clear geographic
    storytelling
  - construct_color_bar() on ContourRenderer is the idiomatic Bokeh pattern, not a
    general colorbar workaround
  - 'Creative contour line styling: line_color=PAGE_BG at 0.45 alpha creates subtle
    band separation in both themes'
  - match_aspect=True demonstrates domain knowledge for geographic accuracy
  - 'All font sizes explicitly set well above minimums: 42pt title, 32pt axis labels,
    24pt tick labels'
  - 'KISS code structure: flat imports → data → plot → save, no functions or classes'
  weaknesses:
  - 'DE-01: Design sophistication is above defaults but not exceptional — the plot
    is well-configured rather than distinctively designed; could add a focal point
    annotation on the highest peak or use contour level labels to raise storytelling'
  - 'DE-02: Could further refine by adding a subtle watermark-style text element or
    marginal spacing adjustments'
  - 'LM-02: Could leverage more Bokeh-distinctive features such as HoverTool with
    elevation readout (for HTML output) or custom palettes beyond standard Viridis'
