  image_description: 'The plot displays a water pressure-temperature phase diagram
    with a logarithmic y-axis (Pressure in Pa, from 10^1 to 10^9) and linear x-axis
    (Temperature in K, from 200 to 750). Three phase boundary curves are shown: a
    blue solid sublimation curve (lower left), an orange dashed vaporization curve
    (center, rising from triple point to critical point), and a green dotted melting
    curve (nearly vertical, rising from the triple point). The triple point is marked
    with a large red circle at (273.16 K, 611.7 Pa) with an annotated label and arrow.
    The critical point is marked with a purple diamond at (647.1 K, 22.1 MPa) with
    a similar annotation. Four phase region labels appear in large, semi-transparent
    text matching the boundary colors: SOLID (blue, upper left), GAS (orange, lower
    center), LIQUID (green, center-right), and SUPERCRITICAL FLUID (purple, upper
    right). The legend is positioned in the lower right. Top and right spines are
    removed, and the grid is very subtle. The title reads "phase-diagram-pt · seaborn
    · pyplots.ai".'
