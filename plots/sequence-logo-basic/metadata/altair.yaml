  image_description: 'The plot displays a sequence logo approximation for a 10-position
    DNA motif using stacked colored rectangles. The title reads "sequence-logo-basic
    · altair · pyplots.ai" with subtitle "ETS-family transcription factor binding
    motif (CCGGAAGT core)". The Y-axis shows "Information Content (bits)" from 0 to
    2.0 with dashed gridlines at 0.5 intervals. The X-axis shows "Position" (1-10).
    Colors follow DNA convention: A=green, C=blue, G=orange/yellow, T=red. Bold letter
    labels are overlaid on sufficiently tall bars. Core positions (2-9) are at full
    opacity while flanking positions (1, 10) are at 50% opacity. An italic annotation
    marks the CCGGAAGT core region. Positions 3-4 show tall orange G bars (~1.6 bits),
    positions 5-6 show tall green A bars, position 2 shows a dominant blue C bar,
    and position 8 is nearly empty (no conservation). Background is light gray-white
    with a clean, spines-removed design. A legend on the right identifies nucleotide
    colors.'
