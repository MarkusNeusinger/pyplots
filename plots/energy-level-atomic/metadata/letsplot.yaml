  image_description: 'The plot shows a hydrogen atom energy level diagram with six
    horizontal dark slate lines representing quantum states n=1 through n=6, positioned
    vertically by a power-transformed energy scale. Energy values range from -13.60
    eV (n=1, bottom) to -0.38 eV (n=6, near top). A dashed gray line at 0 eV marks
    the ionization limit, with a subtle lavender-shaded band above representing the
    ionization continuum. Downward transition arrows are color-coded by spectral series:
    teal for Lyman (UV), blue for Balmer (Visible), and red/dark-red for Paschen (IR).
    Balmer arrows are noticeably thicker, emphasizing the visible spectrum. V-shaped
    arrowheads appear at the bottom of each arrow. Wavelength annotations in italic
    (121.6 nm, 656.3 nm, 1875.1 nm) label the alpha transitions. A custom legend on
    the right shows colored segments with labels "Lyman series (UV)", "Balmer series
    (Visible)", and "Paschen series (IR)". The title reads "energy-level-atomic ·
    letsplot · pyplots.ai" with subtitle "Hydrogen Atom Energy Levels & Spectral Series".
    The y-axis is labeled "Energy (eV)" with tick marks at each energy level value.'
