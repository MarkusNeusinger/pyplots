  image_description: The plot displays a 20x20 heatmap with the title "heatmap-rainflow
    · highcharts · pyplots.ai" at the top and a subtitle describing the fatigue spectrum.
    The x-axis is labeled "Cycle Mean (MPa)" with rotated tick labels ranging from
