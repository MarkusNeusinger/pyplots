    rectangles represent MIDI notes, with length indicating duration and color mapped
    to velocity using a YlOrRd (yellow-orange-red) sequential colormap. Lower velocity
    (soft) notes appear yellow/light, while higher velocity (loud) notes appear dark
    red/maroon. Background rows alternate between white and light gray to distinguish
    black keys from white keys on a piano keyboard. Vertical grid lines mark beat
    divisions, with thicker lines at measure boundaries. A colorbar on the right shows
    the velocity scale from 40 to 127. The title reads "piano-roll-midi · seaborn
    · pyplots.ai". Long sustained chord notes are visible in the lower register while
    shorter melody notes appear in the upper register.
