  - Missing colorbar in code to explain density color mapping
  - No eye height/width annotations (optional per spec)
  image_description: The plot displays a signal integrity eye diagram on a dark/black
    background using the inferno colormap. Two clear eye openings are visible spanning
    0-1 UI and 1-2 UI on the horizontal axis. The horizontal axis is labeled "Time
    (UI)" ranging from 0 to 2.0 with ticks at 0, 0.5, 1.0, 1.5, 2.0. The vertical
    axis is labeled "Voltage (V)" ranging from approximately -0.05 to 1.2. Bright
    yellow/orange bands at the 0V and 1V signal levels indicate high trace density,
    while the dark eye openings show clean signal regions. Transitions between levels
    appear as purple/magenta traces at approximately 0.5 UI and 1.5 UI, narrowing
    into crossing points. Subtle dashed horizontal reference lines mark the 0V and
    1V levels. A colorbar on the right shows "Trace Density" values. The title reads
    "eye-diagram-basic · seaborn · pyplots.ai" in white text. Top and right spines
    are removed; bottom and left spines are subtle gray.
