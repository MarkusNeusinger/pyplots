  strengths:
  - Correct ASHRAE psychrometric formulas produce physically accurate curves
  - Thoughtful custom color palette with blue gradient for RH, orange for wet-bulb,
    purple for specific volume
  - Comfort zone polygon with green fill creates a clear visual focal point
  - HVAC process path with state point dots effectively tells an engineering story
  - Deterministic reproducible calculations
  weaknesses:
  - Missing enthalpy lines - spec explicitly requires enthalpy isolines (kJ/kg) as
    diagonal lines
  - No direct labels on curves - spec requires all property lines labeled directly
    on the chart not just in a legend
  - Lower RH curves (10% and 20%) are extremely faint and nearly invisible
  - Saturation pressure formula duplicated 5+ times - code is unnecessarily verbose
  - Crowded 24-entry legend at bottom
  image_description: The plot shows a psychrometric chart with dry-bulb temperature
    (°C) on the x-axis (-10 to 50) and humidity ratio (g/kg) on the y-axis (0 to 30).
    Relative humidity curves are drawn as a blue gradient from dark navy (100% RH
    saturation curve, thickest line) through progressively lighter blues down to a
    very pale blue (10% RH). Dashed orange lines represent wet-bulb temperature isolines
    (0°C to 30°C) running diagonally. Dotted purple lines show specific volume isolines
    (0.80 to 0.96 m³/kg). A green filled polygon marks the comfort zone (20-26°C,
    30-60% RH). A red line with two red dots shows an HVAC cooling and dehumidification
    process from approximately 35°C/21 g/kg to 24°C/9.5 g/kg. The title reads "psychrometric-basic
    · pygal · pyplots.ai". A crowded legend at the bottom lists all 24 series. The
    background is white with a light gray plot area and subtle grid lines. No enthalpy
    lines are present. No direct labels appear on the curves themselves.
