review:
  strengths:
  - Excellent astronomical data quality with real star names, coordinates, and magnitudes
    across 18 constellations
  - Strong dark-sky aesthetic design with thematic color choices throughout
  - Proper stereographic projection with RA convention flip
  - Dual PNG + HTML export leveraging Bokeh interactive capability
  - Clean, well-structured code with appropriate complexity
  weaknesses:
  - RA/Dec coordinate grid has no numeric labels (hour/degree markings), reducing
    chart orientability
  - Some label overlap in crowded constellation areas (Capella/Auriga, Vega/Lyra)
  - Bottom ~25% of canvas is mostly empty with sparse stars
  - No magnitude scale legend to help viewers interpret star sizes
  - Grid lines are too faint to serve as useful reference
  image_description: The plot displays a star chart on a dark navy (#0a0e2a) background
    using a stereographic north-pole-centered projection. Stars are rendered as circles
    with sizes proportional to brightness (brighter = larger), colored in pale yellow-white
    for bright stars, blue-white for mid-range, and gray for dim stars. Constellation
    stick-figure lines are drawn in semi-transparent blue (#4a6fa5). 18 constellations
    are visible including Orion (upper area), Ursa Major (center-right), Cassiopeia
    (center-left), Cygnus, Lyra, Pegasus, Leo, Gemini, Taurus, Scorpius, Canis Major,
    Perseus, Auriga, Bootes, Corona Borealis, Andromeda, Pegasus, and Draco. Constellation
    names appear in italic pale blue text near centroids. Brightest stars (Sirius,
    Vega, Arcturus, Capella, Rigel, Betelgeuse, Altair, Aldebaran) are individually
    labeled. A faint dotted coordinate grid (RA/Dec) is barely visible. The title
    "star-chart-constellation · bokeh · pyplots.ai" appears centered at the top. The
    lower quarter of the chart is mostly empty. The chart is 4800x4800 px square format.
