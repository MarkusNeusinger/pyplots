  image_description: 'The plot displays a horizontal swimmer plot for a Phase II oncology
    clinical trial with 25 patients. Patient IDs (PT-001 through PT-025) appear along
    the y-axis, sorted from shortest duration at top (PT-018) to longest at bottom
    (PT-010). Horizontal bars represent time on study in weeks, color-coded by treatment
    arm: deep blue for Arm A (Combo) and salmon/coral for Arm B (Mono). Responders
    have saturated bar colors while non-responders show muted versions. Event markers
    overlay the bars: blue circles for Partial Response, yellow diamonds for Complete
    Response, pink/red down-triangles for Progressive Disease, and purple squares
    for Adverse Events. Dark triangles mark ongoing patients at bar endpoints. A dashed
    vertical line at 24 weeks marks the "24-Week Milestone" and a dotted green line
    marks the median duration (~16 weeks). The floating legend in the upper-right
    explains all symbols with a white background and subtle shadow. The subtitle summarizes
    key stats: 15/25 responded (5 CR), 8 ongoing, median 16 weeks. Background is light
    gray (#fafbfc). The title reads "swimmer-clinical-timeline · highcharts · pyplots.ai"
    in bold, professional typography.'
