  image_description: 'The plot displays a 2D heatmap of a rainflow counting matrix
    using the Plasma colormap on a log10 color scale. The x-axis shows "Mean Stress
    (MPa)" ranging from -40 to 100, and the y-axis shows "Stress Amplitude (MPa)"
    ranging from 20 to 200. Tiles are colored from deep purple/blue (low counts ~5)
    through magenta/pink (medium counts ~50-100) to bright yellow (high counts ~1,000).
    The highest-intensity region (bright yellow/orange) is concentrated at low amplitudes
    (10-40 MPa) near moderate mean stresses (0-40 MPa). A secondary brighter cluster
    is visible around amplitude ~80-120 MPa and mean stress ~60-100 MPa, representing
    the resonance-induced loading event. The title "heatmap-rainflow · letsplot ·
    pyplots.ai" appears in large bold dark text, with an italic subtitle "Variable-amplitude
    fatigue load spectrum with resonance-induced secondary cluster". A bold annotation
    "Peak: 1,128 cycles" marks the highest-count bin. The colorbar on the right is
    labeled "Cycle Count" with log-spaced breaks (5, 10, 50, 100, 500, 1,000). The
    panel background is a subtle off-white, grid lines are removed, and small gaps
    between tiles provide visual separation. A caption at the bottom right reads "Simulated
    rainflow matrix · cycle counts on log10 scale".'
