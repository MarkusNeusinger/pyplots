  strengths:
  - Excellent visual hierarchy with 3-tier gray system for limit lines (dotted warning
    < dashed control < solid center)
  - Red OOC points immediately draw attention to process instability events
  - Realistic CNC manufacturing data with correct SPC constants (A2=0.577, D3=0, D4=2.114
    for n=5)
  - Clean white background with subtle horizontal-only grid creates professional appearance
  - Interactive tooltips via layer_tooltips() demonstrate lets-plot distinctive HTML
    capabilities
  - Both PNG and HTML output leverage the library dual-format strengths
  weaknesses:
  - R chart has no out-of-control points, missing opportunity to demonstrate range
    chart detection
  - Right margin slightly generous with minor canvas utilization loss
  image_description: The plot displays a vertically stacked pair of SPC charts on
    a clean white background. The top chart (X-bar) shows sample means for 30 samples
    connected by a bold blue (#306998) line with white-filled circle markers. Three
    out-of-control points are highlighted as solid red (#DC2626) filled circles at
    approximately samples 8 (shift up to ~25.1), 19 (shift down to ~24.82), and 25
    (shift up to ~25.12). Dashed gray UCL and LCL lines bracket the data, with lighter
    dotted gray warning limit lines inside them. A solid gray center line (CL) runs
    at ~25.0 mm. Labels "UCL", "CL", "LCL" appear in bold gray text to the right.
    The bottom chart (R) shows sample ranges with the same blue line/marker styling.
    No out-of-control points appear in the R chart. UCL dashed line sits at ~0.24,
    center line (R-bar) at ~0.11, and LCL at 0. A dotted UWL line is also visible.
    The title reads "spc-xbar-r · letsplot · pyplots.ai" in bold at the top. Y-axes
    are labeled "X-bar (Sample Mean, mm)" and "R (Sample Range, mm)" with units. X-axis
    shows "Sample Number" with ticks at 1, 6, 11, 16, 21, 26, 30. Subtle horizontal
    grid lines on both panels. Overall layout is clean and professional.
