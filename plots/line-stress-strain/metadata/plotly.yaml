  image_description: 'The plot displays an engineering stress-strain curve for mild
    steel on a clean white background (plotly_white template). The x-axis shows "Engineering
    Strain" (0 to ~0.35), and the y-axis shows "Engineering Stress (MPa)" (0 to ~450).
    The main curve is a solid blue (#306998) line with width 3.5, showing a steep
    elastic rise from the origin, a brief yield plateau near 250 MPa, a gradual strain-hardening
    arc peaking at ~400 MPa around strain 0.22, then a necking decline to ~310 MPa
    at fracture (strain 0.35). A dashed brown (#B85C38) line near the origin represents
    the 0.2% offset line. Three distinct markers highlight key points: a brown diamond
    for Yield Point, an orange/green star for UTS (400 MPa), and a purple X for Fracture
    — each with color-coordinated annotation arrows and labels. Region labels ("Elastic",
    "Strain Hardening", "Necking") appear in gray near the top of the chart. A "E
    = 210 GPa" annotation with arrow points to the elastic slope. The legend sits
    in the lower-center area with a semi-transparent white background. Subtle horizontal
    gridlines on the y-axis only. Overall layout is well-proportioned with the curve
    filling most of the canvas.'
