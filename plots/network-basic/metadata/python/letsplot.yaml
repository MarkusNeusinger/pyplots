review:
  strengths:
  - Correct node-link diagram with 4-quadrant community layout that clearly separates
    departments
  - Degree-based node sizing (8 + degree*2) reveals hub nodes at a glance
  - Layer tooltips (label, department, connections) make good use of letsplot's interactive
    capabilities
  - Custom intra-group spring layout with centroid anchoring keeps clusters visually
    separate
  - 'Full theme-adaptive chrome: background, text, legend, edges all adapt between
    light and dark renders'
  - Cross-group edges clearly visible and tell the interdepartmental connectivity
    story
  - HTML export and scale=3 PNG export both correct, fully idiomatic letsplot output
  weaknesses:
  - 'Label crowding in dense clusters: Research (top-left) and Marketing (top-right)
    groups have 5 nodes each with labels that overlap slightly at scale'
  - Title format does not match required pattern — should be 'network-basic · letsplot
    · anyplot.ai' (or with a descriptive prefix separated by ·), currently has 'Office
    Social Network · network-basic · letsplot · anyplot.ai' which adds an extra segment
    before the spec-id
  - 'Canvas under-utilised: the network occupies roughly the central 60% of the 16:9
    canvas; scale_x_continuous limits=(-0.05, 1.05) and group_corners only go to 0.78,
    leaving wide margins'
  - geom_text label offset (label_y = y + 0.065) is a fixed value and causes some
    labels to be positioned awkwardly relative to densely packed nodes
