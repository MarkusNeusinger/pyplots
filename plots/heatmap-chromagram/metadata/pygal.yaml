  image_description: 'The plot displays a chromagram heatmap with 12 pitch classes
    (B at top, C at bottom) on the y-axis labeled "Pitch Class" and time from 0.0
    to 7.2+ seconds on the x-axis labeled "Time (seconds)". The title reads "heatmap-chromagram
