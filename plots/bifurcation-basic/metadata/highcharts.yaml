  image_description: 'The plot displays a bifurcation diagram of the logistic map
    on a light gray (#fafbfc) background. The title "bifurcation-basic · highcharts
    · pyplots.ai" is rendered in dark blue at the top, with a subtitle showing the
    equation x(n+1) = r · x(n) · (1 − x(n)). The x-axis is labeled "Growth Rate Parameter
    (r)" spanning 2.5 to 4.0, and the y-axis is labeled "Steady-State x" spanning
    0 to 1.0. Data points are rendered as small semi-transparent blue circles (rgba
    blue at 0.3 alpha). The period-doubling cascade is clearly visible: a single stable
    branch from r=2.5 splits at r≈3.0 into two branches, then four at r≈3.449, eight
    at r≈3.544, before entering chaotic behavior. Four vertical dashed plot lines
    mark these bifurcation points with labels in red and purple text. Dotted grid
    lines with very low opacity provide subtle reference. The chaotic region (r>3.57)
    shows the characteristic dense cloud with periodic windows visible. The overall
    layout has generous margins and the chart fills the canvas well.'
