    on the left
  image_description: The plot shows a meta-analysis funnel plot with an inverted y-axis
    displaying Standard Error (0.0 at top, ~0.5 at bottom). The x-axis shows "Log
    Odds Ratio (Drug vs Placebo)" ranging from approximately -1.5 to 0.8. A solid
    blue vertical line at x ≈ -0.39 marks the summary effect, and a dotted gray vertical
    line marks the null effect at 0. Dashed blue diagonal lines form pseudo 95% confidence
    limits creating an inverted funnel shape, with a very light blue shaded fill between
    them. 15 blue circular markers with white edges represent individual studies.
    Most studies cluster near the top (low SE, high precision) around the summary
    effect, while a few studies with higher SE (lower precision) scatter more widely.
    Two notable outliers on the right side fall outside the funnel at large SE values,
    visually suggesting publication bias. Top and right spines are removed. A frameless
    legend in the lower left identifies the summary effect and null effect lines.
    Title reads "funnel-meta-analysis · seaborn · pyplots.ai".
