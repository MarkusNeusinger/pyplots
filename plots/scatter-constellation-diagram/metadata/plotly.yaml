  image_description: The plot displays a 16-QAM constellation diagram on a square
    canvas with a light gray background (#FAFBFC). Sixteen clusters of received symbols
    (semi-transparent dots) are arranged in a 4×4 grid at ±1, ±3 positions on both
    axes. The received symbols are color-coded by error magnitude using the Viridis
    colorscale (dark purple for low error, yellow for high error), with a vertical
    colorbar on the right side labeled "Error Magnitude" ranging from 0 to ~0.7. Ideal
    constellation points are marked with orange X markers (hollow, with orange outlines).
    Dashed gray decision boundary lines appear at ±2 on both axes. The title reads
    "scatter-constellation-diagram · plotly · pyplots.ai" centered at the top. Axes
    are labeled "In-Phase (I)" (x-axis) and "Quadrature (Q)" (y-axis) with tick marks
    at integer intervals. An annotation box in the upper right displays "EVM = 13.2%"
    with "SNR = 20 dB · Phase offset = 5°" beneath it, styled with a white background
    and subtle border. A legend in the upper left identifies "Received symbols" and
    "Ideal points". Zero lines are visible as subtle gray lines through the origin.
    The phase offset creates a visible slight rotation of the clusters relative to
    the ideal grid positions.
