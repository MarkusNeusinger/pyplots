  image_description: The plot displays a star chart using a dark navy (#0A0A2A) background
    with an Aitoff all-sky projection. Stars are rendered as white/pale blue-white
    circles with size proportional to brightness (brighter stars are larger). Constellation
    stick-figure lines connect stars in thin semi-transparent blue lines. Twenty-one
    constellations are labeled in italic muted blue-gray text near their centroids
    (Orion, Ursa Major, Cassiopeia, Leo, Scorpius, Cygnus, Lyra, Gemini, Taurus, Canis
    Major, Aquila, Bootes, Perseus, Auriga, Virgo, Corona Bor., Pegasus, Andromeda,
    Draco, Hercules, Sagittarius). Brightest stars (mag < 1.0) are individually labeled
    (Sirius, Vega, Arcturus, Capella, Rigel, Betelgeuse, Altair, Aldebaran, Spica,
    Pollux). A dashed golden ecliptic line crosses the chart. The RA grid is labeled
    in hours (0h-22h) and declination in degrees (-75 to +75). Background stars (~300)
    appear as small dim gray dots. A legend in the lower-right identifies the ecliptic.
    The title reads "star-chart-constellation · matplotlib · pyplots.ai" and a subtitle
    at the bottom reads "Right Ascension (hours) — Aitoff Projection | Declination
    (°)".
