    marks the Target (10.0) and an orange solid line marks the Mean (10.0074). Subtle
    red-shaded rejection regions appear under the curve tails beyond the spec limits.
    A monospace stats box in the upper right displays Cp=1.28, Cpk=1.09, σ=0.0130,
    n=200 with a rounded border. Below it, a bold green "CAPABLE" verdict is shown.
    The legend in the upper left lists all four vertical lines. Top and right spines
    are removed, left/bottom spines are light gray. A subtle y-axis grid (alpha=0.15)
    provides reference. X-axis uses 3-decimal formatting. Title reads "histogram-capability
    · matplotlib · pyplots.ai".'
