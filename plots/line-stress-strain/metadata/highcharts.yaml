    space
  - Green/red marker color pairing could be improved for colorblind accessibility
  image_description: 'The plot displays a mild steel engineering stress-strain curve
    rendered with Highcharts. The title reads "Mild Steel Tensile Test · line-stress-strain
    · highcharts · pyplots.ai" with a subtitle showing E = 210,000 MPa · σ_y = 250
    MPa · UTS = 400 MPa. The main curve is a dark blue line (#306998) starting at
    the origin, rising steeply through the elastic region, plateauing around 250 MPa
    (yield), then gradually climbing through strain hardening to ~400 MPa (UTS), before
    declining through necking to ~300 MPa at fracture (strain 0.35). Three colored
    plot bands mark regions: light green for "Elastic" (0 to ~0.015), light blue for
    "Strain Hardening" (~0.015 to 0.22), and light red for "Necking" (0.22 to 0.35).
    Critical points are marked with distinct markers: green circle (Yield Point),
    blue diamond (UTS), red triangle (Fracture Point). A dashed orange 0.2% offset
    line is visible but very short in the elastic region. Horizontal dotted reference
    lines mark σ_y = 250 MPa and UTS = 400 MPa on the right. The legend is positioned
    in the upper-right corner listing all five series. X-axis: "Engineering Strain
    (mm/mm)", Y-axis: "Engineering Stress (MPa)".'
