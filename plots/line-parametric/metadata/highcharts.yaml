review:
  strengths:
  - Well-chosen color gradient palettes that clearly show parameter direction (cool-to-warm
    transitions)
  - Both required curve types (Lissajous + spiral) present with good point density
  - Clean code structure with deterministic data generation
  - Start/end markers with shape differentiation (circle vs diamond)
  weaknesses:
  - Equal aspect ratio not implemented - 16:9 canvas distorts curves horizontally,
    violating key spec requirement
  - Legend not visible in rendered output - needs positioning or spacing fix
  - X-axis tick labels too dense - labels at every 0.05 create visual clutter
  - No text labels on start/end markers
  - Uses ScatterSeries instead of LineSeries for line drawing
  image_description: The plot displays two parametric curves on a white background
    with a 16:9 aspect ratio canvas (4800x2700). The title "line-parametric · highcharts
    · pyplots.ai" appears at top in bold black text, with a smaller subtitle describing
    both curves. The Lissajous figure (x=sin(3t), y=sin(2t)) is rendered as a bow-tie/figure-eight
    shape with a color gradient transitioning from dark navy blue through cyan and
    light green to yellow and burnt orange. The Archimedean spiral starts from the
    center and expands outward with a gradient from deep purple through lavender and
    pink to salmon. Both axes are labeled "x(t)" and "y(t)" with tick labels at every
    0.05 increment along the x-axis, creating very dense labeling. Start points are
    marked with filled circle markers and end points with diamond markers. The grid
    lines are very subtle with low opacity. The legend is NOT visible in the rendered
    image. The curves appear horizontally stretched because the canvas is 16:9 but
    both axis ranges are set equally to -1.3 to 1.3, violating the equal aspect ratio
    requirement.
