review:
  strengths:
  - Significance coloring (blue vs silver) creates meaningful visual hierarchy beyond
    typical ACF/PACF plots
  - Data choice with clear seasonality (period 12) perfectly demonstrates the primary
    use case
  - Idiomatic plotnine grammar of graphics with facet_wrap for panel layout
  - Thorough theme customization with explicit font sizes, subtle grid, and styled
    strip backgrounds
  - Lag 0 correctly shown as non-significant despite being 1.0 by definition
  weaknesses:
  - Y-axis labeled Correlation instead of individual ACF/PACF labels as spec requests
  - PACF panel has proportionally more empty space due to smaller correlation range
    with free_y
  image_description: The plot displays two vertically stacked panels — ACF (top) and
    PACF (bottom) — on a clean minimal background. Stem lines extend from a gray zero
    baseline to correlation values, capped with circular markers. Significant lags
    (outside confidence bounds) are colored in Python Blue (#306998), while non-significant
    lags appear in muted silver (#B0BEC5). Red dashed lines at approximately ±0.13
    mark the 95% confidence bounds. The ACF panel shows a clear sinusoidal seasonal
    pattern with period 12, with correlations oscillating between approximately -0.7
    and +1.0. Lag 0 in ACF is shown as a gray (non-significant) dot at 1.0. The PACF
    panel starts from lag 1, showing a strong spike at lag 1 (~0.7), a sharp negative
    spike at lag 3 (~-0.7), and seasonal spikes around lags 5-6 and 9-12, with most
    higher lags falling within the confidence bounds. The title "acf-pacf · plotnine
    · pyplots.ai" appears at the top in dark indigo bold text. Strip labels "ACF"
    and "PACF" sit in light gray backgrounds. X-axis labeled "Lag" with ticks at intervals
    of 6, shared y-axis labeled "Correlation". Overall layout is 16:10 landscape with
    generous whitespace and subtle horizontal grid lines.
