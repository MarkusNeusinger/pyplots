review:
  strengths:
  - Excellent audio synthesis with realistic musical notes, harmonics, and ADSR envelopes
  - Correct mel filterbank construction from scratch without librosa dependency
  - All font sizes explicitly set and appropriate for 4800x2700 canvas
  - Good colormap choice (magma) for spectrogram visualization
  - Proper dB conversion with floor value to avoid log(0)
  weaknesses:
  - Hardcoded 256-hex-value magma palette instead of using Bokeh built-in Magma256
    from bokeh.palettes
  - p.image() linear mapping combined with y_axis_type=log creates visual distortion
    of mel bands
  - No use of Bokeh interactive features like HoverTool for time/frequency/power readout
  - Design could be more polished with better title positioning and colorbar integration
  image_description: The plot displays a mel-spectrogram rendered with the magma colormap
    (dark purple background transitioning through pink to near-white for high-intensity
    regions). The x-axis shows "Time (seconds)" from 0 to 4, and the y-axis shows
    "Frequency (Hz)" on a logarithmic scale with ticks at 50, 100, 200, 500, 1000,
    2000, 4000, and 8000 Hz. A colorbar on the right is labeled "Power (dB)" ranging
    from approximately -70 to -20 dB. Bright horizontal bands are clearly visible
    at various frequency levels corresponding to the synthesized melody notes (C4,
    E4, G4, C5, A4, F4, D4) and their harmonics, with fundamental frequencies showing
    the brightest intensity. The note onsets and offsets are visible with ADSR envelope
    shaping. Background noise appears as a low-level dark purple texture. The lower
    mel bins appear heavily stretched due to the combination of linear image mapping
    with a log y-axis, creating visually uneven band heights. The title reads "spectrogram-mel
    · bokeh · pyplots.ai".
