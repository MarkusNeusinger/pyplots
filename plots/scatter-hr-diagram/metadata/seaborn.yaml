review:
  strengths:
  - Dark theme is highly appropriate for astrophysics visualization, creating an immersive
    night-sky aesthetic
  - KDE density contours on the main sequence are a distinctive seaborn feature that
    adds analytical depth
  - All four stellar regions clearly labeled with path effects for readability on
    dark background
  - Sun marked as a prominent reference point with star marker and bold annotation
  - Secondary spectral class axis provides complete astrophysical context
  - Dual legends (Spectral Type + Region) are well-separated and clearly styled
  - Data generation follows realistic L ∝ T^3.5 relationship for main sequence stars
  weaknesses:
  - Markers at alpha=0.45 appear somewhat faint on the dark background, especially
    lighter spectral types (A, F)
  - The 'Main Sequence' rotated label overlaps with KDE contour lines and data points,
    reducing readability
  - Spectral type colors (A type near-white, F type pale) have lower contrast against
    the dark background than ideal
  image_description: |-
    The plot displays a Hertzsprung-Russell diagram on a dark (#0D1117) background. The title "scatter-hr-diagram · seaborn · pyplots.ai" appears at the top in white text. A secondary x-axis at the top shows spectral classes O, B, A, F, G, K, M with a "Spectral Class" label. The primary x-axis shows "Surface Temperature (K)" on a reversed logarithmic scale from ~45000K (left) to ~1800K (right). The y-axis shows "Luminosity (L☉)" on a log scale from 10^-5 to 10^5.

    Stars are plotted with different markers per region: circles for Main Sequence, diamonds for Red Giants, squares for Supergiants, and downward triangles for White Dwarfs. Colors follow the spectral type convention: blue shades for O/B stars (upper left), pale/white for A stars, yellow for F/G stars, orange for K, and red for M stars (lower right).

    The main sequence forms a clear diagonal band from upper-left (hot, luminous) to lower-right (cool, dim), highlighted by blue KDE density contours. Red Giants cluster in the upper-right with orange/red diamond markers around luminosity 100-1000. Supergiants are scattered across the top as square markers at luminosities 10^3.5-10^5.5. White Dwarfs appear as downward triangles in the lower portion at luminosities 10^-4 to 10^-1.5.

    The Sun is marked with a prominent yellow star marker (★) at approximately 5778K and luminosity 1, with a bold white "Sun" annotation. Region labels ("Supergiants", "Red Giants", "White Dwarfs", "Main Sequence") appear in italic gray text with dark stroke effects. Two legends are present: Spectral Type (lower-left) showing colored dots for O through M, and Region (upper-right) showing the four marker shapes.
