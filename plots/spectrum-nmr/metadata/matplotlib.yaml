    spectrum. Four distinct peak groups are visible: a CH2 quartet at 3.69 ppm (left
    side, showing four sub-peaks), an OH singlet at 2.61 ppm (center), a prominent
    CH3 triplet at 1.18 ppm (three sub-peaks visible), and a small TMS reference peak
