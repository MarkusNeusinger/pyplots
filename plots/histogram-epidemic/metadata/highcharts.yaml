  image_description: 'The plot displays a stacked column chart (epidemic curve) showing
    daily new cases of a respiratory illness outbreak from January 15 to mid-April
    2024. Three case classifications are stacked: Confirmed (dark steel blue #306998),
    Probable (amber/orange #f39c12), and Suspect (gray #95a5a6). Two dashed vertical
    plot lines mark key interventions: "Travel Advisory Issued" in red (~day 25) and
    "Vaccination Campaign" in green (~day 42). A dashed dark spline line overlays
    the cumulative total cases on a secondary y-axis (right side, 0-2320+). The chart
    has a light gray background (#fafbfc), a prominent title "histogram-epidemic ·
    highcharts · pyplots.ai" with a descriptive subtitle below it. The legend is centered
    at the top. X-axis shows "Symptom Onset Date" with weekly tick intervals, left
    y-axis shows "Daily New Cases" (0-75), right y-axis shows "Cumulative Cases."
    Two distinct epidemic waves are visible — a first wave peaking around day 20 and
    a larger second wave peaking around day 55.'
