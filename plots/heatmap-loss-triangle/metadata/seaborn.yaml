  image_description: 'The plot displays an actuarial loss development triangle as
    a 10x10 heatmap. Rows represent accident years 2015-2024, columns represent development
    periods 1-10. Cells are colored with a custom blue sequential colormap ranging
    from light blue for low values to dark navy for high values. The upper-left triangle
    contains actual/observed values with solid cell backgrounds and bold annotations;
    the lower-right triangle shows projected (IBNR) values with diagonal hatching
    overlay and italic annotations. Cell annotations display cumulative amounts (full
    numbers with comma separators for values under 10K, abbreviated K format for larger
    values). Text color adapts to background brightness — white text on dark cells,
    dark text on light cells. A styled rounded box above the plot displays the 9 age-to-age
    development factors in monospace font. The colorbar on the right is labeled "Cumulative
    Claims ($K)". A legend in the bottom-right distinguishes "Actual" (solid) from
    "Projected (IBNR)" (hatched). Title reads "heatmap-loss-triangle · seaborn · pyplots.ai".
    X-axis: "Development Period (Years)", Y-axis: "Accident Year".'
