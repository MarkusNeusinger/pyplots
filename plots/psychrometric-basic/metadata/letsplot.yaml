  - Library mastery is generic — could leverage more lets-plot distinctive features
  image_description: The plot displays a psychrometric chart with dry-bulb temperature
    (°C) on the x-axis (-10 to 50) and humidity ratio (g/kg) on the y-axis (0 to 30).
    Relative humidity curves from 10% to 100% are rendered as smooth curves using
    a grayscale gradient (light gray for 10% to dark gray for 90%), with the 100%
    saturation curve prominently drawn in dark blue (#306998). Wet-bulb temperature
    lines (0°C to 35°C) appear as light blue diagonal lines with labels near the saturation
    curve. Enthalpy lines (10 to 110 kJ/kg) in vermillion/orange run diagonally from
    upper-left to lower-right, labeled on the left edge with units (kJ/kg). Specific
    volume lines (0.78 to 0.94 m³/kg) in purple run at a slightly different diagonal
    angle, labeled on the right edge with units. A comfort zone is highlighted as
    a light blue shaded polygon (~20-26°C, 30-60% RH) with a dashed border and bold
    "Comfort Zone" label. An HVAC process path is shown as a thick orange arrow from
    ~32°C/50%RH to ~24°C/50%RH with bold "Cooling & Dehumidification" label connected
    by an annotation line. The title reads "psychrometric-basic · letsplot · pyplots.ai"
    in bold. White background with light gray (#fafafa) panel and subtle gridlines.
