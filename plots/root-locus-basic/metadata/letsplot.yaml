    branches indicate direction of increasing gain. Serif "jω" and "σ" labels appear
    near the imaginary and real axes respectively. The title reads "root-locus-basic
    · letsplot · pyplots.ai" in bold. Axis labels are "Real Axis (σ)" and "Imaginary
    Axis (jω)". A caption shows the transfer function G(s) = (s + 3) / [s(s+1)(s+2)(s+4)]
    with pole/zero legend. The legend on the right identifies all four branches under
    "Locus Branch".'
