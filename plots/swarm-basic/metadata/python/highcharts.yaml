review:
  strengths:
  - Perfect dual-theme adaptation — all chrome tokens (INK, INK_SOFT, ELEVATED_BG,
    GRID) correctly applied to both light and dark renders with no dark-on-dark failures
  - 'Excellent data storytelling: bimodal annotations on Engineering and Sales columns,
    High Performer/Developing zone labels, and an overall mean reference dashed line
    guide the viewer immediately to key insights'
  - Per-category background zone bands (x-axis plotBands) with subtle Okabe-Ito-tinted
    fill provide clear visual structure without overwhelming the data
  - 'Correct Okabe-Ito palette — first series is #009E73 (brand green), multi-series
    follows canonical positions 1-4 in order'
  - Mean diamond markers (Okabe-Ito position 8 adaptive neutral) per category provide
    the optional statistical summary suggested in the spec
  weaknesses:
  - Beeswarm jitter algorithm produces visible point crowding in denser groups (Operations
    and Marketing columns) — some points overlap slightly, reducing VQ-02
  - No spine/frame removal — Highcharts scatter keeps the default chart border; removing
    top/right lines or the outer frame would improve minimalism
  - 'CQ-04: beeswarm offset computation (lines 47-76) uses nested loops with try/else/break
    patterns that are slightly verbose for what they accomplish'
  - 'LM-01: swarm x-offsets computed entirely in Python rather than leveraging any
    Highcharts layout capability; the library is used as a rendering layer only for
    the positioning logic'
