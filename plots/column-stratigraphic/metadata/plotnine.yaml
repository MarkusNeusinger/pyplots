  image_description: 'The plot displays a vertical stratigraphic column spanning 0-180m
    depth (increasing downward). The title reads "column-stratigraphic · plotnine
    · pyplots.ai" in bold at the top. The column contains 10 geological layers with
    distinct fill colors and lithology patterns: Sandstone (gold/yellow with stipple
    dots), Shale (gray with horizontal dashes), Limestone (blue with brick pattern),
    Siltstone (green with random short dashes), Conglomerate (salmon/coral with open
    circles), and Mudstone (dark brown/gold with fine horizontal dashes). Age labels
    (Late Cretaceous, Early Cretaceous, Late Jurassic, Middle Jurassic, Triassic)
    appear on the left with vertical bracket lines. Formation names (Frontier Fm,
    Madison Fm, Kootenai Fm, Morrison Fm, Sundance Fm) appear in italic on the right
    with semi-transparent label backgrounds. A prominent red wavy unconformity line
    at ~95m depth with bold italic "~ Unconformity ~" annotation serves as a focal
    point. The bottom legend displays all 6 lithology types on a light gray background.
    The y-axis shows "Depth (m)" with 20m tick intervals.'
