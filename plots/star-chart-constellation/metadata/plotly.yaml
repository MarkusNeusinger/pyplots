  strengths:
  - Excellent real-world astronomical data with accurate star positions, magnitudes,
    and constellation connections across 25+ constellations
  - Strong dark-sky aesthetic with carefully chosen warm cream star colors graduated
    by magnitude and blue constellation lines
  - 'Good use of Plotly-specific features: Scattergl for WebGL performance, hover
    tooltips with star details, HTML export for interactivity'
  - Clean well-structured code with consolidated constellation line traces and systematic
    annotation generation
  - Ecliptic line and bright star labels add scientific depth beyond basic requirements
  weaknesses:
  - Label overlap persists in crowded sky regions (Cygnus/Lyra, Taurus/Aries, Orion
    area) despite repair attempts
  - Uses equirectangular projection instead of stereographic/azimuthal as specified
  - Star name annotations at 11pt could be slightly larger for better readability
  image_description: 'The plot displays a celestial star chart on a deep dark navy
    background (#0A0E1A/#060A14). Stars are rendered as circles in warm cream/pale
    yellow tones (#FFFDE8, #FFF8DC, #E8E4D4, #C8C4B8), with sizes proportional to
    brightness — bright stars like Sirius, Vega, Rigil Kentaurus, and Arcturus appear
    as large prominent circles while dimmer stars are smaller dots. Semi-transparent
    cornflower blue lines (rgba(100,149,237,0.6)) connect stars within 25+ constellations
    including Orion, Ursa Major, Cassiopeia, Leo, Scorpius, Cygnus, Lyra, Gemini,
    Taurus, Canis Major, and more. Constellation names are labeled in light blue text
    near each group''s centroid. The brightest stars (mag < 0.5) have individual name
    labels. ~200 tiny dim background stars fill the sky. A dashed orange ecliptic
    line curves sinusoidally across the chart. The x-axis shows Right Ascension (24h
    to 0h, reversed per astronomical convention) and the y-axis shows Declination
    (-75° to 75°) with degree symbols. A magnitude legend appears on the right edge.
    Title reads "star-chart-constellation · plotly · pyplots.ai" in light blue. Subtle
    grid lines at low opacity provide orientation.'
