    design choice
  image_description: 'The plot displays a mel-spectrogram on a dark background (#0a0a0f)
    using the magma colormap. The x-axis shows "Time (s)" from 0.0 to ~3.8 seconds,
    and the y-axis shows "Frequency (Hz)" with mel-scaled labels at 64, 128, 256,
    512, 1k, 2k, 4k, and 8k Hz. A colorbar on the right is labeled "Power (dB)" with
    ticks from 0 to -80 dB. The spectrogram reveals a rich synthesized audio signal:
    curved harmonic bands (fundamental ~220 Hz with harmonics) undulate in the lower-mid
    frequency range, bright vertical lines appear at regular 0.5-second intervals
    representing percussive noise bursts, and a clear ascending diagonal line rises
    from ~500 Hz to ~2000 Hz in the second half. The title reads "spectrogram-mel
    · matplotlib · pyplots.ai". All spines are removed, and two very subtle dashed
    horizontal reference lines appear at ~300 Hz and ~1000 Hz.'
