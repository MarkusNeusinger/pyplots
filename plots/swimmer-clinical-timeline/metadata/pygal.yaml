    from 0 to 60. Patient IDs appear on the y-axis. Event markers are overlaid on
    bars: blue triangles (partial response), yellow stars (complete response), pink
    diamonds (progressive disease), orange squares (adverse event), and gray arrows
    (ongoing). A two-row custom legend at the bottom shows arm colors and event symbols.
    The title reads "swimmer-clinical-timeline · pygal · pyplots.ai". Two stray markers
    (a blue triangle and a yellow star) float at the very top of the chart above PT-002,
    disconnected from any bar — this is a rendering defect from the SVG regex bar
    extraction.'
