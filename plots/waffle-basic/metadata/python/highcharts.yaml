review:
  strengths:
  - Clean, well-structured 10×10 waffle grid with perfectly proportioned squares
  - Correct proportional mapping of data (42%, 28%, 18%, 12% = 100%)
  - Legend with percentage labels is clear and well-positioned
  - Theme adaptation works correctly in both light and dark renders
  - No text overlap or legibility issues in either render
  - Good canvas utilization with balanced margins
  weaknesses:
  - Output files saved as plot.png instead of plot-{THEME}.png — prevents proper pipeline
    integration
  - Title hardcodes pyplots.ai instead of anyplot.ai
  - Palette uses Python logo colors instead of Okabe-Ito (#009E73 must be first series)
  - 'Background colors hardcoded as #ffffff instead of using ANYPLOT_THEME environment
    variable'
  - Design is functional but generic — no visual sophistication or intentional aesthetic
    choices
  - No design hierarchy or data storytelling; data is simply displayed
  image_description: |-
