  image_description: 'The plot shows a swimmer plot for a clinical trial timeline
    with 25 patients displayed as horizontal bars sorted by treatment duration (shortest
    at bottom, longest at top). Bars use rounded corners (FancyBboxPatch) and are
    color-coded by treatment arm: steel blue (#306998) for Arm A and muted purple
    (#7B68AE) for Arm B. Complete responders are visually highlighted with higher
    opacity and dark edge outlines. Event markers appear along bars: orange triangles
    (Partial Response), blue outlined stars (Complete Response), red diamonds (Progressive
    Disease), and purple X marks (Adverse Event). Several patients have right-pointing
    arrows indicating ongoing treatment. A "CR at week 13" annotation with an arrow
    highlights the longest complete responder (PT-002). A dashed vertical "Data cutoff"
    line appears at the right edge. The background is a subtle off-white (#FAFAFA),
    top/right spines are removed, and a very subtle x-axis grid (alpha=0.15) provides
    reference. The legend in the lower right lists all symbols including a neutral
    gray arrow for "Ongoing". Title reads "swimmer-clinical-timeline · matplotlib
    · pyplots.ai".'
