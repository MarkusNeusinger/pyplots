  image_description: The plot displays two vertically stacked panels on a light background.
    The top panel shows ACF values and the bottom shows PACF values, both sharing
    an x-axis labeled "Lag" with breaks at 0, 6, 12, 18, 24, 30, 36. Vertical stem
    lines (size 2.5) extend from a zero baseline to correlation values, capped with
    circular markers (size 4.5). Stems are colored blue (#306998) for non-significant
    lags and red (#C0392B) for significant lags exceeding the 95% confidence bounds
    shown as horizontal gray dashed lines. A legend in the upper-right of the ACF
    panel explains "Non-significant" (blue) and "Significant" (red). The bold centered
    title reads "acf-pacf · letsplot · pyplots.ai". The ACF panel shows a clear sinusoidal
    seasonal pattern with strong positive spikes at lags 12, 24, 36 and negative dips
    at lags 6, 18, 30. Lag 0 is blue at 1.0. The PACF panel shows a sharp spike at
    lag 1, then seasonal spikes with most values falling within the confidence bounds
    after the initial lags. Subtle gray y-axis grid lines provide reference without
    clutter.
