  image_description: 'The plot displays a 12-lead ECG arranged in the standard clinical
    3×4 grid format on a pink/salmon ECG paper background (#fff5f0). The top row shows
    leads I, aVR, V1, V4; the middle row shows II, aVL, V2, V5; the bottom row shows
    III, aVF, V3, V6. A full-length Lead II rhythm strip spans the entire bottom of
    the display. Each lead shows realistic P-QRS-T waveform complexes in dark navy
    (#1a1a2e) against the paper background. The grid has three levels of hierarchy:
    light pink minor gridlines (#f0ccc4) at 1mm-equivalent intervals, darker salmon
    major gridlines (#c8887e) at 5mm-equivalent intervals, and thicker column separators
    (#b07068) at 2.5s boundaries. Lead labels are bold and positioned at the upper-left
    of each lead''s area. The title "ecg-twelve-lead · letsplot · pyplots.ai" appears
    in bold dark text at the top left. aVR correctly shows inverted morphology, and
    the precordial leads show appropriate R-wave progression from V1 to V6. Normal
    sinus rhythm at approximately 72 bpm is displayed across all leads.'
