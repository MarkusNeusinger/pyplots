  strengths:
  - Excellent flame graph using columnrange inverted - creative Highcharts approach
  - Intelligent label fitting with pixel-width estimation and graceful degradation
  - Professional 15-color warm flame palette with deterministic assignment
  - Realistic CPU profiling data with meaningful function names
  - Clean iterative code structure avoiding recursion
  - White monospace text with rgba outline for readability
