  strengths:
  - All four particle line styles (straight, wavy, curly, dashed) rendered convincingly
    with vectorized path generation
  - Interactive legend selection with opacity conditioning is a genuine Altair-specific
    feature
  - Professional design with custom palette, serif italic physics notation, vertex
    shadows, and subtle background panel
  - Complete gluon fusion Higgs production process provides excellent real-world physics
    context
  - Process annotation and time axis add clarity to the diagram narrative
  weaknesses:
  - Blue and purple colors (fermion vs boson) could benefit from greater contrast
    for colorblind accessibility
  - Legend positioned far right, slightly isolated from the main diagram
  image_description: The plot displays a Feynman diagram for Higgs boson production
    via gluon fusion (g + g → H → γ + γ). Two curly/looped dark-red gluon lines enter
    from the left, connecting to two vertices. Blue straight fermion lines form a
    triangular top-quark loop with blue triangle arrow markers at edge midpoints indicating
    particle flow direction. A purple dashed line represents the Higgs boson propagator
    connecting the right triangle vertex to a decay vertex. Two golden wavy sinusoidal
    photon lines emerge from the decay vertex diverging up-right and down-right. Four
    dark vertex dots with white borders and subtle shadows mark interaction points.
    Particle labels (g, t, H, γ) are rendered in bold serif italic font, colored by
    particle type. The process annotation "g + g → H → γ + γ" appears at the top in
    gray italic serif. A dashed time axis with arrow runs along the bottom labeled
    "time". A legend on the upper right shows four particle types (fermion=blue, photon=gold,
    gluon=red, boson=purple). The entire diagram sits on a subtle light blue-gray
    rounded rectangle background panel. Title reads "feynman-basic · altair · pyplots.ai"
    in 28pt at the top.
