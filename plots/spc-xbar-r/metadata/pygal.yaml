    share a warm beige plot background (#F4F3EE) on a white canvas. The x-axis is
    labeled "Sample Number" with ticks at 1, 5, 10, 15, 20, 25, 30. A shared legend
    at the bottom identifies: Sample Mean/Range, Out of Control, Center Line (CL),
    UCL/LCL (±3σ), and Warning (±2σ). The title reads "spc-xbar-r · pygal · pyplots.ai".'
