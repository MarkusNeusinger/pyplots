  strengths:
  - Excellent dark-sky aesthetic that authentically mimics a real star chart with
    custom color palette
  - Real astronomical data with accurate star positions and magnitudes creates genuine
    educational value
  - Well-crafted magnitude legend with graduated sizes and colors
  - Clean stereographic projection implementation with proper RA/Dec grid overlay
  - Manual label nudges to reduce overlap show attention to visual polish
  weaknesses:
  - Only 10 constellations included vs the spec suggested 20-30 range
  - Some minor text overlaps remain (60° label on star, RA ticks near constellation
    names)
  - Constellation line visibility could be slightly increased
  - Font sizes could be larger for the output resolution
  image_description: 'The plot displays a star chart on a deep navy (#060d1f) background
    with stereographic projection centered on the northern sky. Ten constellations
    are shown: Orion, Ursa Major, Cassiopeia, Leo, Cygnus, Scorpius, Gemini, Lyra,
    Aquila, and Taurus. Stars are rendered as circular points with magnitude-based
    sizing — brighter stars (Vega, Rigel, Betelgeuse) appear as large pale-yellow/white
    circles while dimmer stars are smaller blue-gray dots. Constellation stick-figure
    lines connect stars in muted blue (#4a6fa5) with semi-transparency. Constellation
    names appear in italic muted-blue text below each group. A coordinate grid of
    RA (labeled in hours: 6h, 9h, 12h, 15h, 18h) and Dec (labeled in degrees: 40°,
    60°) is drawn as very subtle dark blue arcs and meridians. A magnitude legend
    in the lower-right corner shows six reference stars from mag 0 to mag 5 with corresponding
    sizes and colors. The title "star-chart-constellation · plotnine · pyplots.ai"
    appears centered at the bottom. Approximately 250 faint background stars fill
    the sky.'
