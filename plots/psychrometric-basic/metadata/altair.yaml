  image_description: The plot displays a psychrometric chart with dry-bulb temperature
    (°C) on the x-axis ranging from -10 to 50, and humidity ratio (g/kg) on the y-axis
    from 0 to ~30. A thick dark blue saturation curve (100% RH) forms the upper boundary.
    Nine additional RH curves (10%-90%) are drawn as lighter blue lines with percentage
    labels staggered at various temperatures along the right side of the chart. Dashed
    orange diagonal lines represent constant wet-bulb temperatures (0°C to 30°C in
    5°C increments), labeled in bold orange near the saturation curve with slight
    offsets. Dashed teal/cyan diagonal lines show constant enthalpy values, with labels
    along the left edge. Dashed purple diagonal lines represent constant specific
    volume (0.75-0.95 m³/kg), labeled near the bottom-right. A translucent green shaded
    area marks the comfort zone (~20-26°C, approximately 6-13 g/kg) with an italic
    "Comfort Zone" label. A bold red process path with filled circular markers connects
    "Outdoor Air (35°C, 50% RH)" at the upper-right to "Supply Air (13°C, 100% RH)"
    at the lower-left, illustrating a cooling and dehumidification process. The title
    reads "psychrometric-basic · altair · pyplots.ai" with subtitle "Standard Atmosphere
    (101.325 kPa) · HVAC Air Properties". Background is light gray (#fafbfc) with
    very subtle gridlines.
