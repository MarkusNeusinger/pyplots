  strengths:
  - Excellent warming stripes aesthetic with smooth blue-white-red gradient using
    lab interpolation
  - Very clean minimalist design with no visual chrome (no spines, axes, or gridlines)
  - Strong data storytelling - warming trend is immediately apparent
  - Good use of Altair-specific features (selections, conditions, layer composition,
    HTML export)
  - Realistic synthetic data mimicking HadCRUT temperature anomaly patterns
  weaknesses:
  - Decade labels present when spec explicitly says no labels (though they enhance
    usability)
  - Aspect ratio is 16:9 rather than spec target of approximately 3:1
  - In the static PNG export, all stripes render at 0.85 opacity due to hover condition
    defaulting to else branch
  image_description: The plot displays classic climate warming stripes spanning 1850-2024.
    Vertical colored bars fill the full canvas width with no gaps. The left portion
    (earlier years) shows predominantly blue tones (#08519c end), transitioning through
    lighter blues and near-white in the middle decades, then shifting to pinks and
    deepening reds (#a50f15 end) on the right (recent years). The title "heatmap-stripes-climate
    · altair · pyplots.ai" appears centered at the top in bold black text. Subtle
    decade markers (1850, 1900, 1950, 2000) are positioned at the bottom edge with
    reduced opacity. No axes, gridlines, or tick marks are present. The overall layout
    is wide (landscape 16:9) with the stripes filling virtually the entire canvas
    area.
