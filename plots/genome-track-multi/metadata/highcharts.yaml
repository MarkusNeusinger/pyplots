review:
  strengths:
  - Excellent multi-track layout using Highcharts multiple yAxis with percentage positioning
  - Biologically accurate TP53 locus data with realistic coordinates, variant IDs,
    and coverage patterns
  - 'Strong data storytelling: coverage peaks align with exon positions, creating
    immediate biological insight'
  - Cohesive color palette with clear visual hierarchy across all four tracks
  - Plot bands connecting exon regions across tracks add a sophisticated cross-track
    linking effect
  - Lollipop markers with columnrange stems are an elegant variant representation
  weaknesses:
  - Bypasses highcharts_core Python API in favor of raw JavaScript (pragmatic but
    less idiomatic)
  - Slight excess bottom spacing (spacingBottom=180) wastes some canvas area
  image_description: The plot displays a multi-track genome browser view of the TP53
    locus on chromosome 17 (chr17:7,570,000-7,592,000) with four vertically stacked
    tracks sharing a common x-axis in Mb format. The Genes track (top) shows dark
    blue (#306998) exon rectangles connected by chevron-patterned intron lines, with
    a "TP53 ◀" label indicating minus strand. The Coverage track renders as a blue
    areaspline with a gradient fill from semi-transparent blue to near-white, with
    peaks reaching ~90x at exon positions and a ~30-35x baseline. The Variants track
    uses orange (#E67E22) circle lollipop markers for SNPs and purple (#8E44AD) diamond
    lollipop markers for indels, with thin gray stems from baseline to quality score.
    Inline colored labels identify SNP and Indel types. The Regulatory track (bottom)
    shows teal (#2196A4) rectangles for enhancers and gold (#D4A017) rectangles for
    promoters with inline legend labels. Subtle blue-tinted plot bands highlight exon
    regions across all tracks. Dashed gray separator lines divide the tracks. The
    title reads "TP53 Locus (chr17) · genome-track-multi · highcharts · pyplots.ai"
    with a subtitle showing the coordinate range and genome assembly.
