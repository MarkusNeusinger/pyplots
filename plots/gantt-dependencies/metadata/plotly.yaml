  - Minor visual density where multiple arrows converge in the Development/Testing
    transition area
  image_description: 'The plot displays a Gantt chart for a software development project
    with 18 tasks organized into 5 color-coded phases: Requirements (dark blue #306998),
    Design (gold/yellow #FFD43B), Development (teal #4ECDC4), Testing (purple #AB63FA),
    and Deployment (orange #FF7F0E). Each phase has a wider group summary bar spanning
    its entire duration, with narrower individual task bars indented below. The title
    "gantt-dependencies · plotly · pyplots.ai" is centered at the top in dark navy.
    A horizontal legend reading "Project Phases" sits below the title with all 5 phase
    color swatches. The y-axis lists tasks hierarchically with "▼" markers for group
    headers and indented individual task names. The x-axis shows weekly dates from
    Mar 03 to May 12, labeled "Timeline (2024)" with dates rotated 45°. Dependency
    arrows connect task bars: bold red arrows (width 2.8, opacity 0.9) mark the critical
    path from Requirements Gathering through to Post-Deployment Review, while lighter
    gray arrows (width 1.3, opacity 0.4) show non-critical dependencies. Critical
    path task bars appear at near-full opacity (0.95) with a subtle dark border, while
    non-critical tasks are semi-transparent (0.55). A dependency legend at the bottom-right
    shows critical path and dependency line styles. The background is clean white
    with very subtle vertical grid lines.'
