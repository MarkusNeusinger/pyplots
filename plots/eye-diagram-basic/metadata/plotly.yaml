review:
  strengths:
  - Excellent dark oscilloscope-inspired theme perfectly suited for eye diagram visualization
  - Custom sequential colorscale with good perceptual progression (dark blue to purple
    to magenta to yellow)
  - Complete spec compliance with all required data parameters (noise, jitter, trace
    count, samples)
  - Good use of Plotly Histogram2d for automatic density computation
  weaknesses:
  - Signal generation uses nested Python loops instead of vectorized numpy operations
  - Heatmap bin resolution (300x200) produces slightly blocky appearance
  image_description: The plot displays an eye diagram on a dark navy (#0d0d2b) background.
    Two clear eye openings span the x-axis from 0 to 2 UI (Time). The y-axis shows
    Voltage (V) from approximately -0.05 to 1.05. A 2D density heatmap uses a custom
    colorscale progressing from dark blue/purple (low density) through magenta/pink
    to bright yellow (high density). High-density yellow bands are visible at the
    0V and 1V signal levels where traces accumulate. The characteristic "X" crossing
    patterns appear at approximately 0 UI and 1 UI where bit transitions occur. A
    colorbar on the right labeled "Trace Density" ranges from 0 to ~45. The title
    reads "eye-diagram-basic · plotly · pyplots.ai" in light gray text centered at
    the top.
