  image_description: The plot displays a meta-analysis funnel plot with an inverted
    y-axis showing Standard Error (0.0 at top, 0.6 at bottom) and Log Odds Ratio on
    the x-axis. A light blue shaded triangular funnel region represents the pseudo
    95% confidence interval, bounded by dashed light blue lines. A solid dark blue
    vertical line marks the pooled effect at approximately 0.26, with a blue annotation
    "Pooled effect = 0.26" near the top. A dotted gray vertical line at x=0 marks
    the null effect, labeled "Null" in gray. Fifteen study points are plotted as circles
    of varying sizes (proportional to inverse-variance weight), colored blue ("Inside
    funnel") or orange ("Outside funnel"). Most points cluster inside the funnel near
    the pooled effect, with a few orange outliers—notably one extreme point at approximately
    x=1.35, SE=0.5 on the far right. An italic bold orange annotation reads "Asymmetry
    suggests publication bias" in the lower-right area. A legend in the lower-left
    distinguishes Inside/Outside funnel categories. The background is a subtle off-white
    (#FAFBFC) with light gray grid lines and a clean minimal design.
