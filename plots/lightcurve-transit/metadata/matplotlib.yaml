  image_description: The plot displays a phase-folded exoplanet transit light curve
    on a 16:9 canvas. The x-axis shows "Orbital Phase" (0.0-1.0) and the y-axis shows
    "Relative Flux" (~0.985-1.005). Blue scatter points (#306998) with vertical error
    bars represent 500 photometric measurements at alpha=0.5 with white marker edges.
    A bold red (#E74C3C) smooth model curve overlays the data, showing a characteristic
    U-shaped transit dip centered at phase 0.5 with approximately 1% depth (flux drops
    from ~1.000 to ~0.990). The limb-darkening effect is visible as rounded ingress/egress
    in the model. The title reads "lightcurve-transit · matplotlib · pyplots.ai" in
    the required format. A frameless legend in the upper right identifies "Transit
    model" (red line) and "Photometry" (blue dots). Top and right spines are removed,
    and a subtle y-axis grid (alpha=0.2) is present. The layout is clean and scientific
    with good canvas utilization.
