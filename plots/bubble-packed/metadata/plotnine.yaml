review:
  strengths:
  - Excellent Okabe-Ito colorblind-safe palette with clean white circle borders
  - Smart conditional labeling strategy — full names for large, abbreviated for medium,
    hidden for small
  - Effective circle packing with greedy placement + 2000-iteration force simulation
    for tight results
  - Clean theme_void design with professional typography and intentional visual hierarchy
  - Fully deterministic — no random seeds needed, reproducible output
  weaknesses:
  - Circle label text (size=9) is slightly small for the 4800x2700 canvas; larger
    labels would improve readability
  - Three smallest bubbles (Quality, Training, Admin) are completely unlabeled, losing
    information
  - Noticeable empty space on the right side between the bubble cluster and the legend
  - Limited plotnine-specific feature usage — most computation is manual numpy
  image_description: 'The plot displays a packed bubble chart representing department
    budgets (in millions). Fifteen circles of varying sizes are tightly packed together
    in the left-center portion of the canvas. The largest circle is "Engineering"
    (blue, Tech group), followed by "R&D" (blue, Tech), "Marketing" (gold, Business),
    and "Sales" (blue, Tech). Circles are colored by department group using an Okabe-Ito
    palette: Tech (#0072B2 blue), Business (#E69F00 gold), Operations (#009E73 green),
    and Support (#CC79A7 pink). White borders separate the circles. Labels appear
    inside circles in bold white text — full names for large circles (value >=22),
    first word for medium circles (value >=12), and no labels for the three smallest
    (Quality=8, Training=6, Admin=5). A legend titled "Department Group" sits on the
    right side. The title "bubble-packed · plotnine · pyplots.ai" appears at the top
    in bold black 24pt text. The background is white with no axes or grid (theme_void).'
