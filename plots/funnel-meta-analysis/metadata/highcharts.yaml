  image_description: The plot displays a meta-analysis funnel plot with the title
    "funnel-meta-analysis · highcharts · pyplots.ai" and subtitle "Drug vs Placebo
    — 15 Randomized Controlled Trials". The x-axis shows "Log Odds Ratio" ranging
    from -1.0 to 0.4, and the y-axis shows "Standard Error" inverted (0 at top, 0.4
    at bottom). A solid dark blue vertical line marks the pooled effect at approximately
    -0.37, labeled "Pooled Effect (-0.37)". A dashed gray vertical line marks the
    null effect at 0, labeled "Null Effect (0)". Two dashed diagonal blue lines form
    the inverted funnel shape representing 95% confidence limits. Fifteen study points
    are plotted as circles with white borders, sized proportionally to inverse-variance
    weight (larger circles = more precise studies). Points are colored along a gradient
    from deep blue (high precision/low SE) to warm amber/brown (low precision/high
    SE). A light blue horizontal band at the top (SE 0-0.12) is labeled "High precision"
    at the right edge, and a light peach/amber band at the bottom (SE 0.28-0.40) is
    labeled "Low precision". The background is light gray (#fafbfc). Visible funnel
    asymmetry — more small studies with large negative effects — suggests publication
    bias.
