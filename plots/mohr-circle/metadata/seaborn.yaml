  image_description: The plot displays Mohr's Circle for stress analysis on a square
    canvas with equal aspect ratio. A large dark blue (#306998) circle with very faint
    blue fill (alpha≈0.04) is centered at (20, 0) on the Normal Stress σ (MPa) vs
    Shear Stress τ (MPa) plane. Two red (#C0392B) circular markers represent stress
    state points A (80, 30) and B (-40, -30), connected by a dashed red diameter line.
    Two teal (#2CA5A5) diamond markers show principal stresses σ₁ = 87.1 MPa and σ₂
    = -47.1 MPa on the horizontal axis, each annotated with boxed labels and prominent
    arrows (PRIMARY emphasis). Two orange (#E67E22) square markers indicate maximum
    shear stress τmax = 67.1 MPa at the top and bottom of the circle. A small blue
    dot marks the center C (20, 0) with a subtle annotation. A purple (#8E44AD) arc
    near the center shows the principal angle 2θp = 26.6°. An input stress state info
    box in monospace font sits in the upper right corner showing σx = 80, σy = -40,
    τxy = 30 MPa. A comprehensive 5-entry legend in the lower left lists Mohr's Circle,
    Stress State, Principal Stress, Max Shear, and Principal Angle. Top/right spines
    are removed via sns.despine(), only y-axis grid at alpha=0.2 is visible, and the
    title reads "mohr-circle · seaborn · pyplots.ai" at 24pt.
