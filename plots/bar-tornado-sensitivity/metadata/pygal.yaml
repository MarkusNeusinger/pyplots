  image_description: 'The plot is a horizontal tornado diagram showing NPV sensitivity
    analysis for 9 financial parameters. Bars extend left (negative) and right (positive)
    from a central zero reference line representing the base case ($2.5M NPV). The
    widest bars (Discount Rate, Revenue Growth) are at the top, tapering to narrowest
    (Inflation Rate) at bottom, creating the characteristic tornado shape. Two colors
    are used: coral/salmon (#D95F4E) for "Low Input Effect" and steel blue (#3A7CA5)
    for "High Input Effect." Each bar displays its deviation value (e.g., -1.1, +1.3).
    The background is light gray (#f8f9fa) with subtle dashed vertical grid lines
    and a prominent solid zero line. Bars have rounded corners. The x-axis is labeled
    "Change in NPV ($M)" with range -1.4 to +1.4. Legend is at the bottom with two
    entries.'
