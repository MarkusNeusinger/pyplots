  image_description: 'The plot shows a water pressure-temperature phase diagram on
    a white background. The x-axis shows Temperature (K) from 200 to 700, and the
    y-axis shows Pressure (Pa) on a logarithmic scale from ~0.1 to 10^9. Three phase
    boundary curves are displayed: a blue Solid-Gas (Sublimation) curve rising steeply
    from the lower-left, a red/orange Liquid-Gas (Vaporization) curve extending from
    the triple point to the upper-right, and a green Solid-Liquid (Melting) curve
    running nearly vertically with a slight negative slope (characteristic of water).
    The triple point is marked with a dark diamond at (273.16 K, 611.73 Pa) and the
    critical point with a diamond at (647.1 K, 22.06 MPa), both annotated with coordinate
    labels. Phase region labels (SOLID, LIQUID, GAS) appear in bold gray text in their
    respective areas. The legend is at the bottom showing all three boundary types.
    The title reads "Water Phase Diagram · phase-diagram-pt · letsplot · pyplots.ai".'
