    with error bars (SEM) overlaid on smooth fitted sigmoid curves. Compound A (blue)
    transitions from ~5% response at low concentrations to ~97% at high concentrations
    with EC50 = 9.1e-08 M annotated in italic blue text. Compound B (orange) transitions
    from ~5% to ~83% with EC50 = 4.9e-06 M annotated in italic orange text. Dashed
    horizontal and vertical reference lines mark both EC50 points. Dotted gray horizontal
    lines indicate top and bottom asymptotes for Compound A. A light blue 95% confidence
    band surrounds the Compound A fitted curve. The legend is positioned in the upper-left
    corner. Horizontal-only subtle grid lines are present; the background is clean
    white with left and bottom axis lines only.
