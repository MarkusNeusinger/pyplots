  image_description: 'The plot displays a mild steel tensile test stress-strain curve
    on a clean white background. The main curve is drawn as a thick dark blue (#306998)
    solid line spanning from strain 0 to ~0.35 and stress 0 to ~400 MPa. A dashed
    brown/rust line represents the 0.2% offset line near the origin. Three distinct
    markers highlight critical points: a brown diamond at the yield point (~250 MPa),
    a gold star at UTS (400 MPa at strain ~0.22), and a red X at the fracture point
    (~310 MPa at strain ~0.35). Each critical point has a colored annotation with
    an arrow. Gray text labels identify the "Elastic", "Strain Hardening", and "Necking"
    regions. A blue annotation "E = 210 GPa" marks the elastic modulus slope. The
    legend is positioned in the lower-center area with a subtle border, listing all
    five traces. The title reads "Mild Steel Tensile Test · line-stress-strain · plotly
    · pyplots.ai". Y-axis has subtle horizontal gridlines; x-axis grid is removed.
    Overall layout is well-proportioned with good use of canvas space.'
