    (MPa)" ranging from -50 to 250, and the y-axis shows "Stress Amplitude (MPa)"
    ranging from 0 to 200. The title reads "heatmap-rainflow · matplotlib · pyplots.ai"
    in medium weight. A vertical colorbar on the right labeled "Cycle Count" shows
    a logarithmic scale from 10^0 to approximately 10^3. The heatmap reveals a clear
    dome-shaped pattern: the highest cycle counts (bright yellow, ~3000+) concentrate
    at low amplitudes near the bottom center, around mean stress ~100 MPa. Counts
    decay exponentially with increasing amplitude, forming a symmetric bell-curve-like
    distribution. Zero-count bins in the upper corners and far edges appear as light
    gray (#f5f5f5 background), while very low count bins adjacent to them appear as
    very dark purple/black from the inferno colormap. The secondary overload cluster
    near amplitude ~70 / mean ~160 is present but barely distinguishable from the
    main distribution. Top and right spines are removed.'
