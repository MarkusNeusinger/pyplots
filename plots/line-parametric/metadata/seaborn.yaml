review:
  strengths:
  - Perfect spec compliance with all required features implemented correctly
  - Excellent text legibility with all font sizes explicitly set
  - Smart use of two distinct colorblind-safe colormaps (viridis, plasma) to differentiate
    curves
  - Start/end markers with both color and shape differentiation for accessibility
  - Smooth rendering with 1000 points per curve and LineCollection for efficient color-mapping
  weaknesses:
  - Helper function make_segments() violates KISS flat structure requirement
  - Library mastery is limited — seaborn mostly used for styling while matplotlib
    does heavy lifting
  - Marker loop with iterrows is verbose
  - Data storytelling could be stronger with annotations at notable curve features
  image_description: The plot displays two side-by-side panels on a white background
    with the suptitle "line-parametric · seaborn · pyplots.ai" at the top. The left
    panel shows a Lissajous figure (x = sin(3t), y = sin(2t)) — a self-intersecting
    closed curve colored along a viridis gradient from dark purple (t=0) to yellow
    (t=2π), with a colorbar on the right labeled "Parameter t (radians)". The right
    panel shows an Archimedean spiral (x = t·cos(t), y = t·sin(t)) colored along a
    plasma gradient from purple (t=0) to yellow (t=4π), also with its own colorbar.
    Both panels have blue circle markers for start (t=0) and red square markers for
    end points, with legends in the lower right. Axes are labeled "Horizontal position
    x(t)" and "Vertical position y(t)". Top and right spines are removed. Grid is
    subtle (alpha=0.15). Equal aspect ratio is maintained on both panels.
