    as a percentage of maximum, narrower than the background bands in classic bullet
    chart style. A thin black vertical marker indicates the target value for each
    metric. The x-axis runs from 0 to 100 labeled "Performance (% of Maximum)" with
    dotted vertical guide lines. Y-axis labels include metric names with actual values
    in parentheses connected by dashed leader lines. The title "bullet-basic · pygal
