  image_description: The plot displays a two-panel SPC chart on a 16:9 canvas. The
    top panel is an X̄ Chart showing sample means as a blue line (#306998) with circular
    markers for 30 CNC shaft diameter samples centered around 25.00 mm. Three out-of-control
    points are highlighted with large red diamond markers (#D64045) at approximately
    samples 8 (above UCL), 19 (below LCL), and 25 (above UCL). A solid teal center
    line (CL = 25.0005) runs horizontally, with red dashed UCL (25.0407) and LCL (24.9604)
    lines, and yellow/gold dotted ±2σ warning limits (25.0273 and 24.9737). A light
    teal shaded band fills between the warning limits. The bottom panel is an R Chart
    with square markers showing sample ranges with the same control limit structure
    (CL = 0.0696, UCL = 0.1472, LCL = 0.0000) and matching shaded zone. Bold "X̄ Chart"
    and "R Chart" labels appear in the upper-left of each panel. Top/right spines
    are removed, subtle y-axis grid lines are present, and legends with numeric values
    appear in the upper right. The title reads "spc-xbar-r · seaborn · pyplots.ai"
    in medium-weight font. Y-axis labels include units (mm). Overall layout is clean
    and professional.
