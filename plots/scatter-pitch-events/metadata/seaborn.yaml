review:
  strengths:
  - Excellent pitch diagram with all required markings (penalty areas, goal areas,
    center circle, corner arcs, goal posts, penalty arcs)
  - Strong aesthetic design with custom dark green theme and well-chosen color palette
  - Good marker differentiation using both color and shape for accessibility
  - Directional arrows for passes and shots add tactical context
  - Realistic spatial distribution of events by type
  weaknesses:
  - No seaborn usage at all — the entire implementation uses only matplotlib, fundamentally
    undermining the purpose of a seaborn implementation
  - Arrows only shown for successful events; spec requests arrows for all passes and
    shots
  - Unsuccessful events at alpha=0.35 are hard to see against the green background
  - Data generation creates random scatter without tactical patterns — no storytelling
  - Verbose per-point plotting loop instead of vectorized approach
  image_description: 'The plot displays a soccer pitch with a dark green background
    (#2d8a4e) and white pitch markings including outer boundary, halfway line, center
    circle, penalty areas, goal areas, penalty arcs, corner arcs, and goal posts.
    Events are scattered across the pitch using four distinct marker types: light
    blue circles for passes, orange/red stars for shots, yellow triangles for tackles,
    and pink/purple diamonds for interceptions. Successful events are rendered with
    filled markers at high opacity, while unsuccessful events appear as hollow markers
    at low opacity (~0.35). Directional arrows extend from successful passes (light
    blue) and successful shots (orange) indicating trajectory. The title "scatter-pitch-events
    · seaborn · pyplots.ai" appears in white at the top. A styled legend at the bottom
    with dark green background shows all 8 categories (4 event types × 2 outcomes)
    in 4 columns across 2 rows.'
