  image_description: 'The plot displays a Gantt chart for a software development project
    spanning January through mid-June 2024. Four project phases are color-coded: Requirements
    (deep blue), Design (golden yellow), Development (coral/red-orange), and Testing
    (teal). Each phase has a bold header prefixed with a square bullet symbol and
    indented child tasks beneath it. Semi-transparent aggregate bars span each phase''s
    total duration. Individual task bars are drawn as thick colored horizontal lines.
    Curved dependency arrows in dark gray connect predecessor task endpoints to successor
    task start points, showing finish-to-start relationships. Diamond milestone markers
    appear at each phase''s completion point. A subtitle provides project-level context
    about the critical path. The x-axis shows biweekly date labels rotated 45 degrees,
    and the y-axis lists all tasks organized by phase. A legend in the upper right
    identifies the four phases and the dependency arrow style. Vertical dashed grid
    lines at subtle opacity mark time intervals. The left spine is removed for a clean
    look.'
