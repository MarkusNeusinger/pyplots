review:
  strengths:
  - Perfect theme adaptation — all chrome tokens (background, text, grid, spine, tick
    colors) correctly flip between light (#FAF8F1) and dark (#1A1A17) themes with
    no dark-on-dark or light-on-light failures
  - Asymmetric error bars correctly implemented using the 2×N yerr array format, with
    capsize=10 and capthick=3 giving clear cap visibility
  - Clean, flat KISS code with explicit font sizes (24/20/16pt), set_axisbelow(True),
    and white marker edges (markeredgecolor=PAGE_BG) for definition
  - Realistic clinical trial context (Control vs. Treatment groups) with plausible,
    neutral data values and meaningful asymmetric uncertainties
  weaknesses:
  - 'DE-03 LOW (2/6): No visual hierarchy or emphasis — all six groups are rendered
    identically in the same green with no focal point; the viewer must find the story
    themselves. Consider coloring the highest-value group differently, adding a reference
    line at the control mean, or varying marker size by uncertainty magnitude to guide
    the eye.'
  - 'DE-01 MODERATE (4/8): Single-color single-series plot looks like a well-configured
    default but lacks aesthetic sophistication. Adding a horizontal reference line
    (e.g., at the Control mean), a subtle background band for the acceptable range,
    or per-group color coding would elevate the design significantly.'
  - 'DQ-01 PARTIAL (5/6): All error bars are asymmetric; the spec mentions that consistent
    widths and different error types are both valid. Showing at least one group with
    symmetric errors alongside asymmetric ones would demonstrate fuller feature coverage.'
