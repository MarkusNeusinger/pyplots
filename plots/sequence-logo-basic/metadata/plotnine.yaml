review:
  strengths:
  - Excellent colorblind-safe palette with good contrast between nucleotides
  - Smart data storytelling with yellow highlight on most conserved position and annotation
  - Clean well-structured code with deterministic data and proper IC calculation
  - 'Good visual refinement: subtle gridlines, custom background, removed unnecessary
    chrome'
  - Font size scaling proportional to segment height is a clever approach
  weaknesses:
  - Letters rendered as plain text on colored rectangles instead of stretched/scaled
    glyphs filling segments
  - Small-frequency segments at stack bases have tiny cramped barely-readable letters
  - Looks more like a stacked bar chart with labels than a traditional sequence logo
  - Generic library usage not distinctive to plotnine
  image_description: 'The plot displays a sequence logo for a 10-position DNA transcription
    factor binding site, implemented as stacked colored rectangles with white bold
    letter labels. Each position shows stacked bars whose total height represents
    information content in bits (y-axis). Position 5 is essentially empty (uniform
    distribution = 0 bits). Position 8 is the tallest (~1.4 bits) and highlighted
    with a pale yellow background rectangle and an italic "most conserved" annotation
    above it. Colors used: A=green (#009E73), C=blue (#0072B2), G=orange (#E69F00),
    T=pink (#CC79A7) — a colorblind-safe palette. The title reads "sequence-logo-basic
    · plotnine · pyplots.ai" in bold at the top. X-axis labeled "Position" (1-10),
    Y-axis labeled "Information content (bits)". A "Nucleotide" legend appears on
    the right. Background is light gray (#FAFAFA) with subtle horizontal gridlines.
    Larger segments have clearly readable white letters; smaller segments at the base
    have tiny barely-visible letters.'
