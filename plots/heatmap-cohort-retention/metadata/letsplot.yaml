  image_description: The plot displays a triangular cohort retention heatmap with
    10 monthly cohorts (Jan 2024 through Oct 2024) on the y-axis and months since
    signup (Month 0 through Month 9) on the x-axis. The heatmap uses a reversed viridis
    colormap — dark purple for high retention (100%) transitioning through teal to
    yellow-green for low retention (~20%). Each cell contains bold percentage text
    with adaptive contrast (white text on dark cells, dark text on light cells). White
    borders separate tiles cleanly. Orange borders highlight the Month 1 column, drawing
    attention to the critical first-month churn drop. Cohort sizes are shown in parentheses
    next to each cohort label (e.g., "Jan 2024 (n=1926)"). A vertical color bar legend
    on the right shows the retention scale from 0-100%. The title follows the required
    format with a subtitle explaining the orange border storytelling element. The
    triangular shape is correctly rendered — Oct 2024 has only Month 0, while Jan
    2024 spans all 10 months.
