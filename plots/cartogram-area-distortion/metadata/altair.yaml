    representing California (green, ~38.9M), Texas (rose, ~30.5M), Florida (rose,
    ~22.6M), and New York (blue, ~19.6M). Circles are colored by US Census region:
    blue (#306998) for Northeast, gold (#E5A835) for Midwest, rose (#C44E52) for South,
    and green (#55A868) for West. White strokes separate overlapping circles. State
    abbreviation labels appear on the 15 largest states (pop >= 7M). The title reads
