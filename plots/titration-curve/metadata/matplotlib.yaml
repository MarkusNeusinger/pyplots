  image_description: The plot displays an acid-base titration curve for HCl + NaOH.
    The main S-shaped curve is rendered in deep blue (#306998) plotting pH (left y-axis,
    0-14) against volume of NaOH added (x-axis, 0-50 mL). A secondary orange (#E8875B)
    derivative curve (dpH/dV) is plotted on the right y-axis, showing a sharp peak
    at the equivalence point (25 mL). The equivalence point is marked with a prominent
    red dot (white edge) at pH 7, with an annotated box connected by an arrow reading
    "Equivalence Point / 25 mL · pH 7". A blue semi-transparent fill covers the "Gradual
    pH Change Region" (2-20 mL). An annotation "Steep rise near equivalence" with
    arrow points to the transition zone. A subtle dashed horizontal line marks neutral
    pH 7. The background has a very faint pH color gradient. Top spine is removed,
    left y-axis text is blue, right y-axis text is orange. Minor tick marks are visible.
    Title reads "HCl + NaOH Titration · titration-curve · matplotlib · pyplots.ai".
