review:
  strengths:
  - Creative approach to rendering Ichimoku Cloud in pygal which lacks native candlestick/filled-area
    support
  - Proper Ichimoku calculations with correct period parameters (9, 26, 52) and forward/backward
    shifts
  - Cloud fill polygons correctly injected into SVG with appropriate bullish/bearish
    coloring and transparency
  - Dual output (PNG + HTML) leveraging pygal SVG nature
  - Realistic trading-day calendar with weekday-only dates
  weaknesses:
  - Candlestick bodies rendered as thin line segments barely visible among Ichimoku
    overlay lines
  - Color reuse between candles and Ichimoku spans makes visual distinction very difficult
  - Regex-based SVG post-processing for stroke widths is fragile
  image_description: 'The plot displays an Ichimoku Cloud chart overlaid on price
    data spanning approximately March 26 to late August 2024. The title "indicator-ichimoku
    · pygal · pyplots.ai" is displayed at the top. The y-axis shows "Price ($)" ranging
    from ~$132 to ~$168, and the x-axis shows "Date" with labels at ~20-day intervals
    (Mar 26, Apr 23, May 21, Jun 18, Jul 16, Aug 13). Candlesticks are rendered as
    colored line segments — green for bullish, red for bearish — though they appear
    quite thin, especially in the middle and right portions of the chart. The Kumo
    cloud is prominently filled between Senkou Span A (green line) and Senkou Span
    B (red line) with semi-transparent green (bullish) and red (bearish) fills. A
    large red bearish cloud dominates the April region following a sharp price decline.
    The Tenkan-sen (orange) and Kijun-sen (blue) lines are visible over the price
    action. The Chikou Span is rendered as a dashed purple line shifted back 26 periods.
    A legend at the bottom lists all 7 series: Bullish Candle, Bearish Candle, Tenkan-sen
    (9), Kijun-sen (26), Senkou A, Senkou B, Chikou Span. The off-white background
    with slightly different plot area background provides subtle contrast.'
