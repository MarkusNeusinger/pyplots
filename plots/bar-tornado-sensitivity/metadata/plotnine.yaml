    bars represent the "Low Scenario" and steel blue (#306998) bars represent the
    "High Scenario." Parameters range from "Discount Rate" (widest, ~$95-148M) at
    top to "Terminal Value" (narrowest, ~$116-124.5M) at bottom. The x-axis is labeled
    "Net Present Value ($M)" with values from ~95 to 150. The legend sits at the top
    center. The title reads "bar-tornado-sensitivity · plotnine · pyplots.ai" in bold.
    The background is clean minimal white with only x-axis gridlines and no y-axis
    gridlines.
