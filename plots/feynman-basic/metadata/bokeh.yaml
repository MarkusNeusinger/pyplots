  image_description: The plot displays a Feynman diagram for electron-positron annihilation
    (e- + e+ -> gamma -> e- + e+) on a light gray (#fafafa) background. Two blue vertex
    dots sit at the center-left and center-right of the diagram. Four straight blue
    fermion lines extend diagonally from the vertices to the corners - incoming e-
    (upper-left) and e+ (lower-left) converge at the left vertex, while outgoing e-
    (upper-right) and e+ (lower-right) diverge from the right vertex. Each fermion
    line has a small blue arrow at its midpoint indicating particle/antiparticle flow
    direction. A gold/yellow wavy line (photon, labeled gamma) connects the two vertices
    horizontally. Particle labels (e-, e+, gamma) appear in italic near their respective
    propagators. A gray horizontal time arrow runs along the bottom with "time" label
    beneath it. The title "feynman-basic - bokeh - pyplots.ai" is at the top center.
    Axes and grid are hidden.
