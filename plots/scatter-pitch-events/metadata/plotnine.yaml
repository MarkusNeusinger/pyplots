    pitch using distinct marker shapes and colors: blue circles for passes, red stars
    for shots, orange triangles for tackles, and purple diamonds for interceptions.
    Directional arrows emanate from pass and shot markers showing trajectories. Passes
    are distributed across the entire pitch with most arrows pointing forward, shots
    are concentrated in the attacking third (right side) with arrows converging toward
    the goal, tackles cluster in the midfield and defensive areas, and interceptions
