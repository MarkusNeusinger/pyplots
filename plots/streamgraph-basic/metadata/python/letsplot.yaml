review:
  strengths:
  - Correct streamgraph implementation with symmetric baseline computation and cubic
    spline interpolation for smooth flowing curves
  - 'Perfect Okabe-Ito palette compliance — first series is #009E73, all 5 categories
    in canonical order'
  - 'Thorough theme-adaptive chrome: PAGE_BG, ELEVATED_BG, INK, INK_SOFT tokens applied
    to all text and background elements for both light and dark renders'
  - Y-axis labels and ticks deliberately hidden (blank) — correct design choice since
    symmetric-baseline y-values are not meaningful to readers
  - All text sizes explicitly set (title=24, axis_title=20, axis_text=16, legend_text=16,
    legend_title=18) for 4800×2700 output
  weaknesses:
  - 'DE-03 LOW: No data storytelling or visual emphasis — all genres rendered with
    equal visual weight, no focal point or annotation to highlight an interesting
    trend or peak'
  - 'DE-01 MODERATE: Aesthetic sophistication is functional but not distinctive —
    the flowing curves are pleasant but there are no design touches that elevate this
    above a clean default (e.g., subtle alpha gradient, thin border strokes on ribbons,
    or typographic hierarchy in the title)'
  - 'LM-02 LOW: lets-plot distinctive features under-exploited — interactive tooltips
    or hover data in the HTML output would showcase what makes lets-plot different
    from plotnine'
