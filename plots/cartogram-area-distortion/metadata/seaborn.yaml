  image_description: 'The plot displays a tile grid cartogram of US states where each
    state is represented by a colored square marker whose area is proportional to
    its population. The main panel (left ~70% of canvas) shows states arranged in
    an approximate geographic layout with a warm gray (#f5f5f5) background. States
    are colored by region: blue (West), golden/yellow (Midwest), teal/green (South),
    and orange/brown (Northeast) using seaborn''s colorblind palette. White bold abbreviations
    label each state, and states with population >=5M also show population figures
    (e.g., "39M" for CA, "30M" for TX). California and Texas are the largest squares,
    visually dominating. A horizontal legend at the top shows all four regions. The
    subtitle reads "cartogram-area-distortion · seaborn · pyplots.ai". The top-right
    panel shows an equal-area reference tile map (all states same size) for comparison.
    The bottom-right panel shows a horizontal bar chart of regional population totals
    with value labels (South 126M, West 78M, Midwest 69M, Northeast 58M). A subtle
    dashed divider separates the main and side panels. An italic annotation "Tile
    area ∝ state population" appears at the bottom of the main cartogram.'
