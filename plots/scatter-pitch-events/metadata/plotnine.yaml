  image_description: 'The plot displays a soccer pitch event map on a deep green (#1a6b30)
    pitch background with semi-transparent white pitch markings. All standard FIFA
    pitch elements are present: penalty areas, goal areas, center circle, penalty
    arcs, corner arcs, halfway line, penalty spots, center spot, and goal posts on
    both sides. The pitch sits on a cream (#f5f5f0) canvas. Four event types are plotted
    with distinct markers and colors: blue circles for passes, red/coral stars for
    shots, orange triangles for tackles, and teal diamonds for interceptions. Passes
    have thin blue directional arrows mostly biased forward; shots have bolder red
    arrows pointing toward the right goal. Successful events appear at ~92% opacity
    while unsuccessful events are ~40% opacity, creating a clear visual distinction.
    Shot markers are noticeably larger than other markers, creating a visual hierarchy.
    The legend on the right shows Event Type and Outcome categories. The title reads
    "scatter-pitch-events · plotnine · pyplots.ai" in bold 24pt, with an italic subtitle.'
