review:
  strengths:
  - Hierarchical tinting scheme using Okabe-Ito base colors with mid/light tints for
    child rings — creates clear visual branch identity and professional aesthetic
  - Per-ring HoverTool configuration (separate tooltips for Department/Team/Project
    levels) is idiomatic Bokeh and adds genuine interactivity
  - ColumnDataSource pattern enables efficient bulk rendering of all ring segments
    with a single annular_wedge call per ring level
  - Realistic organizational budget data with plausible values and 3-level hierarchy
    (15 leaf nodes) demonstrates the chart type well
  - Legend design showing three color swatches per department (base/mid/light) communicates
    the tinting hierarchy elegantly
  - Ring-level labels (Department/Team/Project) at bottom of chart explain the hierarchy
    without cluttering the rings
  weaknesses:
  - 'Level 3 (outer ring) labels use INK token (#F0EFE8 in dark mode = near-white)
    on light-tinted segment backgrounds (#AAE0D5, #F7D899, #99CDE8, #EED2E3) — near-white
    text on light segments fails contrast in dark render. Fix: use dark text (#1A1A17)
    for level 3 labels unconditionally since outer ring tints are always light in
    both themes'
  - 'Okabe-Ito color order is non-sequential: Marketing uses position 5 (#E69F00)
    while position 2 (#D55E00 vermillion) is skipped. Order should follow 1→N canonically
    (Engineering=1, Marketing=2, Sales=3, Operations=4)'
  - Level 3 label calculation loop duplicates angle computation from the l3_data-building
    loop — minor code duplication that could be eliminated by storing mid_angle during
    data build
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct light theme surface, clearly visible
      Chrome: Title "sunburst-basic · bokeh · anyplot.ai" visible at top center; axes hidden; no grid — appropriate for circular chart; ring-level labels "Department / Team / Project" at bottom readable at small size
      Data: Three concentric rings. Inner ring shows 4 departments (Eng./Sales/Mktg/Ops) in Okabe-Ito base colors (#009E73 Engineering, #0072B2 Sales, #E69F00 Marketing, #CC79A7 Operations). Mid ring shows team-level tints. Outer ring shows project-level light tints. White separators between segments. Legend on right shows color swatches (base/mid/light per department) with budget totals ($410K/$150K/$170K/$95K).
      Legibility verdict: PASS — all major labels readable, outer ring project labels are small but readable at full resolution

    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17) — correct dark theme surface
      Chrome: Title readable in light color; legend text (Departments header, department names) readable using INK/INK_SOFT tokens (light in dark mode). Ring-level labels at bottom use INK_MUTED (#A8A79F in dark mode) and are visible.
      Data: Data colors are identical to light render (Engineering #009E73, Sales #0072B2, Marketing #E69F00, Operations #CC79A7) — only chrome flips. Dark background gaps between rings are more pronounced (0.02 radius unit gaps between r1/r2 and r2/r3 show near-black fill).
      Legibility verdict: PARTIAL FAIL — Level 3 (outer ring) labels use INK token (#F0EFE8 in dark mode = near-white) on light-tinted segment fills (#AAE0D5 mint, #F7D899 light yellow, #99CDE8 sky, #EED2E3 pink). Contrast ratio near 1.1-1.3:1 — effectively invisible. Main structural labels (Eng./Sales/Mktg/Ops and team labels) are readable. Only the outermost project-level labels fail.
