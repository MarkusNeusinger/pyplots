    bokeh · pyplots.ai" appears in the top-left. Rectangular bins are colored by cycle
    count on a logarithmic scale — bright yellow (~5000 counts) at low amplitude/moderate
    mean, transitioning through green/teal to dark purple (low counts) toward higher
    amplitudes and extreme means. The data forms a dome/bell shape with white (zero-count)
    areas at the extremes. Two annotation labels with dark semi-transparent backgrounds
    guide the viewer: "Rare severe events →" in the upper-left and "← Dominant loading
    cluster (~5000 cycles)" in the lower-right. A colorbar on the right shows "Cycle
    Count" with logarithmic tick marks. Grid lines, outline, and minor ticks are removed
    for a clean appearance.'
