  image_description: 'The plot displays a 5×5 risk assessment matrix with "LIKELIHOOD"
    on the Y-axis (1. Rare through 5. Almost Certain) and "IMPACT" on the X-axis (1.
    Negligible through 5. Catastrophic). Each cell contains its risk score (product
    of likelihood × impact) and a zone label (Low/Medium/High/Critical). Cells are
    color-coded: green for Low (1–4), yellow for Medium (5–9), orange for High (10–16),
    and red for Critical (20–25). Fourteen risk items are plotted as colored circular
    markers with text labels — blue (Technical), purple (Financial), orange (Operational),
    and green (External). A zone legend and category legend appear on the right side.
    The title reads "heatmap-risk-matrix · pygal · pyplots.ai" at top center. The
    layout is clean with white background and white cell borders with rounded corners.'
