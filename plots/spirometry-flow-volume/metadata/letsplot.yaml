  image_description: 'The plot displays a spirometry flow-volume loop on a light off-white
    (#FAFAFA) background. Two loops are visible: a measured patient loop (solid blue
    #306998 line with light blue ribbon fill) and a predicted normal loop (dashed
    gray #9CA3AF line with light gray ribbon fill). The measured expiratory limb rises
    sharply from 0 to PEF at ~8.5 L/s near volume 0.3 L, then declines roughly linearly
    to FVC at 4.2 L. The inspiratory limb forms a symmetric U-shaped curve dipping
    to about -6 L/s. The predicted normal loop is larger, extending to ~4.8 L volume
    and ~10.2 L/s PEF. An orange (#D97706) circle marks PEF with an amber-background
    label "PEF: 8.5 L/s". A purple (#7C3AED) diamond marks FEV1 on the expiratory
    curve with a purple label on a light purple background. A clinical summary bar
    at top center shows FEV1, FVC, PEF, and FEV1/FVC ratio in a gray box. A red-bordered
    box at the bottom shows the clinical diagnosis of mild obstructive pattern. A
    horizontal gray zero-flow reference line separates expiratory and inspiratory
    regions. The legend in the upper right shows "Measured" (blue) and "Predicted
    Normal" (gray). X-axis: "Volume (L)", Y-axis: "Flow (L/s)". Title: "spirometry-flow-volume
    · letsplot · pyplots.ai" in bold dark text.'
