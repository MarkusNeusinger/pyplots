  - No magnitude legend to help viewers interpret star sizes
  image_description: 'The plot displays a star chart on a dark navy (#0a0e1a) background.
    Stars are represented as circles with sizes proportional to brightness (brighter
    stars are larger). Star colors range from pale yellow/cream (brightest, e.g.,
    Sirius, Vega) to light gray (faintest background stars). Constellation stick-figure
    lines are drawn in semi-transparent light blue connecting notable stars. Thirteen
    constellations are labeled in italic light blue text near their centroids: Cassiopeia,
    Ursa Major, Perseus, Taurus, Gemini, Orion, Canis Major, Leo, Bootes, Scorpius,
    Cygnus, Lyra, and Aquila. The x-axis shows Right Ascension labeled in hours (0h-22h)
    with the axis title "Right Ascension (degrees)". The y-axis shows Declination
    from -30 to 60 degrees. Approximately 150 faint gray background stars are scattered
    across the field. The title reads "star-chart-constellation · lets-plot · pyplots.ai"
    in bold light blue-gray text.'
