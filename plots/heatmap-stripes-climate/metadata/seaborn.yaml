  image_description: The plot displays classic climate warming stripes — a series
    of 175 vertical colored bars spanning from 1850 to 2024. The left portion (earlier
    years) shows predominantly steel blues and slate blues representing negative temperature
    anomalies. The middle section transitions through very light blues and pinks near
    zero anomaly. The right portion (recent decades) shifts to progressively deeper
    reds and dark crimsons representing strong positive anomalies. The title "heatmap-stripes-climate
    · seaborn · pyplots.ai" appears in italic gray text above the stripes. Year markers
    "1850" and "2024" sit at the bottom-left and bottom-right corners respectively.
    The background is a subtle light gray (#f0f0f0). No axes, gridlines, or tick marks
    are present — pure color encoding. The aspect ratio is approximately 3:1 (wide
    and short).
