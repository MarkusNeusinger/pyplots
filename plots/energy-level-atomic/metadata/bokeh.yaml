review:
  strengths:
  - Scientifically accurate hydrogen energy levels with correct formula and wavelengths
  - Effective nonlinear y-axis mapping using sqrt compression to handle the large
    energy range
  - Clear spatial organization separating Lyman and Balmer series on opposite sides
  - Spectral-meaningful color coding (purple for UV, approximate visible colors for
    Balmer)
  - Clean typography hierarchy with bold series headers and well-sized labels
  - Perfect code quality with clean, deterministic, well-structured code
  weaknesses:
  - Title format deviates from required spec-id · library · pyplots.ai pattern by
    adding a prefix
  - Does not use ColumnDataSource, missing core Bokeh idiom
  - No HoverTool for the HTML output, which would showcase Bokeh interactive strengths
  - Lyman series arrows use very similar purple shades that are hard to distinguish
  - Missing Paschen series for more complete spectral coverage
  image_description: 'The plot displays a hydrogen atom energy level diagram on a
    white background. Six horizontal blue lines (#306998) represent energy levels
    n=1 through n=6, positioned vertically using a nonlinear (sqrt-compressed) energy
    scale. Each level is labeled on the right with its quantum number and energy value
    (e.g., "n=1 (-13.60 eV)"). A dashed gray line at y=0 marks the ionization limit
    labeled "Ionization (0 eV)". On the left side, three downward arrows in purple
    shades represent the Lyman series (UV) transitions: Lyα 121.6 nm, Lyβ 102.6 nm,
    and Lyγ 97.3 nm, each labeled at the arrow midpoint. On the right side, four downward
    arrows represent Balmer series (Visible) transitions: Hα 656.3 nm (red), Hβ 486.1
    nm (blue), Hγ 434.0 nm (purple), and Hδ 410.2 nm (dark purple). Bold series headers
    "Lyman Series (UV)" and "Balmer Series (Visible)" appear at the top. The y-axis
    shows "Energy (eV)" with custom ticks at 0, -0.5, -1.0, -1.5, -3.4, -5.0, -10.0,
    -13.6. The x-axis is hidden. The title reads "Hydrogen Emission Spectrum · energy-level-atomic
    · bokeh · pyplots.ai".'
