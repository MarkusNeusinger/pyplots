    Dark render (plot-dark.png):
      Background: Near-black #1A1A17 — correct warm near-black, not pure black
      Chrome: Title in light #F0EFE8, clearly readable against dark background. Center metric "Total budget" in #B8B7B0 and "$1,025K" in bold #F0EFE8, both readable. Outside data labels use INK=#F0EFE8 (cream/light), clearly visible against dark background.
      Data: Identical Okabe-Ito data colors to light render — Engineering green, Operations vermillion, Marketing blue, Sales pink, Support yellow. Only chrome elements flipped. Segment gaps use dark PAGE_BG for definition.
      Legibility verdict: PASS — no dark-on-dark issues, all text light on dark background, brand green #009E73 remains visible
