review:
  strengths:
  - Excellent glyph rendering using TextPath + Affine2D transforms — letters are properly
    stretched as scaled glyphs, not plain text
  - Perfect spec compliance with all required features implemented correctly
  - Realistic ETS-family transcription factor binding site data with excellent feature
    coverage
  - Clean, well-structured code with appropriate complexity
  weaknesses:
  - No color legend mapping nucleotides to colors — would improve accessibility for
    non-bioinformatics viewers
  - No visual storytelling emphasis on the conserved core region (positions 3-6)
  - Green/red color pair (A/T) is not fully colorblind-safe
  - Very small letters at low-contribution positions could benefit from a minimum
    height threshold
  image_description: The plot displays a DNA sequence logo across 10 positions. Letters
    A (green), C (blue), G (orange), and T (red) are stacked vertically at each position,
    with heights proportional to information content in bits. Positions 1, 8, and
    10 show no stacks (uniform distribution = 0 bits). Positions 3-6 display the dominant
    motif GAGT with tall, clearly visible glyphs reaching ~1.4-1.6 bits. Position
    2 shows a moderate C, and position 9 shows a strong T. The x-axis is labeled "Position"
    (1-10), the y-axis "Information content (bits)" (0-2.00). Top and right spines
    are removed, with a subtle y-axis grid. Title reads "sequence-logo-basic · matplotlib
    · pyplots.ai". Letters are rendered as properly scaled glyphs (stretched to fill
    their allocated height), not plain text.
