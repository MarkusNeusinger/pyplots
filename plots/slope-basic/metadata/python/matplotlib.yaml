review:
  strengths:
  - Semantic two-color scheme (green=increase, vermillion=decrease) immediately communicates
    change direction without requiring the viewer to read numbers
  - Label collision avoidance with sorted-pass algorithm and dotted connectors is
    a sophisticated, robust solution that works visually in both themes
  - 'Full chrome token adaptation: INK/INK_SOFT/ELEVATED_BG used on every non-data
    element; both renders are theme-correct without any dark-on-dark or light-on-light
    failures'
  - All font sizes explicitly set (24/20/16 hierarchy); FuncFormatter provides inline
    unit context via $XM tick labels
  weaknesses:
  - Generic product names (Product A-H) reduce the realism of the business scenario;
    real product category names would score DQ-02 fully
  - 'LM-02: no distinctively matplotlib-native technique is used; the implementation
    could be ported to another library with minor syntax changes'
