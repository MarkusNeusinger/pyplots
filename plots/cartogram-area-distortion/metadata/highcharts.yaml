review:
  strengths:
  - Effective Dorling cartogram using bubble chart with geographic positioning and
    area-proportional sizing
  - Strong design with custom region palette, population-based color intensity, and
    top-5 state highlighting
  - Real 2020 Census data with all 50 states provides authentic context
  - Good storytelling through annotation box, subtitle, and visual hierarchy
  - Faint US outline reference provides geographic context without visual clutter
  - Interactive HTML version included alongside PNG export
  weaknesses:
  - Northeast states pushed far from natural positions to reduce crowding, creating
    slight geographic distortion
  - Some smallest state circles and labels are quite tiny (VT, WY, RI at 17px)
  - Mixes highcharts-core high-level API with manual dict manipulation instead of
    using Series classes throughout
  - 'allowOverlap: true on data labels risks label collisions on very small bubbles'
  image_description: 'The plot displays a Dorling cartogram of US states where circle
    area is proportional to state population (2020 U.S. Census, in thousands). States
    are positioned roughly according to their geographic locations on a light gray
    (#fafbfc) background. Four US Census regions are color-coded: Northeast (blue/slate),
    South (tan/orange), Midwest (green), and West (purple/lavender). Color intensity
    within each region darkens with higher population. California is the largest circle
    (West, purple), followed by Texas (South, orange) and Florida (South, orange).
    A faint dotted US continental outline provides geographic reference. Each state
    is labeled with its two-letter abbreviation in white bold text with dark text-outline.
    Top 5 most populous states (CA, TX, FL, NY, PA) have dark borders. An annotation
    box in the lower right explains the encoding: "Circle area = Population" with
    largest/smallest callouts and top-5 indicator. The legend at the bottom center
    shows four region categories. Title reads "cartogram-area-distortion · highcharts
    · pyplots.ai" with a descriptive subtitle.'
