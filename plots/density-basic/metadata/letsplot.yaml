    (~5:00)". A subtle rug plot of individual observations runs along the x-axis.
    The x-axis reads "Finish Time (minutes)" with ticks at 150-350 in increments of
    50. The y-axis reads "Density (×10⁻³)" with scaled labels 2, 4, 6, 8, 10. The
    title "density-basic · letsplot · pyplots.ai" appears at the top left. The background
    is clean with minimal theme, no x-grid, subtle light-gray y-grid lines, and no
    axis ticks or spines.'
