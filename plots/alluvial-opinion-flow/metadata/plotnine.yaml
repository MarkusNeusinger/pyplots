  strengths:
  - 'Excellent spec compliance: all required features implemented including stable/changer
    distinction, net flow highlighting, and respondent count labels'
  - Strong data storytelling through subtitle narrative, delta labels, and alpha-based
    visual hierarchy
  - Professional diverging color palette with semantic meaning (blue to gray to orange/red)
  - Clean, well-organized code despite the complexity of building alluvial diagrams
    in plotnine
  - 'Good use of plotnine idioms: geom_ribbon for curves, scale_alpha_identity, guide_legend
    override_aes'
  weaknesses:
  - Flow area remains somewhat visually dense in the middle, making individual thin
    flows hard to trace
  - Slight unused canvas space below the diagram
  - The polarization framing is close to sensitive territory, though categories are
    generic
  image_description: 'The plot displays an alluvial/Sankey-style diagram tracking
    1,000 respondents across 4 survey waves (Wave 1 through Wave 4). Five opinion
    categories are arranged vertically: Strongly Agree (dark blue, #306998), Agree
    (light blue, #6BAED6), Neutral (gray, #969696), Disagree (orange, #E8983A), and
    Strongly Disagree (dark red, #A8322A). Rectangular nodes at each wave show respondent
    counts in white bold text (e.g., Strongly Agree: 180→180→190→206, Neutral: 190→194→178→136).
    Curved semi-transparent ribbons connect categories between waves, with stable
    respondents drawn at higher opacity (0.55) and changers at lower opacity (0.30–0.42),
    with dominant net flows highlighted at 0.42. Delta labels (e.g., +16, -26, -35,
    -42, +31, +55) between wave columns quantify significant net changes. Light gray
    background bands frame each wave column. Category labels appear on both left and
    right sides. The title reads "alluvial-opinion-flow · plotnine · pyplots.ai" with
    a subtitle "Tracking 1,000 respondents across 4 waves — Neutral erodes as opinions
    polarize toward extremes". A legend on the right lists all five opinion categories.
    The visual clearly shows a polarization trend: Neutral erodes from 190 to 136,
    Strongly Agree grows from 180 to 206, and Strongly Disagree surges from 180 to
    272.'
