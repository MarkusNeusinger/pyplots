    the center line, representing the 95% confidence interval. The band starts wide
    at day 0, narrows through the calibration phase (days 0-15), then widens again
    during extrapolation (days 15-30). A vertical dashed gray line at day 15 separates
    the two phases, with italic annotations "Calibration Phase" and "Extrapolation"
    placed below the data. The background is white with very subtle horizontal gridlines
    only, no panel border, and thin dark axis lines on both x and y axes.'
