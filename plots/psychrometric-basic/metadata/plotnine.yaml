  strengths:
  - Comprehensive psychrometric chart with all required thermodynamic property lines
    correctly computed from ASHRAE formulas
  - Excellent color differentiation using distinct hue families for each property
    type (blue RH, orange wet-bulb, green enthalpy, purple volume)
  - Strong data storytelling with HVAC process path and comfort zone highlighting
  - Clean, well-organized code with appropriate complexity for the domain
  - Good use of plotnine grammar of graphics with layered composition
  weaknesses:
  - Minor label overlap in bottom-right area where specific volume, wet-bulb, and
    enthalpy labels converge
  - Specific volume lines are somewhat faint (alpha=0.6, size=0.5) compared to other
    property lines
  - Could benefit from slightly larger annotation labels for enthalpy and specific
    volume (currently 8.5pt)
  image_description: The plot displays a psychrometric chart with dry-bulb temperature
    (-10 to 50°C) on the x-axis and humidity ratio (0-30 g/kg dry air) on the y-axis.
    The saturation curve (100% RH) is drawn as a thick dark navy blue line forming
    the upper boundary. Relative humidity curves from 10% to 90% are shown as lighter
    blue curves, each labeled with their percentage value directly on the chart. Wet-bulb
    temperature lines appear as orange diagonals. Enthalpy lines are drawn as dashed
    olive-green diagonals with labels like "70 kJ/kg", "90 kJ/kg", "110 kJ/kg". Specific
    volume lines are dotted purple diagonals labeled "0.80 m³/kg", "0.84 m³/kg", "0.88
    m³/kg", "0.92 m³/kg". A comfort zone (20-26°C, 30-60% RH) is shaded in light blue
    with a border and "Comfort Zone" label centered within it. A red arrow shows an
    HVAC cooling/dehumidification process from point A (35°C, ~17.5 g/kg) to point
    B (24°C, ~9.5 g/kg). The background is a subtle off-white (#FAFBFC). Title reads
    "psychrometric-basic · plotnine · pyplots.ai" in bold.
