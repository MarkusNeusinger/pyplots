    the base case. Each bar has bold delta labels (e.g., "-4.3", "+4.8") positioned
    just outside the bar ends. The title reads "NPV Sensitivity Analysis · bar-tornado-sensitivity
    · letsplot · pyplots.ai" centered at top in bold, with a subtitle "One-at-a-time
    parameter variation from base case (NPV = $12.5M)". A legend at top shows "◀ Low
    Scenario" and "High Scenario ▶". The caption at bottom notes "Revenue Growth and
    Discount Rate account for over 50% of total NPV sensitivity". The background is
    clean white with subtle vertical gridlines only. Layout is 16:9 landscape.
