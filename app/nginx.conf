# Bot detection for SEO - social media crawlers need pre-rendered meta tags
# These bots cannot execute JavaScript, so we serve them pre-rendered HTML with og:tags
# NOTE: Search engines (Googlebot, Bingbot, etc.) are NOT included here — they can
# render JavaScript since 2019 and should see the full SPA for proper indexing.
map $http_user_agent $is_bot {
    default 0;
    # Social Media
    ~*twitterbot 1;
    ~*facebookexternalhit 1;
    ~*linkedinbot 1;
    ~*pinterestbot 1;
    ~*redditbot 1;
    ~*tumblr 1;
    ~*mastodon 1;
    # Messaging Apps
    ~*slackbot 1;
    ~*discordbot 1;
    ~*telegrambot 1;
    ~*whatsapp 1;
    ~*signal 1;
    ~*viber 1;
    ~*skypeuripreview 1;
    ~*microsoft\ teams 1;
    ~*snapchat 1;
    # Link Preview Services
    ~*embedly 1;
    ~*quora\ link\ preview 1;
    ~*outbrain 1;
    ~*rogerbot 1;
    ~*showyoubot 1;
}

server {
    listen 8080 default_server;
    server_name _;

    # Use Google DNS for dynamic upstream resolution (prevents startup crash when domain not yet in DNS)
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Root directory for serving files
    root /usr/share/nginx/html;
    index index.html;

    # Compression - serve pre-compressed gzip files from Vite build when available
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
    gzip_static on;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Disable caching for index.html
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Named location for bot SEO proxy
    location @seo_proxy {
        set $seo_backend https://api.anyplot.ai;
        proxy_pass $seo_backend/seo-proxy$request_uri;
        proxy_set_header Host api.anyplot.ai;
        proxy_ssl_server_name on;
        proxy_ssl_verify on;
        proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
    }

    # Serve robots.txt directly (must not go through bot proxy)
    location = /robots.txt {
        try_files $uri =404;
    }

    # SPA routing - serve index.html for all routes
    # Social media bots get redirected to backend for proper og:tags
    location / {
        # Redirect bots to SEO proxy via error_page trick (nginx-safe pattern)
        error_page 418 = @seo_proxy;
        if ($is_bot) {
            return 418;
        }
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint for Cloud Run
    location /_health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # Proxy sitemap.xml to backend API (dynamic generation)
    location = /sitemap.xml {
        set $sitemap_backend https://api.anyplot.ai;
        proxy_pass $sitemap_backend/sitemap.xml;
        proxy_set_header Host api.anyplot.ai;
        proxy_ssl_server_name on;
    }

    # Plausible Analytics Proxy (bypass ad blockers)
    location = /js/script.js {
        proxy_pass https://plausible.io/js/pa-VsZKkJS49nA8_SUzShW2z.js;
        proxy_set_header Host plausible.io;
        proxy_ssl_server_name on;
        proxy_buffering on;
    }

    location = /api/event {
        proxy_pass https://plausible.io/api/event;
        proxy_set_header Host plausible.io;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}

# python.anyplot.ai — language-filtered marketing subdomain.
#
# Strategy: serve identical content to anyplot.ai with a /python language
# segment injected into spec routes. The canonical tag in the rendered HTML
# always points back to anyplot.ai, so Google consolidates link equity on the
# main domain while the subdomain stays available for marketing campaigns.
#
# Bot path (SEO crawlers): nginx rewrites the requested URI by injecting
# `/python` and proxies to /seo-proxy/{spec}/python[/{library}] on the API.
# The SEO HTML emits canonical=https://anyplot.ai/{spec}/python[/{library}].
#
# Human path: serves index.html for any spec route. The SPA must detect
# `window.location.hostname === 'python.anyplot.ai'` and inject `python` as
# the language when resolving routes / building canonical tags. Without that
# detection the SPA would treat `library` as `language` and 404. Subdomain
# rollout is therefore gated on a follow-up SPA change.
server {
    listen 8080;
    server_name python.anyplot.ai;

    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
    gzip_static on;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Bot SEO proxy — rewrite to inject /python and proxy to backend.
    # /scatter-basic              -> /seo-proxy/scatter-basic/python
    # /scatter-basic/matplotlib   -> /seo-proxy/scatter-basic/python/matplotlib
    location @seo_proxy_python {
        set $seo_backend https://api.anyplot.ai;
        proxy_pass $seo_backend$python_seo_uri;
        proxy_set_header Host api.anyplot.ai;
        proxy_ssl_server_name on;
        proxy_ssl_verify on;
        proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
    }

    location = /robots.txt {
        try_files $uri =404;
    }

    # Reserved/static frontend routes are served directly without rewrite
    location ~ ^/(plots|specs|libraries|palette|about|legal|mcp|stats|debug)(/|$) {
        try_files $uri $uri/ /index.html;
    }

    # /:specId[/:library] -> internally /:specId/python[/:library]
    location ~ "^/(?<spec_id>[A-Za-z0-9][A-Za-z0-9-]*)/?$" {
        set $python_seo_uri /seo-proxy/$spec_id/python;
        error_page 418 = @seo_proxy_python;
        if ($is_bot) { return 418; }
        try_files /index.html =404;
    }

    location ~ "^/(?<spec_id>[A-Za-z0-9][A-Za-z0-9-]*)/(?<library>[A-Za-z0-9][A-Za-z0-9-]*)/?$" {
        set $python_seo_uri /seo-proxy/$spec_id/python/$library;
        error_page 418 = @seo_proxy_python;
        if ($is_bot) { return 418; }
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /_health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    location = /sitemap.xml {
        set $sitemap_backend https://api.anyplot.ai;
        proxy_pass $sitemap_backend/sitemap.xml;
        proxy_set_header Host api.anyplot.ai;
        proxy_ssl_server_name on;
    }

    location = /js/script.js {
        proxy_pass https://plausible.io/js/pa-VsZKkJS49nA8_SUzShW2z.js;
        proxy_set_header Host plausible.io;
        proxy_ssl_server_name on;
        proxy_buffering on;
    }

    location = /api/event {
        proxy_pass https://plausible.io/api/event;
        proxy_set_header Host plausible.io;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}
