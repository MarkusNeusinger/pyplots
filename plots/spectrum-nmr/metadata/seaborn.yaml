review:
  strengths:
  - Physically accurate Lorentzian peak shapes with correct splitting patterns and
    coupling constants
  - Excellent color accessibility using seaborn colorblind palette with meaningful
    color-region mapping
  - Clean NMR-convention presentation (reversed x-axis, hidden y-ticks, minimal baseline
    noise)
  - Distinctive use of seaborn features (rugplot, despine, set_context, color_palette)
  - Professional annotation system with color-matched connector lines
  weaknesses:
  - Per-region plotting loop could potentially be replaced with a single hue-based
    lineplot call for more idiomatic seaborn usage
  image_description: 'The plot displays a 1H NMR spectrum of ethanol on a light gray
    (#fafafa) background. The x-axis shows Chemical Shift (ppm) reversed from 5.5
    to -0.5 (NMR convention), and the y-axis shows Intensity with no tick marks. Four
    distinct peak groups are color-coded: blue CH2 quartet near 3.69 ppm with four
    resolved peaks, pink/magenta OH singlet near 2.61 ppm, teal/green CH3 triplet
    near 1.18 ppm with three resolved peaks (tallest signal), and orange TMS reference
    at 0.00 ppm. Each peak is annotated with its assignment and chemical shift value
    via colored connector lines. Semi-transparent fills appear under each peak region.
    Small rug marks at peak centers along the x-axis. A Peak Assignment legend with
    shadow appears in the upper right. Top and right spines are removed. The baseline
    is rendered in muted gray with subtle noise. Serif font family is used throughout.'
