  image_description: 'The plot displays a hydrogen atom energy level diagram on a
    white background. Six horizontal blue lines (#306998) represent quantized energy
    levels from n=1 (-13.60 eV, bottom) to n=6 (near 0 eV, top). A dashed gray ionization
    limit line sits at 0 eV. Three spectral series are shown as colored downward arrows
    grouped spatially: Lyman Series (left, purple/magenta/indigo arrows from n=2,3,4
    to n=1), Balmer Series (center, red/blue/teal/amber arrows from n=3,4,5,6 to n=2),
    and Paschen Series (right, deep orange arrows from n=4,5 to n=3). Each series
    has a header label at the top with spectral band description (Ultraviolet/Visible/Infrared).
    Quantum number labels (n=1 through n=6) appear on the right side. Energy values
    (-13.60, -3.40, -1.51, 0 eV) are annotated on the left. Each transition arrow
    has a wavelength label. The y-axis shows "Energy (eV)" and the title reads "Hydrogen
    Atom · energy-level-atomic · plotly · pyplots.ai". The upper levels (n=3-6) converge
    near 0 eV, creating some label crowding on the right side.'
