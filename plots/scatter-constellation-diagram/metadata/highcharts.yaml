  strengths:
  - Correct and complete 16-QAM constellation with all required elements (ideal points,
    received symbols, decision boundaries, EVM)
  - Good use of Highcharts renderer API for custom overlays (decision boundaries,
    EVM label)
  - Clean, well-structured code with proper seed for reproducibility
  - Realistic telecommunications data with plausible SNR and EVM values
  - Explicit font sizing throughout ensures readability at 4800x2700
  weaknesses:
  - 'Equal aspect ratio not maintained: The 16:9 canvas (4800x2700) distorts the constellation
    geometry — the spec explicitly requires equal aspect ratio'
  - 'Received symbols too faint: Alpha 0.35 at radius 6 makes the received symbols
    wash out, density information is lost'
  - 'Legend positioning: The right-aligned vertical legend is slightly cramped and
    the marker icon is very small'
  image_description: The plot displays a 16-QAM constellation diagram on a white background.
    The title reads "16-QAM Constellation · scatter-constellation-diagram · highcharts
    · pyplots.ai" at the top. The x-axis is labeled "In-Phase (I)" and the y-axis
    "Quadrature (Q)", both ranging from -5 to 5. Sixteen red diamond markers represent
    the ideal constellation points arranged in a 4x4 grid at ±1, ±3 positions. Light
    blue semi-transparent circular dots (~1000) represent received symbols scattered
    around each ideal point due to Gaussian noise. Dashed gray decision boundary lines
    appear at -2, 0, and 2 on both axes, dividing the plane into 16 decision regions.
    An "EVM = 14.0%" annotation sits in the upper-left corner in a rounded white box
    with a gray border. A legend on the right identifies "Received Symbols" (blue
    circle) and "Ideal Points" (red diamond). The constellation geometry is visibly
    distorted — the 4x4 grid appears wider than tall due to the 16:9 aspect ratio
    (4800x2700), violating the spec's equal aspect ratio requirement.
