review:
  strengths:
  - Excellent Okabe-Ito colorblind-safe palette with intentional alpha variation per
    group
  - Robust circle packing via greedy placement + vectorized force simulation with
    no overlaps
  - Smart conditional label sizing (full name, first word, 4-char abbreviation) prevents
    clutter
  - Informative subtitle showing group budget totals provides immediate aggregate
    context
  - Clean void theme with white circle borders appropriate for this chart type
  - Fully deterministic with area-based scaling for accurate visual perception
  weaknesses:
  - Noticeable whitespace gap between bubble cluster and bottom legend reduces canvas
    utilization
  - Smallest bubble labels (Trai, Admi, Qual) are abbreviated somewhat cryptically
  image_description: 'The plot displays a packed bubble chart with 15 circles representing
    corporate department budgets (in millions). The largest circle is Engineering
    ($45M) in blue, positioned centrally. Circles are colored by four groups using
    the Okabe-Ito colorblind-safe palette: blue (#0072B2) for Tech (Engineering, R&D,
    IT, Design), amber/gold (#E69F00) for Business (Marketing, Sales, Finance), green/teal
    (#009E73) for Operations (Operations, Customer Svc, Logistics, Quality), and pink
    (#CC79A7) for Support (HR, Legal, Training, Admin). Circles are tightly packed
    with white borders separating them. Larger bubbles display both the department
    name (bold white) and budget value (e.g., "$45M"). Smaller bubbles show abbreviated
    names ("Trai", "Admi", "Qual"). The title reads "bubble-packed · plotnine · pyplots.ai"
    in bold centered text. A subtitle shows group totals: "Tech: $109M · Business:
    $78M · Operations: $66M · Support: $36M". A horizontal legend at the bottom labels
    the four groups. The background is white with a void theme (no axes, grid, or
    spines). Alpha variation subtly emphasizes Tech and Business groups over Operations
    and Support.'
