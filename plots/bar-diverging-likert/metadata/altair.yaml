    a central zero line, with negative responses extending left and positive responses
    extending right. The neutral category is split evenly across the midpoint. Colors
    follow a custom diverging scheme: dark orange for Strongly Disagree (#D95F02),
    light orange for Disagree (#FDB863), gray for Neutral (#B0B0B0), light blue for
    Agree (#92C5DE), and dark blue (Python Blue #306998) for Strongly Agree. White
    percentage labels appear on dark-background segments (Strongly Disagree, Strongly
    Agree) and dark labels on lighter segments, only shown where values are >=10%.
    A thin vertical zero baseline is visible. The x-axis reads "Percentage (%)" with
    values from -60 to 100. A horizontal legend at the bottom identifies all five
    categories. White strokes separate bar segments cleanly. The subtle x-axis grid
    (opacity 0.15) and no y-axis grid give the chart a refined appearance.'
