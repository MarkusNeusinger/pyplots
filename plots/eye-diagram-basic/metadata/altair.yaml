review:
  strengths:
  - Correct eye diagram pattern with realistic NRZ signal simulation
  - Inferno colormap is an excellent choice for density visualization
  - Explicit font sizing for readability
  - Grid and view border removed for cleaner appearance
  - Good signal generation with sigmoid transitions, noise, and jitter
  - Dual output (PNG + HTML)
  weaknesses:
  - Double-binning (numpy histogram2d + Altair Bin) creates coarse, blocky appearance
    instead of smooth density
  - White background is not ideal for eye diagrams — dark background would better
    suit signal integrity visualization
  - No annotations for eye height/width measurements
  - Axis spines and tick styling remain at defaults
  - Altair-specific features like tooltips (for HTML) or layered annotations are underutilized
  image_description: The plot displays a density heatmap eye diagram using the inferno
    colormap on a light/white background. The x-axis is labeled "Time (UI)" ranging
    from 0.00 to 2.00, and the y-axis shows voltage values from approximately -0.10
    to 1.20. Two characteristic eye openings are clearly visible between the high-density
    horizontal bands at the 0V and 1V signal levels. The high-density regions (yellow/orange)
    show where traces overlap most at the stable voltage levels, while transition
    regions between levels display scattered lower-density cells in purple and dark
    colors. The title reads "eye-diagram-basic · altair · pyplots.ai" with a subtitle.
    A "Log Density" color legend appears on the right side. The overall eye pattern
    demonstrates good signal integrity with visible noise and jitter effects on the
    transitions.
