  image_description: 'The plot shows a Schmidt equal-area (lower-hemisphere) stereonet
    projection rendered as a square image. A black primitive circle forms the boundary
    with tick marks every 10° around the perimeter (longer ticks at 30° intervals).
    Bold cardinal direction labels (N, E, S, W) are positioned outside the circle.
    Dashed light-gray reference cross lines mark the N-S and E-W axes. Three feature
    types are color-coded: Bedding (steel blue), Joint (pink), and Fault (amber/orange).
    Great circles are drawn as thin, semi-transparent arcs for each measurement plane.
    Poles to planes appear as colored dots clustered in distinct regions — Bedding
    poles cluster in the center-south area, Joint poles spread along the eastern edge,
    and Fault poles cluster in the southwest. Gray concentric contour segments (Kamb-style
    density) are visible around the main pole clusters. The legend is positioned to
    the right showing "Feature Type" with three entries. The title reads "stereonet-equal-area
    · letsplot · pyplots.ai" at top center.'
