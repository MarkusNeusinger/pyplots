    blue line with circular markers tracking sample means around 25.0 mm across 30
    samples. Red dashed lines mark UCL (~25.07) and LCL (~24.94), a green solid line
    marks the center line (CL ~25.0), and orange dotted lines show warning limits.
    Three red diamond markers highlight out-of-control points at approximately samples
