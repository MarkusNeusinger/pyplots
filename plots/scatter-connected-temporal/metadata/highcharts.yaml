review:
  strengths:
  - Excellent data storytelling with directional indicators and key year annotations
    guiding the viewer through 34 years of US economic history
  - Beautiful color gradient from light steel blue to dark navy encoding temporal
    progression
  - 'All spec features fully implemented: chronological connections, annotations,
    direction indicators, visible markers, color gradient'
  - Realistic educational dataset with strong feature coverage showing recessions,
    recoveries, and economic disruptions
  - Clean code with deterministic data and proper Highcharts export pattern including
    interactive HTML
  weaknesses:
  - Series built as raw dicts rather than using highcharts-core Series classes — functional
    but not fully idiomatic
  - Some point density in the 4-6% unemployment range makes adjacent markers slightly
    hard to distinguish
  - Axis lines could be removed or further refined for a more polished look
  image_description: The plot displays a connected scatter plot tracing US unemployment
    rate (x-axis) vs. inflation rate (y-axis) from 1990 to 2023. Data points are connected
    by a semi-transparent blue line in chronological order, forming a temporal path.
    Points use a color gradient from light steel blue (early years) to dark navy (recent
    years) to encode temporal progression. Key years (1990, 2000, 2009, 2020, 2023)
    are annotated with bold text labels and have larger markers with white borders.
    A start badge appears near the 1990 point and a time badge near the 2023 point,
    indicating the direction of time. The background has a subtle vertical gradient
    from light blue-white to pale gray. Axes show Unemployment Rate (%) ranging from
    about 3 to 11 and Inflation Rate (%) ranging from about -2 to 9 with subtle dotted
    grid lines. The title reads scatter-connected-temporal · highcharts · pyplots.ai
    with a descriptive subtitle.
