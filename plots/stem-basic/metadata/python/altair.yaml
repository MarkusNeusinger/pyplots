    — demonstrates all stem plot features (positive/negative values, varying heights)
  - 'Clean code structure: seed set (42), no functions/classes, clean imports, saves
    both PNG and HTML'
  weaknesses:
  - Full view border box (configure_view stroke=INK_SOFT creates 4-sided frame) —
    style guide requires removing top/right spines; use configure_view(stroke=None)
    and rely on axis domain lines instead
  - Grid is on both axes (both horizontal and vertical lines visible) — for a stem
    plot with discrete points, a Y-axis-only grid or no grid would be cleaner and
    less noisy
  - No visual hierarchy or emphasis — the decaying signal pattern is the natural story
    but no design element highlights it (e.g., color gradient along decay, area shading,
    or annotation marking the decay envelope)
