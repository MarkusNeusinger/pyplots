  image_description: 'The plot displays a meta-analysis funnel plot on a light gray
    (#FAFAFA) background at 4800x2700px. The Y-axis shows "Standard Error" inverted
    (0 at top, ~0.55 at bottom), and the X-axis shows "Log Odds Ratio". A light blue
    shaded funnel region represents pseudo 95% confidence limits with dashed blue
    borders. A solid blue vertical line marks the summary effect at ~0.26, and a dashed
    gray vertical line marks the null effect at 0. Fifteen study points are scattered
    as circles — 12 blue (#306998) inside the funnel and 3 coral/red (#C05746) outside.
    Marker sizes vary proportionally to study weight (inverse variance), creating
    clear visual hierarchy with larger, darker markers for more precise studies at
    the top. Labels include "Null (0)", "Summary: 0.26", and a red annotation "← Asymmetry
    suggests publication bias" in the lower-right area. A manual color legend at the
    bottom-left indicates inside/outside funnel counts. Title reads "funnel-meta-analysis
    · bokeh · pyplots.ai" centered at top.'
