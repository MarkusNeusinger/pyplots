  image_description: 'The plot displays an alluvial/Sankey-style diagram tracking
    employee engagement opinions across 4 quarterly waves (Q1-Q4 2025). Five opinion
    categories are represented as stacked rectangular nodes with rounded corners at
    each wave column: Strongly Agree (dark blue #306998), Agree (green #5BA865), Neutral
    (gray #95A5A6), Disagree (orange #E67E22), and Strongly Disagree (red #C0392B).
    Nodes are ordered bottom-to-top from Strongly Agree to Strongly Disagree, each
    labeled with abbreviated category name and respondent count (e.g., "Str. Agree
    n=180"). Curved flows connect nodes between consecutive waves — stable flows (same
    category) use alpha=0.6, while category-changing flows use alpha=0.25, creating
    clear visual distinction. Nodes have white borders (2.5px), shadow effects, and
    bold white text (dark text on Neutral). Wave column headers (Q1-Q4 2025) appear
    at the top in bold 20pt font. The title "alluvial-opinion-flow · matplotlib ·
    pyplots.ai" is centered at the top (24pt) with an italic subtitle below: "Neutral
    opinion declines as views polarize toward strong agreement and disagreement."
    Two trend annotations appear to the right of the Q4 column: "Neutral: 220 → 140
    (–80)" in gray and "Strong opinions: 330 → 440 (+110)" in blue. A legend at the
    bottom left shows both flow types (Stable/Changed) and all 5 category colors across
    4 columns.'
