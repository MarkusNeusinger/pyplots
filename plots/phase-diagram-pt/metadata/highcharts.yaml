  image_description: 'The plot displays a water phase diagram on a white background
    with Temperature (K) on the x-axis (180-780) and Pressure (Pa) on a logarithmic
    y-axis (10 to ~600M). Three phase boundary curves are shown: a blue dashed sublimation
    curve from ~200K to the triple point, an orange/brown solid vaporization curve
    arcing from the triple point up to the critical point, and a short nearly-vertical
    melting curve rising from the triple point. The triple point is marked with a
    purple circle at (273.16 K, 611.7 Pa) with a red annotation label. The critical
    point is marked with a dark blue diamond at (647.1 K, 22.06 MPa) with an orange
    annotation label. Four phase regions are labeled in muted semi-transparent text:
    SOLID (upper left), LIQUID (center), GAS (lower right), and SUPERCRITICAL FLUID
    (upper right). Title reads "Water Phase Diagram · phase-diagram-pt · highcharts
    · pyplots.ai". A small legend appears at the bottom. Very subtle horizontal grid
    lines on the y-axis.'
