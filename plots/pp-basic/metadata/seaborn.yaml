  image_description: 'The plot displays a P-P (Probability-Probability) plot with
    a square aspect ratio. Both axes range from 0.0 to 1.0. The x-axis is labeled
    "Theoretical Cumulative Probability (Normal)" and the y-axis "Empirical Cumulative
    Probability". A dashed red/orange diagonal reference line represents perfect normal
    fit. A light gray ±0.02 tolerance band surrounds the diagonal. 200 data points
    are plotted along the diagonal using three marker shapes: circles for the lower
    tail, diamonds for the center, and squares for the upper tail. Points are colored
    by deviation magnitude using a viridis_r colormap (yellow = low deviation, dark
    purple = high deviation), with a vertical colorbar on the right labeled "Absolute
    Deviation from Normal Fit". An annotation with an arrow points to the maximum
    deviation point (~0.051) noting "hardening skew". The title reads "pp-basic ·
    seaborn · pyplots.ai". Top and right spines are removed, and the grid is very
    subtle. The legend in the lower right shows the tolerance band and perfect normal
    fit line.'
