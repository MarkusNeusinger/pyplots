review:
  strengths:
  - Excellent Mandelbrot computation with smooth coloring, 200 iterations, bailout
    256, and vectorized numpy operations producing artifact-free gradients
  - Custom viridis-inspired colormap with 1024-entry LUT and log-normalized mapping
    creates beautiful perceptually uniform color transitions
  - Professional design with italic Georgia serif mathematical subtitle, shadow effect,
    styled annotations with semi-transparent backgrounds, and clean round colorbar
    tick values
  - Annotations for Main cardioid and Period-2 bulb provide effective data storytelling
    guiding the viewer to key mathematical structures
  - Full pygal integration using Graph subclass, Style system, SVG node API, and multi-format
    render pipeline
  weaknesses:
  - Design Excellence at 14/20 is solid but does not reach publication-quality level
    needed for 90+
  - Library Mastery constrained by pygal lacking native heatmap chart type requiring
    extensive manual SVG construction
  - Minor layout padding on left side could be tightened for better canvas utilization
  - Graph subclass adds code complexity beyond ideal flat script pattern though necessary
    for pygal
  image_description: 'The plot displays a Mandelbrot set fractal visualization on
    a clean white background. The title "heatmap-mandelbrot · pygal · pyplots.ai"
    is rendered at the top in large dark sans-serif text (56px). Below it, an italic
    Georgia serif subtitle reads "zₙ₊₁ = zₙ² + c · Escape time with smooth iteration
    count" in medium gray (36px). The main heatmap occupies the center, showing the
    full Mandelbrot set on the complex plane with the Real Axis (Re) ranging from
    -2.5 to 1.0 on the x-axis and Imaginary Axis (Im) from -1.0i to +1.0i on the y-axis.
    Interior points (non-escaping) are solid black, clearly displaying the characteristic
    cardioid and period-2 bulb with smaller satellite bulbs. Exterior points use a
    viridis-inspired colormap — deep purple for low iteration counts, transitioning
    smoothly through teal/blue-green to bright yellow near the boundary. Color gradients
    are smooth with no visible banding. Two annotations with white leader lines, small
    white anchor circles, and semi-transparent black background labels point to "Main
    cardioid" and "Period-2 bulb". A subtle shadow sits behind the heatmap for depth.
    A vertical colorbar on the right is labeled "Iterations" (32px bold) with clean
    round tick values: 5, 10, 25, 50, 100, 200. Below the colorbar, a black square
    with "In set" text explains the interior color. The plot has a thin border (2.5px)
    and well-balanced margins throughout.'
