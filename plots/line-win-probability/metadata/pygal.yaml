  image_description: 'The plot displays a win probability chart for an Eagles vs Cowboys
    NFL game (final score 24-17) on a white background. Two overlapping filled area
    series create the visual effect: a navy blue (DAL Cowboys) fill from 0% to 50%,
    and a teal/slate (PHI Eagles) fill from 0% to the win probability value, with
    opacity blending at overlap. A prominent dashed dark line marks the 50% baseline.
    Seven red/orange circular dots mark scoring events along the probability curve.
    The y-axis ranges from 0% to 100% labeled "Win Probability (%)" with gridlines
    at 10% intervals. The x-axis shows "Game Progression" with five major labels:
    Kickoff, Q2, Halftime, Q4, and Final. The title reads "Eagles vs Cowboys (24-17)
    · line-win-probability · pygal · pyplots.ai". A four-item legend at the bottom
    shows DAL Cowboys, PHI Eagles, 50% Line, and Scoring Events. The probability curve
    starts near 50%, drops for early Cowboys scoring, rises through Eagles touchdowns,
    dips at a Cowboys tie, then surges to ~97% by game end.'
