  - Four well-chosen sampling plans with independently varying n and c demonstrate
    discrimination power differences
  - Risk annotations (α=0.264, β=0.034) with styled red markers provide precise quantitative
    storytelling
  - Colorblind-safe Okabe-Ito palette with good luminance differentiation
  - Clean refined theme with removed x-grid, subtle y-grid, and light axis lines
