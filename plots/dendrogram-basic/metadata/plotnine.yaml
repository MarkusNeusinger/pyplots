  image_description: 'The plot shows a dendrogram (hierarchical clustering tree) of
    15 iris flower samples on a light gray (#FAFAFA) background. The y-axis is labeled
    "Ward Linkage Distance" ranging from 0 to ~11. Leaf labels at the bottom are rotated
    45° showing sample names (Setosa-1 through Setosa-5, Virginica-3 through Virginica-5,
    Versicolor-1 through Versicolor-5, Virginica-1, Virginica-2). Branches are color-coded:
    blue (#306998) for pure Setosa clusters, orange (#E8833A) for pure Versicolor
    clusters, green (#55A868) for pure Virginica clusters, and gray (#888888) for
    mixed-species merges. A dashed horizontal threshold line at ~4.5 is annotated
    with "Setosa separates" in italic gray text. Above it, "Versicolor & Virginica
    intermixed" annotation adds context. Merge node dots appear at cluster join points.
    A legend on the right shows "Branch Type" with four categories. The title reads
    "Iris Species Clustering · dendrogram-basic · plotnine · pyplots.ai" in bold,
    with a subtitle describing the method.'
