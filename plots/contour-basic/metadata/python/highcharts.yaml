  strengths:
  - Excellent custom viridis color stops producing a faithful perceptually-uniform
    elevation colormap
  - Marching squares contour extraction (inline, no scipy dependency) produces smooth
    correctly chained polylines
  - 'Full theme-adaptive chrome: PAGE_BG INK INK_SOFT INK_MUTED ELEVATED_BG all wired
    to ANYPLOT_THEME throughout'
  - White contour lines (rgba(255,255,255,0.85)) are visible across the entire viridis
    range in both themes
  - Both grid axes fully suppressed for a clean cartographic look; axis labels include
    units
  weaknesses:
  - Title prefix Mountain Terrain breaks the required {spec-id} · {library} · anyplot.ai
    format — move the descriptive name to the subtitle only
  - Contour lines are not labeled with elevation values; the spec says label key contour
    levels when practical — adding text at the open ends of a few key contours (e.g.
    600 m, 800 m, 1000 m) would satisfy this
