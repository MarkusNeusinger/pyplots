      Data: Colors appear identical to light render — palette consistency across themes is maintained. The non-Okabe-Ito colors (teal, blue, orange, pink) are the same in both renders.
      Legibility verdict: PASS for text readability — but FAIL for background (pure black vs #1A1A17). No theme-adaptive code exists in the implementation; the dark background appears to come from external pipeline theming.
