review:
  strengths:
  - Cohesive dark theme design with panel background matching colormap floor and harmonized
    outer background
  - Rich synthesized audio data with harmonics, chirp sweep, and amplitude decay creating
    a visually compelling spectrogram
  - Clean vectorized mel filterbank implementation avoiding librosa dependency
  - Data-driven annotations using separate DataFrames following grammar-of-graphics
    principles
  - Full spec compliance with all required features correctly implemented
  weaknesses:
  - Library Mastery remains the main gap — implementation uses plotnine correctly
    but does not leverage truly distinctive features like stat transformations or
    custom geoms
  - Annotation reference lines are extremely subtle (alpha 0.12-0.15), nearly invisible
    in the final render
  image_description: The plot displays a mel-spectrogram on a fully dark-themed canvas.
    The x-axis shows time (0-3 seconds) and the y-axis shows mel-scaled frequency
    with Hz labels at key mel band edges (128, 256, 512, 1024, 2048, 4096, 8000 Hz).
    The colormap is a custom inferno-like gradient progressing from very dark black/purple
    (low power ~-60 dB) through magenta and orange to bright yellow (0 dB). Clear
    horizontal bands of energy are visible at harmonic frequencies (~220, 440, 880
    Hz), with lower harmonics being brightest and decaying over time. A prominent
    chirp sweep arcs from approximately 500 Hz at t=0.8s up to ~4000 Hz at t=2.0s,
    creating a striking curved bright line that serves as the main visual focal point.
    Two data-driven annotations label the fundamental frequency (F0 in bright yellow)
    and 3rd harmonic (in orange), with very subtle reference lines at those frequencies.
    A tall colorbar on the right is labeled Power (dB). The title reads spectrogram-mel
    plotnine pyplots.ai in bold light gray. The panel background (#000004) matches
    the colormap floor, and the outer plot background (#0e0e1a) creates a cohesive
    dark theme throughout.
