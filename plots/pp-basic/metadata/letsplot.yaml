  strengths:
  - Excellent data storytelling through deviation color mapping, size encoding, and
    max deviation annotation
  - Darcula dark theme gives professional, distinctive appearance
  - Kolmogorov confidence band adds statistical rigor beyond spec requirements
  - Lets-plot tooltips with formatted weight and deviation values showcase library
    capabilities
  - Pharmaceutical QC scenario is realistic, neutral, and compelling
  - Inline CDF computation avoids unnecessary scipy dependency
  weaknesses:
  - Minor point overlap along the tight diagonal at lower CDF values
  - Red-blue diverging palette is acceptable but not the most colorblind-optimal choice
