review:
  strengths:
  - Excellent astronomical data with real star names, positions, and magnitudes
  - Beautiful dark sky aesthetic with radial gradient star markers creating a convincing
    glow effect
  - Per-constellation color palette with matching labels and lines
  - Strong visual hierarchy through magnitude-proportional marker sizing
  - Background stars add atmospheric depth
  weaknesses:
  - Constellation colors for Lyra and Aquila are too similar (both light cyan-blue)
  - No stereographic/azimuthal projection (flat Cartesian), though this is a Highcharts
    limitation
  - Grid lines slightly break the night-sky illusion — could use lower opacity or
    remove
  image_description: The plot displays a star chart on a deep dark navy background
    with a subtle vertical gradient. 15 constellations are plotted across the chart
    using Right Ascension (degrees, reversed from ~360° to 0°) on the x-axis and Declination
    (degrees, -50° to 70°) on the y-axis. Stars appear as white/pale circular markers
    with radial gradients — brighter stars (lower magnitude) are noticeably larger
    (e.g., Sirius in Canis Major is the largest). Constellation stick-figure lines
    connect stars in thin, semi-transparent lines, each constellation colored distinctly
    (e.g., Orion in light blue, Scorpius in red, Ursa Major in gold). Constellation
    names are labeled in their respective colors near the centroid of each star group.
    Faint background stars are scattered across the entire field. The title reads
    "star-chart-constellation · highcharts · pyplots.ai" in light gray, with a subtitle
    "Northern & Southern Hemisphere — 15 Constellations, 70+ Stars to mag 3.7". Axis
    labels include "Right Ascension (°)" and "Declination (°)" with dotted grid lines
    at low opacity.
