review:
  strengths:
  - 'Theme-adaptive chrome is complete and correct: PAGE_BG, INK, INK_SOFT, ELEVATED_BG
    all propagate correctly to both light and dark renders'
  - 'layer_tooltips() with formatted @date_str and ''Activity: @value'' is idiomatic
    and distinctive to lets_plot'
  - 'Data generation is realistic: Poisson-based counts, weekend dampening, sporadic
    spikes — genuinely GitHub-like'
  - 'All chrome removed: no grid, no ticks, no axis lines — clean minimal look'
  - Code is clean, flat, and fully reproducible
  weaknesses:
  - 'Canvas format: 16:9 landscape with 52 columns x 7 rows produces tiles ~3x taller
    than wide. A square canvas (ggsize(1200, 1200) with scale=3 -> 3600x3600px) would
    give near-square cells, which is the expected form for a calendar heatmap'
  - 'Panel border visible: panel_border is not blanked in the theme, so a thin rectangular
    frame appears around the tile grid in both renders — should add panel_border=element_blank()
    to the theme'
  - 'Month labels at bottom: spec requests labels along the top (or as section headers);
    the X-axis position puts them below, which is less conventional for calendar heatmaps'
  - 'Axis title size: axis_title set to size=18 but style guide recommends >=20pt
    for DPI-based libraries'
  - 'No storytelling: no subtitle, no annotation to highlight a pattern (e.g., peak
    week, weekend gap) — DE-03 is constrained to defaults'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white
      Chrome: Title "heatmap-calendar · letsplot · anyplot.ai" in dark ink at top — readable. Weekday tick labels (Mon-Sun) in dark-gray on left — readable. Month labels (Jan-Dec) in dark-gray on bottom X-axis — readable. "Month (2024)" X-axis title and "Day of Week" Y-axis title in dark-gray — readable. "Activity" legend title and colorbar labels in dark tones — readable. Thin dark panel border visible around tile grid.
      Data: Viridis colormap (dark purple for ~0, teal/green for ~10-15, yellow for 30+). Tiles are ~3x taller than wide due to 16:9 canvas. Saturday and Sunday rows visibly darker. Several yellow/green spike cells on weekdays.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17) — correct, not pure black
      Chrome: Title in light cream text — readable. Weekday tick labels (Mon-Sun) in light gray — readable. Month labels in light gray at bottom — readable. Axis titles readable. Legend text in light gray — readable. No dark-on-dark failures detected. Panel border less visible but still present.
      Data: Viridis colors IDENTICAL to light render (purple-to-yellow, same cells same colors). Tile gap lines are near-invisible (PAGE_BG gaps blend with dark background).
      Legibility verdict: PASS
