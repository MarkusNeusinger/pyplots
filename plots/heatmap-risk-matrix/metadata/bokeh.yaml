    green-yellow-orange-red gradient based on risk scores (1-25), with faint watermark
    numbers showing each cell''s score. Fifteen risk items are plotted as colored
    circular markers with bold labels beneath them: blue (Technical), purple (Financial),
    teal (Operational), and orange (Legal). Marker sizes vary by risk score - larger
    for higher-risk items. A Risk Zones legend on the right shows Low (1-4) in green,
    Medium (5-9) in olive, High (10-16) in orange, and Critical (20-25) in dark red.
    A Categories legend below it shows colored dots for each category. The title reads
    heatmap-risk-matrix bokeh pyplots.ai. Axis lines, ticks, and grid lines are removed
    for a clean look. White borders separate cells.'
