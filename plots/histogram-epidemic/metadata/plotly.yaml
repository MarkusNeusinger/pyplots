  image_description: 'The plot displays a stacked bar epidemic curve covering 120
    days (mid-January to mid-May 2024). Three case classifications are stacked: Confirmed
    (dark navy blue, bottom), Probable (golden orange, middle), and Suspect (light
    blue, top). A solid red cumulative cases line rises on the secondary y-axis (right),
    reaching approximately 4,500 total cases. Two dashdot vertical intervention lines
    are annotated with styled boxes: "Lockdown imposed" (dark red, ~Feb 4) and "Vaccination
    campaign" (green, ~Mar 30). Three distinct epidemic waves are visible — a smaller
    initial peak (~Feb 8), a large main peak (~Mar 18-20, ~83 daily cases), and a
    smaller resurgence (~late April). A Plotly range slider at the bottom provides
    time-window exploration. The background is subtle off-white, the horizontal legend
    at top-center correctly orders traces to match visual stacking, and x-axis labels
    are biweekly at -30° angle.'
