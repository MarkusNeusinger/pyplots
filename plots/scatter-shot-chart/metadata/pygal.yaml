  image_description: 'The plot displays a basketball half-court shot chart on a warm
    beige (#f5f0e8) background. Court markings (three-point arc, paint/key rectangle,
    free-throw circle with dashed bottom half, restricted area arc, backboard, and
    rim) are drawn in subtle tan/beige lines. 200 shot attempts are plotted as colored
    dots: darker blue for made shots inside (paint/FT), lighter blue for made perimeter
    shots, darker orange-red for missed inside shots, and lighter salmon for missed
    perimeter shots. Inside shots use larger dot markers (size 13) while perimeter
    shots use smaller ones (size 8), creating a clear visual hierarchy. The title
    "scatter-shot-chart · pygal · pyplots.ai" appears at the top in dark gray. A bottom
    legend in two columns shows four series with FG% statistics: "Made Inside — 56%
    FG (48/85)", "Made Perimeter — 34% FG (39/115)", "Missed Inside (37)", and "Missed
    Perimeter (76)". The canvas is square (3600x3600) maintaining 1:1 aspect ratio.
    No axis labels or ticks are shown, which is appropriate as the court geometry
    provides spatial context.'
