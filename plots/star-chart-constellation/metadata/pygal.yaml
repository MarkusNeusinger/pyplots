  image_description: 'The plot displays a star chart on a dark navy background (#04041a/#060820).
    Stars are rendered as circles of varying sizes and colors based on magnitude tiers:
    large white circles for brightest stars (mag < 1, e.g., Sirius, Capella), gold/yellow
    for mag 1-2, light blue/cyan for mag 2-3, and small gray dots for faintest stars
    (mag 3-5). Eight constellations are shown with blue stick-figure lines connecting
    their stars: Orion (lower-left with distinctive belt), Ursa Major (upper-right
    Big Dipper shape), Taurus, Gemini, Canis Major (lower center), Leo (center-right),
    Auriga (upper-left pentagon), and Canis Minor. Constellation names appear in italic
    pale blue text near each group''s centroid. An orange ecliptic curve sweeps across
    the chart. The x-axis shows Right Ascension (3h-14h), y-axis shows Declination
    (-30° to 60°+). Title reads "star-chart-constellation · pygal · pyplots.ai". Legend
    at bottom displays magnitude tiers and ecliptic with colored squares.'
