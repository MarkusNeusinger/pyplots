  weaknesses:
  - Right-side control limit labels (UCL, LCL, +2σ, -2σ) are too small and overlap
    each other, especially in the R chart
  - Design is functional but utilitarian - lacks the polish needed for publication
    quality
  - No background color zones between control limits that would enhance data storytelling
  image_description: The plot displays two vertically stacked Bokeh charts for SPC
    X-bar/R analysis of CNC shaft diameter measurements. The top chart shows sample
    means (X-bar) ranging from ~24.85 to ~25.20 mm across 30 samples, with blue circular
    markers connected by a light blue line. Three red diamond markers indicate out-of-control
    points at approximately samples 9 (above UCL), 18 (below LCL), and 25 (above UCL).
    Horizontal lines show UCL and LCL (red dashed), center line X-bar-bar (black solid),
    and ±2σ warning limits (orange dotted). The bottom R chart shows sample ranges
    from ~0.02 to ~0.22 mm with the same styling conventions. Right-side labels (UCL,
    LCL, X-bar-bar, R-bar, +2σ, −2σ) appear small and crowded at the chart edges.
    The title "spc-xbar-r · bokeh · pyplots.ai" appears in the top left. Overall the
    layout is functional with good use of the vertical space, but right-side labels
    are hard to read and the design is utilitarian rather than polished.
