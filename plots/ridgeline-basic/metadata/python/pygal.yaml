    must be #009E73; use viridis/cividis interpolated to 12 colors for a continuous
    seasonal progression'
  - Ridge overlap ~28% (ridge_height=2.5, spacing=1.8) is below spec required 50-70%
    — reduce ridge_spacing to 1.0 or increase ridge_height to 4.0
  - Polygon baseline lines visible as faint horizontal artifacts across each ridge
    — set stroke_style width to 0 to hide them
