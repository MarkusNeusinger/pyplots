review:
  strengths:
  - Excellent dark theme design that complements the magma colormap, creating a cohesive
    music-analysis aesthetic
  - Seamless heatmap via p.image() glyph with no visible gaps between cells
  - Realistic chord progression data (C→G→Am→F) with harmonic overtones and smooth
    transitions
  - Dual output (PNG + interactive HTML with hover tooltips) leverages Bokeh strengths
  - Clean, well-organized code with appropriate complexity
  weaknesses:
  - Color bar Energy title slightly cramped at right canvas edge
  - Could push Library Mastery further with additional Bokeh-specific features like
    span annotations for chord boundaries
  image_description: 'The plot displays a chromagram heatmap on a dark background
    (#0a0a0a) using a magma-inspired color palette ranging from near-black/dark purple
    (low energy) through orange to bright yellow (high energy). The y-axis shows all
    12 pitch classes (C at top through B at bottom) with clear labels. The x-axis
    spans 0 to 8 seconds labeled "Time (seconds)". The title reads "heatmap-chromagram
    · bokeh · pyplots.ai" in light gray text. A color bar on the right labeled "Energy"
    shows the 0-1 scale. Four distinct chord regions are visible: C major (0-2s, with
    bright C/E/G rows), G major (2-4s, bright G/B/D), A minor (4-6s, bright A/C/E),
    and F major (6-8s, bright F/A/C). Harmonic overtones (fifths) appear as secondary
    bright bands. Transitions between chords show smooth blending at boundaries. The
    seamless image rendering has no gaps between cells.'
