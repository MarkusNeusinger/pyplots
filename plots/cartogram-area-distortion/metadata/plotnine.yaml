  - Bottom annotation text (size 9-10) slightly small for canvas size
  - Some wasted space between map area and right-side legend
  image_description: The plot displays a non-contiguous cartogram of 16 European countries
    where polygon area is proportional to population. Countries are rendered as scaled
    hexagonal-like polygons against a light blue-gray background, with dashed gray
    outlines showing original borders for comparison. The color gradient runs from
    deep indigo/purple (low GDP per capita, e.g., Romania ~16K, Poland ~18K) through
    teal/green (mid-range, e.g., France ~44K, Germany ~51K) to bright yellow (high
    GDP, e.g., Norway ~83K, Switzerland ~93K). Germany (DE), France (FR), UK, Italy
    (IT), and Spain (ES) are the largest polygons, reflecting their larger populations.
    Each country is labeled with a 2-letter abbreviation in white rounded boxes. The
    title reads "cartogram-area-distortion · plotnine · pyplots.ai" with a subtitle
    "Area ∝ Population — 469M total across 16 countries | Dashed outlines = original
    borders". A colorbar legend on the right shows "GDP per Capita (thousand USD)".
    Bottom annotations explain the size encoding and highlight the top-3 countries
    by population.
