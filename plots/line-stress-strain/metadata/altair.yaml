  image_description: 'The plot displays an engineering stress-strain curve for mild
    steel tensile testing. The main curve is rendered as a solid blue (#306998) line
    starting from the origin, rising steeply through a nearly vertical elastic region,
    transitioning through a yield plateau near 250 MPa, curving upward through strain
    hardening to a peak (UTS) around 400 MPa at ~0.22 strain, then declining through
    necking to fracture at ~280 MPa and ~0.35 strain. Three key points are marked
    with large filled circles: Yield Point (orange) near the elastic-plastic transition,
    UTS (purple) at the peak, and Fracture (teal) at the end. Region labels ("Elastic",
    "Strain Hardening", "Necking") appear in italic gray at the top, separated by
    subtle dashed vertical lines. A dashed gray 0.2% offset line is drawn parallel
    to the elastic slope. Young''s modulus "E = 210,000 MPa" is annotated in blue
    with a connector line to the elastic slope. The title reads "Mild Steel Tensile
    Test · line-stress-strain · altair · pyplots.ai" with a gray subtitle. Axes are
    labeled "Engineering Strain" and "Engineering Stress (MPa)". No grid; axes have
    subtle gray domain lines and ticks.'
