review:
  strengths:
  - Excellent dual encoding (bubble size for population, color for density) creates
    meaningful comparison
  - Custom colorscale is perceptually uniform and visually striking
  - Storytelling annotation highlights key insight about population vs density disconnect
  - Clean polished visual design with white bubble outlines and subtle background
    boundaries
  - Deterministic realistic data using actual US Census estimates
  - Good use of Plotly-specific geo features (Albers USA, Scattergeo, Choropleth layers)
  - HTML export provides interactive hover tooltips with detailed state information
  weaknesses:
  - NE state offsets push bubbles outside map boundaries creating visual awkwardness
  - Bubble cartogram does not preserve region contiguity as spec mentions
  - Some small state bubbles are barely visible without labels
  - Storytelling annotation text at 13px is slightly small
  image_description: The plot displays a bubble cartogram of U.S. states on an Albers
    USA projection map. Each state is represented by a circle (bubble) whose area
    is proportional to population, and whose color encodes population density using
    a custom colorscale ranging from deep navy/dark purple (low density, ~10 per sq
    mi) through magenta/pink (medium) to bright yellow (high density, ~5k per sq mi).
    State abbreviation labels in white bold text appear inside bubbles for states
    with population >= 2M. Faint grey state boundaries are visible in the background
    providing geographic reference. The colorbar on the right is titled "Population
    Density (per sq mi)" with logarithmic tick marks at 10, 50, 100, 500, 1k, 5k.
    The title reads "U.S. States Sized by Population" with subtitle "cartogram-area-distortion
    · plotly · pyplots.ai". A footer annotation explains "Area proportional to population
    · Color proportional to density". A storytelling annotation in the bottom-left
    reads "California (39M) has 6x more people than median state, yet New Jersey is
    4x denser". Northeast states have been offset to reduce overlap. California and
    Texas have the largest bubbles; New Jersey appears bright pink/warm indicating
    high density despite a smaller bubble.
