  strengths:
  - 'Perfect spec compliance: error bars with caps, asymmetric error support, and
    all spec features present'
  - 'Excellent code quality: clean, flat, deterministic, all imports used'
  - Correct theme adaptation in both renders — no dark-on-dark or light-on-light failures
  - Smart use of pygal.XY to construct error bars manually (pygal has no native error
    bar type)
  - Proper use of interactive tooltips and HTML export — genuinely leverages pygal's
    distinctive features
  weaknesses:
  - Unintended x=0 reference line appears at the 'Control' position — fix by shifting
    x positions to 1–N with xrange=(0.5, N+0.5) so x=0 guide is off-canvas
  - No data storytelling or visual hierarchy — all six groups rendered identically;
    add a horizontal reference line at the Control mean to create a focal point
  - Aesthetic is clean but generic — no distinctive design choices beyond palette
    compliance
  - Data context is slightly generic ('Treatment A–E'); more specific labels would
    improve DQ-02
