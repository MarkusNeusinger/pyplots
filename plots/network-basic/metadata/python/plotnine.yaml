review:
  strengths:
  - Fully correct theme-adaptive chrome in both light and dark renders — all INK/INK_SOFT
    tokens flow to every non-data element
  - Fruchterman-Reingold layout implemented natively in numpy, enabling plotnine to
    render a network graph without matplotlib fallback
  - Hub-halo + size encoding + hub annotation creates genuine visual storytelling
    about network centrality
  - Perfect spec and data quality scores — covers all features, realistic neutral
    data, correct scale
  weaknesses:
  - Node label text size (14pt via geom_text) is slightly below the 16pt minimum for
    secondary text at 4800x2700 resolution — increase to 16pt
  - Some label crowding around dense cluster areas (Carol/Eve/Bob, Leo/Mia/Noah) —
    consider larger nudge_y or layout fine-tuning to reduce proximity
  - Canvas utilization has unused space in the lower-left — a larger nudge to fill
    the 16:9 frame more evenly would improve VQ-05
