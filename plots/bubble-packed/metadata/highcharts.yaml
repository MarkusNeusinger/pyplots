review:
  strengths:
  - Custom colorblind-safe palette with per-bubble opacity variation creates effective
    visual hierarchy
  - Professional gradient background, custom typography, and clean legend styling
  - Excellent use of Highcharts packedbubble with splitSeries, filtered dataLabels,
    and layout algorithm tuning
  - Realistic market value data with good variety across 5 sectors and 20 sub-sectors
  weaknesses:
  - Label overlap in the dense center area where multiple sector bubbles converge
  - Canvas underutilization with significant whitespace between the bubble cluster
    and the legend
  - The post-render scale_script for SVG manipulation adds code complexity
  image_description: 'The plot displays a packed bubble chart titled "bubble-packed
    · highcharts · pyplots.ai" with subtitle "Market value by sector ($B)". The chart
    shows approximately 20 bubbles of varying sizes representing industry sub-sectors,
    colored by five parent sectors: Technology (steel blue), Finance (gold/amber),
    Healthcare (purple/mauve), Energy (teal), and Consumer (salmon/coral). The background
    features a subtle vertical gradient from near-white (#FAFBFD) to light gray (#F0F2F5).
    Larger bubbles (Software, Banking, Cloud Services, Pharma, Oil & Gas, Automotive)
    are prominently sized, while smaller items (Cybersecurity, Health Svcs, Fintech)
    appear as noticeably smaller circles. Data labels appear inside the larger bubbles
    in white text with dark outline, filtered to only show items with value > 320.
    Bubbles have white borders and per-bubble opacity variation based on value, creating
    visual depth. The legend at the bottom shows five sector categories with small
    colored circles. The bubbles are loosely clustered by sector via Highcharts''
    splitSeries feature, though the clusters overlap somewhat in the dense center
    area. Some label crowding is visible, particularly around Semiconductors/Oil &
    Gas and Food & Bev/Asset Mgmt/Insurance in the middle.'
