review:
  strengths:
  - Clever use of pygal.Dot as a pictogram approximation with dot matrix data construction
  - 'Strong data storytelling: title communicates the insight, descending order, saturated
    leader color'
  - Clean visual design with hidden guides, white background, and custom color palette
  - Well-structured, deterministic code with clear comments explaining design choices
  - Good feature coverage showing both exact multiples and remainders
  weaknesses:
  - Partial values shown as smaller dots rather than partially-filled icons — less
    intuitive for the pictogram concept
  - Some empty canvas space to the right for shorter rows creates slight visual imbalance
  image_description: 'The plot displays a dot chart (pygal.Dot) used as a pictogram
    approximation for fruit production data. Five categories are arranged as horizontal
    rows: Apples (top), Oranges, Bananas, Grapes, and Mangoes (bottom). Each category
    has large circular dots where each full dot represents 5,000 tonnes of production.
    Apples has 7 full-sized steel blue dots spanning to 35k; Oranges has 4 full gold
    dots plus 1 smaller partial dot (22k); Bananas has 3 full teal dots plus 1 small
    partial dot (18k); Grapes has 3 full purple dots (15k); Mangoes has 1 full brick-red
    dot plus 1 smaller partial dot (8k). The x-axis shows cumulative values (5k through
    35k). The title reads "Fruit Production — Apples Lead at 4× Mangoes (each dot
    ≈ 5 000 tonnes)" with a subtitle "pictogram-basic · pygal · pyplots.ai". A horizontal
    legend at the bottom shows all five categories with their respective colors. The
    background is clean white with no grid lines.'
