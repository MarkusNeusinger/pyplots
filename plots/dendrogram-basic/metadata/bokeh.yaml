review:
  strengths:
  - Excellent manual dendrogram construction with proper U-shaped connectors and leaf
    ordering
  - Interactive HoverTool showing merge distance, cluster size, and member names on
    each branch
  - Semantic color coding (within vs between-cluster) with threshold line tells a
    clear clustering story
  - Sqrt scaling on y-axis improves visibility of lower-level merges
  - Dual output (PNG + HTML) leverages Bokeh interactive strengths
  weaknesses:
  - Axis lines still visible; removing them would further refine visual appearance
  - Branch line_width could be slightly increased for finest merges on 4800px canvas
  image_description: 'The plot displays a vertical dendrogram of 15 iris flower samples
    (5 each of Setosa, Versicolor, Virginica) using Ward''s method with sqrt-scaled
    y-axis. X-axis labels are rotated ~45 degrees showing sample names (e.g., "Setosa-4",
    "Versicolor-1", "Virginica-3"). Teal (#0F7B6C) lines represent within-cluster
    merges and warm red (#C0392B) lines represent between-cluster merges. A dashed
    horizontal line labeled "cluster threshold" separates the two color regimes. The
    hierarchical structure clearly shows three species clusters: Setosa on the left,
    Versicolor in the middle, and Virginica on the right, with the final cross-species
    merge at the top in red. Legend in top-left shows "Within-cluster" and "Between-cluster"
    with a clean bordered background. The background is light gray (#FAFAFA), y-grid
    is subtle dashed lines, x-grid is hidden, and the outline is removed.'
