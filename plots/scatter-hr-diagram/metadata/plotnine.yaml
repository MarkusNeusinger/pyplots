  image_description: 'The plot displays a Hertzsprung-Russell diagram as a scatter
    plot on a 16:9 canvas with a very light gray panel background. The x-axis shows
    Surface Temperature (K) reversed from ~35000K (left) to ~2000K (right), and the
    y-axis shows Luminosity (L☉) on a logarithmic scale from ~1e-4 to ~1e5. Points
    are colored by spectral type: O (dark navy), B (medium blue), A (light blue),
    F (very pale yellow), G (amber/orange), K (deep orange), M (dark red). Four stellar
    regions are labeled in bold italic gray text: "Supergiants" at the top, "Red Giants"
    at center-right, "Main Sequence" across the center diagonal, and "White Dwarfs"
    at the lower-left. The Sun is marked with a prominent gold diamond with black
    border, labeled "Sun" in bold. A styled legend on the right lists all seven spectral
    types. The main sequence forms a clear diagonal band from upper-left (hot, luminous)
    to lower-right (cool, dim). Grid lines are subtle and minor grid is removed.'
