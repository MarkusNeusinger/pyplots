  strengths:
  - Excellent phase-coded visual storytelling with three blue shades distinguishing
    attack/sustain/release, plus labels and boundary lines
  - Idiomatic Bokeh usage with varea, BoxAnnotation, Label, ColumnDataSource, and
    Span models
  - Complete spec compliance with all required features including min/max envelope
    rendering
  - Clean, well-structured code with realistic audio signal synthesis (fundamental
    + harmonics + envelope + tremolo)
  - Dual output (PNG + interactive HTML) leverages Bokeh web capability
  weaknesses:
  - BoxAnnotation phase region shading at alpha 0.04 is nearly invisible and could
    be more prominent
  - Phase labels at 16pt with 0.7 alpha are somewhat faint compared to main chart
    elements
  image_description: The plot displays an audio waveform rendered as three color-coded
    filled areas (using Bokeh's varea glyph) symmetric around a zero baseline. The
    attack phase (0-0.05s) is rendered in a lighter blue (#4A90D9), the sustain phase
    (0.05-1.2s) in Python Blue (#306998), and the release phase (1.2-1.5s) in a darker
    blue (#1D4F72). Each phase is labeled at the top of the chart in italic grey text
    ("Attack", "Sustain", "Release") with dashed vertical lines marking the phase
    boundaries. Faint BoxAnnotation background shading differentiates the three regions.
    The x-axis reads "Time (seconds)" ranging from 0 to ~1.4, and the y-axis reads
    "Amplitude" with ticks at -1.0, -0.5, 0.0, 0.5, 1.0. The title "waveform-audio
    · bokeh · pyplots.ai" is displayed in dark grey at the top left. A horizontal
    zero-line bisects the waveform. The background is a light blue-grey (#F7F9FC)
    with subtle dashed y-grid lines. X-grid, ticks, and outline are removed. The waveform
    clearly shows the attack-sustain-release envelope with visible tremolo modulation
    creating a wavy upper/lower boundary.
