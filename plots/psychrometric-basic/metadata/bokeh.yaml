  image_description: The plot displays a psychrometric chart on a light gray background
    (#fafafa) with "psychrometric-basic · bokeh · pyplots.ai" as the title. The x-axis
    shows "Dry-Bulb Temperature (°C)" from -10 to 50, and the y-axis shows "Humidity
    Ratio (g/kg)" from 0 to 30. Blue curved lines represent relative humidity from
    10% to 100% in 10% increments, with the 100% saturation curve drawn thicker and
    darker. Orange dashed diagonal lines show wet-bulb temperatures (0°C to 35°C),
    brown dotted diagonal lines show enthalpy (10 to 100 kJ/kg), and green dash-dot
    lines show specific volume (0.78 to 0.92 m³/kg). A light blue shaded polygon marks
    the "Comfort Zone" (20-26°C, 30-60% RH). A red line with arrowhead traces an HVAC
    cooling/dehumidification process from "Outdoor Air (35°C, 60% RH)" to "Supply
    Air (15°C, 90% RH)", with red circular markers at both state points. All property
    lines have direct labels. Grid lines are subtle. Bokeh toolbar icons appear at
    top-right.
