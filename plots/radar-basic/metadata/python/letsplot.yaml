    Light render (plot-light.png):
      Background: Warm off-white approximately #FAF8F1 — correct for light theme
      Chrome: Title "radar-basic · letsplot · anyplot.ai" (or pyplots.ai per code) appears top-left in small dark text, readable. Category labels (Creativity, Leadership, Communication, Technical, Problem Solving, Teamwork) in dark gray at outer edges of radar, all readable. Scale value labels (20, 40, 60, 80, 100) on the inner axis, readable. Legend on right side with "Employee" header.
