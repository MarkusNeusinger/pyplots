review:
  strengths:
  - Colorblind-safe palette with good contrast between all four nucleotide colors
  - Data storytelling through yellow highlight on most conserved position with annotation
  - Realistic bioinformatics data with good variation across positions
  - Clean grammar of graphics composition with well-customized theme
  - Explicit font sizing throughout ensures readability at target resolution
  weaknesses:
  - Letters are white text overlaid on colored bars rather than stretched glyphs filling
    their allocated height as spec requires
  - Small letter labels at bottom of stacks overlap in cramped low-frequency segments
  - Font size scaling approach (proportional to height with clip) is somewhat hacky
  image_description: 'The plot shows a sequence logo for a 10-position DNA transcription
    factor binding site motif. Each position has stacked colored rectangles representing
    nucleotides: A (green, #009E73), C (blue, #0072B2), G (orange/yellow, #E69F00),
    and T (pink, #CC79A7). Stack heights represent information content in bits (y-axis
    ranges 0 to ~1.6). White bold letter labels are overlaid on the rectangles. Position
    8 is highlighted with a pale yellow background rectangle and an italic "most conserved"
    annotation above it — this position shows a dominant green A bar reaching ~1.35
    bits. Position 5 has no visible bars (uniform distribution = 0 bits). The title
    reads "sequence-logo-basic · plotnine · pyplots.ai" in bold at the top. The background
    is light gray (#FAFAFA), with subtle horizontal grid lines and solid axis lines.
    A "Nucleotide" legend appears on the right side.'
