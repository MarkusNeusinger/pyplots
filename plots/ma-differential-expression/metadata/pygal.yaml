  strengths:
  - Excellent data generation with realistic RNA-seq parameters (15,000 genes, realistic
    fold changes, p-value simulation)
  - Clean code structure with perfect KISS flow and reproducibility
  - Good custom color palette with warm cream background that differentiates from
    generic white
  - Correct implementation of all required MA plot elements (reference lines, thresholds,
    LOESS)
  - Smart subsampling strategy that preserves all significant genes
  weaknesses:
  - Non-significant scatter points are nearly invisible — need larger dot size or
    stronger color contrast against cream background
  - LOESS trend curve is extremely hard to see — needs thicker stroke or more contrasting
    color
  - No gene name labels plotted despite creating the data for them
  - Plot appears dominated by red significant points because non-significant cloud
    is invisible
  image_description: 'The plot displays an MA plot on a warm cream/beige background
    (plot_background #F4F1EB). The x-axis shows "Mean Expression (A)" ranging from
    0 to ~26, and the y-axis shows "Log₂ Fold Change (M)" ranging from about -4 to
    +5. The title reads "ma-differential-expression · pygal · pyplots.ai" at the top.
    Two scatter series are plotted: non-significant genes in a muted steel blue and
    significant genes (p < 0.05) in deep red. A solid blue horizontal line marks M
    = 0 (no change), dashed dark slate lines mark ±1 (±2-fold thresholds), and a green
    LOESS trend line runs along M ≈ 0. The legend at the bottom shows 5 entries in
    a single row. The data is heavily concentrated at low mean expression values (0-6),
    with significant red points scattered widely in both positive and negative fold-change
    directions. Non-significant points are very small and hard to distinguish from
    the background, making the plot appear dominated by red significant points. The
    LOESS curve is nearly invisible.'
