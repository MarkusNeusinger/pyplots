  image_description: 'The plot displays a stacked bar chart (epidemic curve) showing
    daily new cases of a foodborne outbreak from March 1 to mid-April 2024. Three
    case classifications are stacked: Confirmed (steel blue), Probable (orange/brown),
    and Suspect (gray). The curve exhibits a classic point-source outbreak shape with
    a sharp rise peaking around March 10-12 at approximately 175 daily cases, followed
    by a gradual decline. Two dashed vertical lines mark interventions: a red line
    for "Lockdown Start" (March 15) and a green line for "Vaccination Campaign" (April
    5), each with bold text labels on white background rectangles. A dark cumulative
    case line overlays the bars, reaching 2,650 total cases (labeled in italics at
    the right end). The x-axis shows weekly date ticks ("Date of Symptom Onset"),
    the y-axis shows "Daily New Cases," and the title reads "histogram-epidemic ·
    letsplot · pyplots.ai" with a descriptive subtitle. A caption explains the cumulative
    line. The legend ("Case Classification") is positioned inside the upper-right
    plot area with a bordered white background.'
