  image_description: 'The plot displays a pictogram chart (isotype visualization)
    for fruit production data. Five categories are arranged vertically from top to
    bottom: Apples (blue, #306998), Grapes (purple, #8E44AD), Oranges (orange, #E67E22),
    Bananas (green, #27AE60), and Strawberries (dark red, #C0392B). Each category
    has a row of colored rectangular tiles where each full tile represents 5,000 tonnes.
    Apples has 7 full tiles (35k), Grapes has 5 full + 1 partial (28k), Oranges has
    4 full + 1 partial (22k), Bananas has 3 full + 1 partial (18k), and Strawberries
    has 2 full + 1 partial (12k). Partial tiles are shown with a dashed outline and
    a proportionally-filled left-aligned portion at low opacity. Value labels (e.g.,
    "35k") appear in bold gray text to the right of each row. The title "pictogram-basic
    · plotnine · pyplots.ai" is bold and centered at the top. A bottom legend reads
    "Each ■ = 5k tonnes" with a blue tile sample. A caption at the bottom left states
    "Partial squares show fractional units · Source: FAO estimates". The background
    is clean white (theme_void).'
