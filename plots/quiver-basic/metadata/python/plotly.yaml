review:
  strengths:
  - Uses plotly's ff.create_quiver — the purpose-built quiver utility — combined with
    go.Scatter for magnitude color encoding, demonstrating solid library knowledge
  - All font sizes explicitly set (title 32, axis 24, ticks 18, colorbar 22/18) —
    fully readable in both renders
  - Circular rotation field (u=-y, v=x) with viridis magnitude colorscale creates
    an immediately readable vortex story
  - Aspect-ratio lock (scaleanchor/scaleratio) preserves vector geometry — correct
    for a quiver plot
  - 'Arrow density (15×15 grid, scale_factor=0.2) is well-calibrated: no overlap,
    each arrow distinguishable'
  weaknesses:
  - Arrow line color is hardcoded to '#306998' (legacy Python Blue) — explicitly non-compliant
    per VQ-07; replace with BRAND = '#009E73' for the quiver lines or a neutral INK_SOFT
    token
  - Code does not read ANYPLOT_THEME env var and saves to 'plot.png'/'plot.html' instead
    of 'plot-{THEME}.png'/'plot-{THEME}.html' — theme-adaptive chrome and correct
    output filenames are missing from the source
  - 'Axis labels lack units (''X Position'' / ''Y Position'' have no unit annotations);
    title uses an extra description prefix instead of the canonical ''{spec-id} ·
    {library} · anyplot.ai'' format (current: ''Circular Flow Field · quiver-basic
    · plotly · anyplot.ai'')'
  - 'Design defaults dominate: template=''plotly_white'' with no spine removal, no
    margin tuning beyond basic values, minimal customisation beyond font sizes — design
    excellence remains at library-configured-default level'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm cream/off-white consistent with ~#FAF8F1 — not pure white.
      Chrome: Title "Circular Flow Field · quiver-basic · plotly · anyplot.ai" in dark text, clearly readable. Axis labels "X Position" / "Y Position" readable. Tick labels readable at appropriate size. Colorbar label "Magnitude" with numeric ticks also readable. All chrome legible.
      Data: 15×15 grid of quiver arrows showing a circular rotation pattern. Arrow lines appear in a consistent blue/teal hue (code specifies #306998). Scatter markers at arrow bases are coloured by the viridis scale — deep purple at centre (low magnitude ≈ 0) transitioning through green to bright yellow at the corners (high magnitude ≈ 2.83). Colorbar on the right encodes magnitude 0.5–2.5+. The vortex structure is immediately apparent.
      Legibility verdict: PASS — all text readable, no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Near-black, consistent with ~#1A1A17 — not pure black.
      Chrome: Title visible in white/light text against dark background. Axis labels and tick labels appear in light colour — readable. Colorbar "Magnitude" label and ticks visible. No dark-on-dark failures observed.
      Data: Same viridis coloured markers and arrow pattern as light render — data colours are identical to the light render as required. The bright yellow outer arrows contrast well against the dark background. The deep purple centre arrows are slightly harder to see on dark but still distinguishable.
      Legibility verdict: PASS — all text readable in light colours against dark background. Note: the dark theme chrome (light text, dark background) is present in the images but the committed source code does not include explicit ANYPLOT_THEME handling — the dark render may originate from a prior pipeline pass. The discrepancy is flagged as a code-level weakness.
