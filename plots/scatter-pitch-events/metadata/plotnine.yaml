review:
  strengths:
  - Accurate pitch diagram with standard FIFA markings (penalty areas, goal areas,
    center circle, halfway line, goals)
  - Effective use of plotnine grammar of graphics for layer composition — pitch markings
    as annotate layers, events as geom layers
  - Realistic data generation with position distributions matching real football patterns
    (shots in attacking third)
  - Clean alpha-based outcome encoding and shape-based event type differentiation
  weaknesses:
  - Corner arcs defined in code but never rendered on the pitch (dead code + missing
    spec feature)
  - Unsuccessful events at alpha=0.35 are too faint against green background
  - Title font size 22pt slightly below recommended 24pt minimum
  - Arrow lines at size=0.5 are thin and hard to follow in cluttered areas
  - No strong visual focal point or storytelling emphasis
  image_description: 'The plot displays a soccer pitch with a green (#2d8c3c) background
    and white pitch markings including penalty areas, goal areas, center circle, halfway
    line, penalty spots, and goal posts. Four event types are scattered across the
    pitch: blue circles for passes, red stars for shots, teal/green triangles for
    tackles, and purple diamonds for interceptions. Directional arrows extend from
    pass and shot origins toward their endpoints — pass arrows spread across the pitch
    while shot arrows converge toward the right goal. Successful events appear at
    high opacity (0.9) and unsuccessful events at low opacity (0.35). The title "scatter-pitch-events
    · plotnine · pyplots.ai" is displayed in bold at the top left. A legend on the
    right shows Event Type (4 categories with shapes/colors) and Outcome (Successful/Unsuccessful
    with alpha difference). Axes and grid are hidden. The aspect ratio is correctly
    fixed at 105:68.'
