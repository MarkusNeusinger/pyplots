review:
  strengths:
  - Tint-blending hierarchy system (r + (1-r) * f) creates professional visual depth
    while preserving Okabe-Ito hue identity across all three rings
  - Edge color set to PAGE_BG provides clean, theme-adaptive segment separation without
    hardcoding white
  - 'Correct Okabe-Ito ordering (positions 1-3): Engineering=green, Sales=vermillion,
    Marketing=blue'
  - Square canvas (3600x3600 px) is appropriate for radial charts
  - Angle-threshold label filtering prevents collision without any manual tuning
  - All data is realistic, neutral, and domain-appropriate
  weaknesses:
  - 'Level-2 and level-3 text labels use hardcoded dark colors (#1A1A17, #4A4A44)
    instead of INK_SOFT/INK_MUTED theme tokens — works visually because labels sit
    on tinted rings, but violates theme-adaptive chrome rule and could break if ring
    colors change'
  - Design excellence is competent but not exceptional — the chart tells the story
    clearly but lacks a strong focal point or emphasis technique beyond the built-in
    hierarchy
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct
      Chrome: Title "Company Budget · sunburst-basic · matplotlib · anyplot.ai" in dark INK (#1A1A17), clearly readable. No axis labels (radial chart). No tick labels.
      Data: Three concentric rings. Innermost ring: Engineering (#009E73 green), Sales (#D55E00 orange/vermillion), Marketing (#0072B2 blue) — Okabe-Ito positions 1-3 in order. Level-2 and Level-3 rings use progressively lighter tints of parent hue. White page-bg edges separate segments cleanly.
      Labels: Level-1 labels bold white inside wedges (readable on saturated colors). Level-2/3 labels in hardcoded dark (#1A1A17, #4A4A44) on lighter-tinted rings — visible.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct
      Chrome: Title in light INK (#F0EFE8) — clearly readable. Level-1 labels in hardcoded "white" on saturated rings — readable. Level-2/3 labels in hardcoded #1A1A17/#4A4A44 on lighter-tinted rings — technically not theme-adaptive tokens but no dark-on-dark failure since labels sit on colored rings not on the dark page background.
      Data: Okabe-Ito colors identical to light render (Engineering green, Sales orange, Marketing blue) — only background flips.
      Legibility verdict: PASS (with caveat: ring label colors not using theme tokens)
