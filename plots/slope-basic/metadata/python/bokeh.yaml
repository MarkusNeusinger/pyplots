  weaknesses:
  - 'CQ-01 violation: spread_labels helper function defined — breaks KISS structure;
    label spreading logic could be inlined or replaced with a simpler clamping pass'
  - 'DQ-02 penalty: product labels are generic (Product A–J) rather than named real-world
    products, reducing realism'
  - 'VQ-05 minor: some top-canvas whitespace wasted by direction legend placement
    between title and data area'
  - 'DE-01 ceiling: design is functional and correct but lacks the refined typography
    and polish for a 6+ score'
