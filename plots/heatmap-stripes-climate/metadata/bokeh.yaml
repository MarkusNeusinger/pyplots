  image_description: The plot displays classic "warming stripes" — a wide landscape
    visualization (4800x2700 px) of vertical colored bars spanning 175 years (1850-2024).
    The left side shows medium-to-deep blues representing negative temperature anomalies
    in earlier decades, gradually transitioning through lighter blues and near-whites
    in the middle section (around 1920-1970), and then shifting to pinks, oranges,
    and deep reds on the right side representing recent decades of strong positive
    anomalies. The rightmost stripes (2020s) are the deepest, darkest reds. The color
    gradient is smooth with no visible banding thanks to the 256-color interpolated
    palette. The title "heatmap-stripes-climate · bokeh · pyplots.ai" appears centered
    at the top in dark gray text. No axes, gridlines, tick marks, or labels are visible
    — fully minimalist design. White background with stripes filling edge-to-edge.
