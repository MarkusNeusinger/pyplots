    loop: the expiratory limb rises sharply from the origin to a Peak Expiratory Flow
    (PEF) of ~9.5 L/s (marked with a red dot and labeled "PEF = 9.5 L/s" in red text),
    then declines roughly linearly to FVC at ~4.2 L. The inspiratory limb curves symmetrically
    below the zero-flow line, reaching approximately -6.5 L/s, forming a closed loop.
    A dashed gray line shows the predicted normal loop, slightly larger than the measured
    loop. An FEV1 marker (blue dot) is placed at volume 3.3 L on the expiratory limb
    with the label "FEV1 = 3.3 L". A clinical values text box near the bottom center
    reads "FVC = 4.2 L | FEV1 = 3.3 L | FEV1/FVC = 79% | PEF = 9.5 L/s". A dotted
    horizontal reference line marks zero flow. The legend in the top right distinguishes
    "Measured" (solid) from "Predicted Normal" (dashed). The title "spirometry-flow-volume
    · bokeh · pyplots.ai" appears at the top left. Axes are labeled "Volume (L)" and
    "Flow (L/s)" with subtle dashed grid lines.'
