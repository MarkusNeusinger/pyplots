  image_description: The plot displays a 10×10 actuarial loss development triangle
    heatmap. Rows represent accident years (2015–2024) and columns represent development
    periods (1–10). The upper-left triangle is colored in a blue sequential colormap
    (actual/observed values) while the lower-right triangle uses an orange sequential
    colormap (projected/estimated values). Each cell is annotated with the cumulative
    claim amount formatted with thousands separators (e.g., "4,200", "30,163"). Projected
    values appear in italic text. Text color adapts based on cell brightness—white
    on dark cells, dark gray on light cells. Two vertical colorbars on the right side
    show scales for "Actual ($)" and "Projected ($)". Development factors (2.50 down
    to 1.01) are displayed below the x-axis tick labels. A legend at the bottom-left
    distinguishes "Actual (Observed)" (blue) from "Projected (Estimated)" (orange).
    The title reads "heatmap-loss-triangle · matplotlib · pyplots.ai". All four spines
    are removed, and white grid lines separate cells cleanly.
