review:
  strengths:
  - Excellent physics data with real hydrogen atom energy levels and accurate wavelengths
  - Smart power transform (exponent 0.4) to visually spread converging upper levels
  - Strong visual hierarchy with Balmer series emphasized through thicker arrows (visible
    spectrum)
  - Wavelength annotations on alpha-lines add scientific storytelling
  - Clean professional design with intentional color palette and refined theme
  - Interactive tooltips via layer_tooltips() leverage letsplot distinctive capabilities
  - Full spec compliance including ionization limit and nonlinear scale
  weaknesses:
  - Geom text size (14) for level labels and energy values slightly small - increasing
    to 16 would improve legibility
  - Arrowheads crowded near n=1 and n=2 where multiple transitions converge
  - Purple/blue distinction not ideal for all colorblind conditions
  - Some wasted canvas space between plot area and legend
  image_description: 'The plot displays a hydrogen atom energy level diagram on a
    clean white background. Six horizontal dark slate (#2C3E50) lines represent energy
    levels n=1 through n=6, positioned at transformed y-coordinates using a power
    transform (exponent 0.4) to spread the converging upper levels. Each level is
    labeled on the left in bold ("n=1" through "n=6") and on the right with its energy
    value in gray ("-13.60 eV" to "-0.38 eV"). A dashed gray line at 0 eV marks the
    ionization limit. Downward arrows represent emission transitions in three distinct
    colors: purple (#7B2FBE) for the Lyman series (UV, 3 transitions to n=1), blue
    (#1976D2) for the Balmer series (Visible, 4 transitions to n=2 with thicker lines
    for emphasis), and red (#C0392B) for the Paschen series (IR, 3 transitions to
    n=3). Each arrow ends with a V-shaped arrowhead. Wavelength annotations in italic
    gray mark the alpha-lines: 121.6 nm (Lyman), 656.3 nm (Balmer), and 1875.1 nm
    (Paschen). A custom legend on the right identifies the three series with their
    spectral regions. The y-axis is labeled "Energy (eV)" and the title reads "Hydrogen
    Atom Energy Levels · energy-level-atomic · letsplot · pyplots.ai".'
