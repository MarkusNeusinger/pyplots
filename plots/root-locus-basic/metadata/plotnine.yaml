  image_description: 'The plot shows a root locus diagram for the transfer function
    G(s) = 1/[s(s+1)(s+3)] with three branches colored blue (Branch 1), orange (Branch
    2), and green (Branch 3). Open-loop poles are marked with X markers at s=0, s=-1,
    and s=-3 on the real axis. A breakaway point is marked with a square marker near
    s≈-0.45 with annotation "Breakaway K=0.63". Red diamond markers highlight imaginary
    axis crossings at approximately ±1.7j with "K=12.0" labels. The left half-plane
    is shaded light green with italic "Stable" label, and the right half-plane is
    shaded light pink with italic "Unstable" label. Dashed gray damping ratio lines
    (ζ=0.2, 0.4, 0.6, 0.8) radiate from the origin, and dotted gray natural frequency
    circles (ωn=1, 2, 3, 4) are centered at the origin. Real axis segments of the
    root locus are shown as thick brown lines. Direction arrows indicate increasing
    gain. The axes use proper control engineering notation: "Real Axis (σ)" and "Imaginary
    Axis (jω)" with custom tick labels. The plot uses equal axis scaling and square
    format with a legend on the right.'
