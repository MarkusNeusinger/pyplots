  strengths:
  - Comprehensive stereonet implementation with correct equal-area projection mathematics
  - Excellent colorblind-safe blue/gold/purple palette with distinct marker shapes
    per feature type
  - Clean visual refinement with all panel chrome removed, subtle grid lines, and
    well-proportioned primitive circle
  - Mean strike/dip annotations add geological context and data storytelling to each
    cluster
  - 'Full spec compliance: great circles, poles, density contours, tick marks, and
    cardinal labels all present'
  weaknesses:
  - Annotation text size=11 is somewhat small relative to other text elements
  - Layout has slight asymmetry with legend on right and unused space on left
  - Density contours use generic Gaussian KDE rather than Kamb-method contouring
  image_description: 'The plot displays a Schmidt equal-area (lower-hemisphere) stereonet
    projection on a clean white background. A bold black primitive circle marks the
    projection boundary, with tick marks every 10 degrees around the perimeter. Cardinal
    directions (N, S, E, W) are labeled in bold dark text, and intermediate degree
    labels (30, 60, 120, etc.) appear in gray around the exterior. Inside the circle,
    subtle light gray grid lines form concentric dip-interval circles and radial azimuth
    lines. Three feature types are plotted: Bedding (blue circles, clustered in the
    center-south area), Fault (gold/amber diamonds, in the southwest), and Joint (purple
    squares, in the north-northeast). Great circles are drawn as colored arcs for
    representative planes of each type. Dashed gray density contours from geom_density_2d
    overlay the pole data. Mean strike/dip annotations (42/30, 148/67, 279/75) appear
    in italic near each cluster in matching colors. The legend on the right shows
    Feature Type with all three categories. Title reads stereonet-equal-area plotnine
    pyplots.ai at the top.'
