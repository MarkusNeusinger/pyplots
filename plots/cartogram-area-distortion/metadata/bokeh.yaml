  - Florida is clipped near the bottom edge and color bar title is cramped
  - Axis labels lack degree units and smallest states are nearly invisible
  - Design stays within well-configured defaults rather than publication quality
  image_description: The plot displays US states as circles positioned at their approximate
    geographic centroids on a longitude (x-axis, -125 to -65) vs latitude (y-axis,
    28 to 48) grid. Circle sizes are proportional to population via sqrt scaling,
    ranging from tiny dots (WY, VT ~0.6M) to large circles (CA ~39M, TX ~30.5M, FL
    ~22.6M). Colors follow the Viridis colormap (dark purple for low population to
    yellow for high), reinforcing the size variable. A vertical color bar on the right
    reads "Population (millions)" with values ~0-39. State abbreviation labels (CA,
    TX, FL, NY, PA, OH, IL, MI, NC, GA, NJ, VA) appear on the larger circles. The
    background is light gray (#fafafa) with subtle grid lines. The title reads "US
    States by Population · cartogram-area-distortion · bokeh · pyplots.ai". The northeast
    region is moderately crowded with overlapping circles and labels. Florida sits
    very close to the bottom edge of the plot area. The color bar title is rotated
    vertically and appears cramped at the right margin.
