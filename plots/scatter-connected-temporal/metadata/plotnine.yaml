review:
  strengths:
  - 'Excellent realistic data choice: Phillips curve dynamics is a classic, engaging
    economics narrative'
  - Clean code structure following KISS principles perfectly
  - Thoughtful blue gradient palette that works well for temporal encoding
  - Good use of white stroke on points for visibility against the line
  weaknesses:
  - Uses geom_line (connects by x-order) instead of geom_path (connects by data order)
    — critical for temporal path correctness
  - Title font size is 20pt, should be 24pt per library guidelines
  - No colorbar to decode the year-to-color mapping
  - Some year labels crowd nearby data points (especially 1995 and 2009)
  - No emphasis on key events (e.g., 2008 recession) that would strengthen storytelling
  image_description: The plot displays a connected scatter plot showing US Phillips
    Curve dynamics from 1990 to 2020. The x-axis shows "Unemployment Rate (%)" ranging
    from ~3.5 to ~9.6, and the y-axis shows "Inflation Rate (%)" ranging from about
    -0.4 to ~5.5. Points are connected by line segments and use a blue color gradient
    from light blue (#a8c4e0 for earlier years) to dark navy (#1a3a5c for later years).
    Each point has a white stroke border. Key years (1990, 1995, 2000, 2005, 2009,
    2015, 2020) are annotated with bold text labels nudged slightly above their data
    points. The title reads "Phillips Curve Dynamics (1990-2020) · scatter-connected-temporal
    · plotnine · pyplots.ai". The background uses theme_minimal with subtle light
    gray grid lines. The plot fills the canvas well at a 16:9 aspect ratio.
