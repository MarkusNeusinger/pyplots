  strengths:
  - Correct flame graph structure with proper parent-child positioning and proportional
    widths
  - Warm color palette following flame graph conventions with smooth gradient via
    LinearSegmentedColormap
  - Realistic CPU profiling data with believable function names and sample counts
  - Clean bar separation using white edges and appropriate label sizing threshold
  - Full spec compliance including correct title format and all required features
  weaknesses:
  - No visual emphasis on the hot code path - all bars at same depth look similar
    due to random color variation
  - Library mastery is basic - manual rectangle computation with simple barh() calls
    rather than idiomatic matplotlib patches
  - Color randomness creates visual noise rather than meaningful data-driven mapping
  - No percentage annotations on key bars to help quantify bottlenecks
  image_description: The plot displays a flame graph with horizontal bars stacked
    bottom-to-top across 5 depth levels (0-4). At the base (depth 0), a wide light-yellow
    "main" bar spans the full width (~950 samples). Depth 1 shows "process_request"
    (dominant, ~800 samples) and a smaller "initialize" bar on the right, both in
    orange-yellow. Depth 2 contains "parse_input", "compute" (largest), "send_response",
    and "load_config" in orange tones. Depth 3 shows "tokenize", "validate", "matrix_multiply"
    (widest), "transform", and "serialize". Depth 4 has "dot_product", "allocate_buffer",
    "normalize", and "scale" (unlabeled). Colors transition from yellow at depth 0
    through oranges to deeper reds at higher depths with random variation. Function
    names appear inside bars when wide enough (>5% of total). Title reads "flamegraph-basic
    · matplotlib · pyplots.ai". X-axis labeled "CPU Samples" (0-~950), Y-axis labeled
    "Stack Depth" (0-4). Top and right spines removed, white edges between bars provide
    clean separation.
