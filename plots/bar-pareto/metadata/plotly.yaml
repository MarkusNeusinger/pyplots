    Scratches (142), Dents (118), Misalignment (87), Cracks (64), Discoloration (53),
    Burrs (38), Warping (29), Contamination (21), Chipping (15), and Porosity (9).
    Bars are color-coded: the first five categories ("Vital Few") are in dark steel
    blue (#306998), while the remaining five ("Trivial Many") are in lighter blue
    (#A8C4D9). A subtle blue-tinted background rectangle highlights the vital few
    region. A red cumulative percentage line (#C0392B) with spline interpolation and
    white-bordered circle markers overlays the bars, plotted against a secondary y-axis
    (0-100%) on the right. The 80% threshold is shown as a dotted horizontal line
    with a "80% threshold" annotation on the right. The cumulative crossing point
    is annotated with "81%" in red text. Value labels (142, 118, 87) appear above
    the top three bars. The legend in the lower-right shows "Vital Few", "Trivial
    Many", and "Cumulative %". Title reads "bar-pareto · plotly · pyplots.ai" centered
    at the top. Background is white with very subtle horizontal gridlines on the primary
    y-axis.'
