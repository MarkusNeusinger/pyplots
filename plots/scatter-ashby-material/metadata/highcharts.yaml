    vertical legend box sits in the top-right corner with a white background. The
    background is light gray with subtle dotted grid lines. Markers are circles with
    semi-transparent fill and darker borders. The families are spatially separated
    across the log-log space as expected for an Ashby chart, though they appear as
    individual scattered points rather than enclosed bubble regions or convex-hull
    envelopes.'
