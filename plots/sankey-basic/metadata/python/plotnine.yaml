    ANYPLOT_THEME, but two themed images exist; images appear generated from a different
    version of the code'
  - 'CRITICAL: Wrong branding — labs(title) says ''pyplots.ai'' not ''anyplot.ai'''
  - 'CRITICAL: Output file is ''plot.png'' not ''plot-{THEME}.png''; must read ANYPLOT_THEME
    env var and produce plot-light.png and plot-dark.png'
  - 'Palette non-compliance — code uses #306998 (Python Blue, explicitly flagged as
    non-compliant) for Coal, #FFD43B for Gas, #4ECDC4 for Nuclear, #2ECC71 for Renewables
    — none are Okabe-Ito; Coal must be #009E73'
  - Hardcoded text colors color='#333333' for node labels and 'annotate' colors do
    not use theme-adaptive tokens (INK, INK_SOFT) — would render near-black text on
    near-black background in dark mode
  - 'noqa: E402 disable comments present — prohibited by project rules; restructure
    imports to avoid needing them'
