  strengths:
  - Excellent use of Plotly fillgradient for terrain silhouette effect — a distinctive
    feature
  - Slope-colored line segments provide effective data storytelling about terrain
    difficulty
  - Real-world Swiss hiking data with accurate place names and elevations
  - Clean, well-positioned annotations with custom offsets to avoid overlaps at edges
  - Vertical exaggeration note adds professional cartographic context
  - HTML export preserves full Plotly interactivity
  weaknesses: []
  image_description: 'The plot displays a terrain elevation profile of the Bernese
    Oberland Traverse along a 120 km hiking route. The x-axis shows "Distance (km)"
    from 0 to 120, and the y-axis shows "Elevation (m)" from 0 to ~3200. The area
    beneath the profile line is filled with a vertical gradient transitioning from
    very light translucent blue at the bottom to a deeper blue near the profile line,
    creating an attractive terrain silhouette. The profile line itself is color-coded
    by slope steepness: blue segments for gentle slopes, orange for moderate, and
    purple for steep sections. Seven landmarks are annotated with bold names and elevation
    values (Grindelwald 1,034 m, Bachalpsee 2,265 m, Faulhorn 2,681 m, Schynige Platte
    2,076 m, Männlichen 1,100 m, Kleine Scheidegg 2,061 m, Wengen 1,274 m), each with
    dotted vertical reference lines and dark blue circle markers with white borders.
    A slope legend at bottom-left uses colored block characters. A vertical exaggeration
    note (~20x) appears at bottom-right. The title reads "Bernese Oberland Traverse
    · area-elevation-profile · plotly · pyplots.ai". The background is clean white
    with very subtle y-axis gridlines.'
