  image_description: 'The plot displays a star chart on a dark navy (#0a0e1a) background.
    Stars are plotted by Right Ascension (x-axis, 0h–22h) and Declination (y-axis,
    -30° to 65°). Thirteen constellations are shown with light blue stick-figure lines
    connecting their stars: Cassiopeia, Perseus, Taurus, Orion, Canis Major, Gemini,
    Leo, Ursa Major, Bootes, Scorpius, Lyra, Cygnus, and Aquila. Star sizes scale
    inversely with magnitude—brightest stars like Sirius and Vega appear largest with
    a subtle pale-yellow glow halo. Fainter background stars are scattered as small
    gray dots. Constellation names are rendered in italic blue text, positioned near
    each constellation''s centroid with manual offsets to reduce overlap. A custom
