  - Node sizing by degree effectively highlights hub nodes
  - Legend ordered spatially (left-to-right) via pd.Categorical(ordered=True) — intuitive
    and plotnine-idiomatic
  - 'Full theme-adaptive chrome: all INK/INK_SOFT/ELEVATED_BG tokens correctly wired
