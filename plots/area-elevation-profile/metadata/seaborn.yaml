  image_description: 'The plot displays a terrain elevation profile along a 120 km
    hiking transect. The x-axis shows "Distance (km)" from 0 to 120, and the y-axis
    shows "Elevation (m)" ranging from approximately 900 to 1900. The area below the
    dark blue profile line is filled with a gradient transitioning from light green
    at lower elevations to darker green/teal at higher elevations, creating a natural
    terrain silhouette effect. Seven landmarks are marked with colored dots (using
    a YlOrRd palette mapped to slope steepness) and annotated with white-background
    rounded labels showing name and elevation: Trailhead (1328 m), North Peak (1491
    m), Lake Valley (1052 m), Ridge Pass (1300 m), River Crossing (936 m), Summit
    (1702 m), and End Station (1438 m). Dotted vertical lines connect each marker
    to the baseline. A thin marginal KDE panel on the right shows the elevation distribution
    with a light blue fill and rug marks at landmark elevations. The title reads "area-elevation-profile
    · seaborn · pyplots.ai". An italic note "Vertical exaggeration ~10x" appears in
    the bottom-right. Top and right spines are removed; subtle dashed horizontal grid
    lines appear at low alpha.'
