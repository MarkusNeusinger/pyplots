  image_description: The plot features a two-panel layout (16:9 landscape). The left
    main panel shows a full phase-folded light curve with "Orbital Phase" (0.0–1.0)
    on the x-axis and "Relative Flux" on the y-axis. ~500 blue data points with vertical
    error bars scatter around flux=1.000, with a clear U-shaped dip centered at phase
    0.5 reaching down to ~0.985. A bold red transit model curve overlays the data,
    flat at 1.0 outside transit and dipping smoothly through the transit. In-transit
    points are rendered darker and larger than out-of-transit points. Vertical dotted
    lines mark contact points t1 and t4. A light blue/gray shaded band highlights
    the transit region. A dashed gray baseline at flux=1.0 provides reference. The
    legend shows "Transit model" (red line) and "Photometry" (blue dot). The right
    panel is a zoomed "Transit Detail" view of the transit region (~0.42–0.58 phase),
    with a red double-headed arrow annotating "ΔF = 1.0%". The fill between baseline
    and model is shown in light pink. Top/right spines removed, subtle y-axis grid.
    Title reads "lightcurve-transit · matplotlib · pyplots.ai".
