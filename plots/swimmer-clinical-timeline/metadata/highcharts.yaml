  image_description: 'The plot displays a swimmer plot with 25 patients (PT-001 through
    PT-025) arranged as horizontal bars sorted by treatment duration (shortest at
    top, longest at bottom). Bars are colored in two distinct hues: steel blue (#306998)
    for Arm A (Combo) and salmon/coral (#E8855E) for Arm B (Mono). The x-axis shows
    "Time on Study (Weeks)" ranging from 0 to approximately 53. Patient IDs appear
    along the y-axis. Event markers overlay the bars: blue upward triangles for Partial
    Response, yellow diamonds for Complete Response, pink downward triangles for Progressive
    Disease, purple squares for Adverse Event, and dark outlined triangles at bar
    endpoints for Ongoing patients. A vertical legend in the top-right corner lists
    all series. The background is white with very subtle horizontal gridlines.'
