review:
  strengths:
  - Theme-adaptive rendering with identical Okabe-Ito data colors across light and
    dark; only chrome flips, exactly as required
  - Idiomatic Bokeh ColumnDataSource pattern — separate sources for line, endpoints,
    and extremes with per-row color column for the extreme glyph
  - Clean KISS structure — imports → data → plot → save, no functions or classes
  - Realistic web-traffic data with launch bump, mid-month decline, and weekend dips
    so the sparkline shape is informative rather than monotonic
  - Title format matches `{spec-id} · {library} · anyplot.ai` exactly with explicit
    32pt sizing for legibility on the 4800×1200 canvas
  - Visual hierarchy via colored extremes (vermillion min, green max) creates immediate
    focal points without violating the basic-variant no-annotation rule
  weaknesses:
  - 'Storytelling ceiling: spec is `basic`, so annotations and trendlines are forbidden;
    DE-03 plateau is structural, not a code defect'
  - ColumnDataSource is idiomatic Bokeh but the same effect (layered glyphs with shared
    data) is reachable in plotly/altair, so distinctive-library-features ceiling is
    moderate
  image_description: 'A minimalist sparkline rendered at ~4:1 aspect ratio with no
    axes, ticks, or gridlines. The series traces 60 sequential data points (daily
    web-traffic sessions) in Okabe-Ito green (#009E73) with a thin clean line, climbing
    through an early launch bump near day 12, dipping into a mid-month trough around
    day 36 (highlighted with a vermillion #D55E00 dot marking the minimum), then recovering
    to a peak at the rightmost point (highlighted with a green dot marking the maximum).
    A small soft-gray endpoint dot marks day 0 at the left. The title ''sparkline-basic
    · bokeh · anyplot.ai'' sits centered above the canvas in 32pt. The light render
    uses a cream #FAF8F1 background with dark text; the dark render uses #1A1A17 with
    light text — data colors and positions are identical between both, only chrome
    flips.'
