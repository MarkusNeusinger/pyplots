review:
  strengths:
  - Excellent spec compliance — all required features present including 12 pitch classes,
    sequential colormap, colorbar, and realistic harmonic data
  - Good data design with alternating C major / G major chords and smooth convolution-based
    transitions
  - All text sizes explicitly set for high-resolution output
  - Magma colormap is an excellent colorblind-safe choice for energy visualization
  weaknesses:
  - X-axis tick labels show non-round values (0.9, 1.9) instead of clean integers
    — fix tick calculation to use round time values
  - All four spines remain visible; removing top and right spines would improve visual
    refinement
  - Design is functional but not exceptional — could benefit from subtle background
    styling or spine removal to elevate polish
  - Limited data complexity — only two chord types alternate; adding a third chord
    or passing tones would better showcase the chromagram format
  image_description: The heatmap displays a chromagram using the magma colormap. The
    Y-axis shows all 12 pitch classes (C, C#, D, D#, E, F, F#, G, G#, A, A#, B) and
    the X-axis shows time from 0.0 to 8.0 seconds with tick labels at 0.0, 0.9, 1.9,
    3.0, 4.0, 5.0, 6.0, 7.0, 8.0. A colorbar on the right indicates Energy from 0.0
    to 1.0. The title reads "heatmap-chromagram · seaborn · pyplots.ai". Alternating
    C major (C, E, G bright during 0-2s and 4-6s) and G major (G, B, D bright during
    2-4s and 6-8s) chord patterns are clearly visible with smooth transitions between
    chords. Dark purple/black represents low energy; bright yellow/cream represents
    high energy.
