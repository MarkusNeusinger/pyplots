review:
  strengths:
  - Perfect spec compliance with all mel-spectrogram requirements including dB scale,
    mel-scaled Hz labels, colorbar, and correct STFT parameters
  - Excellent data quality with C-major arpeggio showing fundamentals, harmonics,
    and exponential decay envelopes
  - Note annotations with circle markers and text shadows create effective data storytelling
  - Custom inferno colormap with 19-color interpolation and strong colorblind accessibility
  - Manual mel filterbank computation avoids external librosa dependency
  - Improved margins and function extraction from previous attempts
  weaknesses:
  - sys.path manipulation hack for import collision remains a necessary but inelegant
    workaround
  - Custom class and function structure breaks KISS principle (unavoidable for pygal
    spectrogram)
  - Manual SVG rendering is inherently verbose for this chart type
  image_description: The plot displays a mel-spectrogram of a synthesized C-major
    arpeggio (C4→E4→G4→C5→G4→E4) over 3 seconds using the inferno colormap. The color
    scale ranges from dark black/purple (low power, -80 dB) through orange to bright
    yellow (high power, 0 dB). The title "spectrogram-mel · pygal · pyplots.ai" is
    centered at the top in clean sans-serif font. The x-axis is labeled "Time (s)"
    from 0.0 to 3.0 with evenly spaced tick marks. The y-axis is labeled "Frequency
    (Hz)" with mel-scaled tick marks at 100, 200, 500, 1.0k, 2.0k, 4.0k, and 8.0k
    Hz. Six distinct note segments are visible as bright horizontal bands at their
    fundamental frequencies with 2nd and 3rd harmonics visible above, each showing
    exponential decay envelopes. White text labels with circle markers and text shadows
    annotate each note onset (C4, E4, G4, C5, G4, E4) near their fundamental frequencies.
    A vertical colorbar on the right labeled "dB" shows the scale from 0 to -80. The
    noise floor is visible as a consistent purple/dark layer. The layout is clean
    with a dark border around the spectrogram, white background, and good canvas utilization.
