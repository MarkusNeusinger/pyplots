  image_description: The plot displays a Beer-Lambert calibration curve with Absorbance
    (y-axis, 0-0.68) versus Concentration in mg/L (x-axis, 0-15.5). Eight blue circular
    calibration standard points are plotted at concentrations 0, 2, 4, 6, 8, 10, 12,
    and 14 mg/L, showing a strong linear relationship. A blue regression line (strokeWidth=3)
    fits through the data, surrounded by a subtle light blue prediction interval band
    that widens appropriately at the extremes. An orange diamond marker represents
    the unknown sample at approximately 8.3 mg/L with absorbance 0.38. Orange dashed
    lines extend horizontally from the unknown point to the y-axis and vertically
    down to the x-axis, clearly demonstrating concentration determination. The label
    "Unknown (8.3 mg/L)" appears in bold orange near the unknown point. The regression
    equation "y = 0.0453x + 0.0024  R² = 0.9993" is displayed in bold blue in the
    lower-right area. The title reads "calibration-beer-lambert · altair · pyplots.ai"
    at the top. Grid is removed, view stroke is removed, axis domains are subtle gray.
    X-axis tick labels are clean at even intervals (0, 2, 4, ..., 14) with no crowding.
    Y-axis ticks run at 0.02 increments. The overall design is clean and professional
    with clear blue/orange color contrast.
