  strengths:
  - Excellent court rendering with all NBA standard elements using pygal XY stroke
    capabilities
  - Warm beige court background evokes hardwood flooring — strong aesthetic choice
  - Size-based visual hierarchy (inside vs perimeter markers) adds data storytelling
  - FG% statistics embedded in legend labels provide analytical context
  - Colorblind-safe blue/red-orange palette with good contrast
  - Per-point node sizing via pygal dict-based data format is idiomatic
  weaknesses:
  - Uses blue for made shots instead of spec-requested green (minor spec deviation)
  - Some perimeter shot markers slightly small at full resolution
  - Empty space above three-point arc could be better utilized
  image_description: 'The plot displays a basketball half-court shot chart on a warm
    beige (#f5f0e8) background. Court markings — three-point arc, paint/key rectangle,
    free-throw circle (top half solid, bottom half dashed), restricted area arc, baseline,
    backboard, and rim — are rendered in subtle tan (#b8a990) lines with the backboard
    darker and the rim in orange. Shot attempts are plotted as colored dots: darker
    blue (made inside), lighter blue (made perimeter), darker red-orange (missed inside),
    and lighter salmon (missed perimeter). Inside shots use larger markers than perimeter
    shots, creating clear visual hierarchy. The title "scatter-shot-chart · pygal
    · pyplots.ai" appears at top center. A bottom legend in two columns shows four
    series with FG percentages: Made Inside — 56% FG (48/85), Made Perimeter — 34%
    FG (39/115), Missed Inside (37), Missed Perimeter (76). The court maintains a
    1:1 aspect ratio with no axis labels or ticks. Shots cluster realistically: dense
    in the paint, spread along the three-point arc, and grouped at the free-throw
    line.'
