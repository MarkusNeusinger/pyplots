  image_description: The plot displays an audio waveform as a filled area symmetric
    around a zero baseline. The waveform uses Python Blue (#306998) with semi-transparent
    fill (alpha ~0.45) and slightly darker edge lines tracing the min/max envelope.
    The x-axis shows "Time (seconds)" from 0.0 to 1.5, and the y-axis shows "Amplitude"
    from -1.00 to 1.00. A subtle gray horizontal zero-line runs across the center.
    The waveform shows an attack phase (0-0.05s), a sustained section with full amplitude
    (~0.05-0.55s), a dip/gap (~0.55-0.7s), a second burst (~0.7-0.85s) that ramps
    back up, and a gradual release trailing off to zero by 1.5s. Top and right spines
    are removed, with a subtle y-axis grid. Title reads "waveform-audio · matplotlib
    · pyplots.ai" in medium weight. The min/max envelope rendering handles the dense
    22050 Hz sample rate data cleanly without aliasing.
