  image_description: The plot displays a vertically stacked pair of SPC charts for
    CNC shaft diameter monitoring. The top chart is the X-bar (sample means) chart
    centered around 25.00 mm, and the bottom is the R (sample range) chart. Both charts
    use a teal (#306998) line with filled circular markers for in-control points and
    red (#C03030) diamond markers for out-of-control points. A solid black center
    line (CL) runs through each chart, with red dashed UCL/LCL lines and amber dashed
    ±2σ warning limits. Light blue-gray zone shading bands highlight the ±1σ and ±2σ
    regions. Inline colored text labels (UCL, +2σ, CL, −2σ, LCL) appear on the left
    side of each chart. The X-bar chart shows three OOC points at samples 8 (above
    UCL), 17 (below LCL), and 24 (above UCL). The R chart shows all points within
    control limits. The title reads "CNC Shaft Diameter Monitoring · spc-xbar-r ·
    altair · pyplots.ai". Axes are labeled "X̄ (mm)", "Range R (mm)", and "Sample
    Number" with units.
