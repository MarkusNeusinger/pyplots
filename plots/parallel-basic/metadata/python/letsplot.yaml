  strengths:
  - 'Full theme adaptability: correct #FAF8F1/#1A1A17 backgrounds, all chrome elements
    (text, axis segments, legend) use adaptive tokens — no dark-on-dark or light-on-light
    failures'
  - Creative and correct parallel coordinates assembly using letsplot's ggplot grammar;
    geom_segment + geom_line + geom_text layering is the right approach
  - 'Okabe-Ito palette in canonical order with first series = #009E73; alpha=0.7 handles
    line density well'
