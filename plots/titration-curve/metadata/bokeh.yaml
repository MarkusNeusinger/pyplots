    equivalence looks uniform
  - Title format includes extra prefix 'HCl + NaOH Titration' before the required
    spec-id format
  image_description: The plot shows a classic S-shaped acid-base titration curve plotted
    with Bokeh. The main pH curve is drawn in blue (#306998) as a solid line against
    a light gray (#FAFAFA) background. The x-axis is labeled "Volume of NaOH added
    (mL)" ranging from 0 to 50, and the left y-axis shows "pH" from 0 to 14. A secondary
    right y-axis in orange displays "dpH/dV (mL⁻¹)" for the derivative curve, which
    is shown as a dot-dash orange line (#D55E00) with a sharp peak at the equivalence
    point (~25 mL). The equivalence point is marked with a green (#009E73) dashed
    vertical line and a green diamond marker at pH 7.0, accompanied by a green text
    annotation reading "Equivalence Point / 25 mL, pH 7.0". A subtle horizontal dotted
    gray line marks pH 7. The legend in the top-left corner shows entries for "dpH/dV"
    and "pH". The title reads "HCl + NaOH Titration · titration-curve · bokeh · pyplots.ai".
    Grid lines are subtle dashed lines. The curve shows the characteristic sharp rise
    around the equivalence point, starting near pH 1 and plateauing above pH 12.
