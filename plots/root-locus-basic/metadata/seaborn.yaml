  image_description: 'The plot displays a root locus diagram for the transfer function
    G(s) = 1/[s(s+1)(s+3)]. Three branches are rendered in distinct colors: Branch
    1 (steel blue) extends leftward along the real axis from the pole at s=0, Branch
    2 (orange) curves upward from the real axis into the upper half of the complex
    plane crossing the imaginary axis, and Branch 3 (green) curves downward into the
    lower half-plane. Three large black X markers indicate open-loop poles at s=0,
    s=-1, and s=-3. Two red diamond markers highlight the imaginary axis crossings
    (stability boundary) at approximately ±j1.73. A prominent red annotation box reads
    "K = 12 | jω = ±1.73" with an arrow pointing to the upper crossing. Faint dashed
    gray lines show constant damping ratio contours with ζ=0.5 and ζ=0.9 labeled in
    subtle italic gray text. Real-axis segments are highlighted with thicker semi-transparent
    blue bands between [-8,-3] and [-1,0]. Direction arrows on each branch indicate
    increasing gain. The legend in the upper-left shows the transfer function in italics
    as its title with three branch labels. Top and right spines are removed. Title
    reads "root-locus-basic · seaborn · pyplots.ai" with axes labeled "Real Axis (σ)"
    and "Imaginary Axis (jω)". Equal aspect ratio is maintained.'
