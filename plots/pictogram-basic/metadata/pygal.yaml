    nearly invisible
  - No visual hierarchy or storytelling emphasis
  - Left axis spine still visible — removing it would create a cleaner look
  - Category labels could be larger for better readability
  image_description: 'The plot displays a dot chart using pygal''s Dot chart type
    to approximate a pictogram. Five fruit categories (Apples, Oranges, Bananas, Grapes,
    Mangoes) are arranged on the y-axis, with dots extending horizontally. The x-axis
    shows cumulative values (5, 10, 15, 20, 25, 30, 35). Full-value dots are rendered
    as large circles at consistent size, while partial remainders appear as noticeably
    smaller dots (e.g., Oranges at position 5, Grapes at position 3, Mangoes at position
    2). Colors used: steel blue (Apples), golden yellow (Oranges), forest green (Bananas),
    purple (Grapes), coral/red-orange (Mangoes). The title reads "Fruit Production
    (each dot = 5k tonnes) · pictogram-basic · pygal · pyplots.ai". A color legend
    with category names appears at the bottom. The background is white with no grid
    lines.'
