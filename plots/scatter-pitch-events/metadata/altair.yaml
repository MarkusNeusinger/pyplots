  image_description: 'The plot displays a soccer pitch event map on a dark green background
    with three zone shadings — a darker defensive third (left), medium middle third,
    and a brighter/lighter attacking third (right) that draws the eye. White pitch
    markings include boundary lines, penalty areas on both sides, goal areas, center
    circle, halfway line, penalty arcs, corner arcs, and center/penalty spots — all
    cleanly rendered. Four event types are plotted with distinct markers and colors:
    blue circles for Passes (distributed across the pitch with directional arrows),
    orange right-pointing triangles for Shots (clustered in the attacking third with
    arrows converging toward the goal), teal upward-pointing triangles for Tackles,
    and purple diamonds for Interceptions. Shots use larger markers (280 vs 160) creating
    visual hierarchy. Opacity encodes outcome — successful events are nearly opaque
    while unsuccessful events are semi-transparent. Two styled legends on the right
    show "Event Type" and "Outcome" with custom backgrounds, borders, and rounded
    corners. The title reads "scatter-pitch-events · altair · pyplots.ai" in bold
    28pt with a 19pt subtitle describing the content. Some whitespace remains below
    the pitch.'
