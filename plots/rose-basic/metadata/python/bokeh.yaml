  - Alpha-based data encoding elegantly communicates rainfall intensity while preserving
    a single cohesive color story
  - 'Excellent data quality: realistic monthly rainfall values with full seasonal
    variation, 15/15'
  - 'Perfect code quality: clean, deterministic, idiomatic structure with no functions
    or classes'
  - Radial gridlines with dashed style at low alpha are aesthetically refined and
    functional
  - Theme-adaptive chrome correctly flips between light and dark renders with no dark-on-dark
    failures
  weaknesses:
  - Scale labels at 15pt are below the 18pt minimum for pixel-based libraries — increase
    to 18pt
  - Non-standard title format 'Monthly Rainfall · rose-basic · bokeh · anyplot.ai'
    instead of the required 'rose-basic · bokeh · anyplot.ai'
  - Summer months produce very small petals leaving bottom canvas underutilized —
    3600x3600 square canvas would better suit this symmetric polar layout
  - 'Limited LM-02: no Bokeh-distinctive interactive features (HoverTool would add
    genuine value)'
