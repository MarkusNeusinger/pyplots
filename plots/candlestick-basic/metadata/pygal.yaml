review:
  strengths:
  - Creative use of pygal XY chart with stroke_style to simulate candlesticks despite
    no native support
  - Excellent colorblind-safe blue/orange palette with strong contrast
  - Realistic stock price data with clear trend narrative showing both bullish and
    bearish candles
  - Proper OHLC data generation with internally consistent relationships
  - Dual output (PNG + interactive HTML) leveraging pygal SVG nature
  weaknesses:
  - Regex SVG post-processing for cairosvg compatibility is complex and fragile
  - X-axis uses numbered trading days instead of actual date labels
  - Design refinement could improve with more polished grid, whitespace, and visual
    hierarchy
  - Limited library mastery given pygal lack of native candlestick support
  image_description: The plot shows a candlestick chart with 30 trading days on the
    x-axis ("Trading Day") and price in dollars on the y-axis ("Price ($)"). The title
    reads "candlestick-basic · pygal · pyplots.ai" at the top center. A legend in
    the top-left displays "Bullish (Up)" in blue and "Bearish (Down)" in orange. Each
    trading day has a candlestick with a thinner wick (high-low range) and a thicker
    body (open-close range). The price starts around $150, rises to approximately
    $170 around days 7-10, then steadily declines to about $130 by day 30. Both bullish
    (blue) and bearish (orange) candles appear throughout the series. Subtle horizontal
    y-axis gridlines are visible against a white background. All text is readable
    and there are no overlapping elements.
