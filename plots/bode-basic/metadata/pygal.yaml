  image_description: The plot displays a dual-panel Bode plot for a third-order system's
    frequency response. The top panel shows magnitude (dB) vs frequency (Hz) on a
    logarithmic x-axis, with a blue line showing the response curve featuring a resonance
    peak of ~8.1 dB near 4.8 Hz, then rolling off steeply. A red dashed horizontal
    line marks the 0 dB reference, and a purple dashed vertical line with dots indicates
    the gain margin (12.2 dB @ 11.1 Hz). The bottom panel shows phase (degrees) vs
    frequency, with a blue line dropping from 0 degrees through -180 degrees down
    to about -270 degrees. A red dashed horizontal line marks the -180 degree reference,
    and a teal dashed vertical line with dots shows the phase margin (26.0 degrees
    @ 6.7 Hz). Text annotations in the upper-right corners call out the resonance
    peak, gain margin, and phase margin values. The background is a light blue-gray,
    grid lines are subtle, and the title "bode-basic · pygal · pyplots.ai" appears
    at the top. Legends at the bottom of each panel identify the series.
