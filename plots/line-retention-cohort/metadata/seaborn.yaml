  image_description: 'The plot displays 5 user retention curves for monthly signup
    cohorts (Jan–May 2025) on a light gray (#FAFAFA) background. Each cohort is represented
    by a distinct color: dark blue (Jan 2025, n=1,245), orange (Feb 2025, n=1,380),
    green (Mar 2025, n=1,510), red (Apr 2025, n=1,420), and purple (May 2025, n=1,605).
    All curves start at 100% at week 0 and decay over 12 weeks. Newer cohorts retain
    better — May ends at ~52% while Jan drops to ~20%. Lines have progressive emphasis:
    older cohorts are thinner and more transparent, newer ones are bolder with larger
    markers. Each line uses a unique marker style (circle, X, square, plus, diamond).
    Endpoint annotations on the right show final retention percentages (20%, 24%,
    31%, 41%, 52%) in matching colors. A dashed gray horizontal reference line at
    20% is labeled "20% target" in italic. The title reads "line-retention-cohort
    · seaborn · pyplots.ai" in bold dark gray. Y-axis: "Retained Users (%)" from 0–108,
    X-axis: "Weeks Since Signup" from 0–12. Top, right, and left spines are removed.
    A framed legend in the upper right shows "Signup Cohort" as title with all cohort
    labels and sizes.'
