  strengths:
  - 'Excellent data engineering: polynomial root computation with intelligent pole-tracking
    across gain sweep'
  - 'Comprehensive feature set: damping ratio guides, natural frequency semicircles,
    stability boundary markers'
  - Clean, deterministic code with well-structured data generation
  - Good use of pygal allow_interruptions for multi-segment rendering
  weaknesses:
  - Real-axis locus segments are nearly invisible (gray on white background)
  - Red-green color pairing for poles vs zeros is not colorblind-safe
  - No arrows indicating direction of increasing gain (spec requirement)
  - Design could benefit from stronger visual hierarchy and more refined styling
  image_description: The plot displays a root locus diagram on a white background.
    A blue curve traces the closed-loop pole migration through the complex plane —
    two branches depart from near the origin along the real axis, then split into
    the upper and lower half-planes, curving rightward and crossing the imaginary
    axis around ±1.6j. Red circular markers indicate open-loop poles at s = 0, -1,
    -2, and -4 on the real axis. A green circular marker shows the open-loop zero
    at s = -3. Orange markers highlight the imaginary-axis (stability boundary) crossings
    at approximately ±1.6j. Dashed gray lines radiate from the origin representing
    constant damping ratio guides (ζ = 0.2, 0.4, 0.6, 0.8), and dashed gray semicircles
    represent constant natural frequency guides (ωn = 1–5). The real-axis locus segments
    are shown in gray but are barely distinguishable. The title reads "root-locus-basic
    · pygal · pyplots.ai" and axis labels are "Real Axis (σ)" and "Imaginary Axis
    (jω)". A legend at the bottom lists all seven series.
