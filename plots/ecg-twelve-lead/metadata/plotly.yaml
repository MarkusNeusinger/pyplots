  image_description: 'The plot displays a 12-lead ECG arranged in the standard clinical
    3x4 grid layout with a full-width Lead II rhythm strip at the bottom. The background
    uses a warm pinkish-cream ECG paper color (#FFF5F0) with two-tone grid lines —
    light salmon lines at minor intervals and slightly bolder lines at major intervals,
    authentically mimicking real ECG recording paper. Each of the 12 leads (I, aVR,
    V1, V4 / II, aVL, V2, V5 / III, aVF, V3, V6) shows dark navy (#1A1A2E) ECG waveforms
    with clearly visible P-QRS-T complexes. Lead labels are rendered in blue (Python
    Blue #306998) above each subplot. The bottom rhythm strip spans all four columns
    showing continuous Lead II. A 1mV calibration pulse appears at the left edge of
    each subplot. The title "ecg-twelve-lead · plotly · pyplots.ai" is centered at
    the top in dark gray, with "HR: 75 bpm | Normal Sinus Rhythm" annotation below
    it. Y-axes show "mV" labels on the first column and rhythm strip; the x-axis shows
    "Time (s)" on the rhythm strip. Approximately 3 heartbeats are visible per lead
    strip at 75 bpm over 2.5 seconds.'
