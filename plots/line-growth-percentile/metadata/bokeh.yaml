  image_description: The plot displays a pediatric growth chart for boys' weight-for-age
    (0–36 months). Six graduated blue-toned percentile bands span from P3 to P97,
    with darker blues (#1a5276) at the extremes (P3–P10, P90–P97) and lighter blues
    (#85c1e9) near the median (P25–P50, P50–P75). The 50th percentile line is visually
    emphasized with a thicker stroke. Percentile labels (P3, P10, P25, P50, P75, P90,
    P97) appear on the right margin in dark blue. A red (#e74c3c) patient trajectory
    line with white-bordered circle markers is overlaid, tracking from ~3.4 kg at
    birth to ~14.8 kg at 36 months, roughly following the 25th–50th percentile range.
    The x-axis reads "Age (months)" (0–36), y-axis reads "Weight (kg)" (0–21). A legend
    in the top-left shows "Patient" and "Percentile bands (P3–P97)." The background
    is light gray (#f8f9fa) with dashed subtle grid lines and refined axis styling
    (no outline, no minor ticks).
