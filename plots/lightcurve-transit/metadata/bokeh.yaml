  weaknesses:
  - Error bars at alpha=0.1 are essentially invisible in the rendered plot, reducing
    their communicative value
  - Confidence band spanning the full phase range is slightly distracting outside
    the transit window
  - Transit depth annotation text (22pt) could be slightly larger for the 4800x2700
    canvas
  image_description: The plot displays an exoplanet transit light curve on a light
    gray (#F5F6F8) background. The x-axis shows "Orbital Phase" (0 to 1) and the y-axis
    shows "Relative Flux" (approximately 0.9850 to 1.0050) with 4-decimal precision
    formatting. Blue (#306998) scatter points represent 600 photometric data measurements
    distributed across the full phase range. A gold/amber (#D4A017) transit model
    curve is overlaid, showing a smooth cosine-bell dip centered at phase 0.5 reaching
    down to ~0.988 (1.2% depth). A subtle blue-tinted box annotation highlights the
    transit window region. A dashed gray baseline at flux=1.0 provides reference.
    A light blue confidence band (±0.0008) surrounds the model curve. Very faint error
    whiskers (alpha=0.1) extend from each data point. A "Transit depth 1.2%" italic
    annotation with a vertical gold line and diamond markers quantifies the dip magnitude.
    The legend in the top-left corner shows "Photometric Data" (scatter) and "Transit
    Model" (line) with a clean white background and subtle border. The title reads
    "lightcurve-transit · bokeh · pyplots.ai" in bold dark text.
