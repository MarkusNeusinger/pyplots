  strengths:
  - Excellent dual-panel Bode plot with clear gain/phase margin annotations using
    distinct colors and shapes
  - Custom colorblind-safe palette with intentional color hierarchy (blue magnitude,
    orange phase, purple GM, teal PM)
  - Interactive features (tooltips, crosshair) leverage Altair strengths as a declarative
    visualization library
  - Fully deterministic, realistic control systems data with well-computed stability
    margins
  - Clean code structure with explicit font sizing throughout
  weaknesses:
  - Some wasted vertical space in the magnitude panel lower region
  - Could use Altair transforms instead of creating many separate DataFrames for a
    more idiomatic approach
  - Domain lines/spines still present; removing them would further refine the visual
    design
  image_description: The plot displays a Bode plot with two vertically stacked panels
    on a light blue-gray background. The top panel shows magnitude (dB) vs frequency
    (rad/s) with a blue curve (#306998) starting at ~20 dB flat, rolling off after
    ~1 rad/s, and dropping to about -65 dB at 1000 rad/s. A dashed gray reference
    line at 0 dB is visible. The gain margin (GM = 16.5 dB) is annotated with a purple
    dashed vertical line between the phase crossover point (~-16 dB) and the 0 dB
    reference, with a purple monospace label. Crossover points are marked with filled
    circle (blue, at gain crossover) and diamond (purple, at phase crossover) markers
    with white stroke edges. The bottom panel shows phase (degrees) vs frequency with
    an orange curve (#E8833A) starting near 0° and dropping to about -270°. A dashed
    gray reference line at -180° is shown. The phase margin (PM = 50.9°) is annotated
    with a teal dashed vertical line and monospace label. Matching circle and diamond
    markers indicate crossover points. The title reads "bode-basic · altair · pyplots.ai"
    with subtitle "G(s) = 10 / (s+1)(s/10+1)(s/50+1) · Open-Loop Frequency Response".
    The shared logarithmic x-axis spans 0.01 to 1,000 rad/s with labels only on the
    bottom panel.
