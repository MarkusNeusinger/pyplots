  strengths:
  - Excellent astronomical data quality with real star names, positions, and magnitudes
    across 25+ constellations
  - Strong dark-sky aesthetic with carefully chosen warm cream star colors and blue
    constellation lines
  - Good use of Plotly Scattergl for WebGL performance with many data points
  - Ecliptic line adds scientific depth beyond basic spec requirements
  - Clean, well-structured code with appropriate complexity
  weaknesses:
  - Label overlap in crowded regions (Cygnus/Lyra, Perseus, Orion area) reduces readability
  - Uses equirectangular projection instead of stereographic/azimuthal as specified
  - Constellation lines could be slightly more prominent for better visibility
  - Star name annotations at 11pt could be slightly larger
  image_description: The plot displays a star chart on a deep dark navy background
    (#0A0E1A). Stars are rendered as circles in warm cream/pale yellow tones, with
    sizes proportional to brightness (brighter stars like Sirius, Vega, and Rigil
    Kentaurus appear as large circles, dimmer stars are smaller). Semi-transparent
    cornflower blue lines connect stars within 25+ constellations (Orion, Ursa Major,
    Cassiopeia, Leo, Scorpius, Cygnus, Lyra, Gemini, Taurus, Canis Major, etc.). Constellation
    names are labeled in light blue text near each group's centroid. The brightest
    stars (mag < 0.5) have individual name labels. ~200 tiny dim background stars
    add depth. A dashed orange ecliptic line curves sinusoidally across the chart.
    The x-axis shows Right Ascension (24h to 0h, reversed per convention) and the
    y-axis shows Declination (-75° to 75°). A subtle grid overlays the chart. Title
    reads "star-chart-constellation · plotly · pyplots.ai" in light blue.
