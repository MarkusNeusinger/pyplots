  strengths:
  - Creative use of pygal XY chart and sinusoidal path to render a Feynman diagram
  - Clean white background with hidden axes appropriate for physics diagrams
  - Scientifically accurate QED process (electron-positron annihilation)
  - Perfect code quality with deterministic linear structure
  - Dual output (PNG + HTML) leverages pygal strengths
  weaknesses:
  - Missing arrows on fermion lines to indicate particle vs antiparticle direction
    (spec requirement)
  - No particle labels on propagator lines themselves
  - Significant wasted vertical space and poor canvas utilization
  - Legend text very small and isolated far from diagram
  - Photon wavy line too thin for optimal visibility
  image_description: 'The plot displays a Feynman diagram for electron-positron annihilation
    (e⁻e⁺ → γ → μ⁻μ⁺) on a clean white background. Four blue straight lines represent
    fermion propagators: two incoming from the upper-left and lower-left converging
    at a dark vertex dot on the left, and two outgoing from a second dark vertex dot
    on the right diverging toward the upper-right and lower-right. A red sinusoidal
    (wavy) line connects the two vertices, representing the virtual photon propagator.
    The title reads "e⁻e⁺ → γ → μ⁻μ⁺ Annihilation · feynman-basic · pygal · pyplots.ai"
    at the top. A three-item legend at the very bottom labels "Fermions (e⁻, e⁺, μ⁻,
    μ⁺)", "Photon (γ)", and "Vertices." No axis labels or ticks are shown. The legend
    text is very small relative to the canvas. There are no arrows on fermion lines
    and no particle labels directly on the propagators.'
