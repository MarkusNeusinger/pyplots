  image_description: 'The plot displays a clustered heatmap (clustermap) of 30 iris
    samples using seaborn. A row dendrogram on the left shows hierarchical clustering
    using Ward linkage, with gray branch lines of medium thickness. A column dendrogram
    at the top shows feature clustering. The heatmap uses the viridis colormap (yellow-green-blue-purple)
    with white grid lines separating cells. Four iris features (Sepal Length, Petal
    Width, Sepal Width, Petal Length) are shown on the x-axis with rotated labels.
    Thirty sample labels on the y-axis (e.g., Setosa-1, Versicolor-3, Virginica-7)
    are color-coded by species: blue for Setosa, orange for Versicolor, green for
    Virginica. A narrow "Species" color strip between the row dendrogram and heatmap
    shows the species membership. A colorbar in the upper left indicates Feature Value
    ranging from approximately 1 to 7. A species legend with colored square markers
    appears in the upper right. The title "dendrogram-basic · seaborn · pyplots.ai"
    is centered at the top. Setosa samples cluster tightly together at the top, while
    Versicolor and Virginica samples intermingle in the lower portion, reflecting
    the known biological similarity between those species.'
