review:
  strengths:
  - Excellent spec compliance with all required features including inverted Y-axis,
    pooled effect line, 95% CI funnel, null effect reference, and weight-proportional
    markers
  - Strong data storytelling through outlier color coding, directional annotations,
    and informative subtitle
  - Layered 95%/99% CI regions add visual depth beyond basic spec requirements
  - Realistic meta-analysis data with plausible log odds ratios and standard errors
  - Clean well-structured code with good use of Plotly graph_objects API
  weaknesses:
  - The 95% CI and 99% CI rotated labels are semi-transparent and slightly hard to
    read against the shaded funnel background
  - Could leverage more distinctive Plotly features such as dropdown selectors or
    range slider
  image_description: The plot displays a meta-analysis funnel plot with the title
    "funnel-meta-analysis · plotly · pyplots.ai" centered at top, followed by a subtitle
    explaining asymmetry and red outlier markers. The Y-axis shows "Standard Error"
    inverted (0 at top, ~0.4 at bottom). The X-axis shows "Log Odds Ratio" ranging
    from approximately -1.1 to 0.5. A solid dark blue vertical line marks the pooled
    effect at -0.57, and a dashed gray vertical line marks the null effect at 0. Two
    nested funnel-shaped shaded regions represent the 95% CI (darker blue tint) and
    99% CI (lighter blue tint), both emanating from the pooled effect line at the
    top. Fifteen study markers are plotted as circles sized proportionally to inverse-variance
    weight. One red marker (upper-left, near -0.80, SE≈0.11) falls outside the 95%
    CI funnel; the remaining 14 are blue (#306998). Direction annotations at the bottom
    read "← Favors Treatment" (left, blue) and "Favors Control →" (right, gray). Rotated
    "95% CI" and "99% CI" labels appear along the funnel boundaries. The background
    is clean white with a very subtle off-white paper color and light gridlines.
