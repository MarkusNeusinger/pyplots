  strengths:
  - Correct diverging layout with neutral category split evenly at the midpoint
  - Data sorted by net agreement creates clear storytelling narrative
  - Thoughtful diverging color palette (red to gray to blue) with semantic meaning
  - Smart conditional value labeling via value_formatter that hides labels for segments
    < 8%
  - Realistic employee engagement survey context with varied response distributions
  weaknesses:
  - Phantom legend entry from the space series for neutral-right half pollutes the
    legend
  - No explicit axis titles (missing Response Percentage or similar)
  - X-axis range extends beyond the data wasting canvas space
  - Salmon and gray colors could be more distinct for colorblind users
  - Pygal default chrome (dashed grid, default axis styling) still visible
  image_description: 'The plot displays a horizontal diverging stacked bar chart for
    an Employee Engagement Survey with 8 questions. Bars diverge from a central neutral
    point, with negative responses (Strongly Disagree in red #D94535, Disagree in
    salmon #E8998D) extending left and positive responses (Agree in light blue #7DB5D6,
    Strongly Agree in dark blue #306998) extending right. Gray (#AAAAAA) neutral segments
    are split evenly across the midpoint. Questions are sorted by net agreement from
    top (Team collaboration is effective — most positive) to bottom (I receive fair
    compensation — most negative). Percentage labels appear inside bar segments for
    values >= 8%. The title reads "Employee Engagement Survey · bar-diverging-likert
    · pygal · pyplots.ai". A legend at the bottom shows all 6 series, though a phantom
    tiny gray square appears for the unnamed neutral-right series. The x-axis shows
    cumulative percentage values with dashed horizontal grid lines. The background
    is white.'
