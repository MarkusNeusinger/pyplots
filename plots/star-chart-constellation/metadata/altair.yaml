  strengths:
  - Excellent atmospheric design with dark navy background and cohesive color palette
    (two-tone star colors and teal labels)
  - Comprehensive real-world astronomical data with accurate star positions, magnitudes,
    and 15 well-defined constellations
  - Full spec compliance with all required features including stereographic projection,
    coordinate grid, magnitude legend
  - Polished manual magnitude legend and very subtle coordinate grid
  weaknesses:
  - Label crowding in the central region — several constellation names overlap or
    are very close together
  - Some wasted canvas space at the bottom of the chart below the projection boundary
  - Helper function violates KISS principle slightly
  - Projection math and grid generation done externally rather than using Altair transforms
  image_description: The plot displays a star chart on a dark navy (#0A1628) background
    using stereographic projection from the North Celestial Pole. Stars are rendered
    as circles with magnitude-based sizing — brighter stars (e.g., Vega, Arcturus,
    Capella) appear as large pale-yellow/white dots while dimmer stars are smaller
    blue-grey circles. 15 constellations are connected by semi-transparent blue (#5C9DC8)
    stick-figure lines, including Orion, Ursa Major, Cassiopeia, Leo, Cygnus, Lyra,
    Gemini, Taurus, Boötes, Aquila, Corona Borealis, Hercules, Draco, Perseus, and
    Auriga. Each constellation is labeled in teal (#80CBC4) near its centroid. A subtle
    coordinate grid shows declination circles (0°, 30°, 60°) as dashed lines and RA
    radial lines at 3-hour intervals, both in muted grey at very low opacity. A boundary
    circle at dec=-10° frames the projection. A manual magnitude legend in the lower-right
    shows four size classes. The title reads "star-chart-constellation · altair ·
    pyplots.ai" with subtitle "Stereographic Projection from North Celestial Pole".
    Approximately 200 random filler stars populate the background.
