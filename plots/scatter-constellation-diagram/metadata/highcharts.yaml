  image_description: The plot displays a 16-QAM constellation diagram on a white plot
    area with a light gray canvas background. Sixteen orange diamond markers with
    red borders represent ideal constellation points arranged in a 4x4 grid at ±1,
    ±3 I/Q positions. 1000 blue semi-transparent circles represent received symbols
    scattered around each ideal point, with varying opacity - points further from
    their ideal position appear darker, creating a visual error-distance encoding.
    Dashed gray decision boundary lines at -2, 0, and 2 on both axes divide the symbol
    decision regions. The x-axis is labeled "In-Phase (I)" and y-axis "Quadrature
    (Q)" with tick marks from -5 to 5. The title reads "16-QAM Constellation · scatter-constellation-diagram
    · highcharts · pyplots.ai" with a subtitle showing SNR, symbol count, and constellation
    point count. A legend in the top-right identifies the two series. An EVM annotation
    box in the upper-left contains EVM and SNR values with a quality indicator bar.
