  image_description: 'The plot displays a mel-spectrogram using the Inferno colorscale
    on a white background. The x-axis shows "Time (s)" from 0 to ~3.8 seconds, and
    the y-axis shows "Frequency (Hz)" on a logarithmic scale with custom tick labels
    at 50, 100, 200, 500, 1k, 2k, 4k, and 8k Hz. The colorbar on the right is labeled
    "dB" with a range from -80 to 0. Bright yellow-white horizontal bands are clearly
    visible at the harmonic frequencies (440 Hz, 880 Hz, 1320 Hz), and a diagonal
    bright sweep rises from lower-left to upper-right representing the chirp signal.
    A decaying tone near 3000-4000 Hz fades over the first ~2 seconds. The lower frequencies
    show a noisy texture. Four white-arrow annotations with dark background boxes
    label key features: "Harmonics (A4)", "Chirp sweep", "Decaying tone", and "Noise
    floor". Subtle dotted white reference lines appear at 440 Hz, 1 kHz, and 4 kHz.
    Title reads "spectrogram-mel · plotly · pyplots.ai" centered at the top.'
