review:
  strengths:
  - Striking custom cosmic fire palette with carefully tuned non-linear color stops
    creates dramatic visual impact
  - Smooth coloring via normalized iteration count eliminates discrete banding artifacts
  - Fully deterministic vectorized computation with no external dependencies beyond
    numpy/pandas
  - Expert plotnine grammar of graphics usage with layered composition
  - Perfect spec compliance with all six spec requirements met including aspect ratio
    preservation
  - Dark theme is aesthetically appropriate and cohesive for fractal visualization
  - Annotations identify key mathematical features without visual clutter
  weaknesses:
  - Legend colorbar tick labels are slightly cramped within the compact colorbar height
  - Annotation text (size 8-10, alpha=0.45) is intentionally subtle but borders on
    too faint at full resolution
  - Custom palette is not a standard colorblind-safe option though luminance gradient
    provides reasonable accessibility
  image_description: The plot displays the Mandelbrot set fractal on a dark background
    (#0a0a0f). The main body of the set is rendered in solid black, with the characteristic
    large cardioid shape on the right and the period-2 bulb (smaller circle) attached
    to its left. The fractal boundary is colored using a "cosmic fire" palette transitioning
    from deep purple/violet near the set boundary through hot magenta and coral, to
    gold and near-white at the outermost escape regions. The title "heatmap-mandelbrot
    · plotnine · pyplots.ai" appears at the top in bold white text. The x-axis is
    labeled "Re(c)" spanning approximately -2.5 to 1.0, and the y-axis "Im(c)" spanning
    -1.25 to 1.25. Subtle white italic annotations at low opacity label the "Cardioid"
    and "Period-2 Bulb" features. A vertical colorbar on the right shows "Escape Iterations"
    from 0 to 100. The overall aesthetic is polished and dramatic with the dark theme.
