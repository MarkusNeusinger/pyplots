  - Design excellence held back by missing annotations and unintended colormap
  image_description: The plot shows a 20×20 rainflow counting matrix rendered as a
    2D heatmap. The x-axis is labeled "Mean Stress (MPa)" ranging from -100 to 100,
    and the y-axis is labeled "Stress Amplitude (MPa)" ranging from 0 to 200. The
    title reads "heatmap-rainflow · plotnine · pyplots.ai" in bold centered text.
    The colormap is an orange/brown sequential scheme (NOT the viridis specified in
    code), with dark brown/orange representing high cycle counts and light cream/white
    for low counts. A colorbar on the right is labeled "Cycle Count (log₁₀)" with
    values from 0.0 to 2.5. Zero-count bins appear as white tiles with subtle gray
    borders, visually distinct from data-bearing tiles. The primary concentration
    of high cycle counts is clearly visible at low amplitude (0–50 MPa) near zero
    mean stress, with a secondary cluster around amplitude ~60 MPa and mean ~30 MPa.
    Grid lines are removed, the panel has a white background with a subtle gray border,
    and the plot background is light gray. Notably, the code includes four annotate()
    calls (two "label" and two "segment" for arrows) that are completely absent from
    the rendered output.
