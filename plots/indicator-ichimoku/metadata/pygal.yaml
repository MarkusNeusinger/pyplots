  - Heavy regex-based SVG post-processing adds code complexity
  image_description: The plot displays an Ichimoku Cloud technical indicator overlaid
    on candlestick price data spanning approximately Mar 26 to Aug 13, 2024. The chart
    has a warm off-white background with a slightly tinted plot area. Green bullish
    and red bearish candlesticks are visible throughout the price range of ~$132-$168.
    The Tenkan-sen (orange) and Kijun-sen (blue) lines weave through the candle bodies.
    The Kumo cloud is filled between Senkou Span A (green line) and Senkou Span B
    (red/pink line) with semi-transparent green tint when bullish and red/pink tint
    when bearish. A notable large bearish cloud appears in the Apr 23 region where
    price dropped sharply from ~$167. The Chikou Span appears as a thin dashed purple
    line plotted behind current price. The legend at the bottom lists all seven series.
    Title reads "indicator-ichimoku · pygal · pyplots.ai" and axes are labeled "Date"
    and "Price ($)".
