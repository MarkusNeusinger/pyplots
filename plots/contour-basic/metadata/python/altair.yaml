review:
  strengths:
  - Viridis colormap correctly chosen for sequential continuous elevation data — perceptually
    uniform and colorblind-safe
  - Major/minor contour line distinction (100m thin 35% opacity vs. 200m thick 95%
    opacity) is a deliberate design choice that adds genuine visual hierarchy
  - Full theme-adaptive chrome correctly implemented with all five tokens (PAGE_BG,
    ELEVATED_BG, INK, INK_SOFT) — both renders pass readability checks
  - Realistic topographic scenario with plausible elevation values and two peaks of
    different heights demonstrates all core contour features
  - Declarative aggregation (mean(elevation):Q with alt.Bin) to create the filled
    contour effect is a clever Altair-idiomatic approach
  weaknesses:
  - 'Canvas undersize: width=1420, height=785 produces 4260x2355 px; altair.md guide
    specifies width=1600, height=900 to hit 4800x2700 px standard'
  - No contour level labels despite spec recommending them when practical
  - 'Altair''s distinctive interactive features not utilized: HTML output is generated
    but neither .interactive() nor tooltip encoding is added'
  - Marching squares implementation adds 45+ lines of dense bit-manipulation code
    making the code verbose
