  strengths:
  - Excellent data storytelling with prominently marked critical points (jω crossing,
    breakaway) using distinct marker symbols and colors
  - Rich interactive hover information showing gain values along each branch via customdata/hovertemplate
  - Thoughtful non-uniform gain sampling provides better resolution near breakaway
    and jω crossing points
  - Complete spec coverage including constant damping ratio lines, natural frequency
    circles, and real-axis segments
  - Clean, deterministic code with mathematically accurate computations
  weaknesses:
  - Axes are not constrained to equal scaling — natural frequency circles appear as
    ellipses, distorting geometric relationships
  - Branch colors could have stronger visual differentiation from the reference lines
  - The breakaway star marker blends slightly with nearby pole markers
  image_description: 'The plot displays a root locus diagram for the transfer function
    G(s) = 1/(s(s+1)(s+3)) on a white background with light gray paper color (#FAFBFC).
    Three branches are shown: Branch 1 (blue #306998) curves downward from the origin
    into the lower-right quadrant, Branch 2 (orange #E8833A) curves upward from the
    origin into the upper-right quadrant, and Branch 3 (green #5BA85B) extends left
    along the real axis from the pole at s=-3 toward negative infinity. Open-loop
    poles are marked with black X markers at s=0, s=-1, and s=-3. Red diamond markers
    indicate the jω-axis crossings at approximately ±j√3 (K=12). A purple star marks
    the breakaway point near s=-0.451 (K≈0.63). Dashed gray lines show constant damping
    ratio contours (ζ=0.2, 0.4, 0.6, 0.8), and dotted gray arcs show constant natural
    frequency circles (ωn=1, 2, 3). Semi-transparent blue highlights mark real-axis
    segments [-1, 0] and [-5.5, -3]. Direction arrows on each branch indicate increasing
    gain. The legend is positioned in the upper-left corner. Title reads "root-locus-basic
    · plotly · pyplots.ai". Axes are labeled "Real Axis (σ)" and "Imaginary Axis (jω)".'
