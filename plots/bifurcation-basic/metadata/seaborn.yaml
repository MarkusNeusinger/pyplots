  - No data storytelling — annotations or color variation could highlight the transition
    from stability to chaos
  image_description: 'The plot displays a classic bifurcation diagram of the logistic
    map. Dark navy-blue points (#102a43) with alpha transparency are plotted against
    a white background. The x-axis shows "Growth Rate (r)" ranging from 2.5 to 4.0,
    and the y-axis shows "Steady-State Population (x)" ranging from 0.0 to 1.0. From
    left to right: a single stable fixed point line rises from r=2.5 to the first
    bifurcation at r≈3.0, where it splits into period-2. Further period-doubling cascades
    are visible (period-4, period-8, etc.) leading into a dense chaotic region beyond
    r≈3.57. Windows of periodicity (notably the period-3 window around r≈3.83) are
    clearly visible as vertical gaps in the chaos. Top and right spines are removed.
    The title reads "bifurcation-basic · seaborn · pyplots.ai" in gray text. No annotations
    mark the key bifurcation points.'
