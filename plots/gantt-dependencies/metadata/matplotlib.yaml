  - Uses plt.xticks() instead of axes method for tick rotation
  image_description: 'The plot displays a horizontal Gantt chart for a software development
    project spanning January through May 2024. Eighteen tasks are organized into four
    color-coded phases: Requirements Phase (steel blue), Design Phase (gold/yellow),
    Development Phase (orange), and Testing Phase (purple). Phase headers appear as
    bold labels with thinner aggregate bars, while child tasks are indented with full-height
    bars. Curved dependency arrows connect predecessor task endpoints to successor
    task start points, with critical path edges highlighted in red (#B22222) and non-critical
    dependencies in gray. A red diamond milestone marker appears at the project completion
    date (May 10). The title reads "gantt-dependencies · matplotlib · pyplots.ai"
    in bold dark text. The x-axis shows biweekly date ticks labeled "Timeline (2024)",
    and the y-axis is labeled "Project Tasks". Top and right spines are removed, remaining
    spines are light gray, and a subtle dashed vertical grid assists timeline reading.
    A comprehensive legend in the upper right identifies all four phases, critical
    path arrows, dependency arrows, and the milestone marker. The background is a
    soft off-white (#FAFAFA).'
