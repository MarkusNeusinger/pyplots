  strengths:
  - Excellent domain-appropriate dark background aesthetic matching oscilloscope displays
  - Inferno colormap provides outstanding density visualization with clear hot/cold
    regions
  - Eye height and width annotations with computed values add real engineering context
  - Complete spec compliance with all features implemented (density heatmap, sigmoid
    transitions, noise, jitter, annotations)
  - Clean data generation with realistic NRZ parameters
  weaknesses:
  - Signal level labels at 16pt are slightly small for the canvas size
  - Blue dashed reference lines at 0V/1V are barely visible against bright density
    bands
  - Right margin slightly oversized creating minor layout asymmetry
  - Eye measurement computation uses verbose while-loop walking instead of concise
    numpy operations
  image_description: 'The plot displays an NRZ eye diagram on a black background using
    the Inferno colormap for density visualization. Two high-density horizontal bands
    (yellow/orange) appear at the 0V and 1V logic levels, representing the two NRZ
    signal states. The characteristic eye-shaped opening is clearly visible in the
    center spanning approximately 0.5–1.5 UI. A green rectangular box annotation outlines
    the eye opening region. Green vertical and horizontal measurement lines mark eye
    height (~0.76 V) and eye width (~0.95 UI), with corresponding labels in green
    text on black backgrounds. Blue "Logic 1 (1.0 V)" and "Logic 0 (0.0 V)" labels
    appear at the upper-left and lower-left. Blue dashed reference lines at 0V and
    1V are present but subtle. The colorbar on the right shows "Log Density" ranging
    from 0 to ~3.5. Title reads "eye-diagram-basic · bokeh · pyplots.ai". X-axis:
    "Time (UI)" [0, 2]. Y-axis: "Voltage (V)" [-0.2, 1.2]. Transition regions show
    purple/magenta traces fanning out, indicating jitter and ISI effects.'
