    rates exceed the 10Y yield, with italic red "Inversion Region" text. The blue
    normal curve rises smoothly from ~1.28% to ~2.96%. The amber inverted curve starts
    high at ~2.09% and dips to ~1.44% before recovering. The teal steep curve starts
    near 0% and rises sharply to ~2.35%. Each curve has circular markers at data points.
