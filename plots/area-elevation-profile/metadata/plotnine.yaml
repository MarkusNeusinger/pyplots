    to Adelboden (120 km) · Vertical exaggeration ~10×". The background is white with
    a light gray panel (#f8f9fa) and subtle horizontal grid lines only (#d0d0d0).
    The terrain shows multiple peaks (Jungfraujoch at 1,688 m being the highest, Schilthorn
    at 1,725 m) and valleys (Lauterbrunnen at 958 m), with start/end points at lower
    elevations (Grindelwald 580 m and Adelboden 620 m). Labels are intelligently aligned:
    left-aligned at the start, center-aligned in the middle, and right-aligned at
