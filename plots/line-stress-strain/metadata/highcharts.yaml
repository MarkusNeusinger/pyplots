  image_description: 'The plot displays a mild steel engineering stress-strain curve
    rendered as a Highcharts line chart at 4800×2700 px. The main curve is drawn in
    dark blue (#306998), starting near the origin with a steep elastic region, transitioning
    through a yield plateau around 250 MPa, ascending through strain hardening to
    an ultimate tensile strength of ~400 MPa at ~0.22 strain, then declining through
    the necking region to fracture at ~0.35 strain with ~300 MPa. An orange dashed
    line near the y-axis represents the 0.2% offset line, extending from strain 0.002
    upward. Three colored plot bands shade the x-axis regions: teal for "Elastic"
    (0–0.015), light blue for "Strain Hardening" (0.015–0.22), and light purple for
    "Necking" (0.22–0.35). Critical points are marked with distinct symbols: a teal
    circle for the yield point, a blue diamond for UTS, and a purple triangle for
    fracture. Horizontal dotted reference lines indicate σ_y = 250 MPa and UTS = 400
    MPa. Two annotation boxes appear in the upper-left: "E = 210 GPa" with a blue
    border and "← 0.2% Offset Yield Method" with an orange border. The title reads
    "Mild Steel Tensile Test · line-stress-strain · highcharts · pyplots.ai" with
    a subtitle showing key parameters. A legend in the top-right lists all five series.'
