  image_description: 'The plot shows a Schmidt equal-area (lower-hemisphere) stereonet
    projection on a clean white background. A dark primitive circle forms the outer
    boundary with small tick marks every 10 degrees around the perimeter. Cardinal
    directions (N, E, S, W) are labeled in bold outside the circle. Three geological
    feature types are plotted: Bedding (steel blue), Fault (salmon red), and Joint
    (green). Poles to planes are shown as colored dots — bedding poles cluster in
    the south-center, fault poles in the southwest, and joint poles in the north-northeast.
    Representative great circles are drawn as curved lines for each feature type.
    Gray dashed density contours (Kamb-style) surround each pole cluster, highlighting
    preferred orientations. A legend on the right identifies the three feature types.
    The title reads "stereonet-equal-area · plotnine · pyplots.ai".'
