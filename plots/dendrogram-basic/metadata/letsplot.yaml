  image_description: 'The plot displays a vertical dendrogram of 15 iris flower samples
    (5 each of Setosa, Versicolor, Virginica) clustered using Ward''s method. Branches
    are color-coded by species: green (Setosa, left), orange (Versicolor, middle),
    purple (Virginica, right), and steel blue for cross-cluster merges. A dashed gray
    horizontal line at y=7.4 marks the color threshold with a monospace annotation.
    The y-axis is labeled "Ward Linkage Distance" (0-12) with subtle gray grid lines.
    Leaf nodes have colored dots with 45-degree-rotated monospace labels (Set-1 through
    Vir-15). The title reads "dendrogram-basic · letsplot · pyplots.ai" in bold dark
    text. White background with minimal chrome — only y-axis elements visible.'
