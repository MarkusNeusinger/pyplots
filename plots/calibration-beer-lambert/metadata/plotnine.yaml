  image_description: The plot displays a Beer-Lambert calibration curve on a clean
    white/light gray background. Seven blue circular calibration standard points are
    plotted along a strong linear regression line (blue, ~1.4pt width) with a subtle
    light blue prediction interval band. The regression equation "y = 0.0453x + 0.0023"
    and "R² = 0.99901" are shown in labeled boxes with a light beige fill (#F0F0EA)
    in the upper-left area. A single red diamond marker represents the unknown sample
    at approximately (7.5, 0.34), with gray dashed horizontal and vertical lines extending
    to both axes to illustrate concentration determination. The x-axis is labeled
    "Concentration (mg/L)" in bold, the y-axis "Absorbance" in bold. The title reads
    "calibration-beer-lambert · plotnine · pyplots.ai" in bold at the top. A bottom
    legend distinguishes "Calibration Standards" (blue circle) from "Unknown Sample"
    (red diamond). Only horizontal y-axis grid lines are shown (subtle gray), with
    clean axis lines on both sides.
