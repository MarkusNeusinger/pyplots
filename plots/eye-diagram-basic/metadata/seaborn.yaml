  strengths:
  - Excellent visual result with professional dark theme and inferno colormap
  - Realistic NRZ signal data generation with proper jitter and noise simulation
  - Good use of histogram2d with gaussian smoothing for density representation
  - Clean well-structured code with proper seed and explicit font sizes
  - Domain-appropriate design choices for signal integrity visualization
  weaknesses:
  - No seaborn import or usage at all - entire implementation is pure matplotlib +
    scipy
  - Missing optional eye height/width annotations from the spec
  image_description: The plot displays a signal integrity eye diagram on a dark (near-black)
    background using the inferno colormap. Two clear eye-shaped openings are visible
    spanning 0-1 UI and 1-2 UI on the x-axis. Dense yellow/orange horizontal bands
    at approximately 0.0V and 1.0V represent the high-density NRZ signal levels, with
    transitions forming the vertical sides of the eye openings. The transitions show
    a spread of purple/magenta traces indicating jitter and noise effects. A colorbar
    on the right labeled "Trace Density" ranges from ~0 to ~14. The title reads "eye-diagram-basic
    · seaborn · pyplots.ai", x-axis is "Time (UI)" with ticks at 0, 0.5, 1.0, 1.5,
    2.0, and y-axis is "Voltage (V)" ranging from about -0.2 to 1.3. Subtle dashed
    reference lines appear at 0V and 1V. Top and right spines are removed.
