  strengths:
  - Scientifically accurate transit model with realistic parameters (cosine-bell shape,
    1.2% depth)
  - Clean code structure with proper ColumnDataSource usage
  - Error bars implemented correctly using Bokeh Whisker model
  - Dual output (PNG + HTML) leverages Bokeh strengths
  - Subtle y-grid with dashed lines and removed x-grid shows design awareness
  weaknesses:
  - Error bar whiskers visually dominant outside transit creating noise
  - Default spines on all four sides reduce visual polish
  - Scatter marker size too small for resolution
  - Title format includes extra prefix not matching spec
  - No HoverTool or interactive Bokeh features in HTML output
  - Legend small and positioned far from data
  image_description: The plot displays a phase-folded exoplanet transit light curve
    on a white background. Blue scatter points (#306998) with light blue vertical
    error bar whiskers show photometric measurements across orbital phase 0.0-1.0
    on the x-axis, with Relative Flux on the y-axis ranging from approximately 0.987
    to 1.005. A red-orange line (#E34A33) overlays the transit model, showing a clear
    cosine-bell dip centered at phase 0.5 with ~1.2% depth. The baseline sits at flux=1.0.
    The title reads "Exoplanet Transit · lightcurve-transit · bokeh · pyplots.ai"
    at the top left. A small legend in the bottom-right labels "Photometric Data"
    and "Transit Model". The x-grid is removed and the y-grid uses subtle dashed lines.
    Error bars are prominent outside the transit, creating visual noise that detracts
    from the scatter points.
