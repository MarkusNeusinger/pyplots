review:
  strengths:
  - Excellent dark oscilloscope aesthetic perfectly suited for the engineering domain
  - Comprehensive signal generation with realistic noise, jitter, and bandwidth-limited
    sigmoid transitions
  - Eye height/width annotations add quantitative value and tell the signal quality
    story
  - High-resolution 300x180 bin density heatmap for smooth rendering
  - Well-crafted inferno-inspired colormap with perceptually uniform progression
  weaknesses:
  - Minor vertical streak artifacts at time window boundaries from edge effects in
    data extraction windowing
  - Could leverage more distinctive lets-plot features
  image_description: 'The plot displays an eye diagram on a dark background (#000004
    panel, #0d0d2b outer) mimicking an oscilloscope display. A density heatmap rendered
    via geom_raster shows overlaid NRZ signal traces using an inferno-inspired colormap
    — dark blue/purple for low trace density, through pink/magenta, to bright yellow/orange
    for high density regions. The characteristic eye-shaped opening is clearly visible
    centered around 1.0 UI. The high-density (yellow) regions appear at the stable
    0V and 1V signal levels and along the transition paths. The X-axis is labeled
    "Time (UI)" with ticks at 0.0, 0.5, 1.0, 1.5, 2.0. The Y-axis is labeled "Voltage
    (V)" with ticks at 0.0, 0.5, 1.0. Two cyan annotation lines mark the eye height
    (vertical, 0.68 V) and eye width (horizontal, 0.79 UI) with corresponding labels.
    A colorbar on the right shows "Trace Density" from 0 to 1. Title reads "eye-diagram-basic
    · letsplot · pyplots.ai" in light gray bold text.'
