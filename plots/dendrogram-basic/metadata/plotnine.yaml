  image_description: 'The plot displays a dendrogram of 15 iris flower samples (5
    per species) using Ward''s minimum variance method. Branches are colored by species
    purity: blue for Setosa (pure), orange for Versicolor (pure), green for Virginica
    (pure), and gray for Mixed species. The y-axis shows "Ward Linkage Distance" from
    0 to approximately 11. Leaf labels are rotated 45 degrees at the bottom showing
    sample identifiers like "Setosa-1", "Virginica-3", etc. A dashed horizontal line
    at approximately 4.5 marks where "Setosa separates" (italic annotation). The legend
    is positioned on the right side with a subtle border. Background is light gray
    (#FAFAFA). Title reads "Iris Species Clustering · dendrogram-basic · plotnine
    · pyplots.ai" in bold with a subtitle "Hierarchical clustering of 15 iris samples
    using Ward''s minimum variance method". The Setosa cluster is clearly separated
    on the left, while Versicolor and Virginica samples are intermixed on the right
    side of the dendrogram.'
