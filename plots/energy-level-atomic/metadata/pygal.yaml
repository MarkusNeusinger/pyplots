review:
  strengths:
  - Scientifically accurate hydrogen energy levels with correct En = -13.6/n² formula
    and real wavelengths
  - Nonlinear visual scale effectively handles converging upper levels — smart design
    choice
  - Spectral-color coding for Balmer series (Hα crimson, Hβ cyan, Hγ blue, Hδ violet)
    connects to real physics
  - Clean, deterministic code with proper spectroscopic notation (Ly-α, Hα) throughout
  - Dual PNG + HTML output leverages pygal SVG interactivity
  weaknesses:
  - Transition lines are thin and lack visual presence at the 4800px canvas scale
  - No visual hierarchy — all transitions have equal visual weight with no focal point
  - 14-entry legend is cluttered; the flat list does not group Lyman vs Balmer series
    visually
  - Design is clean but generic; lacks the polish needed for publication quality
  image_description: 'The plot displays a hydrogen atom energy level diagram on a
    white background. Six horizontal dark gray lines represent energy levels n=1 through
    n=6, positioned with nonlinear (evenly-spaced) vertical placement to handle convergence
    of upper levels. A dashed red line at the top marks the ionization limit (0.00
    eV). The y-axis is labeled "Energy (eV)" with custom labels showing both quantum
    number and energy value (e.g., "n=1: −13.60 eV"). Three purple-shaded vertical
    lines represent Lyman series transitions (Ly-α 122 nm, Ly-β 103 nm, Ly-γ 97 nm)
    dropping from upper levels to n=1, with larger dots at the lower endpoints. Four
    colored vertical lines represent Balmer series transitions (Hα 656 nm in crimson,
    Hβ 486 nm in cyan, Hγ 434 nm in blue, Hδ 410 nm in violet) dropping to n=2 with
    dots at lower endpoints. The title reads "Hydrogen Atom · energy-level-atomic
    · pygal · pyplots.ai". A 14-entry legend spans the bottom in 7 columns across
    2 rows.'
