review:
  strengths:
  - Excellent data storytelling with clearly annotated gain and phase margins using
    distinct colors and marker shapes
  - Strong aesthetic sophistication with custom color palette, themed backgrounds,
    and refined grid styling
  - Correct title format and complete spec compliance with all required features
  - Clean, well-structured code with deterministic data generation
  - Good use of plotnine grammar of graphics with faceted layout and layer composition
  weaknesses:
  - Severe layout imbalance between magnitude and phase panels — magnitude panel has
    massive empty white space while phase panel is extremely compressed
  - Phase panel crowding causes markers, annotations, and reference lines to cluster
    together
  - The facet_wrap equal-height allocation does not suit this plot where panels need
    different vertical proportions
  image_description: The plot shows a dual-panel Bode plot with the title "bode-basic
    · plotnine · pyplots.ai" centered at the top in dark blue bold text. The top panel
    is labeled "Magnitude (dB)" with a light lavender strip background, showing a
    blue line (#306998) starting at approximately +14 dB at low frequencies, staying
    relatively flat until about 0.3 Hz, then rolling off steeply to about -50 dB at
    the right edge. The bottom panel is labeled "Phase (degrees)" with the same strip
    styling, showing the phase curve starting near -30° and rolling off to approximately
    -270°. Reference lines are drawn as dashed light gray at 0 dB and -180°. An orange
    vertical segment marks the gain margin (GM = 8.0 dB) at the phase crossover frequency
    (~0.5 Hz) with orange square markers, and a purple vertical segment marks the
    phase margin (PM = 33°) at the gain crossover frequency with purple circle markers.
    Dotted vertical guide lines indicate crossover frequencies in both panels. The
    background is light gray (#FAFAFA) with white panel backgrounds and subtle grid
    lines. The major layout issue is that the magnitude panel occupies roughly 65%
    of the figure height with vast empty white space below the data, while the phase
    panel is extremely compressed at the bottom, making its elements crowded and hard
    to distinguish.
