      Background: Warm off-white (#FAF8F1) — correct, not pure white
      Chrome: Title "Music Streaming Trends · streamgraph-basic · highcharts · anyplot.ai" in dark INK (#1A1A17) is clearly visible at top; subtitle "Monthly streaming hours by genre (2023–2024)" in INK_SOFT below; horizontal legend with all 5 genres (Pop, Rock, Hip-Hop, Electronic, Jazz) centered below subtitle; x-axis "Month" label and tick labels (Jan '23 through Dec '24) in INK_SOFT at bottom — all readable
      Data: Five flowing stream areas — Pop in #009E73 (teal green, dominant upper band), Rock in #D55E00 (vermillion orange), Hip-Hop in #0072B2 (blue, wide center band), Electronic in #CC79A7 (reddish purple), Jazz in #E69F00 (gold, bottom band) — Okabe-Ito positions 1–5 in correct order; streams have smooth spline curves; fillOpacity=0.85 gives slight depth
      Legibility verdict: PASS — all text clearly readable against warm off-white background

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black
