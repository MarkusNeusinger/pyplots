  image_description: 'The plot displays a root locus diagram for the transfer function
    G(s) = 1/(s(s+1)(s+3)) on a light gray (#FAFAFA) background. The title "root-locus-basic
    · bokeh · pyplots.ai" appears at the top left in dark text. The x-axis is labeled
    "Real Axis (σ)" and the y-axis "Imaginary Axis (jω)". Three open-loop poles are
    marked with large dark × markers at s=0, s=-1, and s=-3 on the real axis. Two
    blue real-axis locus segments extend from -1 to 0 and from -5.5 to -3. Two orange
    complex branches curve symmetrically upward and downward from a breakaway point
    near σ=-0.451, crossing the imaginary axis at approximately ±j1.73. Red diamond
    markers highlight the jω-axis crossings with a bold red annotation "jω-crossing:
    K=12, ω=√3≈1.73". A blue square marker indicates the breakaway point with annotation
    "Breakaway: σ=-0.451, K=0.63". A small gray circle marks the centroid at σ=-1.33
    with italic annotation. Faint dotted damping ratio lines (ζ=0.6, ζ=0.8 visible)
    radiate from the origin, and faint dotted natural frequency arcs (ωn=1, 2, 3 visible)
    appear as semicircles. A dashed red line along the imaginary axis indicates the
    stability boundary. A blue triangle arrow on one branch indicates the direction
    of increasing gain. The legend in the top-right lists: Real-axis locus, Complex
    branches, Open-loop poles, Stability crossing (K=12), and Breakaway (K=0.63).'
