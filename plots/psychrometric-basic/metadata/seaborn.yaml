  image_description: The plot displays a psychrometric chart with dry-bulb temperature
    (-10 to 50°C) on the x-axis and humidity ratio (0-30 g/kg dry air) on the y-axis.
    Blue curves show relative humidity lines from 10% to 100%, with the 100% saturation
    curve drawn thicker. Purple dashed diagonal lines represent wet-bulb temperature.
    Red dash-dot diagonal lines show enthalpy values. Green dotted near-vertical lines
    show specific volume. A light blue shaded rectangle marks the comfort zone (~20-26°C).
    Orange arrows trace an HVAC process path from point A (35°C, 50%) down to B (13°C,
    100%) then right to C (24°C, 50%), with orange dot markers at each state point.
    The title reads "psychrometric-basic · seaborn · pyplots.ai". A legend in the
    upper left identifies each line type. Top and right spines are removed, with subtle
    gridlines on both axes.
