  strengths:
  - Excellent code quality with clean, deterministic polynomial root computation
  - Good use of Bokeh-specific HoverTool for interactive pole inspection
  - Proper real-axis segment calculation following the odd-count rule
  - Clean visual design with removed axis lines and subtle grid
  weaknesses:
  - Missing constant damping ratio and natural frequency lines (spec requirement)
  - Scatter points too small (size=4) making locus branches appear as thin lines
  - Direction arrows barely visible and need to be larger
  - Imaginary axis crossing diamonds blend with orange branch color
  - Stability boundary dashed line too faint (alpha=0.25)
  - No legend to distinguish branch types
  image_description: 'The plot displays a root locus diagram in the complex plane
    for the transfer function G(s) = 1/(s(s+1)(s+3)). The title "root-locus-basic
    · bokeh · pyplots.ai" appears in the top-left in dark text. The x-axis is labeled
    "Real Axis (σ)" and the y-axis "Imaginary Axis (jω)". Three open-loop poles are
    marked with dark × symbols at s = 0, -1, and -3 on the real axis. Two real-axis
    locus segments are drawn as semi-transparent blue lines: one from -1 to 0 and
    another from -5.5 to -3. The complex conjugate branches are rendered in orange,
    departing the real axis near s ≈ -0.5 and curving outward toward the upper-right
    and lower-right as gain increases. Small triangle direction arrows appear on each
    branch. A faint dashed vertical red line at x = 0 marks the stability boundary.
    The background is light gray (#FAFAFA) with a subtle grid. The Bokeh toolbar is
    visible in the top-right corner. No constant damping ratio or natural frequency
    lines are present. The imaginary axis crossing diamond markers are present but
    blend into the orange branch and are not prominently visible.'
