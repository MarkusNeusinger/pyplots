  image_description: The plot displays a Bode plot with two vertically aligned panels
    on a white background. The top panel shows magnitude (dB) vs frequency (Hz) on
    a logarithmic x-axis. A thick dark navy blue line starts flat near 0 dB, exhibits
    a subtle resonance peak around 0.5-0.8 Hz, then drops steeply through -35 dB.
    A dashed gray reference line marks 0 dB. The gain margin (GM = 5.4 dB) is annotated
    with an orange label on a light peach background, with orange diamond markers
    at the phase crossover frequency and a vertical arrow segment between 0 dB and
    the magnitude at that frequency. A blue diamond marks the gain crossover on the
    0 dB line. The bottom panel shows phase (degrees) vs frequency (Hz) on the same
    log scale. The dark blue line starts near 0 degrees and rolls off steeply through
    -180 degrees to below -250 degrees. A dashed gray reference line marks -180 degrees.
    The phase margin (PM = 15.8 degrees) is annotated with a blue label on a light
    blue background, with diamond markers and a vertical arrow segment. An orange
    diamond marks the phase crossover point at -180 degrees. Dotted vertical lines
    connect the crossover frequencies across both panels. The title "bode-basic ·
    letsplot · pyplots.ai" is centered at the top in bold.
