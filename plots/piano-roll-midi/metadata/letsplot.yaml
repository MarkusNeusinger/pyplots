  image_description: The plot displays a MIDI piano roll with horizontal rectangles
    on a pitch-by-time grid. The x-axis shows "Time (beats)" from 0 to 32, and the
    y-axis shows "Pitch" with white-key note names from A2 to G5. Notes are colored
    using a plasma colormap — dark purple/blue for low velocity (soft) through pink/orange
    to bright yellow for high velocity (loud). A velocity colorbar legend appears
    on the right side ranging from approximately 40 to 120+. Black key rows are indicated
    by subtle light gray horizontal bands across the full width. Thin light-gray vertical
    lines mark individual beats, with thicker gray lines at measure boundaries (every
    4 beats). Melody notes (upper register, C5-G5 range) are taller with dark borders
    and full opacity, while accompaniment notes (lower register, A2-C4) are slightly
    thinner and more transparent. Section labels in italic at the top read "pp — Building",
    "f — Response", "pp — Restart", and "fff — Climax". Bold role labels "Melody"
    and "Accomp." appear on the right side. The title reads "piano-roll-midi · letsplot
    · pyplots.ai" in bold at the top. The overall palette is clean and modern with
    a white background and light gray panel.
