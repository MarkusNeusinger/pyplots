  image_description: The plot displays a reaction coordinate energy diagram for a
    single-step exothermic reaction. A smooth blue curve (#306998) traces the energy
    profile from left (reactants at 50 kJ/mol) through a peak (transition state at
    ~120 kJ/mol) down to products (20 kJ/mol) on the right. The title "line-reaction-coordinate
    · altair · pyplots.ai" appears at the top in dark text with a subtitle "Exothermic
    Reaction · Single-Step Energy Profile" in gray. Bold dark labels mark "Reactants",
    "Transition State ‡", and "Products" near their respective positions. An orange
    vertical double-headed arrow at x≈0.16 shows Ea = 70 kJ/mol between the reactant
    energy level and the transition state level, connected by gray dashed horizontal
    reference lines. A green vertical double-headed arrow at x≈0.82 shows ΔH = −30
    kJ/mol between the reactant and product energy levels, also with dashed reference
    lines and small tick marks. Italic gray annotations show the absolute energy values
    (50, 120, 20 kJ/mol) at their respective levels. The x-axis is labeled "Reaction
    Coordinate" and y-axis "Energy (kJ/mol)". The background is clean white with no
    grid, no view border, and refined axis styling.
