  image_description: The plot displays a 20x20 heatmap of rainflow cycle counting
    results for fatigue analysis. The title reads "heatmap-rainflow · highcharts ·
    pyplots.ai" with a subtitle explaining that low-amplitude cycles near 100 MPa
    mean dominate the fatigue spectrum. The x-axis shows "Cycle Mean (MPa)" ranging
    from -50 to 250 with rotated tick labels, and the y-axis shows "Cycle Amplitude
    (MPa)" ranging from 10 to 200. The color scale uses a viridis-like gradient from
    dark purple (low counts ~1) through teal/green to bright yellow (high counts ~6k+),
    mapped logarithmically. A vertical colorbar on the right is labeled "Cycle Count"
    with logarithmic tick marks. Zero-count cells appear as light gray (#f0f0f0),
    clearly distinct from data cells. The highest counts (bright yellow) concentrate
    at low amplitudes near 100 MPa mean stress, forming a clear hotspot. An annotation
    box in the lower-right area of the plot highlights this peak fatigue region. The
    background is a subtle off-white (#fafafa).
