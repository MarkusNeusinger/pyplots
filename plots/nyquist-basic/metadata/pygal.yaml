review:
  strengths:
  - Correct transfer function G(s) = 2/[s(s+1)(s+2)] from classical control theory
  - Both positive and negative frequency curves with clear visual differentiation
  - Critical point prominently marked in red
  - Unit circle drawn for reference
  - 1:1 aspect ratio maintained as required
  - Deterministic reproducible data
  weaknesses:
  - Missing frequency annotations along the curve at key points (gain crossover, phase
    crossover)
  - Direction arrows are too small to be clearly visible
  - Negative frequency curve is too faint
  - Manual arrowhead code is verbose
  - Design could be more polished — grid and whitespace at library defaults
