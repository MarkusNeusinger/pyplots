review:
  strengths:
  - Discrete step-function colorscale (OI_COLORSCALE) is an elegant Plotly-idiomatic
    technique for rendering categorical colors via go.Parcoords
  - 'Full theme-adaptive chrome: PAGE_BG, ELEVATED_BG, INK, INK_SOFT applied to all
    elements including colorbar background and border'
  - All font sizes explicitly set (title, labelfont, tickfont, rangefont) — no reliance
    on defaults
  - HTML export adds true interactive line filtering — a genuine Plotly distinctive
    feature
  - Clean KISS code structure with reproducible synthetic data
  weaknesses:
  - No line opacity/alpha set — spec recommends transparency for dense parallel coordinate
    plots (150 observations); crossing lines in the middle region are fully opaque
  - Axis ordering (Petal Length, Petal Width, Sepal Length, Sepal Width) does not
    group sepal/petal measurements or order by correlation to reveal inter-variable
    patterns
  - tickfont=16 and rangefont=14 are below the 18px recommended minimum for tick labels
    at 4800x2700 resolution
  - No data storytelling emphasis — Setosa's clear petal separation is not visually
    highlighted; all lines carry equal visual weight
  - Right margin wastes space; could be tightened to give the plot more horizontal
    breathing room for axes
  image_description: |-
