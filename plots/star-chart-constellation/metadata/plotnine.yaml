  strengths:
  - Excellent real astronomical data with accurate star positions, magnitudes, and
    constellation patterns for 22 constellations
  - Beautiful dark sky aesthetic with thoughtful 4-tier color palette and magnitude-based
    visual hierarchy
  - Proper stereographic projection implementation with RA/Dec coordinate grid
  - Clean, well-organized code with pragmatic label nudge approach
  - Full spec compliance including all required features
  weaknesses:
  - Label overlap in central region (URSA MINOR/DRACO/URSA MAJOR cluster, CASSIOPEIA/PERSEUS,
    AURIGA/TAURUS) despite manual nudges
  - Constellation label font size slightly small relative to canvas
  - Limited use of plotnine-specific features; most complexity is in raw numpy computation
  image_description: The plot displays a star chart on a deep navy (#060d1f) background
    mimicking a night sky. Stars are rendered as points using stereographic projection
    centered on RA=12h, Dec=30°. Brighter stars appear as larger, pale-yellow/white
    circles while dimmer stars are smaller blue-gray dots. 22 constellations are labeled
    in italic blue text (e.g., ORION, URSA MAJOR, CASSIOPEIA, CYGNUS, SCORPIUS, SAGITTARIUS,
    LEO, GEMINI, PEGASUS, etc.) with stick-figure lines connecting constituent stars
    in semi-transparent light blue. A subtle RA/Dec coordinate grid is visible in
    very dark blue. RA tick labels (9h, 12h, 15h, 18h) and Dec tick labels (20°, 40°,
    60°) are placed along grid lines. A magnitude legend in the lower-right shows
    star sizes for magnitudes 0-5 with corresponding point sizes and colors. The title
    "star-chart-constellation · plotnine · pyplots.ai" is centered at the bottom in
    muted gray-blue text.
