review:
  strengths:
  - Excellent use of Viridis color gradient to show parameter progression along both
    curves
  - Well-chosen pair of parametric curves (Lissajous + spiral) demonstrating different
    behaviors
  - Clean, idiomatic Bokeh code with good use of ColumnDataSource and multi_line
  - 'Polished styling: subtle grid, custom typography, styled legends, distinct start/end
    markers'
  - Dual output (PNG + HTML) leverages Bokeh interactive capabilities
  weaknesses:
  - Colorbars defined in code but not visible in rendered PNG output — the quantitative
    parameter scale is lost
  - Design excellence could be further elevated with more distinctive visual treatment
  - Library mastery could leverage more Bokeh-specific features (e.g., HoverTool in
    HTML version)
  image_description: The plot displays two side-by-side panels on a light off-white
    background. The left panel shows a Lissajous figure (x = sin(3t), y = sin(2t))
    — a complex self-intersecting curve rendered with a Viridis color gradient progressing
    from dark purple/blue (start, t ≈ 0) through teal/green to yellow (end, t ≈ 2π).
    A dark circle marks the start point and a yellow square marks the end point. A
    "t = π" annotation in gray italic text appears near the midpoint. The right panel
    shows an Archimedean spiral (x = t·cos(t), y = t·sin(t)) also colored with Viridis
    gradient, spiraling outward from the center. Start (circle) and end (square) markers
    are visible, with a "t = 2π" midpoint annotation. Both panels have legends identifying
    Start and End points, subtle dashed grid lines, and italic axis labels. The main
    title "line-parametric · bokeh · pyplots.ai" appears at the top with a subtitle
    about Viridis palette. Notably, the colorbars defined in code for showing the
    parameter t scale are not visible in the rendered output.
