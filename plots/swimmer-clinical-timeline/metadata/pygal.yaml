  image_description: 'The plot displays a horizontal bar chart (swimmer plot) showing
    25 patients from a simulated Phase II oncology trial. Bars are color-coded by
    treatment arm: steel blue for Arm A (Combo) and medium purple for Arm B (Mono),
    sorted by duration with the longest (PT-002, ~55 weeks) at the top and shortest
