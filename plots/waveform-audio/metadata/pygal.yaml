  image_description: The plot displays an audio waveform of a synthesized A3 note
    (220 Hz) with harmonics over approximately 0.15 seconds. The waveform is rendered
    as a blue filled area symmetric around the zero baseline, showing dense oscillations
    with a clear attack transient near t=0.01s followed by exponential decay. An orange
    dashed line traces the decay envelope both above and below the waveform. A dark
    blue dot marks the peak transient at maximum amplitude (~0.92). The background
    is white with a light gray (#f5f6f8) plot area and subtle horizontal y-axis grid
    lines. The x-axis shows "Time (s)" from 0.00 to 0.14+, and the y-axis shows "Amplitude"
    from -1.000 to 1.000. The legend at the bottom lists "Waveform", "Decay envelope",
    and "Peak transient". The title reads "waveform-audio · pygal · pyplots.ai".
