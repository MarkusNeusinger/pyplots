  image_description: The plot shows a square binary recurrence plot of the Lorenz
    attractor x-component. Dark blue (#306998) points on a light gray-blue (#f0f4f8)
    background indicate recurrent state pairs. The main diagonal is clearly filled
    (self-recurrence). Prominent square block structures appear along the diagonal,
    indicating laminar/periodic behavior in the Lorenz system. Diagonal line segments
    parallel to the main diagonal reveal deterministic dynamics. The pattern shows
    characteristic quasi-periodic structure with varying density regions. Both axes
    are labeled "Time Index" ranging from 0 to ~490. The title reads "Lorenz Attractor
    · recurrence-basic · bokeh · pyplots.ai". The plot is square (3600x3600), grid
    lines are removed, and the background is subtly styled.
