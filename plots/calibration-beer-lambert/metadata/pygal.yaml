  image_description: 'The plot displays a Beer-Lambert calibration curve on a white
    background with the title "calibration-beer-lambert · pygal · pyplots.ai" at the
    top. Seven blue circular calibration standard data points are plotted at concentrations
    0, 2, 4, 6, 8, 10, and 12 mg/L, showing a clear linear relationship between concentration
    (x-axis, "Concentration (mg/L)") and absorbance (y-axis, "Absorbance"). A solid
    blue regression fit line passes through the data. Two light blue dashed lines
    show the 95% prediction interval flanking the regression line (narrow due to excellent
    R²=0.9998 fit). A red dashed crosshair marks the unknown sample: a horizontal
    line from the y-axis at A=0.350 to the intersection with the fit line at ~7.66
    mg/L, then a vertical dashed line drops to the x-axis. Axis spines are hidden
    via CSS injection. Subtle light-gray horizontal grid lines provide y-axis reference.
    The legend at the bottom displays four items in a single row: "Calibration Standards",
    "Fit: A = 0.0453·C + 0.0028 (R² = 0.9998)", "95% Prediction Interval", and "Unknown
    → 7.66 mg/L". The overall appearance is clean and professional with intentional
    color hierarchy (blue for calibration data, red for the unknown).'
