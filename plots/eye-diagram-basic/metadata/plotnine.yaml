  image_description: The plot displays a signal integrity eye diagram on a dark navy
    (#0d0221) background using the inferno colormap. Two eye openings are clearly
    visible spanning 0–1 UI and 1–2 UI on the x-axis (labeled "Time (UI)"). The y-axis
    shows "Voltage (V)" with ticks at 0.0, 0.5, and 1.0. High-density trace regions
    along the 0V and 1V rails glow bright yellow/white, while transition zones between
    bit levels show magenta/pink gradients. A green dashed vertical segment at t=0.5
    UI marks the eye height (0.87 V), and a cyan dashed horizontal segment at y=0.5
    V marks the eye width (0.86 UI), both with labeled annotations. The legend on
    the right shows "Trace Density" with a colorbar ranging from ~50 to ~200. The
    title reads "eye-diagram-basic · plotnine · pyplots.ai" in bold white text.
