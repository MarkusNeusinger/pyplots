  - Y-axis range(-0.5, 1.1) wastes vertical space especially for PACF
  - Bar chart instead of stem plot with bars wider than ideal
  image_description: The plot displays two vertically stacked bar charts on a white
    background. The top chart shows ACF values for lags 0-36, and the bottom shows
    PACF values for lags 1-36. Bars are colored dark blue (#306998) when they exceed
    the 95% confidence bounds and light muted blue (#A8C4D8) when non-significant.
    Red dashed horizontal lines indicate the ±0.139 confidence bounds drawn via PIL.
    The title "acf-pacf · pygal · pyplots.ai" is centered at the top in bold dark
    text, with a subtitle "Monthly Passenger Data (n=200) · 95% confidence bounds
    at ±0.139". Y-axes are labeled "ACF" and "PACF", x-axis labeled "Lag" with labels
    every 5 lags. The ACF shows clear 12-month seasonal periodicity with peaks at
    lags 0, 12, 24, 36. The PACF shows significant spikes at early lags then rapid
    decay.
