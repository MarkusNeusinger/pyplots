review:
  strengths:
  - Correct ASHRAE-based psychrometric equations producing accurate curves
  - Effective visual hierarchy with orange process path and blue comfort zone
  - Custom grayscale gradient for RH curves is a nice design choice
  - Proper use of ggplot layer composition for complex multi-layer chart
  - HTML export alongside PNG is a good use of lets-plot capabilities
  weaknesses:
  - Enthalpy and specific volume lines have NO labels on the chart - code creates
    label data but forgets to add geom_text layers
  - Cooling and Dehumidification label overlaps with nearby RH percentage labels
  - Red (enthalpy) and green (wet-bulb) color combination is not colorblind-safe
  - 'Dead code: df_enth_labels and df_vol_labels dataframes created but unused'
  image_description: The plot displays a psychrometric chart with dry-bulb temperature
    (°C) on the x-axis (-10 to 50) and humidity ratio (g/kg) on the y-axis (0 to 30).
    Relative humidity curves (10%-100%) are drawn as smooth curves using a grayscale
    gradient, with the 100% saturation curve highlighted in blue. Wet-bulb temperature
    lines (0°C to 30°C) appear as green diagonal lines with labels. Enthalpy lines
    are drawn in semi-transparent red diagonals, and specific volume lines in semi-transparent
    purple diagonals - however, neither enthalpy nor specific volume lines have labels
    on the chart. A light blue dashed-border rectangle marks the "Comfort Zone" (~20-26°C).
    An orange arrow shows an HVAC process path from ~32°C down to ~24°C labeled "Cooling
    & Dehumidification." The title reads "psychrometric-basic · letsplot · pyplots.ai"
    in bold. The background is white with subtle gray gridlines.
