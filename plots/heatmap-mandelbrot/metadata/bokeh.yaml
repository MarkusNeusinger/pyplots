review:
  strengths:
  - Excellent smooth coloring implementation with log2(log2(|z|)) formula eliminating
    discrete banding
  - Dark theme perfectly suited to Mandelbrot visualization making boundary colors
    glow against black background
  - LogColorMapper is a clever choice emphasizing boundary detail where iteration
    counts change rapidly
  - 'Cohesive gray text hierarchy (#e0e0e0 to #cccccc to #aaaaaa) creates professional
    unified look'
  - Dual PNG+HTML export leverages Bokeh web-native strengths
  - Grid resolution (1200x714) and max_iter (200) both exceed spec defaults for better
    detail
  weaknesses:
  - Color bar tick numbers could be more prominent (slightly dense at the right edge)
  - Could explore Bokeh-specific interactive features in the HTML output (hover tooltips
    showing coordinates/iteration count)
  image_description: The plot displays the Mandelbrot set fractal on a black background
    (#000000) with a dark gray (#1a1a1a) border fill. The fractal is rendered using
    the Inferno256 colormap, producing deep purple/blue tones in regions of slow escape
    that transition through orange and yellow for rapidly diverging regions. The iconic
    main cardioid and period-2 bulb are rendered in solid black (non-escaping points).
    The fractal boundary exhibits intricate, smooth detail thanks to the normalized
    iteration count formula and the LogColorMapper which emphasizes boundary structure.
    The title "heatmap-mandelbrot · bokeh · pyplots.ai" appears in light gray at the
    top left. The x-axis is labeled "Re(c)" spanning -2.5 to 1.0, the y-axis is labeled
    "Im(c)" spanning approximately -1.25 to 1.25, both with gray tick labels. A vertical
    color bar on the right labeled "Escape Iterations" maps colors to iteration counts.
    No grid lines are present, and the aspect ratio correctly preserves the mathematical
    proportions of the complex plane.
