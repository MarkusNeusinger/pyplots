  image_description: The plot displays an Ichimoku Cloud overlay on a candlestick
    chart spanning from September 2023 to March 2024. Prices range from ~$150 to ~$192
    on the y-axis labeled "Price (USD)" with dollar-sign tick prefixes. Green/teal
    candlesticks represent up days, red candlesticks represent down days. The orange
    Tenkan-sen (9) line and purple Kijun-sen (26) line are clearly visible overlaying
    the price action. A blue dashed Chikou Span line appears shifted into the past.
    The Kumo (cloud) is filled between Senkou Span A (teal dotted) and Senkou Span
    B (red dotted), with light teal fill for bullish segments and light pink fill
    for bearish segments. A "Bullish TK Cross" annotation with an arrow highlights
    a signal where the Tenkan-sen crosses above the Kijun-sen. The title reads "Ichimoku
    Cloud Overlay" in bold with subtitle "indicator-ichimoku · plotly · pyplots.ai"
    in gray. A horizontal legend at the bottom-left lists all six trace types. The
    background is clean white with subtle y-axis gridlines only.
