      Background: Warm off-white #FAF8F1 — correct theme surface.
      Chrome: Title "Wallis Alps · area-mountain-panorama · pygal · anyplot.ai" in dark #1A1A17 at top — clearly readable. Subtitle in INK_SOFT below title — readable. Y-axis label "Elevation (m)" rotated on left in dark ink — readable. Y-tick labels 3,000–6,000 in INK_SOFT left of axis — readable. Compass bearing labels (W, SW, S, SE, E) along bottom in INK_SOFT — readable. Peak name labels in INK_SOFT (28px) or INK (34px for Matterhorn) — readable; elevation sub-labels in INK_MUTED (22–26px) — readable but small.
      Data: Brand green #009E73 filled area traces the ridgeline silhouette across the full width. Warm peach/dusk sky gradient fills the plot area above the ridgeline. Small black summit dots at each peak position connected by thin vertical leader lines to staggered tier labels above.
      Legibility verdict: PASS — all text readable against light background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct theme surface.
      Chrome: Title, subtitle, axis labels, tick labels, and compass labels all rendered in light ink (#F0EFE8 / #B8B7B0) — clearly readable against dark background. No dark-on-dark failures detected.
      Data: Brand green #009E73 filled silhouette — identical colour to light render. Deep blue/navy sky gradient (#252D40 to #1A1A17) replaces the peach gradient. Summit dots change from black to white, remaining visible. Leader lines in light/muted ink.
