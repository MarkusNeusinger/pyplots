    Dark render (plot-dark.png):
      Background: Dark near-black consistent with #1A1A17 — correct dark surface.
      Chrome: Title readable in light text. Legend "Communities" visible with light-colored text. Node labels appear as light text against dark background.
      Data: Colors identical to light render (correct — only chrome should flip). Network layout identical.
      Legibility verdict: PASS (for rendered image) — BUT NOTE: Current code uses color="#222222" for node labels which would be dark-on-dark (#222222 on #1A1A17) if code were run. Images are from prior run, not current code.

