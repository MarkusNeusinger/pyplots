  image_description: 'The plot displays a Water P-T Phase Diagram with Temperature
    (K) on the x-axis (200-800) and Pressure (Pa) on a logarithmic y-axis (1 to 10B).
    Three phase boundary curves are shown: sublimation (dark blue), vaporization (purple),
    and melting (teal green). Phase regions are filled with semi-transparent colors
    - light blue for SOLID (upper left), light purple for LIQUID (center), light orange
    for GAS (lower right), and light yellow for Supercritical Fluid (upper right).
    The triple point is marked with a red diamond at (273.16 K, 611.73 Pa) with an
    arrow annotation, and the critical point with an orange star at (647.1 K, 2.206x10^7
    Pa) also annotated. Dashed orange lines extend from the critical point vertically
    and horizontally to delineate the supercritical boundary. Phase region labels
    (SOLID, LIQUID, GAS, Supercritical Fluid) are rendered in large, semi-transparent
    Arial Black font. A legend in the upper left identifies all curves and points.
    Log Scale / Linear Scale toggle buttons appear at bottom right.'
