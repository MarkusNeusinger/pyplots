  - Clean code with well-structured iterative traversal (no recursion)
  weaknesses:
  - Root is at the TOP instead of the BOTTOM — spec explicitly says root at the bottom.
    Current layout is icicle graph orientation, not flame graph orientation
  - Similar warm color shades (multiple oranges/yellows) can be hard to differentiate
    from each other
  - Dict-based Highcharts configuration rather than leveraging the typed Python API
    objects
  image_description: The plot displays a flame graph visualization of CPU profiling
    data for a web server request handling scenario (668 samples). Horizontal bars
    are stacked vertically representing call stack depth levels. The root function
    "main (100.0%)" spans the full width at the top of the chart. Below it, "process_request
    (85.0%)" dominates the second level, with "log_metrics (9.0%)" and "gc_collect"
    on the right. Deeper levels show functions like parse_headers, authenticate, handle_route,
    query_database, render_template, and apply_middleware. The deepest visible level
    contains build_query, fetch_rows (14.2%), and parse_result. Colors use a warm
    flame palette of yellows, oranges, and reds. Function names appear in white monospace
    text with dark outlines inside bars, with truncation (ellipsis) for narrow bars.
    Title reads "flamegraph-basic · highcharts · pyplots.ai" with subtitle "CPU Profile
    — Web Server Request Handling (668 samples)". The y-axis label reads "Stack Depth".
    White borders separate adjacent bars. Legend and credits are disabled.
