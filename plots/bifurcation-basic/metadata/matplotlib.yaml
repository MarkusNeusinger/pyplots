  strengths:
  - 'Excellent spec compliance: all required features implemented faithfully including
    bifurcation point labels, transient discarding, and correct parameter range'
  - Strong data storytelling with regime background shading and progressive annotations
    guiding the viewer through stable to periodic to chaotic transitions
  - Clean, deterministic code with no unnecessary complexity
  - Good use of matplotlib-specific features (custom colormap, axvspan, rasterized
    scatter, mixed coordinate annotations)
  weaknesses:
  - Chaotic region (r > 3.57) appears faint - the density of the chaotic attractor
    could be more visually prominent with adjusted alpha or point size
  - Minor annotation crowding near r 3.544-3.57 where Period-8 and Onset of chaos
    labels are close together
  - Custom colormap is not perceptually uniform; a viridis-based or cividis-based
    scheme would be more accessible
  image_description: 'The plot displays a bifurcation diagram of the logistic map
    x(n+1) = r·x(n)·(1-x(n)) with Growth Rate (r) on the x-axis (2.5–4.0) and Steady-State
    Population (x) on the y-axis (0–1). Three background-shaded regimes are visible:
    a light blue "Stable" region (r < 3.0) with a single fixed-point line, a light
    purple "Periodic" region (r ≈ 3.0–3.57) showing period-doubling branches splitting
    into 2, 4, and 8 branches, and a light pink "Chaotic" region (r > 3.57) with a
    faint cloud of scattered points. Dashed vertical lines mark key bifurcation points
    at r ≈ 3.0 (Period-2), r ≈ 3.449 (Period-4), and r ≈ 3.544 (Period-8), with an
    arrow annotation pointing to the onset of chaos at r ≈ 3.57. The scatter uses
    a custom blue-to-purple-to-warm colormap. Top and right spines are removed. Title
    reads "bifurcation-basic · matplotlib · pyplots.ai".'
