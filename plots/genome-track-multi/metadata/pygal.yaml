review:
  strengths:
  - 'Perfect spec compliance and data quality: all 4 required tracks with biologically
    accurate EGFR gene data'
  - Meaningful pygal usage for coverage (hermite interpolation + fill) and variants
    (XY scatter), with interactive tooltips preserved in HTML output
  - Colorblind-safe Tol bright palette with clean visual separation between tracks
  - Clever composite SVG approach with viewBox cropping to align pygal internal padding
    with manual SVG coordinates
  - Clean flat code structure with clear section organization
  weaknesses:
  - Coverage y-axis tick labels are subtle (#999 at 20pt)
  - Some narrow exons appear as thin vertical bars at this genomic scale
  - Regex-based SVG manipulation adds fragility to the composite approach
  - Design is solid but not yet at publication-quality level
  image_description: |-
    The plot displays a multi-track genome browser view of the EGFR gene region on chromosome 7 (chr7:55,086,000-55,280,000). Four horizontal tracks are stacked vertically with alternating light gray and white backgrounds, separated by thin gray lines:

    1. Genes track - Blue (#4477AA) exon rectangles of varying widths connected by a thin blue horizontal intron line. Small chevron arrows along the intron line indicate + strand direction. The gene name "EGFR" appears in blue italic above the exons.

    2. Coverage track - A smooth filled area plot in light cyan (#66CCEE) with a blue stroke (#2277BB), rendered via pygal.XY with hermite interpolation. Coverage peaks visibly at exon positions. Y-axis ticks on the left show 0x, ~43x, and ~87x in gray text.

    3. Variants track - Scatter dots: pink/red circles (#EE6677) for SNPs and purple circles (#AA3377) for indels, positioned by quality score on the y-axis. A small legend in the top-right corner distinguishes SNP vs Indel with matching color swatches.

    4. Regulatory track - Colored rectangles: yellow (#CCBB44) for Promoter, green (#228833) for Enhancer, and salmon (#EE8866) for CTCF. Each rectangle is labeled with its type above. A legend in the top-right shows all three categories.

    The x-axis at the bottom shows genomic positions in Mb (55.10-55.27 Mb) with subtle dashed vertical guide lines spanning all tracks. The axis label reads "Genomic Position (chr7)". The title reads "EGFR Gene Region (chr7) · genome-track-multi · pygal · pyplots.ai" in bold sans-serif at the top. Track labels ("Genes", "Coverage", "Variants", "Regulatory") appear in bold on the left side.
