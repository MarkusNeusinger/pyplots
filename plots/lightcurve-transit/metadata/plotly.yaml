  image_description: 'The plot displays an exoplanet transit light curve on a clean
    white background. Blue scatter points (#306998) with vertical error bars represent
    500 photometric observations plotted against Orbital Phase (0-1) on the x-axis
    and Relative Flux (~0.985-1.005) on the y-axis. An orange (#E67E22) transit model
    curve overlays the data, showing a characteristic U-shaped dip centered at phase
    0.5 with ~1% depth due to quadratic limb darkening. A subtle orange-tinted vertical
    rectangle highlights the "Transit Window" region. A dotted horizontal reference
    line at flux=1.0 marks the baseline. A "Depth: 1.0%" annotation with bracket lines
    quantifies the transit depth. T1 and T4 contact markers label the ingress/egress
    points. The legend in the bottom-left identifies "Observations" (blue dots) and
    "Transit Model" (orange line). The title reads "Exoplanet Transit · lightcurve-transit
    · plotly · pyplots.ai".'
