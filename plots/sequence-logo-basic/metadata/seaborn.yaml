review:
  strengths:
  - Excellent glyph rendering using TextPath/PathPatch with proper affine transforms
  - Perfect data quality with realistic bioinformatics domain and good variation
  - Good data storytelling with yellow highlight and annotation on most conserved
    position
  - Clean code structure with correct information content calculation
  - Improved seaborn integration (set_context, set_style, color_palette, despine)
    compared to attempt 1
  weaknesses:
  - Color scheme does not match spec - spec requires A=green, C=blue, G=orange, T=red
    but implementation uses seaborn colorblind palette
  - Background bars (sns.barplot with alpha=0.18) add visual clutter to the sequence
    logo
  - Library mastery limited because seaborn has no native sequence logo support
  image_description: 'The plot displays a DNA sequence logo for a 10-position transcription
    factor binding site motif. At each position, letters (A, C, G, T) are stacked
    vertically with heights proportional to information content in bits. The colors
    use seaborn''s colorblind palette: A=blue, C=orange, G=green, T=red-brown. Semi-transparent
    colored bars (alpha~0.18) sit behind the letter glyphs at each position. Position
    8 has the tallest stack (~1.4 bits, a large blue "A") and is highlighted with
    a subtle yellow vertical band and an italic annotation reading "Most conserved
    (1.4 bits)" with an arrow. Position 5 is essentially empty (equal base frequencies
    = 0 bits IC). The x-axis is labeled "Position" (1-10), the y-axis "Information
    content (bits)" (0-2.0). The title reads "sequence-logo-basic · seaborn · pyplots.ai"
    at 24pt. Top and right spines are removed via sns.despine(). A subtle whitegrid
    is visible (alpha=0.15). The overall layout is clean with good canvas utilization
    on a 16x9 figure.'
