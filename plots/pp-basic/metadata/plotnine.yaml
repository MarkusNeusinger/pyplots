review:
  strengths:
  - 'Exceptional data storytelling: deviation-colored points with S-curve annotation
    create a compelling narrative about batch variation'
  - Sophisticated use of plotnine grammar of graphics with layered composition (ribbon
    + abline + points + annotations)
  - KS confidence band adds real statistical value beyond the basic spec requirements
  - Realistic quality-control scenario with appropriate steel tensile strength values
  - Clean, well-structured code with all font sizes explicitly set
  weaknesses:
  - Diverging color scale midpoint (#306998) is too close to the low end (#2166AC),
    reducing ability to distinguish near-zero from negative deviations
  image_description: The plot displays a P-P (Probability-Probability) plot with a
    square aspect ratio on a light gray (#FAFAFA) background. The bold title "pp-basic
    · plotnine · pyplots.ai" sits at the top. 200 data points are plotted along a
    45-degree dashed gray reference line, colored by a diverging blue-to-red gradient
    representing deviation from the diagonal. A subtle light blue 95% KS confidence
    band (ribbon) surrounds the reference line. In the upper-left, an italic annotation
    reads "Tensile strength of 200 steel rods vs. normal reference distribution."
    A bold red annotation "← S-curve reveals batch variation" highlights the mid-range
    deviation region where points shift red (positive deviation). A labeled "95% KS
    confidence band" note appears near the bottom. The legend in the lower-right shows
    the "Deviation from fit" color scale ranging from -0.025 (blue) to 0.050 (red).
    Both axes range 0.0-1.0 with 0.2 increments. The S-shaped departure from the diagonal
    is clearly visible in the 0.4-0.7 theoretical probability range, indicating the
    mixture distribution departs from normality.
