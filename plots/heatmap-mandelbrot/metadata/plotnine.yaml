  image_description: The plot shows a Mandelbrot set fractal visualization rendered
    as a heatmap using plotnine's geom_raster. The background of the plot area is
    black, with the Mandelbrot set interior rendered in black (escape_time=0). The
    fractal boundary is colored using the "inferno" colormap, transitioning from dark
    purple/blue at low escape iterations through magenta/pink to yellow/orange at
    higher values. The characteristic cardioid (main body centered near -0.25+0i)
    and period-2 bulb (circle to the left centered near -1+0i) are clearly visible
    with sharp, detailed boundaries. The title "heatmap-mandelbrot · plotnine · pyplots.ai"
    appears at the top in bold. The x-axis is labeled "Real Axis" (range -2.5 to 1.0)
    and the y-axis "Imaginary Axis" (range -1.25 to 1.25). A legend on the right shows
    "Escape Iterations" with a color scale from 0 to 75. Grid lines are removed. There
    is a very faint horizontal artifact at y=0 from the left edge toward the set,
    likely a rendering artifact from geom_raster interpolation.
