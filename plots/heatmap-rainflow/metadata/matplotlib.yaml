  image_description: 'The plot displays a 2D rainflow counting matrix heatmap with
    "Mean Stress (MPa)" on the x-axis (-50 to 250) and "Stress Amplitude (MPa)" on
    the y-axis (0 to 200). The title reads "heatmap-rainflow · matplotlib · pyplots.ai"
    in medium-weight font. A vertical colorbar on the right labeled "Cycle Count"
    shows a logarithmic scale from 10^0 to 10^3. The color scheme uses a trimmed inferno
    colormap: bright yellow for high cycle counts (~3000), through orange and red
    for medium counts, to deep purple for low counts. The highest concentration of
    cycles appears in the low-amplitude region (0-50 MPa) centered around mean stress
    50-150 MPa, rendered in bright yellow. A visible secondary orange cluster appears
    near mean 170 MPa, amplitude 75 MPa. White contour lines at thresholds 10, 50,
    200, and 1000 are overlaid with inline labels. Two text annotations with arrows
    highlight key regions: "Dominant cycle zone" (white) pointing to the high-density
    bottom-center area, and "Overload cluster" (yellow) pointing to the secondary
    peak. Zero-count bins display as light gray (#f0f0f0). Top and right spines are
    removed. The layout is well-balanced with the heatmap filling most of the 16:9
    canvas.'
