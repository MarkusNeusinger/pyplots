  image_description: 'The plot displays a vertical dendrogram of 15 iris flower samples
    clustered using Ward''s linkage method. Three species clusters are clearly visible:
    Setosa (5 samples, left side, orange branches), Versicolor (5 samples, center,
    green branches), and Virginica (5 samples, right side, green branches). The top-level
    merge connecting Setosa to the Versicolor+Virginica group is shown with blue/teal
    branches at distance approximately 10. Light colored background bands (peach for
    Setosa, light blue for Versicolor+Virginica) visually group the clusters. A red
    dashed horizontal threshold line at d=7.1 is labeled "Cluster threshold (d=7.1)".
    The title reads "dendrogram-basic · highcharts · pyplots.ai" with a subtitle "Ward
    linkage of 15 iris samples — Setosa separates clearly at distance ≈10". The Y-axis
    shows "Distance (Ward)" from 0-11 with subtle grid lines. X-axis labels are rotated
    45 degrees showing individual sample names. Cluster name labels ("Setosa", "Versicolor",
    "Virginica") appear at the bottom of each group.'
