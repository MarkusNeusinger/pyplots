  image_description: 'The plot displays a density (KDE) curve of marathon finish times
    ranging from approximately 150 to 370 minutes. The curve is filled with a muted
    Python Blue (#306998) at 55% opacity with a darker blue (#1e4263) outline. The
    distribution is right-skewed with a main peak around 235-240 minutes. Three vertical
    dashed lines mark group centroids at ~200, ~240, and ~300 minutes, each labeled
