  image_description: The plot displays a 20x20 heatmap of rainflow cycle counting
    results for fatigue analysis. The title reads "heatmap-rainflow · highcharts ·
    pyplots.ai" with a subtitle "Rainflow cycle counting matrix — variable-amplitude
    fatigue loading". The x-axis shows "Cycle Mean (MPa)" from -50 to 250 with rotated
    labels, and the y-axis shows "Cycle Amplitude (MPa)" from 10 to 200. A sequential
    blue colormap ranges from very light blue/white (low counts) to dark navy blue
    (high counts ~6k), with a logarithmic "Cycle Count" colorbar on the right side.
    The darkest cells concentrate in the lower-left to center region (low amplitude,
    mean ~60-120 MPa), showing realistic fatigue loading behavior where low-amplitude
    cycles near moderate mean stress dominate. White borders separate each cell cleanly.
    Some cells at high amplitude and extreme mean values appear light, indicating
    zero or very few cycles. The layout fills the canvas well with the colorbar positioned
    on the right.
