  image_description: The plot displays a band plot showing sensor temperature readings
    with a 95% confidence interval over 10 seconds. A light blue semi-transparent
    ribbon (alpha=0.2) represents the confidence band, with a dark orange/rust-colored
    central trend line (#C75B2E) showing the mean temperature. The band clearly widens
    over time, illustrating growing uncertainty. A dashed gray horizontal baseline
    at 0°C provides reference. An annotation "Growing uncertainty" with an arrow connector
    points to the widening band region near t=9.5s. The title "band-basic · letsplot
    · pyplots.ai" appears top-left. X-axis is "Time (s)" ranging from -0.5 to ~11,
    Y-axis is "Temperature (°C)" ranging from -2 to 9. The theme is minimal with subtle
    gray grid lines on a white background. The sinusoidal trend oscillates between
    roughly 0 and 6°C with a positive drift.
