  strengths:
  - Full spec compliance with all required features (reference lines, LOESS trend,
    gene labels, transparency)
  - 'Effective three-tier visual hierarchy: faint non-sig → color-mapped significant
    → labeled top genes'
  - Idiomatic Bokeh usage with HoverTool targeted to significant genes, ColumnDataSource,
    and LinearColorMapper
  - Clean code structure with realistic RNA-seq data context
  - Dual PNG + HTML export leveraging Bokeh interactive capabilities
  weaknesses:
  - Color palette for significant genes (salmon-to-red) could be more perceptually
    uniform and sophisticated
  - FC threshold labels and gene annotations slightly small relative to canvas size
  - Missing summary annotation showing counts of upregulated/downregulated genes
  - No ColorBar to explain the significance gradient mapping
  - Grid could be further refined (consider y-axis only or no grid)
  image_description: 'The plot displays an MA plot (M-versus-A) for differential gene
    expression analysis. The x-axis shows "Mean Expression (log₂)" ranging from 0
    to ~17, and the y-axis shows "Log₂ Fold Change (M)" ranging from approximately
    -4.5 to 4.5. The title reads "ma-differential-expression · bokeh · pyplots.ai"
    in dark blue-gray text. Non-significant genes appear as very faint gray dots (alpha
    ~0.15), forming a dense cloud centered around M=0. Significant genes (n=1,746)
    are displayed in a salmon-to-dark-red color gradient mapped by -log10(p-value),
    with darker red indicating stronger significance. A solid blue reference line
    sits at M=0, with blue dashed lines at M=+1 and M=-1 marking 2-fold change thresholds.
    Labels "FC = 2" and "FC = −2" appear in italic blue at the right edge. A green
    LOESS trend line runs through the data, staying close to zero. Eight top DE genes
    are labeled in bold: WNT7217, SOX5510, RB8445, SHH1368, COL5058, KRAS5924, COL6988,
    COL1168. A legend in the top-left lists "Not Significant", "Significant (n=1,746)",
    and "LOESS Trend". The background is light gray (#FAFAFA) with subtle dashed gridlines.'
