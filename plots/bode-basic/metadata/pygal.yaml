review:
  strengths:
  - 'Excellent data choice: second-order system with zeta=0.2 creates clear resonance
    peak and meaningful phase margin'
  - Creative dual-panel composition using PIL to combine two pygal XY charts
  - HTML export leveraging pygal native SVG interactivity with hover tooltips
  - Custom color palette and font configuration elevate design above defaults
  - Phase margin visualized as connecting line segment between phase value and -180
    reference
  weaknesses:
  - 'Missing gain margin annotation: spec requires both gain margin and phase margin
    annotations but only phase margin is displayed'
  - Legend placement is cramped in upper-left corners especially phase panel with
    three items
  - Duplicated Style definitions for mag_style and phase_style are nearly identical
  - Red reference and orange phase margin lines could be hard to distinguish for color-vision-deficient
    viewers
  image_description: 'The plot displays a dual-panel Bode plot for a second-order
    low-pass system. The top panel shows magnitude (dB) vs frequency (Hz) on a logarithmic
    x-axis from 0.1 to 1000 Hz, with a blue line showing the magnitude response featuring
    a clear resonance peak of ~8 dB around 5 Hz, followed by rolloff. A red dashed
    horizontal line marks the 0 dB reference. A text annotation in the upper right
    reads "Resonance: 8.1 dB @ 4.8 Hz". The bottom panel shows phase (degrees) vs
    frequency with the same log scale. The blue phase curve starts near 0 degrees
    and drops to approximately -180 degrees. A red dashed line marks the -180 degree
    reference. A vertical dashed orange line with dots shows the phase margin at the
    gain crossover frequency. A bold teal annotation reads "Phase Margin: 33.6 degrees
    @ 6.7 Hz". The title "bode-basic · pygal · pyplots.ai" is centered at the top.
    Legends appear in the upper-left corners of each panel. The background is a subtle
    off-white with light gray dotted grid lines.'
