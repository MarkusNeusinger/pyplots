  image_description: 'The plot displays a root locus diagram for the transfer function
    G(s) = 1/s(s+1)(s+3), shown as a subtitle in monospace font. The title reads "root-locus-basic
    · plotly · pyplots.ai" centered at the top. Three locus branches are plotted:
    Branch 1 (blue, from s=0) curves downward into the lower-half complex plane, Branch
    2 (orange, from s=-1) curves upward into the upper-half plane, and Branch 3 (green,
    from s=-3) extends leftward along the negative real axis. Open-loop poles are
    marked with large dark X markers at s=0, s=-1, and s=-3 with text labels. Red
    diamond markers indicate the jω-axis crossings at ±j√3 with a "K=12" annotation
    in red. A purple star marks the breakaway point near s=-0.451 with "K≈0.63" label.
    Dashed gray lines show constant damping ratios (ζ=0.4, 0.6, 0.8) and dotted gray
    arcs show constant natural frequency circles (ωn=1, 2, 3). A translucent pink/red
    vertical band highlights the stability boundary (imaginary axis) with a "Stability
    Boundary" label. Direction arrows on each branch indicate increasing gain. The
    background is white with a light gray paper background. Real axis segments of
    the root locus are shown as subtle blue-shaded horizontal bands between [-1, 0]
    and [-5.5, -3]. The legend is positioned in the upper-left corner listing all
    trace types.'
