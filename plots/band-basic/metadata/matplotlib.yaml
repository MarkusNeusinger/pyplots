  strengths:
  - Gradient band fill using pcolormesh with gouraud shading is a sophisticated and
    visually effective technique
  - Blue-orange color contrast is intentional, accessible, and creates clear visual
    separation
  - Annotation highlights meaningful threshold crossing for data storytelling
  - Path effects (glow) on center line and clean annotation styling show attention
    to design detail
  - Expert-level matplotlib usage with multiple distinctive features (pcolormesh,
    custom colormaps, path_effects)
  - Perfect spec compliance with all required features implemented
  weaknesses:
  - Boundary dashed lines slightly faint where gradient fades to near-zero at edges
  - Confidence interval is symmetric — asymmetric intervals could show more band-plot
    variety
  - Gradient near band edges becomes very faint, relying mainly on dashed lines for
    boundary definition
  image_description: 'The plot displays a 30-day temperature forecast band chart.
    The x-axis is labeled "Day of Month" (1–30) and the y-axis "Temperature (°C)"
    (approximately 12–22°C). A solid orange/rust center line (#c4622d, linewidth=3
    with a subtle glow effect via path_effects) traces a sinusoidal forecast peaking
    around day 15 at ~19.5°C. The confidence band is rendered as a smooth gradient
    fill using pcolormesh with gouraud shading — the fill is most opaque (deep blue,
    #306998) near the center line and fades to near-transparent at the edges, creating
    a heat-map-like density effect. Dashed blue boundary lines (alpha=0.65, lw=1.8)
    mark the 95% CI edges. The band widens progressively from left to right, visually
    conveying increasing forecast uncertainty. An annotation in the lower-right reads
    "Uncertainty exceeds ±3°C" with an arrow pointing to approximately day 19 where
    the interval crosses this threshold. A custom legend in the upper-left identifies
    "95% Confidence Interval" (blue patch) and "Forecast Mean" (orange line). Top
    and right spines are removed. Subtle y-axis gridlines (alpha=0.2) are visible.
    The title reads "band-basic · matplotlib · pyplots.ai".'
