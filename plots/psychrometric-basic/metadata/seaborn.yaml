  image_description: The plot displays a psychrometric chart with dry-bulb temperature
    (-10 to 50°C) on the x-axis and humidity ratio (0-30 g/kg dry air) on the y-axis.
    Blue solid curves represent relative humidity lines from 10% to 100%, with the
    100% saturation curve drawn thicker. Gold/amber dashed lines show wet-bulb temperature
    isotherms. Red-brown dash-dot lines show constant enthalpy. Green dotted lines
    show constant specific volume. A light blue shaded rectangle marks the "Comfort
    Zone" (~20-26°C, 30-60% RH). Orange arrows trace an HVAC process path from point
    A (35°C, 50%) through B (13°C, 100%) to C (24°C, 50%), with orange dots at each
    state point. A legend in the upper left identifies all line types. Title reads
    "psychrometric-basic · seaborn · pyplots.ai". Top and right spines are removed,
    grid is subtle.
