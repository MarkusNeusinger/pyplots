    t (rad)" is on the right. The right panel shows an "Archimedean Spiral" with x(t)
    = t·cos(t), y(t) = t·sin(t), colored with the viridis colormap from dark purple
    (center) to yellow (outer edge, t≈4π). Start/end markers match the left panel.
    An annotation reads "Radius grows linearly with t". Both panels use equal aspect
    ratio, all spines are removed, and subtle grids are visible. Legends in both panels
    identify the start and end markers.
