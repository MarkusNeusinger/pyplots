    merging at distances ~0.4-4.0). A gray connector merges these two main groups
    at ~10.2. The background is light gray (#FAFAFA), top and right spines are removed,
    and a subtle y-axis grid is present. Lines are thick (3px) with round caps. The
    title reads "Iris Species Clustering · dendrogram-basic · matplotlib · pyplots.ai".'
