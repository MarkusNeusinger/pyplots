    2)'
  - pd.Categorical used for correct category ordering in plotnine
  - Realistic, neutral business context (employee satisfaction before/after policy
    changes) with varied gap sizes across 8 departments
  weaknesses:
  - 'DE-01 (4/8): Design sophistication is at ''well-configured library default''
    level — no standout design choices. Consider annotating each dumbbell with the
    difference value (+N pts) to add insight, or use marker size proportional to the
    magnitude of change to create visual hierarchy.'
  - 'DE-02 (4/6): Spines are not explicitly removed — relying on theme_minimal() defaults.
    Should add panel_border=element_blank() and set axis_line=element_line(color=INK_SOFT)
    explicitly per the library guide. Also missing legend_key_size or legend_key adjustments.'
  - 'DE-03 (3/6): Sorting creates narrative structure but no visual emphasis distinguishes
    top performers (Engineering, HR with +17/+28 pt gains) from smallest improvers
    (Sales, Finance with +6/+7 pt gains). Could use color alpha variation or a ''gap
    annotation'' to make the story pop.'
  - 'LM-02 (3/5): The grammar of graphics layering is good but could be more distinctive
    — e.g., using scale_y_discrete(expand=...) for fine-tuned spacing, or coord_flip()
    pattern instead of raw horizontal mapping.'
