review:
  strengths:
  - 'Excellent data storytelling: polarization pattern immediately visible with Neutral
    shrinking from 280 to 122 while extremes grow'
  - Thoughtful semantic color palette (cool blue = agreement, warm orange/red = disagreement,
    gray = neutral)
  - Clean opacity-based distinction between stable and changing flows
  - Comprehensive labeling with respondent counts at all four waves
  - 'Perfect code quality: clean KISS structure, deterministic data, all imports used'
  weaknesses:
  - Side category labels (size=10) are too small for 4800x2700 canvas - increase to
    13-14
  - Changed flows at alpha=0.25 are too faint - increase to 0.35 for better visibility
    of cross-category transitions
  - No explicit net flow highlighting as mentioned in spec notes
  - Library mastery limited by fully manual polygon construction - consider using
    lets_plot tooltips or other distinctive features
  image_description: 'The plot displays an alluvial/Sankey-style diagram with 4 waves
    (Q1 2025 through Q4 2025) arranged left to right. Five opinion categories are
    stacked vertically at each wave: "Strongly Agree" (dark blue, bottom), "Agree"
    (light blue), "Neutral" (gray), "Disagree" (orange), and "Strongly Disagree" (red,
    top). Colored rectangular nodes at each wave position are connected by curved
    flow ribbons. Stable flows (same category) appear at higher opacity (~0.6) while
    change flows are more translucent (~0.25). Category labels with respondent counts
    appear on both the left (Wave 1) and right (Wave 4) sides. Middle waves show count
    numbers in white bold text inside the node rectangles. Bold wave headers sit above
    each column. The title "alluvial-opinion-flow · letsplot · pyplots.ai" appears
    in the upper left. A clear polarization pattern is visible: Neutral shrinks from
    280 to 122, Strongly Agree grows from 120 to 205, and Strongly Disagree grows
    from 130 to 214.'
