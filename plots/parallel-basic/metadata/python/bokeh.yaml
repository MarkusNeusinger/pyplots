      Chrome: Title "parallel-basic · bokeh · pyplots.ai" readable (dark text); axis label "Normalized Value" readable; x-tick labels with dimension names and cm ranges visible; legend top-right with species names readable
      Data: Three species in Python Blue (#306998) for Setosa, amber/yellow (#FFD43B) for Versicolor, medium green (#4CAF50) for Virginica — NOT Okabe-Ito palette; first series is NOT #009E73; 150 semi-transparent lines (alpha=0.5) clearly show species clustering especially in petal dimensions
      Legibility verdict: PASS (all text readable against light background, no light-on-light failures)

