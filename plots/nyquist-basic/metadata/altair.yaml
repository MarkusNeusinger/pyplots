  image_description: 'The plot displays a Nyquist diagram for the transfer function
    G(s) = 5 / ((s+1)(0.5s+1)(0.1s+1)) on the complex plane. Two branches are shown:
    the positive frequency branch (blue, #306998) curves from the right (DC gain ≈
    5) downward through the lower-right quadrant and spirals inward toward the origin,
    while the negative frequency branch (orange, #e07b39) mirrors it above the real
    axis. A light gray dashed unit circle is centered at the origin for reference.
    The critical point (-1, 0) is prominently marked with a red cross and a surrounding
    red ring, labeled "Critical Point (−1, 0)" in bold red text to the left. Frequency
    annotations (ω = 0.5, 1.0, 2.0, 5.0) are shown as blue dots along the positive
    branch with black bold labels. The gain crossover (ω ≈ 2.7, |G|=1) is labeled
    below its point, and the phase crossover (ω ≈ 5.6) is marked with a brown diamond
    and label. Triangle arrows on both branches indicate direction of increasing frequency.
    The title "nyquist-basic · altair · pyplots.ai" appears top-left with subtitle
    showing the transfer function. Axes are labeled "Real Part — Re[G(jω)]" and "Imaginary
    Part — Im[G(jω)]". A legend in the top-right identifies the two branches. The
    plot uses a 1:1 aspect ratio (square canvas, 1200×1200).'
