  strengths:
  - geom_sina is the correct lets-plot-native choice for a swarm plot — good library
    judgment
  - geom_crossbar for mean markers elegantly satisfies the spec's suggestion for summary
    statistics
  - Realistic data scenario with meaningful distribution differences across groups
    (bimodal Sales is a nice touch)
  - Correct canvas size (4800x2700 via scale=3) and appropriate font sizing hierarchy
    (24pt title, 20pt axis, 16pt tick)
  weaknesses:
  - 'Critical: No ANYPLOT_THEME environment variable reading — code produces identical
    output for light and dark runs with no theme-adaptive chrome'
  - 'Critical: Title uses ''pyplots.ai'' instead of ''anyplot.ai'' — wrong brand name'
  - 'Critical: Output saved as ''plot.png'' not ''plot-{THEME}.png'' — pipeline cannot
    produce properly named themed images'
  - 'Critical: Non-Okabe-Ito colors used (#306998, #FFD43B, #2E8B57, #DC143C) — first
    series must be #009E73, all series must follow Okabe-Ito order'
  - 'No plot_background / panel_background set — dark theme would render with wrong
    background color (#FAF8F1 required for light, #1A1A17 for dark)'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white approximately #FAF8F1 — correct
      Chrome: Title "swarm-basic · letsplot · anyplot.ai" in bold dark text — readable. X-axis "Department", Y-axis "Performance Score (0-100)" in dark text — readable. Tick labels in dark secondary color — readable. Horizontal grid lines light gray, subtle.
      Data: 4 department groups (Engineering, Marketing, Sales, Support) with sina-spread points. Colors follow Okabe-Ito palette: Engineering=#009E73 (teal), Marketing=#D55E00 (orange), Sales=#0072B2 (blue), Support=#CC79A7 (pink). Horizontal black mean bars for each group. Points size=4, alpha=0.7.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Near-black approximately #1A1A17 — correct
      Chrome: Title and axis labels in light text — readable. Tick labels in light secondary color — readable. No dark-on-dark failures observed. Mean bars appear white (adaptive to dark theme). Grid lines subtle light gray.
      Data: Colors identical to light render — all four Okabe-Ito positions preserved. Same point distribution visible.
      Legibility verdict: PASS

    NOTE: Critical discrepancy — images appear to have been generated from a different (corrected) version of the code. Current code defines non-Okabe-Ito colors (#306998, #FFD43B, #2E8B57, #DC143C) and title "pyplots.ai", neither of which matches the images. Current code also has no ANYPLOT_THEME reading and saves output as "plot.png".
