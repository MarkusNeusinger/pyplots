  - 'Zero theme adaptation: hardcoded template=''plotly_white'' completely ignores
    ANYPLOT_THEME environment variable. Background, text, gridlines, and all chrome
    are light-theme-only'
  - 'Wrong output file naming: saves as plot.png and plot.html instead of plot-{THEME}.png
    and plot-{THEME}.html — breaks entire CI/CD pipeline'
  - 'Title format incorrect: includes ''Sector Correlation Matrix'' prefix and says
    ''pyplots.ai'' instead of ''anyplot.ai'''
  - 'Implementation completely missing: No import of os module, no reading of ANYPLOT_THEME
    environment variable, no theme-adaptive color tokens (PAGE_BG, INK, INK_SOFT,
    etc.)'
