  - X-bar legend slightly crowded with 7 entries
  image_description: 'The plot displays a vertically stacked pair of Statistical Process
    Control charts for CNC shaft diameter measurements. The top chart (X-bar) shows
    sample means plotted around 25.000 mm with blue connected dots on a warm off-white
    background (#FAFAF8). Three out-of-control points are highlighted in red with
    slightly larger markers: sample 8 (upward shift ~25.043), sample 19 (downward
    shift ~24.930), and sample 25 (upward shift ~25.080). Horizontal reference lines
    include a dark solid center line (CL = 25.001), red dashed UCL (25.027) and LCL
    (24.974), and purple dot-dash warning limits at plus/minus 2 sigma. The bottom
    chart (R chart) shows sample ranges in the same blue style, with a solid center
    line (CL = 0.046), dashed UCL (0.098), LCL at 0.000, and a +2 sigma warning line.
    A subtle gray divider separates the two charts. Both charts share x-axis sample
    numbers 1-30. Legends are displayed at the bottom of each chart with labeled entries
    for all series.'
