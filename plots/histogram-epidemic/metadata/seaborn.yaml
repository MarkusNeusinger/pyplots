    with rounded-box labels: "Travel Restrictions" around Feb 20 and "Vaccination
    Campaign" around Mar 25. A subtle pink-shaded region marks the "Peak Period" (early-to-mid
    March) with italic red text. The curve shows a clear epidemic shape: gradual rise,
    sharp peak around 180 daily cases in early March, decline, a smaller secondary
    wave in late April, then tapering off. X-axis labels are rotated 45 degrees showing
    biweekly dates. Top and right spines are removed with a subtle y-axis grid. The
    title reads "histogram-epidemic · seaborn · pyplots.ai" and a legend in the upper
    left shows all four series.'
