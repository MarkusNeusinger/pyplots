  image_description: 'The plot displays a flame graph visualization of CPU profiling
    data using pygal''s HorizontalStackedBar chart. The root function "main (800)"
    spans the full width at Depth 0 (bottom) in a warm peach/orange color. Above at
    Depth 1, child functions are shown: "gc_collect (80)", "idle_wait (50)", "log_metrics
    (60)", and the dominant "process_request (600)" in warm red tones. The hierarchy
    continues upward through Depth 2 with "compact_heap", "mark_sweep (55)", "format_json",
    "write_buffer", "execute_handler (250)", "parse_headers (120)", "route_dispatch
    (180)", and "send_response". Depth 3 shows "db_query (140)", "serialize_json (70)",
    "template_render", "decode_base64 (55)", "validate_utf8", "lookup_handler (70)",
    "regex_match (90)", and "compress_gzip". Depth 4 at the top has "connect_pool",
    "execute_sql (80)", "fetch_rows", and "encode_utf8". Colors use a warm flame palette
    (yellows, oranges, reds). Function names with sample counts are displayed inside
    bars via pygal''s print_labels. Y-axis labeled "Call Stack Depth" with depth level
    labels, X-axis labeled "Samples" with values 0-800. Title reads "flamegraph-basic
    · pygal · pyplots.ai". White background, monospace font throughout.'
