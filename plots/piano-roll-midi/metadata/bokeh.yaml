  strengths:
  - Excellent musical data with clear structure (scales, chords, melody) showing varied
    note patterns
  - 'Good use of Bokeh-specific features: HoverTool, LinearColorMapper, ColumnDataSource,
    HTML export'
  - Custom beat/measure grid lines with differentiated styling (thicker at measure
    boundaries)
  - Alternating key shading correctly distinguishes black keys from white keys
  - Clean, well-organized code
  weaknesses:
  - No color bar or velocity legend in the static PNG — viewers cannot interpret what
    colors mean without hovering
  - Color palette is custom but not perceptually uniform; intermediate velocity values
    are hard to rank visually
  - Empty pitch rows at top (E5, D#5) waste vertical space
  - Data storytelling could be stronger — no visual emphasis on any particular musical
    feature
  image_description: 'The plot displays a MIDI piano roll visualization on a white
    background. The x-axis shows "Time (beats)" from 0 to 16, and the y-axis shows
    "Pitch" with note names from B3 to E5. Background rows alternate between white
    (white keys) and light gray (black keys like C#4, D#4, F#4, G#4, A#4, C#5, D#5).
    Vertical grid lines mark beats, with thicker/darker lines at measure boundaries
    (beats 0, 4, 8, 12, 16). Notes are rendered as horizontal rectangles with white
    outlines. Colors represent velocity: soft notes in blue (#2C3E7B to #85C1E9),
    medium notes in yellow/orange (#F5B041 to #EB984E), and loud notes in red (#E74C3C
    to #922B21). The musical content shows an ascending C major scale (measures 1-2),
