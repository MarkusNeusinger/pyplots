  image_description: The plot displays a psychrometric chart with dry-bulb temperature
    (-10 to 50°C) on the x-axis and humidity ratio (0-30 g/kg dry air) on the y-axis.
    A thick dark navy saturation curve (100% RH) forms the upper boundary. Relative
    humidity curves from 10% to 90% are drawn as progressively lighter blue lines
    with percentage labels staggered along them. Green solid diagonal lines represent
    wet-bulb temperatures (0°C to 30°C in 5°C steps). Red-orange dotted diagonal lines
    show enthalpy values labeled at 20, 40, 60, 80, and 100 kJ/kg. Purple dash-dot
    lines represent specific volume. A light blue shaded dashed rectangle marks the
    comfort zone (~20-26°C). A bold red line with arrow shows an HVAC cooling & dehumidification
    process from 32°C/60% RH to 24°C/50% RH, with both state points labeled. A legend
    in the upper left identifies all line types. Title reads "psychrometric-basic
    · plotly · pyplots.ai". Background is a very light blue-white.
