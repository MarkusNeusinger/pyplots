    limb curves below zero to approximately -6 L/s, forming a symmetric U-shape. A
    gray dashed predicted normal loop overlays the measured curve, extending to ~5.2L
    volume with PEF ~10.5 L/s. A red dot marks PEF with bold red label "PEF = 9.5
    L/s". Clinical values (FVC=4.8L, FEV1=3.6L, PEF=9.5 L/s, FEV1/FVC=75%) appear
    as dark text in the lower right. A manual text legend sits in the upper right.
    Title reads "spirometry-flow-volume · plotnine · pyplots.ai" in bold. Axes labeled
    "Volume (L)" and "Flow (L/s)".'
