  image_description: 'The plot displays a Hertzsprung-Russell diagram with surface
    temperature (K) on a reversed logarithmic x-axis (40,000 K on the left to 2,500
    K on the right) and luminosity (L☉) on a logarithmic y-axis (100μ to 1M). A secondary
    x-axis at the top shows spectral class labels (O, B, A, F, G, K, M). Stars are
    plotted as circles color-coded by spectral type: darker blue for O types, lighter
    blue for B types, very pale/near-white for A, F, and G types, and orange/gold
    for K and M types. Four region labels with semi-transparent white backgrounds
    mark "Supergiants" (upper region), "Red Giants" (right-center), "Main Sequence"
    (center diagonal), and "White Dwarfs" (lower-left). The Sun is marked with a gold
    star symbol near 5,778 K / 1 L☉ with a "☉ Sun" text label. A legend in the bottom-left
    lists all spectral types and the Sun. The title reads "scatter-hr-diagram · plotly
    · pyplots.ai". The F and G type markers are nearly invisible against the white
    background due to their extremely pale colors.'
