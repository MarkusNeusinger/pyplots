  - Adjacent color segments within each gradient hard to distinguish
  - Legend font size too small for the canvas size
  image_description: The plot displays two parametric curves on a white square canvas
    with range -1.2 to 1.2 on both axes. A Lissajous figure (x=sin(3t), y=sin(2t))
    is rendered as 6 color-gradient segments transitioning from deep blue through
    lighter blue to red-orange and dark red. A spiral curve (x=t·cos(t), y=t·sin(t),
    normalized) is shown in 6 segments transitioning from dark purple through violet
    to teal and dark green. Start and end points are marked as small dark dots. The
    title reads "line-parametric · pygal · pyplots.ai". Axes are labeled "x(t)" and
    "y(t)". A legend at the bottom contains 13 entries across 3 columns with very
    small text identifying each segment's parameter range. Grid lines are subtle light
    gray. The curves are clearly visible with thick strokes.
