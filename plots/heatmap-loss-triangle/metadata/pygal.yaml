  image_description: The plot displays a 10x10 actuarial loss development triangle
    heatmap. Rows represent accident years 2015-2024, columns represent development
    periods 1-10. The upper-left triangle uses a sequential blue colormap (light to
    dark) for actual/observed cumulative claim values, while the lower-right triangle
    uses an orange/amber colormap for projected (IBNR) values. Projected cells have
    dashed orange inner borders and italic text. A red dashed diagonal line marks
    the evaluation date boundary between actual and projected regions. Each cell is
    annotated with its cumulative amount value formatted with thousands separators
    (e.g., "639", "1,464", "6,951"). A "Development Period (Years)" header sits above
    the column numbers, and "Accident Year" is rotated vertically on the left. Below
    the grid, a row of age-to-age development factors is displayed (ranging from 2.345
    down to 1.041). A three-part legend at the bottom shows blue swatch for "Actual",
    orange swatch with dashed border for "Projected (IBNR)", and a red dashed line
    for "Evaluation Date". A vertical colorbar on the right labeled "Cumulative ($k)"
    shows the value-to-color mapping with tick labels from 639 to 6,951. The title
    reads "heatmap-loss-triangle · pygal · pyplots.ai".
