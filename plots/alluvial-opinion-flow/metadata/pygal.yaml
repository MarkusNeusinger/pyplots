review:
  strengths:
  - Excellent custom SVG alluvial diagram with smooth bezier curves connecting opinion
    categories across waves
  - Thoughtful diverging color palette with semantic meaning (blue to yellow to red
    for favorable to neutral to opposing)
  - Clean opacity-based distinction between stable respondents and opinion changers
  - Well-structured data showing realistic polarization trends in renewable energy
    policy survey context
  - Category labels on both left and right sides for easy tracing of flows
  - Complete respondent count annotations on every node bar
  - 'Perfect code quality: clean, deterministic, flat script structure'
  weaknesses:
  - 'Library Mastery very low: pygal used purely as SVG shell for title while entire
    visualization is hand-crafted SVG'
  - Spec requests highlighting net flows for polarization trends but this is not explicitly
    implemented
  - Some changed-opinion flows at 0.2 opacity are very faint and hard to trace
  - Orange and red distinction between Oppose and Strongly Oppose could be improved
    for color accessibility
  image_description: 'The plot displays an alluvial/Sankey-style opinion flow diagram
    with 4 waves (Wave 1 Q1 through Wave 4 Q4) arranged left to right. Five opinion
    categories are stacked vertically at each wave: "Strongly Favor" (dark blue),
    "Favor" (medium blue), "Neutral" (yellow), "Oppose" (orange), and "Strongly Oppose"
    (red). Node bars at each wave display respondent counts (e.g., 180, 210, 250,
    270 for Strongly Favor across waves). Curved bezier flows connect categories between
    consecutive waves, with stable flows (same category) rendered at higher opacity
    (0.55) and changed-opinion flows at lower opacity (0.2). Category labels appear
    on both left and right sides in matching colors. Wave labels with quarter annotations
    sit at the bottom. A legend distinguishes "Stable (same opinion)" vs "Changed
    opinion" flows. A subtitle reads "Renewable Energy Policy Survey · 1,000 Respondents
    Tracked Quarterly". The title reads "alluvial-opinion-flow · pygal · pyplots.ai"
    at top center. The background is clean white with no grid lines. The data shows
    a clear polarization trend with Neutral declining from 280 to 150 while extreme
    positions grow.'
