  - Resonance peak is very subtle and barely visible above 0 dB, reducing visual interest
    and feature demonstration
  - Margin indicator dotted segments are hard to see and need to be more prominent
  image_description: The plot displays a dual-panel Bode plot. The top panel shows
    Magnitude (dB) vs Frequency (Hz) on a logarithmic x-axis, with a dark navy blue
    (#1B4F72) curve that starts near 0 dB, shows a very subtle resonance peak around
    0.8 Hz (barely rising above 0 dB), then rolls off steeply to about -40 dB. A dashed
    gray reference line sits at 0 dB. A green diamond marks the gain crossover point
    on the 0 dB line, and a red "GM = 9.3 dB" label with pink background is positioned
    to its right. The bottom panel shows Phase (°) vs Frequency (Hz), with the same
    navy curve transitioning from 0° down to approximately -270°. A dashed gray reference
    line sits at -180°. A red diamond marks the phase crossover point at -180°, and
    a green "PM = 34.9°" label with light green background appears nearby. The title
    "bode-basic · letsplot · pyplots.ai" is centered at the top in bold. Both panels
    use subtle gray grid lines on a white background with the high-contrast theme.
