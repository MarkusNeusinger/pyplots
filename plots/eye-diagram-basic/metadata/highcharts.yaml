    levels. Between these bands, the characteristic "eye opening" is clearly visible
    — a diamond-shaped region of low density (dark) bounded by blue transition traces.
    The color gradient runs from dark background through deep blue, teal, green, yellow,
    orange to white for maximum density. The x-axis is labeled "Time (Unit Intervals)"
    spanning 0.00 to ~1.76 UI with tick labels at 0.25 intervals. The y-axis is labeled
    "Voltage (V)" spanning -0.3 to 1.0V. A vertical dashed line at 1.0 UI marks the
    unit interval boundary. Horizontal dotted lines mark the 0V and 1V signal levels.
    The title reads "eye-diagram-basic · highcharts · pyplots.ai" with a subtitle
    showing NRZ signal parameters. Annotation labels for "Eye Height: 0.699 V" and
    "Eye Width: 0.900 UI" are visible in the eye opening area. A vertical "Trace Density"
    color bar legend appears on the right side, ranging from 0 to 1.'
