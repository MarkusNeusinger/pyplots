  image_description: 'The plot displays a 5x5 risk assessment matrix heatmap with
    "Impact" (Negligible to Catastrophic) on the x-axis and "Likelihood" (Rare to
    Almost Certain) on the y-axis. Cells are colored using a yellow-orange-red gradient
    based on risk score (likelihood x impact), with scores shown in the bottom-right
    corner of each cell. 15 risk items are plotted as labeled markers with different
    shapes per category: circles (Technical/blue), squares (Financial/orange), diamonds
    (Operational/purple), and triangles (Project/green). Critical risks like "Supply
    Delay" and "Cyber Attack" have dark-bordered label boxes and outer ring emphasis.
    A colorbar on the right shows the Risk Score scale (1-25). An external legend
    shows categories, zone color patches (Low 1-4, Medium 5-9, High 10-16, Critical
    20-25), critical risk indicator, and size legend. Title reads "heatmap-risk-matrix
    · seaborn · pyplots.ai". Spines are removed, white cell borders provide clean
    separation.'
