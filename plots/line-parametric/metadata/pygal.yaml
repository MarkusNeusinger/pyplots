review:
  strengths:
  - Full spec compliance with both required curves and all specified features
  - Effective 4-segment color gradient technique to convey parameter direction
  - Custom dual color palette (blue-orange + purple-green) cleanly distinguishes curves
  - Good use of pygal-specific features (dict data points, stroke_style, HTML export)
  - Deterministic output with 1000-point resolution for smooth rendering
  weaknesses:
  - Legend crowded with 12 entries making it dense to parse
  - fmt_tooltip function adds complexity unnecessary for static PNG output
  - Design excellence limited by pygal SVG rendering constraints
  - Start markers near origin overlap since both curves begin at (0,0)
