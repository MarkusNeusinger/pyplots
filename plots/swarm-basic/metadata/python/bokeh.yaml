review:
  strengths:
  - Perfect spec compliance — all required features (jitter spread, median markers,
    category color coding) correctly implemented
  - Excellent data quality — realistic employee performance scenario with varied distributions
    (bimodal Sales, outlier HR), great storytelling potential in the data
  - Perfect code quality — clean KISS structure, np.random.seed(42), all imports used,
    correct output file names
  - Full theme adaptation — both light (#FAF8F1) and dark (#1A1A17) renders are correct;
    data colors are identical across themes; INK-derived median lines adapt correctly
  weaknesses:
  - Library mastery gap — Bokeh's most distinctive feature (interactive tooltips)
    is completely unused; HoverTool for showing department name and exact score per
    data point is the obvious improvement
  - Design refinement — outline_line_color creates a full rectangular border/box frame;
    style guide prefers L-shaped (top/right removed) or no frame at all; set p.outline_line_color
    = None
  - Minor canvas waste — browser window height offset (+200) leaves a visible blank
    strip at the bottom of both renders; layout could be tighter
