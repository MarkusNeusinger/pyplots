review:
  strengths:
  - Full Sankey diagram built from scratch using letsplot primitives (geom_polygon
    for flow bands, geom_rect for nodes, geom_text for labels) — correct approach
    given no native Sankey geom
  - Smooth bezier-like flow curves using smoothstep interpolation (ease = t*t*(3-2*t))
    produce polished, publication-quality ribbon shapes
  - 'Okabe-Ito palette applied in correct canonical order: Coal=#009E73 (first), Natural
    Gas=#D55E00, Nuclear=#0072B2, Renewable=#CC79A7'
  - 'Theme-adaptive chrome correctly implemented: PAGE_BG, INK, INK_SOFT all flip
    between light (#FAF8F1) and dark (#1A1A17) themes'
  - Realistic energy flow domain with sensible TWh values; node labels include totals
    (e.g., 'Natural Gas (75 TWh)') aiding interpretation
  - 'All chrome tokens applied throughout: plot_background, panel_background, legend_background,
    axis_text (blanked), plot_title, legend_text all reference theme variables'
  - Code is deterministic (hardcoded data), clean imports, linear KISS structure
  weaknesses:
  - Title in code is 'Energy Flow · sankey-basic · letsplot · anyplot.ai' — required
    format is '{spec-id} · {library} · anyplot.ai' (i.e., 'sankey-basic · letsplot
    · anyplot.ai'), the 'Energy Flow ·' prefix deviates from spec
  - Node label text size=14 is slightly below the recommended 16pt minimum for secondary
    text at 4800×2700px — increase to 16 or 18 for better legibility at full resolution
  - 'No visual hierarchy or data storytelling: the dominant flow (Natural Gas → Residential,
    35 TWh) is not visually emphasized beyond its natural proportional width — a subtle
    annotation or slightly different visual treatment would improve storytelling'
  - 'LM-02 is low: the implementation uses only generic letsplot/ggplot primitives;
    no distinctively letsplot-only features leveraged (e.g., interactive tooltips
    via ggsave HTML could be improved with letsplot''s built-in interactivity)'
