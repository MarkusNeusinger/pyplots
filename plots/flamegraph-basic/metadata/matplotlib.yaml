  image_description: The plot displays a flame graph visualization of CPU profiling
    data. Horizontal bars are stacked bottom-to-top representing call stack depth
    (0-4). The bottom bar "main (100%)" spans the full width in deep red. Above it,
    "process_request (84%)" dominates in dark red, with smaller "initialize" and "gc_collect"
    bars to the right in yellow/gold tones. At depth 2, "compute (47%)" is the widest
    bar in deep red, flanked by "parse_input (19%)" and "send_response (13%)" in orange.
    Deeper levels show functions like "matrix_multiply (29%)", "dot_product (21%)",
    "tokenize (13%)", "transform (14%)", etc. A warm color palette (yellow to orange
    to red) is used, with deeper reds for hotter (wider) bars. A styled annotation
    with an arrow reads "Hot path (CPU bottleneck)" pointing to the dot_product bar.
    Top/right spines are removed. Background is light gray (#FAFAFA). Title reads
    "flamegraph-basic · matplotlib · pyplots.ai".
