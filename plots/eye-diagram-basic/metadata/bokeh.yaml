  strengths:
  - 'Excellent domain-appropriate design: black background with Inferno colormap is
    the standard for eye diagrams in industry tools'
  - Perfect spec compliance and data quality with realistic NRZ signal simulation
    parameters
  - Clean well-structured code with good reproducibility and log-scale density transformation
  - HTML export with CDN resources leverages bokeh-distinctive capability
  weaknesses:
  - 'No data storytelling: eye opening is the key indicator but nothing draws attention
