  - NE corridor states still somewhat crowded despite collision avoidance
  image_description: 'The plot displays a Dorling cartogram of US states where each
    state is represented as a circle positioned at its approximate geographic centroid.
    Circle area is proportional to state population, with California and Texas being
    the largest circles. Color encodes GDP per capita using a YlGnBu (yellow-green-blue)
    sequential colormap — darker blues indicate higher GDP/cap (NY, MA, CA ~$80K+),
    while pale yellows indicate lower GDP/cap (MS ~$38K). State abbreviations are
    labeled inside larger circles (population > 4M). Three annotations highlight key
    insights: California (39.5M people), New York ($82K GDP/cap), and Mississippi
    ($38K GDP/cap, lowest). A population size legend with 1M/10M/30M reference circles
    is positioned in the right area. A vertical colorbar on the far right shows GDP
    per Capita (USD) with $K-formatted ticks. A small inset map in the bottom-left
    shows a simplified US outline labeled "Actual Geography" for reference. The background
    is a light off-white (#fafbfc), all main axes spines and ticks are removed, and
    circles have white edge outlines. The title reads "US States by Population · cartogram-area-distortion
    · matplotlib · pyplots.ai" and a subtitle at the bottom reads "Circle area proportional
    to state population | Color encodes GDP per capita."'
