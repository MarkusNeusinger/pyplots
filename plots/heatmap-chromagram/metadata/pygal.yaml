    ranging from near-black/dark purple (0.0 energy) through magenta and orange to
    bright yellow (1.0 energy). A vertical colorbar on the right is titled "Energy"
    with tick marks at 0.0, 0.5, and 1.0. Four chord region labels appear in italic
    bold gray text above the heatmap: "C major", "G major", "A minor", and "F major",
    with dashed vertical separator lines at chord boundaries. Subtle alternating background
    bands behind the heatmap distinguish regions. The chord progression is clearly
    visible: C/E/G rows are bright during 0-1.6s (C major), G/B/D bright during 2-4s
    (G major), A/C/E bright during 4-5.6s (A minor), and F/A/C bright during 6-7.9s
    (F major). Low-energy background noise appears as dark purple throughout non-active
    pitch rows.'
