  image_description: The plot displays a psychrometric chart with dry-bulb temperature
    (°C) on the x-axis ranging from -10 to 50, and humidity ratio (g/kg dry air) on
    the y-axis from 0 to 30. Blue curves represent relative humidity lines from 10%
    to 100%, with the saturation curve (100% RH) drawn thicker and more prominent.
    Green dashed diagonal lines show wet-bulb temperature isotherms (0°C to 30°C).
    Orange dash-dot lines represent constant enthalpy values. Purple dotted lines
    show constant specific volume. A light blue shaded polygon marks the "Comfort
    Zone" around 20-26°C. A red HVAC process path with three numbered state points
    (1→2→3) illustrates cooling/dehumidification followed by reheating, connected
    by red arrows. The title reads "psychrometric-basic · matplotlib · pyplots.ai".
    A legend in the upper left identifies all five line categories. Top and right
