  image_description: 'The plot displays a water pressure-temperature phase diagram
    rendered by pygal at 4800x2700 px. The title reads "Water Phase Diagram · phase-diagram-pt
    · pygal · pyplots.ai" in dark text at the top. The x-axis shows "Temperature (K)"
    from 200 K to 600 K, and the y-axis shows "Pressure (Pa)" on a logarithmic scale
    from ~1 Pa to above 1 MPa. Three phase boundary curves are plotted: a deep blue
    sublimation curve (Solid-Gas) descending steeply from ~273 K, a burnt orange vaporization
    curve (Liquid-Gas) rising from the triple point to the critical point, and a deep
    teal melting curve (Solid-Liquid) running nearly vertically with water''s characteristic
    negative slope. The triple point is marked with a deep rose dot at ~273 K / 612
    Pa, and the critical point with a deep violet dot at ~647 K / 22 MPa near the
    right edge. Phase region labels (SOLID, LIQUID, GAS, SUPERCRITICAL FLUID) are
    rendered in large bold text with matching colors and reduced opacity. The plot
    background is a subtle off-white (#f8f9fb) with light dashed grid lines. A legend
    at the bottom identifies all five series.'
