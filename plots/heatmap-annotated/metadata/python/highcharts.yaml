    text; implement brightness-based switching (dark text on light cells, light text
    on dark cells)'
  - 'Not using recommended BrBG diverging colormap: use stops mapped to BrBG rather
    than custom blue-orange'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct light surface
      Chrome: Title "heatmap-annotated · highcharts · anyplot.ai" clearly readable in dark ink at top. Y-axis labels (Revenue, Profit, Growth, ROI, Debt, Assets, Employees) readable in INK_SOFT on the left. X-axis labels at the bottom are PARTIALLY CUT OFF at the canvas edge — clipped and barely readable.
      Data: 7x7 correlation matrix heatmap with diverging blue-orange colorscale. Diagonal = 1 in deep orange; strongly negative values (e.g., -0.84) in deep blue; near-zero values fade to beige (PAGE_BG midpoint). Data labels in bold dark ink (#1A1A17) are readable across all cells. Colorbar on the right is narrow but functional.
      Legibility verdict: PASS with noted defect — x-axis bottom labels cut off

    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17) — correct dark surface
      Chrome: Title readable in near-white light text. Y-axis labels readable (light-colored #B8B7B0). X-axis bottom labels again cut off — on dark background these appear effectively invisible. Colorbar labels appear light-colored and readable.
      Data: Colors identical to light render (oranges and blues). Critical issue: colorscale midpoint is set to PAGE_BG which is #1A1A17 in dark mode — cells with correlation near zero (e.g., Growth-Profit = 0.00) render as near-black and MERGE with the dark background, causing cell grid structure to disappear for mid-range values. Data labels (near-white #F0EFE8) are visible on dark cells but contrast is marginal on moderately-colored cells.
      Legibility verdict: PARTIAL FAIL — near-zero cells lose visual structure in dark mode; x-axis bottom labels cut off and invisible
