    slope. Region labels appear near the bottom in italics. A subtitle reads "Mild
    Steel Tensile Test — E = 210 GPa, σᵧ = 250 MPa, UTS = 400 MPa". Top and right
    spines are removed. X-axis: "Engineering Strain (mm/mm)" 0.00–0.40; Y-axis: "Engineering
    Stress (MPa)" 0–~450. Legend shows "0.2% Offset Line".'
