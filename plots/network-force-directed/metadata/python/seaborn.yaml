review:
  strengths:
  - Correct force-directed layout implemented via inline Fruchterman-Reingold algorithm
    with deterministic seed
  - Bridge node detection and ring highlighting adds meaningful analytical layer to
    the network
  - Degree-based node sizing communicates centrality immediately and clearly
  - Selective hub labeling (75th-percentile threshold) shows design restraint
  - 'Full theme-adaptive chrome: backgrounds #FAF8F1/#1A1A17, all text/ticks/legend
    use INK tokens — both renders legible'
  - 'Complete spec compliance: nodes, edges, weighted edge thickness, degree scaling,
    community structure all present'
  - Network statistics annotation (nodes, edges, avg degree, bridges) adds quantitative
    context
  - Clean flat code with seed, no functions/classes, correct plot-{THEME}.png output
  weaknesses:
  - Seaborn's role is narrow — only the node scatter layer uses sns.scatterplot; all
    edges, bridge rings, annotations, and the layout algorithm are pure matplotlib,
    limiting library mastery score
  - 'DE-01 gap: design is intentional and above defaults but not yet at publication
    quality — node styling is clean but the overall aesthetic could be more refined
    (e.g., softer edge alpha, gradient node sizing, or a visual ''hero'' node)'
  - 'DE-02 gap: spine treatment keeps left+bottom which may feel heavy for a network
    viz where axes carry no semantic meaning — removing all spines (ax.axis(''off'')
    style) would give a cleaner floating-graph look'
  - Hub label font size (16pt) is correct per spec but the offset (12 points) is tight;
    some labels risk clipping or appearing very close to the node marker at full resolution
  - Edge drawing uses uniform linewidth formula (1 + weight*2) with weight range 0.5-1.0,
    giving edges in the 2-3pt range — variation is subtle and weight encoding is hard
    to perceive visually
