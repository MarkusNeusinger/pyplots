  image_description: 'The plot shows a vertical dendrogram of 15 iris flower samples
    (5 per species) clustered using Ward''s method. Leaf labels are displayed at the
    bottom at a 45° angle. Branches are color-coded by species purity: dark blue (#306998)
    for Setosa clusters, orange (#E8833A) for Versicolor, green (#55A868) for Virginica,
    and grey (#888888) for mixed-species merges. The Setosa cluster is clearly separated
    from the others, merging at distance ~10, while Versicolor and Virginica merge
    at ~4.5. The y-axis is labeled "Ward Linkage Distance" with values from 0 to ~10.
    The title reads "Iris Species Clustering · dendrogram-basic · plotnine · pyplots.ai".
    The background uses theme_minimal with subtle horizontal gridlines.'
