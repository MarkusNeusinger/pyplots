  strengths:
  - Excellent spec compliance with all required psychrometric property lines, comfort
    zone, and HVAC process path present
  - Physically accurate data using proper ASHRAE psychrometric equations
  - Good visual hierarchy with distinct colors and line styles for each property type
  - Effective use of plotnine identity scales for flexible per-group styling
  - Clean data storytelling with the red HVAC process arrow as focal point
  weaknesses:
  - Label overlap in the 25-30°C region where RH, wet-bulb, and annotation labels
    crowd together
  - On-chart labels (geom_text size 6-7) are slightly small for reliable readability
  - Enthalpy and specific volume lines could be more distinct from each other
  - Library mastery could leverage more plotnine-distinctive features
  image_description: The plot shows a psychrometric chart with dry-bulb temperature
    (°C) on the x-axis ranging from -10 to 50, and humidity ratio (g/kg dry air) on
    the y-axis from 0 to 30. The saturation curve (100% RH) is drawn as a thick dark
    blue line forming the upper boundary of the chart. Lighter blue curves show relative
    humidity from 10% to 90% in 10% increments. Orange diagonal lines represent wet-bulb
    temperatures (0°C to 30°C). Green dashed diagonal lines show constant enthalpy
    values (10-110 kJ/kg). Purple/gray dotted lines show constant specific volume
    (0.80-0.92 m³/kg). A light blue shaded polygon marks the comfort zone (~20-26°C,
    30-60% RH) with a bold "Comfort Zone" label. A red arrow shows an HVAC cooling/dehumidification
    process from point A (35°C, 50% RH) to point B (24°C, 50% RH) with red dot markers
    at both state points. The background is light gray (#FAFAFA) with subtle grid
    lines. Title reads "psychrometric-basic · plotnine · pyplots.ai" in bold at the
    top.
