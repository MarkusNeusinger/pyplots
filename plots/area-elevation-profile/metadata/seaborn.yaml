  - Grid styling could be more refined (e.g., dashed style, custom tick spacing)
  image_description: The plot displays a terrain elevation profile along a 120 km
    hiking transect. The x-axis shows "Distance (km)" from 0 to 120, and the y-axis
    shows "Elevation (m)" ranging from ~900 to ~1700. The title reads "area-elevation-profile
    · seaborn · pyplots.ai" in medium-weight font. The terrain silhouette is filled
    with a green gradient that transitions from light sage green at lower elevations
    to deeper forest green at higher elevations, creating an attractive topographic
    effect. A blue (#306998) profile line traces the elevation contour, with blue
    circular markers at seven landmark positions. Each landmark is annotated with
    bold text showing the name and elevation (e.g., "Summit 1702 m") inside rounded
    white boxes with subtle gray borders, connected to the profile by dashed vertical
    lines. Landmarks include Trailhead (1328 m), North Peak (1491 m), Lake Valley
    (1052 m), Ridge Pass (1300 m), River Crossing (936 m), Summit (1702 m), and End
    Station (1438 m). A "Vertical exaggeration ~10×" note appears in gray at the lower
    right. Top and right spines are removed, with a subtle y-axis grid. The background
    is a light off-white (#fafaf8).
