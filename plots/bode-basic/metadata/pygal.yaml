review:
  strengths:
  - Excellent dual-panel composition using PIL to combine two pygal charts with a
    refined divider
  - Rich engineering annotations with color-coded margin indicators and stability
    assessment
  - Creative use of pygal native SVG interactivity in HTML export alongside static
    PNG
  - Perfect spec compliance with all required features plus bonus references (-3 dB,
    -90°)
  - Realistic third-order transfer function data with clear resonance behavior
  weaknesses:
  - Legend entries are lengthy, creating slight density at the bottom of each panel
  - The -3 dB bandwidth line could be slightly more visible while remaining subtle
  - Two helper functions (formatters) are a minor KISS deviation
  image_description: 'The plot displays a dual-panel Bode plot for a third-order system
    frequency response. The top panel shows magnitude (dB) vs frequency (Hz) on a
    logarithmic scale from 0.1 to 1000 Hz. A blue curve starts near 0 dB, rises to
    a resonance peak of ~8.1 dB around 4.8 Hz, then rolls off steeply. A red dashed
    0 dB reference line and a subtle gray -3 dB bandwidth line are drawn horizontally.
    A purple dashed vertical line marks the gain margin at ~11.1 Hz. An annotation
    panel in the upper right with a white rounded-rectangle background shows: "Resonance
    Peak: 8.1 dB @ 4.8 Hz", "Gain Margin: 12.2 dB @ 11.1 Hz", and "H(s): 3rd-order,
    ωn=5 Hz, ζ=0.2". The bottom panel shows phase (°) vs frequency (Hz). A blue phase
    curve starts near 0° and rolls off to approximately -270°. Red dashed -180° and
    subtle gray -90° reference lines are drawn. A teal dashed vertical line with dots
    marks the phase margin at ~6.7 Hz. An annotation panel shows "Phase Margin: 26.0°
    @ 6.7 Hz" and "System Status: Stable (PM > 0°)". Background is light blue-white,
    plot backgrounds are light gray-blue. Legends at the bottom of each panel list
    series names. A thin divider separates the two panels.'
