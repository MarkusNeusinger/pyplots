  image_description: The plot displays a flame graph visualization of CPU profiling
    data for web server request handling. The chart uses Highcharts' columnrange series
    type in inverted mode to create horizontal bars stacked bottom-to-top. The root
    function "main (100.0%)" spans the full width at the bottom (Depth 6) in a warm
    orange tone. Above it, "process_request" dominates most of the width, with "log_metrics"
    and "gc_collect" as smaller siblings. The hierarchy continues upward through parse_headers,
    authenticate, handle_route (the widest mid-level bar), then query_database, render_template,
    apply_middleware, and down to leaf functions like fetch_rows, compile_template,
    build_query, serialize_json at the top depths. Colors use a warm flame palette
    of yellows, oranges, and reds with varied assignment per bar. Function names are
    displayed in white monospace font with dark rgba text outlines inside bars, with
    intelligent truncation for narrow bars. The title "flamegraph-basic · highcharts
    · pyplots.ai" appears at top center in bold, with a subtitle showing sample count.
    The "Stack Depth" axis label is on the left. No legend is shown. The chart fills
    most of the 4800x2700 canvas.
