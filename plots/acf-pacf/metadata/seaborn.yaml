review:
  strengths:
  - Excellent significance-based color coding differentiating important lags from
    noise
  - Manual ACF/PACF computation via Durbin-Levinson recursion avoids external dependencies
  - FacetGrid with shared x-axis and custom stem_plot function is well-executed seaborn-native
    approach
  - CI confidence band with subtle fill and dashed lines is visually refined
  - Annotations on first significant lags guide viewer attention effectively
  weaknesses:
  - Annotation font sizes (13pt, 11pt) slightly undersized for large canvas
  - ARMA context only visible in code comments, not communicated to viewer
  - Stem plot simulation via narrow barplot is creative but not native seaborn
  image_description: 'The plot displays two vertically stacked panels on a clean white
    background. The top panel shows the Autocorrelation Function (ACF) with stem-like
    narrow bars and circular markers from lag 0 to lag 35. Dark blue (Python Blue
    #306998) stems indicate statistically significant lags, while light blue (#A8C4D8)
    stems show values within the 95% confidence interval. The ACF exhibits a clear
    exponential decay from 1.0 at lag 0, with the first ~8 lags being significant.
    An annotation "lag 1: 0.79" with an arrow highlights the first significant lag.
    Orange dashed horizontal lines mark the confidence bounds, with a subtle orange
    fill between them. The bottom panel shows the Partial Autocorrelation Function
    (PACF) starting from lag 1, with a sharp spike at lag 1 (~0.79, annotated similarly)
    and a negative value at lag 2, then values mostly within the CI bounds. Y-axes
    are labeled "Autocorrelation (ACF)" and "Partial Autocorrelation (PACF)", x-axis
    reads "Lag (months)". A legend in the upper right shows Significant, Within CI,
    and 95% CI entries. Title reads "acf-pacf · seaborn · pyplots.ai".'
