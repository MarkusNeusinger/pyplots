  image_description: The plot displays a 16-QAM constellation diagram on a square
    canvas with equal aspect ratio. Sixteen ideal constellation points are shown as
    large red X markers at grid positions ±1 and ±3 on both I and Q axes. One thousand
    received symbols appear as semi-transparent blue dots (alpha ~0.35) clustered
    around each ideal point. A subtle checkerboard pattern in alternating light gray
    (#F0F4F8) and white shades the 4×4 decision regions. Dashed gray decision boundary
    lines are drawn at -2, 0, and 2 on both axes. Twelve red semi-transparent error
    vector segments connect ideal points to their corresponding received symbols.
    The title "scatter-constellation-diagram · plotnine · pyplots.ai" is bold and
    centered at top. Axes are labeled "In-Phase (I)" (x) and "Quadrature (Q)" (y)
    with tick marks at -3, -1, 0, 1, 3. Bold annotation "EVM = 9.9%" appears in the
    bottom-right, with smaller gray text "SNR = 20 dB · 1000 symbols" beneath it.
