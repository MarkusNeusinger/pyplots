review:
  strengths:
  - Clean elbow connectors give the tree a professional structured appearance
  - EMV rollback calculations are mathematically correct and clearly displayed
  - Pruned branches effectively distinguished with dashed lines and red X cross marks
  - Realistic product launch business scenario with plausible payoffs and probabilities
  - Good use of theme_void() for a clean diagram
  weaknesses:
  - Terminal node payoff text overlaps triangle markers - need offset adjustment
  - Terminal nodes use upward-pointing triangles instead of spec-required right-pointing
    triangles
  - Branch label text size 8-9 is too small for optimal readability
  - Manual legend is verbose and could be more compact
  - No distinctive lets-plot features leveraged - implementation is generic ggplot
    grammar
  image_description: The plot displays a decision tree for a "Product Launch Strategy"
    with a left-to-right layout. Decision nodes are rendered as blue squares (#306998),
    chance nodes as orange/yellow circles (#E8A838), and terminal nodes as green upward-pointing
    triangles (#6AAB6A). Branches use elbow (orthogonal) connectors — active branches
    are solid dark gray lines, while pruned branches (License Tech, Maintain) are
    dashed gray with red X cross marks. EMV values ($450K, $440K) are shown in bold
    below decision/chance nodes. Terminal payoff values ($900K, $600K, $350K, $250K,
    $200K, -$200K) appear next to their respective triangles. A manually constructed
    legend in the bottom-right identifies the three node types. The title reads "Product
    Launch Strategy · tree-decision · letsplot · pyplots.ai" centered at the top.
    Probabilities are displayed on chance branches (0.3, 0.5, 0.2, 0.6, 0.4).
