  strengths:
  - Clean heatmap with removed grid, outline, and minor ticks creating a professional
    appearance
  - Logarithmic color scale with viridis palette effectively visualizes the wide range
    of cycle counts
  - Realistic vehicle suspension fatigue data with three distinct cycle clusters showing
    typical loading patterns
  - Bokeh-specific interactive features (HoverTool, HTML export) add value beyond
    the static PNG
  - Zero-count bins clearly distinguished with white background as spec requires
  weaknesses:
  - Title has extra descriptive prefix instead of strict spec-id · library · pyplots.ai
    format
  - 45 hardcoded hex colors instead of using Bokeh built-in Viridis256 palette from
    bokeh.palettes
  - Colorbar is narrow with cramped title; could be wider and better proportioned
  - Data storytelling limited — no annotations or visual emphasis highlighting the
    dominant loading cluster or the engineering significance of the pattern
  image_description: The plot displays a square (3600x3600) rainflow counting matrix
    heatmap for a vehicle suspension component. The x-axis shows "Cycle Mean Stress
    (MPa)" ranging from -100 to 300, and the y-axis shows "Cycle Amplitude (MPa)"
    ranging from ~10 to 210. A viridis color scheme maps cycle counts on a logarithmic
    scale, from dark purple (low counts ~3) through teal/green to bright yellow (high
    counts ~5000). A colorbar on the right is labeled "Cycle Count" with log-scale
    tick marks. The heatmap reveals a bright yellow concentration at low amplitude
    (~40 MPa) and moderate mean stress (~80 MPa), a secondary greenish cluster at
    moderate amplitude (~90 MPa) and mean ~120 MPa, and sparse dark purple cells at
    high amplitudes representing rare severe loading events. Zero-count bins at the
    periphery are white, cleanly distinguishing empty from populated bins. Grid lines,
    outline, and minor ticks are removed for a clean appearance. The title reads "Rainflow
    Counting Matrix · heatmap-rainflow · bokeh · pyplots.ai".
