  image_description: 'The plot displays a vertical dendrogram of 15 iris flower samples
    clustered into three species groups (Setosa, Versicolor, Virginica) using Ward''s
    method. Each species cluster is rendered in a distinct color: light blue for Setosa
    (left group of 5), pink/mauve for Versicolor (center group of 5), and orange for
    Virginica (right group of 5). Cross-group merges at higher distances are drawn
    in dark gray/black. Subtle colored background rectangles shade each species cluster
    region. Leaf labels are rotated ~45 degrees at the bottom, with species group
    labels below each cluster. The y-axis shows "Distance (Ward''s Method, √ scale)"
    ranging from 0 to ~10, and the x-axis is labeled "Iris Sample". A 4-entry legend
    in the top-left identifies each color. The title reads "Iris Species Clustering
    · dendrogram-basic · bokeh · pyplots.ai". The design is clean with subtle grid
    lines and no chart outline.'
