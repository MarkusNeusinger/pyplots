  image_description: 'The plot displays a basic arc diagram with 10 character nodes
    (Alice, Bob, Carol, David, Eve, Frank, Grace, Henry, Iris, Jack) arranged along
    a horizontal line near the bottom of the canvas. Each node is rendered as a colored
    circle with white borders, sized proportionally to connection degree — Alice is
    the largest as the most connected character. Arcs curve above the horizontal line
    connecting character pairs, with arc height proportional to the distance between
    connected nodes. Long-range connections (e.g., Alice→Jack, Alice→Henry) form tall
    arcs spanning the full width, while short-range connections (e.g., Carol→David,
    Eve→Grace) form smaller arcs. Arcs are semi-transparent (50% opacity) with colors
    inherited from the source node. The title "arc-basic · highcharts · pyplots.ai"
    appears at the top in bold dark text, with a subtitle "Character interactions
    — Dialogue exchanges between characters in a story chapter" below it. The background
    is white, and the layout is clean with generous margins. Colors used: Alice (dark
    blue), Bob (golden yellow), Carol (cyan), David (purple), Eve (green), Frank (orange),
    Grace (brown), Henry (blue), Iris (pink), Jack (teal).'
