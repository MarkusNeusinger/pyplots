  image_description: 'The plot displays an Ichimoku Kinko Hyo technical indicator
    overlaid on a candlestick price chart spanning from approximately March 2024 to
    November 2024. Candlesticks use green (bullish) and deep orange (bearish) coloring.
    Five Ichimoku indicator lines are visible: a dark blue Tenkan-sen (9), an orange
    dashed Kijun-sen (26), a purple dashed Chikou Span, a teal Senkou Span A, and
    a brown Senkou Span B. The Kumo (cloud) is filled between Senkou Span A and B
    with a green tint for bullish regions and a pink/red tint for bearish regions.
    Two diamond-shaped annotations mark "Bullish TK Cross" (bottom-left, green) and
    "Bearish TK Cross" (mid-chart, red). A legend titled "Ichimoku Components" sits
    in the upper-right corner with a white background panel listing all five components.
    The title reads "indicator-ichimoku · altair · pyplots.ai" with a subtitle "Ichimoku
    Kinko Hyo (9, 26, 52) — Tenkan / Kijun / Kumo / Chikou". The Y-axis is labeled
    "Price ($)" ranging from ~126 to 180, and the X-axis is labeled "Date" with monthly
    tick marks. Price trends upward from ~$134 to ~$178, then declines. The cloud
    extends into the future beyond the candlestick data, as required by the specification.'
