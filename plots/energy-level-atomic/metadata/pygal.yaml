  strengths:
  - Physically meaningful color scheme mapping UV/visible/IR transitions to purple/spectrum/warm
    palettes
  - 'Strong data storytelling with visual hierarchy: H-alpha focal point, decreasing
    line widths for higher-order transitions, spatial grouping by series'
  - Perfect data quality using real hydrogen atom physics with accurate energy values
    and wavelengths
  - Good use of pygal-specific features (per-point node sizing, stroke_style, custom
    y-labels)
  - Clean nonlinear y-scale that spaces converging upper levels for readability
  weaknesses:
  - Arrows approximated with asymmetric dots rather than true directional indicators
    (pygal XY limitation)
  - Small helper function breaks pure KISS structure
  - Some upper-level origin dots slightly small for the 4800x2700 canvas
  image_description: 'The plot displays a hydrogen atom energy level diagram on a
    light lavender (#F4F5FB) background. Six horizontal gray lines represent energy
    levels from n=1 (−13.60 eV) at bottom to n=6 (−0.38 eV) near top, with a prominent
    dashed red ionization line at 0.00 eV at the very top. Vertical colored lines
    with asymmetric dots (large at destination, small at origin) represent emission
    transitions grouped into three spectral series: Lyman series (deep indigo, violet,
    magenta-pink) transitioning to n=1 on the left, Balmer series (red, teal/cyan,
    blue, deep violet) transitioning to n=2 in the center, and Paschen series (burnt
    orange, gold, bronze) transitioning to n=3 on the right. The H-alpha (656 nm)
    transition has the thickest line and largest dots, serving as the visual focal
    point. The y-axis is labeled "Energy (eV)" with custom labels showing quantum
    numbers and energy values. The title reads "Hydrogen Atom · energy-level-atomic
    · pygal · pyplots.ai". A legend at the bottom in 4 columns identifies all transitions
    with their wavelengths.'
