    at ~2595m, and Wengen (End) at ~876m. Each landmark has a name label and elevation
    value displayed above the marker. The title reads "Bernese Oberland Trail · area-elevation-profile
    · altair · pyplots.ai" in large font with a subtitle noting the 120 km transect
    and ~10× vertical exaggeration. Grid lines are very subtle (0.15 opacity). The
    view has no border stroke.'
