review:
  strengths:
  - Excellent flame graph layout with correct caller-to-callee hierarchy and proportional
    bar widths
  - Hot path highlighting via opacity creates effective visual storytelling
  - Realistic CPU profiling data with meaningful function names and plausible sample
    distributions
  - Good use of Altair layer composition (mark_rect + mark_text) and interactive features
    (tooltips, zoom/pan)
  - Informative subtitle narrating the hot path
  weaknesses:
  - numpy is imported but serves no purpose — data is entirely deterministic with
    no random generation
  - Color palette, while conventional for flame graphs, could be slightly more accessible
    with a perceptually uniform warm gradient
  image_description: 'The plot displays a flame graph with 6 depth levels (0-5) stacked
    bottom-to-top. The root "main" bar spans the full width (500 samples) at depth
    0 in pale yellow. At depth 1, "request_handler" (420 samples) and smaller "gc_collect",
    "logger" bars appear in warm yellow. Deeper levels show progressively warmer orange-to-red
    colors: "process_request", "parse_headers", "route_dispatch" at depth 2; "db_query",
    "template_render", "decode_utf8", "regex_match" at depth 3; "execute_sql", "render_html"
    at depth 4; "fetch_rows" and "parse_query" in deep red at depth 5. The hot path
    (main → request_handler → process_request → db_query → execute_sql) is rendered
    at full opacity while non-hot-path bars are faded to ~0.6 opacity. Function names
    are labeled inside bars when wide enough. White thin strokes separate adjacent
    bars. Title reads "flamegraph-basic · altair · pyplots.ai" with a subtitle showing
    the hot path. Axes labeled "Samples (count)" and "Stack Depth (level)".'
