  - Some wasted canvas space on right side due to wide x_range extending beyond data
    extent
  - Axis lines could be styled more subtly for a cleaner look
  image_description: 'The plot displays a meta-analysis funnel plot on a light gray
    (#FAFAFA) background with a 4800x2700 canvas. The Y-axis shows Standard Error
    (inverted, 0 at top to ~0.55 at bottom) and the X-axis shows Log Odds Ratio (ranging
    from about -0.8 to 1.4). A light blue filled polygon with dashed borders forms
    the inverted funnel shape representing the pseudo 95% confidence interval. A solid
    blue vertical line marks the summary effect at ~0.26, with a "Summary: 0.26" label
    near the top. A dashed gray vertical line marks the null effect at 0, labeled
    "Null (0)". Fifteen study points are plotted as blue circles with white borders,
    varying in size (larger = more precise/higher weight) and opacity (darker = more
    precise). Most precise studies cluster near the top around the summary effect,
    while smaller, less precise studies scatter more widely. Notably, the less precise
    studies (bottom of plot) are shifted rightward, showing clear funnel asymmetry.
    A bold red annotation reads "← Asymmetry suggests publication bias" in the lower-right
    area. The title reads "funnel-meta-analysis · bokeh · pyplots.ai" centered at
    the top. Grid lines are very subtle (alpha 0.15).'
