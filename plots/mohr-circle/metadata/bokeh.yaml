    "Normal Stress σ (MPa)" and the vertical axis "Shear Stress τ (MPa)". Principal
    stresses are marked with red diamond markers at σ₁ = 93.0 MPa (right) and σ₂ =
    -43.0 MPa (left) on the horizontal axis. Maximum shear stress is shown with green
    triangle markers at the top (τ_max = 68.0 MPa) and bottom (-τ_max = 68.0 MPa)
    of the circle. Stress points A (80, 40) and B (-30, -40) are marked with blue
    circle markers, connected by a dashed gray diameter line through the center. A
    red arc near the center shows the 2θp = 36.0° angle. A vertical dashed gray reference
    line passes through the center, and a horizontal gray line at y = 0. The title
    reads "Mohr's Circle for Stress Analysis · mohr-circle · bokeh · pyplots.ai".
    Center/radius info annotation at the bottom reads "Center = (25.0, 0) | R = 68.0
    MPa". Grid lines are very subtle (alpha 0.2). The overall appearance is clean
    and well-organized.
