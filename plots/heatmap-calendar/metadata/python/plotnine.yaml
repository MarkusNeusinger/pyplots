      Data: viridis data colors are identical to the light render — same purple-to-yellow progression. Zero/NA cells render as near-black, matching the dark background. The seasonal and weekend patterns are identically visible.
      Legibility verdict: PASS — no dark-on-dark failures; all chrome is properly adapted to dark theme.
