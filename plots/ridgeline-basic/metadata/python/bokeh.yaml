review:
  strengths:
  - Viridis temperature-to-color encoding is clever and meaningful — cold months purple,
    warm months yellow creates immediate visual storytelling
  - Both themes are fully correct and professional-looking with no chrome adaptation
    failures
  - Clean L-frame, subtle dual-alpha grid (x=0.10, y=0.05), removed y-axis ticks —
    refined visual design
  - 'Idiomatic Bokeh: FactorRange with categorical (month, offset) tuple coordinates
    is a distinctive technique'
  - HoverTool adds genuine interactive value; HTML export alongside PNG
  - Smooth KDE with Silverman's bandwidth rule produces excellent density curves
  weaknesses:
  - 'Canvas utilization: ~20% of canvas height below Dec row is empty and data cloud
    does not extend into lower-right quadrant — reduce range_padding or adjust ridge_height
    to fill canvas better'
  - Viridis temperature-color encoding lacks a colorbar to make the mapping explicit
    to the viewer
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white
      Chrome: Title "ridgeline-basic · bokeh · anyplot.ai" in top-left — readable dark text. Y-axis label "Month" and x-axis label "Temperature (°C)" both clearly visible with dark ink. Month tick labels (Jan-Dec) and temperature tick labels all readable with INK_SOFT muted color.
      Data: 12 Viridis-colored ridgeline density curves stacked vertically. Cold months (Jan, Dec, Nov, Feb) in dark purple; transitioning through teal (Mar, Oct), green (Apr, Sep), bright green (May, Aug), to yellow (Jun, Jul). First series (bottom data, temp-encoded) is not Okabe-Ito but Viridis which is correct for this continuous temperature encoding. Ridge curves are smooth with fill_alpha=0.85.
      Legibility verdict: PASS — all text readable against light background, no light-on-light issues

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black
      Chrome: Title and axis labels in light #F0EFE8 ink, clearly visible on dark surface. Tick labels in #B8B7B0 (INK_SOFT dark variant) — fully readable. No dark-on-dark failures anywhere. Grid lines are subtle with low alpha.
      Data: Viridis colors are identical to light render — purple through yellow gradient preserved exactly. No data color changes between themes.
      Legibility verdict: PASS — all text readable against dark background, no dark-on-dark failures
