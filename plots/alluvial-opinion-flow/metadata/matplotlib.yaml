review:
  strengths:
  - Clean hand-crafted alluvial diagram using matplotlib Path/PathPatch API with smooth
    bezier curves
  - Effective opacity-based distinction between stable and changing flows creates
    clear visual hierarchy
  - Professional custom color palette that is cohesive and mostly colorblind-accessible
  - Data tells a clear polarization narrative with Neutral shrinking and extremes
    growing
  - Well-structured readable code with clean KISS architecture
  - Complete legend with both flow-type and category-color distinction
  weaknesses:
  - Node label font sizes (12-14pt) below recommended 16pt minimum, cramped in smaller
    nodes
  - No explicit net flow highlighting or annotation for polarization trend as spec
    requests
  - Blue and teal colors could be confusable for deuteranopia viewers
  - Legend Changed opinion alpha (0.15) does not match actual flow alpha (0.25)
  - Could leverage more distinctive matplotlib features like gradient fills or FancyBboxPatch
  image_description: 'The plot shows an alluvial/Sankey-style diagram tracking employee
    engagement survey responses across 4 quarterly waves (Q1 2025 through Q4 2025).
    Each wave column contains 5 stacked rectangular nodes from bottom to top: Strongly
    Agree (dark blue #306998), Agree (teal #2A9D8F), Neutral (gray #95A5A6), Disagree
    (orange #E67E22), and Strongly Disagree (red #C0392B). Each node displays an abbreviated
    category label and respondent count (e.g., "Str. Agree n=180"). Smooth bezier-curve
    flows connect categories between consecutive waves — stable flows (same category)
    appear at higher opacity (~0.6) in the source category''s color, while changed-opinion
    flows are rendered at lower opacity (~0.25). The title reads "alluvial-opinion-flow
    · matplotlib · pyplots.ai" at the top. A legend at the bottom left distinguishes
    "Stable (same opinion)" and "Changed opinion" alongside category color swatches,
    arranged in a 4-column layout. The background is white with axes turned off. A
    visible polarization trend emerges: Neutral shrinks from n=220 to n=140 while
    Strongly Agree grows from n=180 to n=240 and Strongly Disagree from n=150 to n=200.'
