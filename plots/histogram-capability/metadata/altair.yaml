  image_description: The plot displays a process capability histogram for shaft diameter
    measurements (mm). Blue rectangular bars form the histogram distribution centered
    around 10.002 mm, overlaid with a dark blue fitted normal distribution curve.
    Orange dashed vertical lines mark the LSL (9.950) and USL (10.050) specification
    limits, labeled in bold orange text at the top. A purple dashed vertical line
    indicates the Target (10.000), labeled in purple. A light gray dashed line marks
    the sample mean (x̄=10.002) near the bottom. Background shading distinguishes
    in-spec (light green) from out-of-spec (light peach/orange) zones. The Cp=1.49
    and Cpk=1.45 capability indices are annotated in bold dark text at the top-right,
    with a green "CAPABLE" status below. The subtitle shows n=200, σ=0.0112 mm. Axis
    labels read "Shaft Diameter (mm)" and "Frequency" with appropriate font sizes.
    The overall layout is clean with no grid lines and good use of canvas space.
