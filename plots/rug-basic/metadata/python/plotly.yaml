    (bottom line only, no left line); standard practice is L-shaped (left+bottom)
    or no spines
  - symbol='line-ns' with size=30 produces markers slightly wide for narrow rug ticks;
    reducing size to 20-22 with line.width=1.5 would make each observation crisper
