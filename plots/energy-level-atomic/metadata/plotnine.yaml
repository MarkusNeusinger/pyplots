  image_description: 'The plot displays an atomic energy level diagram for the hydrogen
    atom on a light off-white background (#FAFBFC). Six horizontal blue (#306998)
    energy level lines span partial width of the plot (from ~15% to ~78% of the canvas),
    each terminated with blue endpoint dots. The levels are positioned using a nonlinear
    (signed sqrt) vertical scale, with the y-axis labeled "Energy (eV)" showing tick
    marks at -13.6, -3.4, -1.5, -0.85, and 0. Right-side labels connected by subtle
    gray lines identify each level (e.g., "n = 1 (-13.60 eV)" through "n = 6 (-0.38
    eV)"). A dashed gray line at 0 eV marks the ionization limit. Six downward arrows
    represent emission transitions: three Lyman series (UV) arrows in purple (#7B2FBE,
    Ly-α 122 nm), deep indigo (#4338CA, Ly-β 103 nm), and magenta (#DB2777, Ly-γ 97
    nm); and three Balmer series (Visible) arrows in red (#DC2626, Hα 656 nm), emerald
    (#059669, Hβ 486 nm), and amber (#D97706, Hγ 434 nm). Each arrow is labeled with
    its series name and wavelength. Subtle shaded bands (light purple for Lyman, light
    red for Balmer) group the transitions visually. Series group labels ("Lyman Series
    (UV)" and "Balmer Series (Visible)") appear at the top in matching colors. The
    title reads "energy-level-atomic · plotnine · pyplots.ai" in bold, with a subtitle
    "Hydrogen Atom Emission Spectrum — Lyman (UV) & Balmer (Visible) Series".'
