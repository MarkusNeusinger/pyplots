  image_description: 'The plot displays a multi-track genome browser view of the EGFR
    locus on chromosome 7 (~55,086,000-55,141,000 bp). Four tracks are stacked vertically
    sharing a common x-axis of genomic position. Genes track (top): dark blue rectangles
    represent 13 exons connected by thin blue intron lines, with small directional
    chevrons indicating + strand; the gene is labeled "EGFR (+)" in bold italic. Coverage
    track: a filled light-blue area plot showing read depth with distinct peaks correlating
    with exon positions. Variants track: lollipop markers with grey stems; blue circles
    for SNPs and orange circles for Indels, with stem height encoding quality scores.
    Regulatory track (bottom): colored rectangles - teal for Promoters, orange for
    Enhancers, purple for Insulator. Track labels appear in bold at the upper-left
    of each track. Alternating light grey/white background shading separates tracks
    with dashed grey separator lines. The x-axis shows formatted genomic coordinates
    with the label "Genomic Position (chr7)". A legend on the right identifies Variant
    Type and Regulatory element types. The title reads "genome-track-multi · plotnine
    · pyplots.ai".'
