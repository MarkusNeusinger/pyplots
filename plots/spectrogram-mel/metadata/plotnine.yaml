review:
  strengths:
  - Excellent data synthesis with harmonics, chirp sweep, and time-varying amplitudes
    creating a visually compelling and information-rich spectrogram
  - Custom inferno gradient with dark panel/plot backgrounds creates a cohesive, professional
    dark theme aesthetic
  - Manual mel filterbank implementation avoids librosa dependency while remaining
    clean and vectorized
  - Full spec compliance with all required features correctly implemented
  - Annotations (F0, 3rd harmonic) and reference lines add meaningful data storytelling
  weaknesses:
  - Library Mastery remains the main gap — implementation uses standard plotnine features
    without leveraging more distinctive capabilities like stat layers or custom geoms
  - Small helper function hz_to_band() slightly breaks KISS linear-flow principle
  image_description: The plot displays a mel-spectrogram on a dark background with
    time (0–3 seconds) on the x-axis and mel-scaled frequency on the y-axis, with
    Hz labels at key mel band edges (128, 256, 512, 1024, 2048, 4096, 8000 Hz). The
    colormap is a custom inferno-like gradient progressing from very dark black/purple
    (low power around -60 dB) through magenta and orange to bright yellow (0 dB).
    Clear horizontal bands of energy are visible at harmonic frequencies (~220, 440,
    880 Hz), with lower harmonics being brightest and decaying over time. A prominent
    chirp sweep arcs from approximately 500 Hz at t≈0.8s up to ~4000 Hz at t≈2.0s,
    creating a striking curved bright line that serves as a visual focal point. Annotations
    label the fundamental frequency ("F₀") and "3rd" harmonic, with subtle reference
    lines at those frequencies. A colorbar on the right is labeled "Power (dB)" with
    a tall key. The title reads "spectrogram-mel · plotnine · pyplots.ai" in bold
    light gray. The panel background is black (#000004) matching the colormap floor,
    and the outer plot background is dark navy (#0e0e1a), creating a cohesive dark
    theme.
