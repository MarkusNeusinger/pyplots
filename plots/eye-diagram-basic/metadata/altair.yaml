review:
  strengths:
  - Excellent data generation with realistic NRZ signal simulation including proper
    sigmoid transitions, noise, and jitter
  - Smart pre-binning approach to handle Altair data row limits
  - Good colormap choice (inferno) for density visualization
  - Perfect spec compliance with all required features present
  - Log-density transform improves visual contrast
  weaknesses:
  - Tick labels on both axes are extremely dense and overlap, severely hurting readability
  - No colorbar to indicate what color intensity represents
  - Layout feels compressed with too many auto-generated tick marks
  - Code uses numpy binning rather than Altair native aggregation capabilities
  image_description: The plot displays a density heatmap eye diagram using the inferno
    colormap on a white background. Two horizontal bands of high density (bright yellow/orange)
    are visible at the 0V and 1V signal levels, connected by diagonal transition regions
    forming the classic eye-shaped opening. The x-axis is labeled "Time (UI)" ranging
    from 0 to ~2, and the y-axis is labeled "Voltage (V)" ranging from approximately
    -0.19 to 1.17. The title reads "eye-diagram-basic · altair · pyplots.ai" at the
    top. The tick labels on both axes are extremely dense — the y-axis shows values
    at ~0.04V increments and the x-axis at ~0.07 UI increments, causing significant
    crowding and partial overlap. There is no colorbar or legend indicating what the
    color intensity represents. The eye opening is clearly visible with lower-density
    scattered points in the transition regions.
