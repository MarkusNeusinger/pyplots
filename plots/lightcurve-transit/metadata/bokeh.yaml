    dip centered at phase 0.5. A light blue confidence band surrounds the model curve.
    Very subtle error bars (whiskers) are visible on each data point at low opacity.
    The legend in the top-left corner identifies "Photometric Data" (scatter) and
    "Transit Model" (line). The title reads "lightcurve-transit · bokeh · pyplots.ai".
    Horizontal dashed grid lines appear at low opacity on the y-axis only. The Bokeh
    toolbar is visible on the right edge.
