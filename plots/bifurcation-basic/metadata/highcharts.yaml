  image_description: 'The plot displays a bifurcation diagram for the logistic map
    x(n+1) = r·x(n)·(1−x(n)). The x-axis shows "Growth Rate Parameter (r)" spanning
    2.5 to 4.0 with 0.25 tick intervals. The y-axis shows "Steady-State x" from 0
    to 1.0. Three color-coded scatter series tell the story: green points (r < 3.0)
    trace a single stable fixed-point line near x ≈ 0.6; blue points (3.0 ≤ r < 3.57)
    show the classic period-doubling fork splitting into 2 then 4 branches; purple
    points (r ≥ 3.57) fill the chaotic regime with dense scatter and visible windows
    of periodicity. Subtle background plot bands in matching tints delineate the three
    regions, labeled "Stable", "Period-Doubling", and "Chaos" at the bottom. Vertical
    dashed plot lines mark key bifurcation points: r ≈ 3.0 (period-2), r ≈ 3.449 (period-4),
    period-8, and onset of chaos. The title reads "bifurcation-basic · highcharts
    · pyplots.ai" with a subtitle showing the logistic map equation. A floating legend
    in the upper right identifies the three series. The background is a light off-white
    (#f8f9fb) with a subtle dotted y-axis grid.'
