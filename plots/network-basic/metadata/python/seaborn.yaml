    light / #F0EFE8 dark)'
  - Node label fontsize=11pt is too small for 4800x2700 canvas (minimum 16pt); legend
    items at 14pt also below minimum
  - Manual spring layout algorithm (25 lines of nested loops) should be replaced with
    networkx for cleaner more correct layout
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white close to #FAF8F1 (seaborn white theme)
      Chrome: Title "Social Network · network-basic · seaborn · pyplots.ai" at 24pt is clearly readable in dark text. Legend in upper-left with "Community" title and 4 team entries is readable. No axis labels (axis is off, appropriate for network graph).
      Data: 20 named nodes colored by team (4 groups using custom non-Okabe-Ito palette). Nodes sized by degree (400-1200 range). Grey edges at alpha=0.4 connect nodes. Spring layout produces diagonal band from upper-left (Team A) to lower-right (Team D) with community clustering visible.
      Legibility verdict: PASS — all text readable against light background, but node labels (11pt) and legend items (14pt) are below the 16pt minimum for the large canvas.

    Dark render (plot-dark.png):
      Background: Dark near-black close to #1A1A17
      Chrome: Title appears white/light and is readable. Legend text appears light and readable. No axis elements (axis off).
      Data: Node colors are identical to light render — community colors unchanged between themes as expected. Network structure identical.
      Legibility verdict: PASS for the rendered output — node labels inside colored circles appear readable. HOWEVER, the code hardcodes node label color as #222222 (near-black) and does not implement ANYPLOT_THEME handling. Readability in dark mode appears preserved only because colored circles provide intermediate contrast, not due to proper theme implementation. This is a code compliance failure even if the visual result appears acceptable.
