  image_description: 'The plot displays a hydrogen atom energy level diagram on a
    light gray (#fafbfc) background. Six horizontal dark lines represent energy levels
    from n=1 (−13.60 eV) at the bottom to n=6 (−0.38 eV) near the top, with a dashed
    ionization limit line at 0.00 eV labeled "n = ∞". Bold quantum number labels (n
    = 1 through n = ∞) appear at the right end of each level line, with staggered
    endpoints for clarity at converging upper levels. Nine vertical downward-pointing
    transition arrows are color-coded into three spectral series: Lyman (UV) in steel
    blue (#306998) targeting n=1, Balmer (Visible) in amber/gold (#E69F00) targeting
    n=2, and Paschen (IR) in pink (#CC79A7) targeting n=3. Each arrow has a filled
    triangular arrowhead pointing down (emission direction) and a rotated 90° italic
    wavelength annotation (e.g., 122 nm, 656 nm, 1875 nm). The y-axis shows "Energy
    (eV)" using a symlog scale with custom tick values at each energy level (-13.60,
    -3.40, -1.51, -0.85, -0.54, -0.38, 0.00). A legend titled "Spectral Series" appears
    in the upper right corner. The title reads "energy-level-atomic · altair · pyplots.ai"
    with subtitle "Hydrogen atom emission lines · energy levels: −13.6/n² eV". The
    grid is extremely subtle (8% opacity). The x-axis is hidden. Overall the chart
    has a clean, professional appearance with consistent dark text color and well-chosen
    colorblind-safe palette.'
