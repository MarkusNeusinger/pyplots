review:
  strengths:
  - 'Excellent use of lets-plot distinctive features: native arrow(), geom_label backgrounds,
    layer_tooltips for interactive hover'
  - Clean Feynman diagram layout with proper physics notation and reaction equation
  - Comprehensive legend showing all 4 particle types with correct line styles
  - Professional color palette with good visual hierarchy
  weaknesses:
  - Data storytelling could be stronger - no visual emphasis or focal point beyond
    basic diagram structure
  - Legend construction is verbose with many separate DataFrames
  - Gluon and boson line types only appear in the legend, not as propagators in the
    actual diagram
  image_description: 'The plot displays a Feynman diagram for electron-positron annihilation
    (e⁻e⁺ → γ → μ⁻μ⁺) on a light gray background with a white border. Four blue diagonal
    fermion lines with arrowheads converge at two black vertex dots in the center.
    An orange/gold wavy photon propagator line connects the two vertices horizontally.
    Particle labels (e⁻, e⁺, μ⁻, μ⁺) appear in rounded white boxes at the four endpoints,
    and a γ label sits above the photon line. A reaction equation "e⁻e⁺ → γ → μ⁻μ⁺"
    is displayed in blue-gray at the top center. A manual legend in the upper-left
    shows four particle types: Fermion (blue arrow), Photon (gold wavy), Gluon (teal
    curly), and Boson (purple dashed). A gray "time" arrow runs along the bottom.
    The title "feynman-basic · letsplot · pyplots.ai" appears bold in dark blue at
    the top-left.'
