    vertical line marks the null effect at 0, labeled "Null" in gray. Dashed light
    blue diagonal lines form the pseudo 95% CI funnel boundaries, with a very subtle
    light blue shaded polygon filling the funnel region. 15 study points are plotted
    with varying sizes (proportional to inverse-variance weight). Points inside the
    funnel are blue (#306998) and those outside are orange (#D4652A). A legend at
    the bottom-left shows "Inside funnel" (blue) and "Outside funnel" (orange) with
    a "region" header. An italic orange annotation reads "Asymmetry suggests publication
    bias" in the lower-right area. The title reads "funnel-meta-analysis · plotnine
    · pyplots.ai" in bold dark text.
