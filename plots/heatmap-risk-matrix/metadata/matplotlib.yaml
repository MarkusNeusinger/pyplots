  image_description: 'The plot displays a 5x5 risk assessment matrix with Likelihood
    (Rare to Almost Certain) on the Y-axis and Impact (Negligible to Catastrophic)
    on the X-axis. Each cell contains a risk score (product of likelihood x impact)
    displayed in semi-transparent bold text. The cells use rounded rectangles with
    a green-yellow-orange-red color gradient based on score severity. 12 risk items
    are plotted as colored circular markers with white edges and bold text labels:
    dark teal for Operational (Scope Creep, Deadline Slip, Supply Chain Disruption,
    Key Staff Turnover), dark purple for Financial (Budget Overrun, Vendor Failure,
    Regulatory Change, Market Shift), and dark blue for Technical (Data Breach, Server
    Outage, Cyber Attack, Power Failure). Two legends on the right show Category colors
    and Risk Level zones (Low 1-4, Medium 5-9, High 10-16, Critical 20-25). Title
    reads "heatmap-risk-matrix · matplotlib · pyplots.ai". Spines are removed and
    tick marks hidden.'
