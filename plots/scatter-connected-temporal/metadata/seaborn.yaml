  image_description: 'The plot displays a connected scatter plot of Unemployment Rate
    (%) on the x-axis versus Inflation Rate (%) on the y-axis, tracing Phillips curve
    dynamics from 1990 to 2023. Data points are connected by line segments in chronological
    order, with a blue sequential color gradient transitioning from light blue (1990)
    to dark navy (2023) encoding temporal progression on both markers and connecting
    line segments. White edge highlighting on circular markers distinguishes individual
    data points from the connecting lines. Six key years are annotated with bold labels
    and curved arrow connectors: 1990 (upper center, high inflation ~5.4%), 2000 (left
    side, low unemployment ~4.0%), 2009 (lower right, peak unemployment ~9.3% with
    near-zero inflation), 2012 (center right), 2019 (lower left, pre-pandemic low
    unemployment), and 2023 (upper left, post-pandemic with high inflation). A vertical
    colorbar on the right maps the blue gradient to year. The background is light
    gray (#f7f7f7), top and right spines are removed via sns.despine(), and subtle
    gridlines (alpha=0.15) appear on both axes. The title reads "scatter-connected-temporal
    · seaborn · pyplots.ai" in medium weight at the top. The path clearly shows cyclical
    economic patterns, the dramatic 2008-2009 recession excursion to the right, and
    the 2022 inflation spike shooting upward.'
