  image_description: 'The plot displays a psychrometric chart with dry-bulb temperature
    (-10 to 50°C) on the x-axis and humidity ratio (0 to ~30 g/kg dry air) on the
    y-axis. Blue curves represent relative humidity lines from 10% to 100%, with the
    100% saturation curve drawn thicker and more prominent. Gold/amber dashed lines
    show wet-bulb temperature isotherms running diagonally. Red-brown dash-dot lines
    indicate constant enthalpy values. Green dotted lines show constant specific volume.
    A light blue shaded rectangle marks the comfort zone approximately between 20-26°C.
    Orange arrows trace an HVAC process path through three labeled state points: A
    (35°C, 50%), B (13°C, 100%), and C (24°C, 50%), with orange dots at each point.
    The legend is positioned in the upper left corner. Title reads "psychrometric-basic
    · seaborn · pyplots.ai". Top and right spines are removed, and the grid is subtle
    with low alpha.'
