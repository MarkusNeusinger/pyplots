  image_description: 'The plot displays a MIDI piano roll visualization as a heatmap
    on a 16:9 canvas. The y-axis shows pitch labels (note names from B2 at bottom
    to A5 at top) with alternating light beige background shading for black-key rows
    versus white background for white-key rows. The x-axis shows 8 measures labeled
    M1-M8 with "Measure (4/4 time)" as the axis label. Notes appear as colored horizontal
    blocks: sustained chord tones in the lower register (C3-G4 range) appear as long
    dark navy/purple bars indicating low velocity, while melody notes in the upper
    register (D5-G5 range) appear as shorter, warmer-colored blocks (coral, orange,
    yellow) indicating higher velocity. A custom sequential colormap runs from deep
    navy (soft/low velocity ~35) through violet and coral to warm yellow (loud/high
    velocity ~127), shown in a vertical colorbar on the right labeled "Velocity (MIDI
    0-127)". Hierarchical vertical grid lines mark measure boundaries (thicker) and
    beat subdivisions (thinner). A red bold "ff" annotation appears above M5 where
    the melody reaches fortissimo, and a blue italic "pp" annotation appears in M6
    during a softer passage. A legend in the upper right shows "Soft (pp)" in navy
    and "Loud (ff)" in coral. The title reads "piano-roll-midi · seaborn · pyplots.ai".
    Spines are removed for a clean look.'
