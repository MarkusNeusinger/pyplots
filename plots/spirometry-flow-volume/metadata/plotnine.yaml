review:
  strengths:
  - Excellent clinical storytelling through the deficit ribbon between measured and
    predicted expiratory limbs
  - PEF annotation with contrasting red color creates a clear focal point
  - Clinical values (FVC, FEV1, PEF, FEV1/FVC) well-placed and informative
  - Clean deterministic data generation producing realistic spirometry curves
  - Professional color scheme with Python blue measured curve and muted gray predicted
    overlay
  weaknesses:
  - Ribbon alpha (0.15) is slightly faint - could be marginally more visible
  - Zero-flow reference line is very subtle and could be slightly more prominent as
    a clinical reference
  image_description: 'The plot displays a spirometry flow-volume loop on a light gray
    (#FAFBFC) background. Two curves are shown: a solid blue ("Measured") loop and
    a dashed gray ("Predicted") loop. The measured expiratory limb rises sharply from
    the origin to Peak Expiratory Flow (PEF) at approximately 9.5 L/s around 1.2L
    volume, then declines roughly linearly to meet the x-axis near 4.8L (FVC). The
    inspiratory limb forms a symmetric U-shape dipping to about -6 L/s. The predicted
    loop is larger, reaching ~10.5 L/s PEF and extending to ~5.2L FVC. A light blue
    shaded ribbon between the measured and predicted expiratory limbs illustrates
    the "Deficit vs Predicted." PEF is marked with a red dot and bold red label "PEF
    = 9.5 L/s." Clinical values (FVC = 4.8 L, FEV1 = 3.6 L, PEF = 9.5 L/s, FEV1/FVC
    = 75%) are annotated in the lower-left area. The legend is positioned in the upper-right
    with a white background, showing Measured (solid blue), Predicted (dashed gray),
    and Deficit vs Predicted (light blue fill). Axes are labeled "Volume (L)" and
    "Flow (L/s)" with explicit tick marks. Title reads "spirometry-flow-volume · plotnine
    · pyplots.ai" in bold.'
