    leveraged at all, missing an opportunity to show tooltip values on hover
  - Design sophistication is adequate but not exceptional — the KDE+rug is correct
    but the overall composition lacks distinctive design touches (e.g., a subtle fill
    under the KDE curve, rug height variation by density region, or axis zero-line
    emphasis)
