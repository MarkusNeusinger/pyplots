  image_description: The plot displays a band chart on a clean white background with
    a subtle gray grid. A dark blue line (#306998) represents the measured temperature,
    oscillating sinusoidally with an upward trend from ~20°C at hour 0 to ~29°C at
    hour 48. A light blue semi-transparent band (rgba(48,105,152,0.25)) surrounds
    the central line, representing the 95% confidence interval. The band visibly widens
    over time, narrowing at the left (~±0.8°C) and expanding at the right (~±1.9°C),
    illustrating growing sensor drift uncertainty. The title "band-basic · plotly
    · pyplots.ai" is centered at top. The legend in the upper-left lists "95% Confidence
    Interval" (shaded area) and "Measured Temperature" (line). X-axis is labeled "Elapsed
    Time (hours)" and Y-axis "Temperature (°C)".
