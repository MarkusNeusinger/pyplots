  image_description: 'The plot displays a Nyquist diagram on a square canvas (3600x3600).
    A solid blue curve represents positive frequencies (omega > 0), starting from
    approximately (5, 0) at low frequency and spiraling inward toward the origin as
    omega approaches infinity. An orange dashed curve mirrors the positive frequency
    branch for omega < 0. A dashed gray unit circle is centered at the origin. A prominent
    red X marks the critical point at (-1, 0). Blue triangular arrows along the positive-frequency
    curve indicate the direction of increasing frequency, with corresponding orange
    arrows on the mirror curve. Two annotated crossover points are shown: a blue filled
    circle at the gain crossover (omega=2.54 rad/s, PM=32.8 degrees) and a red diamond
    at the phase crossover (omega=4.08, GM=7.8 dB). Labels omega-to-0 and omega-to-infinity
    mark the curve endpoints. A green dotted line segment indicates the gain margin
    between the phase crossover point and the critical point. The legend in the top-right
    corner lists Unit circle, omega > 0, omega < 0, and Critical point (-1, 0). Background
    is light gray with very subtle grid lines. Axes are labeled Real and Imaginary.
    The title reads "nyquist-basic · bokeh · pyplots.ai".'
