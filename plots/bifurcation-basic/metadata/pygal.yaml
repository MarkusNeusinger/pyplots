  image_description: 'The plot displays a bifurcation diagram of the logistic map
    with the title "bifurcation-basic · pygal · pyplots.ai" centered at the top. The
    x-axis is labeled "Growth Rate Parameter (r)" ranging from 2.500 to 4.000, and
    the y-axis is labeled "Steady-State Population (xₙ)" ranging from 0.0000 to 1.0000.
    Three color-coded regions are visible: (1) a navy blue line in the stable fixed-point
    region (r≈2.5–3.0) showing a single steady state rising from ~0.6 to ~0.667; (2)
    burnt orange points in the period-doubling cascade region (r≈3.0–3.57) showing
    the classic fork pattern splitting into 2 then 4 branches; (3) deep violet/purple
    points filling the chaotic regime (r≈3.57–4.0) as a dense cloud with visible windows
    of periodicity. Faint dashed vertical lines mark the key bifurcation points at
    r≈3.0, 3.449, and 3.544. The x-axis highlights these values as major labels. The
    background is white with a light gray (#f7f7f7) plot area and subtle dashed grid
    lines. A legend at the bottom shows four entries describing the three regions
    and bifurcation points. A secondary y-axis appears on the right side due to the
    secondary annotation series.'
