  image_description: The plot displays a process capability histogram for shaft diameter
    measurements (mm). Dark blue column bars form the histogram distribution centered
    around 10.00 mm with frequencies ranging from 0 to 30. An orange fitted normal
    curve overlays the histogram with a light orange/peach area fill beneath it. Red
    dashed vertical lines mark LSL = 9.95 (far left) and USL = 10.05 (far right) with
    bold red labels. A purple dotted vertical line marks the Target = 10.0, with a
    combined label "Target = 10.0 · Mean = 10.0015" in purple text. A blue dashed
    vertical line marks the mean. The entire area between LSL and USL has a very light
    green shading (plotBand) indicating the in-spec zone. The title reads "Shaft Diameter
    Process Capability · histogram-capability · highcharts · pyplots.ai" in bold dark
    text. A subtitle shows "n = 200 · Cp = 1.49 · Cpk = 1.45 · Mean = 10.0015 mm ·
    σ = 0.0112 mm". A floating legend box with subtle shadow in the top-right shows
    "Measurement Distribution" and "Fitted Normal Curve". X-axis is labeled "Shaft
    Diameter (mm)" and Y-axis "Frequency". Background is a light off-white (#fafbfd).
    Grid lines are dotted and subtle.
