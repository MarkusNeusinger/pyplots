  image_description: The plot shows a band chart depicting a 7-day ensemble weather
    forecast. A semi-transparent steel-blue band represents the 95% prediction interval,
    widening progressively from left to right as forecast uncertainty grows with horizon.
    A contrasting golden-yellow center line traces the ensemble mean temperature,
    following a sinusoidal diurnal cycle with a gradual warming trend. The title reads
    "band-basic · seaborn · pyplots.ai" at the top. The x-axis is labeled "Forecast
    Horizon (days)" and the y-axis "Temperature (°C)". A legend in the upper left
    identifies "Ensemble Mean" (gold line) and "95% Prediction Interval" (blue band).
    Top and right spines are removed, and a subtle dashed grid at low alpha provides
    reference without clutter. The plot uses a 16:9 landscape layout with good canvas
    utilization.
