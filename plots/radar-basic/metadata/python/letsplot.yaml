review:
  strengths:
  - Correct radar chart construction using manual polar-to-Cartesian math — technically
    sound approach for a ggplot-style library without native polar support
  - 'All spec-required features present: filled polygons (alpha=0.25), gridlines at
    20/40/60/80/100, outer-edge category labels, multi-series with legend, closed
    polygon'
  - Clean, readable KISS code structure with deterministic data; appropriate complexity
    for the task
  - 'Realistic and neutral employee performance scenario with meaningfully contrasting
    series profiles (Alice: Creativity/Technical; Bob: Teamwork/Communication)'
  - Square 3600x3600 format (ggsize 1200x1200 × scale=3) is well-chosen for a symmetric
    radar chart
  weaknesses:
  - 'VQ-07/palette: scale_fill_manual and scale_color_manual use #306998 (Python Blue)
    and #FFD43B (Python Yellow) instead of Okabe-Ito #009E73 and #D55E00; fix by replacing
    values with ["#009E73", "#D55E00"]'
  - 'CQ-05/theme: script does not read ANYPLOT_THEME, hardcodes label colors (#333333
    for categories, #666666 for values) that do not adapt to dark theme; saves as
    plot.png/plot.html instead of plot-{THEME}.png/plot-{THEME}.html; fix by adding
    full theme-adaptive chrome with PAGE_BG/INK/INK_SOFT tokens'
  - 'SC-04/title: code has pyplots.ai instead of anyplot.ai in the title string'
  - 'DE-03: complementary Alice/Bob profiles present a good story but no visual emphasis
    draws the viewer to the key contrast between the two employees'
