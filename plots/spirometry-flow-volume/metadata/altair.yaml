  image_description: 'The plot displays a spirometry flow-volume loop with Volume
    (L) on the x-axis (ranging from -0.4 to 6.0) and Flow (L/s) on the y-axis (ranging
    from -8 to 12). Two loops are shown: a solid blue "Measured" curve and a dashed
    gray "Predicted" curve. The measured expiratory limb rises sharply from 0 to a
    Peak Expiratory Flow of ~9.5 L/s (marked with a red filled circle and bold red
    label "PEF = 9.5 L/s"), then declines linearly to FVC. The inspiratory limb forms
    a symmetric U-shape reaching ~-5.5 L/s. The predicted loop is larger, peaking
    at ~10.5 L/s and extending to 5.2L volume. A vertical orange dashed line marks
    FEV1 at 3.2L with an orange label. A clinical values text block displays "FVC
    = 4.8 L, FEV1 = 3.2 L, PEF = 9.5 L/s". Gray italic labels mark "Expiration" (upper)
    and "Inspiration" (lower) regions. A dashed gray zero-flow reference line runs
    horizontally. The legend in the top-right distinguishes Measured (solid blue)
    from Predicted (dashed gray). The title "spirometry-flow-volume · altair · pyplots.ai"
    appears at the top left. Grid lines are very subtle, and the overall layout is
    clean and well-proportioned.'
