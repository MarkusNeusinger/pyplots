review:
  strengths:
  - Excellent biological context with EGFR oncogene making a genuinely useful genomics
    visualization example
  - All 4 spec-required tracks implemented with appropriate visualization types (rectangles,
    area, lollipop, colored blocks)
  - Coverage peaks naturally correlate with exon positions demonstrating real biological
    relationships
  - Interactive hover tooltips provide rich variant and coverage detail
  - Clean code structure with well-organized data generation and reproducible seed
  weaknesses:
  - Red-green color combination in regulatory track (Promoter vs Enhancer) problematic
    for colorblind viewers
  - Design could be more polished - tick labels visible on gene/regulatory tracks
    where they add no value
  - Could better leverage Plotly-specific features like range sliders for genomic
    navigation
  image_description: The plot displays a 4-track genome browser view of the EGFR locus
    on chromosome 7 (positions ~55,086,000 to ~55,280,000). The title reads "EGFR
    Locus (chr7) · genome-track-multi · plotly · pyplots.ai" centered at the top.
    Track 1 (Genes) shows the EGFR gene structure with blue rectangles for exons connected
    by a thin line for introns, with small directional arrows indicating the + strand.
    The gene name "EGFR (+)" is labeled above. Track 2 (Coverage) is a filled area
    chart in semi-transparent blue showing RNA-seq read depth, with peaks corresponding
    to exon positions and a notable spike near the 3' end. Track 3 (Variants) uses
    lollipop markers — orange circles for SNPs and purple diamonds for indels — with
    stem height encoding quality score (0-100). Track 4 (Regulatory) shows colored
    rectangles for Promoters (red), Enhancers (green), and CTCF binding sites (yellow).
    All tracks share a common x-axis with genomic positions formatted with commas.
    Track labels appear on the left y-axis. A horizontal legend at the bottom shows
    SNP, Indel, Promoter, Enhancer, and CTCF categories. Alternating light blue background
    shading distinguishes tracks 1 and 3. The plotly_white template provides a clean
    background.
