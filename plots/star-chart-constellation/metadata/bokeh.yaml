  image_description: The plot displays a star chart on a dark navy background (#0a0e2a)
    using a stereographic projection centered on the north celestial pole. Stars are
    rendered as circles with magnitude-dependent sizing — bright stars like Sirius,
    Vega, Capella, and Arcturus appear as large pale-yellow/white dots while dimmer
    stars are smaller blue-grey points. Constellation stick-figure lines connect stars
    in thin semi-transparent blue lines across 23 constellations including Orion,
    Ursa Major, Cassiopeia, Cygnus, Scorpius, Leo, and others. Constellation names
    appear in italic muted blue-grey text near their centroids. Bright star names
    (mag < 1.0) are individually labeled. A dotted RA/Dec coordinate grid overlays
    the chart with RA labels in hours and Dec labels in degrees. A magnitude scale
    legend in the bottom-left shows circles of decreasing size for magnitudes 0-5.
    The title "star-chart-constellation · bokeh · pyplots.ai" appears centered at
    the top in light blue-grey text.
