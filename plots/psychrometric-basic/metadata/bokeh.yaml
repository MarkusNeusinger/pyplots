review:
  strengths:
  - Perfect spec compliance with all required psychrometric property lines, comfort
    zone, and HVAC process path
  - Scientifically accurate ASHRAE psychrometric calculations at standard atmosphere
  - Per-renderer HoverTool with property-specific tooltips is excellent distinctive
    Bokeh usage
  - HVAC process path with custom arrowhead creates effective data storytelling
  - Well-differentiated color scheme with graduated blue RH palette and distinct hues
    per property type
  - Clean KISS code structure with deterministic vectorized computations
  weaknesses:
  - On-chart labels at 17pt could be slightly larger (18-20pt) in the densest regions
  - Some label clustering persists near bottom-right where enthalpy and specific volume
    labels converge
  - Purple enthalpy and blue RH curves could benefit from greater hue separation
  - Default Bokeh axis styling not fully customized
  image_description: The plot displays a psychrometric chart on a light gray (#fafafa)
    background. The x-axis shows "Dry-Bulb Temperature (°C)" from -10 to 50, and the
    y-axis shows "Humidity Ratio (g/kg)" from 0 to ~30. Ten blue curved lines represent
    relative humidity from 10% to 100%, with the 100% saturation curve drawn thicker
    and darker (#1a5276). The blue palette graduates from darker tones at low RH to
    lighter blues at mid-range. Orange dashed diagonal lines show wet-bulb temperatures
    (0°C to 35°C) with labels like "25°C wb". Purple dotted diagonal lines indicate
    enthalpy values (10 to 100 kJ/kg). Green dash-dot lines represent specific volume
    (0.78 to 0.92 m³/kg). A light blue shaded polygon marks the "Comfort Zone" (~20-26°C,
    30-60% RH) with bold blue label. A red line with a custom triangular arrowhead
    traces an HVAC cooling/dehumidification process from "Outdoor Air (35°C, 60% RH)"
    at the upper-right to "Supply Air (15°C, 90% RH)" at the lower-left, with red
    circular markers at both state points. All property lines have direct on-chart
    labels. Subtle grid lines at alpha 0.2. Bokeh toolbar icons at top-right.
