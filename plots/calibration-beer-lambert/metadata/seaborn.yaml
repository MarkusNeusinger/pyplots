    unknown sample, with dashed orange lines projecting to both axes. An annotation
    arrow labels it "Unknown: 8.3 mg/L". The legend in the lower right lists three
    items: 95% Prediction Interval, Linear Fit (95% CI), and Unknown Sample. Top and
    right spines are removed, and a subtle y-axis grid is visible. The title reads
    "calibration-beer-lambert · seaborn · pyplots.ai".'
