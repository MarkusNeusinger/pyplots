review:
  strengths:
  - Full spec compliance with all required features implemented correctly (poles,
    zeros, arrows, real-axis segments, crossings, damping/frequency grid)
  - Excellent branch tracking algorithm with greedy nearest-neighbor sorting for smooth
    locus curves
  - Strong use of matplotlib-specific features (FancyArrowPatch, patheffects) for
    professional arrows and readable labels
  - Clean deterministic code with perfect KISS structure
  weaknesses:
  - Natural frequency semicircles too faint (alpha=0.4) to serve as useful reference
    lines
  - No visual distinction between stable and unstable half-planes via background shading
  - Red crossing markers and annotations blend with salmon branch color reducing distinction
  - Zeta labels only in upper half-plane and positioned near edge of canvas
  image_description: 'The plot displays a root locus diagram for a 4th-order control
    system with transfer function G(s) = (s+2)/[s(s+1)(s+3)(s+5)]. Four locus branches
    are shown in distinct colors: dark blue (heading left toward negative infinity),
    salmon/red (short segment between poles at -1 and -3), purple (curving upward
    into the right half-plane), and cyan (curving downward symmetrically). Open-loop
    poles are marked with large dark gray X markers at 0, -1, -3, -5 on the real axis.
    One open-loop zero is marked with an O at -2. Direction arrows (FancyArrowPatch)
    appear on each branch. Two imaginary axis crossings are marked with red diamond
    markers labeled "jω≈+2.9" and "jω≈-2.9". Real axis segments of the root locus
    are highlighted in semi-transparent blue. Dashed constant damping ratio lines
    (ζ=0.2, 0.4, 0.6, 0.8) radiate from the origin with labels using path effects.
    Dashed natural frequency semicircles are drawn in the left half-plane. Top and
    right spines are removed. Title reads "root-locus-basic · matplotlib · pyplots.ai".
    Axes are labeled "Real Axis (σ)" and "Imaginary Axis (jω)".'
