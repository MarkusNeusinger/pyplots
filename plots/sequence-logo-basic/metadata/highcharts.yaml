review:
  strengths:
  - Creative stacked column approach to sequence logo in Highcharts with CSS-scaled
    letter glyphs
  - Excellent biologically realistic data with real ETS-family TF binding site and
    proper GGAATT consensus
  - Clean well-structured code with correct information content calculation
  - 'Good use of Highcharts-specific features: HTML data labels, CallbackFunction,
    per-point styling'
  - Effective data storytelling with subtitle and natural visual hierarchy from IC
    scaling
  - Thoughtful visual refinement with subtle grid, styled typography, and appropriate
    margins
  weaknesses:
  - Minor nucleotides render as thin colored strips rather than readable letter glyphs
  - T letters at positions 6-7 show CSS scaleY distortion
  - Green/red A/T color pairing not ideal for colorblind accessibility
  - White letter approach creates slightly washed-out aesthetic compared to traditional
    colored-letter logos
  image_description: 'The plot displays a stacked column chart implementing a DNA
    sequence logo for an ETS-family transcription factor binding site across 10 positions.
    The x-axis shows "Position" (1-10) and the y-axis shows "Information content (bits)"
    (0-2). The conserved GGAATT core motif is clearly visible: G (orange bars) dominates
    positions 2-3, A (green bars) dominates positions 4-5, and T (red/dark bars) dominates
    positions 6-7 with tall stacks reaching ~1.5 bits. Positions 1, 8, and 10 have
    low information content with small multi-colored bar stacks. Position 9 is essentially
    empty (uniform distribution = 0 IC). Letters are rendered as white CSS-scaled
    glyphs inside colored bars with text-shadow. Minor nucleotides appear as thin
    colored strips at stack tops. The background is light grey (#fafafa) with subtle
    dashed gridlines. Title reads "sequence-logo-basic · highcharts · pyplots.ai"
    with a subtitle identifying the ETS-family motif and conserved GGAATT core.'
