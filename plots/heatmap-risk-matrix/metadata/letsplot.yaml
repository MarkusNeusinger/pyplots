  image_description: 'The plot displays a 5x5 risk assessment matrix with Likelihood
    (Rare to Almost Certain) on the x-axis and Impact (Negligible to Catastrophic)
    on the y-axis. Background tiles are colored by risk zone: blue (Low, scores 1-4),
    yellow (Medium, scores 5-9), orange (High, scores 10-16), and dark red (Critical,
    scores 20-25). Each cell shows its risk score as a semi-transparent number. Fifteen
    risk items are plotted as colored dots (blue for Technical, purple for Financial,
    orange for Operational) with bold labels above them. Two legends appear on the
    right: Risk Level and Category. The title reads heatmap-risk-matrix lets-plot
    pyplots.ai. White borders separate the cells. Some label crowding is visible in
    the Moderate row and Catastrophic row.'
