  image_description: 'The plot displays a lower-hemisphere equal-area (Schmidt net)
    stereonet projection within a bold black primitive circle on a square canvas.
    Cardinal directions N, E, S, W are labeled in bold dark text (fontSize=24) around
    the perimeter. Tick marks appear every 10 degrees with longer ticks at 30-degree
    intervals. Three geological feature types are plotted with a well-differentiated
    color palette: Bedding (steel blue, #306998), Fault (coral red, #C1432E), and
    Joint (amber/gold, #D4A017). Poles to planes are rendered as filled circles (size=180)
    with white stroke, clustered in three distinct groups — Bedding poles in the center
    area, Fault poles in the upper-right NE quadrant, and Joint poles in the lower
    portion near S. Great circles are drawn as semi-transparent colored lines for
    each measurement. Orange-toned density contour segments (from marching squares
    extraction) are visible around the three cluster areas at ~0.55 opacity. Subtle
    gray grid circles at 30 and 60 degree dip and N-S/E-W cross lines provide reference.
    Mean orientation cross markers with bold labels (mu 312/69 for Fault, mu 43/38
    for Bedding, mu 90/80 for Joint) annotate each cluster center. A Feature Type
    legend in the top-right shows all three categories with colored symbols. The title
    reads stereonet-equal-area · altair · pyplots.ai with subtitle Lower-Hemisphere
    Equal-Area (Schmidt) Projection.'
