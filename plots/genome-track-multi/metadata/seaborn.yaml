  image_description: 'The plot displays a multi-track genome browser view for chr7
    (55kb-105kb region) with four vertically stacked tracks sharing a common x-axis
    of genomic position. The title "genome-track-multi · seaborn · pyplots.ai" appears
    at the top in dark text. Track 1 (Genes) shows two genes: GENEA on the + strand
    (left, with 4 dark blue exon rectangles connected by thin intron lines and a rightward
    arrow) and GENEB on the - strand (right, with 3 exon rectangles and a leftward
    arrow). Track 2 (Coverage) shows a filled area plot in blue (#306998) with light
    blue fill, displaying read depth from 0-75+, with clear peaks corresponding to
    exon positions. The background is light gray. Track 3 (Variants) shows a lollipop
    plot with orange circles for SNPs and pink/purple diamonds for Indels, with stems
    showing quality scores (0-100). A legend in the upper right identifies SNP and
    Indel markers. Track 4 (Regulatory) shows colored rectangles: teal/blue for Promoters
    and green for Enhancers, with a legend in the upper right. The x-axis shows positions
    formatted as "60kb", "70kb", etc. with "Genomic Position (chr7)" label. Alternating
    tracks have subtle gray background shading.'
