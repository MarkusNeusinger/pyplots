    export pattern with scale=3 for 4800×2700px output
  weaknesses:
  - Grid lines shown on both axes (horizontal and vertical); for a density plot, y-axis-only
    grid (panel_grid_major_x=element_blank()) would be cleaner and match style-guide
    guidance
  - No visual emphasis on the three distribution peaks — the multimodal story is visible
    but not highlighted; subtle annotations at cluster centers or vertical reference
    lines would strengthen storytelling (DE-03)
  - Minimal use of lets-plot's distinctive interactive features — the HTML export
    is present but tooltips/hover on rug marks are not leveraged (LM-02)
