  image_description: The plot shows a root locus diagram for the transfer function
    G(s) = 1/[s(s+1)(s+3)] with three branches plotted in blue (#306998), orange (#E88C30),
    and green (#2D8B57). The title reads "root-locus-basic · seaborn · pyplots.ai"
    in dark gray at the top. The X-axis is labeled "Real Axis (σ)" and the Y-axis
    "Imaginary Axis (jω)", both with proper engineering notation. Three open-loop
    poles are marked with large black × markers at s=0, s=-1, and s=-3 on the real
    axis. Branch 1 (blue) extends leftward from s=-3 along the negative real axis.
    Branch 2 (orange) curves upward from the real axis into the upper half-plane,
    crossing the imaginary axis. Branch 3 (green) mirrors downward into the lower
    half-plane. Red diamond markers highlight the imaginary axis crossings at approximately
    ±j1.73, with a red annotation reading "K = 12 / jω = ±1.73". Directional arrows
    on each branch indicate increasing gain. Dashed lines show constant damping ratios
    (ζ=0.2, 0.5, 0.7, 0.9) and dotted semicircles show constant natural frequency
    contours. Semi-transparent thick blue segments mark the real-axis root locus portions
    between (-∞, -3) and (-1, 0). The legend displays the transfer function and branch
    labels. Top and right spines are removed.
