  image_description: 'The plot shows an alluvial/Sankey-style opinion flow diagram
    titled "alluvial-opinion-flow · pygal · pyplots.ai" tracking 1,000 respondents
    across 4 quarterly waves of a "Renewable Energy Policy Survey." Five opinion categories
    are displayed as narrow stacked bar node columns at each wave: Strongly Favor
    (dark navy blue), Favor (medium blue), Neutral (yellow), Oppose (brown/orange),
    and Strongly Oppose (dark red/brown). Respondent counts are printed centered on
    each bar segment (e.g., Strongly Favor: 180→210→250→270, Neutral declining 280→240→180→150).
    Curved bezier flows connect all four waves with opacity-based distinction: stable
    flows (same category) at 0.55 opacity, changed flows at 0.30-0.45 opacity. All
    three wave transitions render correctly. A small italic annotation in the upper
    right reads "Solid = stable opinion · Faded = changed · Polarization: Neutral
    280→150". Legend at bottom shows all 5 categories with matching color squares.
    X-axis title reads "Renewable Energy Policy Survey · 1,000 Respondents Tracked
    Quarterly." White stroke separators and rounded corners on bar segments. Clean
    white background with no grid lines.'
