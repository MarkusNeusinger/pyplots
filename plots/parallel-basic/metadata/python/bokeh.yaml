review:
  strengths:
  - Font sizes explicitly set at all levels (title 28pt, labels 22pt, ticks 18pt,
    legend 18/20pt) for 4800x2700 canvas
  - Excellent iris-like data with clear species separation across petal dimensions
    — ideal for demonstrating parallel coordinates utility
  - Normalized values with original scale ranges in x-tick labels adds genuine reader
    context
  - Clean KISS code structure with reproducibility seed (np.random.seed(42))
  weaknesses:
  - 'Wrong palette: uses #306998 (Python Blue, explicitly non-compliant per VQ-07),
    #FFD43B, #4CAF50 — must use Okabe-Ito (setosa #009E73, versicolor #D55E00, virginica
    #0072B2)'
  - 'No theme handling: code has no os.getenv(''ANYPLOT_THEME''), no adaptive background/chrome
    colors, saves with bare plot.png instead of plot-{THEME}.png'
  - 'Wrong title domain: pyplots.ai should be anyplot.ai'
  - 'Grid too prominent: alpha=0.3 with dashes adds visual noise; should be <= 0.10
    with no dashes'
  - 'No HoverTool: Bokeh''s primary strength is interactivity — missing hover on HTML
    output loses the most distinctive Bokeh feature'
