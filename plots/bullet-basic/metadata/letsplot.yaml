review:
  strengths:
  - Excellent adherence to Stephen Few bullet chart design convention with intentional
    grayscale qualitative bands
  - Strong data storytelling through color-coded above/below target status with realistic
    KPI dashboard context
  - Native lets-plot interactive tooltips (layer_tooltips) providing rich hover detail
    for metric, actual, target, and achievement
  - Full spec compliance with all required bullet chart features (actual bars, target
    markers, qualitative bands, value annotations)
  - Clean, well-structured code with good normalization approach for multi-metric
    comparison
  weaknesses:
  - Band legend footnote text is quite small (size=8) compared to other text elements,
    reducing readability at full resolution
  - Vertical spacing between bullet chart rows is generous, leaving underutilized
    whitespace between metrics
  - Value annotation font size (size=10) could be slightly larger for better visual
    weight relative to the axis labels
  image_description: 'The plot displays a horizontal bullet chart dashboard with four
    KPI metrics stacked vertically: Revenue ($K), Profit Margin (%), Satisfaction,
    and New Customers. Each metric features three grayscale background bands (dark
    gray = Poor, medium gray = Satisfactory, light gray = Good) following Stephen
    Few''s convention. Actual performance is shown as a narrower colored bar — dark
    green (#2D6A4F) for metrics above target (Profit Margin at 88%, New Customers
    at 42) and warm coral (#C0785A) for below target (Revenue at $275K, Satisfaction
    at 3.8). Black vertical line markers indicate the target for each metric. Value
    annotations appear to the right of each bar in bold dark text. The title reads
    "bullet-basic · letsplot · pyplots.ai" with subtitle "Q4 2024 Dashboard — Actual
    vs. Target Performance". A bottom legend shows "Performance: Above Target / Below
    Target" and a footnote explains the band color coding. The x-axis is labeled "Performance
    (%)" ranging from 0 to 100.'
