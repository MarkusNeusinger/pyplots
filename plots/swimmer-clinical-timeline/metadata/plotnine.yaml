  image_description: 'The plot displays a swimmer-style clinical trial timeline with
    25 horizontal bars representing individual patients (PT-001 through PT-025), sorted
    by treatment duration from longest at top to shortest at bottom. Bars are color-coded
    by treatment arm: teal/steel blue for "Arm A (Combo)" and amber/gold for "Arm
    B (Mono)". Clinical events are marked with distinct shaped markers with white
    strokes: upward triangles (amber) for Partial Response, diamonds (blue) for Complete
    Response, squares (purple) for Progressive Disease, and right-pointing arrows
    (dark) for Ongoing patients. Two vertical reference lines indicate median durations
    — a dashed teal line at ~17 weeks (Median A) and a dotted amber line at ~29 weeks
    (Median B). Labeled annotations with colored backgrounds identify these medians.
    An ORR annotation in the upper right shows "ORR: 68% (17/25)" on a light blue
    background. The x-axis reads "Time on Study (weeks)" with breaks every 6 weeks
    from 0 to 48. The y-axis shows "Patient ID" in monospace font. A well-styled legend
    on the right separates Treatment Arm and Clinical Event categories. The overall
    design is clean with a white background, subtle vertical gridlines, and no horizontal
    gridlines.'
