  strengths:
  - Excellent spec compliance — all 7 percentile bands, graduated coloring, P50 emphasis,
    patient overlay, and right-margin labels all present
  - Thoughtful domain-appropriate blue palette with graduated intensity
  - Realistic WHO-approximated growth data with clinically plausible patient trajectory
  - Clean, well-structured code with good readability
  - Strong visual hierarchy with red patient line contrasting against blue bands
  weaknesses:
  - Right-margin percentile labels are slightly crowded, especially in the P25-P75
    range where curves converge
  - Layout wastes space on right edge due to x-axis extending to 39 for label placement
  - No lets-plot distinctive features used — implementation is generic ggplot grammar
  - Horizontal gridlines could be more subtle (lower alpha) for a more refined look
  image_description: The plot displays a pediatric growth chart for boys' weight-for-age
    from 0-36 months. Seven percentile bands (P3 through P97) are rendered as graduated
    blue-toned ribbon areas — darker navy blue at the extremes (P3-P10, P90-P97),
    medium blue in the middle bands (P10-P25, P75-P90), and light blue for the inner
    band (P25-P75). The 50th percentile is emphasized with a thicker dark blue line.
    An individual patient trajectory is overlaid in red with circular markers connected
    by a line, tracking above the 50th percentile. Percentile labels (P3, P10, P25,
    P50, P75, P90, P97) appear on the right margin in gray text. The x-axis shows
    "Age (months)" with ticks at 0, 6, 12, 18, 24, 30, 36. The y-axis shows "Weight
    (kg)" ranging from ~3 to ~17. Title reads "Boys Weight-for-Age · line-growth-percentile
    · letsplot · pyplots.ai". The background is clean white with minimal theme styling
    and only horizontal gridlines.
