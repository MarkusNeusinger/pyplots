  - Direction-coded slope lines (green=increase, orange=decrease) using Okabe-Ito
    positions 1 and 2
  - Custom spread_labels algorithm prevents endpoint label overlap on both sides
  - Full theme support with properly threaded INK/INK_SOFT tokens in both light and
    dark renders
  - HoverTool with product/period/value tooltips leverages Bokeh interactive capability
  - Clean slopegraph layout with hidden x-axis and Q1/Q4 as text labels at correct
    positions
