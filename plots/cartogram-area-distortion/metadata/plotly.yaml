review:
  strengths:
  - Excellent dual encoding (size=population, color=density) creates a compelling
    visual narrative
  - Smart NE state offset logic to reduce overlap in the densest region
  - Clean professional styling with Viridis colorscale and subtle geographic reference
  - 'Perfect code quality: deterministic, clean, well-structured'
  - Strong use of Plotly geo features including Choropleth for background state outlines
  - HTML export alongside PNG leverages Plotly interactive strengths
  weaknesses:
  - NE state region still shows some crowding despite offsets - CT label is cramped
  - Smallest state bubbles (WY, VT, ND) are nearly invisible as tiny dots
  - Not a true contiguous cartogram as described in the spec (bubble cartogram variant
    instead)
  - Design could be more polished to reach publication-quality level
  image_description: The plot shows a bubble cartogram of all 50 US states on an Albers
    USA projection with a clean white background and faint gray state outlines for
    geographic reference. Bubble size is proportional to population (California, Texas,
    and Florida are the largest circles). Color encodes population density using the
    Viridis colorscale ranging from dark purple (sparse, ~10/sq mi) through teal to
    yellow (dense, ~5k/sq mi). New Jersey appears bright yellow-green indicating highest
    density. State abbreviation labels in white Arial Black font appear on larger
    bubbles (those with population >=3M). A colorbar on the right shows "Pop. Density
    (per sq mi)" with tick marks at 10, 50, 100, 500, 1k, and 5k. The title reads
    "US States by Population" in bold 28pt font with subtitle "cartogram-area-distortion
    · plotly · pyplots.ai" in smaller gray text. A footer annotation reads "Circle
    area proportional to population | Color proportional to density". NE states have
    been manually offset to reduce crowding. Small states (WY, VT, ND, SD) appear
    as tiny dots.
