  image_description: The plot displays two vertically stacked panels on a white background.
    The top panel shows ACF (Autocorrelation Function) values and the bottom panel
    shows PACF (Partial Autocorrelation Function) values, both plotted against lag
    numbers 0-35 on the x-axis. The title reads "acf-pacf · highcharts · pyplots.ai"
    in bold dark blue, with a subtitle "AR(2) Process — Exponential ACF Decay with
    PACF Cutoff at Lag 2" in gray. Narrow column bars extend from the zero baseline
    — dark blue (#306998) for non-significant values and red (#e74c3c) for statistically
    significant values exceeding the 95% confidence bounds. Red dashed horizontal
    lines mark the confidence interval at approximately ±0.139. The ACF panel shows
    a tall bar at lag 0 (=1.0) in darker blue, significant positive values at lag
    1 (~0.42, red), and a significant negative value at lag 3 (~-0.19, red), with
    exponential decay thereafter. The PACF panel shows significant bars at lags 1
    (~0.42, positive) and 2 (~-0.30, negative) in red, with a sharp cutoff consistent
    with an AR(2) process. Y-axis labels "ACF" and "PACF" are in bold blue, tick labels
    in gray. The x-axis is labeled "Lag". Grid lines are very subtle (#eeeeee). Layout
    is clean with generous margins.
