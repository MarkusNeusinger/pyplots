  image_description: 'The plot displays a spirometry flow-volume loop on a white background
    with subtle gray grid lines. The measured curve is drawn as a thick solid blue
    line (#306998) forming a closed loop: the expiratory limb rises sharply from the
    origin to Peak Expiratory Flow (~9.5 L/s) near volume ~1.2 L, then declines roughly
    linearly to FVC at ~4.8 L. The inspiratory limb curves below the zero-flow line
    in a symmetric U-shape reaching about -6 L/s, returning to the origin. A dashed
    gray predicted normal loop overlays the measured one, extending slightly further
    (FVC ~5.2 L, PEF ~10.5 L/s). A red dot marks PEF with bold red label "PEF = 9.5
    L/s". Clinical values (FVC = 4.8 L, FEV1 = 3.6 L, PEF = 9.5 L/s, FEV1/FVC = 75%)
    are annotated in the lower-left. A boxed legend in the upper-right distinguishes
    "Measured" (solid blue) and "Predicted" (dashed gray). Title reads "spirometry-flow-volume
    · plotnine · pyplots.ai". Axes are labeled "Volume (L)" and "Flow (L/s)".'
